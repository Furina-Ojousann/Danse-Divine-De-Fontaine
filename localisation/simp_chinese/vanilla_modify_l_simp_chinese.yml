 labour_law: "劳动法"
 labour_law_non_exist_labour_law: "无劳动相关立法"
 labour_law_low: "劳动法形同虚设"
 labour_law_medium: "劳动法中规中矩"
 labour_law_relatively_high: "劳动法实施良好"
 labour_law_high: "劳动法强而有力"
 fra_r_labour_law_navia_plan: "劳动法改革：娜维娅计划"
 formable_balkans: "巴尔干联合"
 formable_balkans_desc: "巴尔干的民族矛盾由来已久，积怨颇深。但随着一个统治巴尔干全部民族的统一国家出现，调和各族矛盾，保障宗教自由，使人民团结在同一旗帜下的机会出现了！"
 unity_balkans: "统合巴尔干"
 unity_balkans_trigger: "控制§Y[YUG.GetName]、[ROM.GetName]、[BUL.GetName]、[ALB.GetName]与[GRE.GetName]§!全部初始地区（包括$STATE_163$和$STATE_164$）"
 unity_balkans_tt: "获得§Y[YUG.GetName]、[ROM.GetName]、[BUL.GetName]、[ALB.GetName]与[GRE.GetName]§!全部初始地区的核心"
 generic_legalize_multi_party_system: "步入多党政治"
 generic_legalize_multi_party_system_desc: "一党制或许是高效的，可没有民主的纠错机制，独裁政权最终会在某次不可挽回的大错中崩溃，使国家受到激进主义的威胁。因此，我们应该考虑将实行多党制纳入议程。"
 generic_maintain_dictatorship: "维持强力统治"
 generic_maintain_dictatorship_desc: "民主也许是好的，但时候未到。我们的大众没有足够的受教育水平，做出的决策在政治上不够成熟，无法承担民主的重任。在国民具备足够的素养之前，应该暂时让我国最明智的精英来治理国家。"
 generic_socialism_propose: "社会主义构想"
 generic_socialism_propose_desc: "我们对于民主的诉求不应该拘泥于资产阶级的游戏。为了将民主真正融入民众的生产与生活之中，社会主义是唯一选择。"
 generic_consititutional_convention: "制定宪法"
 generic_consititutional_convention_desc: "我们必须定义“我们的国家是什么”，这样行政，司法，立法才能具备法权基础，民主程序才能够正常运作。"
 generic_cooperation_group: "合作集团"
 generic_cooperation_group_desc: "我们的统治必须有一个牢固的基本盘。在当下，军队，教会以及地主便是我们最好的盟友。"
 generic_boost_national_narrative: "强化民族叙事"
 generic_boost_national_narrative_desc: "我们的同一民族认同给予了我们统治全国的理由。更进一步，民族主义也可以树立外敌，煽动恐慌，鼓动民众将自己融入更大的“伟大意志”中。"
 generic_developing_feminism: "发展中的女性主义"
 generic_developing_feminism_desc: "随着经济发展，国家步入现代化，我们再也无法将女性视作附庸于男性，不完整的“非人”了。她们已经参与进了社会广泛的经济活动之中，应该获得完整的公民权利作为回报。"
 generic_hold_election: "全民普选"
 generic_hold_election_desc: "我们应该听从充分听从民众的意见，举行公平干净的新选举。"
 generic_socialist_paramilitary_organization: "左翼准军事组织"
 generic_socialist_paramilitary_organization_desc: "将工人们组织起来，加以共产党的领导，往往可以发挥出强大的战斗力。无论在罢工，还是反对政治迫害，拥有武装斗争的能力可以为革命兜底。"
 generic_civil_society: "小社会"
 generic_civil_society_desc: "小社会在学术上的标准称呼是“公民社会”，它是处于传统意义上区分的“公”与“私”之间的一个领域，诸如非政府组织、社区组织、宗教团体、专业协会及工会等等。是保证民主宪政的重要枢纽，因为它能够调和阶级矛盾，在民众与政府之间建立有效的代理协商。"
 generic_social_revolution: "选票带来的革命"
 generic_social_revolution_desc: "靠着无产阶级兄弟们的选票，无产阶级的政党成功夺取政权，但这只是建立社会主义国家的一小步，资产阶级正蠢蠢欲动试图进行反扑，而保守落后的势力亟需改造肃清。但我们可以大声宣告——是人民选择了共产党！"
 generic_worker_soviet: "组建工人苏维埃"
 generic_worker_soviet_desc: "我们不会抛弃民主，相反，工人的民主才是世界上最民主的民主制度，因为它不再服务于少数人。我们将会彻底改组议会，让它能够真正代表民意。"
 generic_splendid_isolation: "光荣孤立"
 generic_splendid_isolation_desc: "我们完全没有必要参与国际上的大国博弈，而应该专注于自身的内部事务——福利，社会保障，教育都需要预算。"
 generic_priority_revolution: "世界革命优先"
 generic_priority_revolution_desc: "作为世界上首先实现社会主义的国家，我们有义务解放其他还处于落后社会阶段的国家，帮助他们的社会主义政党夺取政权。而当下，苏联已经选择与西方合作，唯有我们可以扛起完成世界革命的重任！"
 generic_anti_fascism_priority: "反法西斯优先"
 generic_anti_fascism_priority_desc: "无论如何，在世界笼罩在法西斯阴云下的今天，每个民主国家都难辞其咎，具有维护民主，推翻法西斯独裁的责任。否若是民主世界无法团结一致，最终我们都有被奴役的风险。"
 generic_public_decision: "去意识形态化"
 generic_public_decision_desc: "我们的民主政治不需要以任何“主义”为导向。在国家的治理中，我们总会遇到许多问题，在解决这些问题的过程中，利益分裂总是不可避免，而妥协退让也是其不可或缺的一环。"
 generic_modest_political: "温和政治"
 EDC_hide_generic_decision_categories: "隐藏通用决议组"
 EDC_hide_generic_decision_categories_desc: "我发现游戏内展示的决议组似乎有点太多太杂了，或许用不到的时候把它们暂时藏起来会不错。"
 EDC_hide_generic_decision_categories_tt: "§R但是这些决议很容易忘记，慎重考虑！§!\n被隐藏的通用决议组包括这些:\n - §Y$propaganda_efforts$§!\n - §Y$political_actions$§!\n - §Y$prospect_for_resources$§!\n - §Y$special_projects$§!\n - §Y$foreign_influence$§!\n - §Y$economy_decisions$§!\n\n"
 EDC_show_generic_decision_categories: "展示通用决议组"
 EDC_show_generic_decision_categories_desc: "仔细一想通用决议还是挺有用的。"
 EDC_show_generic_decision_categories_tt: "§G没错，是时候重新拾起通用决议们了，对吧？§!\n启用决议组:\n - §Y$propaganda_efforts$§!\n - §Y$political_actions$§!\n - §Y$prospect_for_resources$§!\n - §Y$special_projects$§!\n - §Y$foreign_influence$§!\n - §Y$economy_decisions$§!\n\n"
 SPS_boost_union_democracy: "保障工会民主"
 SPS_boost_union_democracy_desc: "作为苏联公民社会的最重要组成部分，工会在这场政治风暴中的角色尤为关键，我们可以利用工会暂时缓和紧张局势，防止革命朝着无序的激进方向蔓延。"
 SPS_defense_the_party_leadership: "宣传保卫党的领导"
 SPS_persecute_low_nobility: "继续迫害旧势力"
 SPS_persecute_low_nobility_desc: "白军，贵族，教士。前沙俄社会的上等阶层，在如今的社会是再好不过的攻击对象了。"
 SPS_advocate_social_compromission: "提倡社会和解"
 SPS_advocate_social_compromission_desc: "也许我们社会中有些人成分并不干净，但人无法决定自己的出身，而苏维埃社会也乐意欢迎那些愿意洗心革面，投入革命建设的旧社会人士。"
 