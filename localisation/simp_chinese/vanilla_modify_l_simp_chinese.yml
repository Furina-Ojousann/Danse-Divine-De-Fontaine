 mio_cat_tech_all_destroyer_and_modules_research: "所有驱逐舰及其模块研究速度"
 infantry_tech_research: "步兵研究速度"
 siam_focus: "泰国国策树"
 SIA_Constitution_Defense_Monument: "宪法保卫纪念碑"
 SIA_Constitution_Defense_Monument_desc: "我们国家内部曾有一群人，他们反对立宪革命的成果，为了让国家维持君主制下的停滞，在三年前发动叛乱。所幸，这场叛乱最终被镇压，我们将会建造一座纪念这次战斗的纪念碑，来提醒国民1932年革命的价值。"
 SIA_Moderization_never_stop: "现代化不等人！"
 SIA_Moderization_never_stop_desc: "1932年革命的一个重要原因是国王的专制政府无力继续推进改革，在面对立宪以及诸多改革时犹豫不决。但现在我们拥有一位坚决的总理，他会不遗余力地为王国塑造最好的发展环境。"
 SIA_rural_education: "乡村教育"
 SIA_rural_education_desc: "即使是最偏僻的村庄，村民也必须意识到一点：他们是暹罗人，生活在暹罗这篇土地上，只有暹罗政府才会维护他们的利益。共产党是卖国的，所以他们很邪恶；而法西斯分子是极端的，会毁掉立宪革命的成果。勤劳，顺从，爱国，就是一个合格的暹罗人应该做的。"
 SIA_From_Siam_to_Thailand: "从“暹罗”到“泰”"
 SIA_From_Siam_to_Thailand_desc: "泰人是生活在这片如今被称为暹罗土地上的绝对主体民族，尽管还有其他民族，但他们必须接受这个事实：泰人是这个国家的主宰，因此这个国家应该被称作泰而非暹罗。"
 SIA_Thailand: "泰"
 SIA_Thailand_ADJ: "泰"
 SIA_Thailand_DEF: "泰"
 SIA_Thailand_neutrality: "泰王国"
 SIA_Thailand_neutrality_DEF: "泰王国"
