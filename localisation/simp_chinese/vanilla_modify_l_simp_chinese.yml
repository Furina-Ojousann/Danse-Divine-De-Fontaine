 synthetic_refinery_desc: "每个§Y炼油厂§!将会消耗§R3§!单位£missing_resources_strip|7 煤炭\n\n此建筑可为所属地区提供:"
 Sahara_HighWay: "撒哈拉公路"
 Self_sufficient_oasis: "沙中绿洲"
 cze_skoda_industry_resetted: "工业之心"
 cze_skoda_industry_resetted_desc: "奥匈帝国是一个多民族的帝国，幅员辽阔，工业分布却极不均衡。大战末期，奥匈工业几乎可以等价于波西米亚工业，这片丰饶的土地出产帝国80%以上的工业产值，并且孕育了斯柯达这一大巨头。现在，共和国依然从这笔丰厚的工业遗产中受益匪浅。"
 cze_defense_of_democratic: "东方民主"
 cze_defense_of_democratic_desc: "奥匈帝国之碎片，如前宗主奥地利，现在正在准法西斯的统治之下；匈牙利，王位空悬，海军上将独自摄政，唯有捷克斯洛伐克摆脱旧制度的遗毒，步入了民主政治。虽然民主的历史并不算长，但却出奇地高效，人民普遍积极行使自己的投票权，涵盖左右翼的五党联盟虽有分歧，却远不至于冲突。"
 CZE_edvard_benesh_rename: "爱德华·贝奈斯"
 ENG_ensure_the_aircraft_range: "确保投射能力"
 ENG_ensure_the_aircraft_range_desc: "我们的空军肩负艰巨使命，可能需要在相距千里的不同战区长途奔袭。因此空军的航程成为了一项重要指标，我们必须在这方面做出努力。"
 ENG_expand_logistics_system: "扩大地勤系统"
 ENG_expand_logistics_system_desc: "现有的地面空军基础设施无法胜任日后空军大规模行动所需要的物资供给与调度协调，因此扩大这一系统势在必行，以确保英国能够赢下下一场战争。"
 ENG_maritime_resure_service: "海事支援"
 ENG_maritime_resure_service_desc: "即使是在战时，英国政府依然尊重并保护人类生命权。无论是从人道主义还是实用主义作为出发点，经验老道，陷入困难的飞行员以及其他所有人都值得被无条件救援。\n直升机作为一种新兴的飞行器，其能够悬停的特点十分适用于搜救，我们应该加大对该领域的投入。"
 ENG_keep_the_leading_level: "永葆领先"
 ENG_keep_the_leading_level_desc: "我们的空军可以不是世界上规模最大的，但装备与训练必须是世界最为先进的。只有这样，英国才能够制霸天空，再以天空统治陆地与海洋。"
 air_power_projection_factor_tt: "$MODIFIER_AIR_POWER_PROJECTION_FACTOR$：$RIGHT|+=%1$"
 UK_RAF: "[GetBritishAirForceName]"
 UK_RAF_desc: "$UK_RAF$是世界上最早成立的独立空军，并且在战间期相当程度地延续了其先发优势，在装备水平，飞行员训练与技战术理论等多方面均保持领先。不过由于一战以后空军的大规模缩编，目前$UK_RAF$的规模有限，能否应对接下来的挑战存疑。"
 Modify_UK_RAF: "§Y$UK_RAF$§!追加效果:\n"
 United_Kingdom_AirForce: "英国皇家空军"
 Britain_Union_AirForce: "不列颠共和空军"
 ENG_develop_cv_helicopter: "开发反潜直升机"
 ENG_develop_cv_helicopter_desc: "直升机反潜已被证明是一种高效的猎杀方式，并且在未来会越发普及。我们必须抢先对该领域的研发。"
 ENG_enlarge_mios: "航空垄断组织"
 ENG_enlarge_mios_desc: "尽管有《垄断法》立法在先打击垄断组织，但在战时这一惯例应该被暂时打破，从而让几个大型航空公司发挥出更高的效用。"
 tech_experimental_antisubmarine_helicopter: "实验性反潜直升机"
 tech_experimental_antisubmarine_helicopter_desc: "直升机反潜作为一种新兴的技术，在作战实验中已经证明了自己的高效，现在，这一技术应该被大规模应用于列装。"
 tech_experimental_antisubmarine_helicopter_carrier: "航母反潜直升机队"
 tech_experimental_antisubmarine_helicopter_charge: "舰载反潜直升机队"
 ENG_general_equipment_generation_replacement: "[GetYear]列装更新"
 ENG_mechanized_purpose: "全面机械化计划"
 ENG_mechanized_purpose_desc: "摩托化的下一步便是给我们的卡车装上装甲——可不止那么简单，比较与步兵或者摩托，机械化部队将是非常重要的进步。"
 ex_britain_rearmament_limited: "财政紧缩计划"
 ex_britain_rearmament_general: "常规军备重整规划"
 ex_britain_rearmament_widespread: "装备列装更新计划"
 ex_britain_rearmament_final: "最终战争准备"
 city_state: "城邦"
 tiny_state: "微型领地"
 large_industrial_centre: "大型工业中心"
 regional_industrial_centre: "区域工业中心"
 ENG_a_century_for_keynes: "凯恩斯世纪"
 ENG_a_century_for_keynes_desc: "古典经济学的规律由亚当·斯密写就，而资本主义在20世纪发生的新变化，则由凯恩斯总结。英国总是在经济学上走在前列，尽管这并不能完全避免经济危机，将繁荣永续下去，但足够的市场干预能够尽可能推迟它的到来，并且加快恢复。"
 ENG_fuild_iteration: "流动性循环"
 ENG_fuild_iteration_desc: "政府的首要职能应该是让流动性不足的固定资产参与进货币循环中，这样经济才能够持续扩张。英国从来不缺乏货币，重要的是让货币在投资，工资与回报中流动得畅通无阻。"
 ENG_expand_government_spending: "扩大政府支出"
 ENG_expand_government_spending_desc: "政府就应该多花钱。多花钱的结果是经济得以扩张，那么税源也就扩充了。这样的积极循环可以促进产业发展。"
 expand_centre_england_industry: "中英格兰"
 expand_centre_england_industry_desc: "中英格兰是国家最传统，历史最悠久的工业区。不过随着时间推移，一些旧产业已经衰弱，政府应该扶持新的产业填补空缺。"
 ENG_scotland_investment: "苏格兰" 
 ENG_scotland_investment_desc: "苏格兰低地虽然相较于中英格兰来说，工业的历史相当年轻，但也存在格拉斯哥与爱丁堡等大型工业都市。这为进一步产业扩张提供了良好基础。"
 ENG_south_england_investment: "南英格兰"
 ENG_south_england_investment_desc: "伦敦作为国际金融中心，近些年来已经从传统工业区转变为资本更加密集的金融吗地带，但这并不意味着南英格兰就不存在工业潜力，来自伦敦的大量融资可以被输送到南部诸郡。"
 ex_britain_economic_reform_fuild_iteration: "《工会法》修订案"
 ex_britain_economic_reform_expand_spending: "扩大年度预算"
 ex_britain_economic_reform_integrated: "精准干预"
 UK_industrial_development: "指定工业区"
 Expanded_Debug_Categories: "游戏内调试决议组"
 Expanded_Debug_Categories_desc: "由于作者疲于对新系统，作整个原版游戏以及兼容的模组的适配；因此如果在游戏进程中出现严重违和的情况，可以依据这些决议手动调整。\n如果出现了严重无法手动调整的错误，请通过B站联系作者，UID:1081615042"
 Call_Author: "联系作者"
 Call_Author_desc: "PS:能通过决议解决的事情就不要联系我"
