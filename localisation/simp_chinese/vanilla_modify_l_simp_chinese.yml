 usa_army_of_the_united_states_improved: "美国陆军"
 USA_Operation_Olympic: "奥林匹克行动"
 USA_Operation_Olympic_desc: "奥林匹克行动旨在夺取九州岛南部的滩头阵地，为进一步北上准备。\n\n§Y完成对九州岛的占领以后，该修正将被移除。§!"
 USA_Operation_Coronet: "小王冠行动"
 USA_Operation_Coronet_desc: "小王冠行动直指关东平原，目的在于夺取关东的机场以便盟国大规模的空军行动，按计划，此时位于九州的机场将为行动提供机降补给。\n\n§Y完成对关东地方(东京都，神奈川，千叶，埼玉，茨城，栃木，群马)的占领以后，该修正将被移除。§!"
 USA_over_there_category: "介入世界大战"
 USA_over_there_category_desc: "“无论应对这场预谋的侵略要耗费多久，正义在手的美国人民都会获得全面的胜利。我不仅将会最大程度确保我们的安全，还将确保我们再也不会被此类不义行径所伤害，我相信这也是国会和民众的心声。”"
 usa_complete_operation_olympic: "奥林匹克行动作战目标"
 usa_complete_operation_coronet: "执行小王冠行动"
