 wpa_extra_comsumer_factor_for_buff: "由于不断膨胀的政府开支，我们不得不额外§Y每月多付出1%的生活消费品工厂系数§!作为代价"
 USA_Tax_law_tt: "得益于新税法的实施，政府开支已经§G不足为虑§!:\n设定§YWPA§!带来的生活消费品工厂系数:§Y0%§!"
