 SIA_Thailand_democratic: "泰王国"
 SIA_Thailand_democratic_DEF: "泰王国"
 SIA_Thailand_democratic_ADJ: "泰国"
 SIA_asian_s_ambition: "全亚典范"
 SIA_asian_s_ambition_desc: "日本绝对称得上全亚洲对抗西方殖民主义的典范，无论是现代化的历程还是正在宣传的泛亚思想都值得学习。我们的国家被帝国主义三面包围，加上海洋，完全包围，日本在未来毫无疑问会是抵抗帝国主义侵略的强力盟友。"
 potential_allies: "潜在盟友"
 SIA_develop_always_matters: "发展，发展与发展的永恒方针"
 SIA_develop_always_matters_desc: "泰国并不需要任何明确的意识形态来塑造这个国家，它真正需要的是只为发展而服务的实用。如果法团主义能够发展生产力，我们就采纳；如果民族主义有利于团结国家，我们就宣扬。"
 SIA_no_more_socialism: "根除社会主义"
 SIA_no_more_socialism_desc: "任何的社会主义都只会把我们亲爱的祖国带向毁灭，像随着工业化兴起的工会，便是社会主义的苗头——抱歉，暹罗没有社会主义的空间，工会必须被取缔。"
 SIA_let_corporatism: "让法人来协商"
 SIA_let_corporatism_desc: "政府会倾听人民的声音，矛盾应该通过沟通与协商解决，而反叛的结果只能是被镇压。"
 SIA_manage_royal_capital: "皇室资产乃国有"
 SIA_manage_royal_capital_desc: "皇室为暹罗的现代化做出了突出的贡献，我们可以容忍他们在我们的国家中享受一定的特权。然而数百年积攒的皇室财富的确是一笔可观的财富，我们可以通过成立“皇家资产管理局”，以打理皇室资产的名义把这笔资产用于发展国家。"
 SIA_manage_royal_capital_tt: "我们可以动用这笔财富来投资我们的国家"
