 usa_offer_china_weapon: "提供国民政府武器"
 usa_offer_debt_china: "提供国民政府贷款"
 Modify_Extra.2.d: "我们的盟友美利坚合众国似乎终于看到了中国在抗战中的艰辛，于是大发慈悲地施舍了我们一些必要的武器。"
 Modify_Extra.2.t: "收到美国援助"
 Modify_Extra.2.a: "很好。"
