 #####USA#####

 USA_suppress_isolatist: "全球主义"
 USA_suppress_isolatist_desc: "孤立主义者自持美国得天独厚的地理优势，而毫不负责任地声称欧洲事务与美国人无关。可若是旧大陆真的沦陷于暴政独裁之手，新大陆真的称得上安全吗？"
 USA_fight_oversea: "海外战斗"
 USA_fight_oversea_desc: "我们绝不能坐视法西斯继续肆无忌惮地扩张，现在，盟友亟需我们的直接支持。"
 USA_ensure_britain: "确保大不列颠岛"
 USA_ensure_Mediterranean: "稳固地中海"
 USA_action_torch: "火炬行动"
 USA_return_old_mainland: "重返旧大陆"
 USA_Pacific_war: "太平洋战争"
 USA_islands_hopping: "跳岛战术"
 USA_Olympic_Coronet: "没落行动"
 USA_widespread_social_mobilization: "广泛战争动员"
 USA_ship_production: "海上生命线"
 USA_women_mobilization: "铆工罗西"
 USA_red_ball_transport: "红球快递"
 USA_national_industry: "经济国家统制"
 USA_Presidential_Term_of_Roosevelt: "罗斯福任期"
 USA_Presidential_Term_of_Roosevelt_desc: "赫伯特·胡佛在面对大萧条时显得黔驴技穷，未能使经济有所起色。于是他毫无疑问地被赶下台了，发表炉边谈话的罗斯福会开始新政，尝试结束大萧条。"
 USA_Presidential_Term_of_Roosevelt_trigger: "§C富兰克林·D·罗斯福§!在§Y1932年美国总统选举§!中胜出"
 USA_Presidential_Term_of_Roosevelt_tt: "§Y人民已经发表了他们的意见§!\n新总统将会开始着手§Y处理大萧条§!"
 USA_the_worst_is_the_first_one_hundred_days: "最糟百日"
 USA_the_worst_is_the_first_one_hundred_days_desc: "罗斯福在执政的“第一个百日”里推出了一系列引人注目的新计划，其间他与国会会晤了100天。在这100天的立法期间，国会批准了罗斯福提出的每一个要求。1933年3月经济触底，随后，经济终于开始复苏。"
 USA_the_bank_law: "紧急银行法"
 USA_the_bank_law_desc: "银行业是我国经济的命脉所在，但在大萧条最严重的时期，全美大约两万七千家银行中有九千家破产，这对经济造成了巨大的伤害，而保全剩下的银行是紧急银行法的主要目的。"
 USA_the_worst_is_the_first_one_hundred_days_tt: "看起来我们已经渡过了§R最艰难的关头§!。现在我们更需要关注如何§Y更快速地从消除萧条的影响§!"
 USA_the_bank_law_tt: "本土大概有30%银行在萧条期间由于挤兑而倒闭，我们必须做点什么防止情况进一步恶化\n§Y《紧急银行法》将被起草被送交国会审阅§!，当通过时:\n$usa_the_depression_progress$:§G-5%§!"
 USA_three_R_new_deal: "R&R&R"
 USA_three_R_new_deal_tt: "§Y救济、复兴、改革§!。\n在危急的时刻，口号简约而振奋人心，远胜于长篇大论\n$usa_the_depression_progress$:§G-20%§!"
 USA_three_R_new_deal_desc: "罗斯福提出了可用三个R概括之的救市方针：救济，复兴，改革。"
 USA_Atlantic_Charter: "大西洋宪章"
 USA_rural_electrification_administration: "农业与农村电气化"
 USA_cash_and_carry: "现金并提"
 USA_development_western_rural_area: "挽救中西部乡村"
 USA_development_western_rural_area_desc: "一场沙尘暴席卷了中西部大平原——本该是水草丰美，物产丰富的土地，现在作物绝收，农民饿死，俨然变成了地狱。现在公共事业振兴署准备借助对抗沙尘暴的机会，接着重建中西部机会解决就业问题。"
 USA_development_eastern_city_group: "发展东部城市群"
 USA_development_eastern_city_group_desc: "萧条中的城市并不比乡村宽裕，银行无情地收走了中产们抵押的房产，使人无处可去，露宿街头，这些没落者可以被重新调动起来建设我们的城市。"
 USA_Tennessee_Valley_Authority: "田纳西河谷管理局"
 USA_Tennessee_Valley_Authority_desc: "田纳西河谷常面临水灾、滥伐及水土流失，田纳西河谷管理局透过推广新的耕种方法、植树及兴建水坝来解决这些问题。同时也负责发电及贩售过剩电力、创造就业及保存水力。"
 USA_Federal_Emergency_Relief_Administration: "联邦紧急救济署"
 USA_national_labouror_relationship_law: "全国劳工关系法"
 USA_social_insurance_law: "社会保险法"
 USA_Tax_law: "税收法"
 USA_union_faithful_to_democratics: "民主党工会"
 USA_union_faithful_to_democratics_desc: "罗斯福关于社会保障的立法赢取了大量工会的支持，现在，他们成了民主党的坚定支持者。在未来，这种优势可以被作为票仓继续延续。"
 USA_the_1929_depression: "大萧条"
 USA_the_1929_depression_tt: "$USA$当前的§Y萧条度§!为:[?usa_the_depression_progress|%-]\n - $usa_the_depression_progress$每月会自然倒退§G0.1%§!\n - 当§Y萧条度§!达到§Y0%§!，该修正将会被移除\n\n"
 USA_the_1929_depression_desc: "历经战后整个二十年代的疯狂，美利坚合众国在萧条中走进了磨难的三十年代。在此之前，幻想资本主义繁荣存在于在广泛的劳动人民中，美国劳联的领导上毫不犹豫地和所有这些资本家的“高速化”或“合理化”的计划相配合、相适应。柯立芝的不作为把政治上的保守发挥到了极致，让美国经济进入到狂热的状态。房地产，汽车制造，股票交易，整个二十年代迷人的意项，在三十年代成为了废墟以及废纸。在繁荣的末尾，即使有人忧心忡忡，绝大多数的美国人并不愿在狂欢中醒来。而现在，市场经济的铁律打醒了迷梦中的美国人——资本主义生来不为人类幸福而服务。"
 USA_works_progress_administration_during_depression: "WPA"
 USA_works_progress_administration_during_depression_tt: "$USA$的$usa_the_depression_progress$每月变化:[?wpa_depression_progress_decrease_monthly|=%-]\n\n"
 USA_works_progress_administration_during_depression_desc: "公共事业振兴署(Works Progress Administration, WPA)雇佣数百万多数没有受过正规教育的求职者来执行公共工程项目，包括公共建筑和道路的建设。"
 USA_agricultural_adjustment_act_tt: "§Y$USA_works_progress_administration_during_depression$§!追加效果:\n$USA$的$usa_the_depression_progress$每月变化:§G-0.5%§!\n$MODIFIER_CONSUMER_GOODS_FACTOR$:§Y-10%§!\n$MODIFIER_GLOBAL_BUILDING_SLOTS_FACTOR$:§G+15%§!"
 USA_fair_labour_standards_act_tt: "§Y$USA_works_progress_administration_during_depression$§!追加效果:\n$USA$的$usa_the_depression_progress$每月变化:§G-0.5%§!\n$MODIFIER_PRODUCTION_FACTORY_START_EFFICIENCY_FACTOR$:§G+10%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$:§G+10%§!"
 USA_federal_housing_act_tt: "§Y$USA_works_progress_administration_during_depression$§!追加效果:\n$USA$的$usa_the_depression_progress$每月变化:§G-1.0%§!\n$modifier_production_speed_industrial_complex_factor$:§G+10%§!\n$modifier_production_speed_infrastructure_factor$:§G+15%§!"
