 USA_rural_moderation_category: "乡村电气化工程"
 USA_rural_moderation_category_desc: "实际上，我国的城乡差距在二十年代经济飞速增长时被显著地拉大了。经济繁荣的主要受益者除了企业家就是工人阶级，而农民的收益是最为边缘的，在萧条的冲击下，农村陷入了普遍贫困的境地。为了扩大政府支出创造就业，雇佣农村劳动力建设乡村亟需提上日程。"
 usa_deep_south_america: "深南部工程"
 usa_upper_south_america: "上南方工程"
 usa_centre_america: "中部工程"
 usa_centre_america_tt: "§Y加利福尼亚标准石油§!将与§Y德克萨斯公司§!合并为§Y加德士石油公司§!"
 remove_industrial_concern: "§R移除§!工业企业："
 international_fuel_carter: "跨国能源巨企"
 usa_caltex_corporation: "加德士公司"
 USA_Dust_Bowl: "黑色风暴"
 USA_Dust_Bowl_desc: "1930年代的干旱期，由于缺乏自然植被固定土壤，干旱使其转变为沙尘，向东和向南的大风卷起沙尘，形成巨大的深色云雾。情况严重时，云雾所到之处遮天蔽日，能抵达美国东海岸，例如纽约和华盛顿特区等地。多数沙尘抵达大西洋后才逐渐沉降、固定下来。这些巨大的沙尘暴被称为“Black Blizzards（黑色风暴）”。旷日持久的风暴不但危害国民的健康，并且对粮食安全构成了严重的威胁：在沙城暴最严重的三天，根据联邦政府的调查，接近一千万亩农田被摧毁，表面有至少5英寸厚的肥沃表层土壤被强风刮走，总计差不多有3.5亿吨，而同年冬小麦减产510多万吨。"
 USA_national_labouror_relationship_law_tt: "§Y$USA_works_progress_administration_during_depression$§!追加效果:\n$USA$的$usa_the_depression_progress$每月变化:§G-0.5%§!\n$MODIFIER_POLITICAL_POWER_COST$:§R-0.10%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$:§G+5%§!"
