 R_Fontaine.6.t: "一个幽灵"
 R_Fontaine.6.d: "克洛琳德站在走廊尽头，手里没有稿子。她不喜欢拿着稿子问话。那样显得像命令。\n\n她挑了几个议员。政见不同，却在同一座议院中议事。她不急着说“修宪”，先问近来的罢工、工厂、预算。对方回答得都很熟练，像背过。她再把话题轻轻往前推。\n“总统制。”她说。\n一瞬间，走廊里变安静。脚步声远了。旁边的窗子漏进风，风很硬。议员笑了笑，笑意很薄。\n\n“总理先生，”有人用一种过分客气的语气说，“我们已经见过太多次‘为了效率’了。”\n另一位更干脆。“共和国是议会的。”他说，“这是我们付过血的学费。”没人说“我支持”。没人敢。\n\n克洛琳德点头，记在心里。她不辩。她回到席位上，像把一把刀插回鞘。议会散会时，人群涌出大厅。有人和她握手，握得很短。有人绕开她，绕得很自然。每个人都像在保护某种古老的本能。她在回沫茫宫的车上看着窗外。街道平整，店铺亮着灯。车轮碾过路面，声音很规律。她忽然觉得这座城擅长把恐惧藏进礼貌里。她当然知道。第三共和国把国民议会捧到近乎专断的位置，原本就是为了拴住总统的手。怕复辟。怕一个人站得太高。怕那一顶看不见的冠冕忽然落回头上。"
 R_Fontaine.6.a: "依然有人在寻找被打翻的王冠。"
 R_Fontaine.6.tt: "§L时间不会改变现状...§!"

 R_Fontaine.7.t: "炉火"
 R_Fontaine.7.d: "“我没有信心。”芙宁娜终于说。那维莱特坐在一侧，文件整齐地叠着。车厢里很暗，他的面孔也显得干净。\n\n“信心不重要。”他说。“票才重要。”他把一份名单翻开。不是遇难者名单。是一串议员姓名。旁边有标注：工会关系、报纸背景、地方派系、宗教立场。像一张地图。\n“你不需要让所有人支持。”那维莱特说，“你只需要让一部分人愿意站出来。其余的人会沉默。沉默会像雪一样堆起来，最后压住反对。”\n芙宁娜盯着那张纸。“你想拉谁？”她问。那维莱特没有犹豫。“那些看《费加罗报》的绅士先生们。”他说，“民主联盟。共和联盟。更稳。他们害怕无政府。害怕工厂被占领。害怕街头。只要给他们一张保证书，他们会把手举起来。”\n\n芙宁娜的手指在膝上收紧。衣料被她攥出一道褶。“我不想。”她说。车灯扫过她的侧脸。那一瞬她看起来很年轻。像一场掌声刚停下来的空。\n“他们写过我。”她说，“写我像完美君主。写我只要戴上冠冕就能救他们。你要我跟这种人合作？”\n那维莱特看着她。没有讽刺，也没有劝她大度。\n\n“我害怕。”\n\n她没有解释怕什么。怕被塑成雕像。怕被推上台。怕被爱到无法下台。怕自己有一天顺着那条路真的走过去。车厢里沉了几秒。那维莱特合上名单。指尖在纸边轻轻一敲。“那就让那些喜欢走访工厂的活动家们坐进办公室吧。”他说。芙宁娜愣住。克洛琳德也看了他一眼。像确认这句话是不是听错。那维莱特继续说，语气平。\n\n“愿意进体制的。愿意签字的。愿意把罢工写进程序的。我们给他们座位，给他们一部分条款，让他们把自己的热情锁进法条里。锁住他们，也锁住街头。”\n“这听起来像在养火。”克洛琳德说。\n\n那维莱特点头。“火已经在外面。”他说，“不把它引进炉膛，它会烧屋顶。”芙宁娜看着窗外。夜色压在塞纳河上，河面反着一点光，像不肯熄灭的眼睛。她忽然想起右翼报纸那些词。圣女。君主。救赎。她厌恶。又无法摆脱。“至少左翼不会把我写成得很完美，也不能犯错。”她说。\n\n车停在沫茫宫门前。卫兵拉开车门，冷空气涌进来。芙宁娜站在台阶上，抬头看那扇门。门很重。像一条路。她没立刻进去。背后，克洛琳德低声说：“我去找人。”那维莱特没有回头。“去找愿意坐进炉膛的人。”他说。"
 R_Fontaine.7.a: "多添一些柴火吧。"

 R_Fontaine.8.t: "《共和国还是帝国？修宪承诺下的事实》"
 R_Fontaine.8.d: "《世界报》编辑部\n\n他们说，这只是一次技术性修订。他们说，行政效率需要更清晰的权责。他们说，总理会更好办事，议会也会更轻松。这种说法熟悉。每一次权力伸手，都会先用“整理”来命名自己。昨夜，枫丹联盟与人民阵线的代表在一间关着窗帘的会议室里交换了承诺。字句平稳，措辞谨慎。没有任何一句话写着“帝国”。也没有任何一句话写着“复辟”。纸面干净得过分。\n\n，然而，干净往往意味着遮蔽。据本报掌握的会议纪要与数位知情人士的描述，双方已就“修宪路线”达成原则一致。联盟希望以总统共和制取代现行议会共和制，人民阵线则以若干社会立法、劳动保障与政治参与作为交换条件。协议的语言看似温和，像一份可以在早晨咖啡旁阅读的公文。真正刺眼之处在于它的前提：共和国的骨架可以被重新拆装。第三共和国的制度并不完美。它时常把国家拖进无意义的争吵。我们理解这种不耐。我们也理解街头对“强力”的渴望。失业在增长，罢工在蔓延，欧洲的阴影正在加深。每个人都想快一点。\n快一点，常常意味着少一点。那么，我们为更快牺牲了什么？支持修宪的人喜欢谈“民意”。他们说，总统拥有直接的号召力，拥有更纯粹的合法性。可一个共和国最宝贵的特质，在于对权力的限制。把人性最危险的部分——对领袖的迷恋——完全杜绝。今日的枫丹，恰恰在做相反的事。我们看到的不是一个政党与另一个政党的联盟。我们看到的是两种恐惧的互相拥抱。枫丹联盟恐惧议会的缠斗，于是向个人魅力借力。人民阵线恐惧右翼的暴力，于是向国家机器靠近。二者都想用一份协议换取喘息。喘息的代价，是把共和国最宝贵的迟疑交出去。\n\n有人会说，芙宁娜总统并非独裁者。她温和，她动人，她在公开场合表现出对程序的尊重。我们不怀疑她的品性。但当权力被集中到一人的名义之下，善意会变成豁免，宽容会变成赦免，犹豫会被当作软弱。更令人不安的，是人民阵线在这份修宪承诺中扮演的角色。它原本以反法西斯为旗帜，以捍卫共和国为誓言。今日却愿意以共和国的骨架换取政策的短期推进。我们理解劳动立法的迫切，也理解基层生活的艰难。可一旦制度的闸门被拆下，再正当的目的都会被更粗暴的力量借用。\n\n我们不需要夸张的比喻。只需回望共和国建立之初，对总统权力的警惕从何而来。我们在此提出一个朴素的问题：若修宪通过，谁来保证它止于此处？谁来保证总统制不会在下一次危机中被进一步加码？谁来保证“暂时”的权力不会成为惯例？\n\n本报反对这场修宪交易。我们反对把共和国的命运押注在任何一人的魅力上。我们更反对，以“捍卫民主”的口号为一场制度退让背书。共和国还是帝国？这并非修辞。它是逼问。"
 R_Fontaine.8.a: "——于贝尔·伯夫-梅里，《世界报》总编辑。"

 R_Fontaine.9.t: "《人道报》编辑部"
 R_Fontaine.9.d: "《人道报》编辑部的灯亮得过分。煤气灯的光落在铅字盒上，像一层薄霜。纸张带着潮味，手指一摸就知道昨夜又下过雨。有人把《世界报》摊在桌上。头版的标题很硬。\n“他们说对了。”一位编辑说。没人笑。没人接话。只有印刷机深处的嗡鸣，像在咬着空气。“我们不能装作没看见。”另一个人说。他的袖口沾着油墨，洗不掉。像常年握着同一把刀。桌边有人点烟。火柴划过，短促的亮，随即熄灭。烟没点着。\n\n“写。”有人说，“跟进。把他们的‘修宪’掰开来看。把交易的价码写出来。让工会知道，让车间知道。”这时，门被推开。书记处的联络员走进来，帽檐压得很低，像不愿被认出。他把一张纸放在桌上，没有寒暄。“书记处的决定。”他说。纸很薄。字很少。——保持缄默。房间里像突然少了一口气。\n\n“缄默？”有人重复了一遍。声音很轻，像怕惊动什么。\n\n“当前形势复杂。”他说，“统一战线优先。不要制造裂缝。”有人笑了一下。笑声干燥。“裂缝早就在那里。”他说。联络员不争。“命令。”他说。命令这个词落下去，像一块铁。桌边的编辑们沉默着。有人把烟叼回嘴里，没点火。有人把《世界报》折起来，折得很整齐，像把一件脏东西收好。\n\n“我们是报纸。”有人终于开口，“我们写字。我们不写，别人就替我们写。”联络员看着他。“现在不写。”他说，“以后有机会。”“以后？”那位编辑把手指按在桌角，指节发白，“以后是他们的总统制。以后是他们的程序。以后连‘机会’两个字都要审批。”\n\n没人回应。沉默像水，慢慢涨上来。几分钟后，主编把那张纸收起。“执行。”他说。大多数人点头。点得很小。像把自己缩回椅子里。只有几个人没有动。其中一位年轻编辑站起来，把钢笔放在桌上。笔尖朝外，像最后的礼貌。\n\n“我不执行。”他说。他没有吵。没有骂。只是把党证从口袋里掏出来，放在那张命令旁边。红色的小册子在灯下显得很旧。第二个人也站起。“我们退党。”他说。他说“我们”的时候，声音抖了一下。像突然发现自己并不孤单。有人想劝。嘴张开又合上。劝告在这种时刻很廉价。比沉默更廉价。他们走到门口。推门。冷风灌进来。灯光晃了一下，像差点熄灭。门关上。室内恢复嗡鸣。印刷机仍在运转。主编坐回去，拿起稿纸。笔尖落下去，却迟迟写不出第一个字。"
 R_Fontaine.9.a: "“至少我们是做了一点事的，对吧？”"
 
 R_Fontaine.10.t: "表决日"
 R_Fontaine.10.d: "《世界报》前几天写得很用力。标题硬，段落密，街角也贴过几张传单，很快被新广告盖住。风吹过来，纸边卷起，不知何时会被刮走，变成无意义的废纸。\n\n克洛琳德从车里下来，正装很整齐。她抬头看了一眼穹顶，下面站着台阶旁的那维莱特，手里夹着一份薄薄的议程。\n\n“你真的确定吗？”克洛琳德问。她把声音压得很低。周围太多人。太多耳朵。她不喜欢把疑问交给回音。“我不确定。”她补了一句，“他们会投反对票，然后在晚餐时说自己尽了责。”\n“会。”他说。克洛琳德皱眉。“那你还——”那维莱特把议程纸翻了一页。纸发出轻响，像一枚很小的落子。\n“这不重要。”他说。克洛琳德的视线停在他脸上。她等他解释。那维莱特没有立刻开口。他让人群从两人之间流过去。议员们进场，鞋跟敲石板，声音一下一下，很干净。有人跟她点头。有人避开她。\n\n“你以为他们在乎议会共和制。”那维莱特说。他语气平，不像嘲讽，更像纠正一处常见的误差。“选民不在乎。”他说，“企业家也不在乎。”克洛琳德没说话。\n\n“他们在乎的是被保护。”那维莱特继续，“工资、订单、货运、存款。今天能不能照常开门，明天会不会有人砸窗。至于权力在哪一张桌子上流转，他们只在报纸上看一眼。”克洛琳德的手指碰了碰手套边缘，像在确认皮革还在。“可这是一条制度。”她说。\n\n“是。”那维莱特说，“所以它才会被拿来交易，铁腕能保证安全。他们会接受。甚至会感谢。只要铁腕看起来干净。”\n\n克洛琳德沉默。远处传来一点嘈杂，像有人在喊口号。声音被雾吞掉，剩下几段断裂的尾音。那维莱特把议程收回内袋，整了整衣领。动作很轻，像把某种情绪也一并折好。\n\n“走吧。”他说，“他们不在乎，我们就替他们在乎。”克洛琳德跟着他进门。门很重，合上时发出闷响，雾被关在门外。"
 R_Fontaine.10.a: "“时间快到了。”"

 R_fontaine_parliament.1004.t: "准备表决"
 R_fontaine_parliament.1004.d: "我们新的立法已经成功推进到表决阶段，只要在国民议会取得多数，新法就基本可以到达筹备实施阶段。一小时后，投票就会开始。"
 R_fontaine_parliament.1004.a: "举起你们的手来！"

 R_fontaine_parliament.1005.t: "法案通过"
 R_fontaine_parliament.1005.d: "我们正在表决的动议得到了通过，现在新法已经取得了宪法赋予的一切效力，可以立刻生效。"
 R_fontaine_parliament.1005.a: "很好。"

 R_fontaine_parliament.1006.t: "法案否决"
 R_fontaine_parliament.1006.d: "很遗憾，正在表决地动议未能取得多数，在国民议会被无情否决了。看来枫丹共和国的改革之路依然充满荆棘窒碍。"
 R_fontaine_parliament.1006.a: "悲哀。"

 R_fontaine_parliament.vanish.tt: "§g动议与表决情况将会从议会GUI中消失§!"
 R_Fontaine.8.tt: "§R人民阵线§!将会在表决时支持修宪"

 R_Fontaine.11.t: "预订总统"
 R_Fontaine.11.d: "七十五。百分之七十五，最新民调中，芙宁娜作为候选人的支持率最终落在这里。当那维莱特在办公室把这份繁杂冗长的报告念完时，芙宁娜默不作声，安静得她自己也感到意外。\n\n如果是在剧院，调查的是观众对芙宁娜戏剧的反馈，那么哪怕结果是九成九的喜爱，她也不会受宠若惊。被喜欢这件事，对她来说太熟了，熟得像灯光一亮就该有人鼓掌。可剧院的喜欢没有代价。它不改变舞台外的空气，不改变签字落下去的重量。政治不同。政治有决策，就要把责任一路背到底。也许一纸行政命令，过几年便会变成控辩双方共同指向的证据，像一把被擦得发亮的刀——那是一场谋杀的指控。\n\n一些在北部活动，以工人为基础的政党试图让这次选举中的工人阶级变得有组织。那维莱特这样向芙宁娜解释。芙宁娜对七十五这个数字并没有什么特别的感觉，因为在结合其他调查以后，这个在政治上高得不真实的支持率才能被揭开面纱。工会与工党，这些遍布全国的合法结社，比工人选民更清楚一张选票的意义。选民们听从党或者组织的安排投出废票，在暗中，这次选举从一开始就是被抵制的，成为纯粹的，中产阶级，农民与企业家们的狂欢。\n\n“真像一场闹剧。”芙宁娜无趣地把头转过去，报告摊在桌上乱成一团，显然对这件事情再也没有兴趣。闹剧？芙宁娜觉得有些可笑，自己不就是生于闹剧，并且成就于狂欢闹剧之中的吗？怎么会嘲笑一场本该严肃选举的荒诞？\n\n“总之，我会赢的，对吧？”她的声音很懒散，因为上一次茶点时间已经是三小时以前，没有咖啡与甜点的香气，她提不起对无聊政治的兴趣。"
 R_Fontaine.11.a: "“是的，你会赢。”"

 R_Fontaine.12.t: "休会"
 R_Fontaine.12.d: "议员们合上文件夹，椅脚摩擦地面，发出一阵短促刺耳的声响。有人伸懒腰，有人低头整理领带，宣布休会的槌音落下去，无边空洞，如同落鼓。克洛琳德站在席位边，迟了一拍才跟着人群起身。她忽然发现自己并不记得刚才那段程序性的致辞具体说了什么，只记得那些词在空气里排成队，走了一圈，便散了。过去她相信程序，认为表决的数字像武器一样可靠。可今天，数字轻如浮尘。\n\n她走出会场，穿过长廊。窗外的天色有些泛白，那是晨昏线正扫过巴黎的上空。波旁宫的石墙依旧坚硬，门把手依旧冰冷，守卫依旧站得笔直。制度的外壳没有任何变化。台阶很长，她一步一步走下去，靴底敲在石面上，声音干净。她突然意识到自己这些年一直在做同一件事：把信任放在宪法上，把良心放在条文之间，把所有不能被解释的恐惧都交给“程序”去消化。她迷信它。迷信到几乎不敢想象，没有它自己还能靠什么站稳。\n\n可宪法被改了。被改得如此随意。宪法没有经历鲜血淋漓的革命，只是几次会议，几次妥协，几份被签得很漂亮的文件，就被颠覆。她停在台阶中段，回头望了一眼波旁宫的穹顶。那穹顶像一只沉默的眼睛，俯视塞纳河，俯视巴黎，俯视每一个自以为在“参与历史”的人。\n\n她想到自己在会场里举手的那一刻，甚至手臂抬起时衣料的拉扯感还真实得仿佛刚刚经历。她当时在想什么？维持秩序？程序会保护所有人？她一直以为自己效忠的是共和国，也许效忠只是某种习惯，某种让她不用直面后果的习惯。台阶尽头有几位记者在等。有人喊她的名字，但克洛琳德没有停，也没有对镜头点头，只把帽子压得更低。\n\n远处的工地在敲打钢筋，节奏稳定。城市照常运转。她走到广场边缘，才发现自己手心微微出汗。明天宪法生效。真正的意思是：从明天开始，她将以新的方式服从。克洛琳德才反应过来这一点。她没有作为。她也不知道还能有什么作为。她想起之前自己眼中的自己——相信法律可以像剑一样笔直，以为只要握紧剑柄，就能让世界少一些混乱。\n\n今天，克洛琳德依旧带着佩剑，但她也不确定，剑是否真的可以像以前那样被拔出。"
 R_Fontaine.12.a: "明天照常。"

 R_Fontaine.13.t: "群像风暴"
 R_Fontaine.13.d: "沿着巴黎的暗巷一路都可以听见收音机嘈杂的报道，那是1936年总统直选正在汇报，响亮有力。记者们兴奋地在每一个投票点进行最持久的跟踪报道，期待着自己尽快收集出一片最新鲜最详尽的独家报道。这也是一个有合适理由集体外出的季节，每个人全力以赴，必须让工会与党的声音保持最大音量，否则所有的努力就将白费。就这样他们还唱着激昂又热切的号子，宛如威尔第的歌剧一般在大街上作劳动人民的合唱。尽管他们中的大部分并没有参与投票，但这并不打消他们的热情。\n\n“劳动万岁，工人阶级万岁，马克思列宁主义万岁！”夏洛蒂不知道如何用言语来描述这股劲儿，这里面带着心脏的拉扯，肌肉的撕裂，还有人们克服假性常识束缚，试图奔向一个全然不同社会时所表现出的不屈不挠的精神。伴随着无尽的劳役响起有节奏的呐喊：嘿，哟——嗨，哟。赤着脚，光着膀子，汗水顺着脸颊直流，这便是工厂中日复一日的劳动。歌声里渗透着痛苦的呻吟，绝望的叹息，撕心裂肺，惨绝人寰。这是灵魂在极度痛苦中的呐喊，只不过带着音乐的节奏罢了。\n\n歌剧的终章是对人性的终极哭诉。生活太难，太残酷，这是最后的绝望的反抗。那就是由劳动者谱写，嘶哑的歌。\n\n警察早早地成群结队驻守在投票点周围，提防着任何可能的暴力行为。尽管他们早就对这噪音般的大合唱不满，却没有行动的命令，于是只能一手挥着警棍，将脊背挺得笔直以显示威严。他们的提心吊胆持续了很多天，最后完成投票清点时才将临时警员遣散归家。合唱吓到了一些人，他们祈祷投票日的景象昙花一现，以后再也不会陷入如此混乱的境地。当然，也有人兴奋起来，期待政治运动成为常态。"
 R_Fontaine.13.a: "表演成为了一场真正的表演。"

 R_Fontaine.14.t: "就职"
 R_Fontaine.14.d: "芙宁娜把手放在誓词上时，指尖短暂地停顿了一下。她抬起头，望向镜头，望向广场，望向那一片由呼吸与期待组成的海潮。\n\n“枫丹的公民们——今天我在你们面前宣誓。这个誓言不为别的任何东西写就，它只献给你们，属于这个国家每一个仍在生活的人。过去几年，我们见过太多的散乱。争吵取代了治理，口号取代了面包。共和国最不缺声音，缺的是一只有力的手，把秩序变成可以被触摸的安全。从今天起，我会给枫丹一个更有力的政府。\n\n何为有力？有力并非专断，准确来说，它是一种公民处于困境中的有为。我们会改革。改革不是为了漂亮的词。改革要落在工资单上，落在工时表上，落在每一张餐桌上。劳动不是惩罚，劳动应当换来体面。我们会建立更清晰的劳动规则，保护罢工权，也保护那些只想安静过日子的人不被暴力拖走。\n\n我们会把公共服务从纸面上拽出来。教育不该是少数人的特权，医疗不该靠运气，住房不该成为一张把人压弯的账单。枫丹这片土地并不贫瘠，贫瘠的是我们彼此之间的责任感。国家存在的意义，就是让一个人的脆弱不必被当作羞耻。\n\n我们也会面对不平等。有人因为出生地、口音、信仰、肤色，被当作‘次等人’。这样的枫丹不配称为共和国。共和国的尊严，不在于它挂着什么旗帜，而在于它是否愿意承认：每一个人都拥有同样的权利——被保护、被尊重、被允许追求幸福。\n\n我知道，今天的掌声里有热爱，也有怀疑。我不要求你们立刻相信我。我只要求你们看着我——看我是否敢于把承诺写进法案，写进预算，写进执行的细节里。看我是否敢于在该得罪人的时候得罪人，在该承担的时候承担。你们愿意与我同行——感谢你们，而我将以实绩回报你们的信任。”\n\n随后掌声爆发。有人哭，有人笑，有人只是用力鼓掌。摄影机捕捉到她的微笑——那笑容依旧熟练，却不再完全属于表演。"
 R_Fontaine.14.a: "至少...我们开始了。"

 Ex_Soviet.2.t: "“父亲”之死"
 Ex_Soviet.2.d: "今天，一位父亲与世长辞。\n\n起初，他只是两个儿子，一个女儿与一位养子的父亲。后来因为机缘巧合，他被塑造成为全联盟，乃至整个共产世界的父亲。约瑟夫·维萨里奥诺维奇·斯大林，苏联部长会议主席，于1954年3月5日凌晨三点去世，享年74岁。医生给出的直接死因是高血压动脉粥样硬化导致的脑溢血。\n\n有人为此哭泣，有人为此高兴；但更多的人并不真正在意逝者，明天会怎样？这才是浮现于脑海中共同的疑问。或许有人早已开始行动，只是这位优柔寡断的老人死去以后，他们开始愈发明目张胆起来。"
 Ex_Soviet.2.a: "别了..."

 Ex_Soviet.3.t: "斯大林之死"
 Ex_Soviet.3.d: "在由于中风导致的昏迷于瘫痪中，钢铁之人未能从抢救中生还。1953年3月5日，斯大林病逝，终年74岁。\n\n依据官方说法，斯大林是因高血压动脉粥样硬化导致的脑溢血去世的。但也有人怀疑斯大林是被谋杀的。其中最主要的嫌疑人便是内务部首脑拉夫连科·贝利亚。他在斯大林生前便多次私下表达对他的不满，被认为具备最充足的动机于作案可能。\n\n斯大林去世后，其遗体被保存在莫斯科红场的列宁墓中，供人瞻仰。马林科夫在斯大林死后成为中央书记处排名第一的书记，但实权依然被贝利亚所掌握。许多人认为，一场公开的权力斗争即将在贝利亚集团与马林科夫集团之间上演。"
 Ex_Soviet.3.a: "苏联人民，世界人民会永远记得你..."
 Ex_Soviet.3.b: "死得好，老畜生。"
 Ex_Soviet.3.c: "他令人敬畏，但无法挑战死神。"

 Ex_Soviet.4.t: "喘息之机？"
 Ex_Soviet.4.d: "理论界并不存在什么所谓的“斯大林主义”，实际上，即便斯大林本人也不承认这个概念。他在掌权的三十年间的举措，究其本质，是应对法西斯与资本主义世界围攻威胁，对列宁主义所做的一系列发展。\n\n而现在，支撑斯大林先前做法的外部条件已经不再成立——德国被世界大战打得四分五裂，法西斯从这个世界上消失，而资本主义国家在战争中元气大伤，暂时无力进攻苏联。反观苏联国内，乌克兰等西部富饶沃土，在德国纳粹所谓“东方总计划”等一些列惨无人道的压迫下遭到极大破坏，而在未被战火直接波及的后方，人民也被严重透支。一个显而易见的事实摆在眼前——苏联需要休息，苏联人民需要休息。\n\n我们可以把这几年我国政策的变化看作是战时共产主义的再现，而如何恢复，在历史上也曾有过先例可以参考——新经济政策，一个被列宁暂时采用的策略，今天被贝利亚视作应该被重新拾起的法宝。总得来说，贝利亚认为应该有限开放市场，调整工业结构，重提党内民主，缓和民族政策，给予人民更多的行动自由。这是否会动摇社会主义的本质？我们不得而知。但党内的老同志对这些主张兴趣寥寥。"
 Ex_Soviet.4.a: "他忘记大清洗是怎么来的了？"
 Ex_Soviet.4.b: "我们反对教条化列宁主义，必须适应新的形势。"
 Ex_Soviet.4.a.tt: "作为§R马林科夫-赫鲁晓夫-莫洛托夫集团§!继续游戏。"
 Ex_Soviet.4.b.tt: "作为§R贝利亚集团§!继续游戏。"

 Ex_Soviet.5.t: "狗屁理论"
 Ex_Soviet.5.d: "大多数资历较深的党员都经历过那个贝利亚口中的“美好年代”，新经济政策实施时期，农业和轻工业的快速恢复和进步是不争的事实。然而，新经济政策的实行同样让苏联社会中滋生出了大量的“耐普曼”和新富农，这两个作为新资产阶级的群体日渐不满于新经济政策，要求布尔什维克在经济问题上继续“后退”；在没有“得逞”的情况下，新资产阶级开始使用消极抵抗的方法对抗国家管控的经济运作，因不满粮价过低而囤积粮食拒绝出售，最终导致了1927年苏联全国范围内的粮食收购危机。\n\n新经济政策还严重腐化了党的队伍。国内的官商勾结腐败现象达到了惊人的程度，在1921年发生了贪污受贿大规模地蔓延的现象，在1921-25年的大力管控下腐败现象虽然有所收敛，但到1926-1928年又出现大规模回弹。并且这种腐败还蔓延到了军队之中，红军武备废弛，组织低下，毫无战斗力。\n\n为了整治这些乱象，苏联经历了漫长又痛苦的大清洗，以及代价高昂的沙波什尼科夫整军计划。贝利亚当然经历过这些，可现在他又接着“恢复”的幌子重提这一计划，就很难用“愚蠢”来形容了。我们必须作最坏的打算，假设他就是处心积虑地准备发动政变，颠覆社会主义，然后在他开始行动之前立刻击败他。\n\n反对贝利亚的阴谋并不意味着我们抵制调整，我们只反对历史的倒退。"
 Ex_Soviet.5.a: "立刻联系朱可夫！"
 Ex_Soviet.5.a.tt: "在莫斯科附近主张的§R朱可夫集团军§!将随时发动针对§R贝利亚§!的§R反政变§!。"

 Ex_Soviet.6.t: "清算"
 Ex_Soviet.6.d: "按照马林科夫他们的想法，这套难以持续的斯大林体制将被不计代价地永远延续下去，苏联从来不应该是一个高压统治的地方，社会主义之下一样需要自由与灵活。如果那些老顽固不肯接受这一点，那么内务部的特工们会强迫他们接受。\n\n苏联国家安全部并入苏联内务部以后，贝利亚的力量得到了极大强化，现在两个部门的力量得到了更好的组织，并且完全由贝利亚一人掌控。他完全具备在一小时逮捕马林科夫，莫洛托夫这群老顽固的能力，只不过这样做得太难看，必须先在舆论上造势，表明他们不顺应时代，是教条化了列宁主义，这样政变才会得到普遍的拥护。"
 Ex_Soviet.6.a: "准备接受清算吧，老东西。"
 Ex_Soviet.6.a.tt: "§R内务部§!永远是最强大的靠山。"

 Ex_Soviet.7.t: "倾巢出动"
 Ex_Soviet.7.d: "凌晨三点，莫斯科秩序井然。灯光照常，电车照常，岗哨照常，只有巡逻的脚步变得更急这一点而已。内务部的电话总机从半小时前开始更换值班员。党务机关的门岗换上了“临时证件”。广播电台的编辑被请去“开会”，会议室里只有一张纸：明天的头条必须写成什么样。火车站的调度员接到命令，把一趟趟列车的时刻表调成只有上级看得懂的样子。行动的名字很体面，叫“肃清破坏分子”。行动的内容更朴素：抓人。\n\n马林科夫的办公室电话响了三次，每一次都像某种讽刺：线路畅通，但没人说话。莫洛托夫试图联系军区，接通的却是一个陌生的女声，礼貌得像在背诵说明书：“同志，您拨打的号码暂时无法接通，请保持冷静并等待进一步指示。”赫鲁晓夫站在窗前看街道。车流不多，警灯倒是比平时亮得多。他们终于意识到一个简单事实：政变真的到来了，而且比想象得更快。\n\n有人提议立刻向群众呼吁，组织工人纠察队。有人提出动用中央警卫团。有人冷笑：纠察队会被当作“反革命武装”，中央警卫团的指挥官此刻恐怕正在签字。唯一还没被切断的，是莫斯科城外的军用线路。那条线通向朱可夫。问题是：你把朱可夫请进城，是请他救火，还是请他来接管废墟？"
 Ex_Soviet.7.a: "管他娘的，马上让朱可夫过来！"
 Ex_Soviet.7.b: "电话还没有打出，办公室的大门便被一脚踢开。"

 Ex_Soviet.8.t: "不体面的反转"
 Ex_Soviet.8.d: "朱可夫讨厌阴谋论，因为阴谋论会把人变得懒惰。真正的威胁从来不是“神秘组织”，而是文件、命令、印章，和那些愿意在任何命令上签字的人。他在地图上看见莫斯科像一颗被掐住的心脏：电台、邮电总局、党校、铁路枢纽，几个点被轻轻一按，就足够让城市窒息。参谋问他是否要先联系贝利亚。朱可夫没有立刻回答。他想起战争年代，内务部代表坐在后方帐篷里，拿着名单，像拿着刀。\n\n车队在黎明前出发。道路上有内务部设立的路障，士兵举着证件要求检查。朱可夫从车窗里看出去，眼神像一把锈了但仍然能割人的铁。\n\n“滚。”他对司机说，“告诉他们，我们是来检查他们的。”\n\n值班军官的手指已经麻木，他不再问“罪名是什么”，只问“人数是多少”。城外，坦克履带碾过结冰的泥土，声音低沉得像某种不耐烦的咳嗽。朱可夫的前锋靠近莫斯科外圈时，遇到第一道路障。内务部的士兵紧张得像刚学会开枪的孩子，枪口抖得不像在指着敌人。有人喊：“停止前进！以苏联内务人民委员部的名义！”朱可夫的军官回答：“以苏联的名义。”这个对话短得可笑，却像一把楔子插进了体制的裂缝：到底谁代表苏联？是拿着名单的人，还是拿着枪的人？城市开始有了真正的声音：远处传来零星枪响，莫斯科醒了。\n\n到了中午，人们已经分不清自己听到的是公告还是谣言。每一条消息都带着‘权威来源’，每一个权威来源都带着枪。贝利亚的广播稿写得很工整：‘一小撮阴谋家妄图破坏社会主义法制。内务部已采取必要措施。’他甚至贴心地加了一句：‘请市民保持正常生活秩序。’\n\n朱可夫的通告则更像前线口吻：‘莫斯科被犯罪集团绑架。红军正在恢复秩序。’工厂的喇叭里同时播放两种声音。街头的告示被撕了又贴，贴了又撕。有人在排队买面包时说：‘反正最后都是一样的。’\n\n这句话很危险。如果人民真的相信“最后都一样”，那么他们为此互相屠杀的理由就只剩下一个：权力本身。"
 Ex_Soviet.8.a: "真正的强权被调动起来以后，连特务都显得苍白无力。"

 Ex_Soviet.9.t: "权力的滋味"
 Ex_Soviet.9.d: "完美，毫无破绽的行动对于训练有素的特工来说，是艺术品。以往，贝利亚尽管看起来手握生杀大权，但终究只是刽子手，真正的意志在于斯大林。现在那老东西死了，党内的老资历，现在正被羁押在监狱中。而大部分市民对此并不知情，生产生活还在继续，对于贝利亚来说，他已经完成一件国家尺度上的艺术品。\n\n决定如何处置旧日的高高在上者的权力，是政变丰厚回报中的一环，也许他们会被秘密处决，也许会保住姓名，流放到边疆做一个边缘机构的小官僚——至少现在还不急着处理这些，毕竟，他有足够的时间。"
 Ex_Soviet.9.a: "赢家通吃。"

 R_Fontaine.15.t: "一个惨不忍睹的提案"
 R_Fontaine.15.d: "数字摆在桌上时，房间忽然安静下来。那是一张很普通的表格，投票意向被分成几栏：赞成、反对、弃权。颜色很淡，态度却极其鲜明。左翼多半摇头，右翼几乎全线拒绝，中间派像被吓了一跳，躲得比谁都远。\n\n“可这是劳动法。”芙宁娜说。她把那张纸抽近一些，皱了皱眉，仿佛换个角度数字就会稍微好看一点。几天前她还在广播里谈过这部修正案，说得真诚，说得动情。她提到工人凌晨的通勤，提到加班时冷掉的晚餐，提到那些被压缩到脚注里的生命。麦克风前的掌声如潮水，她以为国民议会也会被同样的浪头推一推。结果什么都没有。\n\n那维莱特站在窗边，手里握着另一份报告。那是议员们的私下反馈，比表决意向更冷淡。“反对”写满了各自的理由。“你很关心国民，”那维莱特终于开口，“但证明此举的收益大过成本，才能得到议员的赞成。”\n\n芙宁娜没反驳。她把笔在指间转了一圈，又停住。纸上的字看起来有些花，她甚至分不清哪一列属于谁。沉默了一会。她想起自己承诺过的“更体面的劳动生活”，那时她相信只要意愿够真诚，就可以感动冷冰冰的制度。\n\n“我们需要调查。”那维莱特没等芙宁娜开口问，便将他的方案徐徐道来，“把每个行业的实际负担算出来。给出几套方案，让议员看到这不是道德审判，而是一个真正值得讨论的公共议题。”"
 R_Fontaine.15.a: "麻烦，但总归有人得做。"

 R_Fontaine.16.t: "国民议会的怪物"
 R_Fontaine.16.d: "主题是“性权”，但娜维娅谈论的是女工的夜班，怀孕后被悄悄挪走的岗位，法律如何把人的身体当作家族与国家的附属物。她把这些写进经济改革的框架里，不加煽情，像在做账。工资、税收、公共卫生、人口流动。每一个词都干净，对她来说，性的议题如同工资，移民一样，是再合适不过的公共议题。\n\n发言进行到一半，右侧议席有人发出一声短促的笑。那笑声不响，却让人精准的感受到不屑。娜维娅没有停。娜维娅继续念下去，声音稳得像在向委员会提交预算。笑声又响了一次，随后是椅脚摩擦地板的尖响。有人站了起来。\n\n“卡斯帕小姐，”他拖长语气，“议会在讨论国家，不是讨论你那点癖好。”几声压低的窃笑在席间滚动。娜维娅抬起眼，看向那张脸。那是常年在社交场里被酒气与自信喂出来的脸，红润，饱满，带着一种理所应当的轻蔑。\n“性权与劳动权从来绑在一起。”娜维娅继续，“一个人连自己的身体都无法作主，就谈不上自由，也谈不上消费......”\n“听听，听听。”他打断她，声音忽然拔高，“这位大小姐要教我们自由。”他越说越快，“你这种两头吃的婊子，也配在这里谈道德？别他妈的装清高了，双性恋。你就是靠床上的那点本事混进议会的婊子。你要的改革，就是让全国都跟着你发情。”\n\n议场里先是静了一瞬。静得能听见有人吸气，能听见纸张在指间轻微颤动。随后是更杂乱的声音，有人拍桌子，有人骂回去，有人发出“嘘”，像在剧院里对着不合时宜的笑料。娜维娅的手指慢慢收紧。拳头握得太用力，指节发白。娜维娅没有后退。娜维娅盯着他，眼神不像在辩论，像在判断：这一拳打出去，会留下些什么。\n\n议长席上传来敲槌声。那维莱特的声音很低，压过了所有人的窃笑。\n\n“收回。”\n\n那维莱特没有多余的修辞。命令像石头落地。\n\n他没有停，反而笑得更兴奋，“怎么，议长大人也怕听真话？她这种下贱货色，你们还把她当什么？”\n\n那维莱特站了起来。那一刻，议场里很多人终于想起，这座建筑里不只有语言。警察从侧门进入，他还在骂，骂得更脏，骂得更急，直到有人抓住他的手臂，把他从席位里拽出来。他挣扎，衣领被扯歪，声音被走廊吞掉，最后只剩远处一声门响。\n\n会场里安静了一阵，直到记录员发出一声怯生生的疑问。“这一段要写进记录吗？”他写字的手正在颤抖着，笔墨在写到一半的笔记上泼洒开来，这本书册已经作废了。"
 R_Fontaine.16.a: "“写吧，发生过的事情没什么可隐瞒的。”"

 R_Fontaine.17.t: "安道尔新任大公——芙宁娜·德·枫丹"
 R_Fontaine.17.d: "安道尔清晨的光线落在山谷里，洁白如同被雪磨过一遍。车队从坡道缓缓下行，松树的影子贴在车窗上，随着弯道一截一截滑过去。芙宁娜靠着座椅，指尖在手套边缘来回摩挲，心里却没有半分“国事”的重量。\n\n加冕听上去很庄严，实际流程短得近乎敷衍。礼仪官念了一串古老称号，修士的祝词带着口音，像从石壁里渗出来。芙宁娜按要求站定，按要求抬手，按要求微笑。她清楚摄影机要什么角度，清楚报纸明天要什么标题。几分钟里，芙宁娜被套上“安道尔大公”的名号，像把一枚轻飘飘的徽章别在胸前，别上去，便算完成。\n\n真正让芙宁娜活过来的，是仪式结束后那段空白。山谷里风很冷，却干净，呼吸时鼻腔发酸。她几乎没听礼宾官在说什么，只盯着远处的雪线看，白得刺眼，像一块还没写过字的纸。她问随行的人哪里可以喝下午茶，语气快得像在抢时间。有人说镇子里有家小咖啡馆，壁炉烧得很旺，甜点是本地人做的。芙宁娜点头，对她来说，这更接近行程真正的意义。\n\n咖啡馆不大，桌面有磨损的痕迹，杯子边缘带着细小缺口。芙宁娜把围巾松开一点，热气从杯口升起，带着奶油与焦糖的气味。窗外的雪在阳光下泛着冷光，屋里却暖得让人想发呆。她一边吃点心，一边把目光放得很远，像是在练习一种久违的懒散。随从递来文件，她没接，只说回去再看。那句话说得很自然，仿佛“回去”是一件不急的事。\n\n她走出咖啡馆时，脚步明显轻快了些。路边有人租雪具，木牌写着价格，雪橇靠在墙角。芙宁娜停下来看了一会儿，忽然转过身，兴冲冲地问：“我能去滑一趟吗？”\n\n随行人员的表情没有变化，像把一扇门轻轻关上。\n\n“总统阁下，巴黎还需要您。”\n\n那句话很平静，没有责备，却比任何命令都有效。芙宁娜站在原地，手指在袖口捏了捏，像捏住一小团不肯散的情绪。她又看了一眼雪坡，眼神里有一点不甘心，像孩子被提前叫回家。\n\n“行吧。”她说。\n\n返程的车窗外，山谷的光线慢慢退远。芙宁娜把额头贴在玻璃上，留下一点温度，又很快被冷意带走。她想起刚才那杯热茶，想起壁炉旁的木桌，想起雪面上那片空白。那种空白让人心里发痒。\n\n车队驶向平原，路边的景色渐渐变得熟悉。芙宁娜坐直身子，把手套重新拉好，像把刚刚偷来的短暂自由塞回口袋。而巴黎，在前方等着。"
 R_Fontaine.17.a: "也许我们可以设立一个滑雪节什么的。"

 R_Fontaine.18.t: "劳动法的回报"
 R_Fontaine.18.d: "人们常说政治是一门妥协的艺术，但有时候，坚持到底也有其美妙之处；比如这份我们尽全力通过的《<劳动法>1936年修正案》就为我们带来了丰厚的回报。得益于该修正案中提及的诸多条款，下一步经济改革的推进速度显著提升。\n\n即使没有进一步的措施，商品长期滞销，正为商店无人问津而发愁的店主们，惊喜地发现顾客慢慢多了起来。众多第一批领到提高工资的消费者们兴冲冲地前往商业街收获他们劳动的回报。用经济学的术语来说，消费市场正在缓慢而有力地复苏。"
 R_Fontaine.18.a: "不再妥协！"

 france.35.t: "战争时期的安道尔"
 france.35.d: "安道尔早已宣称其为永久中立国家，绝不再参与世界上的任何战争。但在[FRA.GetName]与[SPR.GetName]爆发战争以后，作为战略要地的安道尔地位就显得尴尬起来。为了防止[FRA.GetName]直接入侵，安道尔大公已经决定给予我国军事通行权，前提是我们尊重它的独立。"
 france.35.a: "没问题。"
 france.35.b: "不行，我们必须保障这一地区的安全。"





 