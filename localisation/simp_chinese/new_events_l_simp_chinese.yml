 japan_america_convention.1.t: "[ROOT.GetLeader]抵达安克雷奇"
 japan_america_convention.1.d: "若是没有充足的资源，国家持续作战行动完全无法持续下去。在包括钢，铝，橡胶等紧缺的各种资源中，石油是最为致命的一类。本岛几乎不存在石油之产出，而大洋彼岸的美利坚合众国却是世界上最大的产油国，南亚荷兰皇家壳牌掌控下的油田也可以提供急需的燃油。为此，军部制定了一个相当激进的作战方案，旨在通过武力控制南亚英美帝国主义掌控下的一切资源。\n\n无论如何，在被大陆战事拖累的情况下直面英美列强，毫无疑问大大超出了日本国力之所能及。内阁因而依然在军部的压力下尝试和平通过对美贸易获得资源。太平洋安全一直是美国相当关注的问题，安克雷奇会议在两方的撮合下成为两位国家领导人的最高级别会谈。临近极圈的安克雷奇是座小城，太平洋的海风寒彻刺骨，沁入骨髓，在这里举行国际会议似乎是一个奇怪的传统。无论如何，本岛一亿国民的命运似乎就系于这座小城。"
 japan_america_convention.1.a: "神明保佑。"
 japan_america_convention.2.t: "友好的进展？"
 japan_america_convention.2.d: "一改近几个月美国不断强硬的态度，安克雷奇会议上美国的态度出人意料地友好。科德尔·赫尔，美国国务卿，相当乐于与[ROOT.GetLeader]进一步沟通。考虑到国际局势，德国侵苏算是国际社会上的大事件。这样突如其来的重大变故似乎让罗斯福政府焦头烂额，注意力更多聚焦在欧洲战事上。至于太平洋以及中国地区地利益，相比较而言就不值一提了。因而赫尔相当希望美国尽快从太平洋事务中抽身，中国的利益也作为可以牺牲的筹码。"
 japan_america_convention.2.a: "抓住机会！"
 japan_america_convention.3.t: "日美谅解案"
 japan_america_convention.3.d: "在这样友好的氛围中，谈判推进得相当顺利。赫尔给出了堪称优厚的条件：\n\n1，美国承认满洲国及蒙疆。\n2，美国解除对日禁运，日本可以在不诉诸武力的情况下，和平通过贸易获取战略资源。\n3，南京政府与重庆政府进行合并，日本从满洲以外的大陆地区撤军。\n4，中国地区的门户开放政策必须得到维护，日本需要保障各公共租界的安全。\n5，日本退出德意日三国轴心。\n\n内阁方面早就有意从中国撤军，苦于难以收场，无法保全颜面，《日美谅解案》算是一个结束战事的体面方式。至于三国轴心，日本国内早有人怀疑德意两国持续作战之能力。德意两国兵锋虽看似势不可挡，一度横扫欧陆，然而战略资源着实缺乏。击败具备美国支持的苏联，概率十中尚可存一。击败英美同盟，概率更是万中无一，三国轴心是安全保障还是无法脱身的泥潭，着实值得怀疑。总体上来说，[ROOT.GetLeader]对会谈的成果相当满意，只要通过国会程序，法案便可立即生效。"
 japan_america_convention.3.a: "战争终于有结束的迹象了。"

 japan_america_convention.4.t: "陆军部反对！"
 japan_america_convention.4.d: "日本的内阁体制给予了军部超乎寻常的权力。每当陆军对内阁的政策不满，便可以将陆相辞职，内阁倒台作为要挟，破碎文官就范。毫无疑问，《日美谅解案》是一个理智的决定。然而，并非全部官员都可以保持理智。陆相东条英机算是条约反对者中威胁最大者，他对从大陆撤军的要求及其不满，放弃四年以来的战果，是陆军难以接受的。对英美帝国主义妥协，更是无法饶恕的罪过。若是[ROOT.GetLeader]签署条约，那么他们眼里的[ROOT.GetLeader]便不再是首相，成了人人喊打的国贼。结局不止下台，更应该被军人横剖切腹，因为国贼是该被天诛的。"
 japan_america_convention.4.a: "......提交修正案"
 japan_america_convention.5.t: "松冈修正案"
 japan_america_convention.5.d: "按照陆军部的要求，《日美谅解案》不得不作以下修改：\n\n1，删除“不诉诸武力”等条款。\n2，美国应承认南京政府为中国合法政府\n3，日本不会从大陆撤军。"
 japan_america_convention.5.a: "美国人怎么可能同意？"
 japan_america_convention.6.t: "谈判破裂"
 japan_america_convention.6.d: "如同我们预想的一般，这种要求美国人连考虑都不会考虑，唯一的结果只能是被断然拒绝。不过陆军部也没指望过美国会批准这样疯狂的照会，新一轮战争准备甚至已经完成，对菲律宾等南洋诸岛的攻击将立刻开始。"
 japan_america_convention.6.a: "万事休矣..."

 japan_america_convention.7.t: "条约生效"
 japan_america_convention.7.d: "万幸，最容易横生事端的陆军部出奇安静，会谈没有遭受任何干预。《日美谅解案》得到了从近卫文麿一类的新贵到诸如西园寺公望等元老的一致赞同。在元老支持，陆军缄默的条件下，国会表决没有遭到任何阻力。\n\n那么中国呢？抗战的努力会全部白费吗？满洲会永远从中国分裂出去吗？这些都不是要考虑的事情。如若蒋中正政府拒绝停火，那么美国自然会站在我们这边。敢于抵抗到底，就要做好彻底败北的决心。"
 japan_america_convention.7.a: "和平...和平......"

 japan_america_convention.8.t: "日美密约？"
 japan_america_convention.8.d: "日本和美国似乎已经达成了协议，偷偷媾和，出卖了中国的利益。现在，我们孤立无援，将直面日本帝国的全力进攻，这样民族危亡的关头，究竟如何抉择？"
 japan_america_convention.8.a: "中国再也支撑不下去了，我们停战。"
 japan_america_convention.8.b: "抵抗到底，牺牲直至最后关头！"

 japan_america_convention.9.t: "重庆政府接受停战"
 japan_america_convention.9.d: "成功了，重庆政府已经决议不再继续战争。尽管共产党反对，指责蒋介石是出卖民族的叛徒，出卖中国人民利益的叛徒，然而什么言语都无法阻止南京政府与重庆政府合并的进程，正如十多年前的宁汉合流一般，汪蒋两人再度走到同一条道路上。中国派遣军在逐步撤退，少量驻军会维护占领区的秩序，他们再也不必在无休止的治安战中损耗精力。"
 japan_america_convention.9.a: "现在我们可以宣布战争胜利！"

 japan_america_convention.10.t: "重庆政府拒绝停战"
 japan_america_convention.10.d: "看起来，重庆政府中的主战派依旧占据上风。在相对愿意妥协的官员大量出走南京的情况下，与延安方面进行合并似乎成为可能。中国孤立无援，即使是国共冲突在这样的压力下都显得微不足道。虽然我们依然不得不在治安战中消耗精力，在群山或是密林中艰难推进，但优势始终站在我们这边。"
 japan_america_convention.10.a: "无礼，必须惩戒暴支！"

 japan.25.t: "南洋资源问题"
 japan.25.d: "我们终于取得了梦寐以求的南洋资源宝地。然而，占据了南洋的土地，不代表南洋的全部资源可以为国家所用，更不意味着这些宝贵的资源可以躲过帝国的潜艇，成功运回本岛让工厂开工。\n\n情况比预想的更加恶劣，东印度的油田储量丰富，然而开采全然依赖荷兰皇家壳牌公司。在这片土地被解放之前，帝国主义者早就将开采设备撤走，让这些油田陷入无法利用的尴尬境地。劳工也是个问题，尽管我们一直在持续不懈地进行泛亚主义宣传，当地人也不将我们视作解放者。财阀们争先恐后地涌入东南亚，不计代价地褫夺一切资源。军方的管理也堪称灾难，种植园中地奴隶劳动遍地可见，经验丰富的劳工大量出逃，投入当地的抗日武装。显然，南洋的资源几乎没有缓解帝国的短缺问题。"
 japan.25.a: "真可耻！"

 R_Fontaine.1.t: "国防部长提名"
 R_Fontaine.1.d: "总参谋部的陈腐保守使得军队愈发难以跟上战争发展的脚步。政府中的一些官员已经意识到了改革总参谋部，并且将有关于装甲应用的新概念引入军队的必要性，围绕新一任国防部长的提名，政府内部形成了两种清晰而相互竞争的构想。\n\n其一，以夏尔·戴高乐为代表。该方案认为，未来战争的决定性因素在于机动与突破能力，应当优先集中资源建设装甲部队与机械化兵团，通过统一编制、集中指挥与高强度训练，形成能够迅速投入战场的核心打击力量。支持者指出，这一方向有助于在短期内显著提升枫丹陆军的威慑力，也更符合工业基础与技术积累的现实条件。但反对意见认为，此方案在现阶段对后勤与整体协同的依赖过高，一旦体系尚未成熟，风险亦随之放大。\n\n其二，以亨利·吉罗为代表。该方案主张从根本入手，对陆军进行系统性改革，重点放在后勤体系、指挥链条与训练制度的重构上。其核心目标并非迅速塑造某一兵种优势，而是提高整体军队的可持续作战能力与组织弹性。支持者认为，这一路线更为稳健，能够减少对单一技术路线的依赖，并修复长期积累的结构性问题。但相应地，其成效显现缓慢，难以在短期内形成直观的军事成果。\n\n政府认为，两种方案并非简单的对立，而是对国家安全优先级的不同理解。最终人选的确定，将取决于枫丹在未来几年中对外部威胁的判断，以及对“快速成军”与“长期稳固”之间取舍的政治决断。"
 R_Fontaine.1.a: "任命夏尔·戴高乐"
 R_Fontaine.1.b: "任命亨利·吉罗"

 R_Fontaine.2.t: "$charles_de_gaulle$接受任命"
 R_Fontaine.2.d: "本报告旨在向政府说明一项简单而紧迫的判断：枫丹若仍以既有编制与既有节奏准备下一场战争，将无法在开战初期掌握主动权。现代战争的胜负，不再取决于前线堆积多少步兵，而取决于谁能更快集中力量、撕开缺口、迫使对方指挥体系崩溃。若枫丹希望以有限的人口与预算抵消周边强权的压力，必须以机动兵力作为核心。\n\n装甲作战是一种新的作战组织方式：将坦克、摩托化步兵、工兵、炮兵与通信单位编入统一的机动师，实行集中指挥与连续推进。其目的在于以速度与火力取代消耗，以突破与包围取代正面磨耗。装甲部队必须成建制投入，而非拆散分配。只有在同一指挥体系下，坦克才能获得道路、燃料、弹药、通信与火力支援，才能真正成为“会移动的决战力量”。\n\n为实现上述目标，本人提出以下建设设想:第一，建立若干支常备装甲师与机动师，形成可在数日内完成集结与出动的核心兵团，并以此为骨架扩展全国机动化力量。第二，建立统一的装甲兵训练与学说机构，集中培养指挥官与参谋，确保部队在演习中形成共同语言，避免各军种各自为战。第三，优先完善通信与工兵保障，使机动部队具备持续推进能力，而非在第一道河流、第一座桥梁、第一处燃料短缺前停滞。第四，建立一套专门面向装甲部队的补给体系，燃料与弹药的供应必须被视为作战的一部分。\n\n预算方面，本人不主张无限制扩军。相反，装甲兵建设的要义在于“集中”。政府应在未来三年内为装甲部队设立独立且稳定的专项预算，用于车辆采购、摩托化运输、无线电通信、工兵器材与训练场地。相较于分散投入到各军种的零星改良，本方案将把有限资金转化为可见的战斗力，并在战略上形成明确威慑。"
 R_Fontaine.2.a: "定不辱命。"

 R_Fontaine.3.t: "$henri_giraud$接受任命"
 R_Fontaine.3.d: "本报告基于近六个月对全国陆军部队的系统性检查与演训评估。所得结论并不复杂，却足够严峻：枫丹陆军当前的问题，并非集中于某一兵种或某一技术路线，而是存在于结构本身。若不先修复基础，任何局部强化都将难以形成可持续的战斗力。\n\n装备层面，检查结果显示，现役步兵部队中，约三分之一仍使用超过十五年的制式武器，后备部队比例更高。炮兵单位弹药储备不足，平均仅能支撑数日高强度作战；通信器材老旧，演习中出现多次指挥中断，命令依赖传令与临时协调完成。车辆与马匹混用的后勤体系在跨区机动中效率低下，补给延误成为常态。\n在训练层面，年度实弹训练与联合演训次数显著不足。多数部队的训练仍停留在分散科目，缺乏跨兵种协同。检查中发现，部分营连级单位在复杂地形演练时无法完成既定战术动作，主要原因并非士兵怯战，而是缺乏反复、系统的训练积累。\n至于人事与指挥，问题更为集中。征集兵员来源复杂，文化水平差异显著，基础军事素养不均。中层军官的能力断层尤为明显：部分军官长期脱离实战化训练，对现代指挥流程、通信协同与后勤组织缺乏经验，导致部队在压力情境下容易陷入各自为战的状态。检查中，多次出现命令层级混乱、责任归属不清的情况。\n\n基于上述事实，本人认为，当前阶段的首要任务并非押注某一“决定性兵种”，而是对陆军进行全面而系统的基础改革。其核心目标在于恢复组织能力，而非单纯追求技术突破。改革设想如下：\n第一，重整训练体系。以师、军为单位推行常态化联合演训，明确训练标准，减少形式性检阅，确保部队在复杂条件下仍能维持指挥与协同。\n第二，改革军官培养机制。强化中层军官的实务训练与考核，淘汰长期无法胜任指挥职责者，建立明确的晋升与淘汰制度。\n第三，优先整顿后勤与通信。统一补给流程，改善运输与仓储管理，使部队能够在连续行动中保持稳定供给。\n第四，循序更新装备。在确保维护与补给能力匹配的前提下，逐步替换老旧装备，避免“有器无用”的浪费。"
 R_Fontaine.3.a: "定不辱命。"

 R_Fontaine.4.t: "娜维娅报告：关于让机器再次转动"
 R_Fontaine.4.d: "阁下：\n\n近月来，工业产能闲置、社会需求收缩、失业与预期互相牵引，经济活动呈持续低迷之势。数字已反复呈报，此处不赘述。谨就可行之方，谨陈如次：\n一、关于分配与消费：当前消费疲弱，根源在于劳动收入份额下降与不确定性抬升。宜以法律与财政两端并行：首先确立最低工资与带薪休假时程，其次扩大失业保险与救助覆盖面，而对中低收入群体设定临时性所得抵扣再次之。上述措施以阶段实施为宜，并附明终止条款与评估节点。\n二、关于劳资协商机制：为避免对抗性动员再起，建议建立“价格—工资—就业”三方协商框架，纳入工会与工商团体代表，形成有时限之承诺：在工资提标、工时安排与岗位保全之间取平衡点。必要之处，可引入仲裁程序，保持秩序与可预期性。\n三、关于公共需求与信用支持：在民间投资观望之际，公共部门应先行。宜优先投向港口、水务、干线铁路、城市防洪等长期资产，并辅以小规模市政工程以快速吸纳就业。中小企业方面，设立短期信用担保与贴息额度，以雇用承诺与纳税记录为准入条件，既防空转，亦保周转。\n四、关于价格与民生物资：复苏初期，基础品易受情绪扰动。建议对粮食、煤炭与民用燃料设定临时价格带与配给红线，并成立物资调度处，职责限定为信息汇总与瓶颈处置，避免越位干预。\n五、关于金融与准公共部门：对高风险资产集中之银行，实施不良资产隔离与资本重组，交换治理席位与分红上限；对电力、自来水、铁路等自然垄断领域，按项目采用公有化或特许重签，服务连续性与成本透明为核心条款，写入契约，纳入常设审计。\n六、关于税制与动机：短期内对闲置的大额货币性资产及投机性收益加征附加税；对新增投资与新增雇佣设置临时抵免。方向在于引导资金进入生产与更新，不鼓励囤积。\n七、关于外部约束：外汇支付优先保障粮药等必需品；对短期资本流动设置温和闸门，防止复苏期外部冲击放大内部波动。贸易谈判以关键物资互保为先，暂缓非急迫项目。\n\n娜维娅·卡斯帕，呈报于沫茫宫。"
 R_Fontaine.4.a: "提交国民议会，我们必须立刻筹备立法拨款。"

 Modify_Extra.3.t: "披耶拍凤总理下台"
 Modify_Extra.3.d: "披耶拍凤政府因年度预算问题被迫辞职。议会推举銮披汶·颂堪陆军上校出任总理，这代表着元老派军人的地位被少壮派所取代。\n\n1932年，披耶拍凤与比里·帕侬荣等人民党人发动“六二四”政变，推翻君主专制，实行宪政，披耶玛诺巴功·尼蒂他达新政府成立后，任武装部队司令。披耶帕凤作为军事派系，在比里·帕侬荣的平民派系被保皇派镇压后，1933年6月10日与披耶颂·素拉德上校、披耶里提·阿卡内上校和拍巴萨·披他耶育中校称病辞职，暗中计划推翻玛诺总理的专制政府，6月20日四人领导发动了一场不流血的政变，驱逐了玛诺总理，次日组成披耶拍凤为首的新立宪政府。10月经过几周的战斗后，披耶拍凤镇压了保皇党人的军事叛乱，巩固了他的权力。\n\n虽然权力来得并不符合宪政程序，但披耶拍凤是一位清廉的总理。尽管担任许多要职，他依旧十分贫穷，并且为泰国的现代化作出许多贡献。"
 Modify_Extra.3.a: "銮披汶·颂堪会继承他的政治遗产。"

 Modify_Extra.4.t: "第二共和国"
 Modify_Extra.4.d: "失去苏台德对捷克斯洛伐克意味着什么？从数据上来说，捷克直接丧失了38%的领土与600万人口，要塞被兵不血刃地占领，战争引擎——斯柯达被无情剥离。自从与苏台德骨肉分离起，灭亡似乎已成定局。国内民众普遍质疑爱德华·贝奈斯总统无能，对外妥协，大规模的游行使得第一共和国崩溃，而在废墟上，新总统埃米尔·哈查艰难地建立了第二共和国。"
 Modify_Extra.4.a: "愿主怜悯捷克斯洛伐克..."

 R_Fontaine.5.t: "超级独裁"
 R_Fontaine.5.d: "那天傍晚，沫茫宫的灯比往常亮得更早。窗外的广场还在喧闹，旗帜没有收起，人群的声音隔着玻璃传进来，像持续不断的潮声。芙宁娜站在窗边，手扶着窗框，没有回头。那维莱特进来时没有寒暄。他把文件放在桌上，没有立刻打开。\n“你在听他们吗？”他问。芙宁娜点头。“他们还在喊我的名字。”\n\n“是的。”那维莱特说，“不是宪法的名字，不是议会的名字，是你的。”\n她沉默了一会儿，像是在等一句否定。没有等到。那维莱特走到她身旁，与她并肩站着。两人之间的距离很近，却没有触碰。\n“你觉得这是好事吗？”她问。“这是事实。”他说。\n\n他没有开始讲制度，也没有提条文。他指向窗外。“你看到的，不是支持某个政策的人。是需要一个方向的人。”“可我不能替代议会。”“议会已经替代不了任何人了。”芙宁娜转过身来，眉头皱起。“那是共和国。”那维莱特点头。“所以我才来找你。”\n他终于翻开文件。页面很干净，条文被划出边线，像已经走过一遍流程。“我们不绕过宪法，也不取消议会。只是...改变权力停留的地方。”\n她看着那几页纸，手指却没有伸过去。“这听起来很像——”“独裁。”那维莱特替她说完，“而且是合法的。”\n\n她的呼吸停顿了一下。“我知道，但...我真的不想。”那维莱特没有反驳。他的语气变得低了一点，像是在对朋友说话。“你已经站在那个位置上了，芙宁娜。”她摇头。“我可以拒绝。”\n“你拒绝，他们不会退回去。他们只会去找别的东西。”他没有说那个“别的东西”是什么。房间里却突然变得很安静。她低头看着地毯，声音很轻。“那我算什么？”“你是他们愿意接受命令的理由。”\n\n这句话落下时，她明显退了一步。\n“你在利用我。”\n“我在使用已经存在的东西。”那维莱特说，“区别只在于，你愿不愿意让它有边界。”\n\n她笑了一下，很短。“你真残忍。”\n芙宁娜闭上眼睛。她伸手，把那份文件拉到自己面前。"
 R_Fontaine.5.a: "……那就让我来承担。"

