l_simp_chinese: 
 SRC.1.t: "反对自由主义"
 SRC.1.d: "一九三七年九月七日\n我们主张积极的思想斗争，因为它是达到党内和革命团体内的团结使之利于战斗的武器。每个共产党员和革命分子，应该拿起这个武器。\n但是自由主义取消思想斗争，主张无原则的和平，结果是腐朽庸俗的作风发生，使党和革命团体的某些组织和某些个人在政治上腐化起来。\n自由主义有各种表现。因为是熟人、同乡、同学、知心朋友、亲爱者、老同事、老部下，明知不对，也不同他们作原则上的争论，任其下去，求得和平和亲热。或者轻描淡写地说一顿，不作彻底解决，保持一团和气。结果是有害于团体，也有害于个人。这是第一种。不负责任的背后批评，不是积极地向组织建议。当面不说，背后乱说；开会不说，会后乱说。心目中没有集体生活的原则，只有自由放任。这是第二种。事不关己，高高挂起；明知不对，少说为佳；明哲保身，但求无过。这是第三种。命令不服从，个人意见第一。只要组织照顾，不要组织纪律。这是第四种。不是为了团结，为了进步，为了把事情弄好，向不正确的意见斗争和争论，而是个人攻击，闹意气，泄私愤，图报复。这是第五种。听了不正确的议论也不争辩，甚至听了反革命分子的话也不报告，泰然处之，行若无事。这是第六种。见群众不宣传，不鼓动，不演说，不调查，不询问，不关心其痛痒，漠然置之，忘记了自己是一个共产党员，把一个共产党员混同于一个普通的老百姓。这是第七种。见损害群众利益的行为不愤恨，不劝告，不制止，不解释，听之任之。这是第八种。办事不认真，无一定计划，无一定方向，敷衍了事，得过且过，做一天和尚撞一天钟。这是第九种。自以为对革命有功，摆老资格，大事做不来，小事又不做，工作随便，学习松懈。这是第十种。自己错了，也已经懂得，又不想改正，自己对自己采取自由主义。这是第十一种。还可以举出一些。主要的有这十一种。所有这些，都是自由主义的表现。革命的集体组织中的自由主义是十分有害的。它是一种腐蚀剂，使团结涣散，关系松懈，工作消极，意见分歧。它使革命队伍失掉严密的组织和纪律，政策不能贯彻到底，党的组织和党所领导的群众发生隔离。这是一种严重的恶劣倾向。自由主义的来源，在于小资产阶级的自私自利性，以个人利益放在第一位，革命利益放在第二位，因此产生思想上、政治上、组织上的自由主义。自由主义者以抽象的教条看待马克思主义的原则。他们赞成马克思主义，但是不准备实行之，或不准备完全实行之，不准备拿马克思主义代替自己的自由主义。这些人，马克思主义是有的，自由主义也是有的，说的是马克思主义，行的是自由主义；对人是马克思主义，对己是自由主义。两样货色齐备，各有各的用处。这是一部分人的思想方法。自由主义是机会主义的一种表现，是和马克思主义根本冲突的。它是消极的东西，客观上起着援助敌人的作用，因此敌人是欢迎我们内部保存自由主义的。自由主义的性质如此，革命队伍中不应该保留它的地位。我们要用马克思主义的积极精神，克服消极的自由主义。一个共产党员，应该是襟怀坦白，忠实，积极，以革命利益为第一生命，以个人利益服从革命利益；无论何时何地，坚持正确的原则，同一切不正确的思想和行为作不疲倦的斗争，用以巩固党的集体生活，巩固党和群众的联系；关心党和群众比关心个人为重，关心他人比关心自己为重。这样才算得一个共产党员。一切忠诚，坦白，积极，正直的共产党员团结起来，反对一部分人的自由主义的倾向，使他们改变到正确的方面来。这是思想战线的任务之一。"
 SRC.1.a: "署名：毛泽东"
 French.1.t: "皮埃尔·赖伐尔辞职"
 French.1.d: "皮埃尔·赖伐尔总理因为绥靖意大利侵略埃塞俄比亚而备受指责，现在这届政府已经摇摇欲坠，因此皮埃尔·赖伐尔决定在政府垮台之前先行辞职。"
 French.1.a: "阿尔贝·萨罗会接替他"
 French.2.t: "1936年法国立法选举"
 French.2.d: "第三共和国在游行的工会，暴乱的右翼，逐渐走向法西斯道路的邻居中迎来了1936年的立法选举，可能赢得多数席位的是左翼联合的人民阵线，包括法国共产党，工人国际法国支部，以及激进党，而右翼的代表则是共和联盟。\n\n计票结束以后，人民给出了他们的选择:"
 French.2.a: "人民阵线以微弱优势胜出了!"
 French.2.b: "共和联盟赢得了大选!"
 French.3.t: "芙宁娜掌控了法国！"
 French.3.d: "戴着华贵的礼帽，游走于法国从上流的大剧院到乡村的小戏舍的新星，芙宁娜·德·枫丹，已经成为了法国当今无可置疑的顶流，凭借着美的有些不真实的外表，活泼可爱的性格，赢得了全体国民的喜爱。当有人问起这颗耀眼新星何处升起，她只会回答“枫丹”。\n\n枫丹，在法国，人们的理解只有一个——枫丹白露，这座环境优美，典雅的古建筑星罗棋布的市镇，的确很符合人们对于美人辈出之地的想象，但芙宁娜对于这个答案总会摇头，只能为此添上一抹神秘的色彩。\n\n现在，人们明白了，枫丹可不是枫丹白露这一小小的市镇，而是并不属于这个世界的强大国家。借助国民的爱戴，以及来自异世界的强大力量，芙宁娜在几乎没有反对声的情况下就任了法国总理，这在第三共和国历史上是绝无仅有的。"
 French.3.a: "哈哈，芙芙真可爱。"
 fra_fontaine: "枫丹审判庭"
 french_communism_party: "工人国际枫丹支部 - 枫丹人民联盟"
 French.4.t: "欧若拉的凯旋"
 French.4.d: "巴黎华贵的歌剧院，在金色的厅堂，衣着体面的的观众们之间演出的，永远是世界上最经典，最美妙，最能够体现观众高雅审美情操的戏剧，在乐章高潮中升起的，除了音调，仿佛还有听者的灵魂。\n\n但今天，巴黎大剧院却在毫无预兆的情况下出演了一回先前从未出现过的剧目，它的名字是——欧若拉的凯旋。令在场的所有观众不寒而栗。\n\n欧若拉，罗马神话中的黎明女神，所掌管的，是黎明到达地球的第一缕晨光。晨光，似乎是自然赠予人类的礼物，那剧目理应安宁祥和，充满希望，但它的主题是，法国大革命，在黑暗中照进的一缕晨光，唤起了巴黎红旗的海洋，一时，被红色浸染的街道上竟分不清是牺牲者的血，还是倒下的沾满牺牲者血的旗帜。如同一百五十年前那段歇斯底里的历史，观众似乎回到了雅各宾派统治的“恐怖时期”，冥冥之中，一个幽灵，一个罗伯斯庇尔的幽灵，似乎正在法兰西上空飘荡，不知何时降落人间，带去新的疯狂，激情与鲜血。"
 French.4.a: "不好的预兆......"
 French.5.t: "坐好，接受你的审判"
 French.5.d: "老实说，芙宁娜并不喜欢参与审判，即使她的工作通常也仅限于出面应酬，背后的实际工作，甚至是应酬场合中某些重要的发言，都由他人负责，她也总会因为需要装出一副严肃的样子，一动不动地坐在主审判官岩石般硬的凳子上几个小时而无聊。\n\n全国审判的工作量毫无疑问超出了以往任何一场大型审判，这是因为某些法兰西人的罪业太重，即使清水亦难以冲刷。但芙宁娜反而表现出了不合一贯作风的认真，一直半吊子的律法之女王似乎终于要履行她神圣的职责了。\n\n出自内心，深藏的责任感也许是一个主要的因素，但还要一个容易被忽视的小因素：手把手地将在另一个世界中对应自己祖国的国家，通过至高无上的审判，将其从黑暗混乱带向希望，这本身对于芙宁娜来说就是相当有意思的。\n\n芙宁娜看向自己的手表，已经到了时间，她清清嗓子，中气十足地对坐在受审席上的第一个罪人说:\n\n坐好，接受你的审判。"
 French.5.a: "「怎么样，现在应该没有拒绝的理由了吧？」"
 French.6.t: "政客"
 French.6.d: "皮埃尔·赖伐尔做梦也不会想到，有朝一日，自己这个昨日的政治家，会在今天坐上受审席上，被数万愤怒的市民所注视，被这位昨日她还看不起的演员，芙宁娜所义正言辞地审判。\n\n赖伐尔的想法代表了多数法国高级官员的想法，毕竟，一位明星的上台是不可被任何人预计的，现在，他们被多数冠以腐败，故意杀人甚至叛国的罪名，加以轻则有期徒刑，重则绞刑的诸多惩罚。\n\n唯一一个被执行绞刑的政要是时任法国驻西班牙大使的菲利普·贝当，如果是全国审判是一出戏剧，那这一幕可能是最出人意料的转折，因为德高望重的贝当元帅没有任何明显的罪名，担任副审判官的克洛琳德也因此强烈反对给贝当判刑，但一贯随和的芙宁娜却坚持判刑，原因是什么，或许永远不会有人知道了。"
 French.6.a: "神明大人这么做，一定有她的深意吧。"
 French.7.t: "老将军们"
 French.7.d: "老将军们不懂政治，不知道共和国的中央发生了如何剧烈的地震，但他们知道，现在他们要被革职了。\n\n几十年来，这些老将们，比如马克西姆·魏刚，或者是甘莫林，都在尽心尽力地保卫共和国的边疆，即使在大战结束以后，也鞠躬尽瘁地推动战后的军备重整，哪怕共和国为了挽救经济大规模裁剪军费，他们也从未对共和国有过怨言，为什么如今就因为“阻碍军队发展”而被革职，毫无荣誉地回家养老呢？\n\n“你们功劳很大，本庭不会剥夺你们所取得的任何军事荣誉，你们的名字会被刻在凯旋门上被传颂，你们死后的遗体会被葬在荣军院中，但，不要被你们的功劳压塌了脊背。你们看似尽心尽力，实则你们的傲慢正在杀死年轻的一代人，现在，停止这一切，请离开军队，带着你们的成就安度晚年吧。”克洛琳德解释道"
 French.7.a: "军人的荣誉从未消失"
 French.8.t: "审判闭幕"
 French.8.t: "审判的结束"
 French.8.d: "罪业已被清理干净，然而芙宁娜也明白终有一日罪业将会重新结成，再次危害这个国家，因此审判结束以后，改天换地的改革很快会开始。"
 French.8.a: "我希望看到澄澈的明天。"
 French.9.t: "工人，政客与企业家"
 French.9.d: "全阶级共同参与会议商讨国家经济事宜，上一次可能还是路易十六召开的那次三级会议，那次会议是封建贵族，新兴资产阶级与工农阶级的斗争，这次也大差不差，只是封建贵族早就出局了。\n\n工人们选出的代表们与法国最强大的企业家们展开了激烈的辩论，幸亏当时有军警在场，否则他们可能在国民议会的大厅里打起来。所有人都辩论累了以后，一直沉默不语，又掌握最终裁决权的芙宁娜的意见就尤为重要了。\n\n芙宁娜很少动用这种巨大的权力，她甚至在吵闹的会场里进入了昏昏沉沉的状态，克洛琳德唤醒她以后才意识到到了自己做主的时候，现在，芙宁娜的意见是......"
 French.9.a: "支持工人们"
 French.9.b: "支持企业家"
 French.10.t: "经济情况好转！"
 French.10.d: "在实施了一系列减税，缩减政府开支，贬值货币等措施以后，枫丹出现了难得的市场繁荣，人民纷纷把积蓄拿出来囤积商品，并且对外的出口也有所增加。幸亏，所有人明白这是暂时的经济效应，并非真正的经济增长，因此多数企业家选择了投资军事工业来保证利润。"
 French.10.a: "意想不到的好处！"
 French.11.t: "大陆巡游结束"
 French.11.d: "漫长的旅行终于走到了终点，在欧洲大陆各民主国家访问了一圈以后，克洛琳德代表枫丹签署了一系列共同防御协定，以保护彼此，共同应对法西斯威胁。当然，相比于沉默地工作的克洛琳德，天生的大明星芙宁娜受到了各国人民的共同喜爱，某种意义上极大改善了枫丹的国际形象。"
 French.11.a: "欢迎回家！"
 French.12.t: "比利时的要求" 
 French.12.d: "事实上，比利时一直都十分需要法国的保护，但近年来，延拓马奇诺防线的呼声在枫丹十分高涨，因此比利时有了被枫丹人抛弃的顾虑。\n\n比利时表示愿意与枫丹签署共同防御协定，但一切的前提是枫丹不得延拓马奇诺防线，并且在发生战争时，必须立刻进入比利时境内阻击德国军队的兵锋。"
 French.12.a: "完全可以接受的提案"
 French.12.b: "代价太大了"
 French.13.t: "捷克斯洛伐克的要求"
 French.13.d: "捷克斯洛伐克作为法国在中欧的传统盟友，完全愿意支持枫丹的结盟提议，但因为德国最近表现出了过于强大的侵略性，使捷克感受到了前所未有的国防压力，因此捷克斯洛伐克提出了附加要求，即受到入侵时，法国必须出兵攻击萨尔兰地区以牵制德军。"
 French.13.a: "这是当然，枫丹不会抛弃她任何一个盟友"
 French.14.t: "南斯拉夫的要求"
 French.14.d: "三十年代的南斯拉夫，蜗居在乡村，终日务农才能生存下去的赤贫农民，以及整日劳作没有休息的工人构成了这个国家的主体，这是芙宁娜在前往王宫时所看到的景象。但南斯拉夫的王宫却出人意料地华贵，而南斯拉夫摄政王，保罗亲王，对于结盟的唯一要求便是出于经济困难的经济援助，虽然整个代表团都对援助的去向有些怀疑，但出于战略上的考量，提案的决定还是值得商榷的。"
 French.14.a: "好吧"
 French.14.b: "为什么要给腐败的贵族输血呢"
 French.15.t: "西班牙的要求"
 French.15.d: "伊比利亚的酷热并未阻挡西班牙人民的热情，时任西班牙总理的弗朗西斯科·拉尔戈·卡巴雷罗一大早就顶着艳阳与高温来到机场迎接枫丹使团的到来。卡巴雷罗甚至表示这样的礼节甚至轻了些，因为光是以国家元首的身份，出访西班牙这样的战时国家就让他十分感动了。\n\n在卡巴雷罗的描述下，西班牙反法西斯战争的形势是严峻的，可能因为芙宁娜极具亲和力的形象，卡巴雷罗甚至吐露了更多心声，诉了更多苦，包括他对西班牙共和派的内斗如何失望，他对干扰战争的无政府主义民兵如何厌恶，等等，最后，他才提出了诉求:\n\n立刻对西班牙进行直接干涉，如果觉得这样过分了，输送更多武器，或者提供一定的志愿军，在内战胜利以后，便可以得到西班牙的全力支持。"
 French.15.a: "西班牙的反法西斯战争，也是枫丹的反法西斯战争"
 French.15.b: "你们需要的不是武器，你们需要的是团结，团结！"
 French.16.d: "罗马尼亚作为法国在巴尔干的传统盟友，完全愿意支持枫丹的结盟提议，但因为德国最近表现出了过于强大的侵略性，使罗马尼亚感受到了前所未有的国防压力，因此罗马尼亚提出了附加要求，即受到入侵时，法国必须出兵攻击萨尔兰地区以牵制德军。"
 French.16.t: "罗马尼亚的要求"
 French.16.a: "感觉不如让卡罗尔二世来尼斯免费度假"

 French.17.t: "德国反对我们的提案"
 French.17.d: "德国代表认为我们的提议过分了，因此行使了他的反对权，给这条提案投出了一票反对"
 French.17.a: "好吧"
 French.18.t: "德国赞成我们的提案"
 French.18.d: "德国代表认为我们的提案仍在可以容忍的范围内，因此投出了一票赞成。"
 French.18.a: "这才对嘛"

 French.19.t: "意大利反对我们的提案"
 French.19.d: "意大利代表认为我们的提议过分了，因此行使了他的反对权，给这条提案投出了一票反对"
 French.19.a: "好吧"
 French.20.t: "意大利赞成我们的提案"
 French.20.d: "意大利代表认为我们的提案仍在可以容忍的范围内，因此投出了一票赞成。"
 French.20.a: "这才对嘛"

 French.21.t: "英国反对我们的提案"
 French.21.d: "英国代表认为我们的提议过分了，因此行使了他的反对权，给这条提案投出了一票反对"
 French.21.a: "好吧"
 French.22.t: "英国赞成我们的提案"
 French.22.d: "英国代表认为我们的提案仍在可以容忍的范围内，因此投出了一票赞成。"
 French.22.a: "这才对嘛"

 French.23.t: "美国反对我们的提案"
 French.23.d: "美国代表认为我们的提议过分了，因此行使了他的反对权，给这条提案投出了一票反对"
 French.23.a: "好吧"
 French.24.t: "美国赞成我们的提案"
 French.24.d: "美国代表认为我们的提案仍在可以容忍的范围内，因此投出了一票赞成。"
 French.24.a: "这才对嘛"

 French.25.t: "苏联反对我们的提案"
 French.25.d: "苏联代表认为我们的提议过分了，因此行使了他的反对权，给这条提案投出了一票反对"
 French.25.a: "好吧"
 French.26.t: "苏联赞成我们的提案"
 French.26.d: "苏联代表认为我们的提案仍在可以容忍的范围内，因此投出了一票赞成。"
 French.26.a: "这才对嘛"

 French.27.t: "莱茵兰提案"
 French.27.d: "枫丹执意要收回莱茵兰，以恢复枫丹的自然边界"
 French.27.a: "反对"
 French.27.b: "支持"

 French.28.t: "莱茵兰提案被通过"
 French.28.d: "与会国多数支持我们得到莱茵兰的提案，这意味着莱茵兰归属于枫丹将很快在法理上得到确认，枫丹终于将自己的边界再度推到了莱茵河左岸。"
 French.28.a: "太棒了！"

 French.29.t: "莱茵兰提案被否决"
 French.29.d: "大部分国家出于战略上的考虑都否决了我们的莱茵兰提案，很遗憾，我们的守望莱茵之梦化作泡影了。"
 French.29.a: "好吧"

 French.30.t: "意大利殖民地独立提案"
 French.30.d: "枫丹要求意大利殖民地全部独立。"
 French.30.a: "反对"
 French.30.b: "支持"

 French.31.t: "提案被通过"
 French.31.d: "我们的提案得到了多数与会国的支持，因此顺利被表决通过了。"
 French.31.a: "很好"

 French.32.t: "提案被否决"
 French.32.d: "我们的提案似乎没有得到太多国家的支持，因此被无情地票死了。"
 French.32.a: "好吧"

 French.33.t: "德意志的命运"
 French.33.d: "普法战争的耻辱性大败，以及一战的惨重伤亡，让众多枫丹子民对德国人充满了仇恨，期待利用这次大胜弥补凡尔赛会议未竟的复仇，或者拆分为联邦，或者重建莱茵联邦，抑或是所要巨额的战争赔款。\n\n即使枫丹内阁认为维持现状，建立一个民主的德国政府已经是最好结果了，但民族主义的怒火也难以忽视。"
 French.33.a: "我们必须选择宽容"
 French.33.b: "一体化政策毁了德国，我们要逆一体化，把德国拆分成联邦"
 French.33.c: "建立莱茵联邦"

 start_voting: "开始表决......"

 French.34.t: "共产党还是国民党？"
 French.34.d: "报纸上报道的中国，是把它当作了一个整体的概念，真的要深究起来，那在这片被称为中国的范围内，可至少有两个宣称自己是中国唯一合法政府的政权，一个是定都南京的中国国民党政权，另一个则是躲在深山，密林中打游击战的共产党人。\n\n世界上的主流媒体对这两个政权的看法是这样的，国民党是合法的宪政民主政权，坐拥雄兵百万，而对于共产党的报道就很少了，据外界的推测，多半是一群一打就散的土匪，结了几个山寨当山大王的政权。但果真是如此吗？\n\n克洛琳德没有去过中国，芙宁娜更没去过，手上的信息少得可怜，因此内阁提出了看似理所应当的建议，为国民党提供支援，但保留芙宁娜的最终裁决权。"
 French.34.a: "我们先前对于苏联的想象已被证实谬误百出，那对于中国共产党的看法肯定也有失偏颇"
 French.34.b: "我甚至从来没听说过有什么中共外交官"

 French.35.t: "交换的筹码"
 French.35.d: "目前紧握在手的广州湾既可以作为与中国谈判的筹码，博取一些经济上的优惠，当然也可以以此促使中国同意我们的结盟策略，或是无条件归还，作为我们偿还罪业的一部分。"
 French.35.a: "要求用外汇购买广州湾"
 French.35.b: "要求以结盟承诺换取广州湾"
 French.35.c: "无条件赠与广州湾"
 French.36.t: "枫丹愿意以外汇交换广州湾"
 French.36.d: "现在，一个收复祖宗失地的机会摆在我们面前，只需一部分外汇便可收复广州湾，买的不仅是地，更是一部分的国家主权，也许意味着中国人民向着驱逐帝国主义又前进了一大步。"
 French.36.a: "混蛋，本来就是我们的土地，凭什么还要购买"
 French.36.b: "这可能是最好的机会了"
 French.37.t: "[FROM.GetnameDef]同意了"
 French.37.d: "我们从东方归来的代表团向我们带来了好消息，[FROM.GetnameDef]全盘接受了我们的条款，在他们的军队开进广州湾以后，当地乃至全国的普通百姓陷入了一阵狂喜，走上街头庆祝国家主权的收复，不过也有人批判与帝国主义交易是政府软弱的表现，感叹驱逐帝国主义的事业道阻且长。"
 French.37.a: "做得很好"
 French.38.t: "[FROM.GetnameDef]拒绝了"
 French.38.d: "谈判进展缓慢，中国的代表一再表示，迫于国内的压力，以及财政的困窘，无条件归还是他们可以接受的唯一结果，“中国的农民，很苦；军国主义的威胁，很严重。这笔钱本该用于应对这些的”，中国代表如是说。" 
 French.38.a: "就让给他们吧，没什么大不了的"
 French.38.b: "这已经是一笔亏本买卖了"
 French.39.t: "枫丹愿意无偿归还广州湾"
 French.39.d: "无论是在南京总统府的蒋介石，还是在延安窑洞的毛泽东，都对同一件事感到震惊：西方列强居然愿意主动归还我们的失地，广州湾了！\n\n虽然他们早就对枫丹这个国家，以及他们的领导人芙宁娜的特别有所耳闻，但如此巨大的让步是谁也没想到的，两位意识形态截然不同的领导人给出了同一句评语：真是稀奇。"
 French.39.a: "但这也是主权收复的光荣时刻！"
 French.40.t: "枫丹要求我们就广州湾问题再三考虑"
 French.40.d: "枫丹似乎执意要从广州湾上捞点好处，当然这也没什么实质性的威胁。"
 French.40.a: "这个提案倒也还行"
 French.40.b: "直接派兵进入广州湾！"
 French.41.t: "[FROM.GetnameDef]入侵了广州湾"
 French.41.d: "没人能料到中国的行事会如此莽撞，我们的外交官被驱逐，中国的军队开进了没有驻军的广州湾，克洛琳德对这帮中国人的粗鲁十分震惊。\n虽然本着偿还罪业的精神，我们本不该索取什么，但是中国的行动实在是切切实实地给我们来个一个重重的掌掴，似乎要让世界都嘲笑我们，枫丹已经弱小到连积贫积弱的中国都可以采取强硬行动了。"
 French.41.a: "是啊，我们本不该索取什么，这只是我们的咎由自取"
 French.41.b: "但是脸不能丢，禁运！"
 French.41.c: "也许我们可以转而支持他们的对手"
 French.42.t: "枫丹希望以结盟承诺换取广州湾"
 French.42.d: "天降一个特大的好消息，枫丹居然提出了一份结盟换广州湾的提案，毫无疑问，这可能是近代史上中国与列强们可以签署的最好条约，这不但可以收复我国主权，还可以获得一个来自西方的强大盟友！不过当然也有一些附加条款，比如说国民政府必须立刻正式对日宣战，等等。"
 French.42.a: "橄榄枝已投，我们岂有不接之理！"

 French_news.2.t: "枫丹向[PRC.GetnameDef]归还广州湾"
 French_news.2.d: "根据1899年法兰西第三共和国与清政府签订的《中法互订广州湾租界条约》，广州湾地区作为法兰西殖民帝国的一部分从中国被割离。一晃四十年以后，法国已改称枫丹，而中国诞生了苏维埃政权，现在，来自枫丹的全权外交官克洛琳德前往[PRC.Capital.GetCapitalVictoryPointName]与来自中共的林伯渠发表了联合公报，宣布废除条约，并拟定了行政区的新名字——湛江。\n\n尽管[GetYear]的中国正处于内忧外患的风雨之中，但无论是苏区还是白区的民众都开始自发地庆祝这一外交上的重大胜利。"
 French_news.2.a: "我们本不该染指那里"
 French_news.2.b: "令人困惑的举动"
 French_news.2.c: "中国人民朝着民族解放又迈出了一步！"
 French_news.1.t: "芙宁娜掌控了法兰西"
 French_news.1.d: "法兰西第三共和国自从诞生以来混乱的民主终于迎来了它的终局，一位新近在法国爆火的女星——芙宁娜·德·枫丹，依仗着粉丝的狂热以及名为“枫丹”的神秘力量推翻了共和政府，又解散了国民议会，并修改国号为“枫丹共和国”。\n\n虽然新生的枫丹共和国并非一个专制独裁的国家，但却具有着十分的激进色彩，早在芙宁娜刚刚出现在舞台时，她便立下了一句在如今枫丹流传很广的话：以审判之名，荡涤诸恶。"
 French_news.1.a: "那她究竟要审判谁呢"
 French.43.t: "解放殖民地的疑虑"
 French.43.d: "在过去，法兰西拥有庞大的殖民体系，然而这并未给大多数的法国人带来幸福，现在枫丹将要告别这份遗产了，一个疑问便在枫丹人的心头上悬起:\n有殖民地我们都处于这悲惨的境地，没有殖民地，这日子还能过吗？\n社会舆论的风波很快被报社所捕捉到，不久，一篇名为《殖民主义的昨天，今天与明天》的社论登上了《蒸汽鸟报》的头版，作者是夏洛蒂。她指出，旧法兰西人民的悲惨遭遇，包括超时劳动，工资地位等情况，不是殖民所带来的已被改善的结果，而是殖民主义者造成的不公所导致的，而枫丹在去殖民化的大背景下所要做的，是在政治上打倒殖民主义的同时，在经济上使生产资料的占有更加均匀，这样去殖民化不但不会使中下层群众生活条件恶化，还会使其有所改善。\n\n《蒸汽鸟报》算枫丹的半个官方媒体，它几乎与芙宁娜同时出现，夏洛蒂的想法代表了多数枫丹出身的政治家的想法，这篇文章在各个阶层获得的反响各不相同，大资产阶级对其嗤之以鼻，而城市的中产阶级，工人，农民，虽然心存疑虑，但大体上支持这个说法。"
 French.43.a: "没有殖民地，我们也能过得很好！"
 French.44.t: "克洛琳德的叛逃"
 French.44.d: "战败所导致的混乱刚刚结束，残破的行政机构慢慢恢复了运作，大部分的官员意识到即使这个国家已被德国兵锋所践踏，但这笔帐还算不到自己头上，于是便入场到岗上班，而枫丹最重要的位置之一——外交部首席外交官，却出现了诡异的空缺，而先前担任这个职务的，是克洛琳德。\n\n后来新成立的凡尔赛政府才收到了来自德国间谍的消息——克洛琳德早在德军进入巴黎以后便立刻自己驾驶了一架战斗机，飞跃了英吉利海峡到达伦敦，期间险些被英军的岸防火炮击落。从一般人的眼中来看，克洛琳德好像成为了一位在危急关头逃离祖国的叛国者，但很快克洛琳德就让这种看法消失了，因为她组织了一个名为“枫丹抵抗运动”的军事组织，将立刻加入同盟国对德宣战。"
 French.44.a: "投降？决不投降！"
 French.44.b: "真是没人比她更懂如何塑造一个英雄的形象。"
 French.45.t: "战败"
 French.45.d: "有的哲学家宣称，所谓的命运，不过是一切过去的因所产生的果，因而世间万物的一切，不过是按照过去决定的既定轨道前进的。那么如戏剧般多变的命运，在芙宁娜看来，也就是因以更加戏虐的方式展现出来了而已。\n\n若是就近来看，芙宁娜找不到招致战败的因，军队的众志成城，人民的狂热支持，均不能阻挡德军锋利的兵锋，或许失败的种子并非在此时埋下，而是发生在二十多年前的福煦车厢内，失败的因在那时就已经出现了。\n\n无论真正的责任是否在她，不可改变的事实就是，她将承担一个战败国元首所要承担的一切后果，她将自己视为枫丹的女儿，那么对枫丹所施加的屈辱便也成为了对她所施加的屈辱；战败之前人民对她有多信任，战败以后便会有多失望，现在，怀疑神的声音不再是一道微小的裂缝，它很快就要崩解了。"
 French.45.a: "木已成舟，无可奈何"
 French_news.3.t: "枫丹抵抗运动成立"
 French_news.3.d: "枫丹的政府已经投降，但这并不意味着枫丹的抵抗已经结束，枫丹抵抗运动的成立就是其最好的证明。\n\n由枫丹前外交部首席外交官组织的枫丹抵抗运动旨在解放被纳粹控制的祖国，并号召各海外殖民地抵制临时政府，追随抵抗运动。\n\n现在抵抗运动的领袖克洛琳德已被临时政府指控为叛国罪，并缺席判处无期徒刑，但只要抵抗尚未结束，该法令便不会得到实施。"
 French_news.3.a: "战斗继续！"
 French_news.3.b: "她能做到什么程度呢？"
 French.46.t: "逃离临时政府"
 French.46.d: "原本就出身枫丹的官员在枫丹共和国形成了一个特殊的阶层，他们被称为“旧枫丹人”，与之对应的，枫丹共和国成立以后获得枫丹公民身份的人，则被称作是“新枫丹人”。\n\n法兰西还是枫丹，是盘旋在众多枫丹公民们头上的一个疑问，毫无疑问，旧枫丹人们义无反顾地认为枫丹是自己的祖国，而新枫丹人虽然初步接受了枫丹这一概念，但依然更加认同法兰西才是自己的祖国。\n\n但在近期，旧枫丹人越来越多地消失了，尤其是政府官员，高级将领，他们的去向不必多说，自然是投向抵抗运动了，但令德国专员不可理解的是，连新枫丹人亦有投奔抵抗运动的。而虚君总理芙宁娜·德·枫丹，不但背负着战败德罪名，一系列残酷剥削枫丹人的罪业也被算到了她的头上，，现在，连能够让她感觉到一点归属感的旧枫丹人也都消失不见了，这让她感到无比的孤独。"
 French.46.a: "好吧"
 French.47.t: "投身抵抗"
 French.47.d: "不少的人不远千里，飞跃广袤的撒哈拉沙漠，跨过东非大裂谷，或是通过水雷遍布的地中海，从苏伊士运河到达我们抵抗运动的心脏——荒凉的马达加斯加，而他们都是为同一个信念而来的，枫丹人决不能做德国的侍从，一时的卑躬屈膝不过是搪塞的谎言，唯有反抗才能获得自由。"
 French.47.a: "我们一同前进。"
 French_news.4.t: "枫丹向国民政府归还广州湾"
 French_news.4.d: "根据1899年法兰西第三共和国与清政府签订的《中法互订广州湾租界条约》，广州湾地区作为法兰西殖民帝国的一部分从中国被割离。一晃四十年以后，法国已改称枫丹，而中国的清廷已被国民政府推翻，现在，来自枫丹的全权外交官克洛琳德前往[CHI.Capital.GetCapitalVictoryPointName]与来自中华民国的胡适发表了联合公报，宣布废除条约，并拟定了行政区的新名字——湛江。\n\n尽管[GetYear]的中国正处于内忧外患的风雨之中，但无论是苏区还是白区的民众都开始自发地庆祝这一外交上的重大胜利。"
 French_news.4.a: "我们本不该染指那里"
 French_news.4.b: "我们朝着民族解放又近了一步！"
 French_news.4.c: "令人困惑的奇怪举动......"
 French_news.5.d: "早在1922年，欧洲第一个法西斯政权便在混乱无秩的意大利王国诞生，那时尽管有许多国家观察家谴责墨索里尼的独裁统治，为意大利的民主感到惋惜，但从未有人想过这会对欧洲大陆的和平产生威胁，直到1933年纳粹党在德国的成功，欧洲各国才意识到了法西斯无论在政治上还是在军事的高度危险性，但迫于国内高度的反战情绪，从未有国家采取实质性的行动遏制法西斯的扩张。\n现在，第一个采取的大国终于产生了——枫丹共和国，联合很多被法西斯威胁的小国，以解放德意两国为目的，缔结了正式的军事同盟，被称为反法西斯联盟。"
 French_news.5.t: "欧洲反法西斯倡议"
 French_news.5.a: "前进，我们一起！"
 French_news.5.b: "这是赤裸裸的挑衅"
 French_news.5.c: "听起来的确不错" 
 French.48.t: "克洛琳德访问日本"
 French.48.d: "应该说，在这个时代出使日本，是西方国家外事官员所避之不及的差事，原因无他，惟危险尔。\n若是以个人身份，仅仅前往日本旅游的话，如果被某些狂热的民族主义者发现的话，轻则收获一顿暴打，严重的话，被当街处以极刑也不是不可能。虽然作为公事，有卫队护送的外事活动相对更安全一点，但绝不会有什么好的态度，一切的根源，就是日本正在刮一阵打倒西方列强，鼓吹泛亚共荣，主张进行大东亚战争的烈风。\n\n作为首席外交官，克洛琳德不能不去。\n\n幸运的是，到达东京的时候正好是个雨夜，街上几乎没有行人，但气氛却诡异地压抑，前来接送的卫队不发一言，只是阴沉地盯着克洛琳德，这让她觉得很不舒服，在这种氛围中驶过了漫长的二十公里以后，终于抵达了国会。\n\n克洛琳德不指望在这场外事活动中取得什么进展，此行唯一的目的，只是表达枫丹对于日本局势的关注。"
 French.48.a: "昭和年代的疯狂是我们始料未及的，这场调停不可能成功。"
 French.49.t: "对日禁运？"
 French.49.d: "日本的战争原料，钢铁，石油，橡胶，以及各种贵金属，都是大量进口自我国的。现在枫丹已经发出呼吁，希望我们出于援助中国的道义，对日实行禁运。"
 French.49.a: "但是经济更加要紧"
 French.49.b: "本该如此"
 French.50.t: "[FROM.GetnameDef]同意对日禁运"
 French.50.d: "[FROM.GetnameDef]响应了我们的号召，并且以法令的形式确认了对日本的禁运措施，现在，日本超速运转的战争机器终于减慢了一些。"
 French.50.a: "非常好"
 French.51.t: "太平洋反法西斯倡议"
 French.51.d: "随着日本的威胁与日俱增，没人知道我们的菲律宾抑或是夏威夷是否会成为今天的中国，但受制于国内横行的孤立主义，我们一直未能对日本的侵略采取什么制约措施，但现在枫丹投来了橄榄枝。"
 French.51.a: "很好"
 French.51.b: "但是该提案未获国会批准"
 French.52.t: "美国国会批准该倡议"
 French.52.d: "美国因为其优越的地理位置，欧陆上的几次大战从未威胁到美国本土，因而国内便产生了一种孤立主义的情绪，认为不干涉任何战争，只要负责军售便可以再给美国带来一场柯立芝繁荣，很少有人望向美洲以外的地区。\n但令我们欣喜的是，时任美国总统的[USA.GetLeader]有着超越那些政客的卓越远见，他力排众议，动用各种行政力量通过了我们的反法西斯倡议，现在，我们的背后有了世界上最强大的战争机器作为支持。"
 French.52.a: "前途真是一片光明。"
 French.53.t: "倡议未获批准"
 French.53.d: "看起来，孤立主义依然在美国国内占了上风，尽管美国总统[USA.GetLeader]的见识超越了大多数政客，力图通过该法案，但还是未能在国会取得多数。看来，只有一场直接把战火烧向美国领土的战争才能让生活在安逸之中的美国人醒悟过来，自己正处于一个多么危险的乱世了。"
 French.53.a: "还真是生于忧患而死于安乐。"
 French.54.t: "审判者们"
 French.54.d: "普普通通的民众是战犯们恶行的主要受害者，但他们却不能亲自审判他们，需要由代理人，用已经既定的法条，以一个理中客的身份进行审判，芙宁娜虽然对此有些打抱不平，但也无可奈何，仔细想想，如果真的交给人民来审判，那他们的结局也许是如同中世纪的石刑，在大街上，被散乱的石头砸死。\n\n审判的代理人，也就是法官，从五湖四海而来，主要是枫丹以及盟友，一些没有参战的国家，也为了彰显自己的反法西斯立场，亦派出了法官，前来枫丹的莫伊克斯，完成这场浩大的清算。\n\n主法官自然是我们的那维莱特，号称“绝对公正”，也许是个不错的名号，但芙宁娜却觉得，绝对公正，未免缺乏了一些情理，也许一些战犯能从法律的条款之中脱罪，但在普通人眼里，他们就是罪该万死的。至于枫丹的检察官，则是芙宁娜亲自担任。\n来自大洋彼岸的美国的法官，是弗朗西斯·比德尔，罗伯特·杰克逊则是检察官。而英国则派出了杰弗里·劳伦斯爵士作为法官，苏联则是约娜·尼基琴科，唯一的女性法官。芙宁娜对他们的唯一印象，就是完全没有印象，不知道他们会如何审判，好在，枫丹还是主导了这场审判的话语权，至少，对于芙宁娜唯一熟悉的那维莱特，芙宁娜还是有十分充足的把握的。\n\n而所有要被审判的对象，已经被押送到了审判地点，所有的准备工作已经就绪，是时候开始审判了。"
 French.54.a: "“我必偿还”"
 French.55.t: "希特勒，戈林与希姆莱"
 French.55.d: "毫无疑问，纳粹党的魁首，德国总理，独裁者，阿道夫·希特勒，是纳粹德国的第一号罪人，而赫尔曼·戈林，一度被指定为希特勒继承人的纳粹党二号人物，同时也以腐败著称的德国空军元帅，经济部长，是德国的二号战犯。而党卫队的首领，海因里希·希姆莱，是个见不得血的侩子手，被列为德国的第三战犯。\n\n审判希特勒的过程，对于芙宁娜来说，是最无聊的，一向高傲的元首，拒绝在法庭上说哪怕一句话，即使是宣判时，也未表露出一丝胆怯。拘捕期间，希特勒戒掉了冰毒，往日那副癫狂的形象并未显露出来，因此是连看一个老头发疯的机会也没有了。\n希特勒被毫无疑问地判处了绞刑，但未被执行，因为审判的次日他就被发现死在了牢房里，没人知道他是从那里弄来了手枪，子弹精准地击穿了他的脑干，死状看起了竟有几分安详。\n接下来是戈林。\n与人们想象地不同，赫尔曼·戈林并不是目不识丁的无能胖子，也许是审判的威胁激发了他的求生本能，他便供出了十分狡猾的辩词，力求模糊他服务的对象，并对自己的所有屠杀命令全盘否认，至于其他的惨案，也坚称完全不知情。不过这些挣扎都是徒劳的，在场的四位法官一致认为没有任何理由让他脱罪，死是他唯一的结局。宣判以后，戈林用他两百多斤的身躯打伤了前来的法警，面目狰狞地大喊没人能处死他，后来还是一颗子弹结束了他的最后疯狂。\n最后一场是针对海因里希·希姆莱的。\n纵容党卫军肆意屠杀占领区人民的希姆莱，在政治之外，甚至是一个不敢杀鸡的孱弱之人，在法庭上支支吾吾，一度似乎身心游离天外，也不知道自己该为多数人的死亡负责，毫无疑问，结局也是死。希姆莱是本场判决中唯一一个被正常执行死刑的战犯，他只是淡然地，倒不如说是在巨大错愕中尚未缓过劲来的恍惚之中死去的。"
 French.55.a: "有的人，生前只带给人痛苦，只有死了才能带给人快乐。"
 French.56.t: "戈培尔，鲍曼，里宾特洛甫与施佩尔"
 French.56.d: "第二场审判即将被审判的战犯是宣传部长，希特勒的知音，保罗·约瑟夫·戈培尔，被称为元首之影，希特勒的忠实仆从，马丁·鲍曼，执掌外交部的约阿希姆·冯·里宾特洛甫和建筑设计师，忠心耿耿的军需部长阿尔伯特·施佩尔。\n\n约瑟夫·戈培尔在名声上似乎不像是一个战犯，而更像是一位天才，一位邪恶的，善于煽动人心的演讲天才，以及在万人的体育场中丝毫不怯，高呼总体战的演说家，他的天赋也许可以让同样擅长演讲的温斯顿·丘吉尔感到惺惺相惜，但并不能称为脱罪的依据，能够偿还欺骗人民，蛊惑苍生的罪行的，依然只有绞刑。\n马丁·鲍曼，相比于戈培尔，实在是个声名不显的人物，但对于纳粹党的工作，可丝毫不下于戈培尔，作为希特勒的秘书，在希特勒沉迷冰毒的癫狂时，政府要靠鲍曼才能够正常运作下去，无论是战争的发动，外交的文书，还是屠杀的命令，都有他的痕迹，毫无疑问，结局依然是死。\n里宾特洛甫，纳粹外交的执行者，在德奥合并等行动中均发挥了重要作用，四项罪名，反和平密谋罪，侵略罪，战争罪，反人道罪，在里宾特洛甫身上全部成立，结局依然是死。\n阿尔伯特·施佩尔，日耳曼尼亚的总建筑师，四项罪名中，只成立了战争罪和反人道罪，这是因为他曾组织大规模的奴隶劳动，在二十世纪，奴隶的存在本身就已经挑战了底线，更别提这些奴隶的待遇极尽悲惨，因此，即使两项罪名，也足以处死施佩尔了。"
 French.56.a: "有时候，天才与疯子只在一念之间。"
 French.57.t: "另一些人的结局"
 French.57.d: "在第三，第四至第六场审判中，共有28位战犯被审判，其中有些人被判处绞刑，有些人被产出监禁，有些人则被宣判为无罪。\n\n判处绞刑的人最多，杀人最多的将军，约德尔，他的死无人哀悼，政治家似乎比将军们死得更多，因为将军们掌控暴力，只是小恶，而真正放出军队这头吃人猛兽的，又是政治家，他们才是大恶，大部分的将军只被判处了有期徒刑，被判绞刑的除了约德尔，就只有舍尔纳了。\n\n最被人所关注的，自然是国防军的三驾马车，曼斯坦因，古德里安和隆美尔，他们虽然战功赫赫，但被判得反而最轻，理由是他们从未加入纳粹党，也曾多次违抗屠杀犹太人的命令，法官们便裁定他们良心未泯，不予重判，判处五年有期徒刑了事。\n\n说来惭愧，纳粹德国海军在战争中建树寥寥，被指控的最大战争罪责，是击毁商船，因此高级的海军将领也未被重判，雷德尔只被判了五年，而邓尼茨因为被指控要为海难中的死难者负责，被判处十五年有期徒刑。\n\n控制纳粹德国的除了纳粹党，其实还有国内的大资产阶级，最有代表性的就是“经济魔术师”亚尔马·沙赫特，战争工业的驱动者瓦尔特·冯克以及军工巨头克虏伯，来自英美的法官均认定他们从未参与侵略或者反人道的罪行，但苏联的法官和那维莱特却达成了一致，认为他们的罪行甚至在军队之上，是为巨恶，由于法官的意见未能达成一致，因此采取了折中方案，三人都被判处无期徒刑。"
 French.57.a: "罪有应得而已。"
 French.58.t: "枫丹国教获得更多人认同"
 French.58.d: "自从芙宁娜来到这世界上以后，枫丹公民们似乎就拥有了两个神，一个是基督教的上帝，而另一个就是切切实实地在他们面前出现的水之神芙卡洛斯。\n\n自从这个世界从多神教转为一神教以后，除主神以外的其他神明就成了十恶不赦的异端，在芙宁娜降临之初，她的神明身份便引起了众多天主教徒们的诸多疑虑，在枫丹开始去基督教化以后，这种疑虑迅速转化为了怒火。\n\n好在，随着时间的推移，在我们潜移默化的影响下，越来越多的人相信芙宁娜才是世界上唯一存在的神明，即使还存在极端死硬的天主教徒，他们的影响也不足为虑了。"
 French.58.a: "芙门永存。"
 French.58.tt: "§Y美德§!追加效果:\n稳定度:§G+10%§!"
 French.59.t: "司法改革之一——废除死刑？"
 French.59.d: "国家真的有剥夺一个人性命的权力吗？自从文艺复兴，启蒙运动数百年以来，即使受制于资本主义的条件，对个人权利的尊重仍然得到了史无前例的发展，对于生命权这种最核心的权利来说更是如此，于是，废死运动诞生了。\n\n废死支持者主要认为人总是有改过自新的机会，一个人死了，是无法复活的，倘若是冤死狱中，便是永远无法弥补的过失了。\n废死出于捍卫人不可侵犯的生命权而发起，可是它真的可以在现实层面上达到最大善吗？一个被公认是坏到骨子里的人，却又有着权势的荫蔽，废死是否会成为他的保护伞呢？种种讨论总是不绝于耳。\n当一个社会辩题陷入僵持以后，人们总会下意识地寻求芙宁娜的意见，在最近召开的国民议会中，芙宁娜的指示是......"
 French.59.a: "完全废除死刑"
 French.59.b: "保留死刑，但是谨慎使用"
 French.59.c: "维持现状"
 French.60.t: "司法改革之二——陪审团的去留"
 French.60.d: "陪审团的历史根源可追溯到欧洲古代的日耳曼民族部落习俗，并随着中世纪盎格鲁-撒克逊人的迁徙而将此习俗带入今日的不列颠地区，又因为其后大英帝国的崛起而把这项制度带到世界各地。现代形式的陪审团则起源于12世纪中，英格兰国王亨利二世的时候，当时即以犯罪地的行政区与村落的6至12人为代表来审讯疑犯。很显然，请陪审团已经成为了当今司法程序的一个惯例。\n\n不过近些年来的许多案例表明，有时陪审团所做出的决定并不符合客观上的正义，普通民众的情感朴素，即是优点，也是缺点，总会有天生具有极强煽动性的奇才律师，擅长玩弄陪审团的感情，从而为他的雇主争取最大限度的减刑——这真的是正确的吗？"
 French.60.a: "废除陪审团"
 French.60.b: "还是留下吧"
 French.61.t: "司法改革之三——量刑的再虑"
 French.61.d: "在枫丹无所不知的名著《悲惨世界》中，主角冉阿让因为偷一条面包救济外甥而坐牢19年的囚犯，编号为24601。他原本只被判5年徒刑，但由于他不信任法律，屡屡越狱以致于罪刑加重，最终于19年后获得假释。即使这只是一部小说，但小说亦具有反映时代的参考价值，这桩荒唐的案例似乎正在嘲讽着旧法国司法制度的严酷。\n\n有时犯罪并不出自于人类渴望不劳而获的懒惰，而是饥寒交迫之中的无奈之举，可是残酷的法律连穷人本能的求生都要重重地惩罚，可见其维护公平正义的效用已经微乎其微，变成了单纯压迫人民，维护贵族利益的强盗法律。时间走到枫丹时期，人们察觉到了政治风气的改变，于是改革司法的请愿如同潮水一般袭来。无论如何，他们的诉求怎么看都是合理的，我们不能置之不理。"
 French.61.a: "是时候重编那套沿用了一百三十年之久的法典了。"
 French.62.t: "阿尔及尔会议"
 French.62.d: "阿尔及利亚，一片总是让历代的巴黎政府头疼不已的土地，他的气候宜人，与法国南部十分相似，因此，许多法国人移居至此，将这里当作是自己的故乡。\n但阿尔及利亚并不是一片无主之地，柏柏尔人早在公元前便已经在此生息，而后来的穆斯林也先于法国人定居与此地，对于他们来说，法国人，以及现在的枫丹人，是入侵自己祖国的外来者。\n\n即使一百年前阿尔及利亚人有组织的反抗就已经被法军消灭，但抵抗的种子是无法根除的，随着法国人对阿尔及利亚人进行了一定程度的教育，他们的民族意识逐渐觉醒，抵抗之火因而逐渐炽烈。\n阿尔及利亚的每一天，都会有暴力事件的发生，一部分阿尔及利亚人试图用自己的方式摆脱殖民统治，还有一部分积极与枫丹对话，而另一部分人则真正相信他们可以与枫丹人和平共处。\n在这片复杂的土地上，讨论阿尔及利亚未来的阿尔及尔会议召开了。克洛琳德亲赴北非，在风光旖旎的阿尔及尔之滨召集阿尔及利亚社会各界的代表，意图将阿尔及利亚这个棘手的难题一劳永逸地解决掉。"
 French.62.a: "本土派在会议中取得了胜利"
 French.62.b: "黑脚在会议中压倒了本土派"
 French.62.tt: "§Y注:黑脚指定居阿尔及利亚的法裔及其后裔。§!"
 French.63.t: "枫丹的新节日"
 French.63.d: "在宗教国家中，最盛大的节日往往是神明，或者是他的代言人所降生的日子，如基督教文化中，最重要的日子便是耶稣将生日，圣诞节。\n还有一个重要的节日便是国庆日，在旧法国，国庆日是每年七月十四日，纪念法国大革命的巴士底日，对于旧法国人来说，国庆日便意味着共和，圣诞节就意味着宗教，可是现在上帝没有出现，居然是之前无人知晓的水神芙卡洛斯先于上帝降临了世间，于是，圣诞节的意义被毫不意外地削弱了。\n越来越多的人指出，枫丹应该设立新的节日以纪念水神的降生，将芙宁娜的生日——每年的十月十三日，设定为水神诞祭日，并附带七天连休。\n国庆日的设立也有争议，绝大部分的枫丹人依然自豪于法国大革命这场洪水滔天般的巨大变革，但也有人提出将巴士底狱日改称为审判日，意为“对旧世界的审判”。"
 French.63.a: "迎接枫丹的一切。" 
 French.63.tt: "在此之后，芙宁娜每年都会过生日，这也将是全国的一场欢庆。"
 French.65.t: "芙宁娜的生日！"
 French.65.d: "每当一年走到了十月份，枫丹人就会进入一种万分期待的状态，因为这意味着芙宁娜的生日就要到了，这不但意味着连续七天的带薪休假，而且除非是战争时期，一场盛大的游行将在巴黎出演。届时，人们可以看到剧场中不曾见到的，真实的芙宁娜，穿着华服，坐在放满了鲜花的马车上，走到哪里都会引起一阵欢呼。\n世界上没有哪个国家元首的生日会举办得如此盛大，拥有如此多的人参加，没人会指责庆典的用度多少，因为对枫丹人来说，饥饿的年代似乎已经过去很久了，现在最重要的事情就是与他们所爱戴的神明一同分享快乐。"
 French.65.a: "芙宁娜生日快乐！"

 French.66.t: "致谢"
 French.66.d: "在首先的首先，感谢游玩芙宁娜的1936之旅！\n虽然先前有过不少制作模组的经验，但这还是我做完的第一个具有一定剧情性的模组。虽然扩展的国策树看起来并不大，但它花费了我一个半月的时间！差不多是半个暑假。不过，事实是，制作的大部分时间都在拖延(笑)。\n\n钢铁雄心四的模组，究竟怎样才算好玩，是我不明白的问题。在这里，我也来套个公式——钢丝的优质mod究竟是个什么样子，KR搞了很多年，也并没有完全搞清楚，可能粉坦克的思路比较好，搞了个TNO，可惜后来TNO的模式又僵化了。\n\n我没有TNO制作组的雄厚实力，去构思精彩绝伦的剧本，也有些反感KX的制作模式，将钢丝变成了一个单纯的数值游戏，所有国策的唯一作用，就是添加正面的民族精神。即使玩的时候依然兴致勃勃，但完结以后，恐怕就只剩下空虚了。还记得我打完TNO施佩尔左线的那个午夜，那份长久的感动使我对这种制作模式万分神往，希望某一天可以写出可以与之媲美的MOD。\n\n我在制作之初，也尝试过做出一些改变，尝试将大家喜闻乐见的芙宁娜，法国大革命，雅各宾派和罗伯斯庇尔结合起来，可惜，失败了，以我有限的才学，纵使参考了再多的资料，也不知道如何展现出雅各宾的主题，到了国策树的后端，相信大家会察觉到，还是变成数值游戏了，有些感慨。\n\n好了，闲聊到此为止，差点忘了介绍作者了，名字什么的当然不能告诉你啦，总之我的B站昵称是§RNilouOjousann§!,链接在这里:§Chttps://space.bilibili.com/1081615042?spm_id_from=333.1007.0.0 §!\n如果可以的话，请关注一下，十分感谢！"
 French.66.a: "祝你开心！"
 French.66.tt: "§g旅人，愿你今后的旅程也顺遂无忧。§!"
 French.67.t: "境外势力活动的迹象"
 French.67.d: "越来越多的现象表明，在近期发生的种种事情中，存在着一股我们政府框架以外的势力在暗中操作，要么是苏联的某些秘密行动，或者是......外国间谍？现在政府高层普遍陷入了深深的焦虑之中。"
 French.67.a: "国事已然如此艰难......"
 French.68.t: "又一场政变！"
 French.68.d: "最担心的事情发生了，在近期重重奇怪迹象后面，原来是枫丹人正在试图发动政变，推翻现在的共产党政府，拥戴已经失败的卡巴雷罗上位。"
 French.68.a: "可恶......立刻镇压！"
 French.69.t: "政变成功"
 French.69.d: "显然西班牙共产党权斗的胜利得罪了太多人，现在，不仅是中立人士，左派进步人士也大多开始反对西班牙共产党。因为这些矛盾，政变的成功是必然的，尽管西班牙共产党在政变的第一时间就调集了部队进入马德里，但这份命令并未得到执行。\n卡巴雷罗在特工小组和一小部分的武装力量的帮助下控制了整个马德里，并顺利组建了主要由西班牙工人社会党组成的内阁。而他亦应允了承诺，正式通电克洛琳德要求枫丹下场镇压国民军叛乱。"
 French.69.a: "做得很好！"
 French.70.t: "政变失败"
 French.70.d: "西班牙共产党的统治比我们预计的稳固，在政变开始时，一只民兵部队立刻进入了马德里镇压，尽管我们的特工战斗力远远强于民兵，但在数百倍的兵力面前只得退却。\n\n毫无疑问，这场失败的政变已经彻底葬送了我们和西班牙的关系，现在即使时西班牙共产党赢得了内战的胜利，我们的南部边界也已经不再安全，也许现在我们需要一些强硬的举措来挽救局势。"
 French.70.a: "就此收手吧......"
 French.70.b: "出重拳！宣战！"

 French_news.6.t: "西枫战争"
 French_news.6.d: "枫丹一直以来都对自己周遭的政治环境感到深深的忧虑，从1922年的进军罗马开始，这种担忧随着法西斯主义在欧洲各国的抬头而不断地加重，这次的西班牙-枫丹战争，简称西枫战争，说明枫丹人的忧虑达到了顶点。\n\n战争的起因是枫丹为在西班牙扶持工人社会党而发动的失败政变，尽管处理这次外交事件的方法在国际上看来有很多种，但枫丹依然选择了最坏的那一个——宣战。\n国际上因枫丹的这一举措引起了轩然大波。各路媒体的谴责纷至沓来，来自苏联的评价最是广为流传——在维持了不久的体面以后，枫丹这个老牌帝国主义国家再度露出了它的獠牙。"
 French_news.6.a: "可恶......"
 French_news.7.t: "阿尔及利亚独立"
 French_news.7.d: "自从十九世纪中叶法国征服阿尔及利亚以来，这块气候宜人的土地就深受法国以及后来的枫丹人的喜爱，曾有相当多来自本土的移民定居于此，虽然近年来阿尔及利亚的民族意识有所觉醒，但枫丹人的统治从未动摇。\n然而在经过一系列在其他西方国家看来不可思议的谈判以后，阿尔及利亚居然真的顺利地独立了。从阿尔及尔枫丹国旗落下的那一刻起，二十世纪以来非洲第一个独立的国家诞生了。\n枫丹放弃阿尔及利亚的理由众说纷纭，根据枫丹的官方说法，枫丹人民普遍意识到了殖民政策的非正义性，政府只是顺应民意。而来自苏联的媒体则运用唯物史观，推测出其真实原因是阿尔及利亚人锲而不舍的斗争。\n阿尔及利亚的独立鼓舞了世界上的诸多殖民地与半殖民地国家，也许一场去殖民化的浪潮即将来临。"
 French_news.7.a: "民族自决万岁！"
 French.71.t: "枫丹提议改变西班牙战略"
 French.71.d: "枫丹指出，在共产国际的指示下，西班牙共产党一步一步地成为了权斗中的最大赢家，但这一切也在逐步分裂着人民阵线，最终还是会因为人心散乱而不可避免地走向失败。他们提议让我们提醒西班牙共产党要团结，不要分裂。"
 French.71.a: "他们没资格对我们的外交策略指手画脚"
 French.71.b: "的确，尽管工人阶级掌权是最终目标，但消灭法西斯分子更为紧要。"
 French.72.t: "苏联认同我们的提议"
 French.72.d: "相对于站在西班牙共和政府的中立民主人士，国民军那边的保守反动分子不是更加可怕吗？西班牙共产党偏偏就没有意识到这一点。好在，苏联的同志们在这方面目光比西共长远得多，西班牙的共和军首先要不能失败，无产阶级的掌权是赢得胜利以后才要考虑的事情。目前，共产国际对西班牙发出了新的指示，要求西共停止对抗政府中的中立人士，转而与之合作。"
 French.72.a: "明智之举。"
 French.73.t: "苏联对我们的提议不予理睬"
 French.73.d: "在苏联人看来，对其他国家的内政，外交进行干涉，正是帝国主义的特征之一，显然，苏联不打算与我们这个帝国主义国家交流。"
 French.73.a: "这只是善意的提醒......"
 French.74.t: "回礼"
 French.74.d: "阿萨尼亚知道，枫丹人每天都在为他们的南部边界安全而发愁，但他从来不会想到枫丹居然会不计回报地为西班牙摇摇欲坠地共和国提供如此多的帮助，尽管阿萨尼亚并不是一位马克思主义者，但这一次，他切切实实地感受到了何谓国际主义。想到这里，阿萨尼亚感激涕零，不知道一个国家该如何回报如此数不尽的恩情。最后，他决定赠送他的恩人，芙宁娜·德·枫丹一把步枪。\n这把步枪在枫丹人看来十分朴素，枪托是橡木制成的，没有其他装饰。除了能够看得出来的做工精致以外，似乎不具任何特点。但芙宁娜知道，对于内战刚刚结束，整个国家满目疮痍的西班牙来说，这已经是最好的国礼了，在这把枪无人注意的角落里，刻着一行小字——致永不褪色的芙卡洛斯。"
 French.74.a: "这把枪亦是送予全体志愿军战士的"

 French.75.t: "对国家法西斯党的清算"
 French.75.d: "世界上第一个法西斯主义组织——战斗的法西斯，起源于亚平宁半岛这块充满苦难与动荡的土地上。在掌控了政权以后，便改名为国家法西斯党，自此，意大利的各种社会矛盾，以战争，侵略的形式向其他国家输出，意大利人民在法西斯所制造的民族，扩张的幻象中，陷入了狂热。\n\n尽管，历史唯物主义将历史的发生解释为人类社会的两对基本矛盾，历史人物不过是潮流中被裹挟的泥沙，但意大利法西斯的各个领导人依然具有不可逃脱的罪责，其他暂且不谈，他们至少要对被屠戮的利比亚人负责，对被侵略的埃塞俄比亚人民负责，对被殖民的厄立特里亚人和索马里人负责，以及对被蒙蔽的意大利人民负责。\n\n当在庭的所有人看到一阵炫目的闪光时，大家都知道，那时墨索里尼油亮的光头，反射着从天窗中透入的阳光，有些不那么严肃的人为此而发笑。墨索里尼似乎对这些发笑者十分不满，但事情到了这步，他也没有资格大发脾气了，他知道自己是失败者，而在他的世界观中，败者是从来没有尊严的，活该被胜者踩在脚底，成王，败寇。\n墨索里尼的结局毫无疑问是死，绞刑，但那维莱特指出，他得到如此的下场已是幸运，若是被反法西斯游击队逮到了，他的下场可就不是至少还能留一个全尸的绞刑了。\n\n一般来说，审判杀人犯，总是以个来论处的，但这并不适用于另一位被审判的鲁道夫·格拉齐亚尼，因为他杀害了五分之一的利比亚人，衡量他杀人数量的方式，是百分比，不得不说，令人毛骨悚然。\n在利比亚，他用尽了各种残忍的手段，去镇压反抗的利比亚人民，人口本就不多的利比亚，在他的指示下，意大利军队造成了超过十万人的死亡，格拉齐亚尼也因此获得了费赞的屠夫的称号。\n对格拉齐亚尼来说更不巧的是，尽管进过意大利集中营的利比亚人基本上都死了，但枫丹还是找到了几个挺过十年而幸存下来的利比亚人作为证人，在他们的讲述下，站在受审席上的格拉齐亚尼已经被开除了人籍。\n\n但，枫丹现行法律的最高刑只有死刑，格拉齐亚尼也是被毫无疑问地判处了死刑。\n没人哀悼他们的死亡，这两个家伙被绞死的时候，围观的人群中爆发出来的，甚至不是沉默，而是是满地的欢呼。"
 French.75.a: "做人做到这个份上......"
 
 French.76.t: "空难"
 French.76.d: "坠机绝对是世界上最具有戏剧性的死亡方式之一！在得知自己将要被审判以后，意大利空军元帅伊塔洛·巴尔博吓得不轻，忘记了运输机的航程有多远，居然想着开运输机，逃到南美或者非洲的什么地方。而结果也是显而易见的——他飞不到目的地，不过，他也并不需要担忧燃油储量的问题，因为在此之前，他的飞机仅仅飞到阿尔及利亚就出现了故障，尽管作为空军元帅，伊塔洛·巴尔博有自信成功迫降，但他预计可以安全着陆的沙丘，却因为沙丘的自然移动，在多年以前便已在席卷撒哈拉的风暴中变为一片乱石滩，他的飞机就这么一头扎在了石头上，不出意外地机毁人亡了。\n\n虽然未能审判这位战犯，但各国人民对这个结果尚算满意，这样的结局，也不失作为人们茶余饭后以供消遣的谈资。"
 French.76.a: "其实，哪怕最坏的情况，他也就能被判个无期徒刑。"

 French.77.t: "天皇"
 French.77.d: "自从明治维新以来，天皇再度执掌了日本这个国家的大权。尽管日本也经历了大正民主运动，一定程度上削弱了天皇的权力，但他的意见依然具有决定性。\n一战的战争景气消失以后，日本的普通民众发现，自己为国家流汗流血，却未在战争中取得任何收益，于是，阶级矛盾史无前例德激化了。但这场运动未能使日本左翼夺权，日渐激进化的人民选择了法西斯主义，并在三十年代开启了一个诡异的时代，他们认为国家如此不公，跟天皇没有关系，只能是奸贼蒙蔽了圣听，因此无数任内阁首相便死于他们的枪口下，这场运动，反而使大正时期留下的民主风气完全消失，就此，日本彻底走上了法西斯道路。\n\n无论是日本的法西斯化进程，还是之后的一系列扩张，天皇都完全具有叫停的权力，然而他的默许却是最大的恶。陷入癫狂的日本陆军在满洲，中国，马来亚，菲律宾，印度尼西亚，以及缅甸，做下了无数令人发指的罪行，天皇对此，应该负主要责任。"
 French.77.a: "去死吧。并且，天皇制度也该做个了结了。"
 French.77.b: "在此之后，他最好成为一个无害的神像。"

 French.78.t: "恶犬"
 French.78.d: "西尾寺造，畑俊六，岗村宁次，土肥原贤二，板垣征四郎，支那派遣军，驻屯军，关东军，听到这些，有些中国人可能会胆战心惊，有些，则是紧咬牙关，握紧拳头，表现出刻骨铭心的仇恨，有时，也会用难以理解的方言，以最恶毒的语言去攻击他们。这不是因为他们的脾气暴躁，而是因为这些名字所代表的日本军国主义，毁掉了他们的一切，家里的农地因此而抛荒，仅有的男丁因此而被拉走充军，勤劳的农夫因此而饿死在迁徙的路上，失去了一切，脑海中唯一所想的，就是赶紧把犯下如此罪行的人，以及与他相似的人，全部杀得一个不留，饮他的血，操他的娘。\n\n抗战中苦闷的前几年，指挥失利，国土大片沦丧，黄河大坝被凿开，黄泛区的诸多人们，踏着浑浊的黄河水，捡着路边尸体的遗物，一边骂着日本人不是人，一边骂着蒋介石是狗，迷茫的向西前进，逃得越远越好。但现在，他们的死敌，终于在枫丹的帮助下，被彻底击败，那么，清算的时候到了。\n\n在审判开始以前，中国大陆地区就发生了不可计数的，针对日本尚未被遣返的军人，被称为狗汉奸的驻屯军的暴力事件，他们称之为“清算会”。虽然客观上的手段也相当残忍，但此仇如若这时不报，对于他们来说，就只能在仇恨的阴燃之火中度过自己被毁掉的后半生了。\n\n大部分被指控的战犯，在被送到法庭之前就已经死了，只有少数几个犯人出庭——岗村宁次，松井石根，以及板垣征四郎。\n毫无疑问，即便把通行大陆的所有法典搬出来，也找不到让他们活的理由，相对于在清算会中死去的其他战犯，绞刑对于他们来说，是一种更加体面的结局。"
 French.78.a: "泯灭人性地对待别人，终会被别人像他对待别人一样对待他。"

 French.79.t: "恶鬼"
 French.79.d: "日本普通的大头兵是苦出身，沦落至此只是因为无法抗拒的时代之洪流。那日本永远高高在上的老爷们，则是彻头彻尾地坏到骨子里，或者说魔怔过头。如果说近卫文麿内阁是一群精致利己的坏人，那么东条内阁就是完全的，不顾一切的，疯了。他们是日本上空的恶鬼，用自己的力量，感染普通的日本民众。如果说中国人民的苦难由出生普通日本民众的军人直接造成，那么这些高层就是把朴素民众变成那些毫无人性的军人的恶鬼，当然，他们还只是大恶，如果说如果普通官兵是小恶，那么军官则是中恶，上层文官是大恶，真正的巨恶，依然是那个在皇居中深居简出的矮子。"
 French.79.a: "名单是:近卫文麿，东条英机，大川周明，大岛浩。"
 some_one_was_not_appear: "一些没有移除是因为P社没有做"

 Fontaine_revolution.1.t: "下岗，没有再就业"
 Fontaine_revolution.1.d: "对于大半辈子在单位里劳动的工人来说，自动化所带来的进步，是他们所感受不到的。迷惘，是他们现在唯一的感受。\n四十几岁的老工人，被工友们称为大高个的弗朗西斯先生便是如此。对于旧法国时期的经历，弗朗西斯不愿过多回忆。在枫丹时期的伊始，他倒是惊奇地发现，他所处的这个社会，似乎真正地发生了一些变化。\n一位在她看来很美，好像叫做芙宁娜·德·枫丹的女士，在新落成的沫芒宫签署了一个不知内容的协议。不久，自己的雇主便急匆匆地走进这个场子，脸色阴沉地对自己的组长说了些什么，之后，组长向整个工厂的工友们宣布他们每周只需要上班四十小时了。虽然后来弗朗西斯听说协议还要求至少涨薪15%，自己的厂子没有做到这点，但当时的弗朗西斯还是为此高兴了好一阵子，也很自然地把这件事与芙宁娜女士联系到了一起，于是他便把她看作是恩人。\n后来厂里又来了一群自称是共产党干部的家伙，有时会把工友们召集到一起，说这其实是工友们自己争取到的权益，芙宁娜只是将这些成果以法律的形式给予了确认什么的。弗朗西斯对这些将信将疑，不确定这群家伙是不是骗子。\n\n再后来，厂子里买进了一批看起来形状怪异的设备。在弗朗西斯眼里，这个长着诸多全钢机械臂的东西简直像个怪物，毫无美感可言，可是开动起来以后，这个东西的效率却让所有的工友们都惊叹不已，一想到自己以后就要和熟悉的工具说再见，和这个钢铁怪物朝夕共处，弗朗西斯就有些不高兴。\n\n时间不知不觉地过了一个月，弗朗西斯已经习惯了这个东西，那天，他的雇主再次疾步走进了工厂，又对组长说了些什么，然后，自己就被告知，他已经不再是这个工厂的一份子，再拿一份不多的遣散费，就可以回家放长假了。\n\n弗朗西斯有两个家，一个是家庭，另一个就是单位，现在，单位把他赶走了，于是自己就只剩下半个世界了，尽管协议签署以来，弗朗西斯的生活的确有所改善，然而还是没有攒下什么积蓄，拿着一点点遣散费，弗朗西斯的生活陷入了拮据。\n这时，他又想起了组长向他宣布减工时的那个下午，他不知道自己今后该怎么活下去。"
 Fontaine_revolution.1.a: "悲剧"

 Fontaine_revolution.2.t: "同病相怜"
 Fontaine_revolution.2.d: "弗朗西斯惊奇地发现，社会上到处都是和他一样的人，在工厂里劳作了大半辈子，却因为什么自律机关的引入而失去了工作。弗朗西斯没有上过中学，除了工厂里的各种活做得很熟，他懂得东西不多，下岗的工友们也差不多，他们有人从海边的造船厂来，有人从罗讷河谷的工厂里来，每天就是在街头游荡，寻找有没有什么零散的工作可以接。\n有时街头会有一些讲座，看得人很多。一场讲座下来，有人喝彩，有人向那个自称马克思主义者的演讲者丢石子，骂他是强盗，要抢走自己的毕生积蓄。演讲者倒是相当有耐心，被砸到了，也不还手，就是继续将自己的理念，弗朗西斯以自己的文化水平，勉强听出来那和经济有关。"
 Fontaine_revolution.2.a: "似乎有点道理的样子"

 Fontaine_revolution.3.t: "沉默的城市"
 Fontaine_revolution.3.d: "今天的城市格外的安静，街上也没有车，平日轰鸣的工厂，今天却听不到一点动静。弗朗西斯十分奇怪，不知道发生了什么，拜访了往日的工友，被奚落了一番脑子迟钝，消息闭塞以后，才知道原来是枫丹共产党要求本地的工会组织罢工，那些侥幸留在工作岗位上的人，现在也开始留在家里放长假了。"
 Fontaine_revolution.3.a: "虽然不了解发生了什么，但我和工友站在一起。"

 Fontaine_revolution.4.t: "北部工业区的停摆"
 Fontaine_revolution.4.d: "这场罢工并非地区性的，枫丹共产党虽然名义上和审判庭组织的是一届联合政府，但他们并没有忘记他们的最终目的依然是夺取政权，实现无产阶级专政。在自动化刚开始，工人大批失业的时候，共产党察觉到这是一个夺权的好机会，于是他们选择背离联合政府，在全国范围内组织了总罢工，现在，受下岗潮冲击最严重的北部工业区已经响应了号召，开始了大规模的静坐式罢工。"
 Fontaine_revolution.4.a: "可恶......"

 Fontaine_revolution.5.t: "寂寥的罗讷河谷"
 Fontaine_revolution.5.d: "路易是一个里昂城内的工人，准确来说是新进的工人，他在工厂中只工作了几个月，每天的娱乐活动只有下班后去酒馆里拿出微薄的工资喝点不那么美味的葡萄酒，但今早他连这点权利也被彻底夺走了，主管告诉他被解雇了，原因是有了更加高效的对国家更有利的自动化机器，他不懂什么叫自动化，也不懂什么叫对国家更有利，他只能听得懂一句话，他被解雇了，他失魂落魄的走进了那间熟悉的酒馆，酒保照例给了他一杯葡萄酒，而他也将钱放在了桌上，酒保看出了他的窘境，或者说，最近来这里的人都带有这样的窘境，酒保告诉他，不仅是里昂如此，几乎整个枫丹都是如此，自动化带走了工人的工作，那些没钱的工人们要么彻底堕落烂死在家中，要么选择加入了人民阵线或共产党，酒保指了指外面正在游行的那群人，他不明白酒保为什么要对他说这些。"
 Fontaine_revolution.5.a: "“为什么不去加入他们呢，为了工人们的利益，不是吗？”"

 Fontaine_revolution.6.t: "安静的普罗旺斯"
 Fontaine_revolution.6.d: "带着海水咸湿气味的海风，成群的海鸥的啼鸣，以及远洋轮船的汽笛声，是土伦这座海港城市平日的主旋律。\n然而如今，海风依旧，汽笛声却消失了，以往人头攒动，聚集着许多搬运工人的码头，现在也只剩下了无人操控的机械静静地躺着。\n工会近来把枫共要求罢工的消息带到了普罗旺斯，在这片海港与船舶星罗棋布的土地上，疲惫的工人们很快响应了号召，与那些早早地被解雇的工人们一同在家中歇息。\n水手们可没有得到这些消息，他们还在疑惑港口为何空无一人，正在努力地找人打探情况，然而交接的人始终没有来到，上岸的水手们只了解到了这座城市已经因为罢工而瘫痪。"
 Fontaine_revolution.6.a: "大家都在哪里......"
 
 French.81.t: "斯洛伐克苏维埃政权"
 French.81.d: "苏联相信，自己作为世界上唯一一个成功的社会主义政权，有必要向苏联以外的地方输出苏维埃政权，而一五计划的成功，已经向世人证明了计划经济在重建，恢复与发展的强大能力，以及无与伦比的生命力，现在，毁天灭地的大战已经使法西斯的秩序崩解，而满目疮痍的斯洛伐克地区成为了一片权力真空地带，而在此地建立一个崭新的苏维埃政权，被苏联视为该地区的最好解决方案，并且在枫丹白露会议中正式提出。"
 French.81.a: "捷克与斯洛伐克不该分离"
 French.81.b: "苏联理应得到这些"
 French.81.c: "这应该让斯洛伐克人自行决定"

 French.82.t: "斯洛伐克决定独立"
 French.82.d: "捷克斯洛伐克是一个分裂的国度，它们如同一对感情消失殆尽的夫妇，维持这样的联合似乎只是不断地折磨着彼此，而斯洛伐克人终于找到了拆散它的机会，现在，他们希望建立一个独立的民主共和国。不过在苏联的影响下，没有占据绝对多数民主党派还是与共产党组成了一届联合政府，这让苏联勉强接受了这一结果。"
 French.82.a: "祝福你们。"


 French.83.t: "奥地利独立提案"
 French.83.d: "德国先前兼并了奥地利，现在枫丹要求让它独立"
 French.83.a: "赞成"
 French.83.b: "反对"

 Fontaine_revolution.7.t: "枫丹的全国总罢工"
 Fontaine_revolution.7.d: "高高在上的贵族老爷所看到的世界，总是折算为一行行的数据，在政策的变更调换中忽上忽下。但在人间的社会中，只是一点微小的变革，对于普通人来说就是海啸，而在枫丹，刚刚发生的一场巨大变革，对于数以万计的普通劳动者来说，就像是三叠纪的那些恐龙，遇见了那颗宿命般的灾星一样。\n但对于人来说，灾难总是有办法应对，如果是失业，饥饿的危机，那么，再也没有什么可失去的人们便会起来反抗，工人，反抗的方式便是罢工。\n现在，罢工已经蔓延到了全国各地，仅有少数的工厂还具备开工的能力，少数留在工作岗位上的工人，则被罢工者称为工贼，并对他们加以各种意义上的批判。好在，目前还没有大规模的暴力事件发生，也很少有工人破坏他们的机器，大部分的工人只是游行，期待一向在他们心目中善解人意的芙宁娜女士能够理解他们的诉求。"
 Fontaine_revolution.7.a: "......多么激烈的斗争"

 Fontaine_revolution.8.t: "芙宁娜要求人们保持冷静"
 Fontaine_revolution.8.d: "尽管在千人观看的舞台上，芙宁娜也从未感到害怕过，但面对千万人的游行，芙宁娜还是被吓坏了......在运动最初的几天，沫芒宫闭门谢客，仅有那维莱特可以想办法进入。人们一段时间见不到心中的偶像，便以为是她被该死的内阁劫持作为人质以要挟他们，于是怒火更加炽烈。\n在与那维莱特进行了长达三个小时的座谈以后，芙宁娜才勉强鼓起勇气，走向密密麻麻的人群面前，以颤抖的声音读出了准备好的文稿——不知道如果失败会有什么后果，不知道她会在这混乱的一幕中扮演何种角色，若是丑角......她不知道在此之后该如何面对她的人民。\n尽管此时芙宁娜的心中万分复杂，但见到了芙宁娜的人们还是相当高兴的，不少人挂出了“解散内阁，解救芙宁娜”的标语。"
 Fontaine_revolution.8.a: "要快点想办法......"

 Fontaine_revolution.9.t: "芙宁娜呼吁人们保持冷静"
 Fontaine_revolution.9.d: "这几天芙宁娜总是在人们面前出现，在各处为了安抚人心而奔走。一日的行程很满，也许上午在巴黎，下午就要到波尔多了，无论如何抓紧时间休息都是很累的。\n在芙宁娜疲于奔命的同时，人们的耐心也在不断消减......日子一日一日地过去，既不见这届万恶的内阁解散，也没有那些畸形的机械怪物被撤走的迹象。于是一种声音开始出现......芙宁娜是隐藏在这场阴谋深处的主谋，好在，这种说法信的人还不多。"
 Fontaine_revolution.9.a: "好事为何会做成这样呢"

 Fontaine_revolution.10.t: "诚心"
 Fontaine_revolution.10.d: "行程很赶，人心更急。芙宁娜不断奔走，为了给内阁争取更多时间做出对策，可是事到如今她也有些泄气，日日奔忙的疲劳不说，人们的耐心似乎也已消磨殆尽。现在，要求，招致反感，呼吁，遭到抵制。风波还没有结束，农业生产的停滞让不少的抗议者饿了肚子，因而倾向于选择快点了解这场斗争，不管是暴力的还是和平的。\n还想要争取时间，似乎只能摆出足够低的姿态......足够诚恳的态度，才有机会激发一些人的同情，延续一点耐心，芙宁娜不知道该怎么做，面对怨气冲天的人们，她的大脑一片空白——在某一时刻，巨大的压力如洪水般倾泻而来，击垮了她的一切，膝盖不受控制地软了下来，泪水如注，夺眶而出。于是，枫丹有史以来最戏剧性的一幕发生了，芙宁娜，向面前的万千群众跪下了，双手紧握，嘴里念念有词——尽管在场的人们听不清，但行动胜于言语，那时所有人都被震惊，嘈杂的广场鸦雀无声。"
 Fontaine_revolution.10.a: "武力无法维持的局势，诚心却可以。"

 Fontaine_revolution.11.d: "投身新闻事业，一掷十年光阴。在最初的最初，夏洛蒂的理想，只是向千万群众展示这个社会最真实的样子，像是成为国家元首之类的事情，是她从未奢想过的。然而，十年以后，历史将她推到了这样未曾设想的位置，此般戏剧性的变化，在让她的激动之情溢于言表的同时，也将海山般的压力倾注于她，在她跨步走进沫芒宫之时，不禁感到一阵头晕目眩，现实如同一场无比真实，却无法醒来的幻梦，不管怎样，她已然成为枫丹的总理，世界上最有权势的人之一。在拥有权力的同时，她还要为所有枫丹国民，乃至世界人民所负责，对于二十几岁的少女来说，这样的责任似乎是无比残酷的。\n\n“我宣誓......”夏洛蒂一手轻颤着放在枫丹的宪法书上，她的面前是，满脸不高兴的芙宁娜，和板着脸不发一言的克洛琳德，娜维娅看起来倒是很放松，抱着胸，饶有兴致地看着这场宣誓仪式，夏洛蒂努力构思着今后她该如何与这些她并不熟悉的人朝夕相处，一起操纵共和国的船舵......但现在更重要的是念完宣誓词...\n“我一定忠实执行共和国总理职务......”脑海此刻风起云涌，百感交集......只剩最后一句话了，夏洛蒂却犹豫了很久，她看向窗外诸多期待着的眼睛，思考如何才能不负这样的感情。\n“竭尽全力维护、保护和捍卫共和国宪法”。"
 Fontaine_revolution.11.t: "宣誓就职"
 Fontaine_revolution.11.a: "是的，决不辜负。"

 Fontaine_revolution_news.1.t: "枫丹革命"
 Fontaine_revolution_news.1.d: "自动化引发的失业大潮迅速恶化为一场社会全方位的危机，枫丹的社会根基因而遭到了动摇。这时，枫丹共产党抓住了机会，将工人们组织起来，发动了一场规模空前的大游行，逼迫内阁下台。现在，他们成功了，共产党人成功独霸联合政府，并成为了事实上的执政党。\n\n新政权很快得到了苏联等社会主义国家的承认，但英美皆对此事不予置评。在巴黎公社的几十年后，红色旗帜再度在巴黎飘扬，一颗西欧的共产主义孤星已然升起。"
 Fontaine_revolution_news.1.a: "(欢呼)"

 Fontaine_revolution.12.t: "沉默的对峙"
 Fontaine_revolution.12.d: "可惜...不，应该说是可怕的是，即使是军队，亦未能吓退集聚的罢工者。而军队只是得到了调令，前来首都执行戒严任务，开枪，是绝对不允许的。两派人马就此隔着数十米，沉默地进行着对峙，尽管工人们大多手无寸铁，但他们并不惧怕对面荷枪实弹的军队，一方面，他们的身后站着无数的同道中人，他们相互鼓励，力图让彼此坚持下去，另一方面，他们并不相信，敬爱的芙宁娜·德·枫丹女士，会真的下达开枪的命令。\n\n而在时间到了晚上，在枫丹共产党的总部——加莱，蒸汽鸟报的编辑们发布了一纸文书，著名是夏洛蒂。而内容大概是，现在和平地要求内阁辞职的可能性已经微乎其微，枫共是时候考虑武斗的可能性了。而共产党内部经过讨论以后，认为此次机会实在难得，除了放手一搏，以外别无选择，因此，各地的民兵被迅速地组织了起来，武装起义似乎迫在眉睫。"
 Fontaine_revolution.12.a: "局势似乎有些失控了......"


 Fontaine_revolution.13.t: "一个艰难的抉择"
 Fontaine_revolution.13.d: "夏洛蒂不记得自己是何时立下当记者的理想的，也许是某个蜷缩在学校阴暗角落里的某个午后，抑或是某个眼见不义而无能为力的时刻，而让群众知道，了解这些事的真正原貌，掀起对于不公的怒火的愿望，就此生根发芽。\n毕业以后，夏洛蒂真的如愿成为了一名记者，但，世界上真的只有自己立下过这样的宏愿吗？哪怕剧烈的社会动荡近在眼前，为何各路媒体总司噤若寒蝉？记者的嘴，为何总是紧紧地闭着呢。显然，总有一些事情是不能说，不敢说的。迟钝的夏洛蒂在成为了记者以后，才意识到了这样一个简单的事实——但对于记者来说，捂住他们的嘴，如同砍断医生的手，总是会让人因为无法施展抱负而痛苦不堪，而夏洛蒂的这张嘴，注定是要说出了别人与众不同的话的。\n也是不知通过什么路子，夏洛蒂知道了枫共，在对它的理论有了基础的了解以后，便毫不犹豫地加入了。幸运的是，党很重视像她一样懂得舆论造势的人才，于是便很快安排她进入了党刊的编辑部。在尚未执政的时代，党刊，几乎等同于党的组织，夏洛蒂的才华在此得以展现，枫共绝大多数的文件都要经过她的审核和编辑，她的地位也因此一路水涨船高，最后在一次大会上，被选举为副总书记，地位仅次于莫里斯·多列士先生。在刚刚组建民主党派与共产党人的联合政府的时候，夏洛蒂因此顺理成章地进入了政府工作，但时间走到现在，党号召她立刻前往加莱报道，显然，是有大事要发生了。\n夏洛蒂陷入了犹豫，尽管她对罢工的支持是理所应当的，然而起义，是她不得不仔细考虑的抉择，毫无疑问，当下正是一个千载难逢的良机，可是，夏洛蒂还是对枫共的力量十分担忧，从联合政府成立以来，枫丹已经在枫共的推动下取得了巨大的进步，可一旦选择武装斗争，成功当然是最好的结果，但一旦失败，几乎可以肯定枫丹将会经历一场声势浩大的倒行逆施，在平等方面所做的努力全部作废，甚至......意味着一场血腥的屠杀。\n孤注一掷自然是很难的，可是，从此以后，真的还有这样的机会吗？回顾自己过往人生的二十余年，自己似乎从未离自己的梦如此之近。"
 Fontaine_revolution.13.a: "收拾一下，出发。"
 Fontaine_revolution.13.b: "收拾一下，出发"

 Fontaine_revolution.14.t: "最终裁决"
 Fontaine_revolution.14.d: "平日里凌乱的办公桌，今日只摆放了两样东西——一份只有寥寥数页的文件，以及一只钢笔。芙宁娜要处理的并不多，只需要在落款处签上自己的名字，今日的工作便可以宣告结束，可是这样的工作，从清晨文件被放到办公桌上，到黄昏的落日时分仍未完成，这并非是因为拖沓，而是因为构成芙宁娜·德·枫丹的这短短的十六个字母，承载了窗外仍在期待体谅，数以万计工人的生命。\n文件递交自参议院，简要地概括一下，便是为了维护社会秩序，保护国家安全，应该授权军队采取一些必要措施……维护秩序？听起来倒是冠冕堂皇，可是芙宁娜难以想象，军队会如何对待她深爱着的人民，回想上任以来，自己以人民的名义推动了一项一项的法案，讲自己的无数的爱意散布到人间的各个角落……可事到如今，自己居然要把枪口对准先前为他们而不断努力的人民，也许，在此之后，一切的信任，爱，以及过去所有的努力，都将如晨间朝露般顷刻之间烟消云散了。\n秩序，可以保护更多的人……？听起来是个不错的理由。芙宁娜轻颤着拿起钢笔，又是犹豫良久后放下。回想历史，与现状最为接近的，便是1871年的巴黎，那年的事情，是毫无疑问的惨剧。芙宁娜并非梯也尔，可以毫无心理障碍地签署法案，让人民的尸体横陈巴黎街头，但自己却即将做出和他无异的行为——只不过是以爱的名义。\n芙宁娜望向天空，试图从这份沉重的文件中暂时解脱出来——今天也是不错的天气，夕日的阳光映射出天边赤红的云彩，铺匀了满天，在原处蓝天与红色的交织之处，却是一片紫色的霞光……奇怪，也就是说……芙宁娜打了一个冷战，自己还是无法从思维的牢笼中脱逃。\n直到夜幕降临，芙宁娜还是没有说服自己，又一段来自故土的记忆涌入她的大脑——爱人的不被人所爱，忠于国家的反被国家背叛，不可避免走向末路的水之魔神，她的眼睛究竟看到了什么？——人类性命不过须臾，又岂能和守望这片土地，动辄千百余年的神相比呢？神之所见所闻，所感所想，皆是凡人无法到达之境，神服从于人类的狭隘之见，就无法更好的爱人；目之所视如果只有一个阶层，一个地区的人，就无法更好的爱全境的子民。\n芙宁娜终于想明白了这一切。如今的枫丹需要的不是罗伯斯庇尔和他的雅各宾，而是波拿巴和他的近卫军。世界的风暴近了，她必须捍卫她的人民。"
 Fontaine_revolution.14.a: "火光四起之时，幻梦破碎之日。"
 thirty_days_ultimatum: "§R三十天，最后通牒！§!"
 Fontaine_revolution.15.t: "最后通牒"
 Fontaine_revolution.15.d: "天空伴随着飞机引擎的轰鸣下起了传单之雨，内容很简要，但也足够重磅——要求公社在一个月内缴械投降，否则枫丹陆军将立刻对公社发起攻击。\n没人对宣战的内容感到意外，令人惊讶的反而是共和政府居然还给了一个月的时间进行考虑——事到如今，怎么可能考虑投降，唯有抵抗到底。"
 Fontaine_revolution.15.a: "必须加紧准备......"
 Fontaine_revolution.16.t: "普罗旺斯地区的异动"
 Fontaine_revolution.16.d: "南部的滨海的普罗旺斯地区近期的治安似乎正在快速地恶化。在马赛的街头巷尾，越来越多的暴力事件正在发生，最为恶性的，是几个警察局的劫案，似乎相当多的武器流落到了民间......"
 Fontaine_revolution.16.a: "需要多加注意......"
 Fontaine_revolution.17.t: "普罗旺斯暴动"
 Fontaine_revolution.17.d: "一切事情总是事出有因，普罗旺斯地区异常的暴力事件也是如此，零星的劫案的目的已经明了——就是制造混乱，夺取武器发动起义，而现在，已经太迟了......"
 Fontaine_revolution.17.a: "可恶......"
 Fontaine_revolution.18.t: "普罗旺斯的同志加入了我们"
 Fontaine_revolution.18.d: "早在罢工刚开始的时候，普罗旺斯就是斗争最为激烈的地区之一，在枫丹军队大多正在与我们对峙，普罗旺斯地区守备松懈之时，工人们抢劫了当地的警察局，从而获得了大量武器......这样大的动静不可能不引起注意，在大规模搜捕行动开始前夕，当地的党组织召集起工人们，分发武器，正式发起了暴动。"
 Fontaine_revolution.18.a: "欢迎"

 Fontaine_revolution.19.t: "工作会议之一-领导"
 Fontaine_revolution.19.d: "这场会议参加的人很少，当然，会议场地也容纳不下那么多人，在公社的控制区，可找不到千人的大会堂。参加会议的，来自枫丹共产党的就只有总书记多列士，以及副书记夏洛蒂，其他人均来自社会各界，一共十三人，很少，只是围坐在蒸汽鸟报社会议室的圆桌旁，他们这一小群人当然无法代表控制区内的百万群众，但公社的命运就系于此。\n\n没有开幕致辞，也来不及唱国际歌，第一个紧要的问题很快就被提了出来——谁来领导公社？显然，这是个不是问题的问题，枫丹共产党在组织了起义前后的一切事务，领导权理应落在他们手里。这对于全国总工会来说是一个令人沮丧的事实——自己在整场革命中只起到了副手的作用，不过，当下的形势实在没有让工会不满的空间了，因为现在团结尚有一线生机，而不满则是必死无疑。"
 Fontaine_revolution.19.a: "领导也许并不意味着高高在上。"

 Fontaine_revolution.20.t: "工作会议之二-军事"
 Fontaine_revolution.20.d: "早在1929年，中国的同志们，就召开了一次在政治与军事上影响都极为深远的会议——古田会议。\n军队是一个国家最难以驾驭的力量，在经济上，便表现为无限扩张的军事工业，而在军官上，则是渴望通过战争让自己加官进爵，这两股力量构成了军队无法停下的战车，一旦失去了控制，就会像意大利一样，走上无止境的扩张之路，最后在某一次大败中彻底葬送国家与人民的一切。\n而古田会议，在一方面便是针对军队难以控制的问题而召开的，其最重要的成果就是，中共从此确定了对军队的绝对领导，绝不会出现军队独立于党政之外的情况，并拥有了一套理论体系，即红军决不是单纯地打仗的，它除了打仗消灭敌人军事力量之外，还要负担宣传群众、组织群众、武装群众、帮助群众建立革命政权以至于建立共产党的组织等项重大任务。\n但这种理论也受到了一定的批评，打仗，毫无疑问是一种专业的事，而专业的事，交给专业的人干总是令人放心，而这个专业的人，毫无疑问指的就是军官，而党员也许懂政治，却不一定懂得军事，尽管中国共产党的领导者——毛泽东，具有无可争辩的天才军事才能，可真的每一个政委都能像他那样，总是给军官指出正确的道路，而不是指指点点，反而成了蹩脚司令？"
 Fontaine_revolution.20.a: "我们为什么要向一个至今蜷缩在穷乡僻壤的党学习呢？"
 Fontaine_revolution.20.b: "中共的理论很有用。"

 Fontaine_revolution.21.t: "工作会议之三-经济"
 Fontaine_revolution.21.d: "马克思说，经济基础，决定上层建筑。有什么样的生产方式，就有什么样的文化，制度，社会结构。社会是一个有机实体，每一种政策，对于社会的影响是方方面面的，拿最常见的鼻病毒举例，若是免疫系统不加管束，它的影响就不止于呼吸系统，而扩张到整个人体的各个系统中了。错误的经济政策，就如同病毒，也许初期看来总是问题不大，但如果一直运行下去，终有一日会导致社会主义制度的彻底崩盘。\n在公社，市场经济是被彻底否定了的，主要的争执便是共产党人的主张于总工会意见相左，即计划经济与工人自治的冲突。"
 Fontaine_revolution.21.a: "共产党人的主张获得了支持"
 Fontaine_revolution.21.b: "总工会的主张获得了支持"
 unlock_focus_to_learn_soviet_red_army: "解锁向§Y苏军§!学习的§Y国策分支§!"
 unlock_focus_to_learn_cpc_army: "解锁向§Y中国工农红军§!学习的§Y国策分支§!"
 unlock_focus_to_learn_soviet_red_army: "解锁向§Y苏军§!学习的§Y国策分支§!"
 unlock_focus_to_learn_cpc_army: "解锁向§Y中国工农红军§!学习的§Y国策分支§!"
 the_leader_changed_while_soul_not_change: "尽管领导人变更了，但§Y公社精神§!仍存。"
 japan.19.t: "近卫内阁倒台"
 japan.19.d: "我们的首相，近卫文麿，在对美问题上一直十分犹豫，当然这种犹豫并非是没有理由的，因为任何一个正常人都不会想要惹上美国这样一个世界级的超级大国，但现在对美开战已经成为了举国上下一致的声音，失去理智的军部一直对近卫步步紧逼，在意识到这场战争无法避免以后，近卫选择了辞职以试图明哲保身。"
 japan.19.a: "事已至此，我们再无退路。"

 japan.20.t: "广田弘毅退休"
 japan.20.d: "任何明眼人都能看出来，日本在未来必定有一场昏天黑地的大战要打，广田弘毅知道这一点，但他无能为力，尽管他反对战争，然而军部正在逐渐凌驾于政府之上，他越来越无法控制这一头野兽，年事已高的广田弘毅心力憔悴，遂告辞职。"
 japan.20.a: "重新组阁。"

 japan.21.t: "近卫内阁"
 japan.21.d: "早在广田弘毅辞职之时，近卫便已经是日本政界的明星，并且一度被广田弘毅推荐为下一任内阁首脑，但他自己出于各种原因而拒绝了，现在，自觉时机成熟的近卫文麿在林铣十郎下台之际不再推脱，成功组阁。"
 japan.21.a: "这届内阁最好挺得久一点。"

 French.84.t: "共产党与工会的矛盾激化"
 French.84.d: "一场社会主义革命的全局工作，应该是由工会组织，让工人们去自发地完成，还是有一个强大的政党统筹全局？这是左翼一个老生常谈的问题，好吧，尽管很老套，但也算是核心问题之一。本来这场革命风暴来临时，这个问题被暂时地搁置了，党与工会紧密地团结了起来，但随着政府近期的一系列操作，这种联系不再那么紧密，在共产党发现了工会与政府秘密的往来以后，全党都出离愤怒了，浪潮般的指责之声席卷而来，尽管还有人铭记统一战线的方略，但团结的声音还是湮没在了分裂中。\n\n莱勒·儒奥，工会的领导者，与莫里斯·多列士尽管还在同一旗帜之下，但恐怕早已貌合神离。"
 French.84.a: "奏效了。"

 French.85.t: "风云初定"
 French.85.d: "这天，沫芒宫前巨大的广场不再像往常一样人头攒动，除了一面红色旗帜下紧紧依偎着的百余人，唯有泉水静静流淌。\n人都去哪里了？如果不是人间蒸发，那便只剩下一种可能性了，不再有人去鼓励，组织罢工者去游行了。现在，得不到指示的工人们不知所措，便去做自己的事情去了，剩余的人只是仍在苦苦坚持的共产党人。\n不得伤害她的人民，是芙宁娜的准则。虽说，这种理念颇有一种朱允炆下令不得伤害朱棣的愚意，但也确实值得肯定，那么，千百万群众的气势是这场革命成功的可能性所在，在绝大部分人离开以后，共产党人再无可能扭转局势，因为他们已经是无源之水，失去了最稳固的靠山，军队，警察，可以随时以威胁国家安全的名义逮捕他们，逮捕共产党这种事，在全世界都不稀奇。\n转机来自于一则工会放送的广播，一直以来，广播是工会指挥工人运动的中枢，但现在，这里播放的是“投降书”——停止罢工的声明，工会主席莱勒·儒奥公然宣布工会的诉求已被满足，因而继续罢工失去了意义，希望工人们尽快回到正常的生产工作中。\n这则广播对整个左翼阵营的士气造成了极为严重的打击，现在，继续苦苦支撑的共产党人成了孤家寡人。"
 French.85.a: "回归秩序。"

 French.86.t: "流亡"
 French.86.d: "全完了，巴黎城中红旗如画，再造一个公社的幻梦，已然破碎了。寻寻觅觅，冷冷清清，夏洛蒂的身边再也找不到一位同志，现在，她看向人民的目光依然热情如故，但回应却是冷眼，毫无疑问，这场戏以一个悲剧的结尾草草谢幕了，总书记，莫里斯·多列士，已经很久没有他的消息了，其他的同志，也在一个接一个地消失。\n不知何时，在夏洛蒂的宅邸附近，也出现了一群可疑的人，每当她归家，便有一种被跟踪的不详感觉，她当然知道自己正处于何种境地，她赶快离开了自己的住所，但被跟踪的感觉依然存在，又是一周过去，她再也联系不到任何同僚，也许，她是最后一个尚且自由的高级干部。\n可自己既然有这种感觉，那么只能说明一件事情——她早已被警察盯上，现在，无数的眼线在她的周围构成了一张水泄不通的天罗地网，而上方，是一把利剑，只是尚未掉落而已。\n那自己究竟有什么理由暂且不被逮捕呢？这才是夏洛蒂真正困扰的地方。在排除了所有的可能性以后，只剩下了一种最为离奇的情况——这是因为自己的枫丹人身份，而不得逮捕的指令，直接下达自芙宁娜。\n\n翌日。\n夏洛蒂穿着一件土黄色风衣，紧紧收紧衣服，以免被客机的巨大引擎吹得下摆乱舞。站在舷梯上，回望风光旖旎的塞纳河区，那时，夕阳将波光粼粼的塞纳河染成了金色，绯红的天空挂着几朵绵密的火烧云，与巴黎市区连为一片。巴黎本就是以浪漫著称的城市，在拿破仑三世对其进行改造以后，结合自然景观，即使是最哀伤的人也会为此美景而动容，但对于夏洛蒂来说，她已经无心欣赏了，因为个人的哀思也许可以通过美景来消解，但整个枫丹，都已经是她的伤心之地了，不知何时，山上山下，红旗如画的场景才能再度在她的国家展现出来，几十年前，巴黎公社的失败令她痛心。近在眼前，另一场革命再度以失败告终了。\n机舱门口，再度回望。泪水不禁涌出。"
 French.86.a: "再见了，我的祖国......"

 French.87.t: "半成品版本提示"
 French.87.d: "是的，如题所示，这次更新更了一个半成品。\n为什么要把半成品发出来呢？好吧，主要是为了防止大家觉得这个mod停止更新了。\n事情是这样的，作者刚刚上高中，不能走读，只能住宿，平时估计是没有机会写点什么了，完整的红线可能要到寒假才能做完。至于现在，权当是一个原版的小拓展了"
 French.87.a: "我向玩家保证，永不停更！"
 french.test.1.t: "肖像选择"
 french.test.1.d: "嗯对的，我觉得在未来，如果有大佬写出在游戏内可以直接上传文件的神级代码的话，那芙宁娜的肖像也就可以自定义了，但很可惜目前做不到。所以我提供了四个选项——其实是三个，因为有一个是原来的——供你选择。顺序和决议栏里所展示的是一样的。"
 french.test.1.a: "QUAN的最可爱！"
 french.test.1.b: "还是原来的吧。"
 french.test.1.c: "换一个视角呢？"
 french.test.1.d.2: "经典但是新的形象。"

 # 社民线事件
 French.500.t: "逆转的序章"
 French.500.d: "晚宴归来的路上，芙宁娜·德·枫丹收起了她演员式的职业笑容，迷人的脸上泛起一丝愁绪。透过车窗，夜晚巴黎的街道显得平静安宁，但街上出现的稀稀落落的游荡的工人却好像执意要打破这层假象。枫丹——这个因为芙宁娜的入主而得到新名字的古老国度——正因为新技术的快速推广和激进的经济政策而饱受普遍失业的困扰。现实就是如此残酷，辘辘的饥肠能击穿一切幻想，纵使有着极具号召力的言辞、风趣又不失优雅的举止，芙宁娜也不能使自己免于民众们的怒火。\n芙宁娜轻轻摇了摇头，从纷乱的思绪中解脱出来，自信的笑容重新浮现在她的脸上，是的，无需惊惶，这场危机和她前不久在另一片大陆上经历的比起来，还算不了什么。法兰西上演的这出大戏，不过刚刚拉开了序幕。"
 French.500.a: "来吧，华丽的逆转！"

 French.501.t: "意料外的拜访"
 French.501.d: "马塞尔·德阿对于芙宁娜的屈尊拜访感到吃惊。\n 虽然时局对于芙宁娜来说已是捉襟见肘，但德阿并没有在这位淑女脸上找到一丝窘迫。“她要么有超过30年的从政经验，要么就是欧洲有史以来最出色的演员”，德阿不禁在心里暗讽。然而，芙宁娜对政局的见解，对改良主义的侃侃而谈不免让他动心，关于共产党在未来可能进行的清洗的恫吓则让他有些动摇。\n在芙宁娜告辞时，德阿芙宁娜非常复古地行了手背礼。德阿觉得这位来历不明的少女有种高贵、不容抗拒的气质。法皇的血脉几近断绝，但他觉得这项礼仪恰到好处。"
 French.501.a: "获得社会主义计划派的支持"

 French.502.t: "芙宁娜在工会的演说"
 French.502.d: " “国有化的实质与其说是所有权的转移，不如说是统治权的转移”，芙宁娜滔滔不绝地雄辩着，让听众丝毫不会怀疑她是否真的明白这些概念，“我们驳斥弥撒亚式的信念，末日审判没有到来。人们不要相信它即将来临，也不要相信它的必然性；人们捍卫民主制、法郎、工会、改良措施等。这些目标已经实现并成为公民的既得利益。” "
 French.502.a: "工会联合会向芙宁娜倾斜"

 French.503.t: "风雨前夜：第二次审判"
 French.503.d: "“所有历史事件都会发生两次，第一次是悲剧，第二次是闹剧”。枫丹动荡的大戏的第一幕终于奏响了终曲。 \n巴黎革命广场，几个月前，共产党人扬言要在这里审判另一位暴君，如今，这个剧本没有得到完美演绎，审判以原告的缺席而不了了之。在催促工作人员搬走断头台后，庆幸于不用第二次坐上被告席的芙宁娜在沸腾的人群中发表了演说：“500年前，对贞德不正义的审判激起了法兰西人民的怒火，于是，法兰西人用勇气铸造了自己的民族；150年前，人民审判了暴君，用他的鲜血浇灌出了自由之花朵，并把我们的理念传遍了整个欧洲；今天，我们又一次面临了命运的审判。感到骄傲吧，公民们！这一次，我们用团结的方式渡过了难关。\n在此，我，芙宁娜·德·枫丹，宣判自己无罪！”\n为自己开脱后，芙宁娜长松了一口气，在欢呼声中为这场闹剧画上了句号。将爱舍丽宫更名为沫芒宫的提议也很快被通过——新闻界解读称这是芙宁娜在宣誓自己的胜利以及对总统宝座的主权——不过这种那种都无所谓了，法兰西人从不会拒绝美丽少女的小小任性。 "
 French.503.a: "致团结的法兰西"

 French.88.t: "芙宁娜计划"
 French.88.d: "枫丹提出了一系列旨在恢复我国经济的倡议，这些倡议的总称便是芙宁娜计划，这些内容对我国的发展无疑是有利的，但也有可能对我国的主权造成严重的威胁，我们是否应该批准该倡议?"
 French.88.a: "吃饭要紧。"
 French.88.b: "我们不能把主权置于如此危险的境地。"

 French.89.t: "[FROM.GetnameDef]批准了芙宁娜计划"
 French.89.d: "[FROM.GetnameDef]政府对我们提出的各项倡议相当赞赏，并且在近期发表的政府公报中明确表示他们将全面采用芙宁娜计划，同时也会在一定程度上接受枫丹在各个领域中的合作。"
 French.89.a: "眼光不错。"

 French.90.t: "[FROM.GetnameDef]否决了芙宁娜计划"
 French.90.d: "[FROM.GetnameDef]政府在发给我们的回应中明确表示，芙宁娜计划的初衷无疑是良好的，在经济层面上的措施也的确是良好有效的，然而，他们认为，这种在经济上的一体化会对他们国家的主权产生严重的威胁，因而在斟酌以后，便予以否决。"
 French.90.a: "主权在民，可饥民会怎么想呢。"

 French.91.t: "来自德意的商品冲击我国经济"
 French.91.d: "我们推动欧洲联盟经济一体化的过程似乎快了一些，根据我们协议的规定，参与芙宁娜计划的各国应该减少，或者取消各国间的关税，作为计划的发起者，枫丹便把对德，对意关税完全取消作为表率。\n应该说这么做从长期来看是不错的，但我国的企业没有来得及为此做出调整，就被来自德国，意大利的各种商品抢去了市场。虽然我国产品的质量是可以担保的，但德意新生的工业显然立志走廉价路线，似乎更具竞争力。\n这个状况对我们的经济造成了一定的影响，不过因为我国庞大的经济体量，影响多半只是暂时的，很快就会恢复正常。"
 French.91.a: "莽撞了......"

 French.92.t: "三国首脑会晤"
 French.92.d: "昨夜，芙宁娜一宿未眠。并非因为忧虑，而是因为神经的极度兴奋。比计划早了许多，没人能想到欧洲的统一进程会如此顺利，在欧洲大陆上酣战数百年的几个民族，可以在一年内放下往日恩怨，团结起来，面向未来。\n\n也许应该吃点安眠药的，因为今天实在是个重要的日子，睡眼惺忪地参加枫丹，德国，意大利三国的元首会晤，也许少了些外交上的礼节。再转念一想，反正这次会议上谈的肯定是些无聊的问题，自己可以装出一副沉思状，偷偷补觉，至于紧绷着神经，绞尽脑汁地思考，与其他两方进行周旋什么的，交给我们信任的外长克洛琳德便是了。\n\n一路被仆从近似于拖着拖进了枫丹白露宫以后，克洛琳德看着她这副睡眠不足的样子，只得无奈地笑笑，便走进会场去了。\n德国总理康拉德·阿登纳今天是亲临会场，规格不可谓不高。坐在他身边，个子不高，其貌不扬的，便是维托里奥·埃马努埃莱三世，意大利国王。既然这样，芙宁娜不出席是真的有些失礼了。在咖啡的加持下，会晤还是顺利地召开了。"
 French.92.a: "嗯哼"

 French.93.t: "极右翼恐怖分子袭击"
 French.93.d: "又是无聊的一天，芙宁娜在心中抱怨道。政治家的事务总是那么繁杂，本来两到三天完全可以讨论完成的事务，居然硬生生地被延长到了一个月之久。在这一个月里，芙宁娜每天都要像尊塑像一样僵坐在会场里，不来的话，害怕有失礼仪，动了，又损害形象，实在是件苦差事。至于讨论，也不需要芙宁娜参与什么，她来的目的，就是为了表达一个态度罢了。\n\n正当芙宁娜倦意滚滚，行将入睡之时，窗外几声凌乱的枪响突然把她惊醒，会场中的人立刻警戒起来，多半是恐怖分子！胆小的埃马努埃莱三世吓得躲到了桌子底下，至于历经了地下工作的阿登纳，则更体面一些，从容地从桌子上起身，避开射击的危险范围，寻找掩护。至于芙宁娜，还没反应过来，便被克洛琳德猛地压倒在了地上，一时间有些喘不过气来。\n枪声逐渐密集了起来，大概是警卫正在组织反击。克洛琳德判断恐怖分子还不清楚政要在哪个房间里开会，于是便起身给自己熟悉的老战友——一把具有雷元素附魔的铳枪上膛。可惜，没有她大展身手的机会，战斗已经结束了。城外的驻军反应相当迅速，不到十分钟就赶到了宫殿外围，意识到大势已去的恐怖分子准备撤退，可惜为时已晚。\n\n事后，军方给出了一份结论，恐怖分子自称是火十字团的旧部，他们在被解散以后依然坚持活动，听闻欧洲即将一体化之时，他们便感到怒不可遏，于是便策划了这一出。\n尽管警卫部队仅有一人死亡，三人受伤，而歼灭的恐怖分子却多大十几人，军方和警方还是主动作了检讨，地方警署负责人则引咎辞职，当然，一经挽留便打消了这个念头。"
 French.93.a: "看来统一的理念并非受所有人的欢迎。"

 French.94.t: "多个城市的暴力事件"
 French.94.d: "不久前的暴力袭击枫丹白露宫事件似乎起了带头作用，现在，在勃兰登堡，巴伐利亚，莱茵兰，普罗旺斯，伦巴第，罗马等多地多个城市都出现了类似的事件，虽然他们的手段各不相同，有的是绑架政府官员，有的则是单纯的制造伤亡，营造恐怖氛围，但他们的诉求大多是一致的，那便是反对欧洲的一体化。可笑的是，他们的行动无一成功，十几件暴力事件造成的伤亡还不到十个人，而经过调查，背景也出奇地一致——右翼政党，或至少发表过右翼言论。\n在各国左翼的支持下，各个社区纷纷成立了小规模的民间团练，有个代号，叫做“理发师”，目的是就地把恐怖分子解决。"
 French.94.a: "但大势决不可逆。"

 French.95.t: "仪式前的最后准备"
 French.95.d: "各项议程终于宣告完成。而最终的统一，如此重大的事件，自然是需要一场盛大的仪式来完成的，而仪式举办的地点，毫无疑问，自然是现在整个欧洲的心脏——巴黎。\n\n在拿破仑三世以前，巴黎尽管是欧洲首屈一指的大城市，但却并没有今日的如此荣光，甚至可以说是一座肮脏，贫穷而混乱的城市。拿破仑三世时期，便对整个法兰西的核心进行了改造，尽管住在这里的人大多数依旧平穷，但至少没有如此肮脏了。\n1889年，为了举办世博会，同时也为纪念法国大革命一百周年，巴黎当局决定在此修建一座地标，建什么呢？高塔，宫殿，甚至是大断头台？而最终的方案，是一座铁塔。这是令相当多文豪激烈反对的计划，但其落成以后，却反而成为了巴黎这座城市所谓浪漫的标志。\n\n巴黎摆脱贫穷这一最后的缺点，还是最近的事情，这便不再是法兰西共和国的功劳了，而是枫丹与她的女儿，芙宁娜的功劳了。毫无疑问，这已经是一座充满了光荣的城市。在以前，每每巴黎举办国际性的盛会，比如莫城等平民区都是禁止入内的，因为那里污水横流，贫民们填不饱肚子，抢劫等暴力事件层出不穷，只是害怕外国人看到法兰西黑暗的一面罢了，如同安排一块背景板遮住法兰西地不堪。但现在，整个城市都可以被光鲜地展示给世人了，这一切都源于公平的降临，有了公平，那么贫穷便也逐渐地消失了。\n\n写到这里，居然回忆了这么多巴黎的往事，姑且把这些算作是芙宁娜在埃菲尔铁塔上眺望整座城市时的所思所想吧。三天以后，仪式便要正式举办了，整个巴黎都洋溢着欢乐的气氛，虽然说气球有些幼稚，但渲染一下开心的气氛还是不错的。要补充的一点是，前几天巴黎刚刚完成为庆祝的改造，主要便是给巴黎装上了枫丹的最新科技——LED灯，现在，即便在晚上，埃菲尔铁塔也可以放出绚烂的光彩了。其实，芙宁娜不喜欢这个改造，因为它只有红光和绿光，调配不出多么丰富的颜色，但既然是最新的科技，展示就展示吧。毕竟，在至臻美丽的人与人情之前，这点缺憾也是不足为道的。\n芙宁娜新订的礼服也是“人美”企划中的一部分，它由千织屋出产，面料精致，相当舒适，尽管全部只由朴素的布制成，而没有珍珠宝石之类的东西镶嵌，但它依然显得华美无比，也许这就是千织的厉害之处。\n\n在芙宁娜看不到的地方，仪式的准备工作正在缓缓进行中，从殖民地购买的食材刚刚空运抵达巴黎，技工倒是基本上完成了自己的工作，到了点便回家休息了，但文职人员还不能松懈，活动太过庞大，要协调起来的确是相当麻烦的事情，但是没有关系，欧洲统一的那一刻，一切的准备工作都会被证明值得。\n也许会有人指出这太奢侈，但从目前的情况来看，枫丹的确可以负担得起。"
 French.95.a: "真让人期待"

 French.96.t: "大典"
 French.96.d: "的确，庆典的繁华程度的确对得起枫丹长达一个月的认真准备。这天，巴黎芙宁娜国际机场甚至是禁飞的，因为害怕巨量花火所致的光污染影响飞行，而花费无数的食材，也在大厨的技艺之下最大程度地发挥了它们的价值，好在巴黎地基础设施够硬，否则庆典结束后的卫生又是一个大问题。来的人实在太多，巴黎万人空巷，若是在街头打听别人的籍贯，那想要找到一个巴黎本地人也是相当艰巨的任务。枫丹南部离这里太远，倒是没多少人来，但来自巴黎周围地区的可就太多了，还有专门前来参加的“准”欧洲人，大概三分之一的参与者都不讲法语。\n\n要说人群最密集的，还得是凯旋门前，整个巴黎的道理，都是由环绕凯旋门的道路辐射出去的，更重要的是，这里是宣布欧盟成立的地点，外乡人们可以见到传说中美得不真实的神明大人——芙宁娜·德·枫丹，与她共同见证这一历史性的时刻。而现场的有些太过嘈杂，即便使用扩音器大喊肃静，也只得淹没在人声鼎沸的海洋之中。真正听见欧盟成立，欧洲统一的庄严宣誓的，反而只占少数，只是没听见的人听见听见的人的欢呼，便也欢呼了起来。"
 French.96.a: "欧洲明天更好！"

 Fontaine_revolution.25.t: "报告:揭发吸血鬼克洛琳德的材料"
 Fontaine_revolution.25.d: "“真是怪了，”夏洛蒂推了推自己的单片眼镜，不耐烦地抱怨道，“群众的来信如果有用，我们大不了开个小会讨论一下就好了嘛，有什么信是要这样严实地装在档案袋里递到我的桌子上啊？”。\n夏洛蒂心不在焉地撕开了档案袋，准备看看是怎样的机密需要被封装地如此严密，可她一看到这份来信的标题，便猛地倒吸了一口凉气，倦意全无：揭发吸血鬼克洛琳德的补充材料。\n\n看起来，这不仅是一份来信，更是一封即将带来腥风血雨的宣战檄文。\n\n夏洛蒂赶紧看下去:\n克洛琳德在生活上追求享受、吃喝玩乐、铺张浪费，造成了极坏的政治影响，是一个彻头彻尾的吸工人阶级血的党内走资派。\n一、未看到她学习马克思主义理论，她的桌上仅有的一本《哥达纲领批判》，她的女仆每天去打扫卫生，看到老放着不动。本来这是送给她阅读出版的，可是她无动于衷。还有好几次党中央的政治局会议，都说是因为身体原因不去了，然而根据女仆的口述，说这些时候克洛琳德并无任何身体不适，原来是潜伏到了诺曼底一带的沙滩上，晒太阳，打排球玩，说明她根本不关心国家大事。\n\n二、生活上吃喝玩乐，奢侈浪费，大肆挥霍浪费国家资财。据不完全统计，一百多天里，她和用人一共五人，仅伙食费共用去了九千二百多法郎，除去警卫部队、工作人员伙食补贴、夜餐，挥霍了四千二百多法郎。她来的时候行李很多，什么羊角面包，咖啡豆，丝巾，甜点心......，不计其数，根本不做什么工作，成天吃喝玩乐，严重挥霍国家资财。她几乎天天睡到下午二点才起床，有时更晚，起来以后，吃完了饭，就练习枪法，打兔子，打鸟，据说野猪也打了。一直到深夜。\n至于具体的花费，则列在最后:\n1、伙食费（包括工作人员夜餐、伙补）：9207法郎\n2、水费（按三个半月计算）：1133.62法郎\n3、电 费（按三个半月计算）：5295.60法郎\n4、煤气费（按三个半月计算）：525法郎\n5、汽车费（十七辆汽车）：5841法郎\n6、煤（15吨）：660法郎\n7、415冷气开放：1000法郎\n总计：23662.22法郎"
 Fontaine_revolution.25.a: "快把多列士给我叫来，我们必须马上开始调查！"

 fontaine_personal.1.t: "故国神游"
 fontaine_personal.1.d: "  “说起来......千织小姐，”客人打趣地问道，“你应该不是枫丹人吧？”也许是因为千织为她量体裁衣时要保持不动，而天性的活泼好动让她在静止时万分难受，于是便打算动动自己的嘴皮子，和老板聊一聊天。\n  听到这个问题，千织正忙于测量的手似乎是停了一下，但很快恢复了灵巧的操作。“当然不是......现在没有闲工夫谈这些闲事。”\n  看起来，千织的话匣子相当难打开，这样的话题，还是刺探不到更多的信息，是时候来一些猜测了。“那么，千织小姐，您就是日本人......”“安静点吧，待会会和你慢慢谈的。”\n  看来千织的确是在认真地工作，如果再多嘴，也许就会落得一个驱逐出店，或者是价钱翻倍的悲惨下场，于是，客人便闭上了嘴，安静地思索着裁量完成以后的话题。\n  “事实上，你说得不对。我的话...应该算不上是日本人。”订单落笔以后，千织轻叹了一口气，终于可以开始攀谈起来。\n  “可是...看你的样子...还有名字......”\n  “如果你将稻妻与日本当作完全一样的东西，用等号来描述它们之间的关系，那确实是，但我不这么认为。”\n  “稻妻？”这个名词还是客人第一次听说。\n  “嗯，也许算是我们世界的日本吧。我看过不少有关于日本的资料，的确，两者的文化真的很相近。”\n  “也就是说，千织小姐甚至没有去过日本？”。\n  “真可笑，当时似乎是只要是在枫丹的人就会到这里来，不管出生在哪里......信仰什么神明......日本的话，我很难把它与我的祖国联系起来。哈，就算是稻妻，我也对这个真正的祖国没什么感情。”\n  “欸，为什么呢？”\n  “太压抑，束缚太多......也许可以这么说吧。当初我到枫丹来，主要是因为听说那个整天看不到一面的神要搞什么锁国令，好像还要收集神之眼什么的......换个方式来说，就是那里容不下梦想。”"
 fontaine_personal.1.a: "“这么说......枫丹才是有梦的国土。”"

 Fontaine_revolution.26.t: "查成分"
 Fontaine_revolution.26.d: "德雷福斯的儿子，皮埃尔·德雷福斯先生家的邮箱里被塞上了一份印着政府公章的信封。似乎不只是小德雷福斯，他的所有邻居，也受到了这样的一封信。政府派送给全民的信件，的确是相当罕见。想到最近在新闻中看到的纳粹最近的种种举动，德雷福斯先生开始忧心忡忡起来，他相当确信这是征兵令，只不过德雷福斯先生早已经过了应征年龄，那么，被送去战场的就只有自己心爱的小儿子了。\n\n德雷福斯先生颤颤巍巍地拿起自己的读书眼镜，瘫软地坐到安乐椅上准备看一看——居然与征兵无关！\n一改往日的冗长问候语，这封信在简单地感谢了读者以后，便直直地切入了主题，要求自己上交有关于自己资产的材料，包括银行储蓄，土地，开办企业等。在上交以后，还会有专门的稽查员前来调查，而期限仅有一周。\n\n事实上，芙宁娜是枫丹第一个被查成分的，尽管稽查员对芙宁娜毫无疑问是含有万分的敬畏的，但这丝毫没有影响他认真地清查了芙宁娜的所有资产——除去沫芒宫的居住权以外，芙宁娜的资产是——福煦大街的一间公寓，5000法郎的银行存款，价值大约一万法郎的行头首饰，以及杂物若干，没有田产，也没有名下的股份或者企业。至于来源的话，稽查员无从细查，根据芙宁娜的自述，这些大多真的来源于自己的片酬。而最后稽查员的最终结论是——城市小资产阶级，令人哭笑不得。"
 Fontaine_revolution.26.a: "看起来，枫丹最尊贵的女孩从未利用人们的信任谋求任何私利。"

 Fontaine_revolution.27.t: "地主团练的兴起"
 Fontaine_revolution.27.d: "枫丹的南部是一片诗意的田园，乡村，湖泊，森林，是这里的主要旋律，景色宜人。然而越是亲近于自然，疏离工业中心，便也意味着远离了先进的阶级，也远离了政府的控制。因此，这里的主要话事人便是早在欧克西塔尼亚时期便扎根在这里的地主们，哪怕是法国大革命，拿破仑战争，还有一战，都没有影响到他们在这里的生存。尽管他们的生产方式已经迈入了现代社会，但地主阶级的局限性注定他们无法接受社会主义的思想。\n\n在农业集体化的法令下发到乡村以后，这样无人监督执行的法令自然成了废纸，在听闻了北部工业区的种种变故以后，手握田产的地主们愈发地恐惧自己被清算，于是便恶向胆边生，组织起了农会，搞起了团练，试图保卫自己的家产。"
 Fontaine_revolution.27.a: "这种中世纪的遗老什么时候才能被移除！"

 Fontaine_revolution.28.t: "名单"
 Fontaine_revolution.28.d: "事实上，特别法庭在枫丹的全国均有设立，这份报告只列举受理于位于巴黎的欧庇克莱尔剧院的案宗:\n\n司法人员:一名主任法官、一名候补法官及一名首席检察官。\n主任法官:亨利·德瓦布尔，候补法官：夏洛蒂·阿黛尔，首席检察官：克洛琳德·德拉克洛瓦。\n\n分别列举：罪名，判决，注记。\n\n受审名单：\n那维莱特·查斯:反和平密谋罪，战争罪，反人道罪均不起诉，叛国罪成功被确定有罪；判决，剥夺一切公职，荣誉；无注记。\n卡米耶·肖当:四项罪名无一成立；判决：无罪；无注记。\n夏尔·安齐热:战争罪，叛国罪，反人道罪成立；判决:终身监禁；注记:在马恩河一带制造屠杀。\n弗朗索瓦·德·拉·罗克:反和平密谋罪，战争罪，反人道罪，叛国罪全部成立；判处：死刑；注记：在巴黎郊区制造屠杀，意图焚毁巴黎。\n夏尔·莫拉斯：叛国罪成立；判处：20年有期徒刑；注记：抹黑法革历史，煽动君主主义情绪。\n让·马里：战争罪成立，反和平密谋罪，反人道罪均不起诉，叛国罪经推定后无罪；判决：有期徒刑5年；注记：地中海舰队总司令。\n\n......\n\n芙宁娜·德·枫丹:未出庭。"
 Fontaine_revolution.28.a: "还有很多卷宗没有看完......"
 SRC.2.t: "来自中华人民共和国的橄榄枝"
 SRC.2.d: "中国已经对我们追求民族独立的一部分人提供了支持，现在，全国各地反对我们宗主国的政治活动正在日益地增加。"
 SRC.2.a: "感谢您，同志！"

 SRC.3.t: "取得独立"
 SRC.3.d: "在世界各国爱好和平和民主人士的支持下，我们终于取得了民族独立，现在，外交成为了一个重要的问题。"
 SRC.3.a: "我们还可以继续和西方人合作"
 SRC.3.b: "我们必须彻底脱离西方体系。"

 fontaine_personal.2.t: "热心人"
 fontaine_personal.2.d: "世界上真的存在着傅里叶，圣西门和欧文梦寐以求，能够出于自身的正义感，而宁可将其累积的巨额财富施舍于贫困者的“圣人”吗？这样无谓的寻找，让欧文亏掉了大笔家产，而傅里叶则是孤独致死。也不奇怪，马克思就总结过，人类可不是因为犯错而背离了自己的正义感，应该说是社会生产力发展到一定程度的结果。不过，在枫丹，你真的找的出一个“圣人”的特例。\n\n从外表上来看，娜维亚·卡萨帕是典型的枫丹贵族少女，穿着设计繁复的裙装，戴精致的礼帽，手腕上挂一柄缀着宝石与蝴蝶结的伞，这样复杂又不便行动的装束，似乎像是专门为在深宫楼台居住而设计的，但，这并没有妨碍娜维亚总是像一只灵巧的云雀穿梭在巴黎的大街小巷之中。\n\n我们为什么将娜维亚比作是云雀呢？我们知道，云雀的歌喉婉转，乐音甜美有如爱情，娜维亚带给身边的人的消息，确是如同云雀之声一样优美的。和娜维亚打交道的，一般是像这样的：因立场不同而无法在一起的情侣，或者是因事故而失去工作能力的中年人，他们是最最需要这个社会给予帮助的人群；有很多这样的问题，这样的人，不像那些支撑刺玫会运转的核心生意，这些事情即便圆满解决了也无法带来任何收益，但娜维娅总是不厌其烦地花费不小的力气去帮，每一次，运用父亲给她留下的财产，和刺玫会的手腕，这些问题往往都能得到好的结果。\n受帮助的人从来不知道娜维亚是出于何种动机去做这样有公德的事情，而娜维娅也仅仅在他们的生活中出现了一次便永远地销声匿迹，但人所做的善事如同养分，会让娜维娅的美声开花结果，逐渐流传在整个枫丹，这些东西，是自在人心的。\n\n娜维娅这么做的动因，她自己从未披露，但在欧洲这片诞生了尼采，萨特的热土上，倒也可以推测：在曾经枫丹预言危机这样对于所有水的子民而言必死无疑，无可避免，既不分人群，也无关罪业深重与否的荒谬面前，创造当下人生的意义，就显得尤为重要起来。娜维娅，不事劳作地渡过了殷实的童年以后，也许是想要通过助人的方式，得到充实内心的满足感吧。只是，现在这个世界再也没有可怖的预言危机，也没有娜维娅的家乡，但助人的习惯，和依此而形成的热情，乐观的价值却保留了下来。\n\n真正被问到动机的时候，娜维娅便不会称自己是大小姐、老板或者别的什么响亮称号，只是热心市民娜维娅。"
 fontaine_personal.2.a: "黄玫瑰掠过了蔚蓝的天心。"
 fontaine_personal.3.t: "初尝酒味"
 fontaine_personal.3.d: "芙宁娜不喜欢这个地方。这里人声嘈杂，烟雾缭绕，灯光迷人眼球，浓烈的酒味弥散在空气中，好像就是为了让人迷离而无从思考设计的。这次酒馆之行，芙宁娜踌躇了很久。先谈自己的话，芙宁娜在此之前从未尝过酒味，还是没人陪伴着来的。从政治层面来讲的话，以一国元首的身份光临酒馆这样的市井场所，也的确是值得媒体为此大做文章的。\n\n扎起马尾，配一副平光眼镜，不起眼的帽子，芙宁娜觉得这样别人就认不出她了。平时都以光鲜亮丽的形象大方地展示自己，芙宁娜还真不太擅长将自己藏入人海。放眼周围的酒客，哪些人会来酒馆呢？蜷缩在黑暗角落的失魂落魄者；肆意欢笑，把好酒撒得到处都是的忘情者。芙宁娜感觉自己倾向于前一种。\n\n“小姑娘，你是第一次来酒馆吧？”突如其来的询问着实吓了芙宁娜一跳，稳住自己的帽子，想起来要隐藏自己的身份，便故意把声音压低两度。\n“嗯...是的！”。很失败，也许是因为惊吓，这这句话的音调变得很奇怪。情不自禁地，一口凉气便自己吸了进来。捂住自己的脸，芙宁娜竭力不让酒保看出自己的脸红。\n\n声线上的伪装算是失败了，不过，酒保只是觉得这样的声线十分熟悉，至于她是不是真的芙宁娜，他还拿不定主意呢，只是芙宁娜涨红地脸被酒保清楚地看到以后......\n\n“芙宁娜大人！”。\n\n嘈杂的酒馆完全沉默了，所有的目光都汇聚到了声音发出的地方，再一次，芙宁娜成为了全场的焦点。\n完全失败，芙宁娜解开辫子，摘下眼镜，算是投降的一种表示吧。\n但是大家比想象中的和善得多！一位挺着肚子，留着大长胡子，一看就有接近半个世纪的饮酒经验的老头热情地介绍起各种好酒，大家也纷纷地附和起来。其实推荐的酒类，芙宁娜大多完全闻所未闻，盛情难却之下，芙宁娜还是选择了她勉强听说过名字的，产自勃艮第的红酒，还是酒保请的。\n\n第一口，对于芙宁娜来说，很辣。从情绪中逃离进酩酊这种事情，还是芙宁娜第一次做，也许对于酒的初尝者来说，其效力总是强得过分的。勉强饮尽第一杯以后，轻飘飘的感觉充满了全身。芙宁娜轻盈地飞了起来，顶破了酒馆的屋顶，升入巴黎的夜空云霄之中。一路随风飘到了郊区，热气蒸腾，似乎是农忙的田地，一下子，重力重新起了作用，跌落在地，却完全没有疼痛的感觉。看向自己的双手，已然长出了坚硬的外骨骼，修长的附肢，成为螃蟹；又长出尾巴，潜入水底，成为鳄鱼；长出翅膀，成为朱鹮，最终，她变成了一抹尘土。芙宁娜喜欢这种轻盈的感觉，没有恐惧的感觉，也不想逃离，可惜尘土随风飘散之时，梦醒了。头很晕，能够看见的，只有一个破碎的酒瓶，满地的酒污，还有正在精心擦拭酒具的酒保，也许是围绕着她的狂欢的一点余韵。"
 fontaine_personal.3.a: "“我刚才......都做了些什么？”"

 Fontaine_revolution.29.t: "调查开始"
 Fontaine_revolution.29.d: "夏洛蒂瘫坐在办公椅上，尽管她已经意识到，灾难即将降临，但此刻她拿不出任何处理这件事的勇气与判断力。\n\n克洛琳德历经两朝，每一次，她都是举足轻重的人物。这可不仅是因为她效忠的对象只是枫丹，其更重要的原因在于，她完全清楚就算没有把柄，强大的关系网才能保证自己的屹立不倒。所以，对克洛琳德的攻击，事实上是对党内与克洛琳德为伍的一大帮人的攻击，因此，这件事大概率是一场完完全全的党内权斗。\n为了大家的和气，把这件事情压下去吗？不可能。这样不仅无法保全克洛琳德，还会给自己留下致命的把柄。那么彻查这件事吗？也不行，因为这就相当于公然地拉偏架。\n尽管夏洛蒂还算可以分析这件事情，然而她并不知道解决的方案，那么唯一的选择，还是折衷——瞒着芙宁娜，这件事情要绝对保密地小心调查。"
 Fontaine_revolution.29.a: "严峻的考验......"

 Fontaine_revolution.30.t: "多年的成果"
 Fontaine_revolution.30.d: "今天可以抄一个大官的家！想到这里，老警员马扎尔便不禁兴奋起来。对于他来说，把别人家里翻个底朝天是相当快乐的一件事情，不仅可以满足自己窥探别人隐私的欲望，还能顺便见识一下富家的富丽堂皇，对那里的仆人居高临下，颐指气使，享受一下使唤人的快感。\n\n这位大官的住所居然还在香榭丽舍大街！那可真是不得了，不得了啊！马扎尔已经可以想象坐落于巴黎最繁华的街道的住宅会有多少有价值的藏品了，只是可惜，就算可以随便看，也终究不是自己的。\n\n公寓的主人当然不在，敲开厚重的大门，马扎尔给仆人出示了自己的搜查令，带着其他几个年轻警员进了这屋。可这里却让马扎尔大失所望，这所公寓的布局出人意料得简单，不像这里的其他住宅充满了典雅的气息，这里的生活气息可以说相当浓厚——仆人们因为接到了不要打扫的通知，这里平常的样子便被真实地展示出来了。随意摊开的书，还没有吃完的马卡龙，披在椅背上的外套，完全和城市普通居民一样的布置。\n\n马扎尔当然不信这就是这所分配不到更买不到的公寓的全部，便伙同自己的手下疯狂地找了起来。果然，这所住宅远远不止于此。某个不起眼的墙缝，若是用力往这里一推，墙就会向里面打开，而里面是一段阴暗潮湿的台阶，往下，穿过一扇有黄金镶嵌的厚重木门，倒是豁然开朗，这里装修比上方华丽了太多，红木家具上堆着各种金银的烛台，餐具，以及其他的很多看起里就值钱的玩意。只是马扎尔和几个小年轻都不懂化学，不知道这些东西是镶的还是纯的。更加变态的是，马扎尔还在某个上了锁的抽屉里面找到了一些有些结霜，不便明说的奇怪用具。\n这些猎奇的发现引起了了马扎尔窥私欲的大爆发，心中烧起来一团火促使他疯狂地找下去，来发掘出这位高管积攒多年，也许积攒了几个世纪，几代人的丰厚成果。"
 Fontaine_revolution.30.a: "“还有什么好玩的东西？”"

 Fontaine_revolution.31.t: "千夫所指"
 Fontaine_revolution.31.d: "克洛琳德雇的大部分都是女仆。至于女仆长，很巧，和两个名人算是本家，一个是《悲惨世界》里的女仆，一个是近来枫丹富有盛名的天使护士，姓妮珂莱特。气质倒是有点接近后者，声望在她的下属里，也还算是不错。\n\n当探员问起克洛琳德在寓所里的为人时，仆人们虽然七嘴八舌，但是各种意见汇集到一起，要说是异口同声也不错，这样一来，一只保持沉默的妮珂莱特小姐，就显得很突出了。她自然成为了探员们重点调查的对象。\n“仆人们说，克洛琳德在家里非常慵懒，各种杂物，全都是甩给你们去做的，妮珂莱特小姐，这是事实吗？”\n妮珂莱特不语。\n“妮珂莱特小姐，仆人们还说，克洛琳德对她们颐指气使，平时横加指责，有点小事，便会拔出佩剑威胁。还有更极端的情况，你们之中，看起来最胆小的那个，颤颤巍巍地说自己遭受过克洛琳德长达十数个小时的性虐待。这是真的吗？”\n妮珂莱特还是不说话。\n“妮珂莱特，请你配合调查。”\n妮珂莱特深吸了一口气，终于开口说话。“探员先生，这些事情，听起来真的很可怕，但我完全不清楚发生了什么事，让您如此操劳，但可以确定的一点是，我不想与这件麻烦事产生任何联系。”"
 Fontaine_revolution.31.a: "探员叹了口气，拿着笔录失望地离开了。"

 Fontaine_revolution.32.t: "不改口供"
 Fontaine_revolution.32.d: "让特务来查案，真是个绝顶糟糕的主意。听完眼前那个几乎与黑暗融为一体的魁梧男人的讲话，克洛琳德脑海里只有这一个想法。好在，在这牢里呆了不知道多久以后，不管是造克洛琳德的黄谣，还是讲别人对她贪污受贿的指控，都已经无法对她的心理防线造成任何的破坏了。无论如何，克洛琳德的回答只有这一句话：“这些指控全都是子虚乌有。”\n\n如果看客观时间的话，现在刚好过了克洛琳德受审的第168个钟头，刚好一周，主簿在阴暗的办公室里走来走去，时不时擦一把自己的汗。已经一周了，什么进展都没有，克洛琳德的心理防线似乎找不出任何的破绽，他急得焦头烂额。所幸，来自别处的证据源源不断，自己倒是不需要担心放人的压力，他完全有时间和这个固执的女人慢慢磨，只是总是毫无进展的话，也许会显得自己无能。\n\n用心理战术肯定是没有效果得了，之前几个所谓的心理学专家过来，反倒被克洛琳德质问得怀疑自己了。要取得进展，唯一的希望是打，狠狠地打。可是考虑到克洛琳德在外面还有一派人马，主簿不敢用大刑，只能泼泼冷水，连鞭子都用的畏畏缩缩，这点程度，对于克洛琳德来说显然是微风细雨，这让所有人感到无比的郁闷。"
 Fontaine_revolution.32.a: "在刑侦学上，还有什么别的办法吗？"

 Fontaine_revolution.40.t: "记忆"
 Fontaine_revolution.40.d: "  夜，巴黎的灯火照常亮起，照亮了西边的半片天空。每逢一天的这个时候，从枫丹白露宫向灯光亮起的地方看去，安静得多的枫丹白露便显得隐没在了夜的黑暗当中，有时，在朝向西边的阳台上，总能找到一个少女久久地凝视这番景象。\n\n  也许景色是具有引人思考的作用的，独身一人，不禁感时伤怀，即使是她所没有的记忆，也会在这个时刻融入她潮水般的思绪。\n  法兰西人民似乎总是活在回忆之中。往前推个几十年，也许会有耄耋老人抚摸着天真孩童的髫发，笑着讲出他在九三年的惊险经历，讲暴君的最终结局，讲革命者的最后陨落。带着这些记忆，走向另一个值得记忆的时间节点。这时，当年听老头们讲述九三年的故事的孩童们已然长大成人，理解了那段故事的含义以后，拿起自己工作的扳手，锤子，推翻重新现世的暴君。到了他们变老的年纪，他们的子孙们又前赴后继地参与一场他们毫无好感的大战。从这场大战中存活下来的幸运儿，他们的孩子带着前辈们厚重的历史，走向法兰西故事的终点，枫丹故事的起点。\n  她为枫丹的故事书写了一个甜美的开头，带着飓风与洪水的力量，摧毁了令年轻人不满的一切。又遭遇了一个惊险的转折，也许是因为一个小小的误会，也许是因为底层逻辑某些无法克服的硬伤，年轻人们又起来，用自己的力量重构了整个故事。可是，这个故事又因为诸多她难以理解的因素，短短几年之内，便又轰然倒塌。这段历史，需要她的反思吗？\n  随着时间之矢的破空向前，或许这样的历史也会再度成为老人的谈资，讲给新一代的儿女们听。再过去几百年，褪色的记忆被加工成古老的传说。有时，她，芙宁娜·德·枫丹，也希望能够永远停留在过去的某一个时刻，留住枫丹故事刚开始时意气风发的模样。\n  虽然，世界万物永远在那里无情地运动，但好在，记忆可以留存芙宁娜最喜欢的时刻。如果是一般人，记忆最多保存一百年，便会随着躯体的死亡而烟消云散。但芙宁娜，作为魔神，五百岁还是青春的年纪，她可以把记忆留存千年，乃至更久。"
 Fontaine_revolution.40.a: "历史的一位记录者。"

 Fontaine_revolution.101.t: "五大辩题"
 Fontaine_revolution.101.d: "在当前的形势下，枫丹人民共和国依然面对着许多纷繁复杂的问题，总括起来，可以分成五个大类。\n(1)政治分歧:即使是在枫丹(法国)共产党内部，因为各个党员对形势认知的差异，我们的党不幸的分为了两个派别——苏联派和延安派。好在这两派没有意识形态上的根本差异，所以分裂并非不可弥合。而在党外，无政府工团主义者的想法就和我们的党大相径庭了。因为同为马克思的拥趸，无政府主义者以个人名义，也就是工人，工会代表的形式参加了这次会议。\n(2)腐化问题:目前，掌握生产资料的是干部，只要干部手握生产资料，即使道德再高尚也难以克服异化，所以说对党员工作的监督是排在政治以后的第二大问题。\n(3)国家的安全问题：自从法西斯相继在意大利和德国夺取政权，历代政府都把这两个法西斯国家视为最大的威胁。最近，德意两国完成了许多富国强兵的举措，并且越发的具有侵略性，危险程度不言而喻。而相对远一点的，就是资本主义国家的威胁。尽管世界上现在已经有了苏联和枫丹两个比较大的社会主义国家，但资本主义还是控制着地球上的对大多数土地，而枫丹不但要直面德意法西斯的威胁，还要面对来自英国的海上威胁，以及南部西班牙的问题，如果处理不当，帝国主义的联合干涉可能会扼杀人民共和国。\n(4)经济建设的问题:国家有两面需要平衡，生产和分配，只注重生产不关注分配，结局是资本主义复辟。只注重分配不关注生产，结局是国民普遍的贫穷。如何平衡生产与分配之间的关系，是各个派系主要的议题。\n(5)人民的教育问题:尽管经过了前任那维莱特政府的努力，枫丹的识字率几乎达到百分之百，受高等教育的人口比例也大大增加，但他们的价值观都在资本主义的教育之中形成。工农因为亲临生产第一线，思想工作是相当好做的，但是受高等教育的知识分子因为不事劳作，形成了很多在我们看来危险的思想，比如说刻意做一些标新立异的举动显示出自己与受教育程度较低的工农的区别等。因而教育工作也是相当重要的。\n\n综合以上问题，我们的党员们确定了我国社会的主要矛盾："
 Fontaine_revolution.101.a: "人民大众同帝国主义、资本主义残余势力之间的矛盾。"
 Fontaine_revolution.101.b: "人民大众对自由的需要与国家机器之间的矛盾。"
 Fontaine_revolution.101.c: "人民大众增长的物质文化需要同不足的社会生产之间的矛盾。"
 Fontaine_revolution.102.t: "枫丹(法国)共产党的党内初选"
 Fontaine_revolution.102.desc: "选举我们人民共和国的总理是大会要决定的主要事宜之一，在枫丹(法国)共产党的党内，大致有四位足够胜任总理一职的人选。\n第一是委员会主席，莫里斯·多列士同志。第二是第一书记，夏洛蒂·阿黛尔同志。第三是法兰西岛大区委员会主席娜维娅·卡斯帕同志。第四则是长期领导工人运动，在工人群体中声望极高的马赛尔·加香同志。"
 Fontaine_revolution.102.a: "与苏联完成革命输出，投给多列士！"
 Fontaine_revolution.102.b: "支持第三世界反帝斗争，投给夏洛蒂！"
 Fontaine_revolution.102.c: "稳定苏联派与延安派的关系，投给娜维娅！"
 Fontaine_revolution.102.d: "结成工会派与延安派的友谊，投给加香！"
 Fontaine_revolution.106.c.tt: "§Y大会的进程被强行中止了。§!"

 French.97.t: "在枫丹国家图书馆"
 French.97.d: "枫丹国家图书馆是个不错的地方。不止因为它坐落于相对宁静的巴黎十三区，还有超过三千万件的丰富馆藏，时常穿着水蓝色西装莅临的少女也是这里对不研究学术的读者也充满了吸引力的原因。\n\n尽管所有人都认识那个少女，也知道喧哗热闹是她的喜爱，但很少有人去打扰她。她挑选藏书的时间是如此之久，只要是明白事理的人，就能了解到她阅读的态度是多么认真。所以，即使是忍不住想要偷窥的青年，也只能将脚步放的足够轻，藏在堆满了书的书架后面，看上那么一两眼。\n\n以往，她读书的神情总是轻松自然的，书旁时常放着咖啡一盏。当太阳落山，打在书上的阳光昏黄而无法支持阅读时，就戴上自己的礼帽，从容地走出图书馆。可这次，透过藏书看到的却是堆积成一座小山的书籍，放的凌乱，显然只是随意地翻开，看了两眼就扔到了一边的。如果有眼力好的人，可以看到，堆着的书籍中，有最为厚实的《九三年》，《红与黑》，和《双城记》。\n\n题材是固定的。她想了解的历史，谜底便写在了谜面上。真正让人不解的是，她了解这段历史的目的，是什么？"
 French.97.a: "那确实是一段值得回味的过往......"

 French.98.t: "乱与治"
 French.98.d: "1796年，共和历的第四个年头。这年，法国的核心词汇应该只有一个——Massacrer，杀人。前三年，算是革命的一个高峰，路易十六被送上了断头台，街头每天都是血流成河。而这年，谋划这出戏的雅各宾派也彻底失败，沦为了被屠杀的对象。\n\n在遥远的东方，中国历史上在位时间第二久的皇帝——爱新觉罗·弘历，即赫赫有名的乾隆帝，退位了。为一个前无古人，延续长达112年的“盛世”，画上了一个意味深长的句号。\n\n按照乱与治的划分方法，法国的1796年，是一个毫无疑问的乱世。而中国的1796年，则是一个存有争议的治世。将视角从宏观聚焦到社会的微观层面，乱世的国民，每天都有人死于非命，在断头台上丢掉了自己的脑袋。而在所谓的治世，人们的确不会死在断头台的刀刃之下，却时刻被饥饿威胁着，被强暴之权压得喘不过气来。\n\n星宿轮转，日月轮换，时间一晃又过去一百多年。法国的作家们努力着回忆着大革命中的细节，写出诗歌似的文字来歌颂这个乱世，认为它孕育着一个崭新的时代，还把这段历史作为整个民族的骄傲。而治世，被中国当代的觉醒文人用笔杆子贬低得一文不值，努力地希望把这个时代给予人精神上的枷锁抹去，仅仅给它一个“历史轮回中的打转”的评价。\n\n所谓歌舞升平，千秋伟业，百年以后所有人终归枯骨一副。若是百年以后的人再来看现代的枫丹，是否会像现在的中国人看百年以前的康乾盛世一般呢？"
 French.98.a: "时过境迁。"

 French.99.t: "一段复杂的历史"
 French.99.d: "该怎么形容大革命的前后呢？一个碧血如瀑的恐怖时代？一个妙不可言的黄金时代？或者是……一个无比复杂的时代？\n\n一个普通人，能在百科全书上对于大革命的描述中读出些什么？想必，大多是会迷失在诸多不知所谓的名词中吧。比如“吉伦特派”，“山岳派”，“热月”，还有最重要的“波拿巴”。光是记住这些，就是一项难度极高的任务了。若是读者是有毅力的豪杰，能够硬着头皮读完，那反应至多就是发出一声“真是复杂”的感叹便闭上了百科全书。\n\n而革命者在这些纷繁复杂的名词中，看到的却是一片漆黑的夜空，和上面密布的满天繁星。数一数，便可以叫出他们的名字：米拉波，维尼奥，圣鞠斯特，罗伯斯庇尔，卡米尔·德穆兰，丹东，还有最耀眼的那颗——波拿巴。尽管对于这样夜空的印象，在历史的河流中已经被侵蚀得有些黯淡了。然而，见识过星空的人，是绝不能满足于空无一物的天空的。"
 French.99.a: "今天的夜空也是群星璀璨呢。"

 French.100.t: "两次生死沉浮"
 French.100.d: "史学家在记叙1789年和1871年的革命时，一般都会用“失败”一词来描述它们的结果。因为前者屈服于拿破仑的权威，未能保全新生的共和国；而后者则遭受同胞的背叛，公社在外敌和内奸的绞杀下仅存在了不到一百天便宣告覆灭。\n\n但是，这两场革命真的就以失败告终了吗？未必。尽管第一共和国很快覆灭，但共和国所倡导的价值却被拿破仑以武力的形式散播到了欧洲各地。就第七次反法同盟把拿破仑也赶走了，波旁王朝卷土重来，民主的种子还是最终生根发芽，最后引发了欧洲历史上最为重要的变革——民族之春。\n\n而1871年革命持续的时间很短，控制的区域也仅仅限制在巴黎，但它的意义也是可以于1789年革命相比的。在马克思主义者看来，1871年革命的果实——巴黎公社，是人类历史上第一个无产阶级的政权，也是社会主义的第一次实践——第一次总是具有那么特殊的意义，巴黎公社以后，俄国人建立了存续至今，不断强大的苏联。1871年革命也许可以看作是既1789年革命所开创的资本主义社会以后，另一个时代的序曲。\n\n如果我们把目光放得长远一些，发现这两次革命，其实都在某种意义上成功了。只是如果没有遭到背叛，果实没有被窃取，这两次革命可以取得大得多的成果。\n\n有些人为了一己私欲出卖同胞时，还会觉得颇不体面，于是，便绞尽脑汁地去想办法给自己的行为寻找合理性。窃国者把自己所谓维持秩序，终结混乱的动机写在历史书上，却隐瞒了终结恐怖时期以后更为血腥残酷的反攻倒算。约瑟夫·富歇是这种人，阿道夫·梯也尔也是这种人，一些人称赞他们是秩序维系者，但事实上，他们是刽子手，是最大的罪人。"
 French.100.a: "过去与历史未必是同义词。"

 French.101.t: "以古映今"
 French.101.d: "这个生于不义的共和国走到枫丹时期以前，已然颓势尽显。既然它建立时做的第一件事就是镇压巴黎公社，发起针对革命者的白色恐怖，那么它对待这个国家最广大的人群——劳动者，可以说是冷若冰霜了。对于他们的超额劳动，微薄薪资，共和国从未有过任何的干预。\n\n而政客只关注稳定或是混乱，对于供养他们的人，他们从来没有任何的心思去关注。而叛乱就要被镇压，混乱就必须被稳定，已被视为共和国的一条铁律。尽管他们相比于普通人已经有了控制许多人的权力，但他们已然嫌自己手中的权力不够多，以各种公共政策为筹码，开始了权力的角逐。\n\n他们是寄生虫。而芙宁娜·德·枫丹是个善良的人，在重任的拥立下登上共和国权力之巅，还是不愿伤害任何人。但在无奈的意识到他们正在无形之中伤害着全体枫丹的国民以后，便一首组织了共和国历史上最大规模的政治暴力——枫丹廷审判。只不过这次暴力的矛头，终于不再指向革命者了。\n\n也许我们国家真正的主人是广大的人民，但这个共和国终究是一个资产阶级的共和国，这一套民主制度终究是资产阶级的民主制度。可以让步，但终究是为资产阶级所服务的。这样的暴力事件深深地伤害了枫丹的国家机器，隐藏在群众热情的呼喊声中的，是官僚们日益惊恐忧虑的目光，对于枫丹一切的不满也在不断地增加。在某一个到达临界的节点，便会爆发叛乱，或是政变，或是谋杀，甚至是一场内战。"
 French.101.a: "依靠个人理想来统治这个国家终归是个童话。"

 French.102.t: "......没有结局的故事？"
 French.102.d: "距离枫丹廷审判已经过去很久了。审判庭时常会接到几起零星的腐败案件，有几场也许并不深入的调查，但这一切肯定只是冰山一角，沧海一粟。枫丹在表面上依然是海晏河清，稳定富强。但在芙宁娜无法看见的地方，正在一点一点地走向崩解。\n\n这个过程很漫长，也许会持续十几年，几十年，上百年。对于普通人来说，的确是一段很长的时间。但在寿命长达千年地魔神看来，这个过程就像是看染料在缸中扩散一般。第一眼还是一点，一会就布满了整个水体了。仿佛昨天审判刚刚结束，今天就回到了审判以前的样子。\n\n一场声势浩大的审判，哪怕再旷日持久，也终有结束的一天。但我们的历史是没有终结的，人每天无时无刻不在变化。廉洁的官僚会放弃理想，劳动的人民会改变诉求。\n\n也许只有无止尽的运动与无止尽的审判，才能遏制住这无止尽的败坏。"
 French.102.a: "Nous avons besoin La Grande Terreur(我们需要大恐怖)!"
 French.102.b: "Nous avons besoin Revolution d'Octobre(我们需要十月革命)!"

 Fontaine_revolution.103.t: "最伟大的实验"
 Fontaine_revolution.103.d: "这是一场最为伟大的实验，人类最为飞扬超脱的思想——无政府主义，终于在枫丹这片梦的国土开始了迄今以来最大规模的实践。但前所未有的代价是，公社缺乏如何经略像枫丹这样一个生产力发达的大国，起码最基本的一些参考。公社从诞生的开始便面临着严峻的挑战。\n\n早些年，苏联革命家便从多个角度批判了无政府主义，并称这是一种幼稚的空谈。诚然，无政府主义穿着理想主义的花衣裳，却时常被现实勒得无法动弹。但这些困难并非是无法克服的，在坚持我们最核心的理念——个人自由和人类团结——的同时，在不断斗争的过程中，必将可以得到一套行而有效的方法论。"
 Fontaine_revolution.103.a: "我们是巴黎公社的后继者！"
 Fontaine_revolution.103.b: "自由地区！前进！"

 Fontaine_revolution.104.t: "人民公社运动"
 Fontaine_revolution.104.d: "夏季，皮卡第的农庄地里热火朝天。几家合作社要把马恩河的水引到内陆去，来浇灌数千亩种植着小麦与葡萄的田地。但是每个合作社能出工的人丁有限，跨合作社之间的工作协调，难免有些困难，于是，那些农民便开始协商把近邻的几个小合作合并成一个大的公社，这样就可以方便地召集适龄男丁来马恩河边开沟引渠了。\n\n在巴黎的人民政府受到来自公社社员的报告时，社员已经将沟渠完成了80%，让马恩河的河水得以滋润渠边几千亩的土地。他们在报告中，用了“人民公社”这一词语来形容几家合作社合并以后的大社，热情地赞扬合并公社带来组织协调上的便利，说这种模式肯定可以推广到全国，希望中央为这一自发的群众运动来背书。"
 Fontaine_revolution.104.a: "我看这很好。人民公社这名字，起得也很好。"
 Fontaine_revolution.104.b: "这种无组织无纪律，不听党指挥的黑风，是要遏制住的。"

 Fontaine_revolution.105.t: "公社化轰轰烈烈"
 Fontaine_revolution.105.d: "也许，人民公社运动的种子早已在集体化时期便已经埋下。近来，皮卡第的自发运动可以被比作是它的发芽，而中央对人民公社运动的肯定，无疑是施加了一记强效的化肥，这场运动发展迅猛，快速地扩展到了全国。\n\n到目前为止，全国合作社数量由15万个减少到了1万个，而每个合作社的规模却增长了将近2000%，并且都换上了“人民公社”的招牌，开起了公社大饭堂，搞起了乡镇托儿所。经济学家担忧的因组织混乱而导致的农业产量下降并未出现，相反，枫丹的农业产量相比于完成公社化以前上升了12.21%，除了葡萄等传统经济作物的增产，小麦和大麦也首次实现了自足。\n\n人民公社运动毫无疑问取得了辉煌的成果。但一些党员却提出了担忧，向中央提出了“反冒进”的主张，认为我国在经济上似乎有横冲直撞的问题，很多工程破坏了生态系统，以及浪费了大量资源，造成国民经济比例失调，让农民劳动积极性受到伤害，从长远来看，可能会破坏社会生产力，造成很严重的后果。"
 Fontaine_revolution.105.a: "一派胡言。公社化不但要搞，还要把它的作用扩展开来。"
 Fontaine_revolution.105.b: "确实有点太快了，我们要想办法给经济降降温。"

 Fontaine_revolution.106.t: "踢开党委自己干？"
 Fontaine_revolution.106.d: "人民公社被组建起来以后，随着社员们需要劳作的时间越来越少，全国的群众运动正在不断地增多，规模也在不断地增大。这样的趋势不仅出现在农业的领域，在工业的领域，有些工人开展了希望自治的请愿活动，也有些叫嚷着只有工会能管他们，不承认党对他们的领导。全国各地似乎刮起了踢开党委自己干的风。\n\n这样的状况引起了诸多党员干部的不满，他们在代表会议中高声疾呼这是无政府主义的黑风，是对人民共和国的挑战，这样的群众运动必须被镇压。\n但另一部分党员则态度稍显柔和，他们认为之所以出现这种情况，是因为党的工作和群众的需要严重地脱节了，是因为党的工作疏忽才引发了这一系列的混乱，并指出消灭我国在经济上的弊病才是解决问题的方法。\n\n但枫丹全国总工会从中看到的却是无政府主义实践的机会，也许许多的运动都有工会参与在其中。他们认可了这样的群众运动，并许诺实现他们的诉求，似乎给我们的工作带来了一定的困难。"
 Fontaine_revolution.106.a: "这是对党和人民黏重的威胁！"
 Fontaine_revolution.106.b: "我们必须调整我们的工作，来适应群众需要的发展"
 Fontaine_revolution.106.c: "伟大实验可以就此徐徐展开......"

 Fontaine_revolution.107.t: "农民进城"
 Fontaine_revolution.107.d: "尽管时间已经过去了许久，但沫芒宫前人山人海，红旗招展的景象依然深深刻印在了儒奥的脑海里。那是一次对于儒奥来说再平常不过的一次去镇上的采购，只不过那天街上的人异常的多，一问，才知道是巴黎那边发生了什么什么大事情，工会叫镇上厂里的工人都不要上工。儒奥问不上工不会扣工资吗，工人的回答是，只要把工厂主吓到了，不但不会扣工资，还可能涨工资。\n\n这时儒奥才对远方发生的某些大事情有了点兴趣，于是他下定决心暂时离开这片他居住了二十余年的故土，前往远方的大城市开开眼界。此时，正是收割小麦的时节，农场人手正缺。为此，他还因为缺的这部分农活的谁来做和父亲大吵了一架。好在，在儒奥提出餐旅费全部自己承担以后，父亲才勉强同意再找人来帮工。\n\n儒奥拿出自己大部分的零钱，坐上了前往巴黎的火车。车厢还在皮卡第时，还算是相当宽敞，只坐着几个加莱来的工人，但后来越来越拥挤，到了圣但尼站的时候，儒奥已经只能和自己的箱子挤到一起，蜷成一团了。他想着下了火车，也许会好一点。\n\n但事实证明儒奥想错了，因为他下来的巴黎北站原本就是巴黎最为繁忙的车站。罢工期间，来自兰斯，里尔等大型工业城市的工人还源源不断地下到这里，以致这里只能人推着人走。好不容易到了稍微空旷一点的地方，儒奥的麻烦又来了。这次是一个穿着蒙着煤灰，有不少划痕的灰色大衣的男人，一见面，他便过来搭话。\n“先生你好...看样子，你是农业工人吧。”\n“你好...?”\n“幸会幸会...我是枫共在这一片的宣传员，阿里斯蒂德·朗贝尔，叫我阿里斯就好。”\n“你怎么知道我是农工？”\n“哈，这还不明显吗，你们农工整天在太阳下劳作，皮肤都晒得和你们的小麦一样...看人很简单的，比如脸白手糙是技工，脸黑的话大概就是矿工......”\n“打断一下...先生，找我干嘛？”\n“哦...差点忘了，这本小册子你先拿着，我带你去沫芒宫，那里比较热闹。”"
 Fontaine_revolution.107.a: "“可这里明明哪里都很热闹啊”"
 Fontaine_revolution.108.t: "旗帜招展"
 Fontaine_revolution.108.d: "好吵，真的好吵。这是儒奥对沫芒宫这个地方的第一印象。听名字，这里应该有个宫殿，但现在，儒奥除了人头什么也看不见。人群一直在不断地攒动，弄得儒奥几次差点摔跤。好在有他来巴黎交的第一个朋友，阿里斯先生扶住他。\n\n“诶呀...不该第一时间带你来这里的...不讲点基本的东西，你都不知道这群人在喊些什么，为什么要来这里喊...可这里稍微拉开点距离半个字也听不见。”阿里斯抱怨者，一会又拉着儒奥来了稍远点的咖啡馆，这里的二楼几乎没什么人，儒奥刚刚准备骂阿里斯这个人反复无常，窗外红旗招展的景象便让他骤然失言。\n不知道什么时候，阿里斯走到他的身边，似乎准备开始新一轮的说教，但事实并不是这样。\n\n“这本小册子，我想你是来不及看了...没关系。看窗外，那些白色的，像米粒一样的东西，都是攒动的人头，是一个个像你一样的人。他们也许是工人也好，农民也好，简单点，就是受苦的人。复杂点，用我的话来说，你我，他们，有一个共同的身份：无产阶级。你们日日耕作工作忙，日出而作，日落而息，晒得皮肤发红。有人因此患上皮肤癌，有人被镰刀割断手腕，收入却微薄。工人，一天都在昏暗无光的工厂里做着简单而又重复的劳动，脸色惨白，心中却烧着不甘如此的怒火。他们可以一直如此，也可以追求改变，就像这样，成为他们在这里的目的所在，为了赚的多点，做得少点，或者更加本质的，做多少事，取多少酬，再加精炼，惟公平二字是也。”"
 Fontaine_revolution.108.a: "“我们要喊口号，因为口号可以振奋精神。而谈及利益，我们也绝对不虚。”"
 Fontaine_revolution.109.t: "再见"
 Fontaine_revolution.109.d: "再见阿里斯先生还是上个月的事情。中间隔着的这段时间里，发生了很多事情。最简单直观的变化，便是儒奥的身份从农场雇工，变成了公社社员。儒奥对阿里斯先生印象颇深，每次会想起那次仅有的异乡之行，这个满身煤灰，讲话头头是道的老哥总会一同出现。他也许的确有与他再见上一面的愿望，但也绝不会为此而再和老爹大吵一架了。\n\n说到底，这次再见应该算是一个巧合，因为阿里斯先生来皮卡第也不是专门探望儒奥来的，而是作为枫共第一书记的助手随行前来视察的。第一书记为什么回来皮卡第这个小地方视察呢，自然是来看这个人民公社最先被组织起来的地方办得如何的。那时儒奥在路边修篱笆，正好一堆人走在这条路上，在这个人群中，儒奥似乎看见了熟悉的身影，真的是阿里斯先生！于是他便完全没有注意到那个更加引人注目的粉色少女，直接向着阿里斯挥起了手。“嘿！是阿里斯蒂安先生吗！”\n\n人群停下了，但第一个关注儒奥的人并非阿里斯，而是那个粉色的家伙，她给了似乎正在犹豫不定的阿里斯先生一个眼色，要他一起过去。“儒奥吗？又见面了...近来如何？哦对，这位是夏洛蒂，我的...同志。”\n“啊...同志你好...不好不坏吧，比较值得一提的是...先前社里开了个学习班，我虽然识点字，却和文盲也相差不远，就去上课了。老师叫我课后读点书来巩固巩固...可我找不到书啊，于是就把之前从巴黎带回来的小册子读了一遍...”\n“欸，小册子？阿里斯，你还发过这个嘛。”一直兴致勃勃地打量着儒奥的夏洛蒂终于开口了。“哦...是的，好像是...你翻译的那版《中共文章选集》吧...”“选得不错欸，好像真的可以当作巩固阅读来看...同志，读下来感觉怎么样呀？”\n“有点吃力...不过还是成功地读下来了，后面好像越看越顺了。”\n“哈，没错，就是这样...”"
 Fontaine_revolution.109.a: "“如果你可以看懂，那就是我们最大的成功。”"
 Fontaine_revolution.110.t: "我们再也不会被暴君压迫了...吗？"
 Fontaine_revolution.110.d: "阿里斯在公社的饭堂挑了个地方坐下而对面，是正在啃面包的儒奥。还不错，夜色入户，儒奥理应干了一天农活，可身上却是干净的，看来是洗过澡了。事实上，他自己也想不到，与老朋友叙旧这个理由，居然也能请出半天假来，看来，这次的行程真的一点也不紧张。\n\n“老兄啊，我还挺怀念在巴黎的那段时间的。那热闹的样子，啧，估计我们整个公社都凑不出那里一个咖啡馆的人。”\n“欸...是啊，那会真的是...充满了激情，每天都很忙碌，但内心却很充实，倒是现在，感觉散漫起来了...不对，不能有这样的思想。”\n“为啥啊老兄，我看悠闲一点不是也蛮好的嘛，没事读读书，去河里抓抓鱼，不是蛮开心的嘛。”\n“是开心呀...但我是党员嘛，先锋队，要时刻保持战斗状态，松懈是不行的...而且现在并不是太平时候，其实还有很多工作要做的，只不过是夏洛蒂不喜欢把行程安排的太紧...”\n“什么啊，我看现在满太平的呀...难道是，德国人又要来了？还是英国人，俄国人？”\n“欸不错嘛，还知道反法同盟。是吧，差不多了，只不过没有俄国人，他们现在是苏联，和我们一样，也是社会主义，只不过不太理解我们罢了...但德国人和英国人的敌意是实打实的，还捎带上了意大利人和西班牙人。”\n“德国...英国...意大利...西班牙...也就是说，我们现在被反法同盟包围住了？”\n阿里斯苦笑一声，长叹一口“儒奥啊，做好打仗的准备吧，我看啊，和平是保不住了...”\n“当时在巴黎，我们不是说我们再也不会被暴君压迫嘛...有你们这样的干部，我说啊，公社一定可以保住的，还可以打出去，把什么德国英国，全都解放了。”\n阿里斯笑了，不知道为何而发笑，也许是因为受到肯定而愉悦，也许是被儒奥的淳朴逗乐，平复以后，才想起回儒奥的话。\n\n“你也是啊，好好学习，不然我们和暴君谁能笑到最后，还不好说呢。”"
 Fontaine_revolution.110.a: "这是一场关乎我们每个人的生存之战。"

 Fontaine_revolution.41.t: "枫苏共同防御协定作废"
 Fontaine_revolution.41.d: "鉴于我国政局发生的剧变，苏联决定不再履行《枫丹-苏联共同防御协定》中规定的义务，苏联外交部长表示枫丹“向小资产阶级的思潮投了降”。而在共产国际召开的大会中，苏共也对枫丹共产党提出了严厉的批评，指责枫丹共产党在公社化运动和政局变动中的软弱和无所作为。"
 Fontaine_revolution.41.a: "为什么我们不能团结起来呢？"

 Fontaine_revolution.42.t: "酝酿中的阴谋？"
 Fontaine_revolution.42.d: "尽管在建立人民共和国以后，我们的外交就几乎和社会主义阵营以外的国家彻底隔绝了，但枫丹似乎从未在国际上如此孤独。\n\n现在苏联也一并抛弃了我们，要保护自由地区的存续，只能完全靠我们自己。但现在国际上还存在着一个更加令人害怕的情况，那就是先前各个国家，不论是民主国家也好，社会主义国家也好，所形成的反法西斯共识正在逐渐地解体。无论是现在主政德国意大利的法西斯，还是海峡对岸的英国保守党，都将自由地区看作是最大的威胁。\n\n枫丹共产党中央委员会主席：莫里斯·多列士发出了这样可怕的预见：枫丹可能面临周围国家的联合干涉入侵，这样的入侵跨越意识形态，跨越民族地缘，致使枫丹可能面临像法国大革命时期反法同盟的威胁。"
 Fontaine_revolution.42.a: "提高警惕！"

 Fontaine_revolution.111.t: "局外人"
 Fontaine_revolution.111.d: "克洛琳德不想离开在众人眼中深不可测的宫殿吗？并不是，退休的生活早已在计划之中。只是她并不知道，离别会这样的仓促。好像前一天，她还在鞠躬尽瘁地为共和国操劳，而后一天，便从各种纷繁的公务中解脱出来，赋闲在家了。\n\n无政府主义的政治理念？克洛琳德不关心这些。只是有一件事情是她不理解的，这座宫殿里容得下一个神，却容不下其它任何人。无政府主义者给他们的神开了一个天大的特例。真是思之令人发笑。好吧，想想，自己已是个和政治无关的局外人，那就，先不考虑这些了。\n最需要担心的反而是住在宫殿里，那个众人眼里深居简出的神。与她称得上亲密的，也就是当初从枫丹一起来的那些人。那维莱特，或许还有自己。那维莱特很久以前就从这座宫殿里离开了，而现在，自己也不再有进出这里的理由了。这样，沫芒宫里除了仆人以外，是真的完全清净了。芙宁娜——或许应该这么称呼她——以后怎么办呢？\n\n回过头来，再想想自己。赋闲在家能做些什么呢？若是每天与花草为侣，与动物为伴，像圣女一般将自己的母性一股脑地倾注在物上，嗯...似乎太过无所作为了。那么做回老本行，握紧自己那把无比心爱的佩剑，拔出那柄许久未动，却不曾生有锈迹，象征着枫丹之律法的利剑，接着做决斗代理人吗？似乎也不行。因为在这个时代，无政府主义者已经将公检法砸了个稀烂，将正义的解释权从自己这个旧时代的遗老中一把夺过，交给了无数普通的工人，农民。这些无名的众生，真的能够把握正义的尺度吗？克洛琳德很怀疑。\n\n无需理解，感受它。既然自己已经不可避免地落后于时代，那么，最好的办法就是静静地看着它的发展。毕竟，一切都在不断地变化之中，不论是人，还是物，终究是要面向未来。不要动怒，不要忧虑，更不要强行把世界变回自己所理解的样子，否则，就是不识趣的行为了。"
 Fontaine_revolution.111.a: "再见，芙宁娜。再见，沫芒宫。"
 Fontaine_revolution.111.a.tt: "§g于是她转身，走进了历史§!"

 Fontaine_revolution.43.t: "反对枫丹的统一战线"
 Fontaine_revolution.43.d: "近来枫丹剧烈的政局变化和异常高速的发展让与之相邻的各个国家对自己的国家安全感到了深深的忧虑，于是一个反对枫丹的统一战线正在被组织起来，我们要考虑我们是否要加入这个同盟来联合扼杀枫丹革命。"
 Fontaine_revolution.43.a: "不能让第一块多米诺骨牌就此倒下！"
 Fontaine_revolution.43.b: "我们不会掺和进来。"

 Fontaine_revolution.45.t: "停战倡议"
 Fontaine_revolution.45.d: "我们已经在战争中失去了两个中重要的盟友，现在我们独木难支，继续战争可能会招致本土遭到入侵的风险。好在枫丹已经向我们发出了停战倡议，我们是否应该接受这个倡议？"
 Fontaine_revolution.45.a: "我们必须寻求喘息之机"
 Fontaine_revolution.45.b: "第一块多米诺骨牌倒下以后，引发的是整个世界的灾难。"

 Fontaine_revolution.46.t: "[FROM.GetnameDef]同意停战"
 Fontaine_revolution.46.d: "[FROM.GetnameDef]无奈地接受了对于枫丹的干涉已经以彻底的失败告终，为了避免进一步的损失，[FROM.GetnameDef]决定接受枫丹的停战倡议。谈判的议程已经开始，我们希望这次停战能够为我们争取到喘息之机，以便未来再图对于全世界的解放。"
 Fontaine_revolution.46.a: "我们又一次粉碎了反法同盟！"
 Fontaine_revolution.46.tt: "和平谈判的进程将会开始"
 
 Fontaine_revolution.47.t: "[FROM.GetnameDef]拒绝停战"
 Fontaine_revolution.47.d: "[FROM.GetnameDef]拒绝了枫丹的停战倡议，他们的高层无视了战争给人民带来的巨大痛苦，一心想要扑灭这股新兴的革命之火，全然罔顾他们的国家已经滑落到了崩溃的边缘。无论如何，既然他们拒绝了和平，我们必将和这帮毫无底线的贵族们奉陪到底。"
 Fontaine_revolution.47.a: "在[FROM.GetLeader]被倒吊之前，我们不会停止战斗。"

 Fontaine_revolution.48.t: "达摩克里斯之剑"
 Fontaine_revolution.48.d: "大洋协约成立了。可以遇见的是，这几个反动国家对于我国的武装干涉已经近在眼前。德意两国的军队也许明天就会越过边境，也许会准备充分再来犯边疆，但无论如何，战争已经近在眼前。"
 Fontaine_revolution.48.a: "团结起来，共御外侮"

 Fontaine_revolution.112.t: "多列士的开幕致辞"
 Fontaine_revolution.112.d: "同志们:\n\n从我们枫丹共产党成立的二十年间，在枫丹，在全世界，为了共产主义和人类解放事业而英勇奋斗和辛勤工作，因而付出了自己生命的同志和朋友，是很多的，我们应当永远纪念他们。请我们与会的同志们全体起立，默哀。\n\n我们这次大会的任务是，总结建党以来二十年间的革命历史经验，团结国内外支持共产主义事业的一切可团结的力量，结束自解放战争以来，我国国家领导人的产生未经程序认可和人民选举的问题。为了在枫丹开启全面的社会主义改造和建设而奋斗。\n\n我们在一个地广人多、情况复杂的大国内，取得了社会主义革命的决定性的胜利。在革命的实践中，证明了建党以来，党中央委员会的路线基本正确，我们的党从一个政治上幼稚而未经考研的党成长为了一个伟大的，马克思列宁主义的政党。我们的党现在比过去任何时期都更加团结，更加巩固了。我们的党已经成了团结全国人民进行社会主义建设的核心力量。我们各方面的工作都有很大的成绩。我们的工作是做得正确的，但是也犯过一些错误。在这次大会上，需要把我们工作中的主要经验，包括成功的经验和错误的经验，加以总结，使那些有益的经验得到推广，而从那些错误的经验中取得教训。\n\n我国的革命和建设的胜利，都是马克思列宁主义的胜利。许多年来，特别是解放战争以来，我们在加强党内的马克思列宁主义的教育方面，做了许多工作。现在，比起解放战争以前，我们党的马克思列宁主义的思想水平，已经提高了一步。但是我们还有严重的缺点。在我们的许多同志中间，仍然存在着违反马克思列宁主义的观点和作风，这就是：思想上的主观主义、工作上的官僚主义和组织上的宗派主义。这些观点和作风都是脱离群众、脱离实际的，是不利于党内和党外的团结的，是阻碍我们事业进步、阻碍我们同志进步的。必须用加强党内的思想教育的方法，大力克服我们队伍中的这些严重的缺点。\n\n十月革命以后，列宁给苏联共产党提出了这样的任务：学习，再学习。苏联的同志们，苏联的人民，按照列宁的指示做了。他们在不长的时间内，取得了极其灿烂的成就。现在，我们要紧跟马克思列宁主义的行动路线，在不断地对工作的批评和自我批评中，不断地加强马克思主义理论和实践的学习。\n\n此外，我们还要端正我们学习的态度：要善于向我们的先进者苏联学习，要善于向各人民民主国家学习，要善于向世界各兄弟党学习，要善于向世界各国人民学习。我们决不可有傲慢的大国主义的态度，决不应当由于革命的胜利和在建设上有了一些成绩而自高自大。国无论大小，都各有长处和短处。即使我们的工作得到了极其伟大的成绩，也没有任何值得骄傲自大的理由。虚心使人进步，骄傲使人落后，我们应当永远记住这个真理。\n\n同志们，我和大家都相信：已经得到解放的人民的力量是无穷无尽的，我们又有伟大的盟国苏联和其他兄弟国家的援助，我们又有世界上一切兄弟党的支持，又有世界上一切同情者的支持，我们并没有孤立的感觉，这样，我们就一定能够一步一步地把我国建设成为一个伟大的社会主义国家。我们这次大会，对于我国的建设事业的前进，将要起很大的推动作用。\n\n今天在座的有五十几个国家的共产党、工人党、劳动党和人民革命党的代表。他们都是马克思列宁主义者，他们和我们有一种共同的语言。他们走了很长的路程来到我国，以崇高的友谊参加我们党的这次代表大会。这对于我们是一个很大的鼓舞和支持。我们对他们表示热烈的欢迎。"
 Fontaine_revolution.112.a: "任务紧迫！"

 Fontaine_revolution.113.t: "夏洛蒂的报告"
 Fontaine_revolution.113.d: "同志们，在这次大会上，我主要想提出一个问题，两个主张。\n\n一个问题，是党内的资产阶级思想的问题。我们的党员犯错误，这是很正常的时期，但是，我们可能犯的错误，有两种性质。一种是一般性的错误，大家都可能犯，什么时候都可能犯。这种错误可能是因为工作经验的不足，是可以在不断地实践和学习中加以改正的。而另一种错误，是原则性的，如资本主义倾向。这是资产阶级思想在党内的反映，是违背马克思列宁主义的立场问题。\n\n就思想状况来说，党内有三种人：有的同志是坚定的，没有动摇的，是马克思列宁主义思想；有一部分同志，基本上是马克思列宁主义，但夹杂着一些非马克思列宁主义的思想；少数人是不好的，是非马克思列宁主义思想。坚定没有动摇的同志们，是值得称赞的，所有的党员要向他们加以学习。但后两种，是在我们的党向大城市进军的过程中，因为突然掌握了资本，而发生了异化的现象。资产阶级一定要腐蚀人，用糖衣炮弹打人。资产阶级的糖衣炮弹，有物质的，也有精神的。我相信，我们的党员同志们，绝大多数是好的，只有少数人是不好的。这些不好的人又可以分为两部分：一部分是反革命分子，应当清除；一部分是犯错误的革命者，包括党员和非党工作人员，应当用批评教育的方法来改造他们。为了保证社会主义事业的成功，必须在全党，首先在中央、大区和省市这三级党政军民领导机关中，反对党内的资产阶级思想。各大区和省市要在适当时机召集有地委书记、专员参加的会议，展开批评讨论，讲清楚社会主义道路和资本主义道路的问题。\n\n接着，我要提出第一个主张，是和前一个党内资产阶级思想有关的。我们共产党必须是群众的党。回顾党二十年以来的革命历程，我们党各项工作的开展，都是以群众运动为核心的。无论是工人的大罢工也好，人民公社的组织建设也好，都是与群众息息相关的，他们大多取得了良好的效果。那么，解决我们党内问题，也势必要和群众运动紧密地相关。共产党，对于群众运动是要起到领导作用的。但是所谓领导，并非高高在上，发号施令，而是亲身地融入真正开展工作的人，与之共甘共苦，这样党委做出的决定才会正确，才会符合最广大人民群众的需要。有一部分思想落后的党员，不愿意这么做，要做高高在上的老爷。那么，这个时候群众要发挥他们监督党委的作用。无论是批评，检讨，还是就地解决，如果一个党员激起了群众的不满，而未能及时的解决，就说明他的工作，是不合格的，是要被人民教育的，这个方式尚不确定，但为此，我主张将公检法的一部分权力下放到地方，不管是公社也好，工人委员会也好，总之要把一部分裁量的权力，交到群众的手中。\n\n第二个主张，就是把枫丹的革命和世界各地的反殖民反封建斗争紧密地结合起来。这部分，因为发言时长的限制，我不再过多赘述，在之后的议程中，我会做详细的报告。谢谢各位党员同志的聆听，谢谢。"
 Fontaine_revolution.113.a: "群众的运动式治理...？有趣的想法。"
 Fontaine_revolution.113.b: "已经可以预见到由此引发的广泛动乱了。"

 Fontaine_revolution.114.t: "马赛尔·加香的发言"
 Fontaine_revolution.114.d: "同志们，关于这次大会上提出的学习主张，我想在补充以下关于苏俄革命的一些历史经验。\n\n我知道对俄国革命在革命道路上超过、胜过其他国家人民有人经常表示不满。有人说过，而且现在还在喋喋不休地重复着，甚至在某些社会主义者中间：俄国是一个如此落后的国家，它不可能成为走在前面的先锋。它应该在经过资本主义制度之后，才能赶上西方资本主义大国。他们应该恪守传统，从资本主义最初阶段向集体主义，之后向共产主义进化。尽管有这些预测，即使我们的预言要被推翻，事实毕竟还是事实，这是巨大的事实，社会主义共和国在莫斯科建立了。这一惊人的历史事件并非象你们中间某些人认为的那样无法解释，突如其来，违反常规。俄国的工业资本主义在战前就拥有六、七百万工人。在纺织、电力、冶金等行业中，机械化程度有时与西方资本主义大国一样高。在那里许久以来进行了热情的宣传鼓动工作，无数先烈为之献出了生命，这一切已经使无产阶级做好了向社会主义转变的思想准备。而且，同志们，请不要忘记，俄国资本主义之所以最先崩溃，其实正是因为俄国资本主义发展的后发性，使得那里的工人，以及有识之士相比于其它国家的先进分子，更早地看出了资本主义的弊病所在，为跨越卡夫丁峡谷提供了可能。而像我们枫丹这样的先发国家，却只能在黑暗中慢慢摸索，所以，我们的枫丹革命比苏俄革命晚了二十年。\n\n同志们，俄国人民与其他任何国家人民一样，从来没有以使用暴力解放自己的癖好。没有任何一个人——尤其是在感情丰富温和的无产阶级中，比如象俄国的或枫丹的无产阶级中——会冷酷地渴望暴力。在当今这个野蛮时代中，他们是世界上与众不同唯一具有人性和良知的人们。同时，他们从历史和自身经历中得到了教训，他们应该从中得到教益。多少个世纪以来，他们遭受着各种各样的压迫，他们的正义反抗运动一直受到残酷缜压，直到今天，他们终于懂得他们不得不使用暴力，这是人类摆脱被奴役地位的唯一方法。\n\n而在世界上的其他角落。在中国，在印度支那，在赤道非洲，在南美洲，有众多的人已经看见了苏俄和我们革命的历史经验，意识到了资本主义发展的弊病，于是转向了世界革命的阵营。但苦于缺乏外部的支持，他们的力量一直十分弱小。我们作为先进的社会主义工业国，我想我们有义务无条件地为他们推翻帝国主义，建立自己的民族民主政权，再逐步地向社会主义过渡提供支持。如果是社会运动，我们就要给他们提供引导。如果已经开始武装斗争，我们便必须为他们提供物质和思想上的一切武器！"
 Fontaine_revolution.114.a: "我们绝不会忘记，我们是世界革命的一部分。"
 Fontaine_revolution.114.b: "很好，但这不是最紧要的任务。"

 Fontaine_revolution.115.t: "娜维娅的发言"
 Fontaine_revolution.115.d: "同志们，作为一个刚刚入党不到一年的社会主义门生，能够在这次大会上得到发言的机会，我很高兴。那么根据我自己进行的一些社会调查，我希望提出这样的主张：\n\n我们的党，是一个非常典型的，列宁所主张的先锋队政党。这样的政党在革命时期有统领全局，领导工人革命的作用，但在现在的和平建设，巩固和发展社会主义的阶段，我们先锋队过于集中的问题就逐渐地显露出来了。\n尽管先锋队在革命之初无疑是最为先进，最具有战斗力的组织，苏俄革命的成功也证明了它的可行性，然而，高度集中的领导体制，结合我们现在国家掌控资本的情况，先锋队失去先进性的问题很容易出现，无论我们的党纪有多么严明，这种腐化现象根植在我们的经济基础上，任何零散的整治运动，都不能根本地解决它。\n夏洛蒂同志提出的利用群众运动这一思路很有价值，但忽略了我们国家有城乡差别，因为假如这样持续不断的群众运动扩散到农村，那么农业生产的总崩溃必然发生，这是非常严重的后果。而在城市里的工人运动，才能作为我们维持社会主义的基础。所以，我们必须要注重工人运动的自发性。无论什么时刻，我们都必须记住，共产党是发源于工人阶级的，无论是革命的进行，还是革命后的监督，都无法脱离工人阶级。历史上的工人运动，远的三大工人运动，近的枫丹大罢工，都不是一个小团体组织策划起来的，而是工人们在特定的历史条件下的自发行动。我们的党要把这样无组织，无纪律的自发运动，变成有纪律，有远见的革命运动，才是我们党的职责所在，而不是包揽全国大大小小的一切事物，成为老大党。\n\n对此，我提出这样的主张：一方面要引入我们社会主义的多党制，要无产阶级专政，不要一党专政，如何一个党无法代表无产阶级，那么就必须下台。其次是缩减工时，将现有的八小时缩小到六到七小时，并且执行强而有力的全民基本收入，为工人阶级的自发运动腾出足够的时间和斗争的资本，我相信以我们枫丹的生产力，是足够做到这一点的。"
 Fontaine_revolution.115.a: "尽管理想化，但可以一试。"
 Fontaine_revolution.115.b: "列宁早已批判过这种思想！"

 Fontaine_revolution.116.t: "议程结束"
 Fontaine_revolution.116.d: "人民共和国的国体相较于先前的枫丹共和国没有太大的变化，依然采用了一院的议会共和制。名义上的国家最高领导人依然是共和国总统，也就是芙宁娜·德·枫丹。行政权力则掌握在总理手中。枫丹(法国)共产党-工人国际枫丹支部是最为主要的政党，几乎独占了国民议会的全部席位，所以事实上，枫丹人民共和国的选举于一般多党制的选举是有差别的，它更类似于枫丹(法国)共产党的党内选举。革命后，因为芙宁娜在人民共和国内的特殊地位，她也被推为枫丹(法国)共产党的名誉主席，党内选举的胜出者，则是成为总理主政人民共和国。\n\n在大会议程结束以后，党内选举便开始了。"
 Fontaine_revolution.116.a: "谁将拔得头筹？"

 Fontaine_revolution.117.t: "选举日"
 Fontaine_revolution.117.desc: "我们的党员们已经发声，在到场的两千名来自各地的党员，和一千五百名工人代表，一千名农民代表和五百名社会各界的其他代表们履行了自己投票的神圣义务，这将成为以后党代会的固定搭配。人们写下自己最支持的候选人的名字，缓缓地走向投票箱。\n\n经过三轮反复的清点排查以后，最终的胜者是..."
 Fontaine_revolution.117.a: "莫里斯·多列士！"
 Fontaine_revolution.117.b: "夏洛蒂·阿黛尔！"
 Fontaine_revolution.117.c: "马赛尔·加香！"
 Fontaine_revolution.117.d: "娜维娅·卡斯帕！"

 Fontaine_revolution.121.t: "土耳其入侵库尔德斯坦"
 Fontaine_revolution.121.d: "取得民族独立，赢得民族自决是数千年来库尔德人的梦想，可惜的是，他们的聚落散布在四个国家的边陲，每有一次敢于梦想的尝试，库尔德人面临的便是四国独裁统治者恐怖的报复。当这一梦想在枫丹的帮助下终于有了实质性的进展后，军阀控制的土耳其政府担心自决之火会烧到自己国家的境内，于是选择入侵这个新成立的国家。"
 Fontaine_revolution.121.a: "我们必须保卫库尔德人，保卫中东的革命先锋！"

 Fontaine_revolution.121.tt: "库尔德的左翼在战后可以参与选举。因为我们的支持，他们的胜利机会很大"
 Fontaine_revolution.122.t: "库尔德左翼赢得战后选举"
 Fontaine_revolution.122.d: "幸运的是，我们的鼎力支持并未白费，库尔德左翼因为在战争期间做出的巨大贡献，轻而易举地拿下了绝大多数的选票。虽然库尔德的传统贵族对此有所不满，两派人马曾有过激烈的冲突，但好在在我们的枫丹军团的支持下，库尔德的左翼还是保住了政权。现在，他们的外交方针就是全面向枫丹靠拢。"
 Fontaine_revolution.122.a: "极好的结果"

 Fontaine_revolution_news.2.t: "库尔德赢得独立战争"
 Fontaine_revolution_news.2.d: "在过去的几个世纪里，库尔德人经历了无数的苦难。他们被不同的帝国统治，被不同的政权压迫。他们的家园被战火摧毁。然而，库尔德人始终没有放弃对于独立的追求。现在，库尔德人经过一场血腥的战争，终于迎来了独立的曙光。\n现在，取得了独立的库尔德人面临着重建家园，发展经济，以及解决自身的社会问题等诸多任务。考虑到枫丹人民共和国对于他们的支持，库尔德人对于未来的前景相当乐观。"
 Fontaine_revolution_news.2.a: "自由，自由万岁。"

 Fontaine_revolution_news.3.t: "土耳其镇压库尔德民族起义"
 Fontaine_revolution_news.3.d: "一直以来，土耳其政府对库尔德人采取的措施一直堪称强硬，修订宪法，出动军队，以彻底消除库尔德人的民族意识为目的。而这样的政策最终激起了反抗，库尔德的左翼武装在枫丹人民共和国的支持下再度发动起义。不幸的是，铁腕最终还是镇压住了民族觉醒的意识。土耳其军队烧毁了206个库尔德村庄，摧毁了8758栋房屋。无数的库尔德人在这场冲突中失去了家园，他们与独立的愿望似乎再度渐行渐远。"
 Fontaine_revolution_news.3.a: "主权，丝毫不容侵犯。"

 Fontaine_revolution.124.t: "[FROM.GetName]政变完全成功"
 Fontaine_revolution.124.d: "我们的特工与当地的共产主义准军事组织的配合相当密切。在我们的特工控制住皇室的同时，民兵们迅速接管了首都包括广播电台，军营等各大要地，以几乎不流血的代价完成了这次革命。"
 Fontaine_revolution.124.a: "再好不过的结果"
 
 Fontaine_revolution.125.t: "[FROM.GetName]反革命势力反扑"
 Fontaine_revolution.125.d: "尽管我们的特工一度控制住了皇室，但准军事组织对于首都各大要地的接管并不顺利。尤其是军营，顽固的军队首领还带领士兵向我们的准军事组织还击。显然，想要和平完成这次革命是不容易了。"
 Fontaine_revolution.125.a: "武装革命也好。"

 Fontaine_revolution.128.t: "黎凡特联盟方案"
 Fontaine_revolution.128.d: "枫丹提出了在他们势力范围内的叙利亚，黎巴嫩与我们的巴勒斯坦和约旦内成立黎凡特联盟的方案，该方案的目的旨在解决当地犹太人与巴勒斯坦人的冲突问题。在方案中，枫丹明确提出了不会强行干涉黎凡特的政局，保证黎凡特拥有民主政府，并且全部领土由枫丹和英国国际共管。"
 Fontaine_revolution.128.a: "也许可以争取一下？"
 Fontaine_revolution.128.b: "为什么要与枫丹分一杯羹。"
 Fontaine_revolution.129.t: "英国批准协议"
 Fontaine_revolution.129.d: "虽然英国的目的大致可以被揣摩为想要借由国际共管之名将叙黎地区收入囊中，但好在协议的结果是批准的。英国政府现已授权当地官员操办与我们的行政机构和合并事宜。"
 Fontaine_revolution.129.a: "完美。"

 Fontaine_revolution.130.t: "英国拒绝批准黎凡特联盟方案"
 Fontaine_revolution.130.d: "英国人似乎对自己在中东的掌控力十分自信，觉得有能力控制住当地犹太人与阿拉伯人不断升级的暴力行为，傲慢地否决了我们的联盟方案。但...没有关系，叙黎地区也可以作为妥协方案，作为犹太人可供选择的另一个定居点。"
 Fontaine_revolution.130.a: "他们根本不关心巴勒斯坦的混乱与否。"

 Fontaine_revolution.131.t: "分裂"
 Fontaine_revolution.131.d: "也许在未来某一个尘埃落定的时刻，现在彼此仇视的阿拉伯人与犹太人，会想起他们曾经有一个梦想。一个彼此亲如兄弟，安宁地生活在这片古老土地上的梦想。有一次，这个梦想已经无限接近于真正实现，他们真的组建了联盟，犹太人为阿拉伯人的生计而发愁，阿拉伯人欢迎从海上而来的一船船犹太移民。不知是从哪一个时刻开始，这个足以当作童话故事的现实走向了衰亡。\n\n现在，千年来历战的黄沙上烽烟再起，布满干河床的是无数无冢之骸，灵魂始终在荒野中游荡，寻找至此的原因，直到彻底消散。假如哪位为和平血战致死的战士，因为心中怨念而魂魄迟迟不肯消散，以幽灵之身审视这片土地从安定到战乱的过程，他也许可以开始推理，而所有事情将会指向同一种人：他们身居西欧，高高在上，渴望重绘地图，手掌万民之命运。是谁？唐宁街的住户，还是波旁宫的议员？也许永远不得而知。"
 Fontaine_revolution.131.a: "民族国家，最终结局。"

 Fontaine_revolution.133.t: "夏洛蒂南部视察"
 Fontaine_revolution.133.d: "奥克西塔尼亚，南部的代名词，也许是枫丹人眼中中世纪风情仅存之地。加尔桥，罗马时代便矗立在加尔河上方；风车磨坊，也许兴建于中世纪；还有农民，世代在此耕种，构成了枫丹人想象中南方的所有要素。\n\n然而，这样的图景只能存在于老一辈枫丹人的记忆之中了。短短几年时间，农业合作，人民公社，已经让这片古老土地变了模样。\n夏洛蒂参观的，是加尔河沿岸城市，尼姆附近的一处农庄。这座农庄，可不得了。奥克西塔尼亚是枫丹最晚响应农业合作化的地区，可这座农庄却在号召发出以前，自行完成了合作化。提前量并非是几天或是几周，而是整整两百年。这里的农民很早就意识到，单干没有出路，工业的蓬勃发展，小农失去土地成为工人，是迟早的事。于是他们组织起来，签订契约，互帮互助，形成原始农村公社，与俄国农村公社在东西欧各形成了一颗预示社会主义终将到来的亮星。\n\n“你们的水坝，办得很好；你们的农场，办得很好；你们的社员，眼光真的不是一般的长远！公社可以挺过两百年资本主义的风风雨雨，活到社会主义时期，更是一个人间奇迹！两百年前，就有合作的先行者；两百年后，再落后的分子也要赶快团结起来呀！”夏洛蒂向社员挥着标志性的报童帽，笑着这样说。\n\n夏洛蒂的话，完全不夸张，甚至还可以说很谦虚。这个公社，两百年来从未闹过灾荒。即使是西班牙大流感这样的灾难，也没有造成大规模死亡。进入工业时代以后，农业机械化速度更是惊人，公社三百五十人，拖拉机数量达到了二十辆。粮食人均消费量，也是大区顶尖。"
 Fontaine_revolution.133.a: "一个社会主义的奇迹，一个绝佳的光辉模范。"

 Fontaine_revolution.134.t: "更改指标"
 Fontaine_revolution.134.d: "各行各业年度生产指标的指定是相当有讲究的。它的关键在于追赶上人民对于建设社会主义的热情。一个太过稳健的指标，会让人民的热情遭受打击，正常工作结束以后，便只能停工，热情大打折扣。一个太过激进的指标，虽然一定程度上可以激发工作者的热情，但一旦无法完成，对于热情的打击更为严重。\n\n我们的领导层判断，当前我国经济的发展形式相当乐观，计划的制订似乎有些过于保守，还有向上提高指标的空间。"
 Fontaine_revolution.134.a: "提高10%"
 Fontaine_revolution.134.b: "提高20%"
 Fontaine_revolution.134.c: "直接加50%！"
 Fontaine_revolution.134.tt: "头脑是不是有些发热"

 Fontaine_revolution.135.t: "一个理论的基础"
 Fontaine_revolution.135.d: "关于知识分子定性的争论已经在大会堂里持续了两天。回顾枫丹革命的几年来，知识分子，或者说是文艺创作者这一特殊群体，可以说是给运动添了不少乱。\n早在枫丹(法国)共产党改组初期，新任第一书记夏洛蒂·阿黛尔就提出了“文艺为政治服务”的主张，希望诸多的文艺工作者可以走出几平方的小书斋，鼓励他们都创作一些反映工农兵生活，反映革命运动的文艺作品。当时大会开的是热烈，可惜现在看来，效果十分有限。\n文艺工作者在革命胜利以后，大致分成了三部分；一部分是还在走旧社会的老路子，花费最多笔墨揭露社会阴暗一面；另一部分，就是本来就喜欢风花雪月，还在写资产阶级奢靡生活的；最后一部分，才是已经成功转变过来，向高尔基学习，开始创作反映社会主义发展的作品的创作者，而这一部分只占少数。\n\n很多党员在座谈会上尖锐地批评知识分子。觉得这群人就是读书读多了，就有一种凌驾于工农群众之上的高傲感。好像写了他们的生活，就脏了他们案头一样。但是前一天没有出席座谈会的夏洛蒂却有不同的见解:\n\n“现在，我们先来分析一下知识分子本身。文艺工作者是如何谋生的？他们要把他们的作品卖给给人看嘛，那么别人就要爱看他们写得东西，才会去买。那么资本主义社会，谁最能消费他们的作品？自然是资产阶级。所以说，文艺工作者是必须依附于某一个阶级，才能存活的。你看，中国的封建社会，就有董仲舒来为地主阶级辩经；我们的资本主义社会，就有莫泊桑写东西给资产阶级消费。那么，现在是社会主义社会，谁能成为文艺工作者的衣食父母？劳动群众嘛。所以关键就在于一个转变的过程。当然，继续让他们呆在书斋里，这样的转变是来不了的，所以，必须要让他们和劳动群众一起劳动，才能完成思想的转变。”"
 Fontaine_revolution.135.a: "去体验，去创作！"

 Fontaine_revolution.136.t: "入学第一考"
 Fontaine_revolution.136.d: "“夏洛蒂同志！这群新来的工农兵大学生，真的让我们校方很难办啊！”\n说话的人，是巴黎大学的校长，塞莱斯坦·布格莱。两周前，学校收到了中央下发的通知，要求二十五位仅有小学文化水平的劳动者进入大学就读。毫无疑问，入学的第一场考试，这群来自工农兵的大学生全部挂科，而且并非接近及格线，而是几乎全是白卷。\n“塞莱斯坦同志，这二十五位学生，已经是劳动者中最为优秀的啦。他们其中有人拿过两次劳动模范称号，有人身先士卒亲自营救受困矿洞的工友。我想，他们是有资格来上大学的。”对于校长的质疑，夏洛蒂是相当理解的。不就是说他们成绩不行，想要辞退嘛，接下来的说辞，那真是猜都可以猜对。\n“夏洛蒂同志啊，”校长从口袋里拿出一块布，擦了擦额头上不断冒出的汗珠“对于他们的资质，我是没有任何异议的。没有基础的知识，他们怎么能理解大学的知识呢？而且，他们没有经过任何认证就来这里读书，对真正用分数考进来的同学也不公平对吧...影响不好...”\n\n“布莱格先生。”夏洛蒂站直身子，口吻似乎严肃起来“以前，你们的大学都是什么人在读？你们的学费，你们的分数标准，不就是把高等教育彻底地和穷人，和无产阶级隔离开来了吗？只给以前的资产阶级，给现在的官僚子女提供教育，这就是公平吗？富人子女在宽敞教室里坐着上课的时候，这二十五个大学生，有人在播种小麦，给你们提供口粮；有人在挖煤，给你们供给燃料；还有人在当兵，给你们教室提供安全庇护；他们做了这么多事，凭什么不能接受高等的教育？”\n夏洛蒂极力冷静下来，把语气变得柔和一些。\n“先生，请你把中央的文章下发到每一个学生手中，让他们好好读读。基础教育是不急的，他们可以自己慢慢理解。”"
 Fontaine_revolution.136.a: "每个人都不缺乏学习能力，阻碍他们的只是教育壁垒罢了。"

 Fontaine_revolution.137.t: "党内的托洛茨基分子？"
 Fontaine_revolution.137.d: "应该说，枫丹的确是一个包容的国家。诸多俄国革命者在失败后，枫丹是他们的首选目的地。比如马赫诺，就病终于枫丹。但这也使得枫丹境内的左翼力量鱼龙混杂，原来就有的法国总工会是一股强大的力量，俄国革命以后，斯派和托派又登上了舞台，最新加入的，还有从中国研学归来的延安派。\n在革命时期，虽然各个派别的理论有所差异，但革命胜利的共识还是让整个左翼团结在了一起。现在革命结束了，路线之争又起来了。理念相差不大的斯派和延安派团结在了一起，这样，托派就显得尤为突兀了。\n不过，枫丹的托派行事相当规范。在革命时期，托派做了很多有益的工作，也没有到处搞破坏。革命结束以后，托派大体上还是服从党中央的指示，至少是现在，还没有发现独立王国的迹象。我们的总书记，莫里斯·多列士同志一直是坚定的斯派，因为苏联近期发生的针对托派的大规模打击，他便考虑将肃托提上党的日程表，但这引起了夏洛蒂的激烈反对。\n\n夏洛蒂认为，现在最紧要的任务，是反法西斯，其次是反对资本主义，鉴于托派从未做过什么对革命不利的举动，路线分歧完全可以延缓，无视实际情况肃托，除了破坏党的团结，分裂整个左翼运动之外，并无任何裨益。\n\n局势似乎正在起变化。在苏联刚刚建立、国内经济困难、局势不稳的情况下，托派的主张造成了巨大的破坏。但现在，苏联进行了相当程度的工业化，经济位于世界前列。而枫丹也是高度工业化的一个大国，那么，托洛茨基的理论似乎有了一定的价值。"
 Fontaine_revolution.137.a: "分裂迟早会发生，让托派取得先手不如我们先出击"
 Fontaine_revolution.137.b: "托派也许是可以被统战的？"

 Fontaine_revolution.138.t: "整风"
 Fontaine_revolution.138.d: "中央计划经济已经持续了一段时间，这两年来，人民共和国取得的成就不可谓不大。但事情似乎正在起变化，我们高度集中的行政体制催生了党内的官僚主义，在执行经济计划的过程中，命令主义的现象逐渐增多。\n不少曾经和群众打成一片，亲身投入到生产第一线的好干部，如今似乎双脚瘫痪无法下地。整天只是坐在办公室里，直到茶水喝干，板凳坐穿，到了点便走人。群众工作遇到问题，日常生活中有怨言毫不关心，高高挂起。这种作风由小问题逐渐发展为大问题，如果不加管束的话，我们极力规避的情况就会变为现实。\n相比于内部改革，外部压力也许更能逼迫我们的干部做出一些改变。按照莫里斯·多列士的意见，发动党外的文艺工作者，延安派，总工会，对我们的干部进行一定批评，加上建议。造就一个又有集中又有民主，又有纪律又有自由，又有统一意志、又有个人心情舒畅、生动活泼，那样一种政治局面。\n\n从目前的效果来看，整风起到了不错的效果，广大干部群众包括许多有影响的党外人士积极响应号召，对党和政府的工作以及党政干部的思想作风提出大量批评和建议。绝大多数意见比较中肯，富有建设性，对我党整风、改正缺点错误大有益处。至少从表面上来看，言论的自由还是一定程度上压制住了党内的官僚主义风气。"
 Fontaine_revolution.138.a: "也许民主建设应该被提上日程。"

 Fontaine_revolution.139.t: "对“右派”的总攻"
 Fontaine_revolution.139.d: "整风运动的发展愈发的奇怪了起来。一周前，几位记者在蒙特勒伊被警察逮捕了，他们算是因言获罪，写了几篇尖锐批评党员干部天天坐办公室，不去生产第一线的文章，就获得了一顶“反对党的领导，反对社会主义路线”的大帽子，于是顺理成章地被地方党委批准逮捕了。\n\n这似乎成为了一个值得全国干部学习，积极打退右派进攻的好榜样，全国争相学习蒙特勒伊的光辉事迹。用蒙特勒伊地方党委，萨罗先生的话说，就是“右派的进攻比我们想象中的要猛烈得多，潜藏在暗处的反革命分子规模远超我们预计，我们必须积极打退他们的猖狂进攻。”\n\n这件事情把夏洛蒂弄得非常恼火。生气到最后，居然在中央政治局会议上笑出声来了。“哈哈...进行批评，提出意见不是党中央下发的指令吗？地方大员们的政治嗅觉还真是敏锐，以为我们搞大鸣大放是要把有意见的人全部揪出来呢。允许别人提意见，才知道谁对你有意见是吧。”\n笑完，夏洛蒂才喝了口水“我看就是这帮地方官听见反对声音就怕，心虚嘛。不肯反思，与其改正自己的错误，不如给别人扣顶右派的帽子，让他消失算了。”。莫里斯·多列士也对形式的发展十分吃惊，但考虑到自己认同夏洛蒂可能带来的坏影响，只能沉默以对。\n\n整风运动实际上已经彻底破产了。地方上针对“右派”的清算已经让整个舆论界鸦雀无声，没人敢说话了。文化各界和工会方面对于党的信任，似乎也遭到了严重的破坏。我们的社会主义民主建设，也被无情地打断了。看来，整治这群官僚，还需要另寻它法。"
 Fontaine_revolution.139.a: "能不能赶紧把这破事叫停啊..."

 Fontaine_revolution_start.1.t: "占领工厂！"
 Fontaine_revolution_start.1.d: "三十年代初，枫丹共和国（那时候还叫法兰西共和国）经历了一场无比剧烈的通货紧缩，物价普遍下降40%到45%，工资却下降了60%左右。毫无疑问，工人阶级成为了应对大萧条举措的最大牺牲者。痛苦被时间冲淡，却在心中留下缔结。时值1936年初，枫丹仍未从经济危机中恢复过来，工人阶级忍耐太久。于是，工厂里便传出敲打机器的响声，作为罢工前奏曲，提醒芙宁娜，以及内阁所有成员，经济没有任何乐观空间，而抗争要来了。\n\n1936年，5月，勒阿弗尔\n\n清脆的金属撞击声又响起来了。督工如果经验老道，就知道这是工人们约定罢工的信号。害怕个人追责，于是不可辨别方位的声音，就成为了绝佳的传达方式。你一敲，我也敲，如果大家一起敲起来，组成金属碰撞大合唱了，那么罢工就成了。\n事情果然如同预计发展，碰撞声越来越多。但督工却不知道，他的结局是被无情地赶出工厂，而罢工早由总工会一手策划。几天以前，一则指示已在工人中传开，内容是：敲打机器，赶走督工，坚守工厂，防止停工。\n饥饿可以让他们拱手而降吗？还真不能。罢工基金——这一罢工时期的救命稻草，此刻发挥了他的作用，工会供给他们坚持斗争。这场运动既然执行得如此周密，那么目标就显然不只是改善一个工厂工人的权益。整个勒阿弗尔，甚至整个枫丹，都在考虑范围以内。"
 Fontaine_revolution_start.1.a: "棘手。"

 Fontaine_revolution_start.2.t: "广泛响应"
 Fontaine_revolution_start.2.d: "勒阿弗尔在总工会的规划中，除了是第一个开始罢工，并无其它特殊之处。而加莱，兰斯，里尔，里昂等工人密集的城市，已在规划中被早早地安排好。今天，北部停摆。明天，中部停摆。后天，全国工厂，都停摆，也许可以让不清真相的旁观者认为罢工云集响应，快速扩散，呈星火燎原之势。于是产生一种恐慌，这时，心态也可以成为谈判筹码。\n\n策略起到了效果，至少，芙宁娜是被吓到了。深感事情不妙，让步不多一些，这关恐怕是难过。新君践祚，枫丹共和国人心思变。并非所有人都喜欢芙宁娜，右翼就对她不以为然。这次罢工的处理，对于谁来说都非常重要，无论是芙宁娜，还是普通工人。\n克洛琳德，除了来源于决斗常胜不败的威严，还因外交天赋出人意料而享誉于枫丹。既然擅长和外国人打交道，那么也许对内罢工谈判也可以良好地处理？从结果上来看，至少芙宁娜是这么想的。"
 Fontaine_revolution_start.2.a: "博弈开始。"

 Fontaine_revolution_start.3.t: "小心安抚"
 Fontaine_revolution_start.3.d: "克洛琳德手中筹码不多。对于工会，唯一可以采取的态度是小心翼翼地安抚，生怕整个枫丹的工业命脉遭到掐断，到时候肯定是不好收场。\n就克洛琳德本人立场而言，让步的确是在考量范围以内的。影响考量的因素，除了威逼，还附带着本人意愿。涨工资，降工时，如果从马克思主义政治经济学的角度来看，是斗争果实；在西方经济学看来，也是促进生产，刺激消费的妙招；甚至还有道义上的胜利。\n各自想法，两方心知肚明。奇怪的默契之下，谈判异常顺利。涨薪15%到25%，四十小时工作周，带薪休假等要求，克洛琳德悉数同意。很快，这份方案便会送交议会审阅。"
 Fontaine_revolution_start.3.a: "那群老家伙最好通情达理一点。"

 Fontaine_revolution_start.4.t: "议会表决陷入僵持"
 Fontaine_revolution_start.4.d: "“涨工资和减工时，会让枫丹的商品在国际市场上丧失竞争力！”愤怒议员声嘶力竭地大吼着。\n可能克洛琳德回顾一生，也找不出比这个论断更好笑的言语了。对方似乎毫无经济学常识，但无论是已经投出自己一票的人民阵线左翼议员，还是克洛琳德，都心知肚明荒唐言论背后的缘由：右翼自然清楚法案通过可以给整个枫丹带来怎样好处，但自己工厂效益蒙尘损失，绝对不可接受。至于空泛的国家前景，工人生计，不在理性的考量范围以内。\n迫于压力，国民议会的表决还算顺利，人民阵线和审判庭一齐透出了赞成票，以331票对245票的优势拿下了国民议会。但参议院就没那么顺利了，两票，加上通过法案需要的一票，三票的差距让表决卡死在了参议院。好在差距并非无法弥补，也许我们可以通过一点其它手段让法案通过。"
 Fontaine_revolution_start.4.a: "芙宁娜，她会出手。"
 Fontaine_revolution_start.4.b: "如果是为了整个国家，也许一点小小的腐败也是可以接受的..."

 Fontaine_revolution_start.5.t: "《劳动法》一九三六年第一修正案获得批准！"
 Fontaine_revolution_start.5.d: "一点小手段。也许不算是那么光彩，好在我们的目的还算称得上正义，所以也可以容忍。总之，参议院最终还是被搞定了。\n议会又进行了新一轮表决，国民议会还是老样子，而参议院可算拿下了半票...加一还不止，两票。两院可算达成一致，落实《劳动法》修正案可算是被提上了日程。"
 Fontaine_revolution_start.5.a: "感谢芙宁娜。"
 Fontaine_revolution_start.5.b: "呼...不错的结果。"

 Fontaine_revolution.141.t: "非洲农业联盟"
 Fontaine_revolution.141.d: "要问非洲从事那种劳动的人数最多，那应该是农业了。除去深居内陆，在漫漫黄沙中放牛牧马的牧民，大部分的黑人都在种植园中劳动。但一方面殖民政府和地主偏好经济作物，一方面生产方式与工具极端落后，使得饥荒成为了常态，农民生活极为困苦，但也带来一个成功的副作用——困苦的农民成为了遍布广大农村的雄厚革命力量。\n\n尽管在本土，枫丹已经进入了社会主义社会，但在广大的殖民地，依然是地主掌控的封建社会，甚至存在着奴隶制残余，这些东西无法依靠政令和法律来改变，需要农民自己打倒地主，成立合作者，建立农村的社会主义，也就是依靠广泛的农民运动。\n\n农民运动也需要一个思想先进，行动务实的组织来领导，这个组织近期在阿比让成立，其活动得到了巴黎方面的完全授权，而名字便是非洲农业联盟。费利克斯·乌弗埃-博瓦尼，已经在殖民地以旗帜鲜明的反帝反殖民立场得到了广泛的支持，自然地成为了组织的领导者。普通干部里多有白色的面孔，他们是志愿者，或者是基层的党员，以学习的名义加入组织，前往非洲历练。这一次这些白色的面孔不再是百年前带着武器奴役黑人的殖民者，而是国际主义的先锋。"
 Fontaine_revolution.141.a: "期待你们的成果。"

 Fontaine_revolution.142.t: "向内陆进军"
 Fontaine_revolution.142.d: "最初，非洲农业联盟的活动被局限在了沿海的数个省份，其组织和运行几乎完全以来枫丹的援助。但随着第一代领导人在实际的工作中得到了锻炼，非洲农业联盟动员农民群众的能力显著增强，得到了武装农兵成群结对地冲进庄园主的宅邸，焚烧地契，撕毁劳动合同。农业联盟的干部们带领着农民们丈量土地，品评土质，组织农民们成立合作社共同劳动。\n\n在沿海地区取得了胜利的非洲农业联盟并不满足于这些成就，以博瓦尼的话来说，就是“一小步”。向内陆的进军正刻不容缓地进行着。除了在枫丹控制下的马里和上沃尔特，一些胆大的成员还进入了英属尼日利亚。在马里，农兵打的当地的大奴隶主矛头鼠窜，千万奴隶废除了时代承继的奴隶身份，得到了不曾有过的自由。看起来，社会主义在非洲农村的进展似乎高歌猛进。"
 Fontaine_revolution.142.a: "但是我们还可以有更大的成果！"

 Fontaine_revolution.143.t: "非洲农村的社会主义高潮"
 Fontaine_revolution.143.d: "这年也许可以称作是非洲农民们破除迷信的一年。在农村大革命的过程中，一些农民非要做自耕农不可，坚决不加入合作社。结果，也在合作社节节高升的粮食产量，以及不断提高的生活水准面前打消了继续单干的念头，只好相信新事物。\n\n夏洛蒂也破天荒地来了一次西非，来进行非洲农民运动的考察，听说了当地社员讲的故事以后，感动得两行清泪就这么在同志们面前留下来了，写就一篇《非洲农村的社会主义高潮》，来赞扬非洲如火如荼的农业社会主义进步。她听说，本来一个十几户人家只有一只耕牛的合作者，现在粮食产量已经位居合作社前列，从草原上取来各种资源，发挥自己的才智打造成工具，兴修水利，培育作物。更听说，靠近撒哈拉边境的合作社，为了抵御沙漠南侵，已经开始自己动手，准备修一道绿色长城。\n\n这是大海的怒涛，一切妖魔鬼怪都被冲走了。社会上各种人物的嘴脸，被区别得清清楚楚。党内也是这样。这一年过去，农村社会主义的胜利就有了很大的把握了。当然还有许多战斗在后头，还要努力作战。"
 Fontaine_revolution.143.a: "机会主义的邪气垮下去，社会主义的正气升上来！"
 Fontaine_revolution.143.tt: "我们现在可以着手成立§R西非联邦§!"

 japan.23.t: "帝都不祥事件"
 japan.23.d: "二月二十六日的东京不再秩序井然。此起彼伏的刺杀事件将皇道派与统制派的矛盾彻底地摆上了台面，已经有两位前首相惨死于皇道派叛军之手。\n\n皇道派叛军一度占领了整个东京，但最为关键的两个行动目标——现任首相冈田启介和皇居，均未被叛军攻陷。天蒙蒙亮时，大日本帝国陆军已在东京城外集结，皇道派与毁灭仅有一道命令之差。冈田启介不见踪影，而政要不是已被刺杀便是不敢出门，日本的命运再度落到了天皇一人的意志手中。"
 japan.23.a: "天皇陛下批准了陆军平叛"
 japan.23.b: "天皇陛下认同了皇道派的主张"

 chinacommon.4.t: "国共紧张对峙"
 chinacommon.4.d: "国民革命军总司令蒋介石委员长近日发表《告全国同胞书》，强调“国家统一不容分裂”，要求中共武装力量即刻接受整编。而中共领袖毛泽东则在延安《解放日报》头版以《两条道路的抉择》回应，斥责国民政府“独裁统治欲扼杀民主诉求”。双方虽未正式宣战，但华北、华中的铁路枢纽与战略要地已频现小规模交火，据前线观察员报告，陇海铁路沿线夜间屡传枪声。\n当重庆与延安的谈判代表在南京闭门磋商时，中国四万万民众的呼吸与命运，都悬停在这脆弱的天平之上。"
 chinacommon.4.a: "人民万岁！"
 chinacommon.4.b: "秋海棠即将再度归于一统！"
 chinacommon.4.c: "兄弟阋墙。"

 chinacommon.5.t: "中国内战"
 chinacommon.5.d: "中国国民政府军事委员长蒋介石今晨发表广播讲话，痛斥中共“破坏政令军令统一”，誓言“三个月内解决战事”。延安方面则通过新华通讯社发布《为生存而战》檄文，指控国民政府“勾结帝国主义实施法西斯暴政”。值得注意的是，双方均未正式宣战——重庆称之为“戡乱”，延安则定义为“解放斗争”。三十万国军对鄂豫边界的共产党中原军区发起全线进攻，毛泽东今日于延安电台以“自卫战争”名义号召全国抵抗。这场被双方称为“生死决战”的冲突，标志着中国正式坠入全面内战的深渊。"
 chinacommon.5.a: "逐鹿中原！"
 chinacommon.5.b: "鹿死谁手？"

 French.200.t: "她完美的道德"
 French.200.d: "夏尔·莫拉斯从未得到过芙宁娜的接见。但仅仅是通过报纸上的几张照片，便可以让他老迈干燥的眼中分泌出几滴干涩的眼泪。照片上的噪点模糊了芙宁娜的脸，却也如同轻薄的面纱，一点想象的空间因此而存留。在莫拉斯的想象中，芙宁娜应该安静地坐在教堂中，穿着端庄得体的衣服，丁达尔效应给她的脸上打上金色的光，一切都是安宁，美好的，像圣母玛丽亚。尽管因为芙宁娜的神性所在，圣母并不合适形容芙宁娜，但也无法找到更好的比喻了。\n\n假如这是一幅油画，那么至少在这一部分，它是和谐的。但枫丹的画布可不止这么大，在芙宁娜的周围，还存在着暴力，与之形成强烈的冲突。和谐的秩序，被撕裂的混乱所包围，莫拉斯无法接受。而一切恶的根源在于一百五十年前那场国民性的疯狂，从此混乱就在枫丹的上空阴魂不散，百年以来并无改观。而将失序扳回秩序的轨道，一定要彻底摧毁疯狂的产物——这个共和国，从而回归贵族在田园中盛装游行的美好日子。\n可惜，曾经以君主之德统治过这片土地的家族，到这一辈，不是趋于平庸，便是已经失去了感化人心的道德。要说君主的美德，似乎，芙宁娜才是君主美好特质的集合？"

 French.201.t: "开始的结束"
 French.201.d: ""

 Fontaine_revolution.144.t: "共产主义，美好明天"
 Fontaine_revolution.144.d: "卡尔·马克思的一生颠沛流离。除却故土德意志，这片现在被称为枫丹的土地是他驻足停留最久的。生前，他目睹法兰西内战，看见科学社会主义的第一次实践。不知在他停止思想的那一刻，是否还期待着法兰西可以成为人类历史上第一个社会主义国家？\n\n诞生于阴暗无光纺织工厂，和被炉火映得通红炼钢厂中的工人阶级，斗争十年，斗出了空想者的思考。又斗争一百年，斗出了科学社会主义的指引。可喜的是，在得到指引以后，英勇的工人阶级只花了不到五十年，便在东方一个广袤大国，西方一个传统资本主义强国建立起自己的政权。在战斗中，连凯撒与神明都不曾惧怕过，只是举着布满老茧的双手，用嘶哑的声音呐喊，我是自己的主人。\n\n再过一个五十年，斗争，直到人类迎来新的千禧年，世界又会是什么样子？按照现在的趋势，不管是钢铁带的炼钢工人，还是中国乡野中劳作的农民，到那时应该都能团结在同一面旗帜下吧。社会发展越来越快，人类花了十己万年的时间，研究出私有制。又花了一万年，发现了私有制的弊端。现在，私有制已经在一些地区崩溃了，就像是在资本主义看来似乎坚硬的外表上，撕出两道无比剧烈的口子，现出了一片汪洋大海来，只要它动荡起来，就能把由坚硬岩石构成的大陆撞得粉碎。\n\n现在世界上还有一些为私有制痛哭流涕的人，吵吵嚷嚷地大喊共产主义是对人权最邪恶，最赤裸裸的侵犯。言语上的侮辱，恰恰是暴露了内心最为深切的恐惧：即使是过去声势再为好大的起义或者革命，思想也注定是他们天生的短板。可现在他们具备了从思想到行动上的武器，因而威胁从未如此之大。于是便急匆匆撕下了民主的面具，蛊惑同病相怜的人们自相残杀，用最恐怖的武器镇压有组织的工人，用哪怕下流的谣言毁谤革命者。\n\n然而在整个欧洲和美洲，从西伯利亚矿井到加利福尼亚，千百万革命战友无不对革命表示向往与肯定，对最为先进的先锋队致以敬意，尽管革命必然有敌人，但未然有一个是因私而结的。总有某些人哀叹昔日残阳的落下，可一个不争的事实是，明天，一个更为灿烂明亮的朝阳将会升起。"
 Fontaine_revolution.144.a: "残阳如火，但那是朝日序奏。"

 Fontaine_revolution.145.t: "巴黎，巴黎"
 Fontaine_revolution.145.d: "整个枫丹的心脏，世界中心的城市，经历六十余年的曲折，终于再度为革命者所掌控。原来保守派的军队决定要撤进巴黎城区进行巷战，但芙宁娜要求他们退出巴黎，宣布巴黎为不设防城市。得益于此，巴黎诸多的地标得到了完成的保存，工人们自发把红旗插上马提尼翁宫，欢迎公社军队入城。最具戏剧性的是，公社的诸多领导还是进了沫芒宫，向芙宁娜宣誓效忠。\n\n巴黎丢失以后，保守派依然在垂死挣扎，但就目前他们涣散的军心，以及因为刚刚搬迁而十分混乱的组织，我们预测他们撑不了多久了。"
 Fontaine_revolution.145.a: "革命万岁！"

 Fontaine_revolution.146.t: "国际纵队"
 Fontaine_revolution.146.d: "来自世界各地的社会主义者已经组成了数支志愿军团前来支援枫丹革命。何其感人的国际主义精神，枫丹革命成功以后，革命外交也必然成为我们的指导。"
 Fontaine_revolution.146.a: "欢迎你，同志。"
 
 Fontaine_revolution.147.t: "苏联支援"
 Fontaine_revolution.147.d: "迫于集体安全条约的限制，苏联名义上不能直接干涉枫丹内战。但这个绝佳机会苏联不愿放弃，于是允许苏联公民以个人身份参与国际纵队，并提供武器。一些技术人员也以学习交流或者是移民的名义成功抵达了枫丹。"
 Fontaine_revolution.147.a: "我们必胜！(Nous devons gagner!)"

 french.text.1.t: "对[FROM.GetNameDef]的要求"
 french.text.1.d: "让[FROM.GetName]专心从事于特定事务也许对我们会更有利。"
 french.text.1.a: "专心生产武器吧"
 french.text.1.b: "专心发展工业吧"
 french.text.1.c: "他们的资源和人口不如由我们直接管辖"

 French.103.t: "法共在延安"
 French.103.d: "延河岸边，几个青年正用木桶打水。他们穿着与农民无异的灰布制服，裤脚卷到膝盖，露出晒黑的腿。其中一人用生硬的法语向我问好——他是马列学院的学生，曾在里昂纱厂做过工。\n\n军事委员会的干部带我参观抗大的步枪训练。木制枪托上有新旧不一的裂纹，但擦拭得很干净。山坡上，一群孩子正用树枝在沙地上写“抗战救国”。不远处传来锻铁的声音，农具厂的女工们正在改制一批缴获的钢盔。\n\n延安的国际人士比我们预想的更多，有几个美国记者在窑洞前不知议论着什么。毛泽东的窑洞也比想象中简朴。木板桌上堆着《解放日报》的校样，砚台边放着半包“老刀牌”香烟。谈话时他习惯性用手指蘸茶水，在桌面画战术示意图。当问到法国局势时，他突然用英语说了句“张伯伦的雨伞挡不住风暴”，然后自己笑了起来。\n\n晚饭后去看了鲁艺的露天演出。汽油灯照亮舞台时，台下抽烟的老农们突然安静。当饰演汉奸的演员被“击毙”时，前排的小战士跳起来鼓掌，绑腿带散了也浑然不觉。回招待所的路上，月光把宝塔山的轮廓映得像剪纸。"
 French.103.a: "无论如何，这是和南京方面截然不同的政权。"

 chinacommon.6.t: "中华民国总统选举"
 chinacommon.6.desc: "驱逐鞑虏，恢复中华，创立民国，平均地权。四个短语挂在李宗仁在南京的新办公室中。似乎是先前行宪反蒋的主张已将他自己反噬，宪法已经颁布，选举的呼声越来越高，法国人也一再表示，若是进行选举舞弊，对他的一切支持将会停止。\n\n桂林街头贴满了四种颜色的竞选海报：国民党的靛蓝、农工民主党的赤红、农民党的土黄以及民主社会党的浅绿。茶馆里的收音机播放着李宗仁的演讲录音，杂糅着粤语官话的声调在电流杂音中时断时续。\n\n中央选举委员会设在旧巡抚衙门。穿灰布军装的桂系士兵与戴圆框眼镜的法国顾问共同清点各省报来的选民册，投票率居然出人意料的不低。\n\n在象鼻山下的临时印刷厂，工人们正在赶制选票。为防止舞弊，法国领事馆提供了带水印的证券纸。农民党监督员坚持要在每张选票角落加盖木刻印章——这是梁漱溟从邹平乡村建设实验带来的习惯。\n\n宋庆龄的竞选办事处设在湘江边的吊脚楼里。留苏归来的年轻秘书们用德文打字机起草《土地改革纲领》，而他们的孙夫人正用英语向美联社记者解释“三民主义中的民生主义就是社会主义”。投票日前夜，李宗仁突然乘装甲汽车视察全城投票站。车灯照亮街道时，墙上未干的墨迹写着“反对新军阀假民主”。陪同的法国武官显然也注意到了，但他只是掏出手帕擦了擦单片眼镜。"
 chinacommon.6.a: "而训政已经结束...李宗仁。"
 chinacommon.6.b: "而民生亟需实践...宋庆龄。"
 chinacommon.6.c: "而民权亟需赋予...张君劢。"
 chinacommon.6.d: "而农民亟需救助...梁漱溟。"

 Fontaine_revolution.148.t: "科学狂想？"
 Fontaine_revolution.148.d: "“不得不说，人的确是一切的核心。我们的社会由工人，农民，知识分子，军人，还有...官僚构成...”\n夏洛蒂的发言这时被打断了，政治局会议上，类似的话夏洛蒂已然讲过太多遍，无非就是推销她的运动式民主理论。大家早就听得不耐烦了。\n“恕我直言，夏洛蒂同志。如果你是在做一贯的发言铺陈，那么可以略过。如果是觉得大家对你的理论还不熟悉的话，那么大可以放心。”\n\n夏洛蒂对大家的反应并不惊讶，只是以笑容回应：“之所以再提官僚，是因为科学家们最新的想法...”\n夏洛蒂停顿了一下，这个技巧相当有效，与会者的注意力终于集中到了她的身上。心满意足，夏洛蒂便扶了一下单片眼镜，接着抛出一句重量级的炸雷。\n“直指官僚系统本身，而对党的影响，则不可估量。”\n\n“我之所以对大民主如此执着，是因为我们干部对于资本的掌握，会不可避免地腐化我们的干部。问题并非在于人性云云，我想到的办法，是动员起群众来监督他们。但是，现在已经出现了一个更好的办法，那就是让机器替代人来掌握资本，毕竟，机器不会腐化。”\n\n全场哗然，短暂的沉默以后，是止不住的窃窃私语。与会者的关系大多与夏洛蒂不错，因而不满，惊恐与迟疑，只是流露在看她的眼神中。\n\n“这个想法是来自于枫丹科学院的某位院士，名字我暂且不提。她声称脑科学与电子科学最新的进展，已经把一种全新的理念从幻想中提携到可能的现实，既她所说的——‘控制论’。”"
 Fontaine_revolution.148.a: "“成本不菲。然而一旦实现，共产主义指日可待。”"

 Fontaine_revolution.149.t: "[GetYear]年第143号预算案"
 Fontaine_revolution.149.d: "根据枫丹共产党在上一次政治局会议中提出的“控制论是共产主义的新可能”，现提请修改经济计划，审议年度控制论领域专项预算，具体如下：\n\n一、重点项目拨款\n\n国家级计算中心建设\n圣丹尼，兰斯，里昂三地新型电子计算机研制：2.8亿法郎\n罗讷河工业区自动化调度系统：1.2亿法郎\n\n二、基础研究经费\n\n阿尔及尔控制论研究所扩建：3200万法郎\n巴黎大学交互实验室：1800万法郎\n社会主义国家控制论学术交流基金：600万法郎\n\n三、人才保障支出\n\n特别津贴（首批200名高级研究员）：150万法郎/年\n列宁技术大学控制论专业扩招：200万法郎\n\n总预算：7.235亿法郎（相当于本年度工业总投资的14.7%）"
 Fontaine_revolution.149.a: "7.235亿？这是多少？"
 Fontaine_revolution.149.tt: "§R我们最好应该...抱一点希望吗？§!"

 Fontaine_revolution.150.t: "控制论计划遭反对"
 Fontaine_revolution.150.d: "“我说，这个预算案是否过于夸张了？七亿法郎不是大风刮来的，是要从我们各个领域内调度均衡的！对于一个制造业为主的社会主义国家来说，挪用工业总投资的15%会造成多么巨大的破坏！去投资那个渺茫得看不清的愿景！”\n\n代表的话完全道出了大部分人的想法。实际上，技术上的限制反而是招致反对最小的原因。以枫丹科技的日新月异来说，发展出这样的技术并非毫无可能。真正让大部分人迟疑的是巨大的开销，以及...有潜在被解雇风险的官僚们。\n\n支持者在工人中甚至也是少之又少，大家普遍担忧巨额花费会导致薪资被削减。一些文化程度稍高的工人甚至断言“对控制论的痴迷，不过是小资产阶级狂热性作祟”。"
 Fontaine_revolution.150.a: "相比于美好的未来...大家更愿意着眼现在吧。"

 Fontaine_revolution.151.t: "(内容删除)来到枫丹"
 Fontaine_revolution.151.d: "从美国东海岸到枫丹海岸的布雷斯特港，看似仅有大西洋之隔，可越轮渡航船不计其数，但其实旅程远没有这么简单。到目前为止，还没有能够直达社会主义国家的航线。(内容删除)的行程要先坐船到挪威的奥斯陆，再到中立的瑞典，接着横跨波罗的抵达列宁格勒，再坐上列宁格勒飞往圣丹尼的航班，可谓道阻且长。\n\n为何(内容删除)即便面临地理与意识形态的两堵高墙，也不辞辛苦前往枫丹呢？只是因为(内容删除)的控制论在世界上的所有地方都无人问津，被看作是天真的幻想，唯独枫丹不是。即便国家级的研究还未开始，在国际上的消息也少之又少，但(内容删除)认为，即便只是有一个知音也是有力的理由。\n\n这场壮丽的冒险对于美国来说是叛逃，对于枫丹来说，(内容删除)便是最亲爱的国际友人。夏洛蒂亲自接见了他，还引导他与(内容删除)进行会面。可能另一位控制论领域专家的到来可以对预算案的通过产生一点积极的影响。"
 Fontaine_revolution.151.a: "欢迎你，同志！"
 Fontaine_revolution.151.tt: "前景似乎更好了一些。§R大概吧。§!"

 Fontaine_revolution.152.t: "断臂而活"
 Fontaine_revolution.152.d: "夏洛蒂把钢笔重重摔在预算报告上，墨水溅在最后一页的削减数字上——3.94亿，还不到最初提案的六成。\n\n显然，控制论计划从一开始，就被砍断了一只手臂。现在，那些头脑灵活的少男少女们只能以独臂撑起控制论的未来了。\n\n窗外埃菲尔铁塔的尖顶正浸在暮色里，像一柄生锈的剑。“他们说...拖拉机比晶体管更重要。”她的助手小声说，手里攥着被退回的巴黎统筹委员会豁免申请。她想起三天前国防工业部那个镶金牙的老头怎么在走廊拦住她：“亲爱的同志，您那些会算数的铁盒子，能帮集体农庄多收一吨小麦吗？”\n\n而此刻桌上那份勉强通过的决议书，下面叠的是最初的方案蓝图：全国联网的计算机中心，像神经末梢般延伸的控制论网络。现在只剩巴黎那个孤零零的项目，活像波旁王朝时留下的烂尾宫殿，这让夏洛蒂突然想起了《悲惨世界》对于拿破仑战败的描写，她突然笑起来。"
 Fontaine_revolution.152.a: "“至少强过胎死腹中吧”，一旁默不作声的(内容删除)轻声打破了无言。"
 Fontaine_revolution.152.tt: "§Y枫丹科学院§!添加新的项目：§Y波爱修斯计划§!\n-------------\n\n\n\n£fontaine_science_computer_1\n\n\n\n\n§C芙宁娜§!的签名\n§L附言：为什么不叫芙卡洛斯计划，为什么为什么!§!"

 Fontaine_revolution.153.t: "枫丹科学院计算数论部门-数论风险评估"
 Fontaine_revolution.153.d: "早在1931年，哥德尔已经证明任何足够强大的形式系统都存在无法被证明的真命题，控制论的数学基础因而如同沙上建塔，给我们建筑基石的深层埋了一颗无法拔出的炸弹。控制论依赖的形式化建模本质上都受限于这一不完备性：在复杂系统（如国家经济计划模型）中，某些最优解可能在数学上无法被算法完全验证。反馈调节的稳定性证明可能面临理论极限（类似希尔伯特第16问题的现代变体）\n\n经过与交互部门的沟通，现决定控制通过以下方式绕过或者减轻不完备性的影响：采用足够好的近似解层级化系统设计，将大系统分解为可验证的子系统引入人为干预节点，在算法决策链中保留政治委员式的人工否决权。换言之，政治局永远保留否决机器计划的权利，并有权进行意识形态层面的调查。\n\n近期我们的数学团队无法证明分布式计算网络的全局收敛性，这甚至算不上一个挫折，因为我们只是碰到了必定会撞到的高墙而已。但研究依然有能力继续进行。\n\n             签名:£fontaine_science_covered"
 Fontaine_revolution.153.a: "£fontaine_science_furina_signature"
 Fontaine_revolution.153.tt: "£fontaine_science_computational_number_theory §Y计算数论§!进度增加:§G+10%§!\n-------------\n§L“即便是沙上建塔...我们也要建得足够优秀”§!\n\n\n\n\n\n\n£portrait_fra_Elisabeth_Jacqueline_covered\n\n\n\n\n\n\n\n§L首席科学家的内部报告§!"

 French.104.t: "加拿大政府谴责"
 French.104.d: "加拿大自治领政府以最强烈的措辞谴责法兰西共和国政府近期对魁北克省分离主义势力的可耻支持。已查明，法国驻蒙特利尔领事馆通过所谓文化基金，向煽动分裂的魁北克民族联盟（Union Nationale du Québec）提供资金，用于印刷颠覆性宣传品及组织非法集会。更令人愤慨的是，巴黎方面公然派遣前殖民地官员雅克·杜布瓦（Jacques Dubois）以语言专员身份，在魁北克城大学宣讲法语民族的天然独立权。\n\n大英帝国自治领议会提醒法国政府：魁北克自1763年《巴黎条约》起即为英国合法领土；1867年《英属北美法案》确立的联邦制保障法语区权利；任何外部势力干涉加拿大内政均违反《国际联盟盟约》\n\n我们要求法国：立即关闭蒙特利尔领事馆政治处；召回涉嫌从事颠覆活动的杜布瓦等12名官员；公开承诺停止所有魁北克分离组织往来\n\n否则将采取包括：冻结法国圣劳伦斯河航运特许权；向国联提起干涉内政诉讼；重新评估对欧外交立场。"
 French.104.a: "才不关心这些"

 French.105.t: "魁北克民族主义激进化"
 French.105.d: "晨雾还缠绕在圣母圣殿主教座堂的尖顶时，第一批传单已经塞进了老城区的每户门缝。面包店老板加斯东捡起飘到柜台上的纸片，上面用粗体字印着：今天正午，皇家广场——要么做主人，要么做死人。他习惯性地把传单揉成一团扔进烤炉，火焰吞噬字母时发出哔啵的响声。\n\n十一点整，杜布瓦街的钟表匠拉瓦雷摘下放大镜。他锁好橱窗里那些精致的瑞士钟表，从柜台下取出用油布包裹的勒贝尔步枪。枪托上刻着祖辈参加1837年起义时的标记——一道被斧头劈开的英国王室徽章。正午的太阳把皇家广场的鹅卵石晒得发烫。三千人举着蓝底白百合旗高唱《啊！加拿大》（法语原版），歌声突然被卡车引擎声切断。二十名穿棕色制服的民族秩序团成员跳下车，他们手持包铁木棍，胸前的铜徽章闪着寒光。领头的年轻人一脚踢翻卖枫糖浆的小摊，粘稠的金色液体在石板上蔓延。英语猪滚出去！他吼叫着砸碎旅游纪念品店的玻璃橱窗，里面陈列的英国女王瓷像应声而碎。\n\n下午三点，第一批骑警的马蹄声在城门街响起。戴熊皮帽的警察刚举起警棍，就被屋顶飞来的砖块砸中面门。有人从圣让街二楼窗口泼下沸腾的沥青，广场瞬间变成中世纪战场。老邮局门口，退休英语教师威尔逊被拖到路灯杆上吊死，他的圆框眼镜跌落在地，镜片上倒映着燃烧的联合杰克旗。\n\n入夜时分，坦克履带碾过了四百年的石板路。麦肯齐·金总理签发的戒严令在宵禁中生效，探照灯扫过那些用家具筑起的街垒。拉瓦雷的钟表店橱窗终于被打碎，但不是被起义者——一发来自拉姆齐号巡洋舰的6英寸炮弹把整条街变成了冒烟的废墟。加斯东的面包房成了临时停尸房，烤炉里还飘出焦糊的纸灰味。"
 French.105.a: "绝不能坐视不管！"

 French_news.8.t: "魁北克危机"
 French_news.8.d: "加拿大法裔自七年战争失败以来，新法兰西沦丧以来的抗争迎来了一个新的高峰。在[FRA.GetNameDef]的鼓动下，民族主义思潮再度成为了魁北克法裔的思想主流。\n\n截至现在，魁北克城中已发生大量针对英裔的暴力事件。在加拿大皇家骑警部队入城镇压时遭到当地卫队阻拦，国际观察家窥测已有一部分由法裔组成的军队倒戈，性质几乎变成了一场起义。\n\n英国政府尽管在言辞上严正警告[FRA.GetNameDef]停止干涉魁北克局势，但未采取实际行动给。外交上变为了加拿大总理[CAN.GetLeader]与[FRA.GetLeader]的博弈。"
 French_news.8.a: "抗争的人民万岁！"
 French_news.8.b: "可恶！"

 French.107.t: "自由魁北克志愿军"
 French.107.d: "政府对于魁北克人的抗争激发了又一波民族主义浪潮，不少支持魁北克独立的民间组织纷纷成立，民众捐款给魁北克人购置武器，甚至直接前往加入当地的抗争。"
 French.107.a: "很好...不过也要注意防范右翼借题发挥..."
 French.107.a.tt: "我们对§Y魁北克§!的干涉强度:§G+1§!"

 French.108.t: "在圣劳伦斯河口"
 French.108.d: "海军魁北克特遣支队现已抵达圣劳伦斯河口。与加拿大海军保持对峙，双方都没有下达开火命令，就数量与吨位而言，我国正占据绝对优势。\n这一举动也许可以大大增加加拿大政府的压力，迫使他们就魁北克问题妥协。"
 French.108.a: "保持克制，继续前进。"

 French.109.t: "魁北克城在燃烧"
 French.109.d: "两个月的时间过去，翘首以盼的故国远征军并未到来，尽管有英勇的志愿军跨越大洋，与魁北克人蹲在同一条战壕中与英裔加军对峙，与力量的悬殊相比微不足道。\n\n察觉到[FRA.GetNameAdj]政府毫无任何作为的加拿大当局再无任何顾忌，隆隆坦克跨越过魁北克脆弱的防线，败退到魁北克城的独立战士们打光了最后一点子弹，眼睁睁地看着法裔加拿大地核心陷入火海。也许在此一役之后，魁北克，新法兰西再无未来了。"
 French.109.a: "...大概是民族主义在加拿大的落幕。"

 French.110.t: "加拿大妥协案"
 French.110.d: "终于，加拿大在我们的威压下屈服，不得不妥协求和。前日，外交公报上发布了可以接受魁北克自治的结果，也许这已经是我们民族在世界上前进的一小步。"
 French.110.a: "魁北克人终获自由！"
 French.110.b: "完全不够！"

 French.112.t: "布鲁姆辞职"
 French.112.d: "不仅是国内改革不顺，国际上的局势也愈发紧张起来。一直以来，莱昂·布鲁姆都尽力尝试维持这个国家脆弱的民主，想要用过经济解构上的进步挽救低迷的增长率。然而这些都遭到保守派的反对，他心力憔悴，最后决定退居二线，由激进党的卡米耶·肖当接任。"
 French.112.a: "辛苦了。"

 French.113.t: "肖当辞职"
 French.113.d: "卡米耶·肖当一点也不想解决德国的扩张问题，他发现德奥合并进程已经不可逆以后，干脆辞职，把烂摊子全部留给了副总理布鲁姆。"
 French.113.a: "你回来了？"

 French.114.t: "人民阵线垮台"
 French.114.d: "不仅是资产阶级，连法国的人民大众都反对布鲁姆对西班牙进行干涉。布鲁姆坚决认为保障法国南部的安全是很重要的，一旦西班牙国民军胜利，法国就会陷入法西斯的三面包围之中。但这是他却在大众的反对面前退缩了，共产党此时因这个问题闹起了独立，表示要退出人民阵线。布鲁姆没有挽留，很快他也被赶下了台，人民阵线最终还是崩溃了。"
 French.114.a: "达拉第，接下来看你的了。"
 
 French.115.t: "达拉第政府被推翻"
 French.115.d: "法国政界普遍对达拉第对芬兰的支持不力感到不满，他们指责达拉第正在“纵容赤匪肆意扩张”。尽管达拉第早已从现实层面给出了解释：以法国目前的状态，实在无法给予芬兰足够的帮助。但这不妨碍国民议会对他发起不信任投票，最后，达拉第还是在工人阶级于政客们的一致谴责中黯然下台了。"
 French.115.a: "可这个烂摊子可怎么办啊"

 Fontaine_empire_normal.1.t: "准备立法选举"
 Fontaine_empire_normal.1.d: "拯救枫丹岌岌可危的民主需要什么？答案恐怕不是从制度上为所谓民主除旧布新，这最多只是对民主肌体的调理。而对真正巨大的顽疾视而不见——邪恶的犹太布尔什维克。受民主制度的掣肘，我们无法强行切除这颗毒瘤。为了使民主长存，暂时放下身段——击败犹太人莱昂·布鲁姆和赤匪莫里斯·多列士。\n\n可悲的是，左翼早已放下分歧，组成了人民阵线，一时间风头无两，好像立法选举势在必得。我们必须紧急动员整个国家机器，从学校、教会、媒体、司法系统等每一个战场迎击左翼。"
 Fontaine_empire_normal.1.a: "保护我们的合法所得，这是政府的职能。"
 Fontaine_empire_normal.1.tt: "§Y选举§!直接与§Y意识形态支持率§!挂钩"

 Fontaine_empire_normal.2.t: "超党派政治同盟"
 Fontaine_empire_normal.2.d: "我不属于他们。\n\n也不属于你们口中的“法兰西”——一个被普鲁士羞辱过、又被自己的“共和国”不断清洗记忆的国家。这个国家很老，老得像枫丹廷前厅那些永久上演的审判剧。剧本是新的，演员是新的，但法锤落下的声音始终不变。\n\n现在，一群被权力剥夺干净的老兵、贵族、还有整天读《费加罗报》的中产绅士，忽然找上我，说我“具备超越党派的力量”。他们看中的不是我，而是我身上那些冷酷、坚定、蔑视妥协的气质——他们以为这就是国家机器的象征。\n\n——多么可悲。他们宁愿让一个行走在夜色中的“执行者”来领他们走出白昼的迷雾。我沉默了很久。他们以为我在犹豫，其实我只是在想，明天的裁决，要不要先给那个贪污检察官一刀封喉。\n\n不过，我最终答应了。不是为这群无能的家伙——为我自己。"
 Fontaine_empire_normal.2.a: "他们居然需要一个素未谋面的人才能团结。"
 Fontaine_empire_normal.2.tt: "她将以§Y独立候选人§!的身份参选，背靠整个§Y国民联盟§!。\n§g席位数预测已更新§!"

 Fontaine_empire_normal.3.t: "带来秩序"
 Fontaine_empire_normal.3.d: "莱欧斯利不喜欢混乱。他讨厌人群在广场上叫喊口号、讨厌报纸出现“抗议”这个词，甚至连音节太响的议会辩论也会让他产生物理不适。\n\n秩序，是他唯一认可的美德。所以当国民联盟的代表走进他办公室时，他没有拒绝。\n\n“拉拢警察是个好想法……如果犹太布尔什维克们不肯承认选举结果，警棍能让他们闭嘴。”\n\n话是那个老议员说的，莱欧斯利没有表态，只是轻轻地把烟灰弹进水晶烟缸。他知道，他们并不在意他真正的信念，只需要他“站在秩序一边”，当夜晚降临时出现在正确的街道口就够了。\n\n“如果我默认，”他想，“那我也不过是下一个工具人罢了。”\n但他没有说出口。\n他只是点了点头，递出一份事先打印好的治安指令草案。\n\n“为了共和国的安宁。”他说。"
 Fontaine_empire_normal.3.a: "稳定，毕竟高于一切。"
 Fontaine_empire_normal.3.tt: "§g很明显，他会是一个可靠的盟友，一个完美打手。§!"

 Fontaine_empire_normal.4.t: "铁路所及之处"
 Fontaine_empire_normal.4.d: "火车带着旗帜和传单开进了南方的城镇。开进盐田、工厂、葡萄园与老修道院。没有人问是谁组织的，也没有人追究这是否违法。\n\n反正每天都有演讲，天天都有请愿：\n“他们是犹太集团，是莫斯科的傀儡，是来剥夺你女儿童贞的东方吸血鬼。”\n“他们要夺走你的教堂，你的工厂，你的房契——他们是‘他们’，而我们，是‘你’。”\n\n说到底，这不过是一场漫长的身份确认仪式。铁轨越过平原，语言逐渐统一。从雷蒙小镇的杂货店到枫丹厅的议员俱乐部，都在重复同一句话：\n\n“共产党，不是对手，是敌人。”\n“你要的是秩序，不是自由。”\n“选票，是你献给祖国的武器。”\n大字报贴在农舍墙上，铁皮音箱播出合唱口号。\n\n士兵开始站在街角。校长开始修改教材。孩子开始在课堂上举报父母。而火车，还在继续开。"
 Fontaine_empire_normal.4.a: "不管你们怎么说...今年我还投给布鲁姆！"
 Fontaine_empire_normal.4.tt: "§R那又怎样？§!"
 the_expection_has_updated: "§g席位数预测已更新§!"

 Fontaine_empire_normal.5.t: "我们拒绝什么遗产？——对民族主义，君主主义的总批判"
 Fontaine_empire_normal.5.d: "“民族主义是一种拒绝思考的替代物。\n——蒸汽鸟社论部题记\n\n在这片大陆上，人民被要求再次相信某种“伟大传统”——那种宣称“权威高于权利”的传统；那种把祖国等同于审判者，把人民等同于顺从者的传统；那种每次危机都要求“回归秩序”，却从不允许我们质问“秩序为何而设”的传统。他们称之为“荣耀的遗产”。而我们，拒绝它。\n\n不论那披着怎样的金袍，是女皇也好，是护国者也罢，只要其存在不能被监督、不能被问责，那么其“正义”便毫无意义可言。“君主立宪”是他们对专制的化妆术，“神授权威”则是他们让人民噤声的咒语。\n我们不是无神论者，而是反偶像崇拜者。我们不反对信仰，但我们绝不信仰用信仰来奴役人的国家机器。\n\n他们口口声声说“外敌入侵”“红色渗透”“犹太布尔什维克威胁我们的家园”，但我们早已识破：他们的“祖国”从来不是穷人的祖国。他们所说要捍卫的“民族”，从未包括在工厂中倒下的焊工，在矿井中咳血的矿工，或是住在郊区棺材房里的洗衣女工。我们没有祖国吗？我们当然有。但我们的祖国，不是一面供奉军徽的铁旗，而是那一张张真实的工资单、罢工表、判决书与工人手掌上的老茧。\n\n他们在四处煽动人群，让孩子举报父母，把质疑当作叛国，把顺从当作美德。他们鼓吹秩序，实则贩卖恐慌；他们打着人民的名义，却从未问过人民是否同意。\n\n这是怎样的政体？这是警棍胜于辩论、传单代替书籍、服从成为唯一语言的政体。我们拒绝的，不只是某位候选人，而是整个这个以“国家意志”之名审判人性、消灭差异、压制思想的政治幻象。\n\n我们要人民的政府，而非人民的看守人。我们要能被质问的制度，而非只能膜拜的权威。我们要一个祖国，它不是幻想，而是真实地接纳每一个劳苦大众的祖国。这就是我们拒绝什么，也就是我们为何仍然写下这些文字。哪怕明天新闻纸被焚，电台被封，笔者被捕，我们依然在这里发声：自由、平等、团结，不会屈服于穿着礼服的暴政。"
 Fontaine_empire_normal.5.a: "蒸汽鸟报社，1936年[GetMonth]，夏洛蒂·阿黛尔"
 Fontaine_empire_normal.5.tt: "§g无济于事§!"

 Fontaine_empire_normal.6.t: "政治暴力"
 Fontaine_empire_normal.6.d: "莱昂·布鲁姆刚走下车，就有人往他脸上吐口水。接着，是拳头。是靴子。起初还有人劝架。后来，围观者越来越多。更多人加入，更多人沉默。\n\n“犹太佬！”\n“红色律师！”\n“去死吧，卖国贼！”\n\n——这不是审判。不是政治。只是一群人，在撕烂共和国最后一张体面的脸。他被救护车拉走时，眼镜碎成粉末，左眼青肿，头骨裂开。\n街道上仍有血迹，但舆论却说：“他活该。”\n\n一份匿名传单在街头流传：“如果共和国的代表都不能承受人民的怒火，那这个国家该换代表了。”\n\n没人被逮捕。警察在旁边看着。法官闭口不谈。议会沉默三天后才“表达遗憾”。共和国还没死。它只是已经开始出血。而人们，还在围观。"
 Fontaine_empire_normal.6.a: "我们记住了......"
 Fontaine_empire_normal.6.tt: "§g他一时半会没法出院，应该可以消停一会了。§!"
 
 Fontaine_empire_normal.7.t: "阴影下的暗潮"
 Fontaine_empire_normal.7.d: "表面上，选举仍在按部就班地进行。报纸在报道，政客在游说，议会尚未解散，印刷厂还在为候选人制作彩页。\n\n可某些人，已经不信这一套了。社会党人，工人代表，铁路技师，邮政调度，甚至部分消防员，都出现在那场“年度劳工大会”上。名义上是表彰先进，讨论最低工资政策。但谁都知道，这只是一层遮羞布。\n\n真实议题在每一次烟火表演结束后，在散场的角落，在列车员之间悄悄传递的一张张手写纸条上：\n\n“选举一旦失败——全面罢工。夺回工厂。瘫痪交通。拉响警报。不为议会投票，而为尊严绝食。”\n\n他们不是幻想家。恰恰相反，正因为他们对制度已无幻想，所以开始组织现实。这不是革命的狂热，而是挫败中的清醒。没有口号，没有红旗，只有一张张藏在工作服下的备用传单。\n\n宪政还未终结。可对他们而言——它已经死亡，只是尸体尚未发臭而已。"
 Fontaine_empire_normal.7.a: "我倒要看看是意志更硬还是警棍更硬。"

 Fontaine_empire_normal.8.t: "投票日"
 Fontaine_empire_normal.8.d: "今天天气很好。阳光明亮，风很轻。比起过去那些充满骚动与对峙的政治日子，这天反而出奇地安静。\n\n街上没有喧哗，没有集会。只剩下排队的人群，一格一格地沿着教堂、学校、邮政所门前画好的粉笔线站着。投票率创下纪录。人人都来了。不论是军官、教师、管道工、修女，还是那些过去从未关心政局的家庭主妇。\n\n没有口号，没有演讲。人们只是沉默地互相注视。仿佛谁投了哪一边，其实大家都心知肚明。仿佛他们都知道：这不是在选择政策，而是在选择——谁来决定接下来的夜晚属于谁。投票箱没有多说话。它只是默默咽下每一张选票。阳光照着它，就像在照着一个准备吞下整个时代的胃。\n\n到了傍晚，鸽子开始从屋顶飞起。广场的士兵睁大了眼睛。收音机静音前的白噪声如同一场即将引爆的风暴。\n\n共和国的命运，被装进了一只只纸箱。钥匙交给了统计员。而这整个国家，都在等一个结果——一个可能无需解释，就足以决定今后十年里，谁该闭嘴、谁能开枪的结果。"
 Fontaine_empire_normal.8.a: "上帝啊..."
 Fontaine_empire_normal.8.tt: "§R体制还在运作，但那不过是为了让它合法地死去。§!"

 Fontaine_empire_normal.9.t: "计票结果"
 Fontaine_empire_normal.9.d: "枫丹历史上最漫长的三天不过如此。统计结果如下：\n\n独立候选人，佩露薇利·“阿蕾奇诺”·雪奈茨芙娜，得票3,377,917票次，得票率34.23%，位列第一。\n\n工人国际枫丹支部，莱昂·布鲁姆，得票数1,805,897票次，得票率18.32%\n\n枫丹共产党，莫里斯·多列士，得票数1,026,302票次，得票率10.4%\n\n经核实，佩露薇利·“阿蕾奇诺”·雪奈茨芙娜的当选符合宪法法定程序，无选举舞弊，有资质成为枫丹第55任总理。"
 Fontaine_empire_normal.9.a: "£fontaine_science_furina_signature"
 Fontaine_empire_normal.9.tt: "§g现在你是总理了，阿蕾奇诺阁下。§!\n\n\n\n\n\n\n£portrait_fra_Peruere_Snezhevna_in_event\n\n\n\n\n\n\n\n§L无论如何，祝贺您。§!"
 1936_election_finished: "1936年立法选举已结束"
 national_union_democratic: "枫丹国民联盟 - 执政联合"

 Fontaine_empire_normal.10.t: "第一天"
 Fontaine_empire_normal.10.d: "沫芒宫的庭院开满了玫瑰。芙宁娜站在阳光里，没有说太多话。她轻轻点头，像是在默许一切...或许，她不在意。\n\n阿蕾奇诺穿过空旷的走廊。没看那些镶着金边的油画，也没碰那封仪式性的任命函。径直走向了马提尼翁宫，如同行刑官奔赴断头台。\n\n可她没想到——她刚踏进去，整个国家就停工了。铁路停摆，报刊停印，银行拒绝出纳，煤矿封锁，电话线路瘫痪。\n\n总罢工开始了。不是动员的口号，不是议会的辩论，而是沉默的机械式联动：好像整个工人阶级早就算准了这天会到来。\n\n没有喧哗。但城市像熄火的引擎，一下子全黑了。外务官员还在准备组阁，财政部长还在试图约见央行，军方却只说了一句：“请总理阁下尽快恢复秩序。”\n\n街头寂静，但空气如钢丝般绷紧。她没有时间犹豫。权力刚刚落入手中，现实就已经用铁锤砸门了。"
 Fontaine_empire_normal.10.a: "造反？"

 Fontaine_empire_news.1.t: "阿蕾奇诺出任枫丹总理"
 Fontaine_empire_news.1.d: "巴黎，1936年[GetMonth]——在经历一场具有历史意义的选举后，阿蕾奇诺正式被任命为枫丹共和国第55任总理。这一任命打破了连续多届政府内阁由温和派人士领导的惯例，标志着政治局势的新转折。在当日的交接仪式上，阿蕾奇诺宣布将重点恢复国家秩序与稳定，并承诺为国民联盟提供“坚实的领导”。她表示：“枫丹需要强力领导，特别是在当前的政治动荡中。”\n\n然而，国际观察家普遍对这一任命表达了深刻的疑虑，认为阿蕾奇诺上台不仅意味着国内政治的进一步集中化，让枫丹走向更专制的政体。此前，工会组织已开始大规模动员，并且左翼政党亦表示不排除进行直接对抗。阿蕾奇诺曾多次承诺将在不牺牲“秩序”的前提下进行改革，但许多政界人士质疑她是否有能力平衡改革与镇压之间的微妙关系。而权力交接无疑为枫丹带来了前所未有的紧张氛围。"
 Fontaine_empire_news.1.a: "这个国家的共和早就病入膏肓了。"

 Fontaine_empire_normal.11.t: "到巴黎去！"
 Fontaine_empire_normal.11.d: "不知何时起，工人的罢工不仅仅是为了争取一个更高的工资、一份更好的工作条件，它变得不同了，变得不可忽视。\n\n起初，工厂的停工、运输的瘫痪还只是局部的，但很快，罢工蔓延，蔓延到整个城市，蔓延到整个枫丹。甚至连那些从未参与工会的劳工，也开始在晨雾中凝聚，在手无寸铁的广场上，听着来自底层的声音：“我们曾经被迫服从，现在是时候让这座城市为我们而停滞了。”\n\n工人们的纪律性令人惊讶，他们没有恐慌，没有溃散，反而在零散的黑暗中，逐渐形成了某种凝聚力，宛如被压抑已久的火山，慢慢积蓄着爆发的力量。\n\n随着工人阵线不断壮大，共产党的组织力量开始在各地迅速扩展，并通过与工人卫队的密切合作，启动了一项名为“向巴黎进军”的计划。他们没有时间等待，亦不再依赖议会与选票——唯一能够拯救他们的，是拿起武器，带着从工厂到街道的血性，直指巴黎的心脏。\n\n白天，街道上是安静的，仿佛所有人都在等待一个决定性的信号；夜晚，街角的阴影里却充满了不安，工人们低语，铿锵的步伐回响在空荡的城市。也许不久后，巴黎的天空将会再度被硝烟填满——革命阴云正笼罩在枫丹上空。"
 Fontaine_empire_normal.11.a: "到这种地步...还有什么可谈的？"

 Fontaine_empire_normal.12.t: "普通的工作报告"
 Fontaine_empire_normal.12.d: "芙宁娜坐在窗边，眼前的巴黎街道已经被战车的轮声打破了宁静。阿蕾奇诺站在她对面，脸上没什么表情，只是翻阅着一份报告——\n工会领袖的名单，工人卫队的动员情况，甚至街头的“革命迹象”。她没有给芙宁娜过多的解释，只是简洁地列出了事实：“工厂封锁，铁路停运，金融系统已经瘫痪。工人们组织成军，赤卫军也已经集结。这是对国家体制的威胁，必须立即回应。”\n\n芙宁娜低下头，她能感受到那股来自工人、从底层涌出的愤怒。但她明白自己不是决定者，从来不是。她深深吸了一口气，像是希望从空气中找到一个逃避的缝隙。但阿蕾奇诺没有给她这个机会。\n\n阿蕾奇诺继续道：“如果任由这种局面蔓延，国家将陷入无法控制的局面。从我们目前所掌握的情况来看，他们没有谈判的诚意。也没有妥协的空间。”停顿一下，眼神闪过一丝狠意：“为了秩序，为了国家的未来，我们只能依靠武力。”\n\n芙宁娜的眼眶微微湿润，心头泛起难言的痛苦。她本能地想要反驳，但话到嘴边又卡住了——她无力。她已被塑造得太完美，永远端庄的面孔，不准表现恐惧与矛盾。\n\n“我......”她张了张嘴，想要说什么，却没有声音。\n\n“你的立场，知道的。”阿蕾奇诺淡淡地补充，眼神并没有因为对方的沉默而软化。“你不必担心，我会处理好一切。”\n\n芙宁娜低下了头，紧紧握住桌上的纸张，似乎在寻找一个出口，哪怕只是片刻的喘息。但她明白，自己什么也做不了，她只能默许，任凭这座国家的冰冷铁拳继续向前行进。"
 Fontaine_empire_normal.12.a: "“我明白。”她最终说，声音几乎微不可闻。"
 Fontaine_empire_normal.12.tt: "§g不...我不想......（但没有意义）§!"

 Fontaine_empire_normal.13.t: "“Fontaine’s Under Martial Law”"
 Fontaine_empire_normal.13.d: "(这是对《泰晤士报》的部分摘录)\n\n今天早些时候，枫丹总统府宣布全国进入戒严状态，并且所有宪法性权利被暂时搁置。国家全面进入军事管制，所有政治与公共事务的管理已完全交由军方掌控。此举立即引发了国内外的广泛关注，尤其是欧洲各国对于枫丹民主体制的前景表达了深刻的担忧。\n\n军队开始在巴黎及其他主要城市街头展开集结，坦克驶入市区，数千名士兵被部署在要害位置以维持秩序。政府声明，军管措施是“为保卫国家稳定、恢复社会秩序”所必需的，且将持续至“局势恢复正常”。\n\n枫丹总统府指出，这一决定是对“当前国家安全与社会秩序严峻考验”的回应，尤其是在大规模工人罢工与右翼暴力的双重压力下，国家的合法政府已无法正常运转。政府发言人还强调，“此举是为了避免社会进一步瓦解，并保护国家免于爆发全面内战。”\n\n尽管如此，国际社会，尤其是西欧国家，对这一突然实施的戒严状态表示了强烈关切，部分外媒评论指出，枫丹已经进入威权化的新时代，即便政府宣称采取这一措施是为了恢复秩序，外界普遍认为这一举动无疑是对枫丹现有民主体系的致命一击。\n\n《泰晤士报》记者指出：“在欧洲政治的复杂背景下，枫丹的军事管制是对宪政的一次重大倒退，过去被认为是自由与法治象征的枫丹，现如今正陷入一场前所未有的国家暴力实验。未来几天，世界将注视着这个曾经为革命与民主而骄傲的国家，是否能够在这场不知前景的权力斗争中找到出路。”目前，局势仍在持续紧张，预计各方力量的反应将在接下来的48小时内达到高潮。"
 Fontaine_empire_normal.13.a: "UK.The Times 1936.8"
 Fontaine_empire_normal.13.tt: "§g火热之夏...§!"
 Fontaine_empire_normal.13.tt2: "解锁国策：§Y$FRA_fontaine_need_order$§!"

 Fontaine_empire_news.2.t: "枫丹全国戒严"
 Fontaine_empire_news.2.d: "戒严宣告的几天后，枫丹的街道上充斥着陌生的宁静。市区坦克隆隆，士兵站岗，政府的宣传机器像失去动力的齿轮，突然陷入停滞。新闻广播、报纸杂志，全都失去了往日的活力。人们渐渐意识到，整个枫丹的媒体已陷入了深度的静默。唯一能勉强窥见枫丹内情的，便是来自英美记者的零星报道。外界对枫丹发生了什么，依然一无所知。国际社会，欧洲各国外交使团的紧张情绪愈发加重，尤其是当英美记者在巴黎的报道中提到：“我们能看到的，只有街道上巡逻的军队与布满灰尘的新闻摊位。”对枫丹发生了什么，外界只通过一两个可疑的消息来源得以窥见半分。反复的沉默，使得枫丹在世界舞台上逐渐从民主化的象征变为一个难以触及的“黑洞”。"
 Fontaine_empire_news.2.a: "无需了解，守好本分即可。"

 Fontaine_empire_normal.14.t: "心声"
 Fontaine_empire_normal.14.d: "街头依旧充斥着硝烟的味道，空气沉重，仿佛被压抑的希望也一起被埋葬。在那些废弃的工厂大门前，躺着的是刚刚从战斗中退去的铁皮与破碎的玻璃。\n\n曾经，工人们怀着一腔热血，举起过武器，他们的眼中只有一个目标：自由与面包，如此简单。然而，现在，当所有的枪口都对准了他们，所有的呼喊都被枪声与坦克的轰鸣淹没时，他们的心也开始动摇了。从未想过芙宁娜会成为暴君，从未想过，这个在国家机器背后的女人，会为他们点燃如此严酷的火焰。\n\n“芙宁娜，我们爱您。”\n\n她是他们眼中的解救者，是他们心中那个能让枫丹走向平等，自由的女王。他们没有想过自己会背叛祖国，他们甚至从未考虑过——他们的武器会被用来维系一种从未想过的压迫。现在，他们站在废墟中，他们曾经在恐惧中举起过武器，但那份心中的“爱”如今变成了被钝化的失望——他们看着倒下的工人卫队，看着满目疮痍的街头。"
 Fontaine_empire_normal.14.a: "去看看吧。"
 Fontaine_empire_normal.14.b: "毫无意义。"

 Fontaine_empire_normal.15.t: "于废墟中"
 Fontaine_empire_normal.15.d: "焦黑的厂房与冷风卷起的灰烬是今天的工业区。兰斯，里尔。曾经是枫丹共和国的肺，如今像一具被弃置的尸体。芙宁娜第一次离开宫廷，踏上这片已经被坦克碾过的地面。身边是陆军参谋、工务局长、宪兵指挥官，还有摄影师，但她只看向前方——那里蹲着一个男人。\n\n他披着一条发霉的毯子，背对众人，在一堆烧焦的铁皮边捡拾什么。当芙宁娜走近，他才缓缓转头，那是一张看不出年龄的脸，满是烟尘与沉默。她停下脚步，说不出话。她的鞋跟在石板上发出轻响，那乞丐却没有起身，只是低声问：“你有吃的吗？”\n\n芙宁娜一怔。她没有。在登车前，随行官员反复确认行程、服饰、讲话稿，却没人想到要带食物。\n她愣在原地，嘴唇轻微颤动：“……对不起，我……我没准备……”\n她低头，语气真诚：“我为你们的苦难感到羞愧……这是我的责任……我不该……”\n\n那乞丐终于抬起头，盯着她看了一秒，然后像听到了什么可笑的玩笑。他打断了她，声音干瘪却清晰：\n\n“别跟我说这些。这毫无意义。”\n\n随行宪兵立刻上前，扣住他的手臂。他没有挣扎，也没有再看芙宁娜一眼。他像一块被人踢开的破布，被带走。\n\n芙宁娜站在原地，什么也没说，摄影师还在调试光圈，等待她的“关怀瞬间”。风吹起她的裙摆，她只是低头，攥紧了手指。"
 Fontaine_empire_normal.15.a: "早就说过了，这毫无意义。"

 Fontaine_empire_normal.16.t: "解严"
 Fontaine_empire_normal.16.d: "街上的军哨终于撤了。铁马与刺刀让位给了斑驳的广告牌、粘稠的汽车尾气和习惯性迟到的公交车。人们在路口抽烟，讨论饭价、衣料和假期计划，好像这一切从未发生过。但我知道，我们都变了，包括我。\n\n戒严正式结束那天，我照常去编辑部。半路上看见有人在擦拭墙上的涂鸦，一行被雨水冲刷残缺的标语：“我们并非敌人。”那天阳光很好，路人很多，没有人停下来读。\n\n政府发布了一份声明，措辞严谨、热情而空洞，说“秩序已恢复”，“全国人民感谢英明决策”。编辑部的同事拍桌鼓掌，说“终于可以喘口气了”。我没说话，只是点了点头，像极了这整整一年的我：沉默，微笑，配合，活着。这一年，我们见证了太多被裁撤的同事、关闭的出版社、改版的报纸。我们学会了怎样写“正确”的句子，怎样删掉“多余”的想象力，怎样在开头写“繁荣”，结尾写“人民满意”。我们也学会了喝闷酒、凌晨三点回邮件、关掉收音机前小声地说“芙宁娜还好吗”。\n\n现在戒严结束了，真的结束了吗？还是说，它只是完成了它的目标——把所有人都关进一座看不见的牢里。\n\n你说强人政治结束了吗？不，它只是换了一张脸，更温和，更精致，懂得微笑，也懂得不留痕迹地下命令。但权力的路径没变，依旧从上往下，依旧不容置疑，依旧把我们每一个人都当作可被安放、被分类的对象。\n\n也许过不了多久，新闻自由会以“合理管控”的方式复归，立法选举也会重新开始，人们会说“我们重归宪政”。但我们这些写字的人心里清楚，真正失去的东西，不是宪法的一条条条款，不是某个政治犯的名字，而是我们说二加二等于四的自由。\n\n历史的脚步声停了下来，可我不觉得轻松。反而更像是在等另一次更大的沉默，再次把我们卷走。"
 Fontaine_empire_normal.16.a: "何去何从，五千万同胞......"

 Fontaine_empire_normal.17.t: "加冕"
 Fontaine_empire_normal.17.d: "芙宁娜站在聚光灯之下，穿上为她量身定做的神装，象征着万民意志的礼袍，肩披金缕，发丝被一点点理顺。桂冠捧到她手里时，周围的人都退下了，这是某种神圣的独白时刻——而她明白，没有人会为她加冕，得自己来。\n\n她慢慢地把桂冠举过头顶，那东西不重，却有种诡异的沉力——像是过去的命运全部凝成了一圈冰冷的金属。她不确定这意味着什么。自由的终结？责任的开端？还是她终于完全变成了那个曾经厌恶的权力傀儡？她对着镜头微笑，把桂冠轻轻戴在自己头上，仿佛这是一场精心安排的庆典。\n\n她告诉自己：这都是为了国家。为了稳定。为了人民的幸福。她骗自己：她是自愿的。这是她的选择。——可只有她心里清楚，那一刻她感受到的，不是荣耀，是一种说不清的死寂。像是被锁进永恒运转的齿轮之间，失去了转身逃走的最后机会。"
 Fontaine_empire_normal.17.a: "女皇万岁！"

 Modify_Extra.1.t: "联合王国战后选举"
 Modify_Extra.1.d: "在帝国终于结束伤筋动骨的大战以后，选举终于重新得以举行。生活在配给制，防空洞，兵役中的老一代英国人与在战火中的托儿所成长起来的新一代英国人不得不面临一个抉择：是把目光聚焦在黄油与面包，集中精神重建英伦三岛，投给工党；还是巩固殖民利益，使得大英帝国江山稳固，投给保守党？"
 Modify_Extra.1.a: "笨蛋才投丘吉尔，今年我就是要投给工党！"
 Modify_Extra.1.b: "奇迹的是...丘吉尔又赢了。"

 Fontaine_empire_furina_personal.2.t: "擦痕"
 Fontaine_empire_furina_personal.2.d: "芙宁娜的房间永远保持整洁。哪怕窗外街道传来喧嚣，哪怕深夜有黑猫越过屋檐，室内依然安静如教堂——仿佛所有声音都被木制墙板与蓝色帷幔所吸收，只剩下她与她的影子。房间没有镜子。宫廷礼仪官认为，那些大而明亮的镜面会让人分心。而事实上，是她主动要求撤下的。她不想再看见“那个人”——那个总是挺直脊背、头戴王冠、眼神坚定的“象征物”。\n\n她不记得自己上一次拥有欲望是什么时候了。不是政治上的、也不是仪式性的，而是那种无处可去、只能在夜深时流向身体某个角落的欲望。被制服、被赞誉、被期待太久了，她几乎忘记了“触觉”本身的意义。靠在办公桌前，衣料的褶皱触碰到大腿内侧，像是一种提醒：你还活着。她试图忽略，但无法控制自己的身体产生微弱的战栗。那不是欢愉，更像是一种来自深层的焦躁——如同龟裂干土感知到了空中水气，却始终没有一场真正的雨。\n\n她下意识地往前探了一步，桌角的木纹冰冷坚硬。这间屋子最老家具，来自共和国时代的工艺，曾属于三任首相。它本不该与她发生任何关系。可那一刻，她需要的是某种“非人”的东西：不说话、不判断、不凝视，只承载她这一具疲惫的身体。\n她没有发出声音，也没有闭眼。动作机械、节奏刻板，如同一次对自我权威的试探。她只是静静地与木桌摩擦，就像这个国家在和她摩擦一样——毫无爱意，只剩制度性的压迫和本能性的回应。桌角太硬了，留下了一点擦痕，但她没有停下。\n\n第二天早上，新闻照例报道她的“庄重露面”：“陛下昨晚仍在批阅文件，勤政为民。”\n没人知道这件事。也不会有人知道。因为她是女皇。完美的女皇。"
 Fontaine_empire_furina_personal.2.a: "她是人类。"
 Fontaine_empire_furina_personal.2.b: "国家意志的一隅。"

 Fontaine_empire_furina_personal.3.t: "尼斯假期"
 Fontaine_empire_furina_personal.3.d: "从巴黎飞尼斯不过一个半小时，正好是她批完早报文件的时间长度。登机前，随行秘书问她要不要携带演讲稿。她没有回答，只是将遮阳帽压低了一点。尼斯总是阳光正好。机舱打开时，咸湿的海风扑面而来，让人一瞬间恍惚：仿佛从那个永远封闭、永远充满酒精与墨水味的巴黎会议厅中逃脱了出来，成为另一个人。或至少，看起来像是。\n\n她下榻在英国人修建的旧酒店里。窗外是蔚蓝海岸和邮轮起落，阳台栏杆上有海鸥停歇，脚边还有一摞没人翻阅的海军简报。空调声低沉稳定，像是一场低语，提醒她“这是假期，不是逃避”。试着翻了几页小说，是某位德国作家的意识流作品——“没有章节，像她的一生”。很快她把书放下，望向阳台远处的地平线。她想象自己是普通人，是邮轮上那个穿着衬衫打着赤脚享受阳光的女人。但幻想终究停在海平线那里，无法真正靠岸。"
 Fontaine_empire_furina_personal.3.a: "芙宁娜，享受假期！"
 Fontaine_empire_furina_personal.3.b: "陛下，海军已然恭候多时。"
 Fontaine_empire_furina_personal.3.c: "她从来无法离开巴黎。"

 Fontaine_empire_furina_personal.4.t: "尼斯假期"
 Fontaine_empire_furina_personal.4.d: "从巴黎飞尼斯不过一个半小时，正好是她批完早报文件的时间长度。登机前，随行秘书问她要不要携带演讲稿。她没有回答，只是将遮阳帽压低了一点。尼斯总是阳光正好。机舱打开时，咸湿的海风扑面而来，让人一瞬间恍惚：仿佛从那个永远封闭、永远充满酒精与墨水味的巴黎会议厅中逃脱了出来，成为另一个人。或至少，看起来像是。\n\n她下榻在英国人修建的旧酒店里。窗外是蔚蓝海岸和邮轮起落，阳台栏杆上有海鸥停歇，脚边还有一摞没人翻阅的海军简报。空调声低沉稳定，像是一场低语，提醒她“这是假期，不是逃避”。试着翻了几页小说，是某位德国作家的意识流作品——“没有章节，像她的一生”。很快她把书放下，望向阳台远处的地平线。她想象自己是普通人，是邮轮上那个穿着衬衫打着赤脚享受阳光的女人。但幻想终究停在海平线那里，无法真正靠岸。\n\n她让所有警卫撤出沙滩半径五十米以外。只保留两个女仆，和一个不说话的随行顾问。脱下鞋，赤脚踩在石子滩上，感受沙子的粗糙，或是细软。每一步都被海水轻轻冲刷，但很快又被咸涩与黏腻覆盖。这种“不舒服”反而令她安心。\n\n她不再是完美的皇帝，只是个在晒太阳时翻身过慢、把背晒红的笨蛋。在港口吃了炸小鱼，还配可乐，没人认出她。或者说，所有人都装作没认出她。她看向海那边，轻声说了一句谁也听不懂的话：“再靠近一点就好了。”"
 Fontaine_empire_furina_personal.4.a: "地中海，潮风，自由。"

 Fontaine_empire_furina_personal.5.t: "尼斯假期"
 Fontaine_empire_furina_personal.5.d: "从巴黎飞尼斯不过一个半小时，正好是她批完早报文件的时间长度。登机前，随行秘书问她要不要携带演讲稿。她没有回答，只是将遮阳帽压低了一点。尼斯总是阳光正好。机舱打开时，咸湿的海风扑面而来，让人一瞬间恍惚：仿佛从那个永远封闭、永远充满酒精与墨水味的巴黎会议厅中逃脱了出来，成为另一个人。或至少，看起来像是。\n\n她下榻在英国人修建的旧酒店里。窗外是蔚蓝海岸和邮轮起落，阳台栏杆上有海鸥停歇，脚边还有一摞没人翻阅的海军简报。空调声低沉稳定，像是一场低语，提醒她“这是假期，不是逃避”。试着翻了几页小说，是某位德国作家的意识流作品——“没有章节，像她的一生”。很快她把书放下，望向阳台远处的地平线。她想象自己是普通人，是邮轮上那个穿着衬衫打着赤脚享受阳光的女人。但幻想终究停在海平线那里，无法真正靠岸。\n\n她抵达军港时，军舰上所有水兵列队行礼，锚链与风旗一同摆动。总司令开始朗读她那份半个月前就拟好的演讲稿。内容毫无新意，但她必须站在那里，让闪光灯照在脸上。她环顾舰桥、雷达、桅杆，想象它们能否像某种装置一样记录下她的情绪。但没有。她只是镜头中的人形标志。军港风比沙滩大多了。\n\n她站在观测台上，风把她裙摆吹起。有人拍了照片。第二天，《枫丹时报》头版用了那张照片，标题是：“陛下视察南方舰队，仪态优雅”。\n\n没人注意她那晚吃了退烧药。"
 Fontaine_empire_furina_personal.5.a: "战列舰，队列，纪律。"

 Fontaine_empire_furina_personal.6.t: "尼斯假期"
 Fontaine_empire_furina_personal.6.d: "从巴黎飞尼斯不过一个半小时，正好是她批完早报文件的时间长度。登机前，随行秘书问她要不要携带演讲稿。她没有回答，只是将遮阳帽压低了一点。尼斯总是阳光正好。机舱打开时，咸湿的海风扑面而来，让人一瞬间恍惚：仿佛从那个永远封闭、永远充满酒精与墨水味的巴黎会议厅中逃脱了出来，成为另一个人。或至少，看起来像是。\n\n她下榻在英国人修建的旧酒店里。窗外是蔚蓝海岸和邮轮起落，阳台栏杆上有海鸥停歇，脚边还有一摞没人翻阅的海军简报。空调声低沉稳定，像是一场低语，提醒她“这是假期，不是逃避”。试着翻了几页小说，是某位德国作家的意识流作品——“没有章节，像她的一生”。很快她把书放下，望向阳台远处的地平线。她想象自己是普通人，是邮轮上那个穿着衬衫打着赤脚享受阳光的女人。但幻想终究停在海平线那里，无法真正靠岸。\n\n她原本打算在尼斯待五天，但第四天下午便匆匆回城。她说是因为“临时政务”，实际上没有。她只是无法适应没有会议、没有接见、没有镜头的时刻。尼斯太空了，空得让她意识到自己的身体正在恢复一个“普通人”的形状，而这是她所不能允许的。\n\n飞机降落在勒布尔热，车队驶入巴黎市区时，正好遇上黄昏。沿途有些人仰头望车窗，她下意识挺直了背。喉咙开始痛，她怀疑是海风的问题，也可能不是。晚上，她坐在熟悉的办公桌前。桌面被擦得锃亮，连擦痕都没留下。她从文件堆中抽出一份草案，一页页翻，直到自己重新成为那具“完美的国家外壳”。"
 Fontaine_empire_furina_personal.6.a: "戏中人与戏是依恋的关系。"

 Fontaine_final.1.t: "荣耀归于...你？"
 Fontaine_final.1.d: "这里是作者的一些随笔...如果你愿意看完的话，那真的非常，非常感谢你。点完这个国策，看到这个事件，意味着你已经体验了枫丹的所有内容。也许经历了现实中几小时在电脑前的努力，在精神高度集中以后，再阅读大段的文字是让人疲惫的。因此，才要感谢你没有立刻点掉这个事件——或者点掉也没关系，我想说...辛苦了。\n\n你从这个故事的枫丹里感受到了什么？这条路线的故事与蓝红线不太一样，我在构思它时，经历了更多的反思与思辨，最后想要构建一个这样的芙宁娜。她伸手，想要抓住自由，却只抓住了光束的虚幻；去体会爱的感觉，不论爱人或是被爱，却被权力结构牢牢控制住了一切，变得优雅，变得端庄，成为皇帝，成为圣女，即使权力从不过问她的意愿。所以我不惜去讨论一些平日看来被边缘化的东西——心理，哲思，以及性。\n\n实际上，所谓极权不一定是万人体育馆中嘶哑的吼叫，或是军靴践踏下针扎的呻吟。它也可以西装革履，讲着温柔的话语，秩序，稳定，经济增长。心理上的攻势，粉碎一切肉体上的反抗。这样的方式可以彻底“驯服”一个人，可怖的是，国家同样可以用这样的方式驯服它的国民。这样的极权并不流血，你看不到它所做出传统意义上的暴行，没有屠杀，清洗，劫掠，取而代之的是令人窒息的秩序。沉默，悄无声息，机器缓缓运作的声音，早已融入社会的背景音中，被大脑当作冗余信息滤过。你压抑着，眼见生活日复一日，年复一年，毫无起色。内心阴燃着无名之火，死本能撕裂一切，迫切想要毁掉些什么——可体制，什么也没做错...吗？\n\n既然暴政不是传统意义上的暴政，那么反抗也不再是举着反法西斯的大旗热血沸腾，而是...慢慢扩展到更细致入微的领域，内心痛苦，在攀比中累积的焦虑，或者是疲于这场疯狂而看不到尽头的竞赛，这也与死难者的鲜血同样，可以成为控诉暴政的依据。不再震耳欲聋，只是沉默着...但也具有力量。理性，人类高贵的理性，曾帮助人类得到火，发现数学，最终进入宇宙，它很伟大。可这样高贵的理性凌驾于人之上时，却将人变成了数字，你的痛苦无人在意，理性在意你会因为这样的痛苦消费些什么，摇滚？咖啡？色情还是大麻？\n\n我不指责谁沉迷某事无法自拔，摇滚、文学、动漫色情，无论做什么事情，如果这件事抚慰了你，那么就是这个禁毒国家里的大麻。明知是剥夺行动力的大麻，为何还要吸？真好笑，哪有瘾君子靠着自身意志戒毒的怪事啊。何况，“戒毒”以后的世界，对比而言，究竟有何改观呢？"
 Fontaine_final.1.a: "所以...结束了吗？"

 Fontaine_final.2.t: "结束？"
 Fontaine_final.2.d: "我写了这样的一大段，有没有读累呢？抱歉，还没结束。因为接下来...我想弥补一个遗憾。三个路线中，芙宁娜都是象征符号，只是红蓝相对自由一点，她从未亲政过...所以...即使接下来的剧情很天真，也请不要太在意。"
 Fontaine_final.2.a: "玩到这里，已经足够了"
 Fontaine_final.2.b: "让我看看..."

 Fontaine_final.3.t: "一次小小的反叛"
 Fontaine_final.3.d: "芙宁娜在宫殿里失踪了整整七个小时。没有仪仗，没有告假，没有携带随员。仿佛就这么从帝国权力的正中心蒸发了，仿佛她终于不再是那枚被时时推演的齿轮。整个官僚机构陷入恐慌。总理府召开紧急会议，卫兵局长脸色苍白如纸。那晚枫丹的天是灰色的，雨像没有尽头的耳语，不紧不慢地打在玻璃上，让人错觉整个国家都沉入了湖底。\n\n“找到她了。”一个秘书低声说。国家广播总站。阿蕾奇诺没有犹豫，披上外套亲自赶过去。那是她第一次穿着便服离开总理府，像是赴一场私人的约会，或者，一场迟来的诀别。她在录音间的玻璃外看到了芙宁娜。那孩子站在话筒前，一动不动，头发有些凌乱，裙摆没有熨平，像刚从梦里爬起来，又迷路在半醒的凌晨。灯光是暖的，背后是麦克风与空调的低鸣。没人打扰她，所有技术人员都躲得远远的，像在逃避一次即将泄洪的告白。\n\n芙宁娜开口了。她的声音是轻的，软的，甚至带着点耳语式的恍惚。却穿透了所有频道，像是有人把她的灵魂接入了整个帝国的神经。\n\n“起来呀……起来呀……你们不痛苦吗？不难受吗？为什么不反抗呢？”\n\n“可以吗？和我一起......”\n\n她没有哭。但那声音却让人有种错觉：某种巨大的眼泪已经落下，只是我们听不见。那一瞬间，不知道有多少人停下了手里的工作，不知道有多少枫丹人站在灯下，沉默地望着收音机出神。仿佛整个帝国的情绪都在那一刻短路了。没有掌声，也没有警铃，只有她和这个国家之间，一个终于不再转译、不再化妆的声音。\n\n阿蕾奇诺没进门。她只是倚在门边看着，然后，笑了。那笑不是讽刺，也不是放弃，而是一种被击中了心脏却毫无防备的温柔。“天真得可爱。”，她低声说。\n\n那一夜过后，她真的消失了。三天后，总理府公开宣布内阁总辞，所有大臣拒绝留任。没有解释。只有一句：“我已经玩腻了。这个国家，真是无聊透顶。”整个帝国就这样，被扔给了芙宁娜。不是“交托”，不是“加冕”，不是某种仪式化的合法性建构。是“扔给”她。像一块冷冰冰的铁板，或者一颗尚未引爆的炸弹。她就坐在权力的中心，四周是空空的官邸，文件堆积如山，房间里回荡着她自己的声音录音。\n“你们不痛苦吗？”\n没人知道她那晚后来有没有哭。她有没有打开什么红酒，是不是试图自己签第一道法令，结果写错了日期。有人说她走到镜子前，看了自己很久很久，然后终于明白，自己永远不能再做芙宁娜了。她只能是芙卡洛斯，是帝国之躯，是人民的幻象，是一尊戴上表情的偶像。也有人说，她只是坐下来，靠在沙发上睡着了。像一个刚结束演出的演员，卸了妆，丢掉剧本，终于沉沉地睡去。"
 Fontaine_final.3.a: "所以，还没结束。"

 Fontaine_empire_normal.18.t: "[FROM.GetName]提议联合攻击英国"
 Fontaine_empire_normal.18.d: "[FROM.GetName]似乎正在准备入侵英国，他们将我们看作是一个绝佳的盟友，便许诺在英国投降以后将北爱尔兰移交给我们。在获取北爱尔兰以后，他们还承诺爱尔兰可以随时退出战争，并且享受来自枫丹的经济优惠"
 Fontaine_empire_normal.18.a: "我们爱尔兰实在太过势单力薄了。"
 Fontaine_empire_normal.18.b: "为了爱尔兰岛统一，我们斗争到底！"
 
 Fontaine_empire_normal.19.t: "爱尔兰婉拒"
 Fontaine_empire_normal.19.d: "爱尔兰非常感谢我们给予他们的优厚条件。然而在爱尔兰总参谋部经过评估以后，认为爱尔兰军队不具备哪怕只应付北爱尔兰地区的战事。并且，来自枫丹的驻军还有可能损害爱尔兰的独立性，出于种种考虑，他们最终拒绝了我们的提议。"
 Fontaine_empire_normal.19.a: "可惜，他们错失了收复北爱的唯一机会。"

 Fontaine_empire_normal.20.t: "爱尔兰欣然允诺"
 Fontaine_empire_normal.20.d: "爱尔兰被我们提供的优惠条件打动了。他们批准枫丹近卫军在战事进入爱尔兰的领土，授予使用其铁路，港口，通信设施的一切权利。陆军参谋部对于爱尔兰的同盟非常满意，这将大大增强英国的防御压力。"
 Fontaine_empire_normal.20.a: "非常好。"

 Fontaine_empire_news.3.t: "苏联远东秩序崩溃"
 Fontaine_empire_news.3.d: "由于苏联的西线战场形势愈发不容乐观，苏联政府不得不调动在远东的大部分兵力增援西线，仅在苏日边境有少量兵力驻扎。这导致苏联在远东出现了大量的权力真空，随着莫斯科陷落，整个苏联陷入了巨大的混乱，军阀乘机崛起。\n\n现在苏联中央政府基本已经与远东失去联系，这一地带事实上苏联已经完全无法掌控。"
 Fontaine_empire_news.3.a: "天哪！"

 Fontaine_empire_normal.28.t: "[From.GetAdjective]已无有组织抵抗"
 Fontaine_empire_normal.28.d: "苏联在接连丢失莫斯科，列宁格勒和斯大林格勒三座核心城市以后，内部似乎陷入了巨大的混乱。前线的苏军大部分都在慌忙逃窜，或者异常调动，仅有少量兵力依旧在抵挡我们的前进。实际上，战争进行到这个地步，继续推进已经没有意义。苏联最为核心的区域：莫斯科都市圈以及乌克兰城市群，已经尽在掌握。而AA线以东的，大部分是毫无战略价值的村庄，最多也只是三两间工厂的小城镇。而收益减小的同时，我们的补给线也难以继续深入。在付出与收获不对等的情况下，停止进攻会是最好的选择。"
 Fontaine_empire_normal.28.a: "停止前进，以目前实控边境停火。"

 Fontaine_empire_normal.29.t: "罪名研究"
 Fontaine_empire_normal.29.d: "我们不打算援引战争罪。那属于失败者的叙事，是战后联盟分赃前的政治账目，带着冷血的温情与伪善的法律情绪。我们无需它。审判墨索里尼，不是为了让人民明白什么是正义，而是为了让他们明白什么叫后果。\n\n战争不是问题，失败也不是问题。真正的问题，是他让太多人白白死去，却没有一个死亡配得上意义。他的士兵在埃塞俄比亚犯下暴行，不是出于野心，而是出于命令中的空洞。他的秘密警察审讯了无数反对者，不是因为恐惧，而是因为制度需要一个“安静的夜晚”。\n\n他是一个空洞的人，正因如此，他才有罪。因此，我们将指控他犯下广义谋杀罪——每一个死在埃塞俄比亚的尸体，每一具从雷焦监狱被拖出来的躯壳，每一个因“思想危险”而被送上山岗的年轻人，都是他的作品。\n\n技术官员们会计算一个数字——一个大致的死亡人数。我们不会争论其中哪些是“合法暴力”，哪些是“例外状态”。我们只会列出统计表格、编号、时间、地点，以及签署命令的名字。不是为了控诉。而是为了把他的生命换算成他带来的死亡数量，没有任何理由。"
 Fontaine_empire_normal.29.a: "清算两字而已。"

 Fontaine_empire_normal.30.t: "审判以后"
 Fontaine_empire_normal.30.d: "判决书是一叠印刷纸，装订得工整，骑缝章盖得严丝合缝。第一页写着：“贝尼托·墨索里尼，死刑。”\n后面还有七十二个名字，大多是法西斯党部的高官、军官、记者、地方行政长官，还有一些谁也叫不出名字的“联络员”，他们有的策划镇压，有的执行命令，有的只是签署逮捕令。文件已经由内务部、军事法庭、临时法律审查局三次盖章。送到这儿，只差一个签字。\n\n她坐在办公桌前，阳光透过北岸的云层，落在那一行印刷体下方的留白处。她的名字，被预留在那里。\n\n她没有动笔。\n\n“如果他是为了死者负责而死……”她想，“那么我呢？”从拉古萨到布尔加斯，从突尼斯到佛罗伦萨，从巴黎到高加索山脊……她签署过多少命令？出动、镇压、同意征兵、默许轰炸。没有多少命令是她亲自下达的，送到她面前的文书，大部分已经是可行的整套方案，遵循着一套固定的行事方法与往来经验，她每次只需签字。多数时候，她看也不看。\n她看着地图上的红色线条慢慢向东推进，看着日报头条写着“伟大胜利”，可是谁来数那些在没有人名的战报里死去的士兵？如果这世上真有“必须为死亡负责的人”，她又能逃过多少？\n\n她闭上眼，深吸一口气，睁开，拿起钢笔。“只要我们赢了——只要最终胜利是属于我们的……”她告诉自己，“那一切就……与我无关。”墨水落在纸上，流畅如法令如常规，如同这整个帝国运转的每一个瞬间，签下自己的名字：芙宁娜·德·枫丹。"
 Fontaine_empire_normal.30.a: "继续运行。"

 Fontaine_empire_normal.31.t: "一具普通的尸体"
 Fontaine_empire_normal.31.d: "我们站在罗马门前的广场上，看着那个老头被拖出来。他穿着件沾满泥土的外套，看不出是什么军衔，也不再戴那顶能让人举手致礼的帽子了。有人往他身上吐口水，还有人朝他脸上扔石子。\n我没动。那是贝尼托·墨索里尼。我十一岁的时候在学校第一次听到这个名字。老师让我们集体背诵《我们有一个领袖》。后来我穿上青年团的制服，在广场上听他演讲。那个时候我真的信了：国家就是他，他就是我们。我们用他的名字举杯，用他的肖像作画，他的嘴角上扬幅度都能成为报纸标题。\n他是一个比父亲更近的人物——父亲是个整天烂醉着的混蛋，意大利人重视家庭的传统，在他身上的体现是在少数清醒时以暴力宣誓权威。相比于他，墨索里尼更像父亲，活着的理由。\n\n然后他宣战，然后我参军。我不是因为害怕，而是……说不上来，就像是一种惯性，像晨钟一样响在每个人脑袋里。在突尼斯我差点被炸死，在那不勒斯我亲手掩埋了副官，在佛罗伦萨我终于逃了。枫丹人的坦克在阳光下像钢铁裁决一样驶过来时，我是趴在泥地里哭着放下枪的。我不是勇敢，也不是懦弱，我只是……突然发现那个一开始告诉我“这就是国家”的人，其实也没搞懂国家是什么。\n\n现在他要被处决了。行刑队穿着整齐，步伐一致，像极了我们以前训练时的样子。他被推到墙前，站立不稳。一个士兵把命令读了一遍，那张纸在风里晃动。没人真的在听内容，所有人都在看他是否会求饶。\n他没有。然后就是枪声。很整齐，八发齐鸣。子弹穿透他，身体向后倒去，落地的声音居然很轻，像是衣服掉在地上那样轻。周围有人欢呼，但我没听清。我只是在想：这个人，如果没当上领袖，也许只是个在广场上讲演的疯子，一个嗜好权力的写手，一个从来不打扫房间的糟糕丈夫。他只是在错误的年份出现在了正确的语气词后面。我们所有人就这样陪着他活过一段奇怪的历史，像搭上了封闭的列车，不知道终点是哪，只知道不停前进。\n\n子弹停了。他死了。但我不知道我们真的自由了吗。后来广场清空了，清洁工拖走了血迹。没人再提他了，这个死人的名字如同过期的新闻一样毫无意义。\n\n可我永远记得那天：阳光明亮，子弹响亮，尸体瘫软。我站在人群之中，像个看错了电影剧本的演员，半个字都说不出口。只是在心里默念了一句：所以，这就结束了吗？"
 Fontaine_empire_normal.31.a: "一个错误的时代，但那正是我生活的。"

 Fontaine_empire_normal.32.t: "年轻者"
 Fontaine_empire_normal.32.d: "我一直以为，女人如果要让我倾心，她必须是自由的——那种自由不是海报上的笑容，也不是政党大会上被允许的发言时间，而是独立到可以在深夜一个人穿过蒙帕纳斯，走进空无一人的咖啡馆，点一杯苦到发涩的咖啡，独自喝完，不需要任何人陪伴。她要留着及肩的短发，刚好能在风中扬起来，又不会被任何男人的手指缠绕。她的眉眼中该有一种拒绝——拒绝被看作谁的情人、妻子、母亲，拒绝被纳入任何编制，拒绝成为任何一个政治词汇的附庸。\n\n我在索邦的最后一年里，常常幻想她的模样：也许穿着一件简单的衬衫，袖子卷到肘部，露出握笔时微微收紧的手腕；也许叼着一支烟，但不是为了性感，只是因为思考的时候手里要有东西转动。她会在布满灰尘的图书馆里翻书，偶尔抬起头来，用那种像审问又像戏谑的眼神盯着我，仿佛在问：“你在读什么？你又懂多少？”\n\n她必须反叛，日复一日地拒绝服从——哪怕是拒绝在别人的信里签一个无关紧要的名字，也能成为她的反叛。她对自己的主体性会有一种痴迷的狂热，好像整个世界的逻辑都在于此。我常常想象和她并肩走在塞纳河边，看那些在战后重修的桥墩上涂写的标语逐渐被雨水冲淡。风从河面吹过来，吹乱她的短发，她却懒得去整理。我会想，这才是自由：不为自己的形象服务，不为讨好任何人而存在。“你啊，”有一天在酒馆里，皮埃尔一边切着盘子里的牛肉，一边盯着我，“你适合和妓女交往。”\n\n我笑了笑，没有立刻回话，怕自己笑得太用力露出破绽。\n妓女。是啊，也许那才是最干净的交易——金钱换取欲望，没有幻觉，没有承诺。没有人会天真到要求你理解她的主体性。她不会在你面前假装你是她的救赎，你也不会假装她是你的信仰。可我偏偏想要信仰。不是天主教徒那种在弥撒中低下头的信仰，而是对一个人的信仰。可在这个城市里，对人的信仰几乎等同于自杀。皮埃尔说的没错，巴黎是妓女的天堂，也是理想主义者的坟场。\n\n有时我会在圣米歇尔大道上看见一些女人——短发，步伐急促，手里夹着厚厚的文件夹，像是要去参加什么会议。她们的眼神冷静，像是看穿了整个世界，但在路灯的光下，那冷静里又藏着某种疲惫。我想象她们坐下来时会叹口气，把文件丢在桌上，然后点一支烟。那烟雾升起来的时候，也许她会说：“自由？自由是你付不起的奢侈品。”\n\n我也见过那些真正的妓女。她们坐在歌舞厅外的长椅上，穿着过时的高跟鞋，和士兵说笑。她们的笑容更真诚，因为她们从不假装世界会变好。妓女至少承认交易的存在，而那些戴着自由徽章的女人，往往要用更多的交易来证明自己不被交易。我不知道自己是在渴望一个女人，还是在渴望一个观念。战后的一切都变得模糊起来，连渴望都像是从别人那里借来的。人们谈论重建、谈论秩序，谈论市场的复苏和国家的未来，可我只想找到一个不谈这些的女人。她可以在凌晨三点陪我在空旷的拉丁区散步，可以在咖啡馆里对所有男人嗤之以鼻，也可以在床上什么都不说，只是沉默着看天花板。有时我害怕自己追求的并不是女人，而是那种永远无法占有的姿态——一种从根子里拒绝被驯服的存在。她可以用眼神告诉我：“我不会爱你太久，也不会等你太久。”而我会因此更想抓住她。皮埃尔说得没错，我适合和妓女交往。可妓女无法给我这种痛苦，这种让我一遍遍想象、却永远抓不住的痛苦。"
 Fontaine_empire_normal.32.a: "我想，我喜欢的也许不是自由的女人，而是那个永远不会选择我的女人。"
 Fontaine_empire_normal.33.t: "爱慕者"
 Fontaine_empire_normal.33.d: "皮埃尔是谁？家中的次子。长兄继承了家业，妹妹继承了宠爱，唯独他什么也没分到——不，倒是分到了一点：自由。那是父母在餐桌旁心不在焉地说出的几个字：“你自己看着办吧。”于是他看着办，像一艘船被推下水，从此再也没有码头。\n\n索邦的讲堂对他来说不是知识的殿堂，而是一片延伸到天边的荒原。教授在讲台上谈论政治哲学时，他低下头，用钢笔在笔记本的空白处画黑色的漩涡。那是他的日常——在主体性的黑洞里旋转、坠落、旋转、坠落。自由，本应是值得庆贺的事，可他只是觉得自由意味着没有人会来接他。阿蕾奇诺出现在他的生活里是在一个阴沉的下午。那天的报纸第一版登着她的照片：军装的领口扣到最上面一粒扣子，眼神锋利，像刀子，也像锁。他看了很久，像是一个溺水的人在冰冷的海面上看到一块漂浮的木板。他并不关心她在做什么、说什么，也不在意她的政策是否会影响他。他只看到一种存在的方式——不坠落、不犹豫、不怀疑。权力在她的肩章上闪着冷光，服从在她的姿态里无声地延展出来。\n\n有人说，爱慕应该源于感情交流，源于彼此的了解。他笑了笑，不解释。他的爱慕和她无关，甚至和自己无关。那是一种对驯服的渴望，对被掌控的渴望。他想象着站在她的阴影下，听她的命令，不必再为“该做什么”而焦虑。自由是一间无门的房子，他在里面迷路太久。阿蕾奇诺的存在，就像一扇沉重的铁门——关上它，他就能安静下来。\n\n有时候在咖啡馆，他会摊开那张泛黄的报纸，盯着那张早已熟记于心的照片，直到咖啡凉透。旁人看去，也许只是一个年轻人对政治人物的过度兴趣。但只有他自己知道，那是他停止坠落的唯一方式。"
 Fontaine_empire_normal.33.a: "真是疯子。"
 Fontaine_empire_normal.34.t: "洞穿者"
 Fontaine_empire_normal.34.d: "他第一次在书上看到“性欲”这个词，是在一个阴冷的下午，索邦的图书馆里，墙上的钟滴答作响，像在为某种未知的过程计时。那本书的纸质已经发黄，字迹却异常清晰。性欲、力比多、压抑——每一个词都像一把钥匙，插进文明的门缝里，轻轻一转，门后便露出潮湿的阴影和骨骼。他没有感到厌恶，反而有一种热流从胸口涌到指尖，像是终于找到了某个被遮蔽的地图。\n\n他开始疯狂阅读精神分析的书籍，从弗洛伊德到荣格，再到法国人自己发明的新术语。他并不急着理解全部理论，只是沉浸在那些词的质感里——它们带着冷静的精确，又暗示着无法完全公开的真相。他在课堂上做笔记时，笔尖的压力越来越重，纸张的纹理被刻出深痕。他知道自己并没有什么需要“治愈”的症状，但他想看一眼，真正的精神分析在现实中是什么样子。\n\n于是，他花了相当于一个月生活费的钱，预约了拉康新开的诊所。朋友得知后皱眉：“你又没病，去干嘛？”他只是笑，仿佛在守护一个私密的约会：“我想见见制图的人。”那天巴黎下着小雨，诊所外的街道反着路灯的光。他推开门，闻到皮革和旧木头的气味，像走进一间久未开窗的书房。候诊区空无一人，他坐在沙发上翻看一本《梦的解析》，指尖掠过印刷的凹凸。时间到了，秘书轻声请他进。\n\n拉康坐在窗边的椅子上，修长的手指交握，目光像一束光线穿透雾气。他刚坐下，还没来得及解释来意，拉康便开口：“你花了这么多钱，只为了让我知道你想被看穿。”他愣住了，笔从手中滑落。拉康继续：“你的兴奋，不是因为理论揭示了什么，而是因为这些词在你眼里像是通往密室的钥匙。你来这里，不是想打开密室，而是想让我看到你手里握着钥匙。”\n\n他试图反驳，却发现拉康的目光里已经写满了对他行动的解读。那种被剥开的感觉让他不安，却又兴奋。他像被人一把拽到镜子前，被迫看见自己——不仅看见了面孔，还看见了面孔背后的渴望。拉康的声音缓慢而平稳：“你以为自己追求的是精神分析的真相，其实你追求的是成为精神分析的对象。你不想破解结构，你想成为结构的一部分，让它为你命名、为你编织历史。”\n\n他坐在椅子上，背脊绷得很直，像学生在答辩时等待教授的判决。外面的雨声敲打窗台，与拉康的语调混在一起，仿佛整个房间都是一个低频的嗡鸣。他突然意识到，自己来这里的动机，从一开始就不是“好奇”，而是一种求证——求证自己是否足够复杂，足够值得被解读。\n\n会谈结束时，拉康没有再说什么，只递给他一张薄薄的账单。走出诊所，雨停了，街面映出扭曲的灯光。他手里攥着那张纸，觉得它像一份宣判书——宣判他的动机，他的幻想，甚至宣判了他对自己的所有叙述。走在回去的路上，他忽然想到，那副他以为藏得很好的“文明的地图”，也许从一开始就是一面镜子。那镜子冷冷地立在路中央，他绕不过去，也无法移开视线。"
 Fontaine_empire_normal.34.a: "学术偏执。"

 Fontaine_empire_normal.35.t: "关于枫丹“新人”的形成"
 Fontaine_empire_normal.35.d: "我一直在思考，阿蕾奇诺是如何做到的。她接手的并不是一片空白，而是一群性格各异、抱怨不休的枫丹人。他们生活在历史的阴影里，习惯了动荡与幻灭，缺乏对未来的热情。然而在几年时间里，这些人开始习惯、甚至主动去执行她的命令。他们在她的注视下，不再以反抗为荣，而是把顺从视作安全感的来源。\n\n我认为她的方法不在于压制，而在于组织欲望。暴力在她的体系中从不以原始的形态出现，它穿上了制服，学会了低声说话。她并不急于摧毁反对者的思想，而是让他们自己调整姿态去适应现有秩序。枫丹人逐渐学会了在体制内呼吸，他们甚至会为这种呼吸节奏辩护。这是一个微妙的过程。首先，她让暴力可预测——警察的行动有程序，军队的调动有时间表，审讯的话术有模板。人们在可预期的威胁中找到稳定感。接着，她引入安抚的元素——粮食配给准时发放，节日照常举行，街道干净，歌剧院依旧上演。恐惧与安慰并存，使得人们无法在情绪中选择立场，他们学会了调和自己的感受，以避免撕裂。\n\n在精神分析的意义上，这是一种“内化的驯服”。主体不再感受到外部权力的直接压迫，因为权力已经被移植进他们的自我结构。他们在执行命令时，并非机械地屈服，而是以为自己在做出理性的选择。服从被伪装成一种个人判断，甚至被包装成道德义务。我注意到她很少亲自表演愤怒。她让权力的象征物——制服、仪式、公告——去替代她的情绪。这样，她在大众眼中保持冷静而坚定的形象，既避免了权威的耗损，又让人产生距离感。距离感在心理上会被转化为敬畏，敬畏再与秩序结合，就成为难以撼动的依附。\n\n最巧妙的一点在于，她并不完全消灭个体的欲望。她允许某些安全的欲望存在，比如对消费、对文艺、对小范围社交的热爱。这些欲望像安全阀，让人们在体制内找到出口。真正被压抑的，是那些可能指向集体行动、可能破坏秩序的冲动。长久下去，人们会将这种自我阉割视作成熟与理性。因此，枫丹出现了一种新的主体——他们在外表上温顺、礼貌、遵守规则，内心却没有强烈的反抗欲望。他们甚至会用官方的语言去解释自己的选择，把个体与权力的关系描绘成平等合作。实际上，他们的自由被重新定义成了一组经过筛选的选项。\n\n这并非传统意义上的暴政，它更接近一种心理结构的重塑。阿蕾奇诺像雕刻家一样工作，她用可控的暴力打掉旧的棱角，再用安抚填充空白的部分。最终呈现出来的，是一批会自动站成整齐队列的“新人”。他们对秩序的依赖与对权威的尊敬已经混合成一种深层本能，就像儿童在学会语言的过程中同时学会服从语法。我不能断言这种结构是否稳固。精神分析告诉我们，被压抑的东西终会以某种方式回归。但在可预见的未来，枫丹的街道会继续整洁，节日的花车会继续经过市政厅前的广场，人们会继续在礼貌与顺从中生活。他们会以为这是自己的选择，而这正是阿蕾奇诺真正的胜利。\n\n雅克·拉康，[GetYear]于巴黎。"
 Fontaine_empire_normal.35.a: "我们理解，我们无能为力。"

 Fontaine_empire_normal.36.t: "临床记录：新人类"
 Fontaine_empire_normal.36.d: "记录一\n“她很公正。”受访者是一位电车司机，四十岁上下。他的声音像在复述一个早已确定的结论：“如果有人违反规定，不管是谁，都会受到同样的处理。上个月我一个朋友，因为在休息时间喝了酒，被停职两周。我不怪她——规矩就是规矩。”我问他是否曾经感到过害怕，他想了想，说：“一开始有，但后来习惯了。只要你遵守，就不会出事。”——在可预测的规则中，恐惧会被磨平，转化为依赖。\n\n记录二\n一名文学系的女学生说：“她让我觉得……我在为某个比自己更大的东西工作。”她的眼神有一种轻微的发光感，“我也会批评政府的某些做法，可那不影响我相信她是对的。”我问她何以如此肯定，她说：“因为她从不失态。她站在那里，你就会觉得一切都在掌控中。”——冷静的形象能遮蔽权力的锋刃，使依附看似是一种自主选择。\n\n记录三\n酒馆角落的一位退役军官低声说：“她不需要吼叫。她会让你自己去想清楚该怎么做。这样做的人，才可怕。”他用手指敲了敲桌面，“你会发现自己开始提前配合，避免让她失望。”——当服从被包装成维护关系的方式时，它就成为自我结构的一部分。\n\n我逐渐确认，她的治理依赖一套双轨机制。第一轨是可控的暴力——有规则、有程序、有限度。第二轨是有节制的安抚——生活秩序不被破坏，娱乐和消费保持流通，小规模的自由得以保留。这两者交替运作，使主体既无法完全恐惧，也无法完全放松。在诊所里，我对一位来自枫丹的病人做了自由联想测试。他在描述童年时，用了“安全”这个词十一次，用“害怕”四次，但那四次都伴随着“最终没事”。这种语言模式表明，恐惧已经被内化为稳定的一部分——就像夜里的钟声，虽然响，但不会打扰睡眠。\n\n阿蕾奇诺极少亲自表演情绪，她让制度替她发声。制服、法令、庆典和标语，成为情感的代言人。情绪的缺席反而让人更容易将她投射成理性与秩序的象征。更深一层的驯服在于，她为欲望设置了边界。她允许人们去追求安全的事物——晋升、恋爱、小额财富、艺术消遣。这些欲望被允许存在，并在公共叙事中被标记为“健康的”。与此同时，那些可能催生集体行动的冲动被持续削弱。长此以往，人们会将对自身的压抑视作成熟，视作社会化的一部分。\n\n回顾这些访谈，我发现他们的叙述中普遍缺少一个问题：“为什么？”他们解释的是规则的内容和效果，而不再追问规则的起源或正当性。这是驯服的最高阶段——当主体放弃追问，权力就完成了自我复制。枫丹的“新人”并非天生顺从，他们是被塑造的。可控的暴力提供骨架，有限的安抚填充血肉。最终，他们会在制服与旗帜下找到安全感，在节日的灯火中找到归属感，并将这些感受误认为是自己的意愿。\n\n他们以为自己在选择生活的方式，其实只是学会了以制度的节奏呼吸。"
 Fontaine_empire_normal.36.a: "还有人愿意问为什么吗？我不知道。"

 Fontaine_empire_normal.37.t: "冷漠"
 Fontaine_empire_normal.37.d: "我有时会想，那年的大罢工是不是真的发生过。1936年夏天，阳光烤得街道发白，工人们在厂区门口竖起木板，红旗在屋顶招展。那是我第一次站在那么多人中间，喊出口号的时候嗓子发疼，觉得自己和他们是一体的。我们以为，只要一次真正的联合，就能把这个国家推到另一条轨道上。可现在，仿佛那一切只是纸上的插图。街道依旧有人来往，工厂的烟囱依旧冒着白气，工人下班后去酒馆、去看戏、去逛集市。他们很少谈起那场罢工，像是集体遗忘了它。偶尔有人提起，也只是叹一句：“那是年轻时的事。”\n\n共产党早已解散，旧日的同志各自散去。有人进了社民党的议会席位，有人干脆成了阿蕾奇诺的顾问。剩下的人则沉默着，像退潮后遗留在岸上的石块，被风吹成光滑的圆形。我想重建党组织，不是为了复仇，而是因为威权的缝隙里总该有人去做这件事。可我遇到的工人，眼神里已经没有当年的火光。他们按时上工、按时领薪，在谈论工资时的语气，比在谈论权利时更有力量。我曾在一次谈话里愤怒地说：“阿蕾奇诺只用你们劳动成果的十分之一，就收买了你们。”他们笑了，笑得很平静，“阿黛尔，你又在说笑了。”他们甚至只用我的姓氏称呼我，都不愿叫我夏洛蒂，似乎我离他们的距离比他们离阿蕾奇诺还要远。我似乎是在说一个和他们无关的故事。\n\n我完全可以用批判社民党的方式去批判她——批判她用秩序换取屈从，用安抚消解反抗，把工人阶级变成一支可控的队伍。但这些话已经没有锋利感。人们早已习惯在秩序里生活，他们甚至会用她的口吻替她辩护。批判像是在空旷的房间里说话，声音一圈圈回到自己耳边。有时候，我会想象那场罢工的场景：火车停在铁轨上，车厢的铁皮反射着烈日，工人们坐在地上唱歌，孩子在旗帜间跑动。那是我的基准线，我用它来衡量之后的一切。而现在，我几乎找不到任何接近它的时刻。\n\n我试着寻找突破口。去码头，和装卸工谈工资；去车间，和女工聊工时；去咖啡馆，和年轻人谈国际局势。得到的回应都一样——他们点头，表示理解，然后回去继续自己的生活。那种不置可否的态度，比敌意更让人绝望。敌意至少还意味着存在冲突，而冷漠什么也不留。阿蕾奇诺很懂得如何在暴力与安抚之间划界。她让惩罚有规则，让奖励有节奏，让每个人都在制度里找到一个位置。这个位置足够安全，又不至于让人完全忘掉权力的存在。她不需要摧毁反对者，只要让反对者的言语失去听众。\n\n有时，我在夜里写文章，批判她的做法、揭露她的话术、剖析她的政策。我一边写，一边知道这些文字不会掀起什么波澜。读的人会同意，甚至会赞叹我的逻辑，然后合上纸张去忙自己的事。批判变成了一种供人消费的修辞，就像酒馆里的一段段闲谈。我开始怀疑，工人阶级的先进性是不是一种神话。也许它曾经存在过，可一旦生活的基本稳定被保障，它就像潮水一样退去。剩下的是务实的算计、个人的安稳、对风险的本能回避。我无权责怪他们，因为这是一种可以理解的选择——但正是这种选择，让我感到孤立。\n\n在这样的环境里，重建党组织就像在平静的湖面上点火。火会烧一会儿，然后熄灭，湖面恢复原样。水下的沉寂吞掉一切声响，没有回音。有时候，我会想，如果那年罢工时我们就遇上了阿蕾奇诺，会怎样？她也许会走进工厂，承诺更好的工资、更短的工时，然后让红旗在掌声中自己降下来。那样的胜利，比失败更致命，因为它不留伤口，只留习惯。"
 Fontaine_empire_normal.37.a: "一会，我会把报告写给莫斯科。"

 Fontaine_empire_furina_personal.7.t: "女皇的一日日程"
 Fontaine_empire_furina_personal.7.d: "清晨七点，宫殿东侧的窗帘自动被拉开。阳光透过薄纱，落在一尘不染的地毯上。侍女端来温水，提醒她今天的早餐有记者要拍摄。她点头，把水含在口中片刻，漱口，吐入银盆。动作安静、精确，像在完成一个被反复排练过的舞步。\n七点半，礼仪官进入房间，汇报今日的公开行程。她的签名笔已经放在桌角，墨水的颜色和今日的服饰配套。签字时，她的手腕保持在规定的高度，确保摄影机可以拍到完整的弧线。\n八点，她在花园露台用早餐。银器排列成绝对的对称，茶水的温度控制在摄氏七十度，吐司的厚度精确到半厘米。她与礼宾官交谈，话题是枫丹的外交形象。每一个句子都经过训练，既不锋利，也不松懈，像打磨过的玻璃——透明、无味、没有棱角。\n九点整，化妆师与发型师进入。她的发丝被一根根梳顺，喷上固定剂。化妆的颜色遵循“高洁”的标准，不可艳丽，不可苍白，必须让人联想到清晨的湖面。她看着镜中的自己，像看着一尊在博物馆橱窗里的雕像。\n十点，她接见一批来自各行业的模范代表。握手时，她的掌心保持温度，眼神停留在对方脸上恰到好处的三秒钟。摄影师捕捉到的，是她微笑的侧脸和受访者感动的神情。那些感动被印在报纸上，成为道德的证明。\n午后，她巡视一所学校。孩子们排成整齐的队列，挥舞着小旗。她弯下腰，听一个女孩背诵诗句。周围的镜头捕捉到她的倾听、点头和微笑。那微笑的弧度事先在镜前反复演练过，不会露齿，也不会显得疏离。\n午餐后，她在宫廷会议室主持一次简短的政策讨论。她发言的部分已由首相提前准备好，她只需朗读——声音平稳，停顿恰当，像是在为一段无可置疑的真理作注解。会议结束，文件上签字的墨迹干透前不能合页。\n下午四点，她回到寝宫进行“私人时间”。但私人并不意味着自由——宫廷秘书会陪同，记录她的阅读内容、练习钢琴的曲目。任何可能的访客都必须提前登记，进入房间时要接受拍照，以便次日新闻刊登“女皇的日常”。\n傍晚，她参加慈善酒会。礼服的款式由礼仪官选定，裙摆的长度精确到规则要求。她举杯时，酒液不能触到唇边；致辞时，感谢名单上的名字必须全部提及，哪怕其中有些人她从未见过。\n晚餐后，她在宫殿的长廊里缓步行走。随从会调整灯光，让她的影子在墙上显得修长。这个画面会被摄像师剪入官方纪录片，配上温柔的配乐，象征“仁慈与庄重”。\n夜里十点，她回到寝宫，侍女为她卸下饰物。镜子里，她看到一整天的自己——每一个姿势、每一句话、每一个呼吸都在公众的目光下完成。关灯前，她在心里默默数着明天的日程，没有一项与今天有本质区别。\n这就是她的任务：成为一个无懈可击的形象，让任何人都无法想象她会有愤怒、疲惫或欲望。她是被观看的客体，被制度托举成圣女的雕像。所有的优雅、端庄与合乎礼节，都不是为了她自己，而是为了让权力的叙事永远完美无缺。\n梦境是唯一自由的。梦醒之后，窗帘依旧会在七点自动拉开。"
 Fontaine_empire_furina_personal.7.a: "她的端庄对帝国而言至关重要。"

 Fontaine_empire_furina_personal.8.t: "深蓝，未完成的祈祷"
 Fontaine_empire_furina_personal.8.d: "永远待在南巴黎的宫殿里。大理石的地面经过无数次抛光，反射着窗外的光线，像一片无风的湖。季节在外面流转，却像是另一种无关紧要的事务。春天是什么颜色，她记不清；花开的形状，她从不确定——它们只存在于挂在廊道上的油画中，被画家固定在某一个被想象出来的瞬间。宫殿的花园每隔几日就会修剪一次，花木的高度与形状被计算过，颜色被严格搭配成仪式需要的比例。她走过那里时，只觉得这些花像是在为别人而活。她没有停下过脚步去闻它们的气味，甚至不确定这些气味是否存在。\n\n闲暇时，芙宁娜会站在阳台，仰望天空深邃的蓝。那是一种纯粹到近乎冷漠的颜色，干净得让人感到空虚。风偶尔吹过来，带着城市的尘土和远处河面的湿意，但这些触感在她的记忆里停留不久，很快被新的日程覆盖。\n\n在宫殿的生活没有明确的季节感。日历的存在是为了安排会晤和典礼，而不是记录节气。她的日子被划分成无数个精确的时间段，每一段都附着着别人的目的——致辞、握手、拍照、签字。春天与冬天的差别，只在于礼服的颜色和面料的厚薄。她偶尔会想起自己还是普通公民时的片段：街角咖啡馆的露天座位，初春阳光照在皮椅上的温热；在河边看一朵云缓缓散开，露出背后明亮的天穹。这些画面在脑海里一闪而过，像窗外偶然闯入的一只鸟，很快被驱赶回去。\n\n宫殿里的空气总是静止的，连钟声也像经过计算，准时而无波澜。她在镜子前整理仪容时，会看见一个无懈可击的形象——精致的发型，恰到好处的妆容，端正的姿态。这些都像是一件件礼服，她可以穿上，却无法脱下。\n\n她意识到，自己的生命被安排成一个对公众永远开放的展览。人们可以在展览中找到他们想要的品质——优雅、庄重、仁慈、道德上的完美——而她本人只是这些品质的承载体。她不能随意显露好奇、疲倦或欲望，这些情绪会破坏展览的完整性。有时夜色降临，宫殿的灯光渐次熄灭，她站在窗前，看城市的灯火一点点亮起。那一刻，她会想，如果能走下去，走到那些灯光的尽头，是否会遇见真正的春天？可这个念头像风一样，刚刚吹到她心底，就被隔着厚重窗帘的制度挡在了外面。\n\n季节的更替，对她而言只是日程表的翻页。春天不在花园，也不在天空的颜色里；它存在于她无法接近的地方——那些没有被记录、没有被拍摄、没有被安排的时刻里。她仰望着那片深蓝，心里没有祈愿，也没有计划。那是她与外界唯一的接触，却也只是一个方向。"
 Fontaine_empire_furina_personal.8.a: "一年过去了。"

 Fontaine_final.4.t: "亲政的第一日"
 Fontaine_final.4.d: "宫殿的走廊今天格外安静。阿蕾奇诺已经不在，会议桌另一侧的座位空着，连椅背上的阴影都显得陌生。今天是我第一次独自主持枫丹的事务。我没有穿平日用于典礼的长裙，而是选了一件浅色的连衣裙，像去朋友家做客那样。侍从劝我换上“更符合场合的服装”，我摇头。今天，我不是高高在上的裁判，也不是被雕刻出来的圣女。我是一个少女，一个可以自由呼吸的人。\n\n早上的第一场会见是来自南港的渔民代表。他们递给我一份清单，上面写着渔船的损坏情况和修理所需的经费。过去，我会按照准备好的程序回应——批准、分配、结束。但今天，我让他们坐下，听他们讲渔船在暴风雨中的样子，听他们谈起在海上看见的第一道曙光。我甚至问了他们一个与政策无关的问题：“海的味道，是咸的，还是甜的？”他们笑着说：“在离岸很远的地方，味道像铁。”\n\n午后，我去了一所小学。孩子们围过来，问我为什么没有戴皇冠。我说：“因为我今天是来听故事的，不是来发命令的。”他们叽叽喳喳地讲自己家的猫、暑假的旅行、学会的第一首歌。一个小男孩悄悄递给我一块糖，说这是“女皇的补给”。我把糖放进口袋，没有立刻拆开，因为我想留住这份温度。\n\n下午的议会，部长们一开始还用旧有的节奏汇报数字、计划、风险评估。我让他们放下文件，讲一个自己亲眼见过的枫丹人的故事——一个老人、一个店主、一名工厂学徒都可以。会议室一时间沉默，像是不知道如何开始。后来，财政部长讲了他小时候帮父亲在码头搬箱子的事，贸易部长提起了自己第一次坐火车去北方的情景。数字之外，原来每个人都背着一个能被讲述的世界。\n\n傍晚，我走到宫殿外的广场。人们围过来，没有先鞠躬行礼，而是先问我冷不冷、累不累。我看见一个女人抱着熟睡的孩子站在台阶下，便走下去，轻轻摸了摸孩子的头发。那一刻，我不是在安抚臣民，而是单纯地想触碰一个生命。夜色降临时，我回到寝宫，脱下那件沾了灰尘的裙子，坐在窗边。今天的一切都不像是“统治”，更像是一次长久分离后的重逢。我终于不用用哲人的姿态去俯视他们，也不用在心里为每一次温柔寻找合法性。我可以像少女那样去爱——直接、明亮、不经过制度的翻译。\n\n明天，新的日程还会继续，政治的齿轮依旧运转。但我想，至少今天，我和枫丹人之间的距离，不是由法律或权力来衡量的，而是由一颗心到另一颗心的跨度。"
 Fontaine_final.4.a: "她一直都是一个少女，从来，从来。"
 Fontaine_final.4.tt: "§g这个东西...叫作§!§R爱§!§g呀，芙宁娜。§!\n§3感谢您的游玩！§!"
 Fontaine_final.3.a.tt: "§Y国策树已更新§!"

 Fontaine_final.5.t: "亲政的第一日"
 Fontaine_final.5.d: "清晨的宫殿一如往常安静，走廊的石墙反射着微凉的光。芙宁娜站在窗前，听不见庭院里的鸟鸣——像是整个世界在屏息等待。她的办公桌上摆着一叠厚厚的名单，每一页上都是熟悉的名字：部长、顾问、秘书、地区长官。阿蕾奇诺辞职后，她独自坐上权力的顶端。起初，她试着按照惯例运转系统，让文件流转、让程序继续。但她很快发现，这些齿轮早已长满铁锈，却依旧假装在旋转。每一次会议都是重复的谎言，每一次签字都是为下一次腐烂续命。\n\n她开始憎恨——不仅是憎恨那些人的面孔，更憎恨这个需要她微笑、忍耐、维持表象的结构。系统要求她端庄地站在台上，而在台下，那些人用它作为掩护，彼此交换利益，把她当作一尊供奉的神像，既依赖又轻蔑。\n\n午时，她召集了内阁和高级官员，理由是“紧急政务”。会议厅的空气混杂着昂贵的香水与纸张的味道。官员们各自端坐，等着她宣布新的政策。芙宁娜没有拿稿子，也没有坐下。她只是平静地说了一句：“今天，我们结束旧的秩序。”卫兵涌入，厚重的门被反锁。有人惊叫，有人质问，有人试图冲向出口，被枪托砸倒。第一声枪响在厅内回荡时，芙宁娜的表情没有变化。她看着那些在昨日还用柔声与她交谈的人此刻跌倒、挣扎、流血，心里涌上的不是怜悯，而是一种解脱。\n\n她没有急于离开。她站在主席台上，听混乱的声浪逐渐减弱，直到大厅里只剩下喘息和低低的哭泣。她走到一位年轻秘书身边，弯下腰，像在与朋友告别般轻声说：“这不是针对你个人，但你是这个系统的一部分。”然后她起身，示意卫兵带走剩下的人。宫殿外，广场上的人群被军队隔离，没人知道里面发生了什么，只能看到高窗后的灯光闪烁。几个小时后，身着军装的士兵抬着被白布覆盖的尸体穿过走廊，血迹在石板地上留下长长的印痕。\n\n夜色依然温柔，她一个人坐在书房，没有侍从，没有秘书。桌上的名单被烧成灰烬，火光映在她的眼底。这只是开始，旧的秩序已经被撕碎，但新的秩序还未诞生。在那之前，所有想要将她重新锁回笼中的人，都会在名单上出现。窗外，南巴黎的夜色深沉。她望着城市的灯火，想起这些年自己被迫维持的形象——圣女、道德典范、制度的面孔。如今，那副面具已被扔进火里。她不再打算以哲人的姿态爱枫丹，也不打算以少女的温柔抚慰他们。她要让他们知道，她不仅有权统治，还可以亲手摧毁一切。"
 Fontaine_final.5.a: "事实证明，感性并非天然低理性一等。"
 
 Fontaine_final.6.t: "熟悉的新面孔"
 Fontaine_final.6.d: "南巴黎的清晨阴云低垂，宫殿的会议厅里，长长的椭圆桌空出了一半的座位。阿蕾奇诺辞职的消息已经传遍枫丹，内阁的权力空位像一道暴露在空气里的伤口。芙宁娜坐在主位，手指轻轻敲着桌面。她看着门口走进来的克洛琳德·德拉克罗瓦——身姿笔直，军服的纽扣一粒不落，眼神干净而冷静。\n\n“德拉克罗瓦小姐。”芙宁娜开口，声音不高，却在空旷的厅内清晰回荡，“你知道我为什么让你来。”\n克洛琳德略一颔首，“陛下是想让我接任阿蕾奇诺的位置。”\n“是首相。”芙宁娜纠正道，“不仅是临时的首相，而是帝国时代的第一任首相。”\n沉默了片刻，“我从未要求这样的职位。”\n“我知道。”芙宁娜微微向前倾身，“你一向不求抬举，不刻意表现自己。可这也是我选择你的原因。”\n“陛下，您清楚，我效忠的是宪法与法治，而不是任何人的个人意志——包括您。”\n“正因如此，我才放心。”芙宁娜的语气里没有恼怒，反而带着一丝释然，“我不需要一个唯命是从的人，那种人阿蕾奇诺可以有，但我不能。你会以法律为尺度去判断，即使那会让我不快。”\n克洛琳德的眉眼没有动摇，但呼吸变得稍缓，“您让我修订帝国宪法？”\n“是的。”芙宁娜的目光直视着她，“以你的良心为尺度——不要以为这是溢美之词，我说的是真实的要求。这个国家的法典在战火与阴谋中被撕裂、拼接，像一件补丁衣。你要把它还给人民，而不是官僚。”\n“宪法不是可以随意书写的诗篇，它需要在理想与现实之间取得平衡。”\n“那就去平衡。我不指望它完美，但它必须诚实。你也许不认为自己有资格裁断所有枫丹人的行为准则，可你至少比那些早已学会曲解法律的人强。”\n沉默持续了很久，仿佛连外面的风声都屏住了。\n最终，克洛琳德开口：“如果我接受这个职位，陛下必须准备好——我会做出一些您不喜欢的决定。”\n芙宁娜站起身，伸出手。克洛琳德犹豫了一瞬，还是握住了那只手。那一握很短，却像是两个截然不同的世界短暂地达成了协议。"
 Fontaine_final.6.a: "“欢迎回来，首相。”"

 French.116.t: "反战"
 French.116.d: "“同志们”，一位充满热情的演说者在广场嘶吼着，这是一个炎热的夏天，所有人汗如雨下，却抵挡不住他演说的魅力。“我们必须深刻地认识到这场战争的帝国主义性质，法兰西，是毫无疑问的帝国主义国家，占据着全世界广泛的殖民地。德意志，没有殖民地，但也已经迫使巴尔干诸国签署卖国条约，进行着更为隐蔽的殖民，并且试图取代英法的世界地位——这是否似曾相识？二十年前的一战情形便是如此，我们的父辈在那场战争中死伤殆尽，在战壕中感染伤寒死去，或是在无意义的冲锋中被流弹夺去生命，留给我们一个阴郁，迷茫而穷困潦倒的童年。现在，政府中的某些老爷，还想要让我们重蹈父辈的覆辙！同志们，看清楚，我们绝不能再去白白送死！”"
 French.116.a: "你确定真的看清楚了？"

 japan.24.t: "高桥是清之死"
 japan.24.d: "在这场蔓延全国的骚乱之中，帝国经济的重要决策者：前首相，大藏大臣高桥是清同样死在了叛军枪口下。尽管高桥在他的任期内一直将积极军备重整作为他的首要方针，然而昭和十一年予算案高达47%的军费支出还是吓到了经济学出身的高桥大臣，他拒绝任何继续提高这个比例的意见，并且表示这是“不可退让的底线”，由此，皇道派便可以给他扣上“不爱国”的帽子，是叛徒，活该去死。\n\n尽管这伙叛军最终被镇压，然而继任的大藏大臣显然再也不敢忤逆军人的意见了。在之后的经济会议上，出于安抚军方的需要，昭和十一年的军费支出被进一步提高到了60%。"
 japan.24.a: "没完没了了！"
