 Consumption_TITLE: "§Y分配&消费§!"
 Consumption_DESC: "当一个经济体消费不足时，会带来货币流通速度的问题，进而引发一系列负面效应。娜维娅计划的核心在于促进消费，让被转换为避险资产的货币重新流动起来。\n[GetConsumptionFrame]"
 Labour_TITLE: "§Y劳资协调§!"
 Labour_DESC: "社会稳定的前提是劳动关系的平衡。通过建立三方协商机制，让雇主、工会与政府在工资、工时与岗位保障上达成可执行的共识。\n[GetLabourFrame]"
 Price_TITLE: "§Y基础消费品价格§!"
 Price_DESC: "粮食、燃料与生活必需品价格的剧烈波动会破坏民心。设定临时价格带与配给红线，使复苏过程保持温和与可控。\n[GetPriceFrame]"
 Finance_TITLE: "§Y金融&银行业§!"
 Finance_DESC: "重组高风险银行，隔离坏账，恢复信贷体系的流动性。金融秩序的稳定，是整个经济恢复的基础。\n[GetFinanceFrame]"
 Trust_TITLE: "§Y国家信用§!"
 Trust_DESC: "政府的承诺必须可信。预算的执行与偿付的节奏决定了国家信用的价值——维持秩序比扩张更重要。\n[GetTrustFrame]"
 Tax_TITLE: "§Y税制§!"
 Tax_DESC: "税收既是国家的筋骨，也是经济调节的杠杆。对囤积征附加税，对新增雇佣设抵免，引导资本流向生产。\n[GetTaxFrame]"
 Trade_TITLE: "§Y对外贸易§!"
 Trade_DESC: "外部结算体系关乎物资生命线。限制短期资本流动，优先保障粮食与药品进口，避免复苏被外部波动吞噬。\n[GetTradeFrame]"
 completed: "状态:§G已完成§!"
 uncompleted: "状态:§R未完成§!"