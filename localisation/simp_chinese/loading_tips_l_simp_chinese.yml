l_simp_chinese:
 LOADING_TIP_0: "“我好爱这世界！”我热泪盈眶地想。注视着天空，天空慢慢改变，渐渐变成了青色。好想褪去自己的衣裳。就在这时候，树叶、草变得透明，已看不见它们的美丽，轻轻触摸草地。好想美丽地活下去。\n——太宰治《女生徒》"
 LOADING_TIP_1: "我装作老成，人人就传言我老成。我假装是个懒汉，人人就谣传我是懒惰虫。我假装不会写小说，人们就谣传我不会写。然而，当我真的痛苦万分，不停呻吟时，人人却认为我在无病呻吟。总是格格不入。——太宰治《斜阳》"
 LOADING_TIP_2: "在同样的灾祸和同样的不详之火的命运之下，金阁和我所居住的世界处于同一水平线上。和我脆弱、丑陋的肉体一样，金阁虽然很坚固，但也具有易燃的木炭般的肉体。\n——三岛由纪夫《金阁寺》"
 LOADING_TIP_3: "待岛村站稳了脚跟，抬头望去，银河好像哗啦一声，向他的心坎上倾泻了下来。\n——川端康成《雪国》"
 LOADING_TIP_4: "穿过县境长长的隧道，便是雪国。夜空之下，大地赫然一片莹白。\n——川端康成《雪国》"
 LOADING_TIP_5: "自由在有些国家是一种普通的幸福，就像天空一样宽广，像空气一样常见。而在这里，情况完全不同，自由可能与巨大的痛苦，明显的奴役联系在一起，自由在其中显得更为高贵而开放。\n——埃德蒙·伯克"
 LOADING_TIP_6: "我们要寻找的梦存在于童年，它们短暂、清晰、情节连贯、易于理解，不会产生歧义，但的确是一场梦。\n——西格蒙特·弗洛伊德《精神分析引论》"
 LOADING_TIP_7: "这场革命远未结束，但是在过去数十年间取得的成就却是两千五百多年间倡导仁义道德的儒家与慈悲为怀的佛家所没有想到的，我们不能称之为巨大的进步吗？\n——胡适"
 LOADING_TIP_8: "连改变别人的念头都不要有。要像太阳一样，只是发出光热；每个人接收阳光的反应有所不同，有人觉得刺眼，有人觉得温暖，有人甚至躲开阳光。\n——卡尔·荣格"
 LOADING_TIP_9: "没有人喜欢武装的传教士；天性和谨慎的首要忠告就是把他们当作敌人赶走。\n——马克西米连·罗伯斯庇尔"
 LOADING_TIP_10: "；重建将人类与其创造者和同胞紧密相连的不朽契约，去除那些带来无限恐惧、怀疑、残忍、自私、憎恨、贪婪的压迫制度的根源。\n——马克西米连·罗伯斯庇尔"
 LOADING_TIP_11: "我曾经跟日本朋友谈过。他们说，很对不起，日本皇军侵略了中国。我说：不！没有你们皇军侵略大半个中国，中国人民就不能团结起来对付你们，中国共产党就夺取不了政权！\n——毛泽东"
 LOADING_TIP_12: "我才不怕打哩，一听打仗我就高兴，北京算什么打？无非冷兵器，开了几枪。四川才算打，双方都有几万人，有枪有炮，听说还有无线电。\n——毛泽东"
 LOADING_TIP_13: "孤独可产生若干崇高的幻觉。这象是从燃烧的荆棘中发出来的轻烟。精神上产生一阵神秘的震撼，可以使一个学者有先见之明，使一个诗人变成先知。\n——维克多·雨果《海上劳工》"
 LOADING_TIP_14: "人们不应该为了行善而作恶，推翻王位不是为了永久竖起断头台，打翻王冠，但要放过脑袋。\n——维克多·雨果《九三年》"
 LOADING_TIP_15: "宇宙在爆裂，每个微粒彼此远离，我们被抛入黑暗与寂寞的空间，把我们永远地撕开……胎儿离开母体，朋友和朋友分别，每个人彼此分离，踏上自己的道路，迈向孤独死亡的目标。\n——丹尼斯·凯斯《献给阿尔吉侬的花束》"
 LOADING_TIP_16: "你想当个成年人，但你的身体里还躲着一个孤独惊恐的孩子。\n——丹尼斯·凯斯《献给阿尔吉侬的花束》"
 LOADING_TIP_17: "失去自由对它似乎都无所谓，这个高贵的躯体应有尽有，不仅带着利爪，而且连自由好像也带在身边，自由似乎就藏在它利齿的某个地方。\n——弗朗茨·卡夫卡《饥饿表演》"
 LOADING_TIP_18: "暴政变得更加隐秘，披上了工业甚至慈善的伪装。自由也变得与以往有所不同，虽是不能改变的永恒原则，却呈现出新的面貌，或许又只是展现了更深刻的意义。\n——伍德罗·威尔逊"
 LOADING_TIP_19: "他人即地狱。\n——让·保罗·萨特"
 LOADING_TIP_20: "在这个科学进步的时代，人类的命运居然寄托在这样一个精神不正常的人的异想天开上，比我们大肆批评的君主专制时代尤甚，这真是人类历史上最不同寻常的事件。\n——斯蒂芬·罗伯茨《希特勒建造的帝国》"
 LOADING_TIP_21: "比起小说，你有趣得多。\n————太宰治致山崎富荣，在玉川上水前"
 LOADING_TIP_22: "通常情况下，选择献身艺术的人，都曾自视与众不同。然而他很快会发现，自己的艺术、自己的与众不同，往往就扎根在与所有人的相似中。\n——阿尔贝·加缪《写作的光荣》"
 LOADING_TIP_23: "拥有武装的先知都胜利了，没有武装的先知都灭亡了。\n——尼科洛·马基雅维利《君主论》"
 LOADING_TIP_24: "我有意避开这些话题，是为了一个更重要的目标——使人类相信知识的价值。这里的知识并不是能快速达到实际目的的专业知识，而是一种具有共性的理解，一种真知灼见。\n——亚历山大·米克尔约翰"
 LOADING_TIP_25: "六朝何事，只成门户私计。\n——陈亮《念奴娇·登多景楼》"
 LOADING_TIP_26: "在历史急剧转变的关头，往往连先进的政党也会在较长的一段时间内不能适应新的形势而重复旧的口号。这种口号在昨天是正确的，今天却已经失去任何意义，而且失去得如此“突然”，就像历史的急剧转变来得如此“突然”一样。——弗拉基米尔·列宁"
 LOADING_TIP_27: "这个时代的奇迹就是，你们发现了我，这茫茫人海中的一个无名小卒。\n——阿道夫·希特勒"
 LOADING_TIP_28: "无论是用暴力还是用其他方法，它们在驯服中前行，任人摆布。\n——路易·阿尔都塞"
 LOADING_TIP_29: "人类必然会疯癫到这种地步，既不疯癫也只是另一种形式的疯癫。\n————米歇尔·福柯"
 LOADING_TIP_30: "你给乞丐一些救助，你就是有美德的吗？你是否曾想过，为什么一开始会有乞丐存在呢？你剥削别人，然后创造出乞丐，之后你只给予了一小部份——然后你就成了最有美德的人。\n——弗里德里希·尼采"
 LOADING_TIP_31: "要创造出一个没有主人的世界。\n——西蒙娜·德·波伏娃《第二性》"
 LOADING_TIP_32: "他们把天空的颜色称为‘蓝’，但我看见它时，感受到的是沉默、深渊和未完成的祈祷。\n——玛琳娜·茨维塔耶娃"

