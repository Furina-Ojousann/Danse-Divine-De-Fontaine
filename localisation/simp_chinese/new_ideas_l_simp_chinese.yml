 french_industrial_guide: "枫丹工业指引"
 french_industrial_guide_desc: "枫丹无论是生产线的先进程度，还是工厂管理的制度，都远远领先于我们，因此来自枫丹的技术指引为我们的生产提供了很大的帮助。"
 the_success_of_kai_shek_s_plan: "苦撑待变策略的成功"
 the_success_of_kai_shek_s_plan_desc: "蒋介石认为，单靠中国人的力量是无法打赢这场战争的，想要彻底驱逐日本势力，必须依赖英美世界的援助。中国曾在绥靖政策中陷入孤立之中，绝望地苦苦挣扎，但现在这条道路终于看到了胜利的希望。"
 national_emergency_law: "紧急状态"
 FRA_Fontaine_Energy_Engineering_Science_Research_Institute_dynamic_modifier: "枫丹动能工程科学研究院"
 FRA_Fontaine_Energy_Engineering_Science_Research_Institute_dynamic_modifier_desc: "简称§Y枫丹科学院§!，虽然全名中强调动能工程，但枫丹科学院的性质更接近一所综合性的研究所，从内燃机到原子能，没有一个领域不在它的研究范围之内。\n\n§Y如果你获得了这个动态修正，恭喜你，游戏已经接近结束了。§!"
 FAMH_improved: "FAMH"
 FAMH_improved_desc: "这家公司的正式名称是海洋锻造与钢铁公司，一般简称为“圣沙蒙德”。主要的业务便是炼钢。"
 FRA_capital_of_FEESRI_modifier: "枫丹科学院总部所在地"
 FRA_capital_of_FEESRI_modifier_desc: "庞大的科学院占用了当地大量的资源和劳动力，但也为当地的建设提供了便利。"
 FRA_Marianne_modifier: "§B自由§! §W平等§! §R博爱§!"
 liberal_radicalism: "自由激进主义"
 liberal_radicalism_desc: "自由激进主义试图在自由主义核心价值的基础上，进行更深层次的民主化与社会改革。它不仅强调言论自由、法治与宪政，更呼吁对经济权力的民主监督，推动财富再分配、教育平权与公共服务体系的建立。在这一思想中，自由不是“市场无干预”的结果，而是国家积极创造的条件。\n\n自由激进派认为，形式上的自由必须辅以实质上的平等才能真正落实。因此，他们主张对垄断资本征税、拆分大型企业、加强工会权力，并以国家手段保障基本生存权。这一立场常被批评为“温和社会主义”或“妥协改革主义”，但其支持者则视其为在自由与公平之间取得平衡的实践路径。\n\n从更左翼的批判角度看，自由激进主义仍未触及生产关系的根本问题，无法真正解决阶级剥削与结构性不平等。然而，它常常成为阶级妥协时期的主导话语，是资本主义自我调节机制的重要体现。"
