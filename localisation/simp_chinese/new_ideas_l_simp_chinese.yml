 sia_strengthen_Thailand_nationalism: "强化泰人观念"
 sia_strengthen_Thailand_nationalism_desc: "必须认识到这一点，我们的国家是泰人的国家，其他少数民族永远不能与泰人具备相同的地位。这是一张精致的民族牌——排挤不到人口10%的少数民族，便团结了其余90%的泰人。"
 sia_royal_capital_4: "皇室资产持有"
 sia_royal_capital_4_desc: "皇室百年来积攒的巨大财富若是一直封存而无用武之地，那就太可惜了，我们将会说服国王将这笔资产用于投资——换取更高额的回报，如战争胜利，如国土扩张，如稳定国家。"
 alg_colons: "黑脚"
 alg_isolation_but_equality: "[FRA.GetName]的宠儿"
 alg_isolation_but_equality_desc: "地中海南岸，与南法隔海相望的阿尔及利亚被视作是[FRA.GetName]的第二本土，因此在殖民政策上对这片土地多有倾斜。为了防止本地的土著民族激烈反抗，殖民政府刻意实施温和同化的政策，尊重他们的宗教信仰与生活习性。这对民族意识还在朦胧之中的阿尔及利亚各民族起到了很好的效果，但“民族”这个词汇，会在不断受教育的过程中缓慢觉醒。"
 isr_grave_of_millennial_wanderers: "迦南地"
 isr_grave_of_millennial_wanderers_desc: "是的，地中海东岸，约旦河之西，那便是世上水草最为丰美之新月沃土地，首领千年以前带领我们来到的迦南。尽管历经无望无际流浪之凄苦，世世代代低贱之偏见，我们最终回到这片应许之地。无论面对何种苦难，犹太民族再也不会离开家园。"
 isr_kibbutz: "基布兹"
 isr_kibbutz_desc: "与苏联的集体农庄类似，以色列存在农民们自发形成的农业协作组织，这些基层组织被称为“基布兹”。得益于高度组织化的劳动形式，巴勒斯坦珍贵的土地资源得到了充分的利用：土地精耕细作，先进的农业技术也更加易于普及。基布兹的居民没有私有财产，通过虔诚的犹太教信仰维系秩序，而共同劳作在心理层面上建立人际间的牢固连结，强化以色列人对土地与民族的认同感。"
 fra_r_labour_law_version_1: "强力劳动法修正案"
 fra_r_labour_law_version_1_desc: "尽管在国民以后受到了巨大压力，共和国依然成功通过了这部划时代意义的《<劳动法>修正案》。这部修正案规定了不分种族，不分性别的40小时工作周制度，一年至少一个月的带薪休假以及各类强制性的社会保险，最低工资提高了25%，不同产业的涨薪幅度有所不同。经济学家普遍认为，得益于工资的普遍上涨，基于消费的新一波需求扩张即将到来。"
 fra_r_labour_law_version_2: "一般劳动法修正案"
 fra_r_labour_law_version_2_desc: "这部修正案是国民议会妥协的产物，规定了40小时工作周制度以及一年两周的带薪休假，原则上政府鼓励企业给员工购买社会保险，然而仅限于书面功夫而已。企业和工会都对这份妥协案心存不满，但至少劳动者的确得到了更多的休息时间和更高的工资。"
 fra_r_labour_law_version_3: "象征性劳动法修正案"
 fra_r_labour_law_version_3_desc: "工人们对这部法案感到愤怒，因为这点微不足道的改善无异于敷衍，即使最基本的诉求——40小时工作周都没能得到通过。而企业家也并没有对此感到满意，因为上涨的10%工资依旧需要他们来负担。"
 mng_the_heart: "...与冰冷的心"
 mng_the_heart_desc: "后来，为这座城市提供源源不断寄养的心脏，被粗暴地摘取，马格尼托格尔斯克陷入孤立无援之中。若没有组织与原料，再新鲜的器官也仅有腐烂的命运。后来秩序如约而至，可到来的却不是苏维埃，而是来自德国的军工寡头。\n\n干部们被驱散了，工人们却留了下来，满心惊恐地看着印着铁十字的军队封死逃离这里的每一个出口。一个号称是总裁的人成了这里的头，他说所有人应该保持冷静，因为这里已经处于军队的保护之下，而生产将马上恢复。"
 mng_the_iron: "炽热的钢铁之城..."
 mng_the_iron_desc: "马格尼托格尔斯克曾是苏联五年计划最为骄傲的明珠。它从荒原中拔地而起，钢铁浇筑起这座城市的骨架，而涌入的工人与干部则成为这座城市中流动的血液，最终孕育出工业的硕果。"
