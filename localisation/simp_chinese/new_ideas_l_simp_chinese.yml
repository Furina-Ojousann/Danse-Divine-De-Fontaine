 woman_rights: "性别权利"
 patriarchy: "传统父权"
 patriarchy_desc: "社会的自然秩序建立在男女的职责分工之上。男人保家卫国，女人养育后代。这不仅是文化传统，更是维系国家稳定的根本。"
 limit_woman_rights: "有限女权"
 limit_woman_rights_desc: "女性可以在特定条件下参与社会生活，但她们的角色仍应服从于传统价值与国家利益。她们不是个体，而是民族与家庭的延伸。"
 equality_in_law: "法律平等"
 equality_in_law_desc: "国家不应以性别划分权利，女性与男性一样，是国家的公民、工人与战士。这并非仁慈，而是正义。"
 total_equality: "积极平权"
 total_equality_desc: "在长期压迫之后，仅靠形式上的平等无法弥补现实的不公。我们必须在制度层面赋权女性，以打破结构性束缚，实现真正解放。"
 total_equality_tt: "§R禁用女性劳工决议§!——女性劳动力已被充分动员"

 economy_model: "经济模式"
 feudalism: "封建经济"
 feudalism_desc: "以土地为主要生产资料，资源归属基于血缘与特权而非市场或法治。生产依赖于人身依附关系，技术更新缓慢，税收高度依赖贵族与地方势力的忠诚。"
 liberal_market: "自由市场资本主义"
 liberal_market_desc: "强调私有产权、契约自由与市场自发调节。国家退居幕后，主要维持法律秩序与货币稳定。在繁荣时期效率极高，但对危机与失业调控能力有限。"
 state_monopoly_capitalism: "国家垄断资本主义"
 state_monopoly_capitalism_desc: "政府与大型企业联盟，共同主导经济资源分配。形式上保留市场机制，实质上由国家设定优先级，集中力量推进工业化与扩张。法团主义即此变体之一，只是在意识形态上更强调“阶级协调”。"
 planned_economy: "计划经济"
 planned_economy_desc: "废除私有制，生产资料归国家所有，所有经济活动遵照中央制定的计划进行。在动员资源与战时生产方面极具效率，但牺牲了个体选择与市场信号。"
 anarchism_economy: "公社经济"
 anarchism_economy_desc: "建立在自愿互助与水平协作基础上的非国家经济模式。生产资料由社区直接掌控，决策通过集体协商进行，强调直接民主与彻底的去等级化。"
 
 national_policy: "民族政策"
 extreme_nationalism: "极端民族主义"
 extreme_nationalism_desc: "民族不仅是一种文化认同，更是至高无上的政治合法性来源。国家存在的目的，是为了捍卫本民族的纯洁性、历史使命与生存空间。所有非本族群体，不是服从就是威胁。"
 nationalism_policy: "实用民族主义"
 nationalism_policy_desc: "国家利益高于一切，民族身份只是动员资源与团结内部的工具。我们不是为了血统而战，而是为了主权、秩序与可控的安全边界。"
 comprehensive: "开放包容"
 comprehensive_desc: "国族是一种想象的共同体，它并不局限于出身，而关乎认同与参与。我们的国家欢迎所有愿意守法、公正与自由的人，无论他们的血统如何。"
 internationalism_policy: "国际主义"
 internationalism_policy_desc: "民族只是历史阶段中的暂时性构造，真正的正义应跨越国界。我们与世界上所有被压迫、被剥削者团结一致，共同争取解放。"

