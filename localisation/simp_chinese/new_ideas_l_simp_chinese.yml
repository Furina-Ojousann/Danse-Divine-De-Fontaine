 FRA_strike_area: "罢工"
 FRA_strike_area_desc: "该地区的工人们大部分选择了响应共产党的号召而罢工，因此各项生产工作无法得到正常的开展。"

 fra_whole_nation_strike: "全国总罢工"
 fra_whole_nation_strike_desc: "先进生产力还是即将被裁掉的百万漕工？的确是一个值得思索的问题。但有一个道理是肯定的，那就是人如果失去了经济来源，又缺乏社会的接济，那么唯一可行的办法就是起来反抗，对于还留在工作岗位上的工人来说，这种方式就是罢工。现在，失业的人也在罢工队伍当中，不知何时，他们会采取进一步的行动。"
 fight_until_death: "斗争不止"
 fra_Chaotic_organization: "组织混乱"
 fra_country_of_laborers: "热情洋溢"
 fra_short_of_consum: "缺衣少食"
 fra_short_of_consum_desc: "起义后大量人口的涌入使得北部地区的土地严重超载，尽管北部的平原原本就是枫丹的主要农业产区之一，但其产量暂时还无法供应如此多的人口。"
 fra_supply_issue: "供应危机"
 fra_supply_issue_desc: "缺乏物资的问题还在不断恶化，尽管公社为了渡过难关已经采取了以工人，军队为先的配给制。但每人每日可以的得到的份额还是在不断减少。"
 fra_run_out_everything: "弹尽粮绝"
 fra_run_out_everything_desc: "现在的物资存量连配给制都难以维持了......"
 fra_furina_s_hand_frc: "水神护佑"
 fra_furina_s_hand_frc_desc: "尽管遭到国民议会的强烈反对，但芙宁娜还是决意继续控制枫丹北部，也就是公社控制区的天气，使其继续保持宜人的气候。"
 FRA_the_red_army: "工农红军"
 FRA_the_red_army_desc: "勇气与热情是红军的武器，而理想则是红军的目标，如此精神当然可嘉，可军事素质并非空有热忱便可补足的。"
 fra_the_last_strike: "最后一击"
 fra_the_last_strike_desc: "党已抽调了一切的力量进行内战的最后一击\n§R如果未能在此buff失效前结束内战，将会失去150政治点数以及5%战争支持度。§!"
 fra_continue_philosophy_education: "进行中的哲学教育"
 fra_continue_philosophy_education_desc: "在往日的教育体系中，哲学往往是最被忽视的，因为它并非一门谋生的技能，而普通人都需要为生活奔走，并无闲情逸致研究哲学，因而不需要担忧经济问题，也有更多闲暇的贵族们垄断了哲学，而他们的成果有两个，第一个作为以启蒙思想家为代表的迎合时代发展的理论基石，而另一个就是以东方哲学为首的，教导底层不要反抗的哲学。\n前者在历史上当然是值得肯定的，但在资本主义制度稳定以后，后者的占比就越来越大了，那真是可怕，现在，广大的人民群众要把哲学从资产阶级手里夺走，当作是反击这种趋势的武器。"
