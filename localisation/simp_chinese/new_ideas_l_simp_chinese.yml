 fra_military_police_force: "秩序之源"
 fra_military_police_force_desc: "其它国家，无论是所谓披着民主表皮或是明面专制的国家，他们的统治术低幼得让人发笑。以为拿枪口堵住民众的嘴，再把他们扔进集中营里劳动就能控制住他们——大错特错，枫丹将证明相比于直接奴役，驯化会是更好的选择。"
