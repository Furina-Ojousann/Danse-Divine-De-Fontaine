 fra_country_anti_communist: "全国反共宣传"
 fra_country_anti_communist_desc: "我们必须要让每一个农民，每一个不识字的工人明白共产党的主张有多可怕。他们是莫斯科的傀儡，新的罗伯斯庇尔，巴黎的列宁，会把法兰西变成犹太人的乐园......"
 guided_democracy: "指导式民主"
 guided_democracy_desc: "指导式民主，又称“主权民主”或“控制型民主”，是一种制度性民主外观之下的高度集权政体。它保留了多党制、选举、宪法与议会等现代政治形式，但这些形式的运作被有意限制、操控、引导，以确保权力的集中与体制稳定。在指导式民主中，民主被定义为一种工具性的、国家主导的过程，而非由社会自由竞争产生的政治结果。选举存在，但候选人和议题受到严格管理；媒体运行，但主要由国家或亲政权力量控制；法律体系维持形式独立，但关键司法机关在政治控制之下。这一体制强调“国家优先于个体”、“稳定重于自由”、“主权高于普世”。指导式民主一般将国家描述为历史上的受害者与复兴者，强调民族认同、历史使命、地缘对抗；不再以制度设计或自由辩论作为正当性来源，而是强调领导者与人民的直接情感连结；对混乱的恐惧与对秩序的崇拜：将九十年代的剧变与社会崩溃作为负面教材，主张通过集权来“预防民主带来的分裂与软弱”；“可控反对派”机制：允许受控反对派存在，以制造制度活力的表象，但实际封锁真正的制度竞争与权力替代。因此，指导式民主的实质是一种“由政权操控的民主剧场”，它保留民主的壳，剥离其冲突性与不确定性，试图将“选举→唯一结果”固化为制度路径，以维持长期政权延续而非权力轮替。"
 fra_right_wing_strike: "总罢工"
 fra_right_wing_strike_desc: "国际共运历史上又将记载一件浓墨重彩的大事——1936年枫丹罢工。这场罢工规模的恐怖程度空前绝后，得益于枫丹国内强大的工会组织和共产党发展，几乎所有参与罢工的工人都保持了良好的纪律。来自苏联的地下物资供给他们只静坐，不上工，不当工贼，不服兵役。如此良好的组织，大有发展为革命的趋势。"
 fra_martial_law: "戒严"
 fra_martial_law_desc: "我们的“必要之恶”。"
 CHI_He_Umezu_Agreement_tt: "§R禁止中央军进入河北地界§!"
 CHI_He_Umezu_Agreement: "何梅协定"
 CHI_He_Umezu_Agreement_desc: "就解决河北事件问题，1935年6月9日日本中国驻屯军司令官梅津美治郎向国民政府军事委员会北平分会代理委员长何应钦提出梅津致何应钦备忘录初案，6月11日又向何应钦提交备忘录（日文为“觉书”）正式文本，备忘录内容构成对中国主权侵害。"
 fra_martial_law_further: "延长戒严"
 fra_martial_law_further_desc: "很显然，先前叛乱地区的秩序还没有完全恢复，一些痴心妄想的死硬派共产党还在试图通过游击战损害祖国的财产...非常有必要给他们上一课。"
 fra_collapse_of_grand_narrative: "消解的宏大叙事"
 fra_collapse_of_grand_narrative_desc: "贯穿阿蕾奇诺政府行为模式的是冷冰冰的工具理性，它尖锐，苦涩而无一点温度，也算是二十世纪这个意识形态集体狂热的年代中的特殊案例。她自认为亲手建立了一套完美的国家机器，只要对这些温顺的被统治对象稍加抚慰，加之与粉碎反抗的暴力，便可将其彻底驯服。\n\n她说错了吗？没有。共产主义就算还在某个阴暗潮湿的下水道里苟活着，也永远无关紧要了。她牺牲了依赖价值理性的意识形态动员力。在民族，国家与荣耀等话语体系全然失效，失语症俨然成为了群众被动的集体症候......\n\n§R那又如何？枫丹只要稳定就好了。§!"
 fra_reenchantment: "复魅"
 fra_reenchantment_desc: "没有宏大叙事，就很难有大规模的纲领留存于世间。这扼杀了左翼的生存空间，却依然不是稳定的完美形态——它应该存在一种“可控的失控”。不需要所有公民缄口不言，没有情绪——不，可以有，而且这种情绪值得鼓励。可以大骂阿蕾奇诺是个混蛋——没关系，阿蕾奇诺很宽容。但烧毁报刊亭和投放恐慌信息，绝对是重罪。\n\n§R以为无言就能完成你所期待的反抗了吗？呵呵...真是傻得可爱呢。§!"
 FRA_her_gentle_yoke: "牧羊人温和的轭"
 FRA_her_gentle_FRA_her_gentle_yoke_tt: "§3国民福利体系§! - §t帝政体系§!\n\n"
 FRA_her_gentle_yoke_desc: "神勒令我们工作 难道却不给光明吗 我痴痴地问道 但是“忍耐”想要阻止这些喃语 就马上回答 神并不需要人工或人自己的才赋 谁能最好地承受他温和的轭 就侍奉得他最好\n                       ——弥尔顿《十四行诗之十九》\n\n擅长支配者，其手段从非暴政鞭挞。实际上，温柔才是最高形式的支配...不是枷锁，是一只手放在你肩上，柔婉而沉重。你无法挣脱，又不忍挣脱。已经分不清是被管控，还是被安慰。\n\n§r你只是……顺着阿蕾奇诺走了下去。§!"
 furinaism: "新芙宁娜主义"
 furinaism_desc: "冠以新女皇之名的“新芙宁娜主义”，并不是一种意识形态，而是一整套以“管理”为核心的政治-经济技术。它参考波拿巴主义的结构模板，却更像罗斯福新政的工具理性版本：脱离信仰、纲领与愿景，仅追求一个目标——稳定。\n\n传统威权依赖三件古老的法宝：军队、警察、监狱。但镇压从来无法终结反抗，只会将它染上一层“正义”光环，使体制愈发脆弱。而“新芙宁娜主义”正是为了破解这个悖论——通过“非意识形态的意识形态控制”，彻底铲除反叛的土壤。\n\n它不是通过灌输理念来掌控你，而是诱导你认同一套逻辑：你没有被剥夺自由，只是出于理性选择了服从。不必封口，无需锁链——只需让群众在自由中自愿服从，在稳定中放弃思考。一切过激行为都不会被视作“罪恶”，只会被温柔地矫正，直到每个人都能微笑着接受项圈。\n\n这个体系的本质是：去意识形态化的工具理性。在这个世界，总有一些“自然规律”无法被反抗，比如重力、死亡、还有技术管理。政体可能变化，思想可能革命，但热力学第二定律不会。新芙宁娜主义相信，治理也可以遵循这样的“技术理性”。\n\n于是，一个没有“理想”的国家机器被建造出来。它不承诺乌托邦，也不创造民族精神，它只是流畅、安静地运转。它的统治逻辑，不来自信仰或忠诚，而来自对“无意义世界”最合适的回应方式。\n\n这正是新芙宁娜主义的核心：用理性填补真空，用驯服替代热情，用秩序抹平一切意义的波澜。"
 fra_wartime_equality: "战时平权"
 fra_wartime_equality_desc: "死守男外女内的观念毫无意义。女性已被证明她们不止可以胜任工厂里的劳动，还可以与男性一样投入战斗——直接在前线，不仅限于后勤，医疗或是侦察。"
