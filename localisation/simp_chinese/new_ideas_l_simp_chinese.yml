 ire_victory_from_england: "大卫王"
 ire_victory_from_england_desc: "如同圣经中记载，英爱这对大卫与歌利亚，最终还是以大卫的大获全胜告终。收复全岛的爱尔兰人放下矛盾，共同拥护带来胜利的政府。"
 generic_anarchy: "无政府状态"
 generic_war_of_resistence: "卫国战争"
 generic_war_of_resistence_desc: "以往的世界大战在阶级分析的眼中，往往只是资产阶级将人命当作赌博的筹码，进行利益纷争的一种形式。即使战争胜利，成功的果实也只被资产阶级独享，普通的战争参与者只能得到裁军，通货紧缩以及人际离散。而失败的后果更为苦涩，战败的代价要全体无产阶级共同承担，而挑起战争的资产阶级依然高高在上，陷入一种被国内和国际资本双重压迫的境地。\n\n然而苏联是当今世界唯一幸存的社会主义国度，那么军人拿起枪的目的便不再是参与毫无意义的纷争，而是保卫属于自己的民主——平等地使用生产资料，参与劳动，差额选举的权利。实际上，这比任何基于民族主义视角的战争宣传都更加有效。一个虚幻的想象共同体的所谓共同利益，无论如何都无法与切身体会的权利相提并论。"
 fra_rhine_customs_union: "莱茵关税同盟 - 成员国"
 fra_rhine_customs_union_leader: "莱茵关税同盟 - 主导国"
 pap_furina_s_higher: "圣座高于世人，枫丹高于圣座"
 pap_furina_s_higher_desc: "芙宁娜的出现让以上帝为核心的一神体系，准确来说是整个宗教世界遭到了极大的冲击，因为世界上尽管会冒出来许多圣人，先知，却从未有现身于世人面前的神。教宗安坐在梵蒂冈城郭内受意大利保护时，还可以矢口否认，说芙宁娜不过嘲弄世人，冒充神明的凡人。可如今整个教廷笼罩在枫丹的阴影下，没有分崩离析，只靠枫丹的仁慈而存续。"
 afterwar_restoration: "战后恢复"
 fra_antiwar_movement: "反战活动"
 fra_antiwar_movement_desc: "共产主义者将这场战争视作是一战的重演，其性质为帝国主义之间争夺殖民利益的战争，而无产阶级不因为此而死。他们在后方的工厂里组织静坐罢工，并且进行了广泛的反战宣传。"
