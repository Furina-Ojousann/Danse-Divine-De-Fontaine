 fra_new_industiral_cartel: "崛起的工业卡特尔"
 fra_spring_of_manufacturing: "产业繁荣"
 FRA_land_stragegy: "陆军战略"
 FRA_land_stragegy_defense: "防御战略"
 FRA_land_stragegy_aggressive: "进攻战略"
 fra_french_tank_industry_1: "坦克工业"
 fra_french_mech: "陆军机械化"
 fra_control_the_europe: "制霸欧陆"
 fra_fascist_patriotism: "法兰西爱国主义"
 fra_health_of_soldier: "战时人道"
 fra_health_of_soldier_desc: "如果不是一战战壕中极尽糟糕的卫生状况，也许我们的上一代男儿死伤就不会如此惨重了。尽管上一代保守派军官们从不把士兵当作活生生的人来看待，进步的科学已然证明了卫生和心理健康对于一个士兵的重要性。我们不能再让士兵们在战壕中忍受不必要的痛苦了。即使是很小的改观，比如及时的包扎，干净的饮水，甚至是一块巧克力，都能让士兵们得到极大的鼓励。"
 fra_resistance_without_support: "离心抵抗"
 fra_resistance_without_support_desc: "我们的抵抗显得迂腐而毫无意义，多数人认为枫丹革命已经是大势所趋，继续抵抗不过是末路疯狂。"
 precise_dessert_chef: "精确无比甜点师"
 precise_dessert_chef_desc: "§L雇佣不需要政治点数！甜点无限供应是一件开心的事情（笑）§!"
 fra_soviet_support: "苏联支持"
 fra_puppet_of_french: "完全独立？"
 fra_puppet_of_french_desc: "我们国家的经济依然受到前宗主国的控制，这严重制约了我们本身的发展。"
 fra_export_fuel_first: "燃油优先出口"
 fra_export_fuel_first_desc: "考虑到近期石油探勘成果不小，国内燃油富集严重。不如将多余的燃油用于出口以换取经济利润。"
 fra_offer_fuel_for_army_first: "燃油优先供军"
 fra_offer_fuel_for_army_first_desc: "在世界局势紧张的情况下，燃油应该优先供给坦克飞机与军舰，国内需求可以暂且搁置。"
 fra_world_interest: "世界利益"
 fra_world_interest_desc: "我们的世界利益不可被动荡的局势所撼动，切忌迟疑，唯有迅速采取行动。"
 fra_communist_party_active: "共产党活动增加"
 CHI_rise_of_democracy: "古老的国家，崭新的民主"
 CHI_rise_of_democracy_desc: "仅仅是世纪初，中国还是世界上最为封建落后的国家。如今全新的民主制度能在这片土壤上建立，堪称二十世纪最大的戏剧性反转，同时亦是中国历史的前所未有。\n\n当然，完全摆脱千年专制史还需要一段时间。在共产党这股先进力量的带领下，民智可开而民主可立。"
 CHI_immature_army: "艰苦却坚毅"
 CHI_immature_army_desc: "军队的建设并非一朝一夕可以完成。尽管全中国都找不出几个有能力的装甲教官，但仅靠简陋的步枪，和一颗敢于为人民解放献身的心，便已经远超过往派系林立而腐败丛生的国军了。"
 fra_support_of_nationalist_capitalist: "另一个春天"
 fra_support_of_nationalist_capitalist_desc: "民族资产阶级在半个世纪以来总是只能在夹缝中求得生存。前清吏治腐败，民国巧取豪夺，回首一顾，只能发现现在便是发展的春天。"
 convertion_socialist: "过渡路线"
 convertion_socialist_desc: "在党完成了新民主主义革命，推翻封建主义，帝国主义与官僚资本主义三座大山的历史任务以后，将我国由建成的新民主主义社会逐渐过渡到社会主义社会成为了新的主要任务，被称作过渡时期总路线。而党在过渡时期的主要任务，分城市与农村来讲，是实现公私合营与农业合作化。\n\n国家的民族资产阶级固然具有其阶级局限性，然而其在革命历程中做出了不可或缺的贡献，直接夺取生产资料实际上是否定了党前三十年的路线，因而通过赎买股份来确立公有制经济是党的主要手段。\n\n再把目光回到我们赖以生存的广大农村。土地改革的确解放了农村生产力，然而地主阶级的复辟速度远超想象，因而遏制地主复辟，逐步完成合作化是过渡时期党在农村的主要任务。\n\n党自进入武装夺取政权的历史阶段以来，工作重心从来都在农村，经济战线上的斗争缺乏经验，也少有擅长经济工作的党员。计划用十年到十五年的时间，培养党员的工作经验，建设社会主义社会的物质基础，从而成为真正的社会主义国家。\n\n“从中华人民共和国成立，到社会主义改造基本完成，这是一个过渡时期。党在这个过渡时期的总路线和总任务，是要在一个相当长的时期内，基本上实现国家工业化和对农业、手工业、资本主义工商业的社会主义改造。这条总路线， 应是照耀我们各项工作的灯塔， 各项工作离开它，就要犯右倾或“左”倾的错误。”\n\n——毛泽东《党在过渡时期的总路线》"
 fra_500_consumpution_agreement: "五百项协定"
 fra_500_consumpution_agreement_desc: "通过与中共的条约，我们将在内战期间给予一切可能的帮助，并承认其国际地位。而获得的则是与其贸易的五百种商品的优惠，涵盖了绝大多数的战略资源与轻工业产品，我们绝大多数的机器，武器也能轻松销售至中国市场。"
 CHI_guangzhou_government_reform: "形同有异"
 CHI_guangzhou_government_reform_desc: "“吾之败，吾党之败。”\n——张静江\n\n我们需要反思为何共产匪患屡除不绝，尽管南京方面已然采取雷霆手段，但赤化之进程似乎有增无减。归根结底，是国民革命之败以致吏治腐败，官僚巧取豪夺，才官逼民反。以往弹压下去一个井冈山，今天致力镇压陕北，明日赤匪又不知流窜何处，且总有民众支持。解决赤匪的根本方法并非以刀兵相见，而是摧毁他们存在的基础——穷苦农民和劳苦工人。土地改革与工会立法，看似是与赤匪形同无异，其实才是对付他们的最好办法。"

 CHI_new_national_revolution: "新的国民革命"
 CHI_new_national_revolution_desc: "1925年，第一次国民革命便从广州出发，一路打得旧军阀抱头鼠窜，不过两年便分崩离析。而这次南京政权在腐朽程度上只比吴佩孚之流有增无减，是时候再次北伐了。"
 
 agrarianism: "农业主义"
 agrarianism_desc: "农业主义是一种社会和政治哲学，倡导农村发展、农村农业生活方式、家庭农业、广泛的财产所有权和政治分权。农业主义者往往重视当地社区的传统形式，而不是城市的现代性。农业政党有时旨在支持小农和贫穷农民的权利和可持续性，以对抗社会上的富人、有权势和名人。"

 CHI_constitution_preparation: "宪政准备"
 CHI_constitution_preparation_desc: "《中华民国宪法》颁布以后，将举行第一次全民选举！"
 CHI_constitution_of_chinese_republic: "中华民国宪法"

 fra_forgein_laboror: "外来劳工"
 fra_forgein_laboror_desc: "一艘又一艘移民船从世界各地前往西欧。他们有不同的面孔，不论焦黑，土黄或是麦色，共同的特点是身无分文。\n\n彼岸对于他们来说是什么？是有别于家乡封闭落后的自由吗？也许并非如此。微薄的工资要寄回给家人，以坚硬的黑面包为食。即便同一屋檐下的工人同志，也常被“外来移民拉低了你们的工资”之谎言所缚，对其怒目相视，甚至拳脚相加。而真正的主谋则在办公桌前乐见其成。\n\n从宏观的角度来看，外来移民百益无害。低工资高产出，而新移民，也是可以消费的。"

 CAN_conscription_crisis_worse: "魁北克危机"

 fra_quebec_war_que: "魁北克对峙"
 fra_quebec_war_can: "魁北克对峙"

 fra_quebec_collapse: "抗争终幕"
 fra_quebec_collapse_desc: "尽管[FRA.GetName]的儿女前赴后继，拼尽全力，抗争依然失败。这只是世界一个不起眼的角落，而他们的殖民帝国依然遍布全球，太阳终日可见，然而在此地的败退似乎昭示着这个庞大的殖民帝国的最终命运。"

 fra_french_state: "法裔国家"

 french_navy_republic: "法兰西共和海军"
 french_navy_nationalist: "法兰西国民海军"
 fontaine_navy_royal: "枫丹皇家海军"
 fontaine_navy_republican: "枫丹共和海军"
 FRA_navy_force: "[FrenchNavy]"
 fra_french_navy_industry: "新编海军预算"
 fra_french_navy_industry_1: "造船厂国有化"
 fra_french_navy_industry_2: "熟练造船工人"
 fra_french_navy_industry_3: "高效造船工业"
 FRA_navy_force_tt: "§L特拉法加海战战败，大陆体系瓦解以来，与英国的制海权之争以[FRA.GetNameAdj]惨败而落幕。尽管如此，[FRA.GetNameAdj]亦作为广大殖民帝国的保障而受到一直的重视。虽说不如英国皇家海军，但也绝对在世界上位居前列。\n\n然而海军条约却给海军建设上了一套牢牢的枷锁。当然，海军条约只是各国经历大战，疲惫不堪在海军层面上的反映，若经济重振雄风，海军大建亦非不能。§!\n\n"
 fra_french_massive_naval_building: "大规模海军建设"
 fra_french_massive_naval_building_desc: "我们向海军领域投入了超额的预算，这固然会影响到国家经济的正常运行，然而为了重夺制海权，这点待解不足挂齿。"
 fra_ultimate_deterrence: "终极威慑"
 fra_ultimate_deterrence_desc: "掌握核子的力量意味着不再由国家敢于轻易侵犯我们的国家，从此国家安全拥有了一道安全保障，让我们更有能力积极参与国际事务。"
 FRA_air_force_tt: "§L[FRA.GetName]的空中力量尽管起步并不算晚，然而战间期的建设几乎荒废。陆军保守派漠视空军建设，对其理解仅限侦察和轰炸，因而陆军航空兵未能给空军打下良好的基础。\n\n不过随着德意两国扩军力量的日益强大，高层不得不将空军建设提上日程，却又受制于经济条件。好在，我们国家丰富的轻金属矿藏证明[FRA.GetName]空军发展潜力远胜于德意两国，天空迟早会成为我们的领地§!\n\n"
