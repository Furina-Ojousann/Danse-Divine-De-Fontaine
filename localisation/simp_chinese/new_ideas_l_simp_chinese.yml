 jap_economic_collapse: "癫狂以后"
 jap_newborn_republic: "无根共和国"
 jap_newborn_republic_desc: "纵观日本历史，共和乃是从未有之奇事。自从幕府倾覆，大政奉还，天皇便伴随着整个向内自取-对外侵略-最终失败的漫长过程。政府全部的合法性都来自天皇本人，虽进入二十世纪以来便有先驱敢于挑战天皇制度，但终究不成气候。可一场毁天灭地的大战以后，千年帝制就这样一笔勾销了吗？\n\n好在，这几十年民众地狱般的生活让诸多人民将苦难归因于天皇本人，这为废除君主制带来了一定的基础。总的来说，左翼对此相当高兴。"
 jap_newborn_republic_2: "青年共和国"
 jap_newborn_republic_2_desc: "没有共和的先例意味着我们开创了历史！尽管共和民主还在起步阶段，但总的来说大众对自己新的公民身份相当满意，对共和制度充满新奇，并且乐于积极参与公共事务。"
 jap_dai_nippon_teikoku_constitution: "日本国宪法"
 jap_dai_nippon_teikoku_constitution_tt: "§Y天皇是日本国的象征，是日本国民统一的象征，其地位以主权所在的全体日本国民的意志为依据。§!"
 jap_dai_nippon_teikoku_constitution_desc: "§Y昭和天皇裕仁§!\n§Y日本国§!§W的国家元首\n-------------§!\n\n\n\n\n\n\n£Portrait_Japan_Hirohito_natioanl_spirit\n\n\n\n\n\n\n\n§W-------------§!\n昭和天皇裕仁之统治，于国民而言，乃是空前之惨祸之时代。以“圣战”之名义发动之侵略，带来长期战争之泥沼。数百万国民被动员于前线与工厂，生命与劳力尽皆耗尽。空袭、原爆、饥饉相继而至，家园荒废，国民陷于无可比拟之苦难。终局之战败，使国家之存立动摇，帝国之体制遂倾覆。日本国宪法第一条明定，天皇为日本国与日本国民统合之象征，而不再握有统治之权能。此乃国民之血与瓦砾所换来之制度转换。裕仁之时代，遗留下的是战争惨败、国民灾难、国家倾覆，而在废墟之中始得以确立“国民主权”与“和平主义”之新秩序。"
 populist_socialism_acceptance: "£ai_acceptance_texticon 民粹社会主义接纳度"
 jap_prewar_emporor_hirohito: "昭和天皇"
 jap_prewar_emporor_hirohito_desc: "§Y昭和天皇裕仁§!\n§Y大日本帝国§!§W的国家元首\n-------------§!\n\n\n\n\n\n\n£Portrait_Japan_Hirohito_natioanl_spirit\n\n\n\n\n\n\n\n§W-------------§!\n今上天皇，西历一九二六年登基。天皇世家历代崇尚习武，因此裕仁从小就被有意识地培养尚武的性格。但裕仁并未成为一位强硬的君主，相反，从一九二三年末的遇刺事件中，可以得见天皇实际上生性软弱，他为行刺者求情，然而大逆的结果依然是死。登基以来，裕仁并不真正关心国事，也不关心苍生。他放任大正民主消亡，并且在法西斯主义之蔓延中起到一定助推之作用，乃是其妥协之恶果。"
 emperor_of_japan_religion_combined: "神化天皇"
 jap_taisei_yokusankai_spirit: "翼赞会体制"
 jap_taisei_yokusankai_spirit_desc: "大政翼赞会尝试统合日本国内的全部政治力量，来达到为战争服务之目的。按照属性，则可以被归类为政治领域内的国民总动员。"
 jap_taisei_yokusankai_spirit_tt: "所有内阁花费:§G-25%§!"
 jap_taisei_yokusankai_spirit_3: "三奸四愚"
 jap_taisei_yokusankai_spirit_3_desc: "东条英机身边团结起了一群老练的政客，他们被合称为“三奸四愚”，以不择手段而闻名，尽力地维护东条内阁的统治。"
 fic_colony_budget: "殖民政府"
 sia_political_moderization: "残缺的立宪革命"
 sia_political_moderization_desc: "1932年6月24日，一个对于泰国来说具备重要意义的日子。那天，长达一百五十年的拉达那哥欣时代、八百年的国王专制统治终结了。这场革命由相对较为少数的军队与平民发动，而后成立了泰国历史上第一个大众政党泰国人民党。虽然泰国自此进入了君主立宪时代，但民主并没有普及到整个暹罗，全国绝大部分的农村实际上与国家立法，政党政治并不相干。"
 sia_economic_moderization: "快速现代化"
 sia_economic_moderization_desc: "泰国在近代涌现出数任励精图治的君主，他们意识到泰国的封建农业社会依然不适应于全球联系与工业化的进程，于是积极开展改革与外交，使得泰国免遭西方直接的殖民统治。尽管如此，西方帝国主义依旧对泰国的独立性造成了相当的威胁，而封建土地所有制也没有彻底在农村消亡。时值1936年，立宪革命已逾四年。虽然第一位立宪总理不到一年便被军方推翻，泰国处于事实上的军人统治之下，但现代化的进程没有被打断。失地农民造成的不稳定被铁腕领袖强硬镇压，使得新兴资本得以不受干扰地快速发展。"
 sia_constitution_defense: "保卫立宪革命"
 sia_rural_backward_5: "农村割裂"
 sia_rural_backward_5_desc: "三十年代，国家的首都曼谷已经是一个颇具规模的现代化城市，具备现代的供电与供水系统，绝大部分的市民成为了工商业者。但在偏远的农村地带，农民的生活生产方式与上世纪，乃至古代并无差异，他们没有从现代化中收益，却受到越发沉重的负担，不识字，不会先进的耕作方式，也不具备民族意识。"
