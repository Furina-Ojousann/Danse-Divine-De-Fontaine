 fra_price_normal_raise: "物价快速上涨"
 fra_price_slow_raise: "物价缓慢上涨"
 fra_price_higher: "物价基本稳定"
 fra_national_investment_idea: "国家投资"
 fra_national_investment_idea_desc: "§W我们目前拥有§!§Y[?france_investment_budget]万法郎§!§W投资预算。如果我们的花费超出了投资预算，超出的部分将被计入政府债务中，每§!§Y[?france_debt_cost_divisor]万§!§W法郎债务会消耗§!§R0.01§!§W政治点数维持。我们的可贷资金并不是没有上限的，如果超出可贷资金上限，§!§R每1000万法郎花费将造成1%的通货膨胀率§!\n§W--------------§!\n§W我们目前的§!§Y政府债务§!§W是:§!§Y[?france_government_debt]§!§W/§!§Y[?france_government_max_debt]§!"
