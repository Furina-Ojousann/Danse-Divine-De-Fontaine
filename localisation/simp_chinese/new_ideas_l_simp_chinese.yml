 prc_prepare_for_the_civil_war_1: "准备国内战争"
 prc_prepare_for_the_civil_war_2: "最后一击"
 decadent_country: "腐朽不堪"
 decadent_country_desc: "这个国家同时受到封建社会与帝国主义的双重枷锁，其统治阶级多为买办，成为了外国进行殖民的工具，而社会基础亦彻底糜烂。不过这个国家亦有人寻求救国之道，希望发起民族民主革命。"
 the_beginning_of_modern: "走向现代化的开端"
 the_beginning_of_modern_desc: "在历经艰苦卓绝的斗争以后，国家终于争取到了民族独立，尽管现在一穷二白，但这个国家的人民相信，他们可以用自己摆脱了束缚的双手创造一个更加平等，更加富足的世界。"
 military_politics_dualization_1: "军政二元 - 势均力敌"
 military_politics_dualization_1_desc: "自从明治维新以来，日本出现了许多令人担忧的两极分化，其中最典型的便是海陆之争，但这种层面上的对立还只是在军队里。而更为恶性的则是军部与政府之间的二元化，这种冲突延续到了社会的方方面面，造成了相当大的破坏。好在，目前这种冲突还可以得到遏制。"
 military_politics_dualization_2: "军政二元 - 文官优势"
 military_politics_dualization_2_desc: "自从明治维新以来，日本出现了许多令人担忧的两极分化，其中最典型的便是海陆之争，但这种层面上的对立还只是在军队里。而更为恶性的则是军部与政府之间的二元化，这种冲突延续到了社会的方方面面，造成了相当大的破坏。现在，政府中的文官，也就是在对外政策上更加理智的派别在政府中掌握了更大的话语权。"
 military_politics_dualization_3: "军政二元 - 军队优势"
 military_politics_dualization_3_desc: "自从明治维新以来，日本出现了许多令人担忧的两极分化，其中最典型的便是海陆之争，但这种层面上的对立还只是在军队里。而更为恶性的则是军部与政府之间的二元化，这种冲突延续到了社会的方方面面，造成了相当大的破坏。这种冲突到现在，已经恶化到了军部完全控制整个政府的局面，文官只是军人的傀儡，一切都为战争服务。"
 jap_revolutionism: "革命文化"
 jap_daitoa_senso: "泛亚解放使命"
 national_idol: "国民偶像"
 JAP_Yoshiko_Yamaguchi: "山口淑子"
 JAP_Yoshiko_Yamaguchi_desc: "又名李香兰，祖籍佐贺，却出生在中国辽宁。受过正式西洋声乐教育，是抒情女高音，擅长美声唱法，故是当时于中日两国皆极为知名的歌手、电影演员。"
 JAP_Yosuke_Matsuoka: "松冈洋右"
 jap_diplomat: "外事大臣"
 FRA_the_furina_plan: "芙宁娜计划"
 FRA_the_furina_plan_desc: "一项旨在恢复被战争破坏的经济的宏大计划。"
 FRA_the_hurt_of_war: "战争创伤"
 FRA_the_hurt_of_war_desc: "上一次是一代人的鲜血，这一次我们同样付出了这样的代价。我们的国民曾在毁天灭地的轰炸中苦苦支撑，曾经富庶的田野化作焦土，然而什么也没有得到，幸运的是，相比于上一次，这次我们起码没有失去什么。\n\n没有失去什么？是土地吗？好像生命是一串数字，逝去不过是它的增长。若只是因为寸土未丢而沾沾自喜，那也太残酷了。"
 agricultureal_socialism: "农业社会主义"
 agricultureal_socialism_desc: "农业社会主义主张农业财产的社会公有制而非私有制，具体包括对已集体化的农业用地的平均分配，并且带有去中心化的、无政府主义的、在地化的、重视传统价值的倾向。"
 EAEC: "欧洲原子能共同体(EAEC)"
 FRA_the_unite: "最近的政治统一"
 short_tern_economy_strike: "短期经济震荡"
 fra_fontaine_soviet_union_joint_defense_appointment: "枫丹-苏联共同防御协定"
 fra_fontaine_soviet_union_joint_defense_appointment_tt: "无论是主动出击还是被动防御，只要有缔约一方陷入战争，另一方必须立刻支援。"
 fra_fontaine_soviet_union_joint_defense_appointment_desc: "欧洲共产主义双星彼此安全的保障，也许没人敢于同时挑战西欧与东欧的两个大国，除非......"
 national_corporatism: "国家法团主义"
 fra_twilight_of_republic: "共和迟暮"
 fra_twilight_of_republic_desc: "有时，我们会把国家比作是像人一样的有机实体。因为它就像人的机体一样，能够发展，能达到鼎盛，也会患上致命的疾病，也会逐渐地走向迟暮，最后死去。继承自法兰西第三共和国的法理，枫丹共和国的国祚已逾六十五年，诞生自对一场革命的血腥镇压的共和制度，从一开始便带有者贵族共和的色彩，这意味着共和国的基因就有体弱多病的元素。"
 fra_political_polarization: "政治极化"
 fra_political_polarization_desc: "§R左翼运动§!§W产生的效果:§!\n§W每日共产主义支持率:§!§G+0.15§!\n§Y右翼运动§!§W产生的效果:§!\n§W每日中立主义支持率:§!§G+0.07§!\n§W每日法西斯主义支持率:§!§G+0.08§!\n------------\n信任这一名词，书写于人们的相互理解之中，践行于日常切身的行动之中，需要长久的耐心栽培。而人民对于政府的信任，通常建立于无数微不足道的小事上，也许是一次简单的审判，也许是一桩微小的犯罪，也许是一道利弊难衡的政策，在共和国六十余年的风雨之中，这种信任的建立被忽视了太久，发黄，枯落，最后枯萎。深感被忽视的民众便思考这个共和国究竟为谁而服务，在意识到这个人并不是自己以后，便愤怒的挥起拳头，决意自己改变这个国家。"
 fra_fontiane_backbone: "枫丹骨干"
 fra_fontiane_backbone_desc: "对于芙宁娜·德·枫丹来说，国会是个令人压抑的地方。尽管这里明亮而又通透，但议员却尽数与之为敌。好在，芙宁娜的身边围绕着一群最为优秀的枫丹人，因为对自己神明的尊重，他们总会无条件地支持她。"
 CHI_national_health_issue: "国民健康问题"
 CHI_national_health_issue_1: "国民健康问题"
 CHI_national_health_issue_2: "国民健康问题"
 CHI_national_health_issue_3: "国民健康问题"
 CHI_national_health_issue_1_desc: "在长期的营养不良和鸦片毒害的摧残下，普通中国男性的健康状态非常恶劣，据国民政府的统计，每十个适龄青年中，大约仅有三个符合入伍的最低健康标准，而这仅仅是不完全的统计。"
 CHI_national_health_issue_2_desc: "在长期的营养不良和鸦片毒害的摧残下，普通中国男性的健康状态非常恶劣，据国民政府的统计，每十个适龄青年中，大约仅有五个符合入伍的最低健康标准，而这仅仅是不完全的统计。"
 CHI_national_health_issue_3_desc: "在长期的营养不良和鸦片毒害的摧残下，普通中国男性的健康状态非常恶劣，但这种情况最近已经得到了改善，据国民政府的统计，每十个适龄青年中，符合入伍的最低健康标准的已经达到了七个。"
 expand_the_fleet_plan: "最后一战"
 fra_three_world: "三个世界理论"
 fra_three_world_desc: "放弃使用阶级划分的方法？并非如此，我们的本意只是团结受帝国主义压迫的国家与人民一起去反对帝国主义。对于帝国主义国家中的左翼和无产阶级，对于他们的团结也是不可忽视的，但这并不在这个理论的范畴之内。"
 fra_revolution_spread: "传播革命"
 fra_revolution_spread_desc: "革命的烈焰首先在帝国主义控制薄弱的地区生出，再逐渐燎原至世界上的其他国家。"
 suspicious_method: "奇怪的划分方法"
 fra_economy_situation: "经济运行"
 fra_economy_situation_desc: "§W经济基础修正§!\n§W--------------§!\n§W稳定度:§![?FRA_economic_modifier_stability_factor|+%=]\n§W生活消费品工厂系数:§!§Y[?FRA_economic_modifier_consumer_goods_factor|%=]§!\n§W建造速度:§![?FRA_economic_modifier_production_speed_buildings_factor|+%=]\n§W适役人口修正:§![?FRA_economic_modifier_conscription_factor|+%=]\n§W--------------§!\n在宏观的视角下，我们只需要关心三个核心指标：§Y经济增长率，通货膨胀率和失业率§!。若数据的解释条目为§G绿色§!，则会提供正面修正；如果是§Y黄色§!，则会提供正负参半的修正；如果是§R红色§!，则会提供大量负面修正。\nGDP增长§Y每年结算§!一次，将会提供目前的民用工厂数量乘以实际GDP增长率的§Y地图外民用工厂§!，其它指标对于修正的影响每月结算一次。\n§W--------------§!\n§W目前的§!§Y经济增长率§!§W:§![?france_economy_growth|+%]\n[Getgrowth]\n§W目前的§Y通货膨胀率§!§W:§![?france_economy_inflation|+%]\n[Getinflation]\n§W目前的§!§Y失业率§!§W:§!§Y[?france_economy_unemployment|%]§!\n[Getunemployment]"
 economic_deflation: "通货紧缩"
 economic_bad_inflation: "恶性通货膨胀"
 economic_hyperunemployment: "失业率过高"
 economic_lowerunemployment: "失业率过低"
