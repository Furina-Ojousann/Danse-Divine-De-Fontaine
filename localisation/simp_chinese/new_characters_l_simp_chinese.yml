 FURINA_REFORMATION_DESCRIPTION_STAGE_ONE: "拥护宪政的政治学家们不认为一个国家的元首应当具有超凡的魅力，因为宪政国家合法性的来源从不在于其领袖的个人魅力，而在于法权。虽然这些空灵的理论并不能限制芙宁娜·德·枫丹的当选，但那些自负的学者们断言，她注定会遭受挫折。因为她迟早会意识到，国家机器并非为她一人意志而运转。纵使歌剧院中一笑引得无数迷恋，光彩夺目犹如夜空之光星，落入浊水之中便会同样地暗淡模糊。\n\n飘忽不定的柔光不过是芙宁娜照人光彩在水中的倒影而已。可是对于水下无数潜匿着的众生，这样迷茫的光束，与其形容它几近消逝，不如说它是久违的希望。共和国是一个美好的名字，几乎与其暮气沉沉的政治毫不相称。政客着装体面不过为了掩盖其内在的无能，冗长而富有文学技巧的发言不过让人难以注意到那种从未改变的，根本毫不在乎的态度。他们占领了整个国民议会，可憎的面目让人对共和国承诺的民主一再失望。所以，以生命冲力而闻名的芙宁娜·德·枫丹，宣誓出她与籍籍无名的政客们有别于骨肉的不同。她是一个会笑的人，也会惊慌失措，强装镇定，可正是这些并不完美的特质，使得她的生命拉开了与死的距离。\n\n现在，芙宁娜刚刚隐没进入名为爱丽舍宫的浊水，她无法透过污浊直抵深幽，却能看见正期待着她的无数双期待着的好奇眼睛。"
