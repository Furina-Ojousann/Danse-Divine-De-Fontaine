 MNG_Alfried_Krupp_Description: "阿尔弗雷德·克虏伯并不喜欢“战犯”这个词。他更愿意把自己看成一名企业家，一名在“国家狂热”里被迫供货的工业管理者。战争在他那里从未拥有道德重量，它只是需求被放大的状态，是钢铁被更快消耗的理由。德意志战败时，许多人被送上法庭，他却躲进了公司结构与管理流程的阴影里。等到清算结束，他依旧完整无缺。\n\n枫丹的技术治理让他如鱼得水。效率、纪律、指标，这些词汇比忏悔更有用。克虏伯集团得以保全，他本人也被重新包装成“不可或缺的工业管理者”。当苏联崩溃，他进入马格尼托格尔斯克，没有协商，没有过渡，只是接管。党政机关被驱散，工厂继续运转，统治换了标牌。\n\n他对劳工并无仇恨，也无怜悯。伤亡是损耗，罢工是故障，饥饿是管理失败。名字被划掉，班次被重排，炉火照常点燃。法西斯在他手中不需要激情，只需要秩序。战争结束，审判结束，对他而言，剩下的只是生产。"
