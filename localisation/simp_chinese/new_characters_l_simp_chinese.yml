 FRA_Furina_de_Fontaine: "芙宁娜·德·枫丹"
 FRA_Furina_de_Fontaine_desc: "在世界上绝大多数的宗教文化中，神明的形象总是庄重，慈悲，而全知全能的。因而，人们很难把剧院中轻佻的当红明星与神明联系起来，可芙宁娜·德·枫丹偏偏达成了这两者的统一。\n\n让我们将芙宁娜与神明的传统形象做一个逐一的比对吧；芙宁娜庄重吗？大多数的时候都不是，人们心中她的形象往往是热情而古怪精灵的。慈悲吗？这点倒是肯定的。我们可以说，童真是至善的最初形态，因为它从未被世俗所异化。芙宁娜对童真这一属性的保留是远超所以同龄人的(从外表上来看的年龄)，毕竟，谁相信一个能和小动物玩到一起去的女孩会很残酷邪恶呢？再看最后一点，全知全能。呃......也许吧，在这方面的能力，芙宁娜依然是深藏不露，鲜为世人所熟知。\n\n那么这样一个集合了强大的神明，流行的艺人，和可爱的女孩的存在，能够让枫丹成为大治之世吗？注意了，这个目标可不是要她一个人独自达成的，其依靠的根本，是团结起来的全部枫丹国民，毕竟，谁会不喜欢芙宁娜呢？"
