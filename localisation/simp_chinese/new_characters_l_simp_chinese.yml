 FRA_vacancy_cabinet: "内阁空位"
 clorinde_vice_president_desc: "§Y枫丹共和国§!的副总统\n-------------\n\n\n\n\n\n\n£portrait_fra_Solenn_Clorinde_pm\n\n\n\n\n\n\n\n§L克洛琳德曾经习惯流血。至少习惯那种靠近血的气味：文件上印着处决令的墨，清晨士兵推门时带进来的冷风，议会走廊里压低的脚步声。那时她相信法律像一把剑，握住剑柄，世界就会少一点混乱。她也相信自己可以一直握住。但后来宪法被改了。改得很轻。轻到她甚至来不及把愤怒组织成一句完整的话。她站在波旁宫台阶上，第一次意识到自己所谓的信仰也会被搬动，像搬一张桌子。那一刻她没有反抗。她没有作为。她把这份无力咽下去，像把一口太烫的汤含在舌尖，等它变凉，等它变得可以吞咽。很多人把那叫作妥协，可克洛琳德更愿意叫它幸存。\n\n总统选举之后，她成了副总统。一个奇怪的位置。离权力很近，离决策很远。她依旧尊敬宪政体制——只是出于经验。她知道程序并不高尚，程序只是用来拖延暴力的时间。可正因为她知道，她才更愿意守着它。副总统的日常让人疲倦。拍照、握手、出席、致意。她看着芙宁娜在镜头前微笑，看着她把改革说得漂亮，把国家说得温柔。她也看见芙宁娜在镜头背后短暂的失神，看见她把手放在桌面上，指尖轻轻敲击，像在数某种看不见的拍子。那拍子属于剧院，也属于压力。克洛琳德没有再上前去打断它。她只是坐得更稳，像一把安静的椅子，允许芙宁娜在崩溃前先靠一靠。\n\n克洛琳德尊敬制度，正因为她不再迷信它。她尊敬芙宁娜，正因为她不再把她当作神。她把自己的放任当作一种更残酷的保护：不给她永远的盾，让她学会握住自己的剑。在新的时代里，她依旧站在她身边。§!"
 Clorinde_PM_desc: "第二任§Y枫丹帝国§!内阁总理大臣\n-------------\n\n\n\n\n\n\n£portrait_fra_Solenn_Clorinde_pm\n\n\n\n\n\n\n\n§L“矢志不渝”——人们往往用这个词形容一段爱情。但当它脱离恋爱的语境，落到人格上，就变得沉重得多。永不变心，这听起来像是一种带有唯心色彩的承诺，却又恰当地形容了克洛琳德。她效忠于枫丹宪法，效忠于芙宁娜，永远。\n\n在她的政治生涯中，枫丹几乎没有一日是平静的：大罢工、内战、内阁的多次改组，直到帝国的复辟。她的双手并非洁白无瑕——作为内阁成员，她签过处决叛乱者的命令，听过士兵在清晨推开家门的脚步声。对她而言，法律是信条，良心是量尺。她明白西塞罗那句古老的判断——“恶法非法”——在枫丹的政治语境中依旧刺耳。当新宪法颁布时，她一度陷入沉默。宪法赋予了一类人前所未有的权力，同时让一些在她看来失去“人”之意义的条款获得了至高无上的主权。这种冲突让她无法全然接受修订后的宪法，但她也没有表演反抗者的姿态。她只是选择边缘化自己，在政治的剧场里退到暗处，像绝大多数人一样缄默着。\n\n幸运的是，历史让缄默者得以再次发声。她十分惊讶于女皇最终选择了她，成为后阿蕾奇诺时代的第一位首相，并且赋予她重新修订帝国宪法的权力，以她自己的良心为尺度——不，她不认为自己真的具备裁断所有枫丹人行为准则的权力，在女皇的支持下，她将开始主持新的制宪大会——那是大革命时期的影子——那时的国民制宪议会曾宣告主权属于人民。如今，她也将引导这场议程，让帝国的权力重新向公民让渡。§!"
 JAP_Raiden_Ei: "影"
 silent_ruler: "缄默的执政"
 JAP_Mejiro_Mcqueen: "目白麦昆"
 JAP_Mejiro_Mcqueen_desc: "第三十一任§Y日本帝国§!内阁总理大臣\n--------------\n\n\n\n\n\n\n£portrait_jap_Mejiro_Mcqueen_PM\n\n\n\n\n\n\n\n§L目白麦昆的名字在1930年代的日本无人不知。贵族的出身让她自幼立于社会的高处，祖上与幕府关系深厚，是明治以来藩阀政治网络的一部分。她的教育在最精英的学府完成，礼仪、外语、军事史与政治经济学并重，几乎是按“国家未来的门面”来培养的。然而，让她真正进入大众视野的，并不是演讲或著述，而是赛场——春秋御荣典连霸是她的实绩，作为进入政界的基本政治资本。\n\n三十年代，藩阀势力的名声在长期的保守执政中受损，被视为与旧时代捆绑在一起。目白麦昆既是藩阀的一员，又以体育英雄的身份享有跨阶层的好感度，成为天然的形象桥梁。她本人并非传统政客，却极善于在公众场合把握分寸。对媒体而言，她代表的是一种“贵族的亲民”——既有严格的礼仪修养，又能在街头与普通市民合影留念。藩阀看重的是她作为家族延续的象征，政友会看重的是她无可挑剔的公众形象，而海军派则视她为一个不会触动其核心利益的温和合作者。\n\n1934年，内阁在一连串财政争论与外交失误后陷入危机，政友会总裁一职空缺。藩阀高层于是推动麦昆出任总裁——一个没有深厚党内派系基础、却能获得各派暂时信任的人选。她的连霸纪录和赛场光环，为这一决定披上了几分“全民认可”的外衣。成为政友会总裁、并随之出任第31任内阁总理大臣，是目白麦昆政治生涯的起点，她清楚自己之所以被推上这个位置，不只是个人能力的认可，更是权力平衡的产物。藩阀需要她来改善形象，政友会需要她来稳住选票，海军派需要她来维持宪政框架下的合作局面。\n\n然而，她始终带着某种外来者的清醒感——她知道，自己既是总裁，也是藩阀与政党之间的契约产物。她的任期可能不会长久，但她的存在本身，已在日本政治史上留下一个独特的注脚：一位从赛场走上权力巅峰的贵族，既是制度的产物，也是制度的装饰。§!"

