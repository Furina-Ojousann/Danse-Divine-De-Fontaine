 R_character_description_navia: "§Y枫丹共和国§!社会活动者，刺玫会会长\n--------------\n\n\n\n\n\n\n£portrait_fra_Navia_Caspar_text\n\n\n\n\n\n\n\n§L娜维娅的家族是一个早已脱离政治锋芒的旧贵族之家。家族的徽章依旧悬在客厅的壁炉上，但火焰早已熄灭——只剩下镀金的余温。娜维娅成长于这样的背景里，学会了优雅与分寸，也学会了从窗外的世界判断风向。那时她尚不知“正义”为何物，只知道礼貌与义务可以让她顺利地被世界接受。直到那一年，协和广场的火光第一次映在她的脸上。人群的怒号盖过了礼乐的旋律，街头的硝烟让她意识到，那些被称为“民众”的人并不是她记忆里的抽象名词。\n她看见自己组织的“互助会”在混乱中崩散，捐款、祈祷、演讲都无法阻止失业者的手被冻僵。那天之后，她的优雅有了裂痕。经济学，财政平衡、消费曲线与劳资协商。这些冷冰冰的东西，没有哪个正常人会觉得有趣，但她花了两年时间学习，说：“我终于理解何为结构性的不幸。”\n\n在枫丹经济委员会任职期间，她的政策被称为“娜维娅计划”——并非伟业，而是一种温和的救治。她主张政府介入，以财政与法律修补分配裂口，让货币重新流动，让被抛弃的人重新被体制看见。右翼讥笑她为“穿礼服的社会主义者”，左翼又指责她“在调和中出卖革命”。可她从未争辩，因为她知道自己既非圣徒，也非叛徒，只是一个拒绝视而不见的旁观者。\n她的办公室总是明亮整洁，桌上堆着文件与花瓶。那花是她亲自换的——象征秩序，也象征生命。每当记者问她信仰什么，她只答：“信仰人仍有被说服的能力。”后来，人们称她为“经济的良心”。那称呼并不准确，却也无害。她依旧每日在账簿与数据之间穿行，仿佛在衡量一个国家能否以温柔的方式继续存在。§!"
