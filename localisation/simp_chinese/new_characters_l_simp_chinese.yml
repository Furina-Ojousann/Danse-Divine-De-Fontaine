 FRA_Solenn_Clorinde: "克洛琳德·德拉克罗瓦"
 FRA_Solenn_Clorinde_desc: "§L在日常生活中，如果有谁总是大谈特谈法律和正义，喋喋不休，不知疲倦地指出这个不对，那个违法，那这个人肯定是会受到大家的一致厌恶的，然而克洛琳德是例外。\n\n这么说其实也不算准确，因为克洛琳德喋喋不休的时候，恐怕一辈子的时间过去也看不到一次。但在克洛琳德精干简练的言辞中，法律，正义确实是两个高频词，而不被大家所厌恶，是因为她真的就是法律和正义的执行人。\n\n决斗代理人，顾名思义，负责与人决斗。决斗是个相当官方的术语，通俗点来讲，就是宣判以后的上诉，上诉上到耐心磨灭干净以后，干戈相见就成为了一种选择，也就是发起决斗。而在这种决斗中，克洛琳德赢下了每一场，最后，她的威名化作了旁人对她的敬畏。靠着从未输过的名声，克洛琳德也算是枫丹的半个红人，但她并不享受出名，嫌记者们干扰到了自己的日常生活。被召集进入政府工作以后，干脆消失在了公众视野里，偶尔的出现，基本上都是随从芙宁娜一同出行，地位之高不言而喻，这样的镜头一被捕捉下来，便又是新闻界的一场地震海啸。§!"
 FRA_Navia_Caspar: "娜维娅·卡萨帕"
 FRA_Lyney_Snezhevich: "林尼·雪奈茨维奇"
 FRA_Chiori: "千织"
 FRA_Chiori_desc: "§L枫丹人会叫千织？很显然，这要么是个绰号，要么说明千织其人与日本有着千丝万缕的联系。但是，这个很显然完全不对！千织不是绰号，和日本也毫无联系。\n\n感到迷惑就对了，千织自己也因此陷入过长久的迷惑，从各种读物中收集到零零散散的信息，足以让千织觉得日本这个国家与自己的故乡——稻妻无比相像，可其最重要的象征，大御所大人，肯定和那个不明所以的“天皇”完全不一样，至于社会嘛...的确，像是千织还在稻妻时昨日的复现，压抑的氛围简直是沉浸式体验。\n\n可压抑却是千织最最无法忍受的。稻妻是无梦的国土，意味着无比沉重的现实之引力，被吸引的久了，心中就憋着一股气，是为压抑，这样的压抑，是她离开稻妻，前往枫丹——也许是实现梦想，也许是追求自由——的直接缘由，自己是决不愿意再回到那个极力摆脱的过去。\n可是飘零在这个与提瓦特完全不同的世界中，心灵总需要一个归宿，尽管对大御所大人并无好感，但水神也并非千织的信仰，那个与故乡无比相似的远方，正萦绕这她。§!"
