 furina_empire_desc: "“完美的君主，不仅需要马基雅维利所教导的如何统治，无暇美德也是必要。所以，芙宁娜不能再是芙宁娜，而必须是芙卡洛斯，牺牲自己的全部主体性，把一切奉献给帝国。因为一举一动都会牵动整个枫丹；端庄，优雅是必须做到的，最好能够成为圣女。”\n\n“芙宁娜...芙卡洛斯，你可以做到的，可以的......”\n\n“只是不知道为什么...好难受。”"
