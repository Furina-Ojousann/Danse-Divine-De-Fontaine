 JAP_liberal_democrats_long: "自由民主党 (Liberal Democratic Party)\n§W--------------§!\n\n\n\n£textillustration_LDP_desc\n\n\n\n\n§L在日本语境下，我们可以大胆断言，自由民主党的核心理念，既不是自由，也不是民主，甚至可以不是任何理念上的政治标签。唯一意识形态，便是资本主义与《日本国宪法》框架下，最实用，最完善，也是最赤裸裸的“治理”。\n\n因此，日本的政治地图与城市与乡村对立的理念之争相去甚远，更接近一张反映利益分配的地图。绿色是自民党在选情图上的通用颜色，一个深绿地区意味着那里的町镇乡长等地方实权人物与自民党议员关系可谓千丝万缕。反之，没有被绿色占据的区域往往意味着那里是被抛弃之地，治理失效或是利益配平使得当地人民难以得到发展成果，却不停为永不停歇的东京而不断流血。选民的愤怒便反映于又一片绿区的消失，这样的转变只是出于报复而已。§!\n§W-------------§!\n"
