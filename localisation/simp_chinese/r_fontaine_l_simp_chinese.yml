 RFP_tripartile_consultation_upcoming_voting: "开始就《[GetYear]年公民权法案》进行表决"
 RFP_tripartile_consultation_upcoming_voting_desc: "《[GetYear]年公民权法案》是该法案的正式名称，而它使用更广泛的名字是提及三位牵头人的“布鲁姆-克洛琳德-维奥莱特提案”，或者连名字也省略，简称“三方提案”。\n\n实际上，移民是国内相当敏感的议题。对移民持保守或者反对意见的人士认为移民所带来的外来文化会破坏本土民族认同，带来的新习俗与传统将严重破坏一个社会的共识，长期看来，社会因此而分裂。劳工同情者则指出开放移民会人为地创造失业，压低人类劳动的整体报酬。\n\n尽管政府一直强调，尊重移民是多元主义的一个基本准则，而共和国有义务接纳所有，然而现实是，经济增长才是这一提案的主要动机。"
