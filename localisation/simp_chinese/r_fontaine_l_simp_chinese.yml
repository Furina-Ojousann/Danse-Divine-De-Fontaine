 spain_war_stage_i_tooltip: "§Y阶段一：秘密干涉§!\n--------------\n状态：[GetFontaineSpainActivationStageI]"
 spain_war_stage_i_tooltip_delay: "§Y可用选项：物资援助、外交支持、间谍网络§!\n\n代表西班牙共和政府向我国求援的§Y因达莱西奥·普列托·图洛§!，已经在人民阵线的内部权斗中失去权力。而目前真正掌握实权的是总理§Y弗朗西斯科·拉格·卡巴雷罗§!，其温和的§p社会主义§!主张是我们可以接受的。现在所有的温和派已经出局，而更加激进的§r西班牙共产党§!依旧对共和政府的最高权力虎视眈眈，而一个§r斯大林主义§!的西班牙是我们无法容忍的。我们必须不遗余力地维护§Y弗朗西斯科·拉格·卡巴雷罗§!的统治，维护我国南疆安全。"
 spain_war_stage_ii_tooltip: "§Y阶段二：军事支援§!\n--------------\n状态：[GetFontaineSpainActivationStageII]"
 spain_war_stage_ii_tooltip_delay: "§Y可用选项：志愿部队、经济援助、军事指导§!\n\n我们在西班牙的行动似乎引起了§Y[GER.GetName]§!与§Y[ITA.GetName]§!两国的警觉，他们加大了在西班牙的筹码。得到了更多支援的国民军在近期的攻势中牢牢掌控主动权，共和军以接连惨败报答我们的支持。一切迹象都表明共和军缺乏合格军队所需要的一切素质，在这种情况下，派遣枫丹陆军进入西班牙境内似乎已经§R势在必行§!。"
 spain_war_stage_iii_tooltip: "§Y阶段三：全面入侵§!\n--------------\n状态：[GetFontaineSpainActivationStageIII]"
 spain_war_stage_iii_tooltip_delay: "§Y可用选项：骑士迷思行动§!\n\n西班牙政治已经发展到了最坏的地步，无论亲法西斯的国民军胜利，还是已经夺取政权，发起革命的共产党人完成统一，对我们来说都已经没有区别。如果再不采取行动，我们在西班牙的所有前期投入都将毫无意义，也无法向公众证明我们有能力消灭哪怕已经近在咫尺的威胁。\n\n§R我们别无选择，唯有战争。§!"
 fontaine_spanish_war_stage_up: "§R我们在西班牙的行动规模扩大了。§!"
 spain_war_progress_threshold_1_tt: "阈值一：£fontaine_tension §R5%紧张度§!\n--------------\n激活内战干涉§Y阶段一§!"
 spain_war_progress_threshold_2_tt: "阈值二：£fontaine_tension §R27.5%紧张度§!\n--------------\n§Y[GER.GetName]§!与§Y[ITA.GetName]§!干预§R力度加大§!"
 spain_war_progress_threshold_3_tt: "阈值三：£fontaine_tension §R50%紧张度§!\n--------------\n激活内战干涉§Y阶段二§!"
 spain_war_progress_threshold_4_tt: "阈值四：£fontaine_tension §R72.5%紧张度§!\n--------------\n国内§Y厌战§!情绪§R显著增长§!"
 spain_war_progress_threshold_5_tt: "阈值五：£fontaine_tension §R95%紧张度§!\n--------------\n激活内战干涉§Y阶段三§!"
 spain_war_progress_bar_tt: "目前西班牙局势的£fontaine_tension §R紧张度§!为：[?r_fontaine_tension_of_spanish_war|%%-]"
 spain_war_progress_bar_tt_delay: "£fontaine_tension §R紧张度§!是由于我国介入西班牙内战，所导致的与[GER.GetFlag]§Y[GER.GetName]§!与[ITA.GetFlag]§Y[ITA.GetName]§!关系紧张§R加剧§!，国内不断滋生的£fontaine_anti_war §g反战情绪§!以及西班牙逐渐窃取政权的£fontaine_communist §r共产党§!势力的综合折现。\n\n\n\n£textillustration_anti_war_campaign_desc\n\n\n\n\n§L盲目扩大战争并不是一个好主意——这么说未免显得有些过于客气了。准确来说，国内外无数力量都在反对我们对西班牙采取进一步的干涉。不过，在这些反对的声音还较为弱小的时候，我们总是有办法暂时压制异议。可是当局势越过某个冥冥之中的临界点以后，我们将不得不为先前的所有独断专行付出代价:§!\n\n§r更多死亡。§!"
 FSWI_promise_peace: "许诺和平"
 FSWI_promise_peace_desc: "公众讨厌卷入一场新的漫无止境的战争，我们在西班牙的行动注定不受欢迎。唯一减少民众反对介入西班牙局势的手段就是向他们保证冲突只会局限在西班牙境内，没有一个枫丹人会为了西班牙人留学，乃至付出生命。\n\n§r但承诺只有第一次做出时有效，而且，违背它会付出代价。§!"
 spain_war_tension_change: "在[SPD.GetFlag]§Y西班牙§!行动的£fontaine_tension 紧张度变化：$RIGHT|-=%%1$"
 fswi_has_promised_peace: "已经承诺过和平"
 FSWI_Stage_I_Offer_Humanistic_Support: "提供人道主义支持"
 FSWI_Stage_I_Offer_Humanistic_Support_desc: "西班牙共和军前线吃紧的同时，后方的供应也同样样样紧缺——药品，医疗器材，一切训练有素的医疗人员；以及已经趋近于崩溃的粮食安全体系。这些东西不会立刻让战线崩溃，但对共和政府的持续坚持意义重大。"
 FSWI_Stage_I_Cancel_Humanistic_Support: "撤回人道主义支持"
 FSWI_Stage_I_Cancel_Humanistic_Support_desc: "尽管听上去很可耻，但相比于西班牙，国内更加需要那些被无偿送往西班牙的珍贵药物和粮食。左翼认为我们的干涉微乎其微，缺乏力度；右翼指责我们卖国。立刻结束这样近乎无端的指责的方式就是...什么都不给。"
 FRA_Spain_Support_From_Fontaine: "枫丹支援行动"
 modify_fra_spain_support_from_fontaine: "§Y$FRA_Spain_Support_From_Fontaine$§!追加效果：\n"
 FRA_Spain_Support_From_Fontaine_desc: "枫丹共和国出于保障其南部边疆安全的考虑，已经选择在外交以外，为我们提供更加实际的支持。"
 FSWI_Stage_I_Non_interfere_council: "成立国际不干涉委员会"
 FSWI_Stage_I_Non_interfere_council_desc: "从一开始，国民军就是一群离心离德的叛军，能够生存至今完全是仰仗其他法西斯国家的支援——当然，我们的作壁上观也对其负有不可推卸的责任。不过在公众普遍厌倦干涉的情况下，我们可以做的是——让所有国家都停止干涉。在国民军失去外部供养的情况下，共和军战胜他们的机会将大大增加。"
 FSWI_Stage_I_Non_interfere_council_tt: "成立一个§Y委员会§!很§G简单§!，但要让战场上的[GER.GetFlag]§Y[GER.GetName]§!与[ITA.GetFlag]§Y[ITA.GetName]§!志愿军撤离，§r很难§!。不过如果他们真的撤军，那么我们便有绝佳的机会从西班牙事务中§7完美抽身§!。"
 lar_non_intervention.3.tt: "§R他们连不干涉委员会都拒绝加入，势必不会停止干涉。我们快速从西班牙事务中抽身的尝试失败了。§!"
 lar_non_intervention.7.tt: "§R西班牙局势相关内容将被移除§!"
