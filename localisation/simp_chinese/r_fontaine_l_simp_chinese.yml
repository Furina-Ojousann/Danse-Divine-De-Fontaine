 r_parliament_bill_1_detial: "§L“他说保守党政府获得了自由党人的支持，正在修改历书使每任总统可以在任一百年。他说政府终于与教廷达成协定，还有一位红衣主教从罗马被派来，而自由党的部长们都跪下来亲吻他的戒指并摄影存照。”\n\n通过领袖强烈的个人魅力与总统制的结合，便可以达成宪法框架允许下的“完美独裁”。第三共和国历史上从未出现过如此良机。自从梯也尔建立起这个充斥着保皇派的共和国以来，每一任总统都不过是人民毫不关心的政治花瓶。现在共和国历燃起了史上少见的领袖崇拜，芙宁娜超凡的个人特质完全可以吸引国民的尽忠和服从，这是那维莱特梦寐以求的。§!"
 r_parliament_bill_2_detial: "§L“当警察前来逮捕因先前逃脱的艾伦时，两人被迫再次逃亡。她伦绝望地认为他们的挣扎毫无意义，但流浪汉告诉她，在明亮的黎明时分，他们会沿着道路，走向充满风云变幻却充满希望的未来。”\n\n在我们的时代里，社会中普通工人的肖像在今年新电影《摩登时代》中得到了戏剧化的展现。毫无疑问，他们生活在贫困之中。流水线上的重复劳作从精神中侵蚀他们的脑髓，机械的活动磨损他们的肌体，使其僵硬而无法活动。贫穷不是美德，贫穷会磨灭他们的美德。为非作歹，或是团结起来集体斗争。我们有一味治疗如此绝望的良药——一点施舍，一点同情，便是我们劳动法修正案中规定的40小时工作制，20%的工资上涨以及更为频繁的节假日。§!"
 r_parliament_bill_3_detial: "§L“没有谁是一座孤岛，在大海里独踞；每个人都像一块小小的泥土，连接成整个陆地。如果有一块泥土被海水冲刷，欧洲就会失去一角，这如同一座山岬，也如同一座庄园，无论是你的还是你朋友的。”\n\n随着经济改革的进行，需求得以恢复，资金重新开始劳动，但却暴露出“没有人”的问题。大战对人口的创伤还未恢复，再强劲的经济复苏也需要庞大的劳工来提供劳动与消费。我们不可能在几年内诞生出新一代具备消费能力的公民，也许移民可以成为支撑经济增长的另一支柱。§!"
 r_parliament_bill_4_detial: "§L“无论谁死了，都是我的一部分在死去，因为我包含在人类这个概念里。因此，不要问丧钟为谁而鸣，丧钟为你而鸣。”\n\n大战，圣诞节，凡尔赛；普恩加莱，鲁尔危机，进军罗马，通货膨胀，纳粹党；意埃战争，莱茵兰，蒋介石与贝纳斯。大战的幸存一代，他们的经历可以编成一首歌。是欧洲民族与自由主义世纪的挽歌，为欧洲黄金时代的落幕而哀悼。大战没有教会人类和平，在战胜者恐惧下一场战争的同时，败者正陷入癫狂般地叫嚣下一场战争的到来。\n\n是时候吸取教训了，在事态变得不可收拾之前，将即将到来的战争结束在可控的规模内。§!"
