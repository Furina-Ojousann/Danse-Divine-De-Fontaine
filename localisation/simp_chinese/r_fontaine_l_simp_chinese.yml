 RFP_stirring_up_tensions_in_parliament_desc: "虽然我们可以预见未来欧洲局势的危险，而尽早干预是减轻危险的最有效应对。但不幸的是，国内诸多政客并不乐于将战火烧到国外，坚称来自东方的威胁并不存在。也许，一些激烈的言辞能让他们改变主意..."
