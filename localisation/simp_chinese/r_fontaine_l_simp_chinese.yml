 French_Fontaine_Spainish_War_Interfere: "西班牙局势"
 French_Fontaine_Spainish_War_Interfere_desc: "比利牛斯山以南的西班牙曾具有美好的改革理想。然而，前总理曼埃努尔·阿萨尼亚激进的自由主义改革引起了其国内诸如军队，地主与教会等保守势力的强烈反对。以非洲军团叛乱为起始，内战因此爆发。\n\n即使面对保守势力的共同威胁，共和政府内部的人民阵线依旧未能达成一致，他们诉求各自分裂，并且未必与我们志同道合。如果西班牙的政治落到了最坏的地步，我们无法排除与整个西班牙为敌的可能。"
