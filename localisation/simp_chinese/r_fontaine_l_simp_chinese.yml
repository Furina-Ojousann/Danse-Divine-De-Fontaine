 FSWI_Stage_III_Operation_Exhaustion: "战争拖延"
 FSWI_Stage_III_Operation_Exhaustion_desc: "这是一场没人想要的战争。总统府不想，总参谋部不想，枫丹民众不想，西班牙人民更不想要。我们的西班牙集团军士气逐渐低落，对战争的恐惧已经深深渗入了每一位国民的心中，因为南部战争没有带来安定，只是源源不断的骨殖与伤残的青年。选民们指责总统府漠视人命，左右派难得保持一致，宣布反对在西班牙继续战争。我们不知道还要为这场战争付出多少代价，只能祈祷它快点结束。"
 FSWI_Stage_III_withdraw_from_spain: "§R强制行动§!：从西班牙撤军"
 FSWI_Stage_I_Offer_Intelligencial_Support: "提供情报支持"
 FSWI_Stage_I_Offer_Intelligencial_Support_desc: "在枪炮以外的另一个战场——情报上，共和军对于情报的获取远远不及国民军的专业特工。我们不能让共和军在这个战场上溃败。"
 FSWI_Stage_I_Support_of_Charge: "提供有偿援助"
 FSWI_Stage_I_Support_of_Charge_desc: "西班牙共和政府现在在财政上，一穷二白。不过，他们还有丰厚的黄金储备，也许是他们殖民时代留下的最后一点遗产。黄金的价值不言而喻，但毕竟无法立刻铸造成必须的武器或者粮食，因此，我们可以给他们提供一个“优惠价”——来购买我们的国内商品。如果没有钱的话，就变卖黄金吧。或者在内战结束后，用一些权利在抵押。"
 FSWI_Stage_I_Support_of_Charge_tt: "如果§Y[SPR.GetName]§!在内战中获胜，我们将获得大量§Y经济产能盈余§!"
 FSWI_Stage_I_Cancel_Charged_Support: "停止有偿援助"
