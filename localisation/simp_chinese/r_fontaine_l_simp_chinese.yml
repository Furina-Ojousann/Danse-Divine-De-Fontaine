 FSWI_Stage_I_to_II_mobilize_north_africa_troops_desc: "小打小闹的援助已经无法挽救共和军的颓势，军事干预不得不纳入考虑之中..."
 FSWI_Stage_I_to_II_mobilize_north_africa_troops_tt: "§r将干预直接推进到第二阶段§!"
