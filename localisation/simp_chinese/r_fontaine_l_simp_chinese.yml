 French_Fontaine_World_War_II_Strategies: "驯兽"
 French_Fontaine_World_War_II_Strategies_desc: "刻耳柏洛斯。当你在一次历时长达四年，生灵涂炭，于杀戮中近乎丧失人性的搏斗中，终于斩去其一头颅时，它呜咽着退去，暂时摆出一副温良驯服的模样。却忘记它有两头仍存于世，脖上依旧盘缠毒蛇，从未丧失再度致人于死地的能力。\n\n如今它们再次露出爪牙，仇恨驱使着它要与昔日对手再度交锋，跃跃欲试。我们唯有再次斩去其一头颅，尚留一首，使其了解大陆秩序不可忤逆。"
 FRA_renew_invade_belgium_threat: "准备入侵比利时"
 FWWS_upcoming_invasion_against_belgium: "针对比利时的入侵在即"
 FWWS_upcoming_invasion_against_belgium_desc: "...我们不是侵略者。如果只有我们以武力胁迫，比利时才允许我们在其境内布防的话，那为了保卫自身的安全，入侵就是唯一的选择。即便我们的主动入侵违背了道义，无论如何，对比利时人民来说都要好过被纳粹占领，对吧？"
 FWWS_invade_belgium_immediately: "立刻开始入侵"
 FWWS_invade_belgium_immediately_desc: "无论如何，我们等不起整整十个星期。德军完全可以仅有五个星期便完成入侵比利时的部署，而在那之前，我们依旧无法抵达防御位置。行动刻不容缓，必须立即开始！"
 FWWS_bargain_with_holand: "与荷兰交易"
 FWWS_bargain_with_holand_desc: "比利时境内只存在三种人：荷兰语人口，法语人口，还有占比微小的德语人口，唯独没有他们自己的比利时语，这就注定了比利时是一个民族主义进展缓慢的国家。如果我们向荷兰政府承诺比利时投降以后，其弗兰德斯地区将会归属他们，将会极大增加他们与我们组成协约的概率。" 
 FWWS_german_invasion_in_unknown_days: "世界大战一触即发"
 FWWS_german_invasion_in_unknown_days_desc: "我们与德国在边境的对峙已经极其紧张，但可以肯定的是，我们绝不会主动出击。我们对德国何时入侵一无所知，也许他们永远不敢主动发起进攻，也许明天大战就将爆发。"
 FWWS_german_invasion_in_unknown_days_tt: "§R我们并不确切德国开始进攻的具体时间§!"
