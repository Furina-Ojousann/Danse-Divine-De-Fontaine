 liberalism_temp_social_democracy_desc: "社会自由主义是在古典自由主义基础上产生的现代调和路线，形成于工业社会矛盾逐渐显现的时代。它承认个人自由是现代政治的核心价值，但不再把市场视为自然且自足的秩序，而是认为国家负有保障自由得以真正实现的责任。自由不只是免于干涉的状态，更需要教育、医疗、最低生活水准等社会条件的支撑；没有这些，自由只会停留在纸面上，成为少数人的特权。\n在制度层面，社会自由主义主张通过选举民主、法律平等与有限的国家干预来改善资本主义的弊端。它不否定市场，但强调公共政策在“补齐短板”中的作用：税收、社会保障、劳工法规与反垄断措施，都是确保竞争公正与生活体面的工具。政府被视为调节社会利益的仲裁者，而不是取代市场的规划者；企业仍然是经济运行的主力，但必须在公共规则下运作。这种思路在二十世纪的西欧与北美产生深远影响。从福利国家的建立到公共教育体系的扩展，社会自由主义塑造了现代“中产社会”的基本雏形。然而，它对私有制和市场逻辑的接受，使其难以触及经济结构深处的不平等。经济全球化压缩了国家的干预空间，资本流动的自由反过来削弱了社会政策的稳定基础。当增长放缓、分配压力加剧时，这套制度也暴露出内在的张力：依赖市场维持福祉，却又必须不断修补市场带来的裂缝。\n社会自由主义既是自由主义的延伸，也是对其局限的回应；它在自由与平等之间寻找平衡，却始终无法脱离资本主义的框架。"
