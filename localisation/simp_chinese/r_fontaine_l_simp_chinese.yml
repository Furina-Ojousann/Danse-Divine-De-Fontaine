 r_fontaine_bill_european_alliance: "§Y欧洲防御法案§!\n§g“无论谁死了，都是我的一部分在死去，因为我包含在人类这个概念里。因此，不要问丧钟为谁而鸣，丧钟为你而鸣。”\n——约翰·多恩§!"
 r_fontaine_bill_immigration_reform: "§Y移民法案§!\n§g“没有谁是一座孤岛，在大海里独踞；每个人都像一块小小的泥土，连接成整个陆地。如果有一块泥土被海水冲刷，欧洲就会失去一角，这如同一座山岬，也如同一座庄园，无论是你的还是你朋友的。”\n——约翰·多恩§!"
 r_fontaine_bill_labour_reform: "§Y劳动法修正案§!\n§g“当警察前来逮捕因先前逃脱的艾伦时，两人被迫再次逃亡。她伦绝望地认为他们的挣扎毫无意义，但流浪汉告诉她，在明亮的黎明时分，他们会沿着道路，走向充满风云变幻却充满希望的未来。”§!"
 r_fontaine_bill_president_system: "§Y宪法修正案§!\n§g“他说保守党政府获得了自由党人的支持，正在修改历书使每任总统可以在任一百年。他说政府终于与教廷达成协定，还有一位红衣主教从罗马被派来，而自由党的部长们都跪下来亲吻他的戒指并摄影存照。§!”"
