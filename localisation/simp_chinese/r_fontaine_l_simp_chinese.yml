 liberal_conservatism: "自由保守主义"
 liberal_conservatism_desc: "自由与保守在许多语境下是一对矛盾的反义词，但在自由保守主义则未必如此。遵循经济自由主义的小政府大市场，融合强调家庭、宗教和社区等体制的传统价值观，自由保守主义这一复合名词便作为一种通用的语言进入政界。与一般意义上的社会保守派相比，自由保守主义者可以在进步议题上以开明姿态做出妥协，但激进的变革从来不在其考虑范围之内。"
