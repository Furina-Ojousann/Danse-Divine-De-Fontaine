 FRA_renew_neuvillette_plan: "那维莱特计划"
 FRA_renew_neuvillette_plan_desc: "我们做出了让步，但不意味着我们与共产主义者同路。在不损害私人财产的前提下，我们欢迎任何形式的社会保险，福利或是劳动法调整，因为这根源上会刺激人类对此做出反应。那维莱特计划提倡企业家精神——并非以精神治国，在私有财产安全的情况下，对私人财富的追求扩大总生产，我们需要的经济增长亦来源于此。"
 FRA_renew_navia_plan: "娜维娅计划"
 FRA_renew_navia_plan_desc: "娜维娅认为安全地与“有分寸”的共产党人合作会有好处——凯恩斯学派将经济萎靡之病灶定位于消费，而消费不足可归结于分配的结构性弊病。共产党人在调整这种分配结构中会起到相当积极的作用，当然，我们最好保证他们不要失控。"
 FRA_renew_coordiantion_with_communists: "将工会纳入阵营"
 FRA_renew_coordiantion_with_communists_desc: "工会与共产党人实际上并不顽固，他们在之前都表现出过融入政府的强烈意愿。如果从另一个方面评估，他们的政策对国体几乎无害，而效用广泛，镇压之而将其激进化也许并不明智。是时候把这些所谓的“愿意合作的左翼”接纳进入政府，从而削弱整个左翼的威胁。"
 FRA_renew_start_rearmament: "战时计划经济"
 FRA_renew_start_rearmament_desc: "计划经济，听起来没有什么比这更恐怖了，对吧？不过，娜维娅在议会的声明一定程度上消除了这种误会：在长期而广泛的战争中，指令可以比市场迸发出高得多的效率。并且，计划状态在战后完全可以随时解除，各大产业蒙受的损失如数奉还，国家根本绝不会产生动摇。"
