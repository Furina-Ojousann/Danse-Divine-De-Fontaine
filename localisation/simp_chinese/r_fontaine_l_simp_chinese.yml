 FRA_renew_furina_in_Palais_de_l_Elysee: "芙宁娜在爱丽舍宫"
 FRA_renew_furina_in_Palais_de_l_Elysee_desc: "不必去多解释什么，要做的第一件事便是承认一个既定事实——芙宁娜赢得了全部国民的一致喜爱。第三共和国自诞生以来，还从未有过一个能够团结起大众的魅力型领袖，也许芙宁娜·德·枫丹作为共和国新总统，可以弥合内部分裂。"
 FRA_renew_strengthen_the_president_power: "枫丹共和国\n三六年宪法修正案"
 FRA_renew_strengthen_the_president_power_desc: "芙宁娜的智囊团，其中最重要的一位——那维莱特认为现行宪法必须修正：芙宁娜的权力不来自于错综复杂的立法机构，她的魅力才是事实上的根基，也就是所谓民意——这样，现行的议会制便显得不合时宜，而总统制，作为可以有效加强集权的制度已被正式提请。"
 FRA_renew_the_parliament_issue: "可靠盟友？"
 FRA_renew_the_parliament_issue_desc: "即使是芙宁娜的嫡系——旧枫丹人也无法保持团结。几乎是立刻，他们便因政见不一迅速被左右翼吸收，中立力量并不强大。想要在这一片混乱的共和国中真正做点什么，就必须这一个靠谱的盟友——共产党？工人国际？或者是那些整合主义者？无论是谁，联合政府都只能是唯一选择。"
 FRA_renew_labour_law_reform: "沫茫协议"
 FRA_renew_labour_law_reform_desc: "左翼壮大得令人担忧。即使现在他们依然可以与我们保持合作，然而坐视工会，共产党，和共产国际扩张并不明智。为了防止左翼进一步激进化，劳动法改革是一个不错的突破口。"
 FRA_renew_tripartite_consultation_of_blum_clorinde_viollette: "公民权三方协定"
 FRA_renew_tripartite_consultation_of_blum_clorinde_viollette_desc: "劳动力不足的问题一直困扰着共和国经济的发展。显然，征集殖民地工人，并且以公民权作为交换会是一种不错的方案。莱昂·布鲁姆联合阿尔及利亚总督莫里斯·维奥莱特起草了一份给予阿尔及利亚穆斯林公民权的提案，并且得到了克洛琳德的支持。也许这会让劳动力短缺有所缓解。"
 FRA_renew_the_6th_1934_Feb: "三四年重演"
 FRA_renew_the_6th_1934_Feb_desc: "1934年2月6日暴乱这道伤痕还未过去三年，共和国又添一道新伤：大规模政治暴力又一次在街头上演，他们殴打议员，试图占领马提尼翁宫，打出横幅“布鲁姆就是犹太猪”，“克洛琳德是共产党的傀儡”，“共产国际的触手已经捆住共和国”。仅在7日一天，便有多达12人在大街上毙命，最终宪兵队抓住参与暴乱的君权行动，火十字团，以及少数极左翼恐怖分子两百余人，亟需审判。"
 FRA_renew_judge_trial_of_200: "四十七人团审判"
 FRA_renew_judge_trial_of_200_desc: "尽管宪兵队在暴乱中逮捕了超过两百人，但经过调查，其中的大部分都没有明显的罪责，简单问话以后便重获自由。但这两百人中的四十七人却切实犯下了谋杀，抢劫等罪行，面临最高检的指控。他们大多具有明确的政治立场，火十字团成员，或是准军事组织骨干，这让这场审判沾染浓厚的政治意味。"
 FRA_the_unforgettable_1871: "无法忘却的1871"
 FRA_the_unforgettable_1871_desc: "正如共和主义者将大革命当作祖国共和诞生的元年，社会主义者永远无法忘记1871年，他们理念的第一次建立政权的实验。那次他们在市政厅里写成《国际歌》，今天，他们唱着同样的曲子重回市政厅。"
 FRA_renew_order_prevails_in_Paris: "巴黎秩序井然"
 FRA_renew_order_prevails_in_Paris_desc: "巴黎安静了。\n协和广场没有右翼分子实施暴行，公社墙前无人悼念，天穹几抹浮云，宁静。总之，一切终于慢下来了......"
