 FRA_renew_african_expedition: "非洲远征"
 FRA_renew_african_expedition_desc: "一些未曾被注意到的边缘角落也许蕴藏着难以想象的价值，比如我们广袤的非洲殖民地。在本土产能几近饱和的情况下，有必要将效益底下的产业迁移至殖民地，以降低生产成本，而我们只需要通过法郎这一有力武器回收利润，便可以缓解危机。"
