 FRA_renew_invade_belgium: "弗兰德斯的罂粟田"
 FRA_renew_invade_belgium_desc: "一千万人被埋葬于弗兰德斯田野中。挺过荒芜的冬天，来年春暖花开，在四国战士的尸骨上种出又一年鲜艳盛开的罂粟花。不想再要有一千万人中的三分之一如同他们的父亲一般死去，便只有提前进入这片土地，构筑坚不可摧的防线，从此死去的只有我们的敌人。"
 FRA_renew_the_old_alliance: "旧帝国盟约"
 FRA_renew_interface_spain: "马德里的海燕"
 FRA_renew_advance_military_budget: "无限国防预算"
 FRA_renew_ussr_alliance: "与巨人同行"
 FRA_renew_expand_metropolis_police: "巴黎大都会警察"
 FRA_renew_expand_metropolis_police_desc: "大巴黎地区的治安恶化不是近几年新兴的状况，应该说自从这座城市建立起来，便可以被贴上所谓罪恶之都的标签。无数生活条件极端恶劣，蜗居在快速城市化时期草草用钢板与木条搭建起来的贫民窟中的贫民，因饥寒交迫而作恶，让巴黎这座原本美丽的城市匪患横行。我们不否认司法不公在其中可能起到了推波助澜的作用，然而柔性的政党无法在当下这个特殊的时刻快速起效，我们不得不为警察调拨更多预算，祈祷他们可以遏制住城市中的犯罪风潮。"
 FRA_renew_mandatory_military_training: "强制军事训练"
 FRA_renew_integrate_political_parties: "举国一致"
 FRA_renew_master_the_atom: "真理不言自明"
 FRA_renew_concern_the_far_east: "制止无穷野心"
 FRA_renew_secure_domestic_safety: "保障国内安全"
 FRA_renew_secure_domestic_safety_desc: "共和国无意进一步朝着专制的方向更进一步，然而谁知道在见证法西斯主义快速的富国强兵之后，会有多少被民族主义狂热感染，在即将到来的战斗中选择背叛祖国，转而为德国人效命，只为带来他们被所谓共和新生叙事掩盖着的仇恨与疯狂？也许德国或是意大利的间谍系统早已在暗中建立起覆盖全国的合作网络，而我们一无所知？如果要真正捍卫我们引以为豪的民主政治，就要在危难关头牺牲一些。"
 FRA_renew_form_a_new_kind_of_worship: "新的崇拜？"
 FRA_renew_form_a_new_kind_of_worship_desc: "不不不...芙宁娜与用一切手段将自己塑造成神的希特勒，斯大林不一样...绝对不一样，绝对。那些独裁者不过是肆意彰显自己阳刚的暴力，民众本因恐惧而颤抖，不过是自我保护使得这种惧怕变成了狂热的崇拜。枫丹的子民信奉的决不是这样野蛮的逻辑，所有人都信任她，喜爱她。她对这份信任或者喜爱的回应不是被合理化的奴役，不会让她的国民在战争中流血致死或是在工厂中劳累致死...她将带来公众的福祉，把一盘散沙的枫丹人民团结在一起，而这些，只需一些小小的技术手段，就可以发挥出强得多的效果。"

 RFP_navia_plan_boost_consumption: "£texticon_navia §Y娜维娅§!计划：达成$Consumption_TITLE$目标"
 RFP_navia_plan_boost_consumption_trigger: "$Consumption_TITLE$目标进度已达到§Y100%§!"
 RFP_navia_plan_boost_consumption_desc: "当一个经济体消费不足时，会带来货币流通速度的问题，进而引发一系列负面效应。娜维娅计划的核心在于促进消费，让被转换为避险资产的货币重新流动起来。\n\n§W当前进度为：§!§Y[?R_Fontaine_Consumption_Progress_Total|%]§!\n§W每月推进：§!§Y[?R_Fontaine_Consumption_Monthly_Progress|%]§!"

 RFP_navia_plan_boost_labour: "£texticon_navia §Y娜维娅§!计划：达成$Labour_TITLE$目标"
 RFP_navia_plan_boost_labour_trigger: "$Labour_TITLE$目标进度已达到§Y100%§!"
 RFP_navia_plan_boost_labour_desc: "社会稳定的前提是劳动关系的平衡。通过建立三方协商机制，让雇主、工会与政府在工资、工时与岗位保障上达成可执行的共识。\n\n§W当前进度为：§!§Y[?R_Fontaine_Labour_Progress_Total|%]§!\n§W每月推进：§!§Y[?R_Fontaine_Labour_Monthly_Progress|%]§!"

 RFP_navia_plan_boost_price: "£texticon_navia §Y娜维娅§!计划：达成$Price_TITLE$目标"
 RFP_navia_plan_boost_price_trigger: "$Price_TITLE$目标进度已达到§Y100%§!"
 RFP_navia_plan_boost_price_desc: "粮食、燃料与生活必需品价格的剧烈波动会破坏民心。设定临时价格带与配给红线，使复苏过程保持温和与可控。\n\n§W当前进度为：§!§Y[?R_Fontaine_Price_Progress_Total|%]§!\n§W每月推进：§!§Y[?R_Fontaine_Price_Monthly_Progress|%]§!"

 RFP_navia_plan_boost_finance: "£texticon_navia §Y娜维娅§!计划：达成$Finance_TITLE$目标"
 RFP_navia_plan_boost_finance_trigger: "$Finance_TITLE$目标进度已达到§Y100%§!"
 RFP_navia_plan_boost_finance_desc: "重组高风险银行，隔离坏账，恢复信贷体系的流动性。金融秩序的稳定，是整个经济恢复的基础。\n\n§W当前进度为：§!§Y[?R_Fontaine_Finance_Progress_Total|%]§!\n§W每月推进：§!§Y[?R_Fontaine_Finance_Monthly_Progress|%]§!"

 RFP_navia_plan_boost_trust: "£texticon_navia §Y娜维娅§!计划：达成$Trust_TITLE$目标"
 RFP_navia_plan_boost_trust_trigger: "$Trust_TITLE$目标进度已达到§Y100%§!"
 RFP_navia_plan_boost_trust_desc: "政府的承诺必须可信。预算的执行与偿付的节奏决定了国家信用的价值——维持秩序比扩张更重要。\n\n§W当前进度为：§!§Y[?R_Fontaine_Trust_Progress_Total|%]§!\n§W每月推进：§!§Y[?R_Fontaine_Trust_Monthly_Progress|%]§!"

 RFP_navia_plan_boost_tax: "£texticon_navia §Y娜维娅§!计划：达成$Tax_TITLE$目标"
 RFP_navia_plan_boost_tax_trigger: "$Tax_TITLE$目标进度已达到§Y100%§!"
 RFP_navia_plan_boost_tax_desc: "税收既是国家的筋骨，也是经济调节的杠杆。对囤积征附加税，对新增雇佣设抵免，引导资本流向生产。\n\n§W当前进度为：§!§Y[?R_Fontaine_Tax_Progress_Total|%]§!\n§W每月推进：§!§Y[?R_Fontaine_Tax_Monthly_Progress|%]§!"

 RFP_navia_plan_boost_trade: "£texticon_navia §Y娜维娅§!计划：达成$Trade_TITLE$目标"
 RFP_navia_plan_boost_trade_trigger: "$Trade_TITLE$目标进度已达到§Y100%§!"
 RFP_navia_plan_boost_trade_desc: "外部结算体系关乎物资生命线。限制短期资本流动，优先保障粮食与药品进口，避免复苏被外部波动吞噬。\n\n§W当前进度为：§!§Y[?R_Fontaine_Trade_Progress_Total|%]§!\n§W每月推进：§!§Y[?R_Fontaine_Trade_Monthly_Progress|%]§!"

