 UE: "欧陆协约"
 come_up_european_unity: "成立欧洲联盟"
 come_up_european_unity_desc: "为了解决欧洲大陆长久以来各个民族的冲突，在结束这场毁天灭地，荼毒生灵的大战以后，一个超越主权国家的政治实体应该被建立。这个联盟应将会平等地对待各民族，通过民主指定同步的而富有基于地区差别的政策。"
 all_UE_need_states_are_controlled: "控制全部[FRA.GetName],[GER.GetName],[ITA.GetName]的初始核心地区"
 FRA_renew_furina_in_Palais_de_l_Elysee_tt: "允许在决议中查看枫丹§Y国民议会§!情况\n§Y国民议会§!立刻进行一次§Y解散重新选举§!"
 fontaine_liberalist_party: "枫丹联盟 (CF)"
 fontaine_liberalist_party_long: "枫丹联盟 (Coalition De Fontaine)\n§W--------------§!\n\n\n\n£textillustration_CF_desc\n\n\n\n\n§L一个具有最久远民主传统的国家，今天因最狂热的个人崇拜诞生了一位新总统。个人崇拜与民粹主义的结合，在古罗马诞生过凯撒，在现代诞生了阿道夫·希特勒与贝尼托·墨索里尼。纵使芙宁娜本人并不是一位独裁者，民众对她的喜爱与崇拜让她的权力超越了一切专制领袖，哪怕她自己尚未意识到。\n这个名词叫做“凯撒主义”，几个世纪以来早已多有批判，G·K·却斯特顿在他的著作《Heretics》中对凯萨主义作了最响亮的谴责，称之为“最恶劣的奴隶制”。这并非夸张，因为在这种制度下，统治者与被统治者彼此以幻觉相连：前者以为自己获得了绝对的爱戴，后者以为自己参与了神圣的意志。民主因此情感为根，诉诸激情。\n枫丹联盟正是在这种语境下诞生的。自称继承共和的理想，实则以共和的外衣包裹对领袖的崇拜；在议会中占据多数，却在精神上依赖一人的魅力。有人称这是“以美德为名的政治”，也有人称这是“礼仪化的独裁”。\n然而，枫丹联盟的悲剧并非出自恶意。芙宁娜的支持者真诚地相信她代表善、代表理性、代表一切可以避免混乱的力量。他们把国家的命运寄托在一个人的判断上，并由此获得了安全感。正是这种安全感，使得权力可以不经意地集中、制度可以悄然地被改写。芙宁娜本人并未命令人屈服，民众却主动屈服于她的形象。§!\n§W-------------§!\n"

 ###########################################################################################################################################
 
 fontaine_liberalism_navia_party: "枫丹联盟 (CF)"
 fontaine_liberalism_navia_party_long: "枫丹联盟 - 刺玫协约 (Coalition De Fontaine - Alliance Rosula)\n§W--------------§!\n\n\n\n£textillustration_fontaine_liberalism_navia\n\n\n\n\n§L枫丹联盟是一个混杂有着不同诉求，意识迥然各异人们的政治大帐蓬，而刺玫协约是这一大帐蓬中§p进步§!的声音。“总裁”£texticon_navia §Y娜维娅·卡斯帕§!是这一派系的核心，政见不同者对她多有非议诽谤，而这些异见多出自非议者本身世界观之局限，而非娜维娅本人有足以扳倒她的黑料。§!\n§W-------------§!\n"
 fontaine_liberalism_navia: "枫丹自由主义"
 fontaine_liberalism_navia_desc: "人们把娜维娅·卡斯帕的理念称作“枫丹自由主义”，它继承了西奥多·罗斯福的进步意向，警惕权力的过度集中，又不满足于把不公全部交给市场自行消化。它把种族、性别、性少数这些词放进政治讨论里，也并非为了标榜道德，是差异在工资、雇佣、迁徙与保障中留下的痕迹，赋予了其被改变的必要性。\n\n娜维娅并不急着给这些差异一个终极解释。她更习惯把它们当作是一种能够被纳入公共议题的社会现实，最终成为完善制度的一部分。市场并不会因忽视变得更自由，只是偏袒。这也是她与社会主义之间始终存在的距离。她不相信一夜之间的重塑，不相信彻底否定既有结构就能换来正义。她依旧信任枫丹共和国的宪政框架；对她而言，干预也不是对市场的否定，它更接近与一种修补。\n\n所以当人们用最简单、也最粗暴的方式定义她时，她并不会急着反驳。她并不在乎，因为语言迟早失效，制度是否发生了变化——工资是否更公平，工作是否更安全，身体是否不再被默认为某种资源——才是她真正关心的。"

 fontaine_liberalism_neuvillette_party: "枫丹联盟 (CF)"
 fontaine_liberalism_neuvillette_party_long: "枫丹联盟 - 保守本流 (Coalition De Fontaine - Courant Conservateur)\n§W--------------§!\n\n\n\n£textillustration_fontaine_liberalism_neuvillette\n\n\n\n\n§L尽管冠以自由之名义，以那维莱特为核心的保守本流更注重维持社会秩序的稳定。他们并不拒绝听取人群与议会的声音，相反，如若一项新的社会议题有利于持续稳定，他们非常乐意做出妥协。§!\n§W-------------§!\n"
 fontaine_liberalism_neuvillette: "枫丹自由主义"
 fontaine_liberalism_neuvillette_desc: "大革命的时代已然远去，所谓民主，从议会坐席与断头台，转移到公共议题的社会讨论。这种转变发生时，民主才能被称之为成熟。因为它杜绝了民粹主义空洞的承诺，或者将政治简单化为左右两种光谱的单纯对立。那维莱特，国民议会议长，是成熟的具象化代表。那维莱特从不主动质疑现存事实，只有当一种诉求转化为公议，声音被国民议会所听取时，才会表现得宽容而接纳，以社会稳定作为准则，进行足够的衡量与评估。\n\n可世界上总是存在着那维莱特无法听见的声音。它们也许是被粉饰所淹没，被刻意忽略，甚至从未被说出口，只是一种怨念，深埋心中。它如此广泛，以至于无数人无需演说便成为了共识，成立组织，发起运动，去质疑那维莱特深信不疑的“常识”——稳定，秩序，与市场法则。"

 fontaine_liberalism_charlotte_party: "枫丹工党 (PTF)"
 fontaine_liberalism_charlotte_party_long: "枫丹工党 - 公议联盟 (Parti travailliste De Fontaine - Alliance pour les questions sociales)\n§W--------------§!\n\n\n\n£textillustration_fontaine_liberalism_charlotte\n\n\n\n\n§L公议联盟源自于枫丹的社会记者们。在枫丹社会主义发展过程之中，这一群体从无组织走向制度化，成为在文化秩序上挑战资本主义话语的先锋。他们将文化视作与经济同等重要的斗争形式，也更尊重议会制的民主原则。§!\n§W-------------§!\n"
 fontaine_liberalism_charlotte: "枫丹自由主义"
 fontaine_liberalism_charlotte_desc: "我们生活方方面面都被一种名为“常识”的锁链所束缚，即便有人炫耀在受缚的范围内他们可以如何自由地行事，可永远也无法窥见没有锁链的生活，因为锁链早已成为他们身体的一部分。切割这一锁链的过程很痛苦，因为抛弃常识之痛，无异于血肉从皮肤分离。但如若真的拼尽全力，舍弃半条生命向远方奔去，才会顿觉天地宽广，人类思绪原来可以如同遨游天空般如此悠远宽广，这被夏洛蒂·阿黛尔称作“自由”。\n\n原本市场价值的铁律是“锁链”的最大一环，它最是难以摧毁，不仅融入肌肤，更是侵入骨髓，成为人类大脑的一部分，结合层次如此之深，以至于有人将贪婪视作不可动摇的本能。这一切终将被重构，只是全世界最为优秀的大脑，尚且需要足够时间思考此局的破解之法。在此之前，即便依旧身负沉重窒碍，枫丹至少终于开始前进。"

