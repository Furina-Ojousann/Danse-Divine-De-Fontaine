 FRA_DM_Navia_Economic_Proposal_desc: "时至二十世纪中期，学界对经济运作的认识进一步提升。经济学家们达成共识，萧条的本质是有效需求乏力，虽然还存在着一些不同的声音，然而可以明确的是，紧缩财政已经被抛弃，而积极刺激则是提振经济的唯一方式。\n\n枫丹联盟议员£texticon_navia §Y娜维娅·卡斯帕§!，枫丹共和国最富盛名的自由主义与财政积极主义者，针对共和国存在的一系列经济弊病，提出了一套系统性的解决方案。它堪称激进地主张依赖消费与政府干预刺激经济增长，而为了达到这些目标，计划还广泛涉及到£texticon_syndicalism §r劳资关系§!调整，£texticon_feminism §p性别§!与£texticon_nationalism §Y民族§!等交叉领域。\n\n计划并不会受到所有人欢迎，但在如今，这的确是唯一一套成体系的系统治理方案。"
