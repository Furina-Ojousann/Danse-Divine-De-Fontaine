 FRA_DM_Clorinde_Economic_Proposal: "克洛琳德计划"
 FRA_DM_Clorinde_Economic_Proposal_desc: "军备重整，一个多数枫丹人只要提起，便会摆出一副嫌恶表情的名词。法西斯主义的崛起引起了一部分人的警觉，可多数枫丹人面临的压力，至少从表面上来说，不直接来自于法西斯主义的压迫。打仗就是打钱，所谓大国争霸，国际秩序，归根结底，不过是比拼哪个国家，能够在战争——这一人类历史上对经济杀伤最大活动中撑的更久。无数原本可以用于投资的资源，被投入到看不见尽头，且回报也无法预测的军备重整中。\n\n国民对地缘安全正遭受威胁这一事实心知肚明，然而真的要为了准备明天虚无缥缈的战争，连今天一口来之不易的残羹剩饭，也要被剥夺吗？§1克洛琳德§!不情愿背负“抢走婴儿奶粉的女人”这一恶名，然而即使最肮脏的事务，也终归要有人去执行。§H大小姐§!要保全自己洁白无暇的声誉，§3大总统§!要维持自己在国民心中的形象，那么军备重整的推手，就只能是...§1克洛琳德§!。"
