 fra_focus_on_furina: "世纪焦点"
 fra_focus_on_furina_desc: "“芙宁娜·德·枫丹，不只是我们的总统，更是备受国民爱戴的明星，是推动科学进步的英才，是世界和平和国际合作的卓越贡献者；最重要的是，她是枫丹的女儿。”\n\n纵观人类历史，国家的领袖，一般以君主或是帝王形象出现，总是被刻意塑造为民众崇拜的对象。只不过在民主革命的时代之前，崇拜总是和宗教紧密联系在一起；之后，则以广泛的大众传媒替代之。在枫丹，除了报纸，海报与广播这类最为普及的媒体中，芙宁娜的身影还出现在剧院与新兴的电影中。这些优秀的技术条件让芙宁娜的形象迅速深入人心，至于当下益处于未来的弊端...谁知道呢？\n\n§W$MODIFIER_STABILITY_WAR_FACTOR$：§![?FOF_MODIFIER_STABILITY_WAR_FACTOR|%+=]\n§W$MODIFIER_WEEKLY_CASUALTIES_WAR_SUPPORT$：§![?FOF_MODIFIER_WEEKLY_CASUALTIES_WAR_SUPPORT|%+=]\n§W$MODIFIER_WEEKLY_CONVOYS_WAR_SUPPORT$：§![?FOF_MODIFIER_WEEKLY_CONVOYS_WAR_SUPPORT|%+=]\n§W$MODIFIER_WEEKLY_BOMBING_WAR_SUPPORT$：§![?FOF_MODIFIER_WEEKLY_BOMBING_WAR_SUPPORT|%+=]\n§W$MODIFIER_ACE_EFFECTIVENESS_FACTOR$：§![?FOF_MODIFIER_ACE_EFFECTIVENESS_FACTOR|%+=]\n§W$MODIFIER_GRANT_MEDAL_COST_FACTOR$：§![?FOF_MODIFIER_GRANT_MEDAL_COST_FACTOR|%+=]\n§W$MODIFIER_MIO_DESIGN_TEAM_ASSIGN_COST$：§![?FOF_MODIFIER_MIO_DESIGN_TEAM_ASSIGN_COST|%+=]\n§W$faction_influence_power_factor$：§![?FOF_faction_influence_power_factor|%+=]"
