 FRA_return_the_guangzhou_bay_kmt: "广州湾谈判"
 FRA_return_the_guangzhou_bay_kmt_desc: "枫丹本着弥补过去罪业的态度，着手废除《中法互订广州湾租界条约》，从而向中国归还广州湾一代。"
 FRA_return_the_guangzhou_bay_cpc: "广州湾谈判"
 FRA_return_the_guangzhou_bay_cpc_desc: "枫丹本着弥补过去罪业的态度，着手废除《中法互订广州湾租界条约》，从而向中国归还广州湾一代。"
 FRA_mediate_2nd_sino_jap_war: "调停第二次中日战争"
 FRA_mediate_2nd_sino_jap_war_desc: "日本的侵略行为必须得到遏制，要维持东亚的和平，就必须站在中国一方调停。"
 FRA_liberate_indochina: "解放印度支那"
 FRA_liberate_indochina_desc: "近几年来越南反帝反殖民运动愈加剧烈，说明我们在东亚的统治已经风雨飘摇，摇摇欲坠了。既然世界的民族独立是未来，不如提前顺应大势给予他们自由。"
 FRA_support_indo_independence: "支援印度独立"
 FRA_support_indo_independence_desc: "文案填充中..."
 FRA_liberate_indonesia: "支援印度尼西亚独立"
 FRA_liberate_indonesia_desc: "文案填充中..."
 FRA_antifascism_propose_through_the_pacific: "环太平洋反法西斯倡议"
 FRA_antifascism_propose_through_the_pacific_desc: "太平洋西岸亦受到了法西斯的严重威胁，要绞杀这股实力，仅靠中国不行；必须联合太平洋沿岸所有民主国家与正在争取民族解放的势力，才能打败这股邪恶的力量。"
 FRA_interfere_chinese_civilwar_kmt: "干涉中国内战"
 FRA_interfere_chinese_civilwar_kmt_desc: "是时候帮助国民党彻底清剿中国国内割据的军阀了，作为中国唯一的合法，受到国际社会的广泛承认的政府，国民政府毫无疑问会带领中国驱逐帝国主义，走进现代化。"
 FRA_interfere_chinese_civilwar_cpc: "干涉中国内战"
 FRA_interfere_chinese_civilwar_cpc_desc: "国民政府的统治阶级同时扮演着很多角色，首先他们是大官僚，再是大资本家，再是大地主，还隐藏着买办的性质。这样的政府不能为中国带来进步，更不能驱逐帝国主义，现代化也是天方夜谭。最有可能实现这些目标的，是代表中国先进生产力的共产党，但目前共产党在工业，武器上与国民政府相差不小，为了实现我们帮助中国人民获得解放的目标，我们必须无条件地在内战中支持共产党。"
 FRA_judge_the_war_crimes: "审判战犯"
 FRA_judge_the_war_crimes_desc: "也许在某个世界中，战胜的他们会成为历史书中的英雄，但没有一个反法西斯的人民会忘记他们所犯下的残酷罪行，所一手制造的人间惨剧，他们理应得到最严厉的审判。"
 FRA_focus_on_applied_physics: "聚焦应用物理"
 FRA_focus_on_applied_physics_desc: "一个世纪以来，人类进入了科学的黄金时代。科学家们一步一步地探求世界的本质，得出了大量防止四海皆准的真理，只是人类尚未没有将绝对的真理转化为切实的力量，但这一天迟早会到来，我们不能在这方面落后与其他大国。"
 FRA_focus_on_theoretical_physics: "聚焦基础科学"
 FRA_focus_on_theoretical_physics_desc: "基础科学是人类认识这个世界本身，以及如何运作的武器，上至天体，下至粒子，都会遵循同一套真理，被物理规律所支配，被数学所描述，尽管人类在这方面已经取得了巨大的成就，但不完美的数学与物理证明人类仅仅理解了这个世界微乎其微的一部分，因此，打磨基础科学这把认识世界的利剑依然是科学家们的任务，我们不能急于将真理转化为杀人的武器，因为即使基础科学取得一点微小的突破，就足以确立我们对其他国家的巨大优势了。"
 paternalistic_conservatism: "家长制保守主义"
 paternalistic_conservatism_desc: "家长制保守主义认为社会秩序不是靠个人权利维系的，而是根植于传统、宗教与等级结构中的自然责任。国家的首要职能不是保障抽象自由，而是维护社会稳定、文化传承与道德规范。在这种理念下，统治者应当像“仁慈的父亲”对待国民——提供基本保障与社会福利，但也要求服从、忠诚与克制。\n\n这一思想往往将自由市场视为不稳定的激进力量，提倡“责任资本主义”，即鼓励企业承担社会义务，避免过度剥削与阶级对抗。它支持渐进改革而非剧烈变革，并试图在保留既有权威结构的同时，减缓社会矛盾。\n\n家长制保守主义是一种“被美化的统治逻辑”——它用恩惠掩盖了结构性的不平等，把统治描绘为责任而非利益。但其确实能在特定历史阶段内，减缓资本主义对社会组织的破坏，提供短期稳定。"
 resister: "反抗者"
 comrade_state: "战友国"
 nominal_leader: "虚君总理"
 kamisama_forever: "笼中之鸟"
