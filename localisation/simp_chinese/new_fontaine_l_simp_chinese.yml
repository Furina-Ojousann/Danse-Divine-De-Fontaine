 FRA_rethink_our_republican: "反思我们的共和"
 FRA_rethink_our_republican_desc: "这是一个“生于不义”的共和国，它诞生于镇压巴黎公社的枪火之中，勾连与践踏这片土地的入侵者，因而，它有了“原罪”。因为自诞生起就背负着千万人民的血债，它才需要被救赎。这个救赎的方法，不是宗教，不是自我开脱，而是做出切实的行动去改变。"
 FRA_judge_the_crime_of_people: "裁断世人的罪责"
 FRA_judge_the_crime_of_people_desc: "共和国诞生的过程是痛苦的。过去一百年我们再看这幕悲剧，无非是枫丹人残杀枫丹人。可这两伙人，孰对孰错？"

 FRA_so_where_to_go: "那么，该怎么做？"
 FRA_so_where_to_go_desc: "问题就静静地躺在那里，勇敢地把它说出来是个了不起的举措，但大家都是枫丹人，都并非不了解枫丹的情况。只是提出来，是没有任何意义的。困扰芙宁娜的，是如何改变它。"
