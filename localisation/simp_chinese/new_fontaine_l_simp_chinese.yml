 FRA_offer_support_equipment: "提供人道主义援助"
 FRA_mediate_on_chinese_s_side: "站在中国一方调停"
 FRA_send_volunteers_to_china: "赴中志愿军"
 FRA_declare_war_on_japan: "对日宣战"
 FRA_judge_the_war_crimes_category: "审判-第二场"
 FRA_judge_the_war_crimes_category_desc: "无论战犯如何辩解，狡称自己是如何在为祖国服务，杀害众多生灵，残酷压迫占领区的各个民族都是已经既成不变的事实，仅从这一点来说，审判，给予他们应有的下场，便是必要的。"
 FRA_convene_judges: "召集法官团"
 FRA_republican_virtue: "注意美德"
 FRA_republican_virtue_desc: "我们共和国的灵魂应该是美德，笼统地讲，它是对祖国，对自由，对平等的爱。在文化上，政府的工作应该聚焦在巩固与发展美德上。"
 FRA_someone_very_important_ger: "审判德国战犯"
 FRA_focus_on_applied_physics_tt: "§Y枫丹动能工程科学研究院§!追加效果:\n生活消费品工厂系数:§Y+10%§!"
