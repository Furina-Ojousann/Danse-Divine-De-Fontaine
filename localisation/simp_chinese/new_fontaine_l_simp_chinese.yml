 FRA_to_unite_the_ring_wing: "团结维系者"
 FRA_to_unite_the_ring_wing_desc: "右翼各有不同的主张，就拿最具有代表性的来说，莫拉斯的主张就和罗克大相径庭，因而很难找出一个能够代表整个右翼的人物。不过新枫丹人也有可以争取代理人来团结右翼派系，以便赢得即将到来的大选，也许...阿蕾奇诺会是个不错的选择？"
 FRA_journey_to_find_votes: "寻票环游记"
 FRA_journey_to_find_votes_desc: "我们必须让民众们认识到枫丹正面临着共产党迫切的威胁，并大展保护人民劳动成果的大旗，来为选举争取到一些优势。"
 FRA_fontaine_need_order: "枫丹急需秩序！"
 FRA_fontaine_need_order_desc: "暴乱，无谓的抗争，毫无意义。人为了一己私欲，可以肆无忌惮地破坏这个社会的法律与秩序，这不是恶德又是什么呢？必须出重拳制服这些暴乱分子。"
 FRA_the_law_protector: "法律执行者"
 FRA_the_law_protector_desc: "阿蕾奇诺似乎找到了一个完美的政治盟友——他认为蔑视法是诸多恶行中最为不可容忍的一个，作为典狱长，莱欧斯利需要的是有序，无论是什么样的秩序，他都漠不关心。然而唯一确定的一点是，混乱是他无法容忍的。"
 FRA_an_emporor_not_a_president: "一位皇帝"
 FRA_an_emporor_not_a_president_desc: "她不是某个选票的产物，也不是任期的囚徒。她是整个民族的形象、意志与命运的化身。在她的存在面前，分歧沉默，派系退场——只有一面旗帜、一颗心。这不是民主的轮换，而是皇冠的延续。"
 FRA_an_empire_not_a_nation: "一个帝国"
 FRA_an_empire_not_a_nation_desc: "帝国不是边界的集合，而是秩序的来源。它高于各地的习俗，跨越语言与血脉的差异，将一切编织成单一的律法与忠诚。枫丹不再是某片土地的名字，而是世界政治格局中最沉重的坐标。"
 FRA_a_morality_not_a_deal: "一种美德"
 FRA_a_morality_not_a_deal_desc: "服从不是交易，不以利益计算得失。它是一种美德，是对秩序与稳定的自觉守护。人们因信念而屈膝，而非因恐惧。在这种服从中，个人的意志融入整体，犹如河流入海——永远失去边界，却获得无限。"
 FRA_the_ceremony_for_a_new_king: "登基仪礼"
 FRA_the_ceremony_for_a_new_king_desc: "最终，她将成为我们的女皇。总统在过去是共和国最具权势的人；可一位凡人即使权势滔天，至多五十余年的统治无非白驹过隙。要形容一种高于一切的主权，比任何人类都要长久的统治，在语言学中唯有“皇帝”以此得以形容。"
 FRA_care_for_the_marsiable_life: "体谅国民苦难"
 FRA_care_for_the_marsiable_life_desc: "君主知晓，饥饿与寒冷能摧毁最忠诚的臣民。适度的让步，有限的修补，就能平息街头的嘈杂。"
 FRA_the_judge_of_sovereignty: "君主之策"
 FRA_the_judge_of_sovereignty_desc: "权力，不应漂泊在派系与委员会的桌面上。君主的意志，是主权的锚；一旦抛下，就没有回收的理由。"
 FRA_in_th_human_life: "在人间"
 FRA_in_th_human_life_desc: "施以救济，并非软弱，而是力量的延伸。当皇权俯身，民众抬头，忠诚就从感恩中生长。"
 FRA_a_little_progress: "一点进步"
 FRA_a_little_reform: "一点变革"
 FRA_listen_to_advice: "从善"
 FRA_coordination: "协作"
 FRA_inclusion: "包容"
 FRA_a_little_progress_desc: "鼓励女性走向工厂与办公室——这不仅是生产力的补充，更是失业者的借口。当责备有了对象，怨恨便失去方向。"
 FRA_a_little_reform_desc: "改善劳工的境遇，等于给他们更多的枷锁。工会可以存在，但必须歌唱于笼中。"
 FRA_listen_to_advice_desc: "有些声音，必须被允许存在——不为采纳，只为引导。言论的阀门，不是为了释放，而是为了控制。"
 FRA_coordination_desc: "大企业的利益与国家的利益，本就应是同一条脉络。卡特尔，不是腐败，而是将财富与权力集中到最听话人的手里。"
 FRA_inclusion_desc: "外来的劳力，如同廉价的齿轮，可以让机器不停运转。而当工资压到极限，抱怨就被分散在语言与血脉的裂缝里。"
 FRA_under_the_army: "在军装的阴翳之下"
 FRA_a_great_promise: "一个宏大承诺"
 FRA_splendid: "荣耀"
 FRA_under_the_army_desc: "近卫军是皇权的钢铁影子，越庞大，越无可置疑。当军靴踏遍宫殿与街道，任何声音都会自动降到耳语。"
 FRA_a_great_promise_desc: "旧大陆终将再次在巴黎的裙边下屈膝——至于那些异见者，不必浪费绞索，让他们参军。战场的硝烟，比审判更高效。"
 FRA_splendid_desc: "荣耀不是事实，而是被反复讲述的故事。当每一面旗帜都染上过去的胜利，未来就只能沿着胜利的轨迹前进。"
 FRA_blood_for_fontaine: "为枫丹流血"
 FRA_blood_for_fontaine_desc: ""
 FRA_work_for_furina: "为她而流汗"
 FRA_work_for_furina_desc: ""
 FRA_Hammer_and_anvil: "铁锤与铁砧"
 FRA_Hammer_and_anvil_desc: "我们需要制定一个迅速稳定南部边疆的作战计划——南部无论是国民军还是共和派，对于我们来说都是威胁。"
 FRA_watch_for_rhine: "守望莱茵"
 FRA_watch_for_rhine_desc: "莱茵河，这条美丽的河流，构建了枫丹北部的完美边疆，它在历史上被称作自然边界——现在，我们理应再度将疆土扩展至莱茵河东岸"
 FRA_apennines: "跨越阿尔卑斯"
 FRA_apennines_desc: "意大利民族解放运动曾深刻与法国革命关联，可如今它被另一个疯狂的独裁者统治，囚禁教宗，屠杀人民，我们会有重新将力量投射到亚平宁半岛的理由。"
 FRA_Trafalgar: "重回特拉法加"
 FRA_Trafalgar_desc: "特拉法加海战战败是大陆封锁未能持续，进而最终未能击败英国的直接原因，掌握制海权对于我们来说至关重要。枫丹原本就是水之国，不列颠的时代已经过去，现在统治海洋的将是枫丹人"
 FRA_we_bring_order: "我们将给予秩序"
 FRA_we_bring_order_desc: ""
 FRA_judge_the_evil: "给予恶魔的审判"
 FRA_judge_the_evil_desc: ""
 FRA_another_Leipzig: "破碎统一"
 FRA_another_Leipzig_desc: ""
 FRA_Borodino: "再一次，博罗季诺"
 FRA_Borodino_desc: ""
 FRA_the_flood_over_europe: "世界洪水滚滚"
 FRA_the_flood_over_europe_desc: ""
 FRA_glory_is_for_you: "而荣耀将向您俯首称臣"
 FRA_glory_is_for_you_desc: "女皇，芙宁娜。她现在做到了枫丹历史上诸多先贤从未做到的事——让整个欧洲臣服于巴黎。超越查理曼，超越路易十四，甚至超越拿破仑。近卫军带着钢铁般的纪律维护着这个大陆帝国任何角落秩序，看起来，帝国将同样以这样的面貌迎接下一个千禧年。而我们敬爱的女皇——芙宁娜，也将带着她的慈爱，永远陪伴枫丹人民。"
 FRA_socialist_republic: "法兰西社会共和国"
 FRA_socialist_republic_DEF: "法兰西社会共和国"
