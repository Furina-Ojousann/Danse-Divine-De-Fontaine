 fra_women_volunteer_service: "成立女子志愿服务团"
 fra_women_volunteer_service_desc: "在直接让女性进入战斗序列之前，我们可以先让她们做一些右翼相对不会那么激烈反对的工作。比如在托儿所的照看，操作防空炮或是负责运输工作。"
 fra_encourage_labour_women: "鼓励职业女性"
 fra_encourage_labour_women_desc: "在家照顾孩子并不是什么天经地义的事情，我们应该将阿蕾奇诺打造成职业女性的典范，鼓励更多女性走出家庭，进入工厂劳动。" 
 fra_women_spy: "地下工作者"
 fra_women_spy_desc: "欧洲的大部分国家父权观念依然根深蒂固，从来都不认为女性会构成什么威胁。这恰好对女性地下工作者的活动提供了相当的空间。"
 fra_fontaine_nursery: "托儿所工程"
 fra_fontaine_nursery_desc: "实际上，战时的儿童托管所比我们大部分人想象的重要得多，这意味着即使女性脱离家庭生活，子女也不会处于无人看管，自谋生路的境地。"
 fra_apporve_women_joint_fight: "《妇女同等服役法案》"
 fra_apporve_women_joint_fight_desc: "我们需要彻底通过立法来保障女性具备参军入伍，为战争做一切力所能及的工作的权利，战争中的功勋更够证明她们完全不是“缺少阳具的不完美男性”，而是具备完全自我主权的“第二性”。"
