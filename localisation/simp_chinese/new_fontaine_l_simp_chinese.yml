 JAP_1936_budget_desc: "昭和十一年度国家预算，军费与财政的矛盾已经暴露无遗。我们必须在扩军与维持经济之间做出抉择。"

### 分支一：扩张军备 ###
 JAP_contine_to_develop_military_industry_desc: "继续扩张军需产业是战争准备的必然要求。只有保证武器与弹药的源源不断，我们才能应对未来的冲突。"

 JAP_national_special_time_bond_desc: "通过发行特时国家债券，政府可以向社会筹集资金，以维持不断增加的军费开支。"

 JAP_special_calculation_desc: "设立特别会计处，将军费从一般会计中分离，确保军部经费不受议会与预算限制。"

### 日美会议（失败线） ###
 JAP_Nippon_America_convention_desc: "与美国的谈判以失败告终。今后的战争准备只能依靠本土与殖民地的极限动员。"

 JAP_south_china_sea_order_desc: "组织与征用南洋劳工，为帝国提供廉价而庞大的战时劳动力。"

 JAP_stabilify_the_occupyed_area_desc: "在占领地区推行共荣秩序，以安抚与统制相结合的方式维持帝国的统治。"

 JAP_save_resource_desc: "资源有限。我们必须实行彻底的节约与回收政策，以支撑战争体制的长期运转。"

 JAP_expand_social_mobilization_desc: "进一步扩大社会动员范围，从工厂到农村，所有国民皆需服从战争的需要。"

 JAP_simplify_design_desc: "通过取消繁琐的设计，简化不必要的改进，可以降低生产成本，加快军工产出。"

 JAP_general_control_desc: "确立国家对经济与社会的全面统制，所有产业与人力将统一纳入战时体制。"

 JAP_mobilize_teen_and_women_desc: "动员青年与妇女，使其进入工厂、田野与服务团体，为战争提供劳力支撑。"

 JAP_imperial_laborer_organization_desc: "设立帝国劳动服务团，将庞大的劳动力集中编制，统一分配至各个战时部门。"

 JAP_bet_the_fate_desc: "这是背水一战的抉择。我们将移除所有民用工厂，彻底转为军工生产，赌上整个国家的命运。"

### 分支二：经济改良 ###
 JAP_1st_budget_convertion_desc: "通过第一号预算修正案，尝试在财政与军费之间寻求新的平衡，缓和经济压力。"

 JAP_civilian_industry_desc: "实行经济分权，鼓励地方工业的发展，以减少对中央集权与军工的过度依赖。"

 JAP_nipponese_agriculturalism_desc: "推行日本农业主义，改善农村生产力，缓解粮食紧张，稳定社会根基。"

 ### 日美会议（成功线） ###
 JAP_Hanshin_Keihin_housing_plan_desc: "在阪神与京滨地区推进住房建设，既能改善民生，也能促进城市工业的发展。"

 JAP_publicize_new_cultivating_tools_desc: "推广新式农具，提高农业效率，增强农村对战争与社会的支撑力。"

 JAP_deal_with_zaibatsu_desc: "通过财阀拆分法案，限制大型财阀的垄断权力，促进经济更加均衡的发展。"

 JAP_worker_union_desc: "工会重新合法化，允许工人组织起来，争取自身权利，并成为体制内的缓冲力量。"

 JAP_trade_pact_with_usa_desc: "通过对美贸易协定，稳定与美国的经济关系，争取继续获得关键资源进口。"

 JAP_advance_quality_desc: "加强产品质量管理，使日本制造能够在国际市场上更具竞争力。"

 JAP_made_in_japan_desc: "通过统一标准与宣传，强化“日本制造”的品牌形象，提高国内外市场的认可度。"
 
 ### 通用发展型国策 ###
 JAP_western_nippon_priority_desc: "优先发展西日本地区的工业与城市建设。需要等待规划完成后，才能轮到东日本的开发。"

 JAP_eastern_nippon_priority_desc: "优先发展东日本地区的工业与城市建设。需要等待规划完成后，才能轮到西日本的开发。"

 JAP_Kure_Naval_Arsenal_desc: "扩张吴海军工厂，使其成为帝国最重要的造舰与修理基地之一。"

 JAP_Seto_Inland_Sea_desc: "在濑户内海沿岸建设工业带，形成集中而高效的工业集群。"

 JAP_Tokyo_metropolis_center_desc: "整备东京首都圈，使其成为全国的政治、经济与工业中心。"

 JAP_Yokosuka_Naval_Arsenal_desc: "扩张横须贺海军工厂，加强帝国海军的舰艇生产能力。"

 JAP_Manchuria_pact_desc: "推进满洲工业计划，利用当地资源，建设新的工业基地，强化帝国的战略纵深。"

 JAP_aircraft_manufacting_desc: "设立国营航空工厂，集中力量发展航空制造业，满足现代战争的需求。"

 JAP_chemisty_development_desc: "加强化学工业的研究与投资，扩大军需与民用领域的产能。"

