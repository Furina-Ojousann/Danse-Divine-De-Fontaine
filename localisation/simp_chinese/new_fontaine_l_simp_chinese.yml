 FRA_revolution_world_map: "国际主义"
 FRA_revolution_world_map_desc: "共产主义革命是一个全球阶级斗争的一部分，而不是单独的局部事件。而资本主义是一个全球体系，基于共同的阶级利益，因此所有国家的工人阶级必须团结世界范围的其他工人阶级进行斗争，才能用社会主义或共产主义取代之。"
 Map_North_America_tt_1: "§Y北美§!\n--------------\n\n\n\n£map_north_america_picture\n\n\n\n\n§L“维苏威公司在安丘里亚海岸的码头和香蕉种植园投入了大量资金，他们的代理人在总部所在的城镇建造了精美的房屋，迄今为止，他们一直与共和国友好合作，对双方都有利。”§!"
 Map_South_America_tt_1: "§Y南美§!\n--------------\n\n\n\n£map_south_america_picture\n\n\n\n\n§L“多年以后，面对行刑队，奥布里亚诺·布恩迪亚上校会想起他父亲带他去见识冰块的那个遥远的下午。”§!"
 Map_Africa_tt_1: "§Y非洲§!\n--------------\n\n\n\n£map_africa_picture\n\n\n\n\n§L“这就是我：空洞的眼窝，失去了对占有生活的希望，被撕得张开的嘴，布满了痛入肺腑的创伤；那向高空伸展的手，举起诅咒和拳头；奴役者的残酷鞭子，在身上刻满了明伤和暗伤。这就是非洲——从头到脚，痛苦而又庄严，神秘而又骄傲：这也就是我。”§!"
 Map_Middle_East_tt_1: "§Y中东§!\n--------------\n\n\n\n£map_middle_east_picture\n\n\n\n\n§L“你的言语……曾是一首歌谣，我试图唱出；可是苦难封锁了春天的唇；你的言语，像燕子，飞出我的家园，我们的家门、我们秋日的台阶，也都随你迁徙，前往思念想去的方向；我们把这歌种入吉他的胸腔，自我们灾难的顶层，我们把它弹奏给破损的星月……和石块，可我已忘了……忘了……你这未知的声音啊：锈蚀了吉他的，究竟是你的离去……还是我的沉默？”§!"
 Map_Far_East_tt_1: "§Y远东§!\n--------------\n\n\n\n£map_far_east_picture\n\n\n\n\n§L“全国人民，从工人农民到资产阶级；全国军队，从主力军到游击队；国际方面，从社会主义国家到各国爱好正义的人民；敌国方面，从某些国内反战的人民到前线反战的兵士。总而言之，所有这些因素，在我们的抗战中都尽了他们各种程度的努力。每一个有良心的人，都应向他们表示敬意。我们共产党人，同其它抗战党派和全国人民一道，唯一的方向，是努力团结一切力量，战胜万恶的日寇。”§!"
 Map_Russia_tt_1: "§Y苏维埃社会主义共和国联盟§!\n--------------\n\n\n\n£map_russia_picture\n\n\n\n\n§L“我们有权引以自豪的是，从对人民群众的深远影响来看，我们所做的这种清除工作比125年多以前的法国大革命要坚决、迅速、大胆、有效、广泛和深刻得多。”§!"
 Map_Europe_tt_1: "§Y欧洲§!\n--------------\n\n\n\n£map_europe_picture\n\n\n\n\n§R去解决那个独裁者。§!"
 Map_Oceania_tt_1: "§Y大洋洲§!\n--------------\n\n\n\n£map_oceania_picture\n\n\n\n\n§L太阳从大洋洲曲折的海岸线上升起。我们的生活安稳，没有战争的威胁，这片和谐的土地，是我永远的家。§!"
