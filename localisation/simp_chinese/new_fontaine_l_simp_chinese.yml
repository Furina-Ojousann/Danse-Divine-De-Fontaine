 FRA_interest_of_politics: "政治运动"
 level: "当前的政治热情:§Y[?people_zeal_value]§!"
 FRA_interest_of_politics_desc: "我们的党最为看重的，是所谓的积极性问题。更准确一点，是干部和群众建设社会主义的热情，与纯粹的技术相比，这样高涨的热情更为宝贵。尽管在建设社会主义这一议题上，世界上已有苏联的先例，但无论是我们党的工作，还是群众的工作，出问题是避免不了的。有问题，尽管我们要对其加以纠正，但一定要切记不能给群众的热情泼冷水。要是因为一时的情况就失去了全枫丹千万人的热情，就很难再被调动起来了，这才是我们国家，乃至整个社会主义阵营最为严重的损失。\n\n从另一方面来说，意识形态是我们党的根本，赋予了人民共和国的合法性。在长期的发展中，我们的党可能会面临意识形态色彩淡化的危险，从而退化为一种单纯的实用主义政党，是彻底倒向修正主义的体现。为了保持党的意识形态色彩，并且把社会主义的理念传递给人民共和国千百万的大众们，广泛的政治运动必不可少。"
 labour_zionism: "劳工锡安主义"
 labour_zionism_desc: "劳工锡安主义者视自己为历史上中东和中欧的犹太工人运动的一支；不同于主流政治上的锡安主义的观念，他们认为犹太国家的建立并非依靠英国、德国或奥斯曼帝国，而是靠住在巴勒斯坦的犹太工人阶级借由建立乡村的集体公社和城市的无产阶级而达成。"
 baathism: "复兴主义"
 baathism_desc: "阿拉伯复兴社会主义主张通过先锋队政党对社会主义革命政府的领导推动建立和发展统一的阿拉伯国家。"
