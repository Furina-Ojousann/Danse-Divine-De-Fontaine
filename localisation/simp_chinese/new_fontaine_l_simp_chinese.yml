 FRA_hindi_dis_gandhi: "批评非暴力不合作运动"
 FRA_hindi_dis_gandhi_desc: "甘地天真地以为只要不给英国人创造价值，就可以把他们耗走。事实上，英国人有一万种方法强迫他们劳动，不让英国人蒙承损失，他们一万年也不会走。印度人明明可以如同孟加拉虎一般战斗，却非要表现的如同温顺的绵羊，这是印度独立运动中最大的错误。"
 FRA_support_bose: "支持钱德拉·鲍斯"
 FRA_support_bose_desc: "好在，印度独立运动中也不全是像甘地那样非要折磨自己的人。钱德拉·鲍斯已经首先认识到了武装斗争的必要性，我们可以尝试与他搭上关系。"
 FRA_support_hehru: "帮助尼赫鲁"
 FRA_support_hehru_desc: "多亏了英国在印度长达两个世纪的建设，现在印度光是铁路工人，就有相当的规模。毫不夸张地说，印度工人阶级的力量远比中国和其他殖民地强大。罢工路线在印度有一定的可行性，可以尝试。"
 FRA_hindi_rural_fight: "城乡革命，并驾齐驱"
 FRA_hindi_rural_fight_desc: "印度是个十分特殊的国家，它在城市地区有强大的工人阶级；在农村又有生活极为困苦的农民，他们"
 neo_democracy: "新民主主义"
 neo_democracy_desc: "新民主主义革命是无产阶级领导的、人民大众的、反对帝国主义、封建主义、官僚资本主义的革命。它的目标是无产阶级牢牢掌握革命领导权，彻底完成革命的任务，并及时实现由新民主主义向社会主义的过渡。"
 FRA_China_Fontaine_Friendship: "中枫友谊万年长存"
 FRA_China_Fontaine_Friendship_desc: "中国是一个有巨大潜力的国家。广袤的领土与众多的人口，唯独缺少工业化。如果我们可以将中国培养为一个得到完全工业化的大国，那必然是未来国际共运的另一大主力。"
 FRA_dispatch_army_to_paris_trigger: "在塞纳河两岸至少有两个师"
 fra_some_corruption: "些许妥协"
 fra_some_corruption_desc: "法案距离通过仅仅差了几票。如果他们的意见不可动摇，钱可以买来他们一次的支持。"
 star_idol_improved: "枫丹之星"
