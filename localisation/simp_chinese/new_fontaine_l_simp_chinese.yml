 FRA_protect_aboard_french_tt: "解锁军工组织§Y殖民地舰队§!政策:\n生产产出花费:§G-20%§!\n航程:§G+30%§!\n燃油消耗:§G-10%§!\n可靠性:§R-5%§!\n轻型/重型炮组命中几率:§R-10%§!\n仅限§Y驱逐舰§!和§Y巡洋舰§!"
 mio_policy_navy_colony_fleet: "殖民地舰队"
 fra_claim_quebec: "支持魁北克民族主义"
 fra_support_quebec_mission: "做出行动支援魁北克"
 FRC_Adrienne_Charlotte: "夏洛蒂·阿黛尔"
 fra_support_quebec_mission_trigger: "我们必须§Y做点什么§!支持§Y魁北克§!！\n我们可以......:\n -民众的§Y自发支援§!\n -向魁北克派遣至少§Y一支§!志愿部队\n -在加拿大近海§Y部署海军§!\n行动强度§Y[?fra_quebec_interfere_strength]/3§!"
 fra_support_quebec_mission_tt: "取决于我们行动的强力程度，加拿大政府可能采取不同的行动\n -如果我们采取了强力的干涉，那么有概率可以不战而胜。\n -如果我们完全置之不理，则会对魁北克的生存造成严重的影响，并且对我国的稳定造成损害。"
 FRA_oh_colonies: "我们的殖民帝国"
 FRA_oh_colonies_desc: "多亏了祖先给我们留下的丰厚遗产，国家现在可以坐享半个地球的殖民收益。不过殖民地的潜力显然远远没有被开发透，加大投资便可赚回数十倍的丰厚利润。"
 FRA_stop_crime: "终止罪恶"
 FRA_core_arabs: "核心利益：阿拉伯"
 FRA_core_arabs_desc: "与南法相近的地中海气候让北非成为了我国殖民者的最爱，自从征服阿尔及利亚以后，北非便是绝不可被外国染指的后花园，此地投资值得拥有更高优先级。"
 FRA_invest_maghreb: "开发马格里布"
 FRA_invest_maghreb_desc: "马格里布，日落之地，也是第二本土，发展程度却远远不足。我们的移民们会满意我们对此地的投资的。"
 FRA_slow_wills: "以宽容替铁拳"
 FRA_slow_wills_desc: "尽管阿尔及利亚是我们的第二本土，然而不可否认这里还有别人——而且占大多数，阿拉伯人和柏柏尔人。宗教同化迟迟不见效果，反而招致反抗。不如停止宗教迫害，尊重本地信仰，用有限宽容来镇压反抗意志。"
 FRA_Legion_etrangere: "扩编外籍军团"
 FRA_Legion_etrangere_desc: "我们的军队应该向任何愿意为国家效力的人开放，一方面这充实了我们的兵员，也方面挑选未来我们在殖民地的利益代理人。"
 FRA_other_interest: "世界利益"
 FRA_other_interest_desc: "北非以外的广袤殖民地也不可谓不重要，尤其是我们在远东地区的利益，近年来因国民革命，日本崛起损失颇为惨重，亟需维护。"
 FRA_colonies_french: "培养买办"
 FRA_colonies_french_desc: "如果我们的殖民地要求独立——那就让他们独立去好了。完全可以挑选一个铁腕买办继续为我们服务，让原住民去斗原住民吧。"
 FRA_aboard_provinces: "扩殖海外省"
 FRA_aboard_provinces_desc: "一些地方的民族主义势力不强大——或者说当地就不存在形成民族主义的基础，还有是干脆成为了法裔居多的土地，就可以成为我们的海外省。"
 FRA_speak_french: "给我讲法语！"
 FRA_speak_french_desc: "法语可是最为美妙规范的语言——一词一意，语法标准，原来是全欧洲旧贵族们争相学习的语言。然而现在我们不得不接受英语正在取代法语的可悲事实。不行，法语文化的地位必须得到维护。"
 FRA_protect_aboard_french: "保护海外法裔"
 FRA_protect_aboard_french_desc: "美洲曾经也有大块的殖民地，但魁北克被英国人抢走，路易斯安那被低价贱卖，这都是不幸的结果。所幸留存在那些土地上的法裔还认为自己是国家的一部分，那我们可以利用这一点暗中操作。"
 FRA_interfere_china: "找回在华话语权"
 FRA_interfere_china_desc: "比起英俄，我们在华的势力范围小得可怜，仅在云南两广一带裹足不前。但毕竟有印度支那殖民地直接接壤，也许有办法借此夺取在华霸权。"
 FRA_Guangdong_warload: "扶持新桂系？"
 FRA_Guangdong_warload_desc: "南京政府的蒋中正完全是美国人的傀儡，简直雷打不动。也许李宗仁会是个不错的选择，毕竟他的军阀性质和河内直通南宁的交通便利，他可以成为我们的在华利益代理人。"
 FRA_a_new_china: "亲近新生力量？"
 FRA_a_new_china_desc: "蒋中正的官僚资本不仅制约了自己的发展，也制约了我们能从中国人手里赚的钱。赤贫的中国人完全没法消费我们的商品，哪怕倾销得到的收益也有限。不如干脆让中国的资本主义发展起来，专业化的国际分工才是长远盈利的基础。蒋中正是不可能做这个事情的，能够发展中国资本主义的反而是中国共产党，也许我们可以和他们接触。"
 FRA_Hanoi_transportation_lane: "河内-南宁线"
 FRA_Hanoi_transportation_lane_desc: "从河内-南宁一线开通铁路以来，两地的沟通便有了相当的进步，陈济棠也没少利用这条路线走私钨矿，军火也是从这卖给桂系军阀的。加大这条线的运量也许可以直接打通李宗仁的关节。"
 FRA_expand_resource_purchase: "廉价钨矿"
 FRA_expand_resource_purchase_desc: "钨矿在本土是紧俏货，从欧洲进口价格过于昂贵，中国南方倒是盛产钨矿，然而全被德国人占据了。好在德国人可拦不住想发财的人走私，我们可以从这里获得更廉价的钨矿。"
 FRA_Guangzhou_Nation_Government: "鼓动广州国民政府"
 FRA_Guangzhou_Nation_Government_desc: "影响力不能止步于两广，正巧不久以前李宗仁就搞过抗日救国军武力反蒋，但是被镇压。这次有了我们的支持，可以直接教唆李宗仁另立中央，准备夺取整个长江流域的利益。"
 FRA_attack_Nanking_Government: "武力反蒋"
 FRA_attack_Nanking_Government_desc: "反对蒋介石的战争必须借助军阀混战的名义，不然美国人可能认为我们在挑战他们的在华利益。胜利以后，中国必将实施国际共管，当然，我们占的股份最多。"
 FRA_support_white_area: "支持白区路线"
 FRA_support_white_area_desc: "苏区是我们接触不到的，但中共在白区的工作者我们倒是可以联系。白区的共产党有更丰富的城市工作经验，也熟悉和民族资产阶级打交道，可能最符合我们的利益。"
 FRA_the_true_represent_of_capitalists: "民族资产阶级真代表"
 FRA_the_true_represent_of_capitalists_desc: "讽刺的是，共产党居然比国民党更能代表中国资产阶级的利益，虽然可笑，但这就是事实，我们不得不暗中支持另一个国家的共产党！也是贯彻国际主义精神了。"
 FRA_abundant_labor: "用不光的劳动力"
 FRA_abundant_labor_desc: "远东什么都缺，唯独不缺人。人多竞争就激烈，一激烈劳动力价格就好压低。可惜那么多人压的都是中国人的劳动力价格，不如从中国拉点廉价劳动力，来压一压本国工人的劳力价格。"
 FRA_middle_east_mission: "代尔祖尔油田"
 FRA_middle_east_mission_desc: "叙利亚这块有混乱又穷的殖民地可算发现价值了，石油！马上在那里建立劳改营把油田占住！"
 FRA_explore_algeria: "勘探阿尔及利亚"
 FRA_explore_algeria_desc: "地质学家已经确定，阿尔及利亚近海具有丰富的油气资源，等着我们去开发。"
 FRA_do_you_should_do: "各司其职"
 FRA_agreement_to_china: "五百项贸易协定"
 FRA_agreement_to_china_desc: "我们可以垄断与中国五百项商品的贸易权，可以预见等到中国人消费能力强大起来以后，会是多么巨大的一笔收入！"
 FRA_do_you_should_do_desc: "高效运用我们广大的殖民地，就可以把矛盾通通转移到看不见的地方去啦。现在具有国家公民身份的人可以早上喝中国出产的好茶，中午用印度黄油做饭，午后烧中东的油去兜风，晚上让越南人端盘子了，哈哈哈哈。"
 FRA_development_under_the_naval_treaty: "海军条约掣肘之下"
 FRA_development_under_the_naval_treaty_desc: "《华盛顿条约》与《伦敦条约》的枷锁下，海军在1936年陷入两难。主力舰吨位被压缩至英美的一半，却要同时应对德意志的再武装与意大利的地中海野心。现实更加残酷——财政紧缩迫使船厂放缓建设，而希特勒已撕毁《凡尔赛和约》，种种压力之下使得海军不得不在条约限制下发展出最优的舰队。"
 FRA_new_naval_budget: "[GetYear]年海军预算"
 FRA_new_naval_budget_desc: "在经济不再那么糟糕了以后，政府终于有能力拨出足够的预算投资海军建设。这笔预算弥足珍贵，每一法郎都必须花在精钢上。"
 FRA_cultivate_skilled_workers: "培养熟练工人"
 FRA_cultivate_skilled_workers_desc: "无论多么先进的机器终归都是需要人来操作的，熟练的造船工人必然有利于我们造船速度与质量的提升。"
 FRA_comprehensive_navy_building_complex: "集约化造船综合体"
 FRA_comprehensive_navy_building_complex_desc: "面对条约枷锁与德意造舰狂潮，法国海军部以铁腕整合全国船厂——从土伦到圣纳泽尔，私营造船商被收归大西洋-地中海联合体旗下。资源可算是集中到了国有造船厂下，终于可以开足马力扩建海军了。"
 FRA_pioneer_station_of_fleet: "舰队前哨站"
 FRA_pioneer_station_of_fleet_desc: "为了确保我们重新强大的舰队可以全球出击，在各地都应该具备补给港与整修船坞，幸好我们广大的殖民地可以提供无数这样的良港。"
 FRA_surpass_uss_and_hms: "超英赶美"
 FRA_surpass_uss_and_hms_desc: "英国和美国拥有世界上最为强大的舰队，而我国已然远落后于人，将制海权拱手让人，而这意味着国际威望的大打折扣。为了重拾我国世界第一的地位，舰队无论是规模还是质量，都应该超越英美。"
 FRA_new_generation_of_crusiers: "新一代条约巡洋舰"
 FRA_new_generation_of_crusiers_desc: "拉·加利索尼埃级轻巡洋舰，对海军条约限制的典型回应。该级舰在7600吨的条约框架内，实现了152毫米主炮、105毫米装甲带和31节航速的罕见平衡，在海军设计师的口中，她是轻巡洋舰中的最强。"
 FRA_Mogador_destoryer: "挑战极限的驱逐舰"
 FRA_Mogador_destoryer_desc: "《伦敦条约》驱逐舰吨位限制（1850吨）困扰了海军设计师很久，最终，他们卡着条约极限设计出了莫加多尔级。该级舰在标准排水量2997吨的船体上，配备了8门138毫米主炮（四座双联装），理论火力已接近轻巡洋舰水平，航速达39节。"
 FRA_limit_final_breaked: "窒碍终破"
 FRA_limit_final_breaked_desc: "感谢上天，那该死的海军条约终于被世界大战的战火烧得灰都不剩了，倒也是好事情，至少海军可以开始大展拳脚了。"
 FRA_battleship_treaty: "敦刻尔克"
 FRA_battleship_treaty_desc: "以有限资源打造能压制德意对手的高效主力舰，敦刻尔克级就是其典型代表。"
 FRA_Richelieu_class: "黎塞留"
 FRA_Richelieu_class_desc: "作为以敦刻尔克级为参考的新世代战列舰，黎塞留集合了我们所需的全部优点，快速，强大，造型优雅，堪称完美。考虑到海军航空的最新发展，黎塞留可能就是战列舰最华丽的封笔之作。"
 FRA_practise_of_carrier: "基地打击实践"
 FRA_practise_of_carrier_desc: "海军航空的发展断然不可被忽视，在这个战列舰与航空母舰交错使用的世代，也许两者的结合才是最优策略？"
 FRA_nuclear_submarine: "核潜艇"
 FRA_nuclear_submarine_desc: "我们需要一种可将敌舰致死于无形的新型兵器——同时需要具备全球出击的能力——核潜艇作为新型理念值得一试。"
 FRA_navy_academy: "海军士官学校"
 FRA_navy_academy_desc: "海军上将负责的是海战的顶层架构，即战略。无论多么优良的战略，其执行都依赖中层与下层的紧密沟通，通力合作。其中中层可谓至关重要，亟需加强训练。"
 FRA_steel_casting_techique_development: "海军铸钢革新"
 FRA_steel_casting_techique_development_desc: "所有的舰船都由钢铁铸就，那么其质量自然也由其中的含碳，含硫量所决定。我们新一代的制钢技术可以快速运用到船舶制造上。"
 FRA_experimental_naval_gun: "实验性大型主炮"
 FRA_experimental_naval_gun_desc: "先前，超过400mm口径的主炮依然挑战了我们铸钢工艺的极限。在这方面取得突破以后，我们便可以尝试开发406mm的超大口径舰炮。当然，它还不是很稳定，亟需实战测试。"
 FRA_radar: "开发雷达"
 FRA_radar_desc: "雷达给我们在海战中带来的机动与信息优势不言自明，我们必须在此方面追赶英美的先进技术。"
 FRA_naval_aircraft: "舰载机改良"
 FRA_naval_aircraft_desc: "舰载机袭击是航空母舰的主要攻击手段，建造更多的航空母舰，在收益上反而不如更优秀的舰载机。"
 FRA_naval_aviation: "海军航空兵"
 FRA_naval_aviation_desc: ""
 FRA_naval_supply_improvement: "远洋航行补给"
 FRA_naval_supply_improvement_desc: "远洋航行的补给是个让人头疼的难题"
 FRA_radar_tt: "完成§Y雷达§!的研发以后:\n§Y[FrenchNavy]§!追加效果:\n对海探测:§G+15%§!\n§Y提示：无论是否完成这个国策，完成雷达的研发以后均会给予修正加成。§!"
 FRA_navy_academy_tt: "§Y$FRA_navy_force$§!追加效果:\n$MODIFIER_XP_GAIN_NAVY_FACTOR$:§G+10%§!\n$MODIFIER_NAVY_ORG_FACTOR$:§G+10%§!\n$MODIFIER_NAVAL_HIT_CHANCE$:§G+5%§!"
 FRA_steel_casting_techique_development_tt: "§Y$FRA_navy_force$§!追加效果:\n$MODIFIER_NAVY_CAPITAL_SHIP_DEFENCE_FACTOR$:§G+10%§!\n$MODIFIER_NAVAL_DEFENSE_FACTOR$:§G+5%§!"
 experimental_406mm_naval_gun: "实验性三联装406mm/50主炮"
 tech_french_experimental_406mm_naval_gun: "实验性三联装406mm/50主炮"
 FRA_experimental_naval_gun_tt: "§Y$FRA_navy_force$§!追加效果:\n$MODIFIER_NAVY_CAPITAL_SHIP_ATTACK_FACTOR$:§G+10%§!"
 FRA_experimental_naval_gun_tt: "§Y$FRA_navy_force$§!追加效果:\n$MODIFIER_NAVY_CAPITAL_SHIP_ATTACK_FACTOR$:§G+10%§!"
 FRA_naval_supply_improvement_tt: "§Y$FRA_navy_force$§!追加效果:\n$MODIFIER_NAVAL_MORALE_FACTOR$:§G+10%§!\n$MODIFIER_NAVY_MAX_RANGE_FACTOR$:§G+15%§!"
 FRA_naval_aviation_tt: "§Y$FRA_navy_force$§!追加效果:\n$MODIFIER_AIR_NAV_EFFICIENCY$:§G+20%§!\n$MODIFIER_NAVAL_STRIKE_ATTACK_FACTOR$:§G+10%§!"
 FRA_the_location_of_air_force: "空军定位问题"
 FRA_the_location_of_air_force_desc: "关于空军是否是一支独立的作战力量，国内军界还没有达成统一。若是认知未能达成统一，空军建设必然落后于他国，因而必须迅速解决这个问题。"
 FRA_independence_building_plan: "独立建军方案"
 FRA_independence_building_plan_desc: "空军是一支独立的力量，不应该被视作是陆军或者海军的附庸，非常有必要成立独立的空军部来指导空军建设。"
 FRA_united_building_plan: "联合建军方案"
 FRA_united_building_plan_desc: "所谓的联合，指的是陆军发展近地支援机种，海军发展舰载机种，也就是说，空军依然是两大军的附庸。不过，若是运用得当，专精化的飞机说不定会更加高效。"
 FRA_boost_local_air_industry: "[FRA.GetName]航空工业"
 FRA_boost_local_air_industry_desc: "我们的军队自然知道什么样的飞机是最好的，国外设计商肯定无法完美契合我们的需要，干脆自己设计，自己生产。"
 FRA_replace_old_verison_fighters: "战斗机换代"
 FRA_replace_old_verison_fighters_desc: "我们遗存下来的一战老飞机根本无法适应战争的需要，不如投入国际市场卖掉，来组建我们的新空军。"
 FRA_world_advanced_airplanes: "追求世界先进水平"
 FRA_world_advanced_airplanes_desc: "我们的追求不至于达到平均水平，更要用更新，更快，火力更为强大的先进飞机制霸空域。"
 FRA_form_air_command: "正式成立空军部"
 FRA_form_air_command_desc: "现在空军应该有一个独立的统辖机构，来提高各方面的效率。"
 FRA_module_requirement: "空气动力实验室"
 FRA_module_requirement_desc: "独立空军往往是本国航空航天工业的主力推动者。它对飞机、雷达、导弹、电子系统等高科技装备的需求，能极大刺激相关产业和科研体系的发展。"
 FRA_rapid_air_force_expanding: "快速扩军"
 FRA_rapid_air_force_expanding_desc: "空军的发展已经扫清一切阻碍，是时候开始有序地扩大我们的空军了。"
 FRA_effective_aluminum: "制铝技术革新"
 FRA_effective_aluminum_desc: "我们国家有大量的铝矿资源，电解铝技术也发展较早，这是我们的有利条件，若是将其完全发挥出来，可以大幅强化我们的飞机产量与质量。"
 FRA_pilot_is_also_important: "飞行员也很重要！"
 FRA_pilot_is_also_important_desc: "[FRA.GetName]可以生产出世界上最优秀的飞机，但也要有具备精湛技艺的飞行员驾驭。"
 FRA_rocketers: "新式长程武器"
 FRA_rocketers_desc: "航程再长的飞机也有其极限，并且燃油的消耗也是一类巨大的成本，我们亟需开发一种具备全球打击能力，又不消耗燃油的新式武器。"
 FRA_nuclear_plan: "[FRA.GetNameAdjective]原子能委员会"
 FRA_nuclear_plan_desc: "这是法国核项目的主导机构，类似于美国的“曼哈顿计划管理机构”。核武器研发在很长时间内都被归于CEA的机密项目中进行。"
 FRA_DAM: "DAM应用实验室"
 FRA_DAM_desc: "DAM是Direction des Applications Militaires的缩写，也就是军事应用方向，它负责研究核子能量在军事方面的潜能。"
 FRA_European_Atomic_Energy_Community_common: "欧洲联合原子能实验室"
 FRA_European_Atomic_Energy_Community_common_desc: "为了减轻我们对于传统能源的依赖，我们可以携手改邪归正的德意各国共同开发原子能。"
 FRA_civil_use_of_nuclear_energy: "民用核子实验室"
 FRA_civil_use_of_nuclear_energy_desc: "根据我们科学家的最近研究，核能的效率会是化石能源的几千倍！在控制好的情况下，还几乎不会有什么污染！若是民用，经济效益必然不容小觑。"
 FRA_Gerboise_Bleue: "Gerboise Bleue"
 FRA_Gerboise_Bleue_desc: "必须通过实验来确定我们核武器爆炸的威力——同时确认那是一次由裂变引起的核爆炸而非常规爆炸"
 try_nucleat_explansion_in_algeria: "我们将在§Y阿尔及利亚沙漠§!试爆§R核武器§!"
