 FRC_one_step_from_the_ideal_tt: "注:在§Y公社国策树§!获得的各种修正效果，在§Y革命胜利§!以后会遭到§R削弱§!。"
 modifier_experience_gain_irregular_infantry_combat_factor: "战斗中获取的非正规军经验"
 FRA_try_wooing_the_socialist: "尝试拉拢中间派" 
 FRA_try_wooing_the_socialist_desc: "中间派在这场运动中只是被裹挟着附和革命，只要我们稍加操作，便可把这些没那么坚定的人轻松从反对我们的阵营分裂，让我们从这里粉碎这场政治阴谋。"
 french_compliance_tt: "如此§Y顺从§!，倒是可以快速结束这场§R革命§!，只是......§Y政权§!真的就这样交出去了？"
 try_collapse_the_socialist: "§Y分化，瓦解§!，也许才是老练的政治家应对危机的办法。"
 FRA_collapse_the_union: "同工会对话"
 FRA_collapse_the_union_desc: "工会的诉求与我们的目标并不背离，我们并不需要真正拿出什么来换取他们的支持。"
 FRA_support_SFIO: "满足SFIO的部分诉求"
 FRA_support_SFIO_desc: "事实上，工人国际枫丹支部，即SFIO，与枫丹共产党一直都有分歧。左翼的分歧，无非就是如何走向社会主义。那么好，这对矛盾也许可以被利用起来。"
 FRA_arrest_the_communsit: "逮捕共产党人"
 FRA_arrest_the_communsit_desc: "共产党人成了孤家寡人，没人会在意他们的覆灭"
 FRA_appointment_to_people: "对人民的承诺"
 FRA_appointment_to_people_desc: "谢天谢地，历经一场昏天黑地的巨大浪潮，枫丹终于重归往日的平静。尽管运动已经平息，但它的影响依然是深远的，经此一役，芙宁娜见识到了人民有多大的力量，真正了解了人民所想要的。那么，现在是时候修复旧日的创伤，朝着更加平等的人民家园的方向前进。"
 FRA_appointment_to_revolution: "对理想的承诺"
 FRA_appointment_to_revolution_desc: "工人日夜劳作，让社会这台机器缓缓运作，农民辛勤耕种，为所有国民提供寄养，公社战士们奋力杀敌，以保卫革命政权；尽管工作各不相同，但他们皆是无一例外的人民英雄，共和国不会忘记他们付出的辛劳，流下的血泪，而正因我们为革命付出的代价如此之大，我们对于理想的坚守才更不能动摇。"
 we_solved_the_revolution: "我们§Y平稳§!渡过了§Y危机§!"
 FRA_the_machinery_issue: "自律机械难题"
 FRA_the_machinery_issue_desc: "自律机械的广泛运用是导致这场运动的直接因素，因而解决自律机械的问题成为了我们新政伊始首当其中的问题。"
 we_have_charlotte: "§Y夏洛蒂·阿黛尔§!被任命为§Y总理§!"
 FRA_split_large_company: "拆分巨型私企"
 FRA_split_large_company_desc: "在枫丹时期因为繁荣而崛起的巨型企业曾为国家的发展做出了重大贡献，但如今他们已经是绊脚石，无论对于人民还是政府，这种存在都是不利的，我们应该着手将他们不同的业务线拆分成不同的几个公司，以积极地参与市场竞争。不过，已经国有化的关键行业，比如电力和军事工业，不能进行私有化的拆分。"
 FRA_strengthen_the_middle: "鼓励中小型企业"
 FRA_strengthen_the_middle_desc: "巨型企业往往可以渗透进政府中，以谋求一些不公正的私利——比如说某一方面的垄断权。这些特殊权力本不该存在，而且还腐化了政府，百害而无一利。而中小型企业没有这种实力，唯一的出路就是与同行竞争，这才是应有的模式。当然，也要防止某些企业发展成新的巨头。"
 FRA_strengthen_colony_industry: "开发殖民地工业"
 FRA_strengthen_colony_industry_desc: "我们不得不停止去殖民化了，因为尽管本土失业者众多，但我们广袤的殖民地却十分需要这些勤劳肯干，有具有相当技术的工人来建设，所以，把工人们送去建设殖民地或许是一个不错的选择。"
 FRA_its_not_very_nesscerry_to_produce: "你并非非生产不可"
 FRA_its_not_very_nesscerry_to_produce_desc: "有时我们会陷入一个思维定式中，那就是一个人如果失了业，就仿佛是失去了归宿的孤魂野鬼，非要重新投入生产不可。可是，既然建设社会主义的工作完全可以交给自律机械来做，那么我们为什么不放弃传统意义上的工作，转而享受机器给我们的劳动成果，将注意力集中在提升自己上呢？"
 FRA_accelerate_the_machinery: "加速自动化进程"
 FRA_accelerate_the_machinery_desc: "为了摆脱一切简单重复劳动，我们必须加紧自动化的建设。"
 FRA_Unconditional_Basic_Income: "无条件基本收入"
 FRA_Unconditional_Basic_Income_desc: "机器可以生产的产品已经可以完全满足全国所有国民的所需，因而人工的生产已经不再必要，真正的自由随之而来，当然，这种自由需要一定的支撑。"
 FRA_5_major_issue_the_party_face: "党面临的五个首要问题"
 FRA_5_major_issue_the_party_face_desc: "不可否认，新生的人民共和国问题很多，但抓住最主要的问题，可以起到事半功倍的效果——捍卫革命政权免于崩溃，以至于蓬勃发展，实现共产主义。"
 FRA_defense_the_fascist_aggression: "保卫革命政权"
 FRA_defense_the_fascist_aggression_desc: "欧洲形势依然严峻万分，外敌和内敌同样可怕，枫丹纵深不大，任何错误都可能是致命的，必须小心应对。" 
 FRA_dissolve_antirevolutions: "镇压反革命"
 FRA_dissolve_antirevolutions_desc: "枫丹依然存在一个广泛的反对革命的团体，基督教人士，保守资本家，一战退役老兵等等，尽管社会主义国家一贯是主张民主的，但对于人民之敌唯有专政。"
 FRA_rectify_the_party_ranks: "整顿党的作风"
 FRA_rectify_the_party_ranks_desc: "不要觉得革命胜利了，就可以摇身一变高高在上，成为新的老爷了。记住，党员必须坚持阶级所赋予的先进性和革命性，到人民群众中去，老老实实为人民服务。"
 FRA_socialist_industry_reform: "工商业社会主义改造"
 FRA_socialist_industry_reform_desc: "我们的内战打得太急，太快，没有时间一个工厂一个工厂地解放工人，现在是时候让工人真正参与工厂，企业的管理了。"
 ply_desc: "世界之外的神秘力量可以给予我们很多东西，团结国家与人民的信心，或是更为先进的制度与技术。但有所给予必然有所求，索取馈赠的同时也会增强世界之外力量的强度，当它的阴影笼罩了整个国家以后，那么政治便会走向极端的不可控了。\n\n当前世界之外的神秘力量的领导者是:§Y[Getmanagername]§!\n强度为:§Y[?ply_strength]/300§!"
 PLY_the_power_outside_our_timeline: "世界之外的神秘力量"
 PLY_get_tech: "利用虚空传输知识"
 PLY_let_bronya_become_leader: "掌控国家"
 FRA_Fontaine_cabinet_Tt: "若完成此国策后再点§Y大陆巡游§!，游戏会因为§Y不明原因§!§R闪退§!（想不出原因），所以请先完成§Y大陆巡游§!"
 FRA_care_the_hurt: "疗愈创伤"
 FRA_care_the_hurt_desc: "无论怎么讲，我们已对我们的人民大打出手，是无法改变的事实了。这是第一次，当然，也希望是最后一次。"
 ship_water_battery_heavy: "重型纯水舰炮"
 ship_water_battery_heavy_desc: "用大海中无处不在的水作为弹药"
 ship_water_secondaries: "纯水副炮"
 Fontaine_special: "枫丹人文"
 FRA_Furina_de_Fontaine_class_battleship: "芙宁娜妮娅级战列舰"
 FRA_Furina_de_Fontaine_class_battleship_desc: "枫丹自有其特别的技术，可以利用无处不在的水作为致命的武器。"
 JAP_rebuild_the_culture: "文化改造"
 JAP_rebuild_the_culture_desc: "日本全国的法西斯化进程可以归咎于吉田松阴此人，此人奠定了明治维新，乃至此后几十年日本发展的文化基调。长期以来，国内所形成的这种行动上的激进，而思想上却又极度保守的文化毒害了一代又一代的青年，它理应被新的文化所取代。"
 JAP_Daitoa_senso: "大东亚战争"
 JAP_Daitoa_senso_desc: "千万亚裔同胞正被英美帝国主义惨无人道地剥削着，作为亚洲唯一一个彻底摆脱了帝国主义影响，并基本上完成了工业化的革命国家，日本有义务以武装斗争的形式去解放他们"
 JAP_asia_union: "东亚联合"
 JAP_asia_union_desc: "中日原本同根同源，原本亲如一家，帝国主义的侵害使得两家结成了刻骨铭心的仇恨。但如今，在马克思主义的旗帜下，此等仇恨可被消解，甚至团结一致，共抗英美。"
 jap_asia_union: "东亚邦联"
 jap_asia_union_DEF: "东亚邦联"
 jap_asia_union_ADJ: "东亚"

 FRA_court_socialists: "拉拢社会主义者"
 FRA_court_socialists_desc: "作为中间派，社会主义者是当下反芙宁娜联盟中比较薄弱的一环。让我们从这里粉碎这场政治阴谋"
 FRA_support_workers_union: "支持工会联合会"
 FRA_support_workers_union_desc: "工会的诉求与我们的目标并不背离，他们的支持并不需要真正拿出什么来换取"
 FRA_apply_pressure_on_bourgeoisie: "向资产阶级施压"
 FRA_apply_pressure_on_bourgeoisie_desc: "芙宁娜需要逆风一击的本钱，哪怕有输到一个子儿也不剩的风险——她当然会选择加注，只有惊险与波澜才符合戏剧的美学"
 FRA_visit_sweden: "访问瑞典"
 FRA_Visit_sweden_desc: "瑞典有着较成功的社会民主主义政治实践，他们是芙宁娜的潜在盟友"
 FRA_propose_economic_reform: "提议改革经济"
 FRA_propose_economic_reform_desc: "“盗取别人的纲领并不是一件有失正义的事情；通常，人们称之为智慧”——芙宁娜·德·枫丹"
 FRA_invest_in_public_service: "投资公共事业"
 FRA_invest_in_public_service_desc: "三十年代整体的不景气与近期的动荡给枫丹的经济背上了沉重的负担。在芙宁娜的主导下，一份由社会主义者参与设计的经济建设机会被提上了议程。该计划的主要目标是通过国家主导的投资和经济规划，恢复枫丹的经济生产能力，并在能源、交通和钢铁等领域实现现代化，为未来的经济增长奠定基础。"
 FRA_build_the_alliance: "建立联盟"
 FRA_build_the_alliance_desc: "新的篇章已呼之欲出。诸多角色粉墨登场。时代的舞台上，人们众星捧月地围绕着芙宁娜，共同演绎着名为法兰西命运的剧目。没有人知道这场盛大的演出还会有什么惊心动魄的情节。"
 FRA_trial_in_absence_of_plaintiff: "原告缺席的审判"
 FRA_trial_in_absence_of_plaintiff_desc: "来吧，审判！让这命运的戏剧上演。今天，我们会决定法兰西究竟会走向何方。"
 FRA_init_Niels_Bohr: "邀请尼尔斯·波尔"
 FRA_init_Niels_Bohr_desc: "纳粹的野心昭然若揭，北方的和平危若累卵。与其让力量分散，不如让力量集中，以面对即将到来的惊涛骇浪。"
 FRA_new_type_of_university: "建立新式大学"
 FRA_new_type_of_university_desc: "在法国综合理工学院的参观过程中，芙宁娜盛赞了与这所学院有着深厚渊源的法国领袖拿破仑对法国教育的贡献。未来，世界的中心一定是科学的中心，依托动能研究所——尽管先前的失业让它声名狼藉——的成果，建立一所新式大学，不失为一个好想法。"
 FRA_oliver_branch_to_worlds_scientific_community: "向世界科学界递出橄榄枝"
 FRA_oliver_branch_to_worlds_scientific_community_desc: "有邀请尼尔斯·波尔珠玉在先，相信我们会得到更多其他科学家的支持，他们将与枫丹本土科学家一道，成为反法西斯事业战线的坚强力量。"
 FRA_atomic_bomb_race: "原子弹竞赛"
 FRA_atomic_bomb_race_desc: "物理学家们早已揭示核裂变的原理，这一发现为制造威力巨大的炸弹提供了理论基础。\n 一封绝密情报经由反法西斯力量与枫丹地下工作人员快马加鞭传到了巴黎沫芒宫芙宁娜以及那维莱特的办公桌上：纳粹德国科研人员正在海森堡的带领下秘密研究核武器。而在法国，进行这项研究的基础也已具备，收到战争迫害的科学家们正摩拳擦掌，准备让法西斯们结束自己不会挨炸的天真幻想。"
 FRA_strengthen_cooperation_between_enterprise_and_FIT: "加强企业与FIT的合作"
 FRA_strengthen_cooperation_between_enterprise_and_FIT_desc: "在上流社会的晚夜上，芙宁娜向埃米尔·佩雷曼、莱昂·德拉克罗瓦夸耀了以自己的名字命名的新式学院的杰出成果。起初，两位大亨以为这只是无聊的附庸风雅，但大师们的杰作很快引起了他们的兴趣，他们敏锐的商业嗅觉探到了巨大的商机。"
 FRA_tech_hub_of_free_world: "自由世界的科技中心"
 FRA_tech_hub_of_free_world_desc: "我们因为反对法西斯的战斗走到了一起，但是，我们的努力将不仅限于此，我们的步伐将不仅限于此，我们的梦想将不仅限于此。进步，不仅仅属于枫丹，也属于欧洲，属于世界。我们的工作将会争取到和平，以及，更美好的明天。"
 FRA_invest_in_film_industry: "投资电影行业"
 FRA_invest_in_film_industry_desc: "这种新颖的艺术形式引发了芙宁娜的浓厚兴趣，以至于那维莱特怀疑她想要亲自出演。当然，若不是万急的局势，那维莱特是不会介意在剧院花上时间欣赏那位女士的演出的。"
 FRA_anti_fascist_propaganda: "开展反法西斯宣传"
 FRA_anti_fascist_propaganda_desc: "枫丹对电影工业的支持以及前线纷飞的战火吸引了许多野心勃勃、追求浪漫的人，其中也包括迈克尔·珂迪兹。他计划拍摄的电影设想了枫丹沦陷后，在人们逃向美国的中转站，北非小镇卡萨布兰卡上演的爱恨情仇。这样大胆的情节设计引发了巨大的争议。出于碰碰运气的心态，他向芙宁娜写了一封信，并祈祷这位风流人物的艺术品味不要过于低劣。出乎意料，芙宁娜不仅展现出对于剧本的极大兴趣，甚至提议由自己出演女主角。"
 FRA_take_on_Hollywood: "抗衡好莱坞"
 FRA_take_on_Hollywood_desc: "福利社会或者消费社会要求平均工资的增长。使得资本主义合法化的，不是这种增长本身，而是增长的结果：即个人的大众消费。在未来，所有国家和地区都将享受这种消费繁荣，此种消费主义的意识形态机器甚至比苏维埃共产主义还要强大，它由一个跨国的广告体系和大众性的文化产业构成，它兜售自己而非强加自己。\n在这场以堕落和庸俗为主调的文化战争中，枫丹将会成为最终胜利者。"
 FRA_first_5_years_plan: "枫丹的第一个五年计划"
 FRA_first_5_years_plan_desc: "对于公共领域的投资最终落地为由莫内主导并设计的枫丹第一个五年计划，这位有着丰富经验的经济领导者正在枫丹的舞台上大展拳脚。该计划聚焦于煤炭、电力、钢铁、交通、农业等诸多关键领域。同时，进一步的现代化和结构性调整被设定为进阶目标。\n或许，他还有着更宏伟的目的?"
 FRA_coal_industry_reform: "煤炭工业改革"
 FRA_coal_industry_reform_desc: "煤炭是枫丹工业的主要能源来源。莫内计划将采矿设备现代化，、改进运输网络、开发新的矿区，这些举措致力于提高煤炭产量，以满足工业和家庭的需求。"
 FRA_develop_the_power_industry: "发展电力产业"
 FRA_develop_the_power_industry_desc: "没有电，该怎么推广电影呢？出于对电影的热爱，一项横贯法兰西的旨在提高电力生产与供应的建设蓝图在芙宁娜脑海中描摹出来了。出于敬业精神，全国电力委员会的官员花费了一些口舌向这位敬爱的女士解释明白看电影不需要花费如此多的电力，这无疑是给芙宁娜的兴头浇了一盆冷水。“您这是在质疑芙宁娜小姐的智慧吗？”乔治·克劳德，这位法国电力的执牛耳者如此为他的挚友（单方面认为）解围道，让芙宁娜松了一口气。 "
 FRA_nationalization_Of_part_of_industries: "部分行业国有化"
 FRA_nationalization_Of_part_of_industries_desc: "在全体行业废除私有制是一个不切实际的想法，但是，在部分行业建立一个整合的、强大的、由具有公共精神的计划者和技术专家设计的中央计划巧妙协调的公共部门具有一定的合理性。部分私营企业不能独立承担枫丹现代化的任务。同时，巨型的托拉斯有讹诈共和国的风险。"
 FRA_optimize_steel_industry: "优化钢铁产业"
 FRA_optimize_steel_industry_desc: "作为工业化的基石，钢铁产业的优化是计划的另一个重要目标。芙宁娜政府计划通过重组和国家干预进行这些优化整合。"
 FRA_agricultureal_modernization: "农业现代化"
 FRA_agricultureal_modernization_desc: "不知为何，枫丹近几年的天气水文好得出奇，但因此忽视农业无疑是一件愚蠢的事情。农业计划旨在提高生产效率，提高出口率。芙宁娜政府还计划通过推广机械化和提供信贷支持推动农业现代化。"
 FRA_strengthen_welfare_security: "加强福利保障"
 FRA_strengthen_welfare_security_desc: "我们的社会财富已经极大增加，让这种发展惠及更多公民是一件理所应当的事情。"
 FRA_ploicy_based_employment_guarantee: "政策性就业保障"
 FRA_ploicy_based_employment_guarantee_desc: "经历过失业痛苦的芙宁娜并不能充分理解失业者的痛苦，这也难怪，不是所有人都有和她一样长的连续工作经历。可是，当明白失业者不能得到工资后，芙宁娜还是发出了小声的惊呼。"
 FRA_compulsory_national_insurance: "强制性国民保险"
 FRA_compulsory_national_insurance_desc: "健康保险、失业保险、养老保险以及家庭福利是福利体系的重要内容。资金来源主要是雇主和员工的工资税，还有部分来自于政府的税收补贴。"
 FRA_comprehensive_public_health_services: "综合性公共卫生服务"
 FRA_comprehensive_public_health_services_desc: "综合性国民公共卫生服务(Service Public de Sante)是有多个公共机构和部门共同组成的体系，旨在为所有枫丹居民提供广泛而高质量的公共卫生服务。"
 FRA_housing_program: "住房计划"
 FRA_housing_program_desc: "芙宁娜常常会怀念自己退休后的公寓生活，枫丹住房与城乡事务部却表示大规模的、此种规格的民居是不切实际的。但是，在芙宁娜的坚持下，住房建设标准还是被一定程度提高了。"
 FRA_build_social_service_state: "建立服务型国家"
 FRA_build_social_service_state_desc: "没有比给婴儿喂奶粉更精彩的投资了......我们要促成的，是一种高标准的平等，而不是满足最低需求的平等"
 FRA_Furina_enlarge_the_Alliance: "扩大联盟"
 FRA_Furina_enlarge_the_Alliance_desc: "重新振作的枫丹不再在国际上处于守势，而是积极寻求由自己主导的国际秩序。瑞典的社会民主党，英国的共党，奥地利的马克思主义者......枫丹阵线正用自己的理念和芙宁娜的魅力吸纳着越来越多的盟友。"
 FRA_womans_suffrage: "女性选举权"
 FRA_womans_suffrage_desc: "自希腊以降，民主政治常常将女人排斥在外。现代，新西兰，美国等已经实现了女性选举权，枫丹的现状已经显得不合时宜了。"
 FRA_establish_a_system_of_universal_suffrage: "确立普选制度"
 FRA_establish_a_system_of_universal_suffrage_desc: "随着女性选举权的确立，真正的、名副其实的普选制度的确立已然是临门一脚的状态。芙宁娜丝毫不介意去摘下低垂的果实。从雅典到古罗马，从英国的尝试到如今的枫丹，普选制度终于得到完善，所有成年公民都能平等地参与政治生活。"
 FRA_new_Erfurt_programme: "新爱尔福特纲领"
 FRA_new_Erfurt_programme_desc: "是时候宣告我们的纲领与目标了"
 FRA_Furina_Plan: "芙宁娜计划"
 FRA_Furina_Plan_desc: "世界大战的伤痛并没有被抚平，许多欧洲国家濒临崩溃:社会不稳定，物资短缺，甚至有饥荒的风险。“我们不需要一个满是废墟的欧洲”，在巴黎高等师范学校的一次演讲中，对于欧洲各国的大规模经济援助计划被首次提出。 "
 FRA_accelerate_the_army_building: "加紧备战备荒"
 FRA_accelerate_the_army_building_desc: "我们腹背受敌，英国这个盟友不可靠，而苏联又过于遥远，因此，枫丹必须独自承担国防的重任——武器的生产，军队的建设，甚至是粮食的产出。"
 FRA_Joint_defense_with_sov: "枫苏共同防御"
 FRA_Joint_defense_with_sov_desc: "在意识形态上的差异得以消除后，于苏联建立更加广泛的军事同盟变成了可选的抉择。"
 FRA_set_up_state_economy_planning_commune: "成立国家计委"
 FRA_set_up_state_economy_planning_commune_desc: "消除经济上的不平等的第一步便是确立计划经济，而计划经济这栋大楼的基石，便是国家计委。"
 FRA_popular_organization: "建立群众组织"
 FRA_popular_organization_desc: "在过去的革命过程中，我们的力量无疑是群众赋予的，革命胜利以后，全国尚有大片权力真空地带。而旧的地方组织将要由新的群众组织所取代，由党委来领导。"
 FRA_asset_of_socialism: "求真之镜"
 FRA_asset_of_socialism_desc: "文艺工作者的镜头不能只对准富人的生活了。谁是统治阶级，谁就要牢牢地控制住媒体；而现在的统治阶级已经改换成了无产阶级，那么文艺左派中反映的就不能是贵族的风花雪月了——也可以存在一些，但作用必须是反衬；而主体必须是反映普通群众生活，或者是我国的社会主义建设的。"
 FRA_court_of_the_people: "革命特别法庭"
 FRA_court_of_the_people_desc: "有人说我们搞独裁——没错，我们就是搞独裁，至少对于讲这些话，或者是指使讲这些话的人，是很有必要搞一搞独裁的。不过，枫丹是个讲究文明的国家，即使对敌专政，亦要讲究程序正义，审判可以组织，律师自然也可以请，不过，结局是没有例外的。"
 FRA_task_finished: "终场收工"
 FRA_task_finished_desc: "完美，巩固政权是我们的第一任务，现在业已圆满完成。接下来，就是真正的共产主义建设了。"
 FRA_the_new_beginning: "新的任务"
 FRA_the_new_beginning_desc: "尽管我们已经取得了一定的成果，但距离我们的最终目标——实现共产主义，还有一段距离。值得庆贺的是，在自律机械的加持下，我们比人类历史上任何一个时刻都要接近共产主义。"
 SOV_western_russian_war: "开启西俄罗斯战争剧本"
 FRA_the_europe_unite: "大陆团结"
 FRA_the_europe_unite_desc: "数百年以来，欧洲大陆战争不断，两次烈度令人叹为观止的世界大战证明了这片土地的残酷。这些战争发生的原因及其复杂，究其本质，不同的叙事方式有着不同的解释，但有一点是相当明确的，那便是纷争下去并非长久之计。\n如何给这片鲜血浇筑的土地带来长久的和平成为了所有欧洲人苦苦思索的问题，现在，一种声音占据了多数——让欧洲成为一个团结的整体。\n现在，§Y欧洲统一§!的方案总体上的反对度为§Y[?fra_support_of_eruope_unite]%§!。\n§g*反对度并非达到0%才能完成统一，这个参数只会影响统一以后暂时的负面修正。§!"
 FRA_Furina_Plan_tt: "每有一个§Y主要国家§!批准该计划，那么:\n§Y芙宁娜计划§!追加效果:\n每日获得的政治点数:§G+0.1§!\n生活消费品工厂系数:§Y+5%§!\n每有一个§Y其他国家§!批准，则:\n§Y芙宁娜计划§!追加效果:\n每日获得的政治点数:§G+0.02§!\n生活消费品工厂系数:§Y+1%§!"
 furina_approval_major: "§Y芙宁娜计划§!追加效果:\n每日获得的政治点数:§G+0.1§!\n生活消费品工厂系数:§Y+5%§!"
 furina_approval_minor: "§Y芙宁娜计划§!追加效果:\n每日获得的政治点数:§G+0.02§!\n生活消费品工厂系数:§Y+1%§!"
 hurt_improve_1: "§Y战争创伤§!追加效果:\n建造速度:§G+10%§!\n生活消费品工厂系数:§Y-15%§!\n§Y芙宁娜计划§!追加效果:\n贡献给宗主国的民用工厂:§R+10%§!"
 FRA_offer_load_for_rebuilding: "为[FROM.GetnameDef]提供重建贷款"
 FRA_offer_load_for_rebuilding_desc: "现在[FROM.GetnameDef]的财政捉襟见肘，无法承担重建国家的任务，因而我们作为欧洲共主必须为其提供帮助。"
 europe_unite_support_add_5: "§Y欧洲统一方案§!的反对度:§G-5%§!"
 add_cic_10: "§Y芙宁娜计划§!追加效果:\n贡献给宗主国的民用工厂:§R+10%§!"
 add_consumer_good_10_neg: "§Y芙宁娜计划§!追加效果:\n生活消费品工厂系数:§Y-10%§!"
 FRA_utilize_the_plan: "利用计划"
 FRA_utilize_the_plan_desc: "真的以为我们的援助是白拿的吗？有得必有失，我们要在他们的经济上做点手脚来收回我们的成本。"
 europe_unite_support_decrease_5: "§Y欧洲统一方案§!的反对度:§R+5%§!"
 FRA_unite_propaganda: "一体化宣传"
 FRA_unite_propaganda_desc: "枫丹，意大利与德国迥然不同的文化会是欧洲统一之路上一个重要的阻碍，我们必须要让三国的人民意识到合并的益处。"
 europe_unite_support_add_10: "§Y欧洲统一方案§!的反对度:§G-10%§!"
 FRA_European_Coal_and_Steel_Community: "煤钢共同体"
 FRA_European_Coal_and_Steel_Community_desc: "煤是工业的血液，而钢则是骨骼，有了这两样东西，新欧洲的建设才能开始。"
 FRA_European_Atomic_Energy_Community: "原子能共同体"
 FRA_European_Atomic_Energy_Community_desc: "原子，何其微小。但最近的科学研究证明，这样微小的粒子，却蕴藏着难以想象的能量。在此之前，人类的能源，从人力，到畜力，到蒸汽，再到电力，已经历经了数次革新，原子能，很有可能便是取代电力的下一次能源革命。这样具有战略价值的研究，仅限于枫丹一国是不行的，科研需要在全欧洲范围内进行，当然，成果也是共享的。"
 FRA_the_unite_of_economy: "经济一体化"
 FRA_the_end_of_european_war: "历代欧战的终结"
 FRA_the_end_of_european_war_desc: "欢呼吧"
 add_research_speed_8: "§Y芙宁娜计划§!追加效果:\n科研速度:§Y+8%§!"
 FRA_European_Coal_and_Steel_Community_tt_fra: "§Y芙宁娜计划§!追加效果:\n生活消费品工厂系数:§Y-10%§!\n工厂产出:§G+5%§!\n战略资源获取效率:§G+10%§!"
 FRA_European_Coal_and_Steel_Community_tt_ita_ger: "§Y芙宁娜计划§!追加效果:\n生活消费品工厂系数:§Y-10%§!\n工厂产出:§G+10%§!\n战略资源获取效率:§G+15%§!\n贡献给宗主国的§Y民用工厂§!:§R+10%§!\n贡献给宗主国的§Y军用工厂§!:§R+10%§!\n贸易自治度增长:§R-50%§!"
 FRA_improve_the_hurt_of_war: "极大§G削弱§!§Y战争创伤§!"
 FRA_the_end_of_european_war_tt: "§C告别纷争不断，残酷剥削着工人的旧欧洲，迎来平等繁荣的崭新纪元！§!"
 add_support_20: "§Y欧洲统一方案§!的反对度:§G-20%§!"
 FRA_skip_the_strike: "跳过罢工剧情"
 FRA_skip_the_strike_desc: "现在红线还没有内容，强制罢工，改换国策甚至与公社一战好像不太妥当，所以还是提供一个跳过的选项吧。后面红线做完就移除了。"
 CAM_pol_pot: "导师千古"
 CAM_pol_pot_desc: "波尔布特的路线是非常符合柬埔寨国情的，只要根据波导的理论，柬埔寨实现社会主义指日可待。"
 cam_tutor: "导师"
 second_chief: "国家副手"
