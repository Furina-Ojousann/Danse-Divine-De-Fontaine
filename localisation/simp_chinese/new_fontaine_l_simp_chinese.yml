 fra_union_of_stalinist_and_maoist_desc: "应该说，斯派与毛派的主张是完全不割裂的。尽管在在一些方面存在差异，但在原则性的问题上都可以达成一致。这个时候，就要维护党的团结，不要制造出第二个托洛茨基来。"
