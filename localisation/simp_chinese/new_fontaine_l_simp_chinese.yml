 Levant_Union_democratic_party: "黎凡特联合工党"
 FRA_the_campaign_of_levant: "黎凡特之战"
 FRA_the_campaign_of_levant_desc: "黎凡特，也许是文明最早发源的地方之一。千年历史过去，带来繁荣的商路已不复存在，经济地位湮没在了火车探照灯中。但圣城耶路撒冷赋予了这里无比的宗教意义，而宗教，又给予了这里政治意义。所谓国际共管，不过是两大强国争夺的幕布。即便如此，圣城绝不能落入对方之手。\n\n在对黎凡特联盟的影响力达到§Y100§!以后，果断采取行动，赶在对方之前把胜利果实牢牢抓住。\n\n§Y[FRA.GetName]§!的影响力为:§Y[?ISR.isr_condominium_fontaine]§!\n\n§Y[ENG.GetName]§!的影响力为:§Y[?ISR.isr_condominium_england]§!"
