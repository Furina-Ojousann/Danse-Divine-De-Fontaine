 FRA_the_black_army: "黑军"
 FRA_the_black_army_desc: "自由与安全的取舍是公社的一个重要问题。我们追求个人的自由，却要养着一只如此庞大的军队来保护我们的安全，这是一个十分诡异的矛盾。"
 FRA_anarchist_Makhnovtsi_tt: "以§Y黑军§!取代§Y工农红军§!，效果变化:\n每日中立主义支持率:§R+0.08§!\n突破:§G+10%§!\n步兵攻击:§G+10%§!\n移动中组织度损失:§G-25%§!\n侦察:§G+15%§!\n陆军师组织度:§R-10%§!\n最大指挥点数上限:§R-20§!"
 FRA_commune_military: "公社军略"
 FRA_commune_military_desc: "黑军于大罢工期间的动荡中诞生，锤炼于内战的烈火，由草草召集的工人民兵成长为了一只职业军队。但放眼全球，黑军依然显得弱小。也许可以退入本土，拱卫公社，却难以打出国门，击碎资产阶级所构建的旧秩序。\n\n为了实现人类解放的目标，我们必须积极建军，尽可能快地将黑军改造成一支有能力与最精锐的侵略者决战的善战之师。\n\n\n\n£decision_cat_picture_black_army\n\n\n\n\n"
 FRA_anarchism_economy_trigger: "§Y人民共和国§!必须诞生于§R内战§!才能执行更加§R激进§!的路线"
 fra_preempt_beligum_position: "抢占低地阵地"
 fra_preempt_beligum_position_desc: "本土决战是一个不明智的选择。加莱，兰斯一带本就是我们最重要的工业基地，让战火毁坏这里的代价我们无法承受。也许将阵地转移到比利时进行决战会比较好。"
 fra_action_norman_conquest: "行动-诺曼征服"
 fra_action_norman_conquest_desc: "我们将不计一切代价，解决以为有皇家海军保护便高枕无忧的英国贵族老爷们..."
 fra_action_cross_the_alps: "行动-跨越阿尔卑斯"
 fra_action_cross_the_alps_desc: "德国的攻势已被粉碎。德军侵略的矛头一旦钝化，其整个防线都会变得脆弱，是时候一击制胜，送走那个歇斯底里的独裁者了..."
 fra_action_solferino: "行动-索尔费里诺"
 fra_action_solferino_desc: "将近一百年前，在我们的帮助下，渴望统一的意大利人民在索尔费里诺战役中取得了决定性的胜利，击溃了奥地利侵略者。这一次，我们将同样帮助意大利人民实现自己的诉求——打倒那个歇斯底里的民粹主义者。"
