 Modify_Extra.5.t: "构想未通过可行性调查"
 Modify_Extra.5.d: "根据我们研究人员的报告，尽管构造由水平旋转的动力旋翼提供向上升力和飞行推进力的飞行器早有构想，然而将其真正实现，并且使其具备战场能力，我们的研究人员直言不讳，称其“以我国现存已知的技术，没有实现构想的可能性”。不过随着空气动力学的进步，也许我们终有一天可以将旋翼机军事化。"
 Modify_Extra.5.a: "唯有等待..."
 Modify_Extra.6.t: "攻击直升机——研究开始"
 Modify_Extra.6.d: "得益于最近空气动力学的突破以及新型旋翼机，或者说直升机的面试，将这种新技术进行军事化的构想终于通过了可行性评估，一个实验研发团队已经被组建起来。如果情况理想的话，我们大概能在一年内取得实验性装备。"
 Modify_Extra.6.a: "期待你们的进展。"
 Modify_Extra.7.t: "航空步兵构想"
 Modify_Extra.7.d: "攻击直升机已被证实具备足够的火力，机动性与防御能力。但如何将其融入我们的作战体系，开辟战争的“低空”维度，依然是一个问题。不过总参谋部对这种新式武器很感兴趣，批准调拨一支军官团与技术人员们组成联席会议讨论战术，而一个临时部队则被用以演练。如果我们加大投入的话，也许可以更快取得进展。"
 Modify_Extra.7.a: "科学再烧钱也不为过！"
 Modify_Extra.7.b: "我们需要限制一下预算..."
 Modify_Extra.7.c: "应该放缓研究，现有技术已经足够打赢这场战争。"
 Modify_Extra.8.t: "改进战术"
 Modify_Extra.8.d: "战争已经结束了。虽然公众普遍认为坦克与火炮是这场大战的主角，但实际上直升机已经登场，可实际效果却未能达到最佳。尽管如此，直升机作战依旧被认为是一项前途远大的理念。在获得政府的批准以后，新的实验团队已被组建。"
 Modify_Extra.8.a: "直升机要来了！"
 Modify_Extra.9.t: "攻击直升机实验大获成功"
 Modify_Extra.9.d: "在之前旋翼机的基础上，让旋翼机搭载武器被证实可行，而且可能是一种极有前途的新式武器。因为在过去的战争中，陆地被装甲支配，高空则是各种航空器，可低空这一维度却从未有人涉及。因此，这款实验性攻击直升机会是一款划时代的作品。"
 Modify_Extra.9.a: "酷。"
 Modify_Extra.10.t: "航空兵团"
 Modify_Extra.10.d: "直升机的低空支援在演习中被证明非常有效，当初生涩的驾驶员与新兵在训练中已经成长为一支具备战斗力的新式部队，随时可以投入战斗。"
 Modify_Extra.10.a: "你们都是幸运儿。"
 Modify_Extra.11.t: "新学说"
 Modify_Extra.11.d: "军官团对于低空战争的理论研究取得了突破，现在攻击直升机可以在实战中取得更好的效果。"
 Modify_Extra.11.a: "不错。"
