 german_leader: "德国专员"
 return_the_guangzhoubay: "归还我国领土"
 FRA_mediate_sino_japan_war: "调停第二次中日战争"
 FRA_mediate_sino_japan_war_desc: "尽管早就有战略家指出，日本对于中国的侵略不可能取得成功，但出于对我们先前施加给中国的一系列残酷压迫的歉意，我们需要在让中国付出尽可能少的代价赶走侵略者。"
 FRA_mediating: "商讨调停方案中..."
 FRA_mediating_desc: "日本帝国主义是一头贪婪的狼，没有足够的好处绝不会就此收手，但我们又不能用中国的某些利益作为筹码，因此只能从国内寻找可行的方案。"
 must_have_a_solution: "§Y再想想，一定有办法的§!"
 FRA_operate_the_consensuses_machine: "开动舆论机器"
 FRA_operate_the_consensuses_machine_desc: "声援正在遭受侵略的中国的第一步就是引起世界对于东亚的关注。"
 FRA_operate_the_consensuses_machine_tt: "引发第二次中日战争"
 FRA_appeal_enbargo_japan: "呼吁国际社会禁运日本"
 FRA_appeal_enbargo_japan_desc: "日本本土缺乏资源，其战争机器的运转极度依赖外国进口，若是国际社会愿意禁运日本，也许能使它的战争生产陷入瘫痪。"
