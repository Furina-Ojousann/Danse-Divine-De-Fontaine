 fra_stalinist_start_democracy_desc: "我们的党政机关似乎有些过度强调集中了。一味地集中固然可以在短时间内提高效率，但长远来看却会对党的建设带来毁灭性的打击。现在，我们的国内外局势已经没有以前危险，民主的建设可以提上建设。"
