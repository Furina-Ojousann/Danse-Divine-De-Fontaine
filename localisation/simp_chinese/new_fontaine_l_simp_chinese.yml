 JAP_contine_to_develop_military_industry_desc: "在新的国际局势下，我们必须继续扩张军需产业。只有保证军工产能的不断增长，国家才能在即将到来的冲突中立于不败之地。"

 JAP_national_special_time_bond_desc: "财政赤字的不断扩大，需要通过特别国债来弥补。国家将动员民间资金，以“时局”为名发行特别债券，以保障军费开支。"

 JAP_special_calculation_desc: "设立特别会计处，可以使军费与一般会计分离，确保军部所需资金能够不受议会与预算限制地持续供给。"

 JAP_Nippon_America_convention_desc: "日美谈判未能达成妥协，意味着我们必须在国内资源的极限利用中寻找出路。今后的战争准备将完全依赖本土与殖民地供给。"

 JAP_south_china_sea_order_desc: "南洋劳工的组织与调配，将为帝国的军需工业提供大量廉价劳动力。虽然会引发抵抗，但在战争体制下已无回避的余地。"

 JAP_stabilify_the_occupyed_area_desc: "在已占领的地区推进共荣秩序，是帝国维持长期统治的必要手段。安抚、统制与剥削将并行不悖。"

 JAP_save_resource_desc: "资源有限，必须推行彻底的节约与回收政策。通过简化生产、限制浪费，我们能够将更多原料投入军需之中。"

 JAP_expand_social_mobilization_desc: "国家将进一步扩大动员范围，从工厂、农村到学校，所有国民皆必须为战争服务。"

 JAP_simplify_design_desc: "通过取消繁琐的设计与非必要改进，可以降低生产成本、加快军备产出。数量比完美更重要。"

 JAP_general_control_desc: "全局性的经济与社会统制体制将被确立，国家的一切机能将转为服务战争。"

 JAP_mobilize_teen_and_women_desc: "青年与妇女必须被动员进入工厂、田野和服务团体。无论性别与年龄，人人皆为战时资源。"

 JAP_imperial_laborer_organization_desc: "帝国劳动服务团的设立，将把庞大的劳动力统一纳入军国体制，进行集中管理与强制分配。"

 JAP_bet_the_fate_desc: "我们将赌上国运，把全部民用工业转化为军工生产。这是背水一战的抉择，成败即关乎帝国的存亡。"

 JAP_national_budget_army_based: "国家予算案"
