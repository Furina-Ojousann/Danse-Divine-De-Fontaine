 FRA_unbreakable_popular_front: "团结人民阵线"
 FRA_unbreakable_popular_front_desc: "看起来，布鲁姆的改革卓有成效：罢工在劳动法改革以后频次下降了80%，新的女性选民狂热地支持人民阵线政府。在实打实的政绩面前，共产党，激进党等诸多盟友愈发团结，就连平时喋喋不休的右翼政党也不得不暂时闭上嘴巴。那么是时候把目光向外看了。"
 FRA_remove_comintern_effect: "消除共产国际影响"
 FRA_remove_comintern_effect_desc: "莫里斯·多列士简直是被莫斯科的斯大林遥控着的。右翼对他的指控某种意义上也算部分正确，他完全就是不自己思考，只按照斯大林的指示做事。法国有自己的社会主义，放任这么个斯大林的傀儡肯定会造成麻烦的..."
 FRA_remove_comintern_effect_tt: "共产主义者会重审这场战争的性质，并且不会在战时组织反战，罢工等行动"
 left_wing_opposer_systemized: "体制内的左翼反对派"
 FRA_continue_to_reform: "改革继续"
 FRA_continue_to_reform_desc: "法国依然存在许多弊政：歧视，仇恨，军事干预依然在死守过时的制度和价值观。第二阶段的改革目的在于除去这些恶疾。自从德雷福斯案件开始的进步时代将继续，第三共和国依然屹立不倒！"
 FRA_democratic_army: "民主宪政进军队"
 FRA_democratic_army_desc: "军人只为国家的民主制度而服务。一些军官老土的保皇，反犹，法团主义思想该被革除，而最基层的列兵也要懂卢梭和孟德斯鸠。"

