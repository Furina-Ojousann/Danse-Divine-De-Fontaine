 winter_preparation: "攻俄准备"
 winter_preparation_desc: "法军上一次深入俄国时，大量的士兵因为寒冷的气候而冻死，既是一场人道主义的灾难，对帝业也是重大的打击。我们必须在这一次远征中克服准备不足的问题。"
 fra_fontaine_control_ukraine_trigger: "§Y基辅§!是我们的§Y主要目标§!，完成主要目标即可得到§Y主要奖励§!。而§Y哈尔科夫§!，§Y克里米亚§!，§Y罗斯托夫§!为次要目标，控制它们可以得到§Y附加奖励§!\n\n如果主要目标§R未完成§!，即使完成全部次要目标也§R无法得到奖励§!\n\n"
 fra_ukraine_offensive_plan: "执行博罗季诺计划"
 fra_ukraine_offensive_plan_desc: "博罗季诺计划分为五部分，按照时间顺序：§Y乌克兰攻势§!；§Y中俄罗斯攻势§!，§Y诺夫哥罗德攻势§!，§Y库班攻势§!以及§Y西俄罗斯攻势§!。预计用大约两年的时间，尽可能稳健地击溃苏联，并且在占领区建立起恰当的秩序。如果上一次攻势成功达到了主要目标，下一阶段的攻势就会开始。但§R一旦中断，计划便无法恢复！§!"
