 FRA_fontaine_three_force_decision: "枫丹三权"
 FRA_fontaine_three_force_decision_desc: "枫丹的国家机器由三个动力驱使它缓缓运作：君权，神权，军权。更具体地说，三者是屈从，安抚与粉碎可能的反抗的联合，从而构成超稳定的社会有机体。"

