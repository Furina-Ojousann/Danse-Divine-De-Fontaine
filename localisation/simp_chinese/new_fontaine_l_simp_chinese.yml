 FRA_Non_Christianization: "非基督教化的再度尝试"
 FRA_French_new_holidays: "枫丹假日"
 FRA_French_new_holidays_desc: "基督教的节日已经不再适用于现在的枫丹了，在芙宁娜降临枫丹的时候，上帝还不知道在什么地方呢。我们需要制定一套新的节假日安排来适应情况的变化。"
 GFX_opera_of_trial: "戏剧审判"
 GFX_opera_of_trial_desc: "其他国家的审判总是在紧张的法庭上进行，但枫丹的审判则有别于之，一场审判将以戏剧的形式来完成。"
 FRA_the_value_we_fight_for: "斗争不休"
 FRA_the_value_we_fight_for_desc: "在长达数千年的时间里，人类社会的主旋律就是斗争，地主斗奴隶主，资本家又斗地主，到现在工人又上台来斗资本家。枫丹的国民从来都不缺乏斗争的精神，但我们要提醒我们的国民，在生活水平提高的同时，千万不要忘记斗争。"
 FRA_remove_the_disease: "消除痼疾"
 FRA_remove_the_disease_desc: "民族主义总是会蒙蔽千百万的大众，我们需要国际主义精神取而代之。"
