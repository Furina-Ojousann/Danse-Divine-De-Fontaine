 FRA_Fontaine_Energy_Physical_Mechines: "动力机械研究"
 FRA_Fontaine_Energy_Physical_Mechines_desc: "新式的动力机械相比于过去笨重的大型机械，其成本降低了不少，在未来，动能机械除了提高建设效率以外，也许可以开发出战争用途。"
 FRA_Fontaine_Energy_Physical_Mechines_tt: "§Y枫丹动能工程科学研究院§!追加效果:\n生活消费品工厂系数:§Y-15%§!\n建造速度:§G+10%§!"
 FRA_Fontaine_Energy_Physical_Mechines_tt_2: "§Y枫丹科学院总部所在地§!追加效果:\n当地资源:§R-20%§!\n当地可用人力:§G+15%§!\n当地建造速度:§G+15%§!"
 FRA_the_reform_of_jacobins: "§B自由§! §W平等§! §R博爱§!"
 FRA_the_reform_of_jacobins_desc: "“自由、平等、博爱”是法国大革命的原则及口号。革命爆发时，巴黎镇长让-尼古拉·帕什在巴黎的墙上涂上“自由、平等、博爱，或死亡”。首次使用它的政治人物是罗伯斯庇尔，他在1790年的国会会议中的演说中，便引用了巴什的标语。在法兰西曲折的历史中，该口号正式成为了国家格言。\n\n可惜的是，在第三共和国漫长的时间里，这个共和国既不自由，也不平等，更谈不上博爱，在枫丹时期，这三个短小精悍的词语会成为指导我们建设国家的明灯。"
 FRA_virtue_wisdom: "智慧"
 FRA_virtue_impartiality: "正义"
 FRA_virtue_courage: "勇气"
 FRA_national_motto: "国家格言"
 FRA_motto_liberity: "自由"
 FRA_motto_fraternity: "博爱"
 FRA_motto_equality: "平等"
 FRA_deal_the_issue_of_workers: "处置下岗工人"
 FRA_deal_the_issue_of_workers_desc: "高效而低成本的自律机关在很多工厂中取代了流水线上的工人，失去工作对于他们意味着失去了面包，尽管枫丹的确有一定的社会保障，但这甚至不能满足他们的温饱。工人们日夜劳作，兢兢业业地为共和国生产一切的物资，不应该因为一场技术革新就失去生路，因此我们需要给出妥善的处理办法。"
 FRA_state_production_allocation_committee: "国家资源调配委员会"
 FRA_state_production_allocation_committee_desc: "我们国家的生产力突飞猛进，这本该是一件喜事，但如果分配制度未能随之改善，大大提高的生产力反而会导致严重的生产过剩。成立委员会的目的就在于将生产的所有商品根据需要，有序地分配到民众手里；在国民议会中，左翼党派总是贬损这个方案，但这是枫丹作为一个资本主义国家所能做出的最大让步了。"
 FRA_self_control_machinery: "特化型自律机关"
 FRA_self_control_machinery_desc: "机器人战士——听起来十分炫酷的一个概念，近些年来在各国的影视作品中多有出现。然而，枫丹动能机械的进步却把科幻搬到了现实，现在，这些实验性的机器人战士被称为“特化型自律机关”，在可行性调研结束以后，便可以正式投入到战争中。"
 FRA_manufacture_machinery: "量产自律机关"
 FRA_manufacture_machinery_desc: "生产自律机关的代价高昂，但在实际的生产过程中并非没有可以简化的地方，经过天才科学家们的重新设计，现在的自律机关的生产难度又降低了许多，技术亟需推广便可发挥效果。"
 FRA_civil_machinery: "民用机械"
 FRA_manufacture_tanks: "转产其他大型机械武器"
 FRA_manufacture_tanks_desc: "机械战士很酷，但似乎在技术上更加成熟，并且已经发展出一套完整的作战理论体系的坦克更加可靠，枫丹在动力机械上取得的进步，只要稍加变通，也许就可以逐步应用到坦克上。"
 FRA_prosthesis: "机械义体"
 FRA_details_in_our_life: "我们生活中的细节"
 FRA_details_in_our_life_desc: "洗衣机，加湿器，风扇，一些看似不起眼的小器件，却又的确是提高生活质量的重要因素。过去，普通的家庭总是需要在一些简单而又不得不做的事情上花费大量精力，抑或是忍受空气的干燥，酷暑的高温，而贵族家庭这些事情则通通有人代为解决；现在，一些机器也可以解决这些问题。"
 FRA_Fontaine_machinery_revolution: "枫丹机械革命"
 FRA_Fontaine_machinery_revolution_desc: "在科学与技术日新月异的第一次工业革命初期，不少的人畅想过百年以后的世界，因为当时的人显然无法想象到以后的技术会取得怎样的革命性发展，因而他们的想象只能寄托在蒸汽机上——一个到处都是蒸汽机的社会，齿轮与锅炉不加掩饰地暴露在人们眼前，显现出一种机械的美感，这便是古人构想中的未来。\n现在，枫丹已经掌握了将全国改造成这样的一个社会的全部条件，各式各样的机械可以在人们生活的方方面面起到代劳的效果，使得广大人民群众具有了从事更有意义的劳动的机会，这不再是一场技术上的变革，也会是整个社会的一场革命。"
 unlock_the_production_of_machinery: "解锁§Y特化自律机关§!的制造，及其对应的§Y兵种§!，包括:\n§Y攻坚特化自律机关§!\n§Y歼灭特化自律机关§!\n§Y压制自律特化机关§!"
