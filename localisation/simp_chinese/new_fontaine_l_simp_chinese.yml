l_simp_chinese: 
 MISERABLE_WORLD: "悲惨世界"
 MISERABLE_WORLD_DESC: "神明，也许具有扭转万象的能力，只需弹指一挥，沧海便能桑田。但人间的事，从来都不是如此简单的。\n世界上的大部分地区仍在混乱之中苦苦挣扎。在凡尔赛体系的余烬中，某些新生的事物正在萌发之中，他们传递于人们的口口相传之中，在聚光灯未能照耀的地方悄悄生根发芽。这股涌动中的力量，终究是要激发出来，将这世界变了模样的。届时，哪怕是神明，亦会在这排山倒海的力量面前感到无力。\n\n§R剧本尚未完成§!"
 FRC_HISTORY: "枫丹共和国的衰弱早已被马克思主义政治经济学的基本原理预言到。现在能够挽救枫丹的不是虚伪的资产阶级民主，不是社民党软弱的调和，更不是法西斯的专政，而是人民的意志。\n\n可惜我们的革命之路注定荆棘遍布，要将我们的理念从枫丹的一隅传播到全国乃至世界，残酷的斗争不可避免。\n\n这个国家可以在游戏进程中出现。"
 FRO_HISTORY: "异国铁蹄的践踏无情地终结了枫丹共和国无止尽的内耗，国土沦于敌手，似乎共和国最终还是带着厚重的历史走入了坟墓。\n\n但在失望的黑夜中，一点星光在世界的一个角落中亮起，那是由具有最高勇气的爱国者燃起的，呼唤所有不甘屈服的枫丹子民加入反抗暴政的运动。\n\n这个国家可以在游戏进程中出现。"
 FONTAINE_HISTORY: "在世界山雨欲来的大背景下，枫丹共和国的政治进入了最为撕裂的阶段——左右翼的准军事组织在街头各自为战，日益极化的意识形态使得中间党派不得不在夹缝中求得生存。毫无疑问，源自于1870年的古老民主共和制度终于在枫丹时期病入膏肓。\n\n若要力挽狂澜，挽救这个国家的未来，最可行的手段便是来一剂名为“革命”的猛药。"
 FONTAINE_TALE: "枫丹童话"
 FONTAINE_TALE_DESC: "所有的童话最初都是写给大人看的。因为无论多么复杂精彩的童话，其结局必定是公理取胜。人性中的真，善与美的品质在文字中绽放出绚丽的文学之花，我们可以说童话，是理想主义的一种体现。\n但在我们生活的这个世界，利益纠葛是大多数人的行为准则，人们在逐利中奔走，人生在不断的妥协之中延续下去。而所谓的正义，只是一种可以想象却不可得的象征。\n\n倘若正义女神真正降临人间，把童话中的理想照进现实，那想必一定是一个无比温柔的故事吧。"
 PRC_public_corns: "救国公粮"
 PRC_public_corns_desc: "军队和党政机关的开支巨大，为了免于财政的崩溃，我们不得不开始征收改了个名字的农业税——救国公粮，不过好在这还在控制范围之内。"
 PRC_40_percent_rent_decrease: "二五减租"
 PRC_40_percent_rent_decrease_desc: "中国的革命力量虽然强大，但难以被调动起来，为了争取全国的解放，保证革命火种不被浇灭，我们必须争取地主阶级的支持，当然，农民还是我们的基本盘，所以这只是有限的妥协。"
 PRC_uphold_the_land_reform_policy: "把土地改革进行到底"
 PRC_uphold_the_land_reform_policy_desc: "农民和地主的对立是不可动摇的，两头讨好只会让地主心存疑虑的同时失去农民的支持，这对于我们来说无异于毁灭了自己赖以生存的土壤，因此我们必须把地主阶级彻底打倒，让农民更加支持我们。"
 PRC_contact_capitalists: "接触资产阶级"
 PRC_contact_capitalists_desc: "资产阶级总体上是反动的，但它的内部有值得拉拢的对象"
 PRC_agric_assistance: "农业互助"
 PRC_agric_assistance_desc: "有的时候农民家里最值钱的不是什么别的东西，而是他们的那根破锄头，有的贫下中农农具质量低下，而情况稍好的中农和富农可能会有富余，我们可以用行政力量来调配。"
 PRC_great_production_movement: "大生产运动"
 PRC_great_production_movement_desc: "自己动手，丰衣足食是我们在新形势下提出的口号，是时候让军队投入生产了。"
 PRC_public_corns_tt: "§Y根据地战时经济§!追加效果:\n战争支持度:§R-5%§!\n生活消费品工厂系数:§Y-10%§!"
 PRC_contact_the_soviet_union: "联络共产国际"
 prc_has_set_up_the_people_republic: "中华人民共和国已经成立"
 PRC_long_live_the_human_unity: "世界人民大团结万岁"
 PRC_china_russia_transportation_lane: "中苏交通线"
 PRC_the_7th_meeting_of_CPC: "中共七大"
 PRC_the_eastern_wind_beat_the_western: "东风压倒西风"
 PRC_the_tech_support_of_sov: "苏联技术支持"
 PRC_Wulumuqi_Alma_Ata_railway: "乌鲁木齐-阿拉木图铁路"
 PRC_promise_of_moscow: "中苏莫斯科宣言"
 PRC_bring_revolation_to_other_countries: "输出革命"
 PRC_Five_Principles_of_Peaceful_Coexistence: "和平共处五项原则"
 PRC_north_east_china: "接管东北"
 PRC_north_east_china_desc: "东北抗日联军在我国东北的雪原中顽强地斗争了十几年，为我们共产党在东北打下了广大的群众基础，我们只要组织解放军肃清当地地主武装，便可趁国民党在东北立足未稳打下一片广大的根据地。"
 PRC_organize_neofour_army: "整编新四军"
 PRC_drive_out_kuomintang_liberate_china_totally: "给予白匪的最后一击"
 PRC_drive_out_kuomintang_liberate_china_totally_desc: "在解放战争的各个战场，白匪疲态尽显，我军已经有能力转入战略进攻，是时候组织攻势，打到南京去，去彻底那结束五千年由奴隶主，地主，买办，官僚资产阶级塑造的腐烂秩序了"
 Comintern_button_tt: "§Y共产国际§! - §Y[GETcominternlevel]§!"
 comintern_leader: "主导国"
 comintern_partner: "成员国"
 Comintern_decision_category: "共产国际"
 Comintern_decision_category_desc: "共产国际的任务是团结工人阶级和劳动群众，推翻资本主义和帝国主义统治，确立世界范围的无产阶级专政，建立世界苏维埃社会主义共和国联盟，彻底消灭阶级，实现社会主义和共产主义。"
 prc_become_partner_of_comintern: "§Y中华人民共和国§!加入§Y共产国际§!"
 leader_flag_desc: "§Y[SOV.GetNameDef]§! - 共产国际§Y领导国§!"
 PRC_40_percent_rent_decrease_tt: "§Y根据地战时经济§!追加效果:\n每日消耗的政治点数:§G-0.15§!"
 is_comintern_partner: "是共产国际成员国"
 FRA_sovereignty: "独断圣裁"
 FRA_sovereignty_desc: "法国人民受够了混乱的民主，是时候让强有力的君权取而代之了"
 FRA_democratic_under_grace_of_emporer: "恩惠下的民主"
 FRA_democratic_under_grace_of_emporer_desc: "法国大革命带来的民主，自由的价值观已经在法国深深扎根，事实上君主制与之并不冲突，相反，皇帝陛下带领下的法国会再次像他的祖先——拿破仑·波拿巴一样，为欧陆带来全新的价值观。"
 will_decided_by_the_election: "该国策在§Y选举§!后§Y直接完成§!"
 FRA_suppress_the_disrevolution: "镇反运动"
 FRA_suppress_the_disrevolution_desc: "无产阶级夺取政权以后，没有理由包容过去的封建保皇派，法西斯主义者，以及资产阶级共和主义者了，为了革命的稳固，他们必须被彻底打倒。"
 FRA_suppress_the_disrevolution_category: "镇反运动"
 FRA_suppress_the_disrevolution_category_desc: "自由，平等，博爱是我们的价值观，但一些反革命的势力以此攻击我们的社会主义共和国侵犯人权。恰恰相反，我们的目标是打倒少数的反动势力，维护多数人的自由，平等与博爱，届时共和国取得长足的进步，没人会在意这些捕风捉影的指责。"
 FRA_suppress_the_Croix_de_Feu: "镇压火十字团"
 FRA_suppress_the_Croix_de_Feu_desc: "火十字团是一个由退役老兵们组成的极右翼组织，因为他们未能从共和国这里得到他们应有的补偿，便转向了民族主义的阵营，把自己的怒火撒到异族人身上，这种反动透顶的组织必须被取缔，不过也说明我国的退伍军人待遇的确应该提高。"
 FRA_improve_the_treatment_of_veteran: "提高退伍军人待遇"
 FRA_improve_the_treatment_of_veteran_desc: "显然不公正的待遇是促使老兵们右转的主要因素，若能够弥补这一缺憾，则应立刻改变它。"
 FRA_reorganize_the_parliament: "重组国民议会"
 FRA_reorganize_the_parliament_desc: "革命的经济基础要抓，上层建筑也不能放过"
 FRA_defeat_monarchists: "扫除保皇派"
 FRA_defeat_monarchists_desc: "保皇派比资产阶级和法西斯主义者更加反动，他们甚至不满足于资产阶级的旧秩序，要把法国拉回大革命以前了"
 FRA_reorganize_french_army: "改组军队"
 FRA_reorganize_french_army_desc: "军队保守派丛生，在我们的改革危及他们的利益之后，他们便会跳起来发动政变，我们必须在他们形成气候之前打倒他们。"
 FRA_destroy_the_counter_revolution: "打倒一切，全面内战"
 FRA_beginning_of_judge: "序幕"
 FRA_beginning_of_judge_desc: "“命运如同戏剧，你永远不知道转折在何处。”\n\n席卷法兰西的大明星，芙宁娜·德·枫丹的另一面，即是众水、众方、众民与众律法的女王。现在，横贯整个欧洲大陆的神圣审判即将开始，给流淌着罪恶之血的街道，工厂，司法院带去失去的“正义”。"
 FRA_Robespierre_s_soul: "罗伯斯庇尔的幽灵"
 FRA_Robespierre_s_soul_desc: "法国从来都是一个充满革命性的国家，腐朽的第三共和国政府总是有意地淡化她的革命色彩，在崭新的枫丹时期，新的罗伯斯庇尔会降临人间，充满戏剧性的时代即将开始。"
 FRA_nationwide_martial_law: "全国戒严"
 FRA_nationwide_martial_law_desc: "在审判开始之前，必须压制住所有对此感到畏惧的人。只有为恶者才会惧怕正义的审判，众律法之女王芙宁娜，会公正地裁量所有人的罪责"
 will_be_removed_soon: "§G这些都是为保证审判能够顺利开始的临时举措，审判结束以后，这些过激的极端措施会立刻解除§!"
 FRA_suppress_the_army: "压制军队"
 FRA_suppress_the_army_desc: "每一支部队都会被命令禁止进入首都......并且停止一切军事活动。"
 FRA_JUDGE: "审判终临"
 FRA_JUDGE_desc: "你们有罪，全部都是。\n不要以为穿着西装，冠冕堂皇地坐在官邸里便与罪过撇清了一切关系。你们咒骂强盗偷窃资财，称社会主义为匪帮一群，却对你们如何积攒财富毫无自知。\n去死吧，你们死于一个至死不愿清醒过来的共同幻觉中。"
 old_guards_disappeared: "老将军们已经退休了"
 FRA_1st_Fontaine_National_conference: "第一届枫丹国民议会"
 FRA_1st_Fontaine_National_conference_desc: "审判完成后，是时候将战略重心转移到经济上了，这种事宜应该召开一个大型会议加以讨论，征集各阶级的意见。"
 FRA_the_Mainland_Cruise: "大陆巡游"
 FRA_the_Mainland_Cruise_desc: "德国，意大利的法西斯政权在北方和东方两面包围了枫丹，而南边西班牙的保皇派与长枪党随时有可能夺取政权，枫丹的外交正处于危险的境地，因此必须以国家元首亲自出动的高规格出访来争取欧洲一切可以团结力量的支持。" 
 will_bypass_soon: "召开§Y第一届枫丹国民议会§!以完成此国策"
 FRA_support_capitains: "支持企业家"
 FRA_support_capitains_desc: "经济停滞都是市场不够自由导致的，而共产党更是破坏市场经济的罪魁祸首。所以说经济要有起色，第一步就是剿共，然后无形的大手就会自动把我们的经济数据向上拉。"
 FRA_support_workers_desc: "第三共和国经济混乱正是因为资本家一心牟取高额利润而残酷剥削工人，指望他们为国家的经济做出贡献毫无意义。满足工人们的诉求，给予其合理的休息以及薪资，才能促使他们努力工作。"
 FRA_support_workers: "支持工人"
 FRA_Moman_agreement: "签署《沫芒协议》"
 FRA_Moman_agreement_desc: "克洛琳德与工人代表在沫芒宫拟定的《沫芒协议》规定了所有法国工人，包括殖民地工人的四十小时工作周制度，每年两周的带薪休假以及提高20%的最低工资，现在只需要芙宁娜的批红，在议会确认以后就可以在全国实施。"
 FRA_strengthen_the_worker_union: "强化工会"
 FRA_strengthen_the_worker_union_desc: "向工人让步没什么大不了的——这种让步甚至可以看作是一种以退为进。就赋予工会更大的权力来好好安抚占这个国家70%人口的工人群体吧。"
 FRA_state_Run_industry: "国营工业"
 FRA_state_Run_industry_desc: "枫丹若是没有武器，恐怕就撑不到下一个经济周期的到来了。只有迅速建立国营工业才能快速为军队提供必要的物资。"
 FRA_the_god_s_grace: "神明恩泽"
 FRA_the_god_s_grace_desc: "芙宁娜是众水之主，拥有掌控天下之水的神力，这自然可以保证国家农业风调雨顺。"
 FRA_agriculture_mechanization: "农业机械化"
 FRA_agriculture_mechanization_desc: "人类最传统的农业是看天吃饭的。现在我们拥有一个仁慈的“天”，却并不意味着这种劳作方式因此无需改变。将优越的农业条件和先进的农业技术结合起来，在科学家的预计下，可以达到大幅增产的目标。"
 FRA_continue_the_land_policy_to_colony: "将土地政策延续至殖民地"
 FRA_continue_the_land_policy_to_colony_desc: "殖民地的乡村还处于地主统治的封建秩序，我们必须帮助他们步入现代化。"
 can_get_core_from_colony: "§G可以获得一些殖民地的核心§!"
 FRA_colony_policy: "殖民地现代化"
 FRA_colony_policy_desc: "殖民地的独立运动始于对殖民地人民的残酷剥削，这些剥削有直接来自我们的，也有本地封建地主的，我们要做的是减少直接来自我们的剥削的同时，消除本地封建地主的剥削。"
 FRA_colony_land_reform: "在[FROM.GETname]进行土地改革"
 FRA_colony_urbanization: "推进[FROM.GETname]城镇化"
 FRA_get_colony_core: "给予[FROM.GETname]人民枫丹公民权"
 FRA_Poincare_reform: "延续普恩加莱改革"
 FRA_Poincare_reform_desc: "一战结束后法国也曾面临过严重的经济问题，而总理“好斗的”普恩加莱采取的一系列经济政策，包括减税，贬值法郎和对外举债，有效地刺激了经济增长。现在经济再度停滞，或许老方法还可以再拿出来试试。"
 FRA_invite_austrian_economist: "邀请奥地利经济学派"
 FRA_invite_austrian_economist_desc: "市场要自由，首先要请奥地利学派的老师傅们来指点迷津，这方面还是他们最有经验。"
 FRA_remove_communist_from_the_government: "分裂人民阵线"
 FRA_remove_communist_from_the_government_desc: "人民阵线中最令人作呕的一部分是共产党，他们现在居然能堂而皇之地进入政府参与政治，这不仅威胁到了经济，甚至将危机蔓延到了政治上，时刻威胁着民主制度。要摧毁这个威胁最好的办法就是让共产党与其他左翼民主党派反目成仇，从而有效地削弱他们的力量。"
 according_to_fra: "根据历史发展规律，结合经济学周期理论，我们的经济能在大约一年以后变得更加高效。"
 FRA_the_Mainland_Cruise_tt: "可出访的国家包括§Y比利时§!，§Y捷克斯洛伐克§!，§Y南斯拉夫§!，§Y西班牙§!以及§Y罗马尼亚§!"
 FRA_Furina_s_cruise: "大陆巡游"
 FRA_Furina_s_cruise_desc: "英国曾完成过一项举世瞩目的壮举——世界巡游，而我们亦可以效仿，来一场大陆巡游。\n\n虽然欧洲大陆相比于世界，区域小了很多，但这并不代表枫丹的大陆巡游就比世界巡游差，这是因为世界巡游的目的在于张扬大英帝国的国威，彰显其物力之丰饶，而我们的目的却是为欧洲大陆上备受法西斯暴政威胁的国家带去安全与保护，两者在意义上便是高下立判。"
 FRA_mission_to_Belgium: "访问比利时"
 FRA_Neuvillette: "那维莱特·查斯"
 not_curising: "克洛琳德未出访国外"
 anti_fascist_union: "反法西斯包围网"
 FRA_mission_to_cze: "访问捷克斯洛伐克"
 FRA_mission_to_yug: "访问南斯拉夫"
 FRA_mission_to_spr: "访问西班牙"
 FRA_mission_to_rom: "访问罗马尼亚"
 FRA_agreement_formalization: "正式化反法西斯联盟"
 FRA_agreement_formalization_desc: "外交工作已经完成，我们可以正式缔结军事同盟，与盟友共赴胜利了。"
 Fontaine_anti_fascism_union: "反法西斯联盟"
 FRA_interfere_spain_directly: "直接干涉西班牙"
 FRA_interfere_spain_directly_desc: "看来，指望内部一团糟的西班牙共和派自己打赢内战是不可能的了，为了防止南部的威胁，我们必须直接下场。"
 we_accept_spr_promise: "我们同意了西班牙的请求"
 FRA_orient_diplomacy_policy: "远东外交"
 FRA_orient_diplomacy_policy_desc: "远东疯狗日本法西斯也是一个重大威胁，必须在它陷入疯狂，造成不可挽回的破坏之前打倒它，而最快捷的办法就是支持他的对手中国。"
 FRA_invite_england: "游说英国"
 FRA_invite_england_desc: "英国掌控了海洋，而我们的陆军足以掌控陆地，若是二者合二为一，仅靠封锁就能让德国像一战那样输掉。"
 FRA_sov_focus: "枫丹-苏联条约"
 FRA_sov_focus_desc: "邀请苏联可以迫使德国陷入两线作战的窘境。"
 FRA_destroy_the_fascist: "向东，荡涤诸恶"
 FRA_destroy_the_fascist_desc: "德，意法西斯长期以民粹主义欺骗民族，奴役其它民族，将国家绑上通往末路的战车，试图将整个世界拖入火海，这样的情况早该被停止了！我们会给予这些头号战犯们一场巨大而公正的审判。"
 anti_fascism_union_partner_2: "荡涤诸恶"
 anti_fascism_union_partner_2_desc: "我们的战士，人民愿意为了解放法西斯奴役下的人民而战斗"
 FRA_Fontainebleau_conference: "枫丹白露会议"
 FRA_Fontainebleau_conference_desc: "法西斯已被抹去，但更值得研究的是法西斯如何形成，如何逐步掌控一个民主政权，以及如何在未来防止它的再度掌权。目前最主流的观点便是国内资本主义的危机和凡尔赛条约的严苛共同招致了恶魔的崛起，所以，枫丹将在风光旖旎的市镇枫丹白露召开一场战败国也可以发声的会议共同商讨欧洲的未来。"
 FRA_Fontainebleau_conference_category: "枫丹白露会议"
 FRA_Fontainebleau_conference_category_desc: "欧洲的未来，就在这持续一年的枫丹白露会议了。\n这是一场绝无仅有的和平会议，因为这次会议为战败国代表保留了一切的权利，可以平等地在会议桌上发言，当然，也希望这是欧陆的最后一场和平会议。" #\n\n与会国:§Y[Root.GetName]§!，§Y[GER.GetName]§!，§Y[ITA.GetName]§!，[GETconferencecountry]
 FRA_Fontainebleau_conference_is_carrying_on: "枫丹白露会议进行中..."
 The_Conference_Finished: "会议结束，欧陆局势已成定局"
