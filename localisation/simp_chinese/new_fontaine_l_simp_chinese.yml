 FRA_the_algeria_issue: "阿尔及利亚问题"
 FRA_the_algeria_issue_desc: "在枫丹取代法国以后，阿尔及利亚的地位就显得非常尴尬了。大部分的阿尔及利亚法裔认为这只是一个称谓的改变，但阿尔及利亚人却认为这是一个赶走旧法国人的好机会，于是全国各地的抵抗运动徒然加剧，这让我们不得不重新考虑我们在阿尔及利亚的存在。"
 FRA_meet_local_leaders: "接触穆斯林领袖"
 FRA_meet_local_leaders_desc: "尽管在过去的一百年间，不少的旧法国人在阿尔及利亚定居，但依然只占了不到10%的本地人口，其他的居民，绝大多数都是信奉伊斯兰教的阿拉伯人或者柏柏尔人，他们的领袖才更能代表阿尔及利亚人民。"
 FRA_meet_pieds_noirs: "会见黑脚领袖"
 FRA_meet_pieds_noirs_desc: "把阿尔及利亚都丢掉？很难想象在那里的法裔会作何感想。更何况在我们长久的温和政策下，已经有一部分“归化”的阿尔及利亚人愿意与我们合作了，为什么不选择与他们合作呢？"
 FRA_transfer_algeria_french: "迁移阿尔及利亚法裔"
 FRA_transfer_algeria_french_desc: "阿尔及利亚老乡们不得不离开现在的居住地，前往他们祖上时代居住的土地了。这应该不能算是一种背井离乡，因为枫丹本土才是他们真正的故乡。"
 FRA_keep_the_assets: "留下资产"
 FRA_keep_the_assets_desc: "黑脚们在阿尔及利亚的地中海的沿岸兴办了工厂，企业，庄园与海港。是否要将这些枫丹人的资产免费地送给这里的原住民是个问题。但从阿尔及利亚建国以后两国和解的角度来看，这点成本是微乎其微的。"
 FRA_increase_immigrant_to_algeria: "鼓励移民阿尔及利亚"
 FRA_increase_immigrant_to_algeria_desc: "让大量枫丹人把阿尔及利亚占住，这块土地不久完全是我们的了嘛。"
 FRA_Withdrawing_troops_from_Algeria: "从阿尔及利亚撤军"
 FRA_Withdrawing_troops_from_Algeria_desc: "在阿尔及利亚的驻军也该回家了，考虑到当地治安的问题，这一过程将持续两个多月。"
 FRA_transfer_our_assets_to_france: "转移资产"
 FRA_transfer_our_assets_to_france_desc: "阿尔及利亚的一切都来自于枫丹人的投资！没有枫丹人那里就是一片蛮荒的白地。搬不走的东西就算了，但能带回家去的一定要带回去！"
 FRA_grant_citizen_rights: "授予公民权"
 FRA_grant_citizen_rights_desc: "共和国的公民身份应该无条件地向阿尔及利亚的原住民开放。他们为他们，也是我们的家乡建设鞠躬精粹，理应享受和枫丹共和国公民同样的福利与权利。"
 FRA_a_free_independent_algeria: "独立而自由"
 FRA_our_land_never_divide: "不可分割的一部分"
 FRA_our_land_never_divide_desc: "现在，我们终于可以坚定地宣称：阿尔及利亚，无论从主权，法理还是事实上，都毋庸置疑地属于枫丹。"
 we_support_locals: "我们支持本土派"
 we_support_pieds_noirs: "我们支持黑脚"
 weaken_the_algeria_resistance: "§G削弱§!§Y阿尔及利亚抵抗运动§!的强度"
 FRA_meet_local_leaders_tt: "§Y阿尔及利亚抵抗运动§!追加效果:\n当地损耗:§G-5%§!\n当地工厂数:§G+10%§!\n当地资源:§G+10%§!\n当地补给:§G+5%§!"
 can_make_friend_with_algeria: "这将有助于我们与新生的阿尔及利亚政府建立友好合作关系"
 FRA_algeria_autonomy: "阿尔及利亚自治"
 FRA_algeria_autonomy_desc: "无论是直接让阿尔及利亚独立，还是强行并入本土，都未免过于激进，作为一种妥协的方案，自治可以先在阿尔及利亚试行，依据其效果再来决定独立与否。"
 FRA_alg_fra_trade: "枫阿友谊"
 FRA_strive_for_peoples_support: "争取议会支持"
 party_support_less_than_100: "我们尚未在国民议会中取得§Y绝对多数§!"
 support_more_than_70: "我们的§Y政治联盟§!的总支持度至少为§Y70%§!\n政治联盟:\n支持枫丹审判庭执政的党派，包括§C枫丹审判庭§!，§R枫丹(法国)共产党§!，§R工人国际枫丹(法国)支部§!，§C激进党§!"
 election_by_the_popularity: "根据§Y各意识形态的支持度§!进行选举，席位数直接与支持率挂钩。"
 FRA_dissolve_the_parliament: "解散国民议会"
 FRA_one_year_plan: "制定一年计划"
 FRA_support_the_left_wing: "支持左翼党派"
 communist_have_not_get_too_many_seats: "左翼尚未取得超过半数的席位"
 left_wing_get_6_seats_per_week: "枫丹(法国)共产党与工人国际枫丹(法国)支部每周各获得3席位"
 FRA_suppress_the_left_wing: "打压左翼党派"
 is_not_support_the_left_wing: "没有在支持左翼党派"
 communist_have_get_too_many_seats: "左翼已经取得超过半数席位"
 left_wing_lose_6_seats_per_week: "枫丹(法国)共产党与工人国际枫丹(法国)支部每周各失去3席位"
 add_progress_fraternity_20: "§R博爱§!进度增加§G20%§!"
 add_liberity_progress_10: "§B自由§!进度增加§G10%§!"
 FRA_for_the_justice_desc: "人类追求正义的历史就如同社会不义的历史一样长。长久以来，人类社会从奴隶社会走向资本主义社会，从奴役走向了剥削，虽有客观上的不少进步，然而不义却从未消失。\n社会以往的进步，往往受制于客观历史条件的制约，纵使斯巴达克斯的梦想再美丽，亦无法抵挡罗马军团的长矛，但现在，在枫丹，拥有了神明的力量，理想主义者终于可以突破现实的引力而大展拳脚，直至达成最终的目标，让不义彻底消失。"
 hospital_tech_research: "野战医院研究速度"
 socialism: "社会民主主义"
 FRA_enable_the_mod: "模组控制台"
 FRA_enable_the_mod_desc: " "
 enable_the_revolutionary_fontaine: "快速调试：革命枫丹"
 summon_furina: "启用模组"
 summon_furina_desc: "点击召唤§C芙宁娜·德·枫丹§!！"
 support_our_zeal: "承认我们的合法性"
 support_us_suppress_bandits: "支持我们剿灭土匪"
 FRA_contect_spanish_republican_government: "联络西班牙共和政府"
 FRA_contect_spanish_republican_government_desc: "西班牙第二共和国正处于风雨飘摇之中，前总理阿萨尼亚的激进改革引起了教会，地主以及垄断资产阶级等保守势力的强烈反对，整个社会亦被撕裂，随时可能爆发全面内战。一方面出于西班牙与我们相同的共和价值观，也为了捍卫枫丹南部边界不受法西斯威胁，我们需要及时联络他们，并给予一定的援助。"
 FRA_unite_the_the_popular_front: "团结西班牙人民阵线"
 FRA_unite_the_the_popular_front_desc: "西班牙人民阵线的成分之复杂，令所有人瞠目结舌。不过，自由主义者与社会主义者，共产主义者甚至是无政府主义者站在同一面反法西斯大旗下的精神值得赞许，然而理念的差异难免造成内部的分裂。人民阵线内部早在成立伊始，其内部权斗已经持续到了今天，我们需要让他们认识到何为当前最紧要的任务——打倒正在密谋的保守集团。"
 FRA_support_caballero: "扶持卡巴雷罗"
 FRA_support_caballero_desc: "在西班牙的政府权斗中，阿萨尼亚是第一个出局的，而后就是被西班牙共产党击败的卡巴雷罗。西班牙共产党在共产国际的指示下在权斗中大获全胜，却没有意识到这让共和军内部离心离德。我们需要扶持在意识形态上与我们最为接近的温和社会主义者，卡巴雷罗主持西班牙，方能挽救危局。"
 FRA_set_up_Special_Agent_Team: "成立特工小组"
 FRA_set_up_Special_Agent_Team_desc: "我们不可能通过言语就让西班牙共产党将政权拱手相让，要让卡巴雷罗重新掌权，必须动用一些特殊力量......"

 operative_magician: "魔术师"
 operative_magician_desc: "又消失了......可恶，是幻术吗"
 FRA_coup_in_spanish_republic: "发动政变"
 FRA_coup_in_spanish_republic_desc: "时机已至，发动政变，拥戴卡巴雷罗上位的时间就是现在。"
 FRA_coup_in_spanish_republic_tt: "§Y政变成功的概率§!受两个因素影响:\n -西班牙§Y民主主义§!的支持率\n -情报网的§Y强度§!\n政变如果成功，那么§Y卡巴雷罗§!将会以西班牙共和政府的名义要求我们§Y直接干涉西班牙§!，如果失败，我们可以选择§Y收手§!，或者是直接§R向整个西班牙宣战§!。"
 try_coup: "发动政变"
 Normalization_spy: "常态化特工小组"
 contect_spain: "外事联络"
 FRA_contect_the_soviet_union: "联络苏联"
 FRA_contect_the_soviet_union_desc: "我们是无权对西班牙共和政府以一个老父亲的姿态指手画脚的，但是，苏联却有这种权利，一直以来，西班牙共产党都在按照共产国际的指示，言听计从地做事，也许我们可以通过联络苏联地方式，想办法让西共改变策略......"
 FRA_appease_the_anarchist: "给无政府主义者的空头支票"
 FRA_appease_the_anarchist_desc: "如果只是允诺在战后允许无政府主义者在加泰罗尼亚建立自治地区，就能换来不少他们的支持的话，那这简直是天下最划算的买卖。尽管明智的安人当然不会相信这种条件，但减少他们叛乱的风险也许是可以的。"
 expand_our_influence_in_spain: "§G增强§!我们在§Y西班牙§!的影响力"
 FRA_fontaine_legion: "枫丹军团"
 FRA_fontaine_legion_desc: "我们在西班牙的影响力已经足以让我们向西班牙派遣大量军队！借着消灭法西斯的名义，我们的军队可以得到宝贵的训练与经验。"
 FRA_volunteers_to_spain: "枫丹志愿军团"
 FRA_assassinate_Franco: "刺杀弗朗哥"
 FRA_assassinate_Franco_desc: "弗朗哥，当年阿斯图里亚斯的屠夫，在北非杀害摩洛哥人的侩子手，无论怎么讲，他都是该死的。\n事实上，国民军的成分与共和军一样鱼龙混杂，比如长枪党和卡洛斯派的矛盾就是几乎不可调和的，只是因为弗朗哥的绝对权威，才显得团结一点，换句话说，整个国民军都是围绕着他展开的。只要这位独裁者一死，群龙无首的国民军必将被快速击溃。"
 FRA_attack_spain_methodically: "稳步前进"
 FRA_attack_spain_methodically_desc: "军事上的冒进并非一个好的选择，尽管国民军的本身实力并不强大，但是德意志愿军团的实力不容小觑，我们需要稳扎稳打，一点点地驱逐国民军。"
 FRA_total_attactive: "全面进攻"
 FRA_total_attactive_desc: "毫无疑问，枫丹的志愿军团，加上西班牙人民军，已经可以对国民军形成压倒性的优势，我们不应该该国民军恢复元气的时间，将法西斯赶出南欧的时间就是现在！"
 FRA_spanish_provisional_government: "恢复秩序"
 FRA_spanish_provisional_government_desc: "我们在西班牙的敌人有建制的部队已经基本被消灭，但依然有一些余孽仍在抵抗，在肃清这些顽固的家伙以后，西班牙将正式作为我们军事同盟的一份子加入条约。"
 spr_republican_win: "共和军在西班牙内战中取胜"
 right_focus_in_the_right: "§G未来的右线内容，在右边§!"
 FRA_judge_italian_war_crimes: "审判意大利战犯"
 FRA_judge_italian_war_crimes_desc: "比起德国战犯，意大利战犯少了些疯狂，多了些幽默感"
 FRA_judge_japanese_war_crimes: "审判日本战犯"
 FRA_judge_japanese_war_crimes_desc: "这些内容很敏感......谨慎识别就好"
 FRA_a_free_independent_algeria_desc: "阿尔及利亚，这块曾经旧法国人眼中的本土，如今在我们手中，和平地取得了独立，尽管当下看来十分不可理喻，但历史将会证明我们决策的正确。"
 has_sent_vlounteers_to_spain: "我们在西班牙内战中帮助了共和军"
 second_leader_name: "[Getsecondleadername]"
 furina_situation: "[Getfurinasituation]"
 furina_is_happy: "政治什么的......好麻烦，还是交给那维莱特吧\n§Y只需要每天吃小蛋糕就好啦§!\n - 月度快乐增长:§G+25%§!\n - 政治点数:§R-0%§!"
 furina_is_hard_working: "不行......还是要认真工作才行\n - 月度快乐增长:§R-25%§!\n - 政治点数:§G+0%§!"
 all_number_will_accpet: "§G所有与会国都会支持该提议§!"
 FRA_liberate_cze: "捷克斯洛伐克独立"
 FRA_liberate_cze_desc: "就算苏台德地区存在着大量的德裔，也不是德国行侵略扩张之实的理由，更何况是波西米亚地区，现在，他们该获得解放了，"
 FRA_austria_independence: "奥地利独立案"
 FRA_austria_independence_desc: "尽管奥地利人把自己视为德意志的一部分，然而历史证明了这种观念的危险，小德意志就是最终的方案，大德意志方案早该被淹没在历史中了"

 FRA_the_whole_nation_strike: "全国总罢工"
 FRA_the_whole_nation_strike_desc: "枫丹爆发了自建立以来的最大危机！由自动化引发的失业大潮，使千百万因它而失去经济来源的下岗工人们起来反抗，在枫丹(法国)共产党的号召下，未下岗的工人们亦开始罢工，形势一发不可收拾！现在，单纯的抗议似乎已经发酵成一场足以改朝换代的革命！\n\n幸运的是，大部分工人们的愤怒并非直接指向芙宁娜，更多是针对这届枫丹内阁。他们希望一向善解人意的芙宁娜可以倾听底层的声音，让他们认为罪大恶极的内阁辞职。而枫丹(法国)共产党，则是希望借此机会，解散这届联合政府，让共产党一家独大，将枫丹改造成一个真正的社会主义国家。"

 automation_communism: "自动化共产主义"
 automation_communism_desc: "如果简单重复的劳动可以让机器完成，那么人类，就可以从事更多更有意义的劳动了。"

 FRA_civilwar_is_coming: "武装起义"
 FRA_civilwar_is_coming_desc: "如若谈判不起效果，那么武装斗争对于共产党来说就是唯一的选择了。"

 FRA_appear_and_keep_calm: "安抚群众"
 appear_times_less_than_3: "群众的§Y耐心§!是有§Y极限§!的，即使号召力强如§C芙宁娜§!，亦无法拖延时间太久\n§C芙宁娜§!最多可以为我们额外争取§Y60天§!时间。"

 Yorushika_forget_it_please: "Yorushika - 还请忘却"

 the_cabinet_will_fall: "这届§Y内阁§!会因为§Y关键职位空缺§!而§Y倒台§!，只能§Y重新组织§!一届"
 Neuvillette_would_retire: "§Y那维莱特§!不再参与共和国的政治了......也许他会就此§Y归隐§!。"

 FRA_dissolve_parliament: "解散议会"

 star_reporter: "明星记者"

 FRA_cabinet_resignation: "要求内阁辞职"
 FRA_cabinet_resignation_desc: "人们的怒火普遍集中在内阁上，若是让其解散，或许可以平息怒火。绝大部分的阁员都没有辞职的理由，不过，只要关键岗位有空缺，按照宪法，这届内阁就只能解散，而总理兼司法部长的那维莱特是目前最理想的辞职对象......可惜的是，芙宁娜今后大概率是不能在沫芒宫见到那维莱特了。"

 FRA_the_twist: "芙宁娜的逆转"
 FRA_the_twist_desc: "开启社会民主主义线"

 the_cabinet_will_fall: "这届§Y内阁§!会因为§Y关键职位空缺§!而§Y倒台§!，只能§Y重新组织§!一届"
 Neuvillette_would_retire: "§Y那维莱特§!不再参与共和国的政治了......也许他会就此§Y归隐§!。"

 FRA_dissolve_parliament: "解散议会"

 FRA_apponit_communist: "允许共产党组阁"
 FRA_apponit_communist_desc: "枫丹的权力架构出现了前所未有的真空......显然这些真空很快会将会被政府中的共产党与社会党人填补，政治联盟最后还是被左翼完全架空，事到如今挣扎已经没有意义，只能顺应名义，任命时任枫丹共产党总书记的§t夏洛蒂·阿黛尔§!为总理，并且授权组阁。"

 star_reporter: "明星记者"

 we_have_not_chosen_repress: "我们尚未选择§Y镇压§!"
 show_negotination_decisions: "§Y解锁§!与罢工者接触的§Y决议§!"
 we_have_not_start_open: "我们尚未选择§Y谈判§!"
 show_repress_decisions: "§Y解锁§!镇压罢工的§!决议§!"
 FRA_repress_communist: "镇压罢工"
 FRA_repress_communist_desc: "暴徒？不过是一群乌合之众罢了，在绝对的暴力面前他们自会一哄而散。"
 FRA_open_negotiation_with_communists: "与罢工者接触"
 FRA_open_negotiation_with_communists_desc: "武力镇压绝对不可取！枫丹延续多年的改革努力争取到的工人支持，将在我们动武的那一刻彻底烟消云散。"
 FRA_offer_basic_customs: "秘密提供基础生活物资"
 FRA_offer_basic_customs_desc: "现在枫丹的工农业生产完全停滞，罢工者正因为生活物资的缺乏而愈发激进，这样下去也许会发生大规模的诸如抢劫一类的大规模暴力事件。好在，国家的仓储中尚有余裕可用于救济。"
 FRA_dispatch_army_to_paris: "调用军队"
 FRA_dispatch_army_to_paris_desc: "这是目前手中最强大的武力——枫丹共和国陆军，尽管成立的初衷是抵御外敌，捍卫共和，然而现在却不得不用来镇压群众......"
 what_would_happen: "§R天知道会发生什么......§!但我们手中的胜算必然更多。"
 FRA_remove_communsit_from_the_united_government: "把共产党人从联合政府内清除出去"

 fontaine_commune_focus: "枫丹公社国策树"
 contradictory_protecter: "矛盾的守护者"
 furina_sinner_desc: "正如戏剧一般，人生也因为各种的对立与矛盾的存在而显得精彩，世界上不存在无可指摘的善良，亦不存在纯粹的恶，人无完人，是全人类的一种共识，但，如果是神明呢？\n\n在一神教兴起以后，神的形象是至臻完美的，从行为到品德，所作所为，皆属正义。也许没人会相信，即使是神，亦会犯下重大的错误，甚至从各种看上去善良的因，结出罪业的果。\n\n当下，芙宁娜似乎对她的枫丹人民失了约。尽管仅有一次，但也足以让先前一点一点建立起来的信任分崩离析。\n\n凡人自然无权审判他们的神，但神明可以自我检讨。赎罪的神，听起来是多么不可思议，但既然存在约定，将它继续下去，便还有弥补的机会。"
 FRC_a_important_step: "关键一步"
 FRC_a_important_step_desc: "终于，我们抓住了这个千载难逢的机会，真的发起了一场声势浩大的革命，但公社的处境依然危险万分，随时可能被镇压，我们必须慎缜行事。"
 the_repression_has_not_started: "镇压尚未开始"
 FRC_war_cant_be_avoided: "无可避免的战争"
 FRC_war_cant_be_avoided_desc: "谈判最终破裂，镇压无可避免。尽管失败的后果是我们不可承受之重，但事到如今唯有奋力一搏。"
 fra_immigrant_are_coming: "流亡者的涌入"
 fra_immigrant_are_coming_desc: "不少的工人们投奔于此。"
 frc_the_supply_issue: "物资日渐紧张......"
 frc_the_supply_issue_desc: "枫丹北部的平原的确是曾经的主要农业区，但这并不意味着这片土地就可以养活如此多新涌入的人口，因而缺粮已经成为了公社的一个主要的危机。尽管公社在成立一开始就实施了配给制，但物资依然十分拮据。"
 FRC_emergency_actions: "应急策略"
 FRC_emergency_actions_desc: "战争近在眼前，为了公社的生存，做出必要的牺牲也是可以忍受的。"
 frc_demand_foodstuff: "没收自留地"
 frc_demand_foodstuff_desc: "公社的农业生产主要还是由自耕农提供的，他们分散的效率显然远远比不上集体农庄。"
 can_decrease_the_debuff: "可以缓解物资短缺的问题"
 frc_compulsory_labor: "义务劳动"
 frc_compulsory_labor_desc: "每个人都有保卫公社的义务，尽管并非每个人都可以参军，但广大的群众在后方的生产，在文艺的创作上依然可以为保卫公社出力。"
 start_compulsory_labor_policy: "实施义务劳动政策"
 frc_pause_the_policy: "暂停义务劳动"
 frc_demand_capitans: "收缴资产"
 frc_demand_capitans_desc: "还有相当一部分生产资料掌握在资产阶级手里..." 
 frc_ban_private_trade: "禁止私人交易"
 frc_ban_private_trade_desc: "任何必要的物资都应该被用于抵御共和政府的镇压..."
 ban_private_trade: "禁止私人交易"
 frc_pause_the_ban: "暂停禁令"
 FRC_commune_fighters: "公社男儿"
 FRC_commune_fighters_desc: "原先共和政府的大部分将领依然坚持他们的立场，现在的军队面临指挥官短缺的难题，我们需要立刻提拔新军官——当然，除了军事才能，政治上的考量也很重要。"
 copy_from_kaiserreich: "§g这些是从KR抄来的§!"
 FRA_repress_commune: "最后通牒"
 frc_fontaine_republic_is_going_to_declare_war_on_us: "即将到来的镇压"
 frc_fontaine_republic_is_going_to_declare_war_on_us: "即将到来的镇压"
 first_secretary: "第一书记"
 FRC_fcp_meeting: "紧急会议"
 FRC_fcp_meeting_desc: "没时间开那些动辄千人参与大会小会了，现在枫共最需要做的就是赶紧确定党在当下如何生存下来，乃至解放整个枫丹。"
 FRC_how_the_steel_was_tempered: "钢铁是怎样炼成的"
 FRC_how_the_steel_was_tempered_desc: "诞生于苏俄内战，被战争的铁与血洗礼过的苏联红军是世界上最强大的无产阶级武装，我们有许多方面要向他们学习。"
 FRC_serve_for_the_people: "为人民服务"
 FRC_serve_for_the_people_desc: "武器是战争的重要因素，但不是决定因素，决定的因素是人不是物。战争要取得最后的胜利，群众基础尤为重要，因此，军队也应该是人民的军队。"
 FRC_the_team_of_the_party: "党的队伍"
 FRC_the_team_of_the_party_desc: "党是领导一切的，所以正确的领导就显得尤为重要，要做出正确的决策，首先要保证党的队伍，我们党员，政委，乃至工农民的纯洁性。"
 FRC_foodstuff_first: "粮食作物优先"
 FRC_foodstuff_first_desc: "没人能只吃葡萄过活，相比于种植的各种经济作物，小麦更有利于公社的存续。"
 FRC_integrate_the_land_resource: "整合土地资源"
 FRC_integrate_the_land_resource_desc: "幸好，我们有一笔来自中世纪的宝贵遗产——以前的旧庄园，连续的大片平整土地实在是集体化的理想场所，只要将已有的农业机械转移到这里，相比难以想象的效率将会迸发。"
 FRC_absolute_leadership: "绝对领导"
 FRC_absolute_leadership_desc: "历史上，军队的异动并非底层列兵的意志，他们只是上级军官意志的执行者，发号施令的人，最需要政委的监督。"
 FRC_reorganize_our_force: "正规化"
 FRC_reorganize_our_force_desc: "枫丹共和政府拥有的是训练有素的正规军，而我们是在革命理念下团结的工人，底层官兵，以及劳动妇女，尽管数量庞大，然而战斗力却难以相比，参照苏军在1925年的一次改组，我们需要对我们的民兵进行改造。"
 FRC_expand_the_philosophy_education: "推广哲学教育"
 FRC_expand_the_philosophy_education_desc: "哲学并非某些人看来百无一用，事实上，它是认识这个世界，指引我们如何去改变这个世界的教条，在统治阶级手里，它教导人们不要反抗，但若是握在群众手里，便是一把“上斩昏君，下斩奸臣”的利剑。"
 FRC_one_step_from_the_ideal: "近在咫尺"
 FRC_one_step_from_the_ideal_desc: "公社当下的问题已经解决，现在唯有等待革命胜利结束了......"
 FRC_walk_out_from_the_famine_desc: "随着农业生产的逐步恢复与发展，公社的粮食终于可以做到在配给制下的自给了，现在可以逐步增加每个人的份额"
 FRC_walk_out_from_the_famine: "走出饥荒"
 has_learnt_cpc: "我们将§Y人民军队§!设定为建军目标"
 has_learnt_sov: "我们将§Y职业军队§!设定为建军目标"
 selected_planned_economy: "将§Y计划经济§!确定为以后的经济模式，当然，现在最重要的还是解决§Y粮食问题§!"
 selected_commune_economy: "将§Y公社经济§!确定为以后的经济模式，当然，现在最重要的还是解决§Y粮食问题§!"
