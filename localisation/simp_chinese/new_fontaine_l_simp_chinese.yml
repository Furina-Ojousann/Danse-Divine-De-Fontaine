 fra_stalinist_political_commissar: "强化政委制度"
 fra_stalinist_use_ss: "压制官僚主义风气"
 fra_stalinist_use_ss_desc: "我们高度集中的计划经济体制在执行中，很容易让干部形成命令主义，官僚主义的作风。这种作风是很难从党内得到解决的，也许我们应该尝试让外部力量，比如说知识分子的批评，来遏制住这股风气。"
 fra_nkvd: "内务部"
 fra_hurry_development: "快速发展期" 
 fra_hurry_development_desc: "我们的一系列政策为工业化提供了一切所需的条件。官僚机器高速运转，犯人在平整开设工厂所需的土地，特务无情地镇压所有颠覆破坏分子，工业化的列车已经可以达到它的最高速度，急速发展的生产力可以将我们尽早带入共产主义。\n可事情真的这么简单吗？我们引以为豪的中央计划经济有一个无法克服的痼疾，那就是官僚只对计划负责。长此以往，命令主义和官僚主义的发展不可避免。幸运的是，这两个问题目前还很小。"
