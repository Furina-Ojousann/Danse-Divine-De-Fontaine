 FRA_the_ceremony_for_a_new_king_tt: "解锁§Y枫丹三权§!UI界面"
 empire_Peruere_Snezhevna_tooltip: "§Y君权：阿蕾奇诺§!"
 empire_Peruere_Snezhevna_tooltip_delay: "§L阿蕾奇诺并不认为“君主”是一个具有神圣性或历史权威的词汇，她只是将其视为国家治理系统的接口，一个稳定政体的中枢。她冷静、彻底而高效地将行政、立法与司法的主导权汇聚于自己手中。她没有王座，亦无需加冕，她的合法性来自于结果导向的技术治理：社会稳定、经济增长、反对派噤声。这不是传统的独裁，而是一台“可以接受情绪输入、但不接受批判逻辑”的机器。只要你不是反对她，她就会容许你骂她。§!"
 empire_furina_tooltip: "§Y神权：芙宁娜§!"
 empire_furina_tooltip_delay: "§L芙宁娜是人民投射情感的容器，是被制造出来的神性，是深度媒介时代下的权力幻象。她象征着国家的“情绪合法性”与精神秩序，所有关于苦难、荣耀与牺牲的叙事最终都归于她的面容——哪怕她本人对此毫无兴趣。她是“感性政治”的核心，一尊活着的偶像，也是一枚被束缚的齿轮。神权的意义，不在于统治什么，而在于用温柔的语言掩盖暴力的真相。对大多数国民来说，服从君权太冷酷，而服从神权，才像是“自愿”的。§!"
 empire_army_tooltip: "§Y军权：四位新锐§!"
 empire_army_tooltip_desc: "§L枫丹的军队从不是国家机器的主导者，但始终是其最后的担保者。四位新锐军人——夏尔·戴高乐、让·德·拉特尔·德·塔西尼、阿尔方斯·朱安、马里-皮埃尔·柯尼希——分别代表理想、技术、现实与秩序。他们之间互不服从，却默契配合，维护着这套怪异体制的物理稳定性。他们清楚：不参与政治，是军人的政治立场；一旦政治失控，他们的坦克可以在六小时内开进法院与议会。军权不是用来治理的，而是用来恐吓、阻吓和必要时直接接管一切的。§!"
 empire_bookmark_tt: "你可以通过§Y决议，事件与国策§!消耗与获得三类点数:\n当前§r君权§!:[?fontaine_monarchy_power] 上限：[?fontaine_monarchy_power_maxima]\n当前§3神权§!:[?fontaine_theocracy_power] 上限：[?fontaine_theocracy_power_maxima]\n当前§g军权§!:[?fontaine_military_power] 上限：[?fontaine_military_power_maxima]"
 FRA_an_emporor_not_a_president_tt: "§g芙宁娜作为女皇登基的阻力将大大减小§!"
 FRA_an_empire_not_a_nation_tt: "§g枫丹从不是一个族裔国家，而是一个多元的庇护所§!"
 FRA_a_morality_not_a_deal_tt: "§g一系列的动荡让民众的热情跌至冰点，我们必须做点什么来挽救§!"
 FRA_furina_restoration: "帝政奉还"
 FRA_furina_restoration_desc: "阿蕾奇诺太过傲慢，自以为她的机器万无一失，可现实是，她所依赖的一切象征在现在都土崩瓦解。这套精密的官僚机器扼杀了枫丹的一切——枫丹原本应该是浪漫，诗歌，理想主义与净水的国度，现在芙宁娜终于摆脱她的控制，她将让枫丹回到它本该有的样子。" 
 FRA_terror: "神圣暴力"
 FRA_terror_desc: "我无法信任你们。\n你们将我当作是一个凡世神像\n在我符号的荫蔽下，无恶不作\n如果你们连善恶之行都无法分辨——那你们连认罪的资格都没有。\n下地狱去吧。"
