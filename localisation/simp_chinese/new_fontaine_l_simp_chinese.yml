 isr_nationalist: "盘旋的鹰"
 isr_nationalist_desc: "两个民族之间，尽管表面上已经和解，但心中的缔结依然难以消除。一些顽固的民族主义分子轻则拒服兵役，重则制造恐怖袭击，妄图破坏这个新生的联邦。"
 isr_great_compromise: "伟大的妥协"
 isr_great_compromise_desc: "几年之前，无数犹太人涌入了他们心中自于上古时代的家园，却挤占了同样在此生活千年的阿拉伯人。和解的希望看起来是如此的渺茫。但奇迹还是降临了，尽管并非所有的心都毫无隔阂，但他们现在可以共享这片富饶土地。"
 isr_condominium: "国际共管"
 isr_condominium_desc: "巴勒斯坦在一战后成为了国际共管领土，但被英国实际控制。在黎凡特联盟方案得到通过以后，国际共管也就成了英国和枫丹两国真正意义上的“共管”了。毋庸置疑，谁能在这片国际领土上拥有§Y绝对的影响力§!，谁就能将这里纳入自己的§Y势力范围§!。\n\n§Y枫丹人民共和国§!§W的影响力为:§!§Y[?isr_condominium_fontaine]§!\n\n§Y联合王国§!§W的影响力为:§!§Y[?isr_condominium_england]§!"
