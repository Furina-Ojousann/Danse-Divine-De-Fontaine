 FRA_fontaine_blitzkrieg_desc: "来自枫丹共和国的闪电攻势，尝试将装甲突击与特种部队结合起来的实验。"
 fra_invasion_prepareness_for_spain_tt: "我们将尝试组织一次§Y快速而高效§!的行动，迅速击溃西班牙防线，免得在比利牛斯山和卡斯蒂利亚的千沟万壑中损失太多。"
 fra_attack_plan_finish: "西班牙攻势结束"
 fra_attack_plan_finish_desc: "我们必须迅速从西班牙事务中抽身。南线稳定以后，西线依旧需要支援，不宜在西班牙这种边缘利益地区耗费过多有生力量。"
 fra_attack_plan_finish_tt: "如果我们完成以上§Y战略目标§!，会在攻势结束以后立刻建立一个§Y合作的西班牙政府§!；否则将§R立刻撤出§!西班牙，但保留§Y加泰罗尼亚§!。"
