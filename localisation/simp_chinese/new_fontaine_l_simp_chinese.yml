 fra_the_task_from_military_tt_2: "如果陆军参谋部判断§Y步枪，火炮，装甲§!中的任何一种科技§Y落于人后§!，则会给予§Y科研加成卡§!。如果有多种被认定落后，则根据§Y优先度§!优先追赶。若三种科技都达到了§Y先进水平§!，则获得一座额外§Y军用工厂§!。"
