 fra_PSSR: "筹备吉兰苏维埃共和国"
 fra_PSSR_desc: "俄国内战末期，红白两军最后退出了波斯战场，但随之是英国人的乘虚而入。1918年，英军控制了波斯全境，但波斯人民没有屈服于英帝国主义，展开了轰轰烈烈的反帝斗争，英勇的人民还一度成立了波斯社会主义苏维埃共和国，因为控制区域主要在吉兰一带，所以简称为吉兰苏维埃共和国。尽管斗争最终还是失败，但确实是一场值得铭记的反抗。现在，波斯人民有推翻王室专制于帝国主义压迫的第二次机会。"
