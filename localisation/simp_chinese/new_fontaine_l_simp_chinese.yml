 FRA_agreement_to_china: "五百项贸易协定"
 FRA_do_you_should_do_desc: "高效运用我们广大的殖民地，就可以把矛盾通通转移到看不见的地方去啦。现在具有国家公民身份的人可以早上喝中国出产的好茶，中午用印度黄油做饭，午后烧中东的油去兜风，晚上让越南人端盘子了，哈哈哈哈。"
 precise_dessert_chef_tt: "将领升级时，有§G100%§!概率额外获得一点§Y后勤§!"
