 CHI_Sino_Japan_Treaty: "中日条约"
 JAP_CHI_Treaty: "中日条约"
 generic_peace_conference: "和平会议"
 generic_peace_conference_desc: "就目前看来，战争结束依然遥遥无期。我国完全征服敌国极其困难，而敌国也无能力击败我国。鉴于继续战争需要付出的巨大代价，签订和平条约似乎成为了双方的共同选择。"
 peace_ger_usa_german_better: "提出对美和平建议"
 peace_ger_usa_german_better_desc: "鉴于我们已经取得了针对美国的战略优势，美国在短期内无法撼动我们在欧洲的统治地位。跨越大西洋几乎是个不可能的行动，因此我们可以选择就此与美国媾和。"
 Formable_Italy: "意大利统一"
 Formable_Italy_desc: "从加里波第到加富尔伯爵，意大利的统一进程自始至终都受到全体意大利国民的支持。苦于外国势力横加干涉，意大利半岛再度分裂。今天我国再度联合了整个亚平宁，是时候宣布意大利重归统一了。"
 form_italy: "宣布意大利重新统一"
 formable_ita_south_tyrol: "收复南蒂罗尔"
 formable_ita_coast_area: "获得滨海诸省"
 formable_ita_get_france_area: "收复割让给法国的领土"
 formable_ita_colony: "宣布殖民野心"
 JAP_national_armor_research: "国家科研补贴"
 political_interfere: "政治干预"
 international_purchase: "国际订单"
 national_air_research: "国立航空研究所"
 pilot_ergonomics: "乘员人体工学"
 JAP_aircraft_set_up_subsidiary: "成立专精化子公司"
 JAP_Greater_East_Asia_Co_Prosperity_Sphere_Subject_Modifier: "资源褫夺"
 JAP_failed: "终战"
 JAP_failed_desc: "我们输掉了战争。虽然大部分人早就对战争感到厌烦，地狱般的生活也压得全体国民喘不过气。可终战真的降临之时，男丁沉默，妇女哭泣，自从明治维新以来的历史，似乎全部变成了笑话。无论如何，日本依然要面对未来。"
 JAP_cancel_wartime_mobilization: "结束战时动员"
 JAP_cancel_wartime_mobilization_desc: "长达数年的国民总动员让所有人疲惫不堪。战争结束了，但战时的管制法律还在继续运作，是时候给这幕丑剧画上句号了。"
 JAP_empower_allies_command: "驻日盟军总司令部"
 JAP_empower_allies_command_desc: "盟军将专门派驻武官，前来监督国家的战后改革。"
 JAP_abolish_emporor: "废除天皇制"
 JAP_abolish_emporor_desc: "这个高高在上的所谓神明，一直以来利用他的权威控制着所有人的精神。而他的软弱未能组织帝国滑入大战的漩涡。他失德，失职，没有任何理由让他继续凌驾于国民之上。"
 JAP_abolish_secure_law: "废除安保法"
 JAP_abolish_secure_law_desc: "明治年间制定的诸多限制言论，集会自由的法律已经不再适用于当下的国情。而战时制定的《治安维持法》更是对国民实施了最为严格的人身控制。在盟军总司令部的协调下，这些过时的法律将得到废除。"
 JAP_new_Nippon_Constitution: "日本国宪法"
 JAP_new_Nippon_Constitution_desc: "盟军总司令部认为《大日本帝国宪法》带着非常浓厚的封建和军阀色彩，并不是一部完全意义上的资产阶级宪法。因此，制定保障国民基本政治权力，定义日本是个怎样的国家的新宪法必须提上日程。不过，这一版宪法依旧承认天皇在国内的政治地位。"
 JAP_Nipponese_Republic: "日本共和国"
 JAP_Nipponese_Republic_desc: "面向未来需要付出许多的代价，比如说彻底和延续千年的天皇制度做决裂：日本的主权从不来自于神，也不来自于世俗君主，他完全属于劳动者，知识分子，士兵和农民。"
 JAP_center_right_government: "保守护宪内阁"
 JAP_center_right_government_desc: "在当下这个左翼死灰复燃，社会动荡不堪的时刻，国家需要一种温和而强力的手腕来稳定秩序。天皇将任命善于权谋的吉田茂出任首相。"
 JAP_center_left_unitied_government: "中左翼执政联合"
 JAP_center_left_unitied_government_desc: "接纳当下的社会主义运动并不代表日本就此成为一个社会主义国家。接纳一些左翼中愿意妥协，愿意进入政府的温和派实施社会改革，实际上可以更好的抑制共产主义的发展。来自日本共产党的野坂参三有通过选举执政的意向，我们可以拉拢他，把左翼分裂成可能派和不可能派。"
 JAP_Moderate_centerism: "温和重建政府"
 JAP_Moderate_centerism_desc: "我们还是需要一个中间人物来稳定左右翼。片山哲作为著名的基督徒和政府中的自由左派，也许可以很好的维持国家稳定。"
 JAP_ensure_food_supply: "应急粮食供应"
 JAP_ensure_food_supply_desc: "战争末期，政府收缴了民间的农具，铁锅等铁制品来提取那一点可怜的钢铁，来继续战争。这几乎是彻底摧毁了退路——不战胜，日本人便会饿死。而这种不幸最后发生了，好在同盟国还是提供了基本的人道主义物资，实施严格地配给制，可以保证本岛至少不出现大规模的饥荒。"
 JAP_abolish_nobility: "取缔旧贵族"
 JAP_abolish_nobility_desc: "长期以来，供养华族的花费就占据了国家相当一笔预算。现在我们输掉了战争，证明他们根本没能力维持国家，也无资金继续供养，干脆就这样借机废除他们的爵位。"
 JAP_retain_emporor: "保留皇族"
 JAP_retain_emporor_desc: "要稳定国家，还是需要依靠一个强有力的象征，否则就会陷入到类似于魏玛共和国的混乱境地：没有任何有威信，又保持中立的人团结国家，导致思想混乱，最后招致纳粹上台。毫无疑问，日本最好的象征便是天皇。"
 JAP_afterwar_neutrality_party: "国家时局看守政府"
 JAP_afterwar_fascism_party: "§R[非法]§!"
