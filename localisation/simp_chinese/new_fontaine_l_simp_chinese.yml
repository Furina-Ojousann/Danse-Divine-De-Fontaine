 FRA_glory_is_for_you_tt: "§3帝国已经获得了足够的荣耀，是时候好好享受它了，不是吗？§!"
 fra_de_watch_for_rhine: "守望莱茵"
 fra_de_watch_for_rhine_desc: "由莱茵河和阿尔卑斯构成的天然屏障就应该成为我们的疆界，这在被称作自然边疆。可惜自从拿破仑以后，自然边疆再未有过达成。现在，机会来了。"
