 fra_slove_the_economic_problem: "解决经济问题"
 Fontaine_revolution_start.5.tt: "正常游玩蓝线请及时消除§Y低效的经济§!，如果想要游玩红线，就§Y静待进度条结束§!。"
 CHI_come_to_chongqing: "战时陪都"
 CHI_come_to_chongqing_desc: "随着战事的进展，南京已经不再安全，为了保全我们的政治班底，我们必须撤退到更为安全的大后方。"
 CHI_support_the_north_west: "建设大后方"
 CHI_support_the_north_west_desc: "我们的大后方是我们的根本，我们必须保护好它。"
 CHI_south_west_construction: "西南运输线"
 CHI_south_west_construction_desc: "西南运输线是我们的命脉，可以带来我们所急缺的各种物资。"
 CHI_buy_infantry_equipment: "运输步兵武器"
 CHI_buy_artillery_equipment: "运输重武器"
 CHI_buy_support_equipment: "运输支援装备"
 CHI_international_situation: "关注国际局势"
 CHI_declare_war_to_jap: "正式对日宣战"
 CHI_declare_war_to_jap_desc: "之前的谈判幻想已经破灭。随着国际局势的变化，我们应该正式对日宣战。"
 CHI_declare_war_to_jap_tt: "扩大来自§Y西南运输线§!的装备运输量"
 CHI_National_Southwestern_Associated_University: "成立西南联合大学"
 CHI_National_Southwestern_Associated_University_desc: "东部的几所高校是我们国家仅存的高等教育资源，现在他们不愿为日本服务，一路辗转来到西南的穷山恶水，条件艰苦。我们需要把他们组织起来，继续我国被中断的文化事业。"
 CHI_National_Southwestern_Associated_University_idea: "国立西南联合大学"
 CHI_National_Southwestern_Associated_University_tt: "允许在战争期间继续推进我国的文化事业"
 fra_set_up_africa_nation_come_up: "批准非洲农业联盟成立"
 fra_set_up_africa_nation_come_up_desc: "虽然冠名为“农业联盟”，似乎是代表地主利益的政党。但实际上非洲农业联盟是一个以自耕农为基础，主要诉求是反殖民和反种族主义的进步组织。"
 fra_offer_weapon_to_revolutionary_farmer: "给革命农民提供武器"
 fra_offer_weapon_to_revolutionary_farmer_tt: "在非洲农业联盟活动区域的抵抗度提升后，将会出现农村革命推进的事件。"
 navy_cabinet: "海军阁首"
 critical_mission: "临危受命者"
 rehabilitater: "善后人"
 jap_democratic_reformer: "民主改革者"
 JAP_contine_Okubo_Toshimichi_plan: "继续大久财政"
 JAP_contine_Okubo_Toshimichi_plan_desc: "大久保利通作为明治维新的核心领导人之一，其主政时期的财政政策深刻塑造了日本现代化初期的经济基础，使得日本的工业化迈出了第一步。即使现在日本已经基本上完成了工业化，大久保利通的财政思路——平衡预算，殖产兴业，富国强兵的思路依然可以延续。"
 JAP_japanese_land_reform: "日本土地改革"
 JAP_japanese_land_reform_desc: "日本农民受苦太久了。明治维新以前，佃农受的是大名藩阀的层层盘剥。维新以后，又承担哺育工业的重担，其生活水准不见改善，反而显著下降。土地财政在几百年的时间里发展得极度畸形，它急需中央力量的改变。"
 JAP_local_development: "地区发展"
 JAP_local_development_desc: ""
 JAP_develop_Hokkaido: "重启北海道扩殖计划"
 JAP_develop_Hokkaido_desc: "因为一桩臭名昭著的腐败案，曾经备受期待成为日本制造业中心的北海道停止了开发，如今成为贫穷的乡村。也许我们现在可以考虑重新在北海道投入资源。"
 JAP_expand_chemistry_industry: "资源合成开发"
 JAP_expand_chemistry_industry_desc: ""
 JAP_use_source_carefully: "精算资源花费"
 JAP_use_source_carefully_desc: "国家战略资源实属有限。世界阴云笼罩，战争山雨欲来之时，更是容不得一点浪费。我们必须指定详尽的资源使用规划，才能把浪费减到最小。"
 JAP_heart_of_industry: "制造业之心脏"
 JAP_heart_of_industry_desc: "关东关西两大平原，本岛少有的大片平原，正是掀起工业化浪潮的理想场所。尽管用地紧缺，但改良的规划依然可以提供发展的空间。"
 JAP_decrease_tax: "削减农业税"
 JAP_decrease_tax_desc: "大久保利通以前定下的3%农业税率不知引得多少农民倾家荡产，以至于自杀。稍有骨气一点的，还成立了困民党，搞出了日比谷烧打事件，连大久保利通本人都死在了暴动的农民手中。这些现象无不告诉我们，是时候给农民减减压了。"
 JAP_decrease_price_scissors: "缩小剪刀差"
 JAP_decrease_price_scissors_desc: "农民的贫困还有一个原因就是工农业产品的剪刀差。过去日本工业的发展可以说是完全建立在这个剪刀差上的，但随着国家政治的改变，我们可以另寻工业化的方法，这个剪刀差也可以考虑被合理地缩小。"
 JAP_lift_the_ban_of_worker_union: "工会解禁"
 JAP_local_development_tt: "§Y西日本§!的所有地区:"
 JAP_everyone_effort: "举国一致"
 JAP_everyone_effort_desc: "日本需要面对的是人口数倍于己，土地数十倍于己的强敌。为了战胜他们，日本需要充分地动员每一份力量。"
 JAP_transfer_labor: "输送劳工"
 JAP_transfer_labor_desc: "本土男儿多数已经充军，现在工人的岗位妇女儿童难以胜任——但我们广大的殖民地还有许多精壮男子，他们不是可以充当我们的免费劳动力吗？我们可以把他们送进朝鲜深山的矿洞里，送进东北的集体农庄里，还有军舰岛深深的地下......"
 JAP_special_weapons: "特殊手段"
 JAP_special_weapons_desc: "人道？战败才是最大的不人道。与其关心平房的特别班每年要消耗掉多少实验品，他们武器的效果更令人侧目。实验室里培育出以公斤计算的细菌，有时候要比成吨的炸药更为有效......鼠疫......炭疽.....丢掉几个生化兵的命也无关紧要，只要不危及到东京贵族老爷们的身体健康就好了。"
 tot_economic_mobilisation_jap: "举国体制"
 jap_transfer_labor_idea: "强迫劳动"
 JAP_purge_lord: "削弱藩阀"
 JAP_purge_lord_desc: "萨摩藩和长州藩作为明治六年政变的胜利者，在国家现代化的进程中攫取了不计其数的特权利益。现在，是时候把这些被夺走的权力还给人民了。"
 JAP_long_tern_industry: "长足工业化"
 JAP_long_tern_industry_desc: "工业化不再需要建立在农民的苦楚上。事实证明，劳动大众也可以享受到现代化的成果。相对过剩的缩小可以为我们提供更为长久的发展。"
 jap_tax_reduction: "地税削免"
 jap_agricultural_development: "农村发展"
 fra_attack_pol_colony: "进攻葡属几内亚"
 FRA_because_her_morality: "因为她完美的道德"
 FRA_because_her_morality_desc: "百年发展而来的经济学理性，使我们全变成了懦夫；唐吉诃德冲锋时的光彩，被审慎的思维盖上了一层灰色。即使是伟大事业在这一种考虑之下，也会逆流而退，失去了行动的意义。共和国公民的内斗，实际上是无法摆脱的困兽之斗，因绝望而不知所措，因没有目标而诉诸暴力。而枫丹足够幸运，她还有一位道德上无可挑剔的完人，可以重新将大局拉上正轨，芙宁娜·德·枫丹。"
 FRA_cancel_gold_standard: "与金本位脱钩"
 FRA_cancel_gold_standard_desc: "我们的经济学家已经对当前的市场做出了一个基本判断：当前的经济正处于通缩缺口中，急需积极的财政货币政策加以调整。而将大量货币投入市场正是其中的一个重要操作——但金本位限制了我们货币的供给量。那么，我们不得不和金本位与币值稳定说再见了。"
 FRA_mobilization_for_war: "经济备战"
 FRA_mobilization_for_war_desc: "如果说什么东西是永远不会生产过剩的...那应该是军火！正好，欧洲走向战争已经是几乎不可避免的事实了，这样对于军事工业的投资便可以再度刺激经济了。"
 FRA_macroeconomic_policy: "宏观组合拳"
 FRA_macroeconomic_policy_desc: "市场经济发展了如此之久，应对这种程度的萧条，经济学家们早就总结出了一整套公式化的应对方案。不管什么公开市场业务，降低利率，降低存款准备金率，调整税率，降低再贴现率，全都用上。政府支出也要扩张，反正赤字早就不是问题了，只要多花钱，经济就能好起来。什么？挤出效应？拜托，现在可是萧条时期欸。"
 FRA_enhance_lowest_wage: "最低工资调整法案"
 FRA_enhance_lowest_wage_desc: "需求不足最主要的原因还是消费疲软。而消费疲软的原因事实上并不是因为利率过高导致民众趋向于储蓄，而是因为普通民众根本就没有消费能力，而具有消费能力的人群的需求早已被满足。我们需要的是提高底层的消费能力，即提升最低工资。"
 FRA_develop_international_capitalist: "垄断竞争法案"
 FRA_develop_international_capitalist_desc: "一个个的小生产商的产品在国际上不可能有任何竞争力，无论是产品的质量还是数量都不存在任何优势。用马政经的话来讲，垄断反而因为其生产更高的社会化程度而更具有竞争力。我们急需培养一批在国际上具有竞争力的大资本，来尽可能地提升出口。在这方面，福特是值得我们学习的对象。"
 FRA_national_investment: "国家投资"
 FRA_national_investment_desc: "经济在持续不断的刺激下有了起色，消费者对经济的预期变得更加乐观了。因而，边际消费倾向随着它不断提升，也就意味着政府支出产生的效果得到了极大的加强。现在我们必须抓住这个机会进行社会工程，将失业率恢复到正常水平上。"
 FRA_french_expressway: "[GETNameAdj]高速公路"
 FRA_french_expressway_desc: "将政府预算用于投资基础设施是个不错的主意。高速公路的建设可以为我们提供大量的就业机会，刺激经济增长。"
 FRA_industry_core_north: "北部工业核心"
 FRA_industry_core_north_desc: "加莱，兰斯，里尔。这个国家最早开始进行工业化的地区，现在可以得到再一次的强化。"
 FRA_industry_core_south: "新兴工业基地"
 FRA_industry_core_south_desc: "除了北部的老牌工业基地，一些新的工业基地，例如罗讷河流域，布雷斯特，波尔多，图瓦卢等地也在逐渐崛起。我们可以建成一个分散的全国工业网络。"
 FRA_stabilizer_theory: "自动稳定器理论"
 FRA_stabilizer_theory_desc: "积极的干预主义政策十分必要，但在经济上行时期却暴露出挤出效应的问题，经济周期还是不可避免。如果说大萧条给了我们什么教训，那就是应该有一种机制来自动地调节市场经济，削弱萧条期的影响。"
 FRA_loan_reorganization: "债务重组"
 FRA_loan_reorganization_desc: "我们之前的经济政策花掉了太多政府预算，现在债务已经成为一个严重问题。好在，我们前线已经给予了诸多大公司不少特殊的权利，那么与他们的债务问题也不是不能谈的。"
 FRA_manufacturing_development: "制造业的春天"
 FRA_manufacturing_development_desc: "经济已经完全复苏。现在，经济进入了上升周期，意味着需求即将开始不断膨胀。那么赶快增加供给，来满足军队与民众的需要吧。"
 FRA_national_industry: "战时国有化法案"
 FRA_national_industry_desc: "在战争时期，私人资本家的利益算得了什么呢？我们需要一条在战时与备战期允许无条件国有化重工业的法案，来增加武器的生产。"
 FRA_wartime_technology: "战时科学"
 FRA_wartime_technology_desc: "战争是科技进步的催化剂。我们需要在战时加大对科技的投入，来提升我们的武器装备。"
 FRA_long_term_supply_strengthening: "长期供给强化"
 FRA_long_term_supply_strengthening_desc: "只有短期的总供给是会因为我们的政策而变动的。而长期的总供给是一条直线，无论价格怎样改变，它都静静地在哪里，代表的也就是这个国家的实力上限。想要将这条长期总供给线向右移动，技术的迭代才是最可行的方案"
 growth_crash: "实际GDP快速蒸发，§R经济崩溃§!"
 growth_down: "实际GDP负增长，§Y经济萧条§!"
 growth_slow: "实际GDP增长率低下，§Y经济停滞§!"
 growth_normal: "实际GDP增长率适中，§G经济稳步增长§!"
 growth_fast: "实际GDP快速增长，§Y经济可能过热§!"
 inflation_negative: "处于§R通货紧缩§!状态"
 inflation_normal: "目前货币币值稳定，通货膨胀§G温和§!"
 inflation_high: "处于§Y“飞奔的”§!通货膨胀状态"
 inflation_very_high: "处于§R恶性§!通货膨胀状态，货币币值迅速蒸发"
 unemployment_low: "失业率低于自然失业率，经济可能正在§Y超负荷运转§!"
 unemployment_normal: "失业率与自然失业率接近§G就业充分§!"
 unemployment_high: "失业率超出自然失业率太多，§Y劳动力资源浪费严重§!"
 FRA_economic_modifier: "经济修正"
 france_inflation_add_5: "我们的§Y通货膨胀率§!预计将会上涨§Y5%§!"
 FRA_cancel_gold_standard_tt: "§R完成以后，我们必须马上采取行动稳定物价！§!"
 FRA_macroeconomic_policy_tt: "我们的§Y物价§!预计会在未来100天内逐渐稳定；当§Y物价稳定§!以后，获得为其§Y两年§!的修正:\n生活消费品工厂系数:§Y-10%§!"
 FRA_macroeconomic_policy_tt_2: "我们的§YGDP增长率§!预计将会提升§G1.8%§!"
 FRA_national_investment_tt: "我们将获得§G5000万§!法郎政府§Y投资预算§!\n设定§Y2000万§!法郎为§Y债务上限§!"
 france_national_investment_spend_3000: "我们将花费§Y3000万§!法郎。根据我们的预算情况，这笔预算将由不同的部分承担。"
 france_national_investment_spend_1500: "我们将花费§Y1500万§!法郎。根据我们的预算情况，这笔预算将由不同的部分承担。"
 FRA_french_expressway_tt: "§Y失业率§!预计将下降§G2%§!"
 FRA_industry_core_north_tt: "§Y失业率§!预计将下降§G3%§!"
 FRA_loan_reorganization_tt: "§Y削减§!我们目前§Y一半§!债务\n§Y债务上限§!提升§G2000万§!法郎\n现在每§Y200万§!法郎债务才消耗§R0.01§!政治点数"
 FRA_mobilization_for_war_tt: "§Y失业率§!与§Y适役人口修正§!的转化比提升至§G50%§!，即每2%失业率提供1%适役人口修正"
 FRA_enhance_lowest_wage_tt: "§Y通货膨胀率§!与§Y建造速度§!的转化比提升§G一倍§!"
 FRA_stabilizer_theory_tt: "让我们的经济增长更加§G稳定§!:\n自动调整§Y通货膨胀率§!"
 FRA_armor_action: "装甲行动"
 FRA_armor_action_desc: "无论我们的战略重点在于进攻还是防御，坦克已经成为陆地作战主宰是不可否认的事实。幸运的是，尽管我们的坦克发展遭遇了保守派的重重阻力，还有像埃斯蒂安将军这样的人为它争取，致使我们的坦克水平还有重回世界一流的机会。"
 FRA_defense_equipment: "防御工事革新"
 FRA_defense_equipment_desc: "工程技术的进步允许我们打造相比于以前不可想象的坚固堡垒，在预算足够的情况下，它可以完全御敌于国门之外。"
 FRA_defense_tank: "防御的依托"
 FRA_defense_tank_desc: "具备不可贯穿的极厚装甲，加上足以摧毁敌军有生力量的反步兵火力的坦克，绝对会是进行防御的极好武器。"
 FRA_land_airfore: "近地支援"
 FRA_land_airfore_desc: "空军也是一个值得投资的军种。相比于海军和陆军，空军的成型要快得多，可以在我们向前推进时提供优秀的支援火力。"
 FRA_radio_action: "陆军无线电"
 FRA_radio_action_desc: "良好的通讯在陆地战争中的优势已经被充分体现。随着我们三军的联合行动逐渐密切，不能让通讯不畅的问题乱了我们的阵脚。"
 FRA_special_force_expanded: "特种力量"
 FRA_special_force_expanded_desc: "基于空降兵的三维立体作战已经在先前的丹麦，波兰战役中充分地体现了其在战争中的优势。我们可以考虑组建有规模的特种部队来起到破坏后勤，直取敌军咽喉的作用。"
 FRA_mechanized: "机械化作战"
 FRA_mechanized_desc: "机械化步兵将逐步替代徒步步兵，成为我们在战争中的主要矛头。"
 FRA_napoleon_of_20_century: "二十世纪的拿破仑"
 FRA_napoleon_of_20_century_desc: "之前，我们国家号称具有欧洲第一强大的陆军，却在各种冲突中显得迟缓而软弱。如同一个依赖药物健身的壮士，表面上肌肉发达，实际上内脏已经脆弱不堪。好在这只庞大而混乱的军队终于完成了改革，可以再像拿破仑的老近卫军们所向披靡了。"
 FRA_artillery_boom: "火炮轰击"
 FRA_artillery_boom_desc: "不得不说，利用火炮进攻显然是完全比不上装甲迅速而有力的行动的。但利用火炮粉碎步兵进攻对于防守来说还是一种不错的战术。"
 FRA_plan_considerated_war: "谋策定战"
 FRA_plan_considerated_war_desc: "无论是我们的战略还是战术，都不应该轻易冒险。无论是考虑到战士的生命，还是整场战争的大局，在战争中冒进都是不明智的。以我们国家人民的支持，广大的殖民地和成功的外交，只需等待敌人的慢慢崩溃便可取胜。"
 FRA_supply_guarantee: "国家特快"
 FRA_supply_guarantee_desc: "快速推进的战线绝不能停滞下来。为了保障我们进攻的兵锋不会为补给的缺乏而钝化，高效的运输体系亟需建立。"
 FRA_air_land_combination: "立体作战"
 FRA_air_land_combination_desc: "相比于海上支援，空军在陆地作战中的作用显然更为重要。我们需要将空军与陆军的作战进行更为紧密的结合，来提升我们的战斗力。"
 FRA_expanded_the_production_of_armor: "扩大装甲生产"
 FRA_expanded_the_production_of_armor_desc: "我们的坦克作为进攻的矛头，不说质量上乘，至少要先做到足量来武装我们的装甲部队。"
 FRA_prefect_armor: "完美无缺的利器"
 FRA_prefect_armor_desc: "我们在战争中作为防守方，从来就不缺少全世界爱好和平人士的支持。又坐拥庞大的殖民地与海军，不用担心资源的紧缺。战争完全可以被限制在一个有限的范围内，在战线稳固的情况下把我们的坦克造的完美无缺，等到敌人精疲力竭，在给予压倒性的反攻。"
 FRA_air_bomb: "空地火炮"
 FRA_air_bomb_desc: "甚至不一定需要和敌军短兵相接，既然我们袭击的目的是打散敌军的编制再向前推进，那么完全可以让空军代劳。"
 FRA_field_health: "战地救护"
 FRA_field_health_desc: "在弗兰德斯的原野中，在马恩河边，战壕中肮脏到令人作呕的环境，上一代保卫家国老兵们永远无法忘记。没人希望看见新一代战士重蹈覆辙。在壕沟中与粪土为伴，归乡又染上伤寒。医学和人权的进步，已经让我们完全有能力避免这些。"
