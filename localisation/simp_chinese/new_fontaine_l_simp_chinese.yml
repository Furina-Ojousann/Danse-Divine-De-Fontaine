 you_cant_change_the_second_chief: "国家副手不可随意更改" 
 fra_not_curising: "大陆巡游已结束"
 FRA_the_task_of_communist_party: "党务工作"
 Fontaine_revolution.22.t: "苏枫共同防御议定"
 Fontaine_revolution.22.d: "枫丹希望与我们签署一份共同防御协定，这样对彼此的安全都有利。"
 Fontaine_revolution.22.a: "好主意。"
 Fontaine_revolution.22.b: "枫丹侵略性太强，我们不想这么快卷入一场大战。"
 Fontaine_revolution.23.t: "协议被批准"
 Fontaine_revolution.23.d: "两线作战的压力，一向都是不言而喻的，近在眼前，便是一战的同盟国，既然历史已经有了一个覆辙，那么相比很少由国家敢于挑战它了，苏联显然是意识到了这一点，于是，横跨整个欧洲大陆的互保协议便形成了。"
 Fontaine_revolution.23.a: "非常好。"
 Fontaine_revolution.24.t: "协议被否决"
 Fontaine_revolution.24.d: "也许是我国先前在外交上表现出了过于强大的侵略性，苏联对于这份共同防御协定签署十分犹豫不决。尽管苏联此从建国以来已经度过了差不多二十年的和平岁月，但苏联人依然不想这么快卷入战争，亟需修生养息的时间，于是协议便无疾而终。"
 Fontaine_revolution.24.a: "可协议本身不就是和平的保障吗？"
 party_corruption_decrease_10: "£communist_corruption_of_the_party_texticon §R党§!的§Y腐化度§!:§G-10%§!"
 the_curruption_desc: "§Y腐化§!是破坏§R党§!的建设的§R主要威胁§!，如果§Y腐化度§!过高，那么各项运动的开展将会遇到§Y不同程度的阻挠§!，甚至面临§R资产阶级复辟的§!危险。\n§R党§!目前的§Y腐化度§!为:§Y[?the_corruption_of_party]%§!"
 FRA_the_corruption: "§Y腐化度§!影响"
 curruption_modifier_values: "§Y腐化度§!修正\n----------\n每日消耗的政治点数:§R+§![?corruption_political_power_cost|-]\n党派支持度对稳定度修正:[?corruption_party_popularity_stability_factor|+%]\n每日中立主义支持率:§R+§![?corruption_neutrality_drift|-]\n建造速度:[?corruption_production_speed_buildings_factor|+%]\n陆军组织度:[?corruption_army_org_factor|+%]\n陆军经验增长:[?corruption_experience_gain_army_factor|+%]\n海军经验增长:[?corruption_experience_gain_navy_factor|+%]\n空军经验增长:[?corruption_experience_gain_air_factor|+%]\n生活消费品工厂系数:§Y+[?corruption_consumer_goods_factor|%]§!\n研究速度:[?corruption_research_speed_factor|+%]\n----------\n§Y腐化度要密切关注，它每月都会增加。§!"
 fra_consolidate_the_commune: "巩固政权"
 fra_consolidate_the_commune_desc: "现在公社政权立足未稳，还有诸多势力威胁着我们的公社，若是放任不管，可不会有什么好结果......"
 party_corruption_increase_20: "£communist_corruption_of_the_party_texticon 党的§Y腐化度§!:§R+10%§!"
 the_corruption_could_be_control: "£communist_corruption_of_the_party_texticon §R党§!的§R腐化度§!还没有达到§R无法控制§!的程度(<90)"
 monthly_corruption_change: "£communist_corruption_of_the_party_texticon 每月§Y腐化度§!变化:[?monthly_corruption_change_value_by_economy|-%%]\n\n"
 FRA_the_commune_economy: "社会主义经济"
 FRA_the_commune_economy_desc: "经济基础，决定上层建筑；只有社会主义的经济，才能够支撑社会主义的制度。"
 FRA_set_up_state_economy_planning_commune_tt: "§Y社会主义经济§!追加效果:\n生活消费品工厂系数:§Y+5%§!\n生产效率上限:§G+5%§!"
 the_union_lose_strength: "§R工会派§!的影响力遭到了§Y一定的打击§!"
 fra_start_normal_purge: "开展清党运动"
 fra_start_normal_purge_desc: "近期越来越多的迹象表明，很多的党员干部没能抵挡资本主义的糖衣炮弹，堕落为原来的“老爷”了，这些党员如同身体中的癌症，若不加以清除日后必成大忌。"
 the_corruption_is_a_little_serious: "£communist_corruption_of_the_party_texticon §R党§!的§R腐化度§!略微有点§R严重§!(>30)"
 monthly_corruption_change_de_20: "£communist_corruption_of_the_party_texticon 每月§Y腐化度§!变化:§G-10%§!"
 fra_start_massive_purge: "开展大规模清党运动"
 fra_start_massive_purge_desc: "几次群众运动的效果都不甚理想；看起来，对此最合理的解释是党内的腐化问题已经相当严重，而且，我们可以从中推断出一张基于利益关联的保护伞已经形成，那么局部的清党运动恐怕已经起不到效果了；如同癌症扩散了便只能使用化疗，一场大规模的清洗不可避免，尽管破坏不小，但是维系社会主义制度的必要手段。"
 the_corruption_is_quite_serious: "£communist_corruption_of_the_party_texticon §R党§!的§R腐化度§!相当§R严重§!(>50)"
 monthly_corruption_change_de_40: "£communist_corruption_of_the_party_texticon 每月§Y腐化度§!变化:§G-20%§!"
 Fontaine: "芙宁娜的1936之旅-音乐包"
 HOYOMiX_La_vaguelette: "HOYO-MiX - 轻链 La vaguelette"
 Den_lille_havfrue: "Project Mons - 海的女儿 Den lille havfrue"
 LaLaLandCast_Another_Day_Of_Sun: "La La Land Cast - Another Day Of Sun"
 yorushika_nahashi: "Yorushika - 声"
 yorushika_notirasu: "Yorushika - 鹦鹉螺"
 FRO_patriots: "爱国者们"
 FRO_patriots_desc: "尽管我们输掉了在欧洲大陆上的战争，但抵抗的烽火仍未熄灭，在世界各地，还有千万爱国者拒绝向侵略者屈服。"
 FRO_liberate: "枫丹光复"
 FRO_liberate_desc: "经过了艰苦卓绝的斗争，象征着自由的三色旗再度飘扬在了马提尼翁宫的上方，随着敌人从枫丹的过境中溃逃，我们的政府可以结束流亡，重新开始在全国范围内运作。"
 FRO_promise_national_independence: "承诺民族独立"
 FRO_promise_national_independence_desc: "战败严重削弱了我们对于殖民地的控制。让这些和枫丹八竿子打不着的民族为我们效力，多少有点痴人说梦了。现在我们无力再采取威压与恐吓的方式迫使他们支持我们，完全是做不到了。只能以帮助他们在战后取得独立为筹码来争取了。"
 FRO_support_of_our_ally: "争取友邦援助"
 FRO_support_of_our_ally_desc: "我们必须证明我们对于同盟国的价值，只有确定了我们是一个强力的盟友，才有机会获取盟国的更多援助。"
 FRO_prove_our_value_to_the_alliance: "将任一前殖民地纳入我们的控制"
 is_fontaine_original_colony: "是枫丹的前殖民地"
 FRO_prove_our_value_to_the_alliance_tt: "如果美国完成了租借法案或者在同盟国中，我们可以得到更多装备"
 FRO_support_of_our_ally_tt: "只要我们能够占领任意前殖民地，同盟国便可认可我们的价值，从而给予我们超大量的军事援助。"
 FRO_indochina: "与印支民族主义者接触"
 FRO_indochina_desc: "我们在东方的印度支那殖民地具有重要的战略意义，其资源亦相当丰富。可惜的是，这些宝贵的资源正在为德国的战争机器提供燃料。没关系，当地人已经觉醒了反抗的意识，我们只要提出我们的条件，便可以把他们拉拢过来"
 FRO_west_africa: "收回西非"
 FRO_west_africa_desc: "作为曾经枫丹殖民帝国的一部分，西非地区的收回也理应提上日程表。"
 FRO_central_africa: "赤道非洲"
 FRO_central_africa_desc: "我们曾经在赤道非洲的势力根深蒂固，但这反而强化了巴黎政府对此地的控制，不过，我们依然有办法收回这片土地。"
 FRO_northern_africa: "北非故土"
 FRO_northern_africa_desc: "阿尔及利亚的重要性超越了其他任何一个殖民地，几十万黑脚居住的土地，有着强大的认同。前期旧法国与枫丹时期对这里的大量投入也让此地拥有了相当不错的工业基础，然而，巴黎政府对此地的控制也更加严密......也许我们需要从枫丹海军的领导层上想办法。"
 FRO_unite_for_the_liberity: "同仇敌忾"
 FRO_unite_for_the_liberity_desc: "解放之路漫漫，唯有团结能使前路光明。"
 FRO_navy_corperation: "沟通殖民帝国"
 FRO_navy_corperation_desc: "只要有一艘小船，加上足够的勇气，智慧与给养，我们可以从塞纳河畔到达好望角，新奥尔良甚至是澳大利亚！所以说，大海，是我们沟通各个殖民地的根本，为此，我们需要强大的运输网络。"
 FRO_Georges_d_Argenlieu: "乔治·达尚留"
 FRO_preparation_for_liberation: "择日启航"
 FRO_preparation_for_liberation_desc: "我们的准备工作已经充分，而解放故土才是我们计划最最困难的地方。那时，我们故乡宁静的乡村也许会在炮火中化为焦土，千年遗存下来的古迹也许会轰然倒塌，但独立于自由的价值足以让我们牺牲这些。"
 fra_marines: "启航"
 is_controlled_by_ROOT_or_ally: "被我们或者我们的盟友所控制"
 FRO_long_road_to_hometown: "漫漫归乡路"
 FRO_long_road_to_hometown_desc: "我们英勇的海军陆战队已经拿下了故乡的滩头阵地，全国的解放势在必得！"
 fra_long_road_to_hometown_idea: "长路归乡"
 A_la_volonte_du_peuple: "人民之歌(A la volonte du peuple)"
 Exec_Cosmoflips: "KOKIA - Exec_Cosmoflips"
 la_marseillaise: "马赛曲(La Marseillaise)"
 Song_of_The_French_Resistance: "抵抗之歌(La chanson de la resistance)"

 FRA_dissenters: "明里，暗里？"
 FRA_dissenters_desc: "无产阶级夺取了政权，便意味着革命的结束吗？并不是，从暗巷到厅堂，革命还未贯彻到底。"
 fra_dissenters_custom_modifier_tooltip: "£communist_corruption_of_the_party_texticon 每月§Y腐化度§!变化:[?monthly_corruption_change_value_by_dissender|-%%]"
 FRA_a_new_idea: "新想法"
 FRA_a_new_idea_desc: "随着自律机械的智能化不断地提高，让机器取代官僚系统中的干部似乎成为了一个解决腐化问题的新解决办法，毕竟这些机械不会有在我们设定之外的任何非分之想。可是在党的内部，这个想法还有不少人的反对。"
 FRA_machinery_specialized_district: "设立机械管理特区"
 FRA_machinery_specialized_district_desc: "立即在全国推行机械干部还是太冒险了，不过我们可以用几个地区的实际效果来证明机械官僚能够胜任管理群众的重任。"
 FRA_realize_communism: "迈向共产主义"
 FRA_realize_communism_desc: "自从人类出现了阶级分化以后，不平等与人民对于平等的追求就成为了历史的主要矛盾之一，如同两个音符让人类历史不断推进。回首过去，几十年前马克思提出的科学社会主义理论，正在被多个国家进行实践。畅想未来，共产主义将在波云诡谲的二十世纪得到彻底的实现。再看今朝，在生产力被自律机械极大地解放的情况下，枫丹正比任何一个时代都要接近共产主义的实现。"
 FRA_accelerate_the_army_building_tt: "§Y工农红军§!追加效果:\n适役人口:§Y+2%§!\n动员速度:§G+25%§!\n§Y公社经济§!追加效果:\n生活消费品工厂系数:§Y+3%§!"
 fra_support_antifascist_allies: "驰援反法西斯同盟军"
 FRA_volunteer_common: "赴[FROM.GetNameDef]志愿军团"
 FRA_the_machinery_issue_tt: "在完成§Y开发殖民地工业§!或者§Y无条件基本收入§!以前，所有§Y自律机械§!将§R停产§!"
 FRA_Unconditional_Basic_Income_tt: "§G恢复自律机械的生产§!"
 fra_unconditional_basic_income_idea: "全民基本收入"
 fra_unconditional_basic_income_idea_desc: "事实上，资本主义打着自由的旗号号召人们推翻封建僭主，反而又用工资奴役了群众，成为了人们自由事实上最大的障碍。在无论是生产力还是生产关系都得到了极大进步的今天，这个陈腐的制度该被废除了。"
 fontaine_artillery_machinery_2: "压制特化自律机关-改进型"
 FRA_a_new_idea: "新想法"
 FRA_a_new_idea_desc: "随着自律机械的智能化不断地提高，让机器取代官僚系统中的干部似乎成为了一个解决腐化问题的新解决办法，毕竟这些机械不会有在我们设定之外的任何非分之想。可是在党的内部，这个想法还有不少人的反对。"
 FRA_machinery_specialized_district: "设立机械管理特区"
 FRA_machinery_specialized_district_desc: "立即在全国推行机械干部还是太冒险了，不过我们可以用几个地区的实际效果来证明机械官僚能够胜任管理群众的重任。"
 FRA_realize_communism: "迈向共产主义"
 FRA_realize_communism_desc: "自从人类出现了阶级分化以后，不平等与人民对于平等的追求就成为了历史的主要矛盾之一，如同两个音符让人类历史不断推进。回首过去，几十年前马克思提出的科学社会主义理论，正在被多个国家进行实践。畅想未来，共产主义将在波云诡谲的二十世纪得到彻底的实现。再看今朝，在生产力被自律机械极大地解放的情况下，枫丹正比任何一个时代都要接近共产主义的实现。"
 tech_fontaine_improved_special_machinery: "特化自律机械-改良型"
 FRA_task_finished_tt: "完成§Y巩固政权§!的任务"
 fra_appeal_workers: "鼓励工人为保卫祖国而工作"
 fra_appeal_workers_desc: "保卫我们的社会主义祖国——的确是一个高尚的口号。但社会主义的优越性从不体现在口号的高尚上，在谈及实际的利益上时，社会主义者是从不回避的，将枫丹与德国的工人处境进行对比，以及适当的物质激励，就可以起到好得多的效果。"
 fra_strengthen_army_training: "加紧军队整训"
 fra_strengthen_army_training_desc: "我们的士兵们受过持久且符合心理科学的政治教导，是从来不缺乏砸碎旧世界的热情的。但战术素养并非是这样的热情就可以补足的。"
 FRA_rectify_the_party_ranks_tt: "§Y明里，暗里？§!追加效果:\n稳定度:§G+5%§!\n政治点数:§G+5%§!"
 FRA_popular_organization_tt: "§Y明里，暗里？§!追加效果:\n外国颠覆效率:§G-20%§!\n意识形态变化抵制力度:§G+25%§!"
 FRA_asset_of_socialism_tt: "§Y明里，暗里？§!追加效果:\n每日中立主义支持率变化:§R-0.10§!\n政治点数:§G+5%§!"
 FRA_landlord_resistance: "地主武装"
 FRA_landlord_resistance_desc: "在枫丹南部政府控制薄弱的乡村中，一些反对社会主义革命的地主分子组织家丁，利用邪教蛊惑当地民众，组织起了与警察对抗的团练，严重影响了当地的安全与生产。并且，这些地主非常乐意为反对社会主义的侵略者们服务。"
 Fontaine_revolution.27.tt: "§Y明里，暗里？§!追加效果:每周稳定度:§R-0.47%§!"
 FRA_surpress_the_landlord: "镇压地主武装"
 FRA_surpress_the_landlord_desc: "枫丹南部的地主可谓是现代社会的活化石了，从中世纪的欧克西塔尼亚到现代的枫丹，这些人换了一代又一代，代代都是地主，扎根在乡村中，反对革命，组织团练，保卫自己的不义之财。这些人是时候该被连根拔起了。"
 806_tt: "§Y明里，暗里？§!追加效果:每周稳定度:§G+0.02%§!"
 else_tt: "§Y明里，暗里？§!追加效果:每周稳定度:§G+0.05%§!"
 fra_surpress_the_local_landlord: "镇压[FROM.Getname]的地主"
 wisdom_machinery: "战斗智能"
 improve_productivity: "改进生产"
 combat_skill: "格斗技巧"
 efficient_bomb: "高效轰击"
 fontaine_military_organization: "枫丹动能机械制造局"
 FRA_anarchism_economy: "另一场伟大的实验"
 FRA_anarchism_economy_desc: "无政府共产主义也是一套具有完整理论体系，真正具有实践意义的思想。现在，我们是时候将这种飞扬的思想带到枫丹这片充满了生机的热土上进行这场伟大的实验了。"
 PRC_join_soviet_union: "一边倒"
 PRC_join_soviet_union_desc: "作为从帝国主义枷锁之中刚刚挣脱的新生国家，中华人民共和国绝不能再与英美帝国主义站在同一条战线上，必须立刻倒向世界和平民主的阵营，社会主义的阵营。"
 PRC_the_third_world_cooperation: "第三世界国家合作"
 PRC_the_third_world_cooperation_desc: "三个世界理论将地球分割成了三块——美苏超级大国为第一世界国家，英法德等西方发达资本主义国家是第二世界国家，而以中国为首的诸多刚刚摆脱殖民主义或者尚在进行反抗殖民的斗争的国家或者组织则为第三世界。中国作为世界上最大的第三世界国家，亟需承担协调第三世界国家间合作与支援的义务。"
 prc_the_third_world_cooperation_category: "三个世界"
 prc_the_third_world_cooperation_category_desc: "按照三个世界理论，中国是毫无疑问的第三世界国家。但在世界上诸多的第三世界国家中，中国又是相当大的一个大国，因而，中国是有支援在众多地区发生的反对殖民主义，反对帝国主义的斗争的国际义务的。"
 prc_support_independence: "支持[FROM.Getname]独立斗争"
 PRC_economy_cooperation: "共同发展"
 PRC_economy_cooperation_desc: "苏俄革命之所以如此艰难，是因为红军孤立无援，而白军却被帝国主义一手扶持，其成功应该算是个幸运的特例，让社会主义第一次在一个大国开始了实践。但其他后发的国家如果缺乏支援，是难以成功的，我们需要竭尽所能地帮助他们从封锁中生存下来。"
 western_blockade: "西方封锁"
 western_blockade_desc: "西方国家正企图通过贸易上的封锁扼杀这个新生政权。"
 china_supported: "受中国支持而取得独立"
 support_to_forgein: "对外支援"
 support_to_forgein_desc: "尽管对我们的经济造成了一定的负担，但从上到下，干部和人民群众都热切地支持我们支援世界反殖民事业。"
 western_blockade_2: "封锁打破"
 western_blockade_2_desc: "来自社会主义国家的物资补充了由于西方撤资而造成的商品短缺。"
 prc_economy_cooperation_decision: "为[FROM.Getname]提供帮助"
 PRC_long_live_the_human_unity_tt: "§R中国人民§!从此§R站起来了！§!"
 FRA_our_truth_democracy: "我们真正的民主"
 FRA_our_truth_democracy_desc: "无论怎么样，最普通的劳动人民都很难直接掌握生产资料。以前是资本家，后来变成了国家，其实就是干部，可干部再清廉，经过了再严酷的斗争，也终究是人，是人，只要手上有资本，思想就会不可避免地倒退，倒退了群众要推翻他，却又拿出了“人民民主专政”，把这种运动定义为“反革命暴乱”，这下好了。所以我们公社要做的事情，就是把民主和权力真正下放到地方，下放到每一个劳动者上，让他们抓住定义敌人的权力。这是比投票选人和那个所谓的纠错机制强大得多得民主。"
 FRA_the_liberity_of_mind: "自由的思想"
 FRA_the_liberity_of_mind_desc: "我们思想领域的自由也是应该得到重视的。束人的纲常，繁复的礼节，以及其他种种枷锁，皆应被扫进历史的垃圾堆里，让思想冲破牢笼。 "
 FRA_annul_the_nation: "废除国家"
 FRA_annul_the_nation_desc: "无论如何，国家都是横在每个人自由前的一道鸿沟，不跨越它，自由便会受到威胁。面对这个尚有一层面纱的恐怖暴力机器，我们要在它为害以前将其彻底击碎。"
 FRA_socialism_of_the_people: "继续前进，人民共和国"
 FRA_socialism_of_the_people_desc: "每个人都必须认识到，自己并非离政治十分遥远，并非无法参与这个国家的建设与运转。当群众对政治冷漠下来，干部就会无所顾忌，缺乏监督，思想日渐堕落。当群众的政治热情高涨，干部们便会警惕起来，不敢懈怠，在对困难的克服中提升自己的能力与思想。所以说，激发群众对于政治的热忱，是克服腐化的关键。"
 FRA_the_interest_of_politics: "政治热情"
 FRA_the_interest_of_politics_desc: "群众要运动起来，尤其是搞政治这方面，群众动起来了，人数多，热气也高，自然活力四射。"
 FRA_encourage_culture: "让人说话"
 FRA_encourage_culture_desc: "把人的嘴巴封起来算什么社会主义？我们的先进性和优越性从来不在于把眼睛捂住掩盖矛盾，而是在于大大方方地把问题提出来，经过讨论，一起把它解决掉。"
 FRA_collective_leadership: "集体领导"
 FRA_collective_leadership_desc: "军事，行政与监察，哪个人能做到每门都可以做得得心应手呢？所以这三门应该交给不同的人来负责，也可以避免独裁。"
 FRA_war_economy: "调整经济建设目标"
 FRA_war_economy_desc: "鉴于修复内战造成的经济萧条的计划已经圆满地完成了，我们可以重新开始增加我们的军事预算。"
 FRA_rural_industry: "鼓励公社工业"
 FRA_rural_industry_desc: "我们在广大乡村地区的各个公社也可以尝试着兴办工业，虽然这里造不出什么高精尖的科技，但是战时生活用品的生产倒是可以指望它们。"
 FRA_assemble_the_productivity: "集中产能"
 FRA_assemble_the_productivity_desc: "枫丹的工业城市分散在国家的各个角落。巴黎，里昂，马赛，布雷斯特，里尔，由多个工业集中的大城市，还有数不清的工业小城构成了枫丹完善的工业体系。尽管这样的分布的确有利于各地区的均衡发展，但战时还是提高产能最为重要，我们需要把产能集中在巴黎等数个最重要的大城市当中。"
 FRA_control_the_union: "扩大党委责任"
 FRA_control_the_union_desc: "党和工人中间为什么还要隔着一层工会呢？我们完全借助党委制来直接和一线工人接触交流。"
 FRA_union_must_be_independent: "工会必须独立"
 FRA_union_must_be_independent_desc: "很难说我们的党员会不会真正为工人的生活而鞠躬尽瘁，如果真的是还则罢了，可如果不是的话，那结果会是灾难性的。"
 FRA_last_manager_leadership: "坚持厂长责任制"
 FRA_last_manager_leadership_desc: "一厂之长，从几千位普通工人中脱颖而出，称其为人中豪杰是不为过的，我们完全可以相信他们组织工人的能力。"
 FRA_worker_management_desc: "厂长有过去劳作的经验不假，可不管是人，还是生产的具体情况，都是会不断地变化的。厂长一旦脱离一线生产，就很难坚持住本心，以及了解工人们面临的问题。所以，让真正在劳动的人管理他所在的工厂也许是个更好的主意。"
 FRA_worker_management: "工人治厂"
 charman_in_theory: "§Y名誉主席§!"
 minister: "国务院总理"
 dip_minister: "外交部部长"
 mil_minister: "军委主席"
 the_leader_group: "领导集体"
 charman_in_theory_name: "芙宁娜·德·枫丹"
 minister_name: "[GETpolministername]"
 mil_minister_name: "[GETmilministername]"
 dip_minister_name: "[GETdipministername]"
 communist_the_chairman_portrait_desc: "§Y芙宁娜·德·枫丹§!"
 communist_the_chairman_portrait_desc_2: "\n§Y名誉主席§!\n----------------\n§g芙宁娜会安心做一个无害的神像吗？多半是会的。在芙宁娜执掌共和国的最高权力，成为枫丹在国际上的象征的这几年，芙宁娜成长了许多。对于政治，从一无所知，磨练到了成熟老练的水平。但其内心，依然是一位心善而纯洁的女孩。阶级之间的斗争无疑是残酷的，这场你死我活的斗争，与芙宁娜和谐团结的愿望大相径庭。相比在与历史变革与私人理想之间挣扎，芙宁娜更愿意选择退出，做一个新生人民共和国的局外人，这倒是正中左翼的下怀。于是，人民给了芙宁娜一个对她来说相当合适的职位——名誉主席，就这样挂着一个虚名，成为枫丹国家团结的象征。§!"
 communist_the_mil_desc: "§Y莫里斯·甘莫林§!"
 communist_the_mil_desc_2: "\n§Y军委主席§!\n--------------\n作为§Y陆军部长§!时产生额外效果:\n稳定度:§G+5%§!\n陆军师经验增长:§G+10%§!\n§Y陆上要塞§!建造速度:§G+10%§!\n--------------\n§g在大多数时候，军队都不需要太热衷于政治，只要他们服从政府的命令，保持中立便是最好。因为陆军天然的保守性，加上掌握这个国家最为强大的武力，一旦军方变得极为不满，便会有危险的军事政变的风险。\n\n一位能够克制权力欲望，严守政治中立，而在军中又具有崇高威望的军委主席，已经是共和国最好的选择了。打过一次世界大战，在军队中深耕多年，又对政治漠不关心的甘莫林是最好的选择。§!"
 communist_minister_desc: "§Y夏洛蒂·阿黛尔§!"
 communist_minister_desc_2: "\n§Y国务院总理§!\n--------------\n£communist_corruption_of_the_party_texticon 每月§Y腐化度§!变化:[?monthly_corruption_change_value_by_communist_minister|-%%]\n--------------\n§g一位公务员的政治生涯大概在四五十岁开始，如果三十多岁已经担任了一个不大不小的公职了，绝对算是年少有为了。那么，二十几岁成为一国的总理，这件事情在历史上有没有先例呢？从加入枫丹(法国)共产党到成为共产党第一书记，再到枫丹人民共和国的总理，夏洛蒂·阿黛尔前后用时不到十年，在政治上，这已经不能用坐火箭来形容了，简直就是儒勒·凡尔纳的大炮。\n这样的升迁，一方面来源于夏洛蒂自己的才能，另一方面也是得益于枫丹时期社会在文化和政治上发生的剧烈变动。大罢工和人民共和国的成立自然不必多说，官员任免体系的剧烈变化也促成了政治家的年轻化，原本保守的文官体系也愈加地进步而富有活力了起来。现在，富有热情的夏洛蒂正在跃跃欲试地改造这个国家。§!"
 communist_dip_desc: "§Y克洛琳德·德拉克罗瓦§!"
 communist_dip_desc_2: "\n§Y外交部部长§!\n--------------\n作为§Y政治顾问§!时产生额外效果:\n生活消费品工厂系数:§Y-20%§!\n--------------\n§g冷峻寡言的克洛琳德会是外交的一把好手？的确听起来相当新奇。不过，也的确没人规定外交官就必须要是热情洋溢，或者温文尔雅的嘛。\n枫丹时期取得的诸多外交上的奇迹，比如说欧洲大陆上反法西斯联盟的建立，自然是有克洛琳德天才的辩论能力的一份功劳的，但也绝对无法脱离枫丹日益增强的实力。大罢工期间，克洛琳德曾感受到前所未有的压力，因为自己是与那维莱特相似的，非常典型的枫丹上层，不过，好在克洛琳德平时生活十分低调，从不张扬，从事的外交工作，也都算是围绕着反法西斯展开的，因而避开了左翼的清算，继续安稳地坐在外交部部长的宝座上。人民共和国成立以后，克洛琳德的工作重心就要转换到革命外交上了。§!"
