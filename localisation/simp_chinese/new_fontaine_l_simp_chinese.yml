 anarchy_desc: "§Y无政府状态§!\n-------------\n§L这片地区不在任何政府的掌控之下——或者说，任何强权暂时没有兴趣，也没有能力在这片土地上建立秩序。这里人迹罕至，仅有星星点点的村庄证明这里曾是智人征服世界的一小步。也许当地的村民还记得旧政府遗留下来的寥寥几条法条，但已经没有谁能够监督法律的执行了。但这并不意味着这里就绝对自由，村庄的宗族长老们依旧维系着依赖道德，辐射不广的自然秩序。§!"
