 fra_legion_of_honour: "近卫荣耀"
 fra_legion_of_honour_desc: "近卫军的战斗意志与作战能力在他们的时代冠绝全球，在1814毁于一旦，此后来自这片土地的军队再无多么亮眼的表现——他们的意志应该在帝政复辟以后得到传承"
