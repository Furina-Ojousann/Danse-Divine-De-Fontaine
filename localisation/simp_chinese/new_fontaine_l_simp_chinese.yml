 FRA_defend_our_liberity: "守护火种"
 FRA_defend_our_liberity_desc: "我们必须记住，公社战士们夺取政权的过程是一场不折不扣的战争。这场战争无比残酷，无数孩子的父亲因此而死去。所以，我们才要珍惜付诸了鲜血的自由，让我们的后代不再因为同样的原因而死去。"
 FRA_the_world_policy: "焚风凌冽"
 FRA_the_world_policy_desc: "革命的代价让我们珍惜革命的果实，但这份珍惜不能是固步自封的理由。自由地区，多么美妙的名字，不带有任何民族，地理和宗教的元素，人们只因意识形态而团结在一起，所以，我们的目的应该是将我们的意识形态传播给全人类。"
 FRA_anarchist_human_unity: "人类团结"
 FRA_anarchist_human_unity_desc: "我们可以说：我是枫丹人，你是德国人，他是中国人。这样的身份并非开始便被定义，因为人长到一定的程度，才能明白何谓国家，何谓民族。但有一件事情是肯定的：我们有一个完全共同的身份，我们是人类，是我们所居住的地球上，最具智慧，最有力量，唯一懂得团结的物种，唯有伟大足以形容他从荒野中创造文明的历史。我们所提倡的理念，平等和自由，足以化解人类内部大部分的矛盾，使其团结一心成为可能。"
 FRA_anarchist_Makhnovtsi: "黑旗飘扬"
 FRA_anarchist_Makhnovtsi_desc: "从国际角度上来看，我们的世界竟没有一个志同道合的同志，没有一个可以团结的国家。即使是相对先进的苏联，也因为意识形态的壁垒对我们有着深深的敌意。自由地区的安全受到了严重的考验。\n\n战争发展到了今天，我们不可能靠征召农民或是组织民兵来打赢一场涉及广泛的总体战，建立有严格规范的军队是必要的，尽管这也对我们自由的权利提出了挑战，但为了我们的存续，我们必须坚定地接受这个挑战。"
 FRA_anarchist_militia: "公社民兵"
 FRA_anarchist_militia_desc: "法庭，军队，警察，这些赖以暴力运转，无时无可在制造着不公的组织，在无政府社会里是必须消失的。但这不代表犯罪可以无所不及而不受惩罚。在依赖个人道德的同时，以公社为单位的民兵会保证社会最基础的治安。"
 fontaine_renormalization: "整合"
 FRA_anarchist_human_unity_tt: "在经济发达的地区解锁§Y整合§!占领法案:\n -顺从度达到§Y60%§!可以获得§Y核心§!\n -§Y所有欧洲地区§!可以使用该法案\n -§Y美国，加拿大，日本地区§!可以使用该法案\n -经济欠发达地区则可以通过§Y决议§!获得核心。"
 FRA_Human_Unity: "人类团结"
 FRA_anarchist_make_cores_raise_compliance: "教育[FROM.Getname]人民"
 FRA_anarchist_make_cores_raise_compliance_desc: "人类之间必然是存在个体认知上的差异的，因为这种差异，人有了先进与后进之分。我们的个人自由，人类团结的理想无疑是先进的，而世界上更多的人还被相对落后的国家，民族思想所束缚，我们必须改善他们的经济地位，教导他们先进的文化，两个角度来帮助被旧思想束缚的人民摆脱锁链。\n\n§W这些地区要达到§!§Y80%§!§W顺从度才能获得核心§!"
 fra_commune_militia: "公社之盾"
 fra_commune_militia_desc: "公社是个集经济，战争，教育与军事于一体的综合性社会组织，它构成了我们无政府社会的基本单元，而民兵是公社的武装力量。"
