 jap_emporor_hirohito: "昭和天皇"
 jap_emporor_hirohito_desc: "其名裕仁，日本国无缪之神，看来不过一介凡人尔尔。在军部崛起，日本逐步滑入战争之轨道时，天皇未能加以阻止，祂的软弱甚至在其中起到了关键的助推作用。疯狂以后，全部日本国民都要为其性格弱点而陷入地狱般的生活。\n\n天皇即位以来，大正民主消解，战争经济崩溃。于是在这个以神维系的国家，质疑天皇的声音第一次成气候，只是因为宗主的庇佑，天皇才免与绝灭之命运。在保守者的眼中，天皇依然有统御这个国家的权力。尽管沾有无法吸取的黑斑，这个符号依旧可以为统治民众所用。"
