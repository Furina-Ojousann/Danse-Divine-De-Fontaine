 FRA_suppress_the_parliament: "解散国民议会"
 FRA_suppress_the_parliament_desc: "人民阵线与激进党也许是芙宁娜的盟友，但其它的席位都被良心泯灭的资本家，食古不化的保皇派，和满口胡言乱语的法西斯疯子占据着，这届令人绝望的国民议会必须解散，不管他们什么时候重新归来，至少现在别让议会里充满荒谬的声音。"
 FRA_Fontaine_cabinet: "枫丹内阁"
 FRA_Fontaine_cabinet_desc: "赖伐尔，不靠谱；卡米耶·肖当，也不靠谱；达拉第，更不靠谱；法国政客总是视责任为无物，最难做到的就是承担责任，与其让内阁里塞满这群无能到极点的政客，不如改组一次内阁，让枫丹已被证明能力强悍的有识之士们执掌这个国家。"
 FRA_Societe_des_amis_de_laConstitution: "正式为雅各宾派平反"
 FRA_Societe_des_amis_de_laConstitution_desc: "在历史书上，雅各宾派成为了恐怖统治的代名词，在漫长的第三共和国时期，一直是作为反面的典型被批判；再把时间跨度拉得更长一点，从罗伯斯庇尔之死到今天，则是颇具争议的了，现在，枫丹会给这场争论盖棺定论。"
 FRA_appease_policy: "怀柔政策"
 FRA_appease_policy_desc: "枫丹无意走过于激进的道路，我们要做的是尝试利用有限的资源，通过精妙的制衡，达到各阶级都满意的效果。"
 FRA_Fontaine_Energy_Engineering_Science_Research_Institute: "枫丹动能工程科学研究院"
 FRA_Fontaine_Energy_Engineering_Science_Research_Institute_desc: "虽然名字强调动能工程，但事实上这座庞大的科学院被设计为从数学到应用物理无所不包的理工研究中心，即使耗资不可否认地巨大，但科学上的投资哪怕短期看不到任何收益，长期来看，收益绝对不止十倍。"
 FRA_law_of_justice: "律法所捍卫的"
 FRA_law_of_justice_desc: "审判是我们带去正义的核心，但审判首先要依据法律，而第三共和国遗留下来的法律却以严酷著称，不带丝毫情理之味，甚至会出现偷几块面包，就被判了五年的情况。这证实了不合理的法律让它彻底变成了毫无正义可言的暴力机器。枫丹所追求的正义绝不能依靠这种法律，审判庭将着手进行司法改革。"
 FRA_sexual_equality: "两性平权"
 FRA_sexual_equality_desc: "芙宁娜作为一个女性登上总理的位置，是共和国历史上前无古人的壮举，这为共和国的女性起到了相当的鼓舞作用；但这种进步尚未以法律的形式予以确认，现在，女性所拥有的一切平等权利将会写进共和国的宪章之中。"
 FRA_suppress_Arc: "不要贞德"
 FRA_suppress_Arc_desc: "贞德是毫无疑问的民族英雄，她所拥有的品德当然是美好的，却在现代成为了禁锢人性的枷锁，也成为了保守派的一面旗帜；我们没有必要撕碎她的画像，但淡化她的影响是必要的。"
 FRA_the_new_art_lane: "共和国的文艺新路线"
 FRA_the_new_art_lane_desc: "歌剧是不朽的史诗，古典乐是文化的瑰宝，它们都是高尚的艺术，却距离普通人太过遥远，尽管芙宁娜相当欣赏这些艺术，但还是认为艺术应该更加贴近普通人，对此她提出了三点原则：第一是充满转折的戏剧性，第二是贴合具体生活的现实性，第三是歌颂正义或批判黑暗的正面性，这会成为主导共和国文艺的三驾马车。"

