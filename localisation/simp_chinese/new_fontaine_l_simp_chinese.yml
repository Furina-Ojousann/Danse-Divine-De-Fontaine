 yorushika_ureichijou: "Yorushika - 仅有忧伤"
 FRA_anarchism_fight_unitl_total_success: "战斗，直至完全胜利"
 FRA_anarchism_fight_unitl_total_success_desc: "战争不会止步于此。我们打赢了欧洲大陆上最强大的国家，掌握了史无前例的革命资本，而公社也从未这么团结过。这是一鼓作气彻底消灭资本主义的好机会，我绝不能错失。"
 FRA_anarchist_time_to_end_the_war: "终战之时"
 FRA_anarchist_time_to_end_the_war_desc: "我们不但成功地保卫了公社，还把侵略者赶出了大陆，解放了半个欧洲。继续战争可能要付出巨大的代价，也许和海峡对岸的敌人停战是更好的选择。尽管真枪实弹的热战结束了，但在意识形态这条战线上，我们的战斗还没有结束。在资本主义日益衰弱腐朽的背景下，我们相信无政府主义必然能够赢得这场冷战。"
 anti_fontaine_alliance: "大洋协约"
 Fontaine_revolution.44.t: "大洋协约的成立"
 Fontaine_revolution.44.d: "枫丹近期政局的发展引起了周边国家对于国家安全的强烈忧虑。这种忧虑使得自德意法西斯主义抬头以来，欧洲形成的反法西斯共识逐渐地解体了。一个出于联合武装干涉枫丹的目的的跨意识形态的同盟就此形成。"
 Fontaine_revolution.44.a: "为了我们共同的安全。"
 Fontaine_revolution.44.b: "我们绝不惧怕武装干涉！"
 united_armed_intervention: "联合武装干涉"
 FRA_anarchism_fight_unitl_total_success_trigger: "武装干涉枫丹的同盟已经形成"
 FRA_anarchism_fight_unitl_total_success_tt: "§R这样做可能会迎来更大的挑战......§!"
 will_strengthen_the_yanan_10: "§Y中幅增强§!党内§R延安派§!的力量"
 will_strengthen_the_yanan_15: "§Y大幅增强§!党内§R延安派§!的力量"
 will_strengthen_the_soviet_10: "§Y中幅增强§!党内§R苏联派§!的力量"
 will_strengthen_the_union_15: "§Y大幅增强§!党内§R工会派§!的力量"
 FRA_the_revolution_of_the_third_war: "“三个世界”理论"
 FRA_the_revolution_of_the_third_war_desc: "我们需要一种全新的划分世界上各个国家类型的理论，来为我们支援世界上尚未脱离帝国主义殖民的国家创造理论依据。\n世界上的国家可以被分为三种，第一世界，第二世界和第三世界。第一世界是像美国，苏联一样，两种不同意识形态的大本营。第二世界则是已经完成工业化的资本主义，或者是刚刚步入社会主义的强国，枫丹，英国是典型的代表。第三世界是尚未完成工业化的，或多或少正在受殖民压迫的较为落后的国家。"
 FRA_global_action: "行动，支援，引导"
 FRA_global_action_desc: "如果把枫丹比作是第三世界革命的一座灯塔，那是不合适的。因为黑夜中的明灯固然能够给予人信念，却缺乏直接的支持。如果比作是大家长，也是不合适的。虽然家长可以无条件地为他的所有孩子提供支持，却少了地位上的平等。枫丹应该是太阳，只是给予，不想取得。"
 FRA_action_east_asia: "远东民族民主革命"
 FRA_action_east_asia_desc: "远东地区的两个传统大国——中国，日本和印度，都迫切需要完成民族民主革命的历史任务。现在，中国的革命力量蛰伏在了中国西北贫瘠的群山之中，而日本的公民正受到前所未有的思想专制。我们需要为他们革命的完成提供支持。"
 FRA_action_south_east_asia: "在万千群岛之中"
 FRA_action_south_east_asia_desc: "完成环球航行的麦哲伦永远的留在了菲律宾，而这个群岛却成为了西方殖民的前哨战。四百年时间过去，荷兰人，英国人和美国人在此建立了稳固的殖民地。但他们的民族意识正在重新觉醒，革命的意志在暗中不断地高涨着。现在，我们要为他们提供革命的资本。"
 FRA_action_middle_asia: "终结哈里发专制"
 FRA_action_middle_asia_desc: "我们要感谢穆斯林们。在长达百年的文艺复兴运动中，欧洲人从他们那里得到了先贤们数不尽的知识与哲理。但在穆斯林建立的王国却未能跟上欧洲现代化的步伐。现在，即使是中东地区独立的国家，也大多是君主专制的。我们需要解放数以万计被皇权压迫得麻木了的人民，给他们真正的独立，自由与人权。"
 FRA_action_africa: "在野性的大陆上"
 FRA_action_africa_desc: "世界上存在两个非洲，一个是被长期殖民，思想文化逐渐西化的非洲。另一个非洲，是荒漠中的游牧部落，是热带雨林中的零散村落，与现代的国际社会完全隔绝。此外，还有充当两者之间媒介的新兴工人阶级和自耕农。非洲的未来既不属于西化的黑人，也不属于原始部落，而是属于真正的先进阶级。"
 FRA_action_south_america: "玻利瓦尔"
 FRA_action_south_america_desc: "玻利瓦尔是西语美洲最富盛名的解放者，一个自由的美洲是他毕生的夙愿。可惜，如今他亲手为拉美人民带来的自由已被帝国主义一把夺走，换成了手中收割香蕉的镰刀与开采铜矿的铁镐，毫无休息的工作制度，与可以忽略不计的微薄工资，这不是他们的宿命。他们有了空谈的自由（有些国家甚至连表面功夫都不存在），可经济地位却牢牢地奴役着他们，拉美本不该是这样的。"
 FRA_baathism_research: "“复兴主义”研究"
 FRA_baathism_research_desc: "将阿拉伯民族主义与社会主义进行结合似乎是一个不错的办法。因为这样可以明确阿拉伯人的两个目标：推翻帝国主义和完成社会主义革命。"
 FRA_islam_socialism: "伊斯兰...社会主义？"
 FRA_islam_socialism_desc: "我们不得不承认，伊斯兰教是中东人民生活难以割舍的一部分。即使它唯心，它的教义中有不平等的因素，我们也不应该急于否定它，而是创造一种“伊斯兰社会主义”进行过渡。"
 FRA_anti_monarchy: "动摇君主制根基"
 FRA_anti_monarchy_desc: "虽然中东的大部分王国还没有进入到资本主义社会，但是根据马克思所提出的“卡夫丁峡谷”理论，他们也可以直接跳过资本主义社会，只要我们为他们创造建设社会主义社会的基础。但这些都是后话，推翻不了高高在上的王公贵族，我们一件事也做不成。"
 FRA_levant_union_scenario: "黎凡特联盟方案"
 FRA_levant_union_scenario_desc: "散落在世界各地的犹太人迫切的需要寻找一个落脚的地方，这种思想被称为“锡安主义”。现在，这种思想受到左翼排斥的原因是，犹太右翼往往宣称他们要建立一个民族国家，反对与原住民进行共治。但左翼的理念是可以被接受的，他们可以与已经解放了的阿拉伯人组建联合政府，和平地共同生活在黎凡特这片他们时代魂牵梦萦的土地上。"
 FRA_yanan_tour: "延安研学"
 FRA_yanan_tour_desc: "为了充分了解中国共产党近几年做出的政策和制定的缘由，我们要派遣党员在延安进行深刻的实地考察。决不能犯先前苏联的“王明错误”。"
 FRA_hexi_transportation_lane: "打通河西交通线"
 FRA_hexi_transportation_lane_desc: "现在的新疆算是在苏联的影响范围内，作为社会主义盟友，将武器输送到迪化城不是难事。但隔在新疆和陕北，控制交通要道河西走廊的甘肃马家军就令人头疼了，如果要提供直接的支持，我们必须驱逐这里的军阀势力。"
 FRA_interfere_japan: "击倒武士"
 FRA_interfere_japan_desc: "目前，帝国主义的日本政府将强加于国民思想上的专制与身体上的控制已经达到了极点，财阀和军阀对这个国家的掌控似乎稳如泰山，我们无法找到任何日本国内的突破口。也许只有一场战争才能彻底改变日本的权力结构和分配体制，正好，中国的抗日战争提供了这一良机。"
 FRA_new_freedom_and_people_rights_movement: "新的“自由民权运动”"
 FRA_new_freedom_and_people_rights_movement_desc: "发生于1874年的自由民权运动是日本历史上第一场群众性的政治运动，虽然这场运动遭到了以大久保利通为首的内治派的无情镇压，但它还是坚持进行了将近二十年。这表明日本人民实际上从未放弃对于民权的追求，但在昭和时期，随着几本治安法的出台，连这样的追求都成为了一种奢望。现在，随着专制的结束，新的民权运动应该卷土重来。"
 FRA_contract_viet_cong: "联络印度支那共产党"
 FRA_contract_viet_cong_desc: "我们正好有一个印度支那共产党的成员在枫丹，胡志明，他同时也是枫丹共产党的成员，能够很好地起到与印支共产党牵线搭桥的作用。"
 FRA_anti_japan_force: "南洋抗日武装"
 FRA_anti_japan_force_desc: "在日本占领区内，有不少因为不堪搜刮而揭竿而起的抗日武装，他们从被压迫中觉醒，手握枪杆，尽管有些流寇色彩，但加以指导，是可以成长为成熟的左翼武装的。这些既有革命思想，又有武器装备的力量会成为共产主义在东南亚攻城拔寨的主力军。"
 FRA_central_america_revolution: "中美洲的突破口"
 FRA_central_america_revolution_desc: "奥古斯托·桑地诺，刚刚逝去的尼加拉瓜革命者，因为理想而死去。他所带领的革命力量已被独裁者尽数歼灭，然而革命的种子却在尼加拉瓜人民心中根植。大多数的中美洲国家皆是如此，有一个革命者代表民意去推翻考迪罗，却因为帝国主义的下场干涉而失败。但现在，我们也要下场干涉这些看似与我们毫不相关的小国，在这里与帝国主义进行对决。"
 FRA_a_guerrilla_repulic: "雨林中的游击队共和国"
 FRA_a_guerrilla_repulic_desc: "南美洲有面积广大的热带雨林，这里人民生活困苦，远离考迪罗政权的统治中心，在亚马逊河的沿岸，又有一些零散的工业城市，是进行革命的理想地带。"
 FRA_finish_Caudillo_authority: "终结考迪罗统治"
 FRA_finish_Caudillo_authority_desc: "所谓考迪罗，就是利用军权暴力维护地主资产阶级政权的独裁者。在拉丁美洲，这样的独裁者往往由美国一手扶持，用以维护他们“香蕉共和国”的利益。独裁者们良心丧尽的暴行给予了我们征讨，推翻他们最原始的合法性。而拉美的人民，会完成自己的解放。"
 FRA_the_sun_rise: "日出时分"
 FRA_the_sun_rise_desc: "长期生活在帝国主义的压迫之下犹如漫漫长夜。现在，属于拉美人民的黎明即将到来。"
 FRA_african_industry: "深入内陆的现代化"
 FRA_african_industry_desc: "现代的城市，工业与制度似乎只分布在非洲沿岸的零散定居点。而真正广袤的非洲内陆，还在封建社会，奴隶制依然大行其道。即便我们能在沿海建成社会主义，巨大的差异也迟早会留下复辟的祸根。因此，我们必须尝试将文明从沿海深入大河的沿岸，再逐渐地深入内陆。"
 FRA_integrate_colony_government: "整合前殖民政府"
 FRA_integrate_colony_government_desc: "非洲的独立势在必行，我们必须为此准备。枫丹共和国还是在各大殖民地成功建立了一套还算像样的行政班子的，尽管掌控力有限，但纳入更多的本地官员也许可以缓解这个问题。设想中，我们可以将文化较为接近的西非和赤道非洲两个地域组建社会主义的联邦。"
 FRA_the_final_fight: "最后决战"
 FRA_the_final_fight_desc: "美国声称自己是自由世界的堡垒。实际上，它给世界人民带来的更多是苦难，应该叫做帝国主义的堡垒。如果不终结它，帝国主义即使能够被遏制，也绝不会消亡。两个意识形态之间的最终之战，不可避免。"
 FRA_action_cromwell: "克伦威尔行动"
 FRA_action_cromwell_desc: "英国已经不再是曾经的世界霸主，美国已然接替了它的地位，但它依然是一个帝国主义在欧洲的桥头堡，我们必须摧毁它，解放中部工业区数万忧于生计的劳动者。"
 FRA_from_the_people: "到群众中去"
 FRA_from_the_people_desc: "我们共产党人无论进行何项工作，有两个方法是必须采用的，一是一般和个别相结合，二是领导和群众相结合。在我党的一切实际工作中，凡属正确的领导，必须是从群众中来，到群众中去。这就是说，将群众的意见（分散的无系统的意见）集中起来（经过研究，化为集中的系统的意见），又到群众中去作宣传解释，化为群众的意见，使群众坚持下去，见之于行动，并在群众行动中考验这些意见是否正确。然后再从群众中集中起来，再到群众中坚持下去。如此无限循环，一次比一次地更正确、更生动、更丰富。这就是马克思主义的认识论。"
 FRA_multifunctional_commune: "扩充人民公社的作用"
 FRA_multifunctional_commune_desc: "我们的人民公社不应该只局限于若干农业合作社的联合，而是成为集劳动生产，疾病预防和知识学习于一体的乡村基本社会单元。虽然谁来执行的乡村教育于医疗，又如何保证他们的质量的问题依然悬而未决，但前期的准备工作已经可以开始。"
 FRA_unit_as_basic_cell: "以单位为基本单元"
 FRA_unit_as_basic_cell_desc: "我们在乡村的基本社会单元是人民公社，而在城市，这个基本单元是各种单位。不管是工厂也好，是行政机构也好，都要以绝对政治挂帅的态度，听党指挥，统一调度，发挥出团结的巨大力量。"
 FRA_study_in_the_field: "到乡野中去学习"
 FRA_study_in_the_field_desc: "不管是学生还是学者，一旦在课堂里呆得太久了，就很容易忘记他们所处社会的真实样貌是什么样的，也不了解它如何运作，觉得自己的供养理所应当，以为面包是从货架上长出来的。学术知识可以从课堂里获得，但是除此之外，社会是一个更为广阔的大学校，学生们在学习学术知识以外，也要到这所大学校里去学习，理解更为深刻的知识。"
 FRA_reform_the_course_arrangement: "工学教育模式"
 FRA_reform_the_course_arrangement_desc: "尽管我们可以保障国民所有的初等教育，但高等教育依然是个大问题。尽管我们很不愿意承认在我们的人民共和国中会有教育的分层，但不幸的是，因为高等教育资源的不足，大学教育还是不能向所有人普及。不过，我们可以让大学的录取模式更加公平一些，采用学分与工分相结合的模式来作为申请大学的标准。"
 FRA_we_fight_today_tomorrow_forever: "阶级今天斗争，明天斗争，永远斗争"
 FRA_we_fight_today_tomorrow_forever_desc: "无论是谁都不能永远保证自己的先进性，哪怕是革命还没有成功的时期，我们的部分党员就有了懈怠的现象，更不要提我们的党员现在已经从受剥削的阶级转变为了既得利益集团，腐化几乎是不可避免的。无论我们多么频繁地搞三反五反，都无法消灭它。当我们发现一桩腐败案的时候，往往意味着腐化的部分已经扩散。只有通过广泛的群众运动，才能在腐化刚刚萌生之时就加以切除，换成新鲜的，还没有被腐化的干部。"
 FRA_fix_the_error_of_one_state_socialism: "修正一国建成社会主义"
 FRA_fix_the_error_of_one_state_socialism_desc: "苏联提出一国建设社会主义理论的根据是，在当时，世界上只有苏俄一个国家完成了无产阶级革命，而传播革命的种种尝试都以失败告终。但现在，西欧已然出现了一个完成了工业化的大国，一国建成社会主义理论已经完成了它的使命，苏联和枫丹应该进行广泛的，各种层面上的全面合作。"
 FRA_total_communication: "全面交流"
 FRA_total_communication_desc: "社会主义同志之间应该亲密无间，不分彼此，枫丹的技术和知识可以为苏联所用，而苏联的资源和经验也可以为我们提供指导。"
 FRA_commune_stalinism: "经过实证，最为行之有效"
 FRA_commune_stalinism_desc: "斯大林提出的一系列主张让苏联迅速地从腐朽的沙俄蜕变为了世界前列的工业国，这样举世瞩目的成就让斯大林主义在枫丹的实践成为了可能。"
 FRA_ussr_science_education: "苏式教育体系"
 FRA_ussr_science_education_desc: "我们会授予我们的后代世界上唯一的普世真理——用以描述，改造这个世界的理学。无论如何，越快越好，强度越高越好，尽可能地实现我们科学的快速发展。"
 FRA_reform_from_labor: "“康复性”司法"
 FRA_reform_from_labor_desc: "我们必须重申，面对最为终极的邪恶，法律有权剥夺生命。但对于并非滔天的恶，我们则可以尝试通过劳动对犯人加以改造。毕竟，无产阶级的先进思想就来源于他们的劳动，我们可以同样用这种方式让后进分子跟上工人阶级的大部队。"
 FRA_strengthen_the_law_of_party: "严明党纪"
 FRA_strengthen_the_law_of_party_desc: "加入我们的党的条件必须苛刻。因为党是无产阶级的先锋队，只需要最为先进，最有见识，最为革命的分子带领众多相对后进的群众。但这样的集中形式也对党员本身提出了挑战，我们必须用严格的党纪加以约束。"
 FRA_fontaine_nkvd: "接过捷尔任斯基的遗产"
 FRA_fontaine_nkvd_desc: "一些令人意想不到的特殊行动需要最为精干的特工来执行。在特工这方面的训练和制度建设，捷尔任斯基的思路十分值得借鉴。"
 FRA_the_train_moves: "车轮滚滚"
 FRA_the_train_moves_desc: "我们可以把我们的人民共和国比作一辆火车。现在，它正满载着我们国家全体的人民，在红军与特工的保护下，稳步地驶向共产主义明天。记住，这辆火车的缔造者是人民，而设计者，是斯大林同志。"
