 retired_officer_france: "退役军官"
 FRA_yield_with_the_left_wing: "向左翼屈服"
 FRA_yield_with_the_left_wing_desc: "左翼现在的诉求已经不只是劳工权益上的进步了，群众的运动已然在左翼的组织下具备了鲜明的政治性，除非交出政权，否则他们不会止步。\n\n当然我们还有另一个选择...使用武力威胁他们乖乖回去上工...但芙宁娜不会允许任何人伤害人民......"
 FRA_try_make_left_wing_collision: "挑拨离间"
 FRA_try_make_left_wing_collision_desc: "工会和共产党的同盟似乎没有看上去那么牢靠.....相比于共产党，我们的官员显然更擅长和工会打交道，只要能让工会停止组织罢工，共产党就成了空喊口号的光杆司令。届时只要警察突击便可解决问题。"
 FRA_try_make_left_wing_collision_tt: "我们将尝试用§Y温和手段§!了结这场罢工"
 FRA_yield_with_the_left_wing_tt: "既然芙宁娜对§R左翼反乱§!未曾有过指责......默许的态度，也许表明了§R这就是她想要的？§!"
 fra_change_fiscal_policy: "调整财政政策"
 fra_change_fiscal_policy_desc: "看起来我们刚刚被刺激起来的需求又萎靡了下去，为了遏制进一步的通货紧缩，我们必须迅速采取行动。"
