 populist_socialism_tempoary: "临时民众政府" 
 Japan_close_desc: "点击四个徽标分段查看日本历史"
 Japan_History_Period: "[GetHistoryPeriodJapan]"
 Japan_Map_desc: "§Y1878-1890§!\n速度象征内阁-伊藤博文内阁\n-------------\n\n\n\n\n\n\n£portrait_jap_Symboli_Speed\n\n\n\n\n\n\n\n主词条:§Y速度象征§!"
 Japan_History_1878_1890: "§R武士之死§!\n-------------\n§W日本§!的政党政治诞生于一次血腥的恐惧。大久保利通的遇刺让继任的§r速度象征§!明白，农民与工人的怨恨可以杀死首相。她默许松方正义的紧缩，看到吊死鬼遍地的农村，又因恐惧而收编板垣退助与自由民权运动。可承诺的“七年后开设国会”无法打动赤贫者，他们转而以暴力索取当下。惨案接连不断，速度象征的政府轰然倒塌。\n\n取而代之的§W伊藤博文§!没有她的犹豫。他一手调动陆军镇压赤贫民权，一手授意板垣起草《大阪宣言》，宣告运动已胜利并应耐心等待国会开设。局势因此稳定，却也滋养了山县有朋的陆军势力。幸好，甲午战争中海军的胜利让伊藤得以推举§W西乡从道§!，宪政体制才在海军的庇护下延续。\n\n日本的议会政治自此开端，但它并不是人民的胜利，而是统治者的妥协。资产阶级民主在这里显得格外脆弱：从一开始，它就是恐惧与死亡的产物。"
 Japan_Sakura_desc: "§Y1890-1904§!\n西乡从道内阁\n-------------\n\n\n\n\n\n\n£portrait_jap_Saigo_judo\n\n\n\n\n\n\n\n主词条:§Y西乡从道§!"
 Japan_History_1890_1904: "§R科学社会主义§!\n-------------\n在伊藤博文的权谋与算计之后，§W西乡从道§!将日本带入了一个新的纪元。作为海军出身的首相，他主导了日俄战争，以§C东乡平八郎§!的对马海峡大捷奠定了海军的神圣地位。陆军的傲慢在战火中被粉碎，海军成为了宪政与国家的支柱。\n\n战争红利让日本经济空前繁荣，财阀与藩阀共享利益，工人和农民的怨言一时沉寂。西乡成为最负盛名的首相之一，在1905年体面退场，将权力交给“三冠王”§W鲁道夫象征§!。在那一刻，日本似乎终于完成了从藩阀政治到现代宪政的华丽转型。\n\n然而，胜利的背后是伤痕。1905年的俄国革命激励了日本工人阶级，他们开始以科学社会主义为工具，从破坏机器走向组织斗争。仅仅两年后，1907年关西爆发的工人武装起义，贫民出身的赛马娘§R玉藻十字§!领导成立§R日本社会民主党§!，短暂掌控了姬路、大阪与和歌山。虽然革命仅维持一个月便被鲁道夫政府镇压，但火种已然播下。\n\n§W日本§!在海军的荣耀下看似不可动摇，实则正走向一个新的危险：工人阶级不再沉默，他们开始要求比任何宪政承诺都更为直接的东西——革命。"
 Japan_Ojyu_desc: "§Y1905-1924§!\n鲁道夫象征内阁\n-------------\n\n\n\n\n\n\n£portrait_jap_Symboli_Rudolf\n\n\n\n\n\n\n\n主词条:§Y鲁道夫象征§!"
 Japan_History_1905_1924: "§Y黄金，黄金，黄金！§!\n-------------\n1907年的革命动摇了藩阀秩序，工人和农民第一次以武力挑战国家。镇压之后，首相§W鲁道夫象征§!意识到，单纯依赖军警无法避免再度的起义。她推动工时上限十小时，工资普涨两成，选举年龄下调至二十岁，并在地方引入自治选举。这些措施缓解了紧张局势，却触怒了财阀。压力之下，她辞去首相之职。\n\n由气槽组阁的保守内阁无力平息余波，关西仍有工人暴力抗争，关东也出现模仿者。两年后，政局再次陷入混乱。1911年，鲁道夫重返政坛，组建立宪政友会。她暗中默许日本社会党活动，并刻意扶持考茨基派，使其成为体制内的忠诚反对派。由此，日本宪政逐渐形成稳定的双党格局。\n\n第一次世界大战带来了前所未有的繁荣。工业扩张，财阀获利，军队赢得国际声望，日本由此跻身列强之列。鲁道夫政府连续执政十三年，成为近代史上最长的一届，被称为“日本的俾斯麦”。然而1923年的关东大地震摧毁了首都与信任，鲁道夫以“哀婉”之姿率领内阁总辞，黄金时代由此终结。"
 Japan_Man_desc: "§Y1925-1936§!\n山本权兵卫内阁\n-------------\n\n\n\n\n\n\n£portrait_jap_Yamamoto_Gonnohyoe\n\n\n\n\n\n\n\n主词条:§Y山本权兵卫§!"
 Japan_History_1924_Now: "§W下坠§!\n-------------\n1923年关东大地震后，首相§W山本权兵卫§!接替鲁道夫象征。他出身海军，行事稳健，在灾后的混乱中显得冷静而可靠。政府主导了大规模的关东重建，新的道路、工厂与住宅拔地而起。重建吸引了巨额投资，也催生了投机。房屋价格从竣工之日便被推至高位，居民的不满随之而生。\n\n在繁荣的表象下，经济过度依赖重建与国际资本流动。投机性的繁荣很快固化为泡沫。工人运动虽被抑制，但失业与不平等的阴影逐渐浮现。与鲁道夫的改革不同，山本内阁几乎没有社会让步，更多地倚赖市场与财阀的力量。\n\n1929年，华尔街股灾波及世界，日本的幻梦一夜破碎。工厂倒闭，失业暴增，重建的辉煌化为废墟。灾后十年的繁荣在资本逻辑的自毁中告终，政党政治再次站在崩溃的边缘。"
