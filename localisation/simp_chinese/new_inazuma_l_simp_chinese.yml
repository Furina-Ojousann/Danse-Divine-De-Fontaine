 ###民族精神##################################
 jap_Rot_und_Schwarz: "红与黑"
 jap_Rot_und_Schwarz_desc: "战后黄金年代终结以后，整个日本社会陷入普遍的政治激进化。劳工运动已经不再是卢德派式的破坏行动或松散自发的集会，而是逐渐走向组织化、武装化，并和社会主义、国家工团主义紧密结合。工厂、船坞、矿区里时常能听见关于“阶级斗争”的演讲，而街头的游行口号也在呼喊“帝国的利益属于工人”。这种火焰既能烧毁旧秩序，也可能吞噬日本本身。"
 jap_Three_Decades_of_Shimazu: "岛津家的三十年"
 jap_Three_Decades_of_Shimazu_desc: "自世纪之交西乡从道出任内阁总理大臣以来，海军在“陆海对立”中彻底占据上风。陆军虽仍掌握大量人力与边疆守备，但在战略规划、预算分配和政界影响上皆居于劣势。在海军的庇护下，宪政政治得以延续，日本免于陷入军部独裁。只要强大的舰队还存在，议会制度便不会轻易崩塌。"
 jap_Kazoku_and_Konzern: "藩与阀"
 jap_Kazoku_and_Konzern_desc: "赛马娘的竞技场被誉为“新贵族的舞台”。但人们心知肚明，自从德比大赛以来，几乎所有胜者身后都站着强大的财阀，或干脆就是财阀出身。藩阀政治与康采恩经济已经紧密交织，几大家族垄断了日本绝大多数政治与经济权力。个人的奔跑与荣耀，不过是权力分配的表象。"
 jap_South_Manchuria_Railway_Co: "“王道乐土”"
 jap_South_Manchuria_Railway_Co_desc: "日本在殖民地的统治已化作庞大的掠夺体系。溢出的稻米、橡胶、煤铁和人力源源不断地流向本土，支撑着帝国的繁荣。对外宣传称这是“共荣与文明”，可在殖民地人民眼中，这只是一种精致的剥削。帝国的现代化，正是建立在这片“王道乐土”的矛盾之上。"
 ############################################
 ###国策#####################################
 JAP_happy_new_year_prime_minister: "新年快乐，麦昆"
 JAP_happy_new_year_prime_minister_desc: "无论工作上的问题多么繁杂，至少新年总是要放松一下的，对吧？目白家一手操办的花火表演很快就会上演，也许绚烂绽放的烟花可以让首相暂时忘记去年有马纪念时发生的那些不愉快。"
