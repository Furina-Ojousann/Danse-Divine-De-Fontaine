 charlotte_desc: "§R延安派§!\n代表人物:§Y夏洛蒂·阿黛尔§!\n枫丹(法国)共产党曾前往苏联和延安进行广泛的实地考察，思考在枫丹应该如何建设社会主义，而延安派就是受§R中国共产党§!影响较深的党员,最主要的主张便是走群众路线。\n\n影响力:[GetStrengthYanan]([?fra_strength_yanan])"
 thorez_desc: "§R苏联派§!\n代表人物:§Y莫里斯·多列士§!\n当今世界，哪个国家最具有建设社会主义的经验，拥有最庞大，最干练的党员同志？无疑是§R苏联§!。遵从§R共产国际§!的指示，以§R斯大林同志§!的理论为指导的干部们，便是§R苏联派§!。\n\n影响力:[GetStrengthSoviet]([?fra_strength_soviet])"
 jouhaux_desc: "§R工会派§!\n代表人物:§Y莱勒·儒奥§!\n人只有在被组织起来以后，才能够具有强大的力量，与第一国际息息相关，具有悠久历史的§Y枫丹(法国)全国总工会§!是把工人们团结起来的最为强而有力的社会组织。拥护工会，但对党政心有疑虑的干部，就叫§R工会派§!。\n\n影响力:[GetStrengthUnion]([?fra_strength_union])"
