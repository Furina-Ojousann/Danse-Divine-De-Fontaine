 the_ending_of_furina: "[Getending]"
 the_democratic_ending_normal: "结局-§t进步时代§!"
 the_ending_text: "[Getendingtext]"
 the_democratic_ending_normal_text: "如果将现在的枫丹，与不久以前的1936年初的法兰西共和国作比较的话，无人不会惊叹——如此短的时间内，这个国家的变化会如此之大。这样宏观的变化体现在现实生活中，便是议员不再在议会中无休止地争吵，士兵不再用自己的闲暇时间用于经商，工人不再为明日的早餐而担忧。人们忘记了饥饿，那个曾经混乱的国度，随着时间的远去而被人淡忘，逐渐消失在时间的彼岸。\n\n放眼国际世界，独裁者的国度为枫丹之兵锋所击破，千万双受蒙蔽的眼睛得以看清自己所处的这个社会，尽管过程并非和平，但所有人相信为了抹去人类历史上的黑斑，这样的代价值得付出。\n在海外，各个殖民地的民族意识相继初露端倪，反抗之火愈加炽烈，枫丹敏锐地察觉到了这种变化，便决意顺应历史的潮流，以印度支那与阿尔及利亚的独立为标志，发起了民族自决的崭新潮流，毫无疑问，殖民的时代正在缓缓远去。\n\n也许历史会将改变这一切的功劳记在§3芙宁娜·德·枫丹§!的头上，写着在§3芙宁娜§!的治下，枫丹取得了如何如何的进展，但§3芙宁娜§!自己明白，若是缺少同僚的鼓励，以及广大人民群众的支持，她无法做成其中任何一件，对枫丹再伟大的期待与构想，也会化作无时醒来的南柯一梦。\n\n身为神明的§3芙宁娜§!，拥有远超常人的寿命，她或许可以作为枫丹这个国度永远的总统，陪伴她的人民走过一个又一个新世纪，也可以在某一感到无聊的时刻就此辞去公职，以一个快乐的女孩的身份走完自己漫长的一生，无论如何，这些都是后话了。"
 the_communism_ending_normal_text: "这些是作者的一些小随笔，大家看个乐就好啦（笑）\n我想，虽然可以游戏中一次又一次地将红旗插遍寰宇，说不出哪里不对，但总觉哪里不安。全人类的解放，现在可以被录制成视频发到B站上，取得百万播放，这算是一次成功吗？很难说，对我来说，当它成为一种潮牌，成为时尚，成为亚文化符号的时候。共产主义这个名词究竟是被资本主义收编了，还是理想真正得到了传播？可能真正的答案是他们两者的统一：因为这个过程，把共产主义当作是一种单纯的，似乎闪耀着光芒，成为人们精神慰藉的理想。而其中更为现实，也更为危险的方法论部分，却被有意地抹除了。从而从富有斗争性的纲领，变为一种无害，但美丽的装置品，用来给可以把一切商品化的商业化社会作一点革命和反叛的点缀。正如P社总是把红线做得最有吸引力，靠着它赚了大钱一样。\n\n我们正处于一个解构能力远远大于建构能力的时代。我们可以用AI，用网络语言，甚至是精神分析来解构当代一切的宏大事物。但解构以后被立下的不是富有活力的崭新事物，而是一片精神的废墟。叛逆的青年，挥着拳，却不知道到底是对着谁，因何而挥。更不知道即使自己有能力打倒一切，该以何种方式重建。\n该怎样重新建构起可行的方法论，描绘出未来现实的图景，是个全人类的难题。我不聪明，已经确定自己大概是没有想出来的能力，所以，只能静静期待着。\n\n如果你能看到这里，那么首先感谢你能听我发那么多牢骚，其次呢，再感谢你玩我的模组。不知道你知不知道一件小趣事。太宰治从未说过“生而为人，我很抱歉”，相反，他却写了这样的句子：\n\n  “我好爱这世界！”我热泪盈眶地想。注视着天空，天空慢慢改变，渐渐变成了青色。我不停地叹息，好想褪去自己的衣裳。就在这时候，树叶、草变得透明，已看不见它们的美丽，我轻轻触摸草地。好想美丽地活下去。 ——太宰治 《女生徒》"
 the_neutrality_ending_normal_text: "“说起来，明明你出生起就活在地球浓密的大气中，可它千帕的重压却仿佛近来才压到你的胸口。”(改编自马克思的原话)\n\n我尝试描写一个“现代化的专制国家”是怎样的样貌。诚然，这条路线相比而言还很简陋，我尝试引入TNO式的文本，让我们了解不再以暴政，独裁面貌出现的专制社会下的群像。可惜事件密度依然不足，在未来，我会尝试进一步完善这个故事。"
 the_logo_loc: "§R人§!与§3神明§!的共舞\n-------------\n§Y蓝线重置正在进行中，通过debug解锁的决议组，可以启用新内容的部分预览。§!\n\n§L“他说保守党政府获得了自由党人的支持，正在修改历书使每任总统可以在任一百年。他说政府终于与教廷达成协定，还有一位红衣主教从罗马被派来，头戴钻石冠冕，端坐在实心的黄金宝座上，而自由党的部长们都跪下来亲吻他的戒指并摄影存照。”§!"
