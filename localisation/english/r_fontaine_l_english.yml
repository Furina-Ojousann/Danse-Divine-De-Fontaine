 FRA_renew_neuvillette_plan: "Neuvillette Plan"
 FRA_renew_neuvillette_plan_desc: "We have made concessions, but this does not imply we are aligned with communists. Provided private property remains inviolable, we welcome any form of social insurance, welfare provision, or labour law reform, as these fundamentally stimulate human responsiveness. The Neuvillette Plan champions entrepreneurship-not as a panacea for governance—but recognises that the pursuit of private wealth, secured by the protection of private property, expands aggregate production. It is from this that the economic growth we require is derived."
 FRA_renew_navia_plan: "Navia Plan"
 FRA_renew_navia_plan_desc: "Navia believed that cooperating cautiously with the Communists could prove advantageous—Keynesian economics identified consumption as the root cause of economic stagnation, with insufficient spending attributable to structural flaws in distribution. The Communists could play a rather constructive role in adjusting this distribution framework, though naturally we ought to ensure they do not run amok."
