 FRA_renew_furina_in_Palais_de_l_Elysee: "Furina at the Élysée Palace"
 FRA_renew_furina_in_Palais_de_l_Elysee_desc: "There is no need for lengthy explanations; the first step is to acknowledge an established fact—Furina has won the unanimous affection of the entire nation. Since the birth of the Third Republic, there has never been a charismatic leader capable of uniting the masses. Perhaps Furina de Fontaine, as the Republic's new President, can bridge the internal divisions."
 FRA_renew_strengthen_the_president_power: "Republic of Fontaine\nConstitutional Amendment of 1936"
 FRA_renew_strengthen_the_president_power_desc: "Among Furina's most important advisors, Neuvillette believed the current constitution must be amended: Furina's authority did not stem from the intricate legislative bodies, but rather from her charisma—the very foundation of what was termed popular will. Thus, the existing parliamentary system appeared anachronistic, and a presidential system, as an institution capable of effectively consolidating power, was formally proposed."
 FRA_renew_the_parliament_issue: "Reliable ally?"
 FRA_renew_the_parliament_issue_desc: "Even among Furina's own faction—the Old Fontaisians—unity proved elusive. Almost immediately, their differing political views saw them swiftly absorbed by the Left and Right wings, leaving the neutral forces relatively weak. To achieve anything meaningful within this chaotic republic, one would require a reliable ally—the Communists? The Workers' International? Or perhaps the Integrationists? Whichever it might be, a coalition government remained the only viable option."
 FRA_renew_labour_law_reform: "Palais Mermonia Agreement"
 FRA_renew_labour_law_reform_desc: "The growth of the left is cause for concern. Even if they remain cooperative with us at present, it would be unwise to stand idly by while trade unions, the Communist Party, and the Comintern expand their influence. Labour law reform presents a promising avenue for preventing further radicalisation on the left."
 FRA_renew_tripartite_consultation_of_blum_clorinde_viollette: "Tripartite Agreement on Citizenship Rights"
 FRA_renew_tripartite_consultation_of_blum_clorinde_viollette_desc: "The issue of labour shortages has long hampered the Republic's economic development. Evidently, recruiting colonial workers and offering citizenship in exchange would constitute a viable solution. Léon Blum collaborated with the Governor-General of Algeria, Maurice Violette, to draft a proposal granting Algerian Muslims citizenship, which received Clorinde's support. This may alleviate the labour shortage to some extent."
 FRA_renew_the_6th_1934_Feb: "Re-enactment of 1934"
 FRA_renew_the_6th_1934_Feb_desc: "Barely three years had passed since the scars of the 6 February 1934 riots had begun to heal when the Republic sustained fresh wounds: large-scale political violence erupted once more upon the streets. They assaulted parliamentarians, attempted to seize the Palais Matignon, and unfurled banners proclaiming ‘Blum is a Jewish pig’, Clorinde is a Communist puppet’, and ‘The tentacles of the Comintern have ensnared the Republic’. On the 7th alone, as many as twelve individuals lost their lives on the streets. Ultimately, the gendarmerie apprehended over two hundred participants from Action Royale, the Croix-de-Feu, and a handful of far-left terrorists, all of whom required urgent trial."
 FRA_renew_judge_trial_of_200: "Forty-Seventh Regiment Trial"
 FRA_renew_judge_trial_of_200_desc: "Despite the military police arresting over two hundred individuals during the riots, investigations revealed that the majority bore no clear culpability and were released after brief questioning. However, forty-seven of these two hundred had indeed committed crimes including murder and robbery, facing charges from the Supreme Prosecutor's Office. Most held explicit political affiliations, being members of the Croix-de-Feu or core members of paramilitary organisations, lending the trial a pronounced political character."
 FRA_the_unforgettable_1871: "The Unforgettable 1871"
 FRA_the_unforgettable_1871_desc: "Just as republicans regard the French Revolution as the founding year of their homeland's republic, socialists can never forget 1871—the first experiment in establishing their ideals as a government. It was there, within the town hall, that they composed the Internationale. Today, they return to the town hall singing the same song."
 FRA_renew_order_prevails_in_Paris: "Order Prevails in Paris"
 FRA_renew_order_prevails_in_Paris_desc: "Paris has grown quiet. No right-wingers perpetrate atrocities at Place de la Concorde; no mourners gather before the Commune Wall; a few clouds drift across the sky, serene. In short, everything has finally slowed down..."
