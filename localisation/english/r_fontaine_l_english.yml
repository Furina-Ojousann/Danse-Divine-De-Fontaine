 r_fontaine_bill_european_alliance: "European Defence Bill\nAny man's death diminishes me, because I am involved in mankind.And therefore, never send to know for whom the bell tolls; it tolls for thee.\n———John Donne"
 r_fontaine_bill_immigration_reform: "Immigration Bill\nNo man is an island,entire of itself;every man is a piece of the continent,a part of the main;if a clod be washed away by the sea,Europe is the less,as well as if a promontory were,as well as any manor of thy friend's or of thine own were;\n———John Donne"
 r_fontaine_bill_labour_reform: "Amendments to the Labour Law\nWhen the police arrived to arrest Alan, who had previously escaped, the pair were forced to flee once more. She despaired that their struggle was futile, but the tramp told her that come the bright dawn, they would walk along the road towards a future full of shifting fortunes yet brimming with hope."
 r_fontaine_bill_president_system: "§YConstitutional Amendment§!\n§gHe stated that the Conservative government, having secured the support of the Liberals, was amending the calendar to permit each president to serve for a hundred years. He added that the government had finally reached an agreement with the Holy See, and that a cardinal had been dispatched from Rome, whereupon the Liberal ministers knelt to kiss his ring, the act being photographed for posterity.§!"
 R_bill_support_situation: "§3CF§!support:§G[?r_fontaine_bill_support_seats_CF]§!/§Y[?R_Fontaine_Liberalist_seats]§!   §BAD§!support:§G[?r_fontaine_bill_support_seats_AD]§!/§Y[?R_Fontaine_Toryism_seats]§!   §BFR§!support:§G[?r_fontaine_bill_support_seats_FR]§!/§Y[?R_Fontaine_Agrarianist_seats]§!\n   §RPTF§!support:§G[?r_fontaine_bill_support_seats_PTF]§!/§Y[?R_Fontaine_Communist_seats]§!   §RPF§!support:§G[?r_fontaine_bill_support_seats_PF]§!/§Y[?R_Fontaine_Socialist_seats]§!   §gIndenpendent§!support:§G[?r_fontaine_bill_support_seats_independent]§!/§Y[?R_Fontaine_Neutralist_seats]§!"
 r_parliament_bill_4_title: "§YEuropean Defence Bill§!"
 r_parliament_bill_3_title: "§Y[GetYear] Immigration Bill§!"
 r_parliament_bill_2_title: "§YThe Labour Act (Amendment) Act 1936§!"
 r_parliament_bill_1_title: "§YThe 1875 Amendment to the Constitution of the Republic§!"
 r_parliament_bill_1_detial: "§LHe stated that the Conservative government, having secured the support of the Liberals, was amending the calendar to permit each president to serve for a hundred years. He declared that the government had finally reached an agreement with the Holy See, and that a cardinal had been dispatched from Rome, whereupon the Liberal ministers knelt to kiss his ring, the act being photographed for posterity.\n\nThrough the fusion of a leader's formidable personal charisma with the presidential system, a ‘perfect dictatorship’ within the constitutional framework could be achieved. Never before in the Third Republic's history had such an opportunity presented itself. Since Thiers established this republic teeming with royalists, every president had been nothing more than a political ornament to whom the people paid scant attention. Now, the Republic was ablaze with a rare cult of personality. Furina's extraordinary personal qualities were perfectly suited to commanding the nation's loyalty and obedience – precisely what Naviret had longed for.§!"
 r_parliament_bill_2_detial: "§LWhen the police arrived to arrest Alan, who had previously escaped, the pair were forced to flee once more. She despaired that their struggle was futile, but the vagrant told her that come the bright dawn, they would walk along the road towards a future full of shifting fortunes yet brimming with hope.\n\nIn our era, the portrait of the ordinary labourer in society is dramatically portrayed in this year's new film, Modern Times. Undoubtedly, they live in poverty. The repetitive drudgery of the assembly line corrodes their very souls, while mechanical motions wear down their bodies, rendering them stiff and immobile. Poverty is no virtue; poverty erodes their virtues. They either resort to crime or unite in collective struggle. We have a remedy for such despair—a little charity, a little sympathy—as stipulated in our labour law amendments: a 40-hour working week, a 20% wage increase, and more frequent public holidays.§!"
 r_parliament_bill_3_detial: "§LNo man is an island, entire of itself; every man is a piece of the continent, a part of the main; if a clod be washed away by the sea, Europe is the less, as well as if a promontory were, as well as if a manor of thy friend's or of thine own were; any man's death diminishes me, because I am involved in mankind, and because I am a piece of the whole.\n\nAs economic reforms progressed, demand recovered and capital began circulating once more, yet this exposed the problem of a labour shortage. The population had yet to recover from the scars of the great war, and even the most robust economic recovery required a vast workforce to provide labour and sustain consumption. It was impossible to generate a new generation of citizens with spending power within a few years; perhaps immigration could become another pillar supporting economic growth.§!"
 r_parliament_bill_4_detial: "§LWhose death it may be, a part of me dies, for I am contained within the concept of humanity. Therefore, ask not for whom the bell tolls; it tolls for thee.\n\nThe Great War, Christmas, Versailles; Poincaré, the Ruhr Crisis, the March on Rome, inflation, the Nazi Party; the Italian-Ethiopian War, the Rhineland, Chiang Kai-shek and Benes. The surviving generation of the Great War—their experiences could be woven into a song. It is the dirge of Europe's national and liberal century, mourning the end of Europe's golden age. The Great War taught mankind no peace. While the victors dreaded the next conflict, the vanquished plunged into frenzied clamour for its arrival. It is time to learn the lesson: to end the impending war within manageable bounds before events spiral beyond control.§!"
