 fontaine_liberalist_party: "CF"
 fontaine_liberalist_party_long: "Coalition De Fontaine\n§W--------------§!\n\n\n\n£textillustration_CF_desc\n\n\n\n\n§LA nation with the most ancient democratic traditions has today produced a new president through the most fervent personality cult. The fusion of personality cult and populism gave rise to Caesar in ancient Rome, and in modern times to Adolf Hitler and Benito Mussolini. Even if Furina herself is not a dictator, the adoration and worship she commands from the populace have elevated her power beyond that of any autocratic leader—even if she herself remains unaware of it.\n\nThis concept is termed “Caesarism”, which has been subject to criticism for centuries. G.K. Chesterton delivered its most resounding condemnation in his work Heretics, denouncing it as “the worst form of slavery”. This is no exaggeration, for under such a system rulers and ruled are bound by mutual illusion: the former believe they command absolute devotion, the latter imagine they participate in a divine will. Democracy thus takes emotion as its foundation, appealing to passion.\n\nThe Coalition De Fontaine emerged precisely within this context. Claiming to uphold republican ideals, it in truth cloaked leader worship in republican garb; holding a parliamentary majority, it nevertheless depended spiritually upon the charisma of one individual. Some termed this ‘politics in the name of virtue,’ while others called it ‘ceremonial dictatorship.’ The tragedy of the Coalition De Fontaine did not stem from malice. Furina's supporters sincerely believed she embodied goodness, reason, and all forces capable of averting chaos. They entrusted the nation's fate to one individual's judgement, thereby deriving a sense of security. It was precisely this security that allowed power to concentrate inadvertently and institutions to be quietly rewritten. Furina herself did not command submission; the populace voluntarily yielded to her image.§!\n§W-------------§!\n"
