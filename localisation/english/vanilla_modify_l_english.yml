 SIA_Thailand_democratic: "泰王国"
 SIA_Thailand_democratic_DEF: "泰王国"
 SIA_Thailand_democratic_ADJ: "泰国"
 SIA_asian_s_ambition: "全亚典范"
 SIA_asian_s_ambition_desc: "日本绝对称得上全亚洲对抗西方殖民主义的典范，无论是现代化的历程还是正在宣传的泛亚思想都值得学习。我们的国家被帝国主义三面包围，加上海洋，完全包围，日本在未来毫无疑问会是抵抗帝国主义侵略的强力盟友。"
 potential_allies: "潜在盟友"
 SIA_develop_always_matters: "发展，发展与发展的永恒方针"
 SIA_develop_always_matters_desc: "泰国并不需要任何明确的意识形态来塑造这个国家，它真正需要的是只为发展而服务的实用。如果法团主义能够发展生产力，我们就采纳；如果民族主义有利于团结国家，我们就宣扬。"
 SIA_no_more_socialism: "根除社会主义"
 SIA_no_more_socialism_desc: "任何的社会主义都只会把我们亲爱的祖国带向毁灭，像随着工业化兴起的工会，便是社会主义的苗头——抱歉，暹罗没有社会主义的空间，工会必须被取缔。"
 SIA_let_corporatism: "让法人来协商"
 SIA_let_corporatism_desc: "政府会倾听人民的声音，矛盾应该通过沟通与协商解决，而反叛的结果只能是被镇压。"
 SIA_manage_royal_capital: "皇室资产乃国有"
 SIA_manage_royal_capital_desc: "皇室为暹罗的现代化做出了突出的贡献，我们可以容忍他们在我们的国家中享受一定的特权。然而数百年积攒的皇室财富的确是一笔可观的财富，我们可以通过成立“皇家资产管理局”，以打理皇室资产的名义把这笔资产用于发展国家。"
 SIA_manage_royal_capital_tt: "我们可以动用这笔财富来投资我们的国家"
 synthetic_refinery_energy_consumption_tt: "每个§Y炼油厂§!将会消耗§R3§!单位£missing_resources_strip|7 煤炭"
 Sahara_HighWay: "撒哈拉公路"
 Self_sufficient_oasis: "Self-sufficient Oasis"
 cze_skoda_industry_resetted: "Heart of Industry"
 cze_skoda_industry_resetted_desc: "The Austro-Hungarian Empire was a multi-ethnic empire of vast territory, yet its industrial distribution was profoundly uneven. By the end of the Great War, Austro-Hungarian industry was almost equivalent to that of Bohemia alone. This fertile land produced over 80% of the empire's industrial output and gave birth to the industrial giant Škoda. To this day, the Republic continues to reap substantial benefits from this rich industrial legacy."
 cze_defense_of_democratic: "Eastern Democracy"
 cze_defense_of_democratic_desc: "The fragments of the Austro-Hungarian Empire, such as the former sovereign state of Austria, now find themselves under quasi-fascist rule; Hungary, with its throne vacant, is governed by an admiral acting as sole regent; only Czechoslovakia has shaken off the lingering poison of the old regime and entered the realm of democratic politics. Though its democratic history is not long, it has proved remarkably efficient. Citizens actively exercise their voting rights, and while the five-party coalition spanning the political spectrum has its differences, these fall far short of conflict."
 CZE_edvard_benesh_rename: "Edvard Benesh"