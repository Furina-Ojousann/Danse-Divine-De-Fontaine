 USA_three_R_new_deal_tt: "§Y救济、复兴、改革§!。\n在危急的时刻，口号简约而振奋人心，远胜于长篇大论"
 USA_three_R_new_deal_desc: "罗斯福提出了可用三个R概括之的救市方针：救济，复兴，改革。"
