 USA_union_faithful_to_democratics: "民主党工会"
 USA_union_faithful_to_democratics_desc: "罗斯福关于社会保障的立法赢取了大量工会的支持，现在，他们成了民主党的坚定支持者。在未来，这种优势可以被作为票仓继续延续。"
 USA_the_1929_depression: "大萧条"
 USA_the_1929_depression_tt: "$USA$当前的§Y萧条度§!为:[?usa_the_depression_progress|%-]\n - 当§Y萧条度§!达到§Y0%§!，该修正将会被移除\n\n"
 USA_the_1929_depression_desc: "历经战后整个二十年代的疯狂，美利坚合众国在萧条中走进了磨难的三十年代。在此之前，幻想资本主义繁荣存在于在广泛的劳动人民中，美国劳联的领导上毫不犹豫地和所有这些资本家的“高速化”或“合理化”的计划相配合、相适应。柯立芝的不作为把政治上的保守发挥到了极致，让美国经济进入到狂热的状态。房地产，汽车制造，股票交易，整个二十年代迷人的意项，在三十年代成为了废墟以及废纸。在繁荣的末尾，即使有人忧心忡忡，绝大多数的美国人并不愿在狂欢中醒来。而现在，市场经济的铁律打醒了迷梦中的美国人——资本主义生来不为人类幸福而服务。"
 usa_the_depression_progress: "萧条进度"
 USA_works_progress_administration_during_depression: "WPA"
 USA_works_progress_administration_during_depression_tt: "$USA$的$usa_the_depression_progress$每月变化:[?wpa_depression_progress_decrease_monthly|=%-]"
 USA_works_progress_administration_during_depression_desc: "公共事业振兴署(Works Progress Administration, WPA)雇佣数百万多数没有受过正规教育的求职者来执行公共工程项目，包括公共建筑和道路的建设。"
 USA_agricultural_adjustment_act_tt: "§Y$USA_works_progress_administration_during_depression$§!追加效果:\n$USA$的$usa_the_depression_progress$每月变化:§G-0.5%§!\n$MODIFIER_CONSUMER_GOODS_FACTOR$:§Y-10%§!\n$MODIFIER_GLOBAL_BUILDING_SLOTS_FACTOR$:§G+15%§!"
