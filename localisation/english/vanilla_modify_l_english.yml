 USA_Dust_Bowl: "黑色风暴"
 USA_Dust_Bowl_tt: "1930年代的干旱期，由于缺乏自然植被固定土壤，干旱使其转变为沙尘，向东和向南的大风卷起沙尘，形成巨大的深色云雾。情况严重时，云雾所到之处遮天蔽日，能抵达美国东海岸，例如纽约和华盛顿特区等地。多数沙尘抵达大西洋后才逐渐沉降、固定下来。这些巨大的沙尘暴被称为“Black Blizzards（黑色风暴）”。旷日持久的风暴不但危害国民的健康，并且对粮食安全构成了严重的威胁：在沙城暴最严重的三天，根据联邦政府的调查，接近一千万亩农田被摧毁，表面有至少5英寸厚的肥沃表层土壤被强风刮走，总计差不多有3.5亿吨，而同年冬小麦减产510多万吨。"
