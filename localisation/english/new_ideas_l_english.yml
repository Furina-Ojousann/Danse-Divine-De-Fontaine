 military_politics_dualization_1_desc: "Since the Meiji Restoration, Japan has experienced many worrying polarization, the most typical of which is the sea land conflict, but this level of opposition is still only within the military. What is even more malignant is the dualization between the military and the government, which has continued in all aspects of society and caused considerable damage. Fortunately, such conflicts can still be contained at present."
