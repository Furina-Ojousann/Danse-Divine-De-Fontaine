 fra_whole_nation_strike: "National general strike"
 fra_whole_nation_strike_desc: "Advanced productivity or the million workers who are about to be laid off? It is indeed a question worth pondering. But one truth is certain, that is, if a person loses their economic source and lacks social assistance, the only feasible way is to rise up and resist. For workers who are still on the job, this method is a strike. Now, unemployed people are also on strike, and it is unknown when they will take further action."

