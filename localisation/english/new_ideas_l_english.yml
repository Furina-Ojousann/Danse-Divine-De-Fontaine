 fra_the_last_strike: "The final blow"
 fra_continue_philosophy_education: "Ongoing philosophical education"
 fra_continue_philosophy_education_desc: "In the past education system, philosophy was often the most overlooked because it was not a skill for making a living. Ordinary people needed to work hard for their lives and had no leisure to study philosophy. So who did not need to worry about economic issues, also more leisure aristocrats monopolized philosophy, and their achievements had two aspects. The first was the theoretical cornerstone that catered to the development of the times, represented by Enlightenment thinkers, and the other was the philosophy led by Eastern philosophy, which taught the lower classes not to resist. \The former is certainly worthy of recognition in history, but after the stability of the capitalist system, the proportion of the latter becomes increasingly larger, which is really frightening. Now, the vast masses of the people want to take philosophy away from the hands of the bourgeoisie as a weapon to counter this trend."

