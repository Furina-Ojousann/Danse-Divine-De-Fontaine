 military_politics_dualization_2_desc: "Since the Meiji Restoration, Japan has experienced many worrying polarization, the most typical of which is the sea land conflict, but this level of opposition is still only within the military. What is even more malignant is the dualization between the military and the government, which has continued in all aspects of society and caused considerable damage. Now, civil servants in the government, who are more rational in foreign policy, have gained greater say in the government."
 military_politics_dualization_3: "Military political duality - military advantage"
 military_politics_dualization_3_desc: "Since the Meiji Restoration, Japan has experienced many worrying polarization, the most typical of which is the sea land conflict, but this level of opposition is still only within the military. What is even more malignant is the dualization between the military and the government, which has continued in all aspects of society and caused considerable damage. This conflict has escalated to the point where the military has complete control over the entire government, and civilian officials are merely puppets of the military, all serving the war effort."
