 fra_short_of_consum: "Shortage"
 fra_short_of_consum_desc: "The influx of a large number of people after the uprising severely overloaded the land in the northern region. Although the plains in the north were originally one of the main agricultural production areas in Fontaine, their production was temporarily unable to supply such a large population."
 fra_supply_issue: "Supply Crisis"
