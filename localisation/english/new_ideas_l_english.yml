 sia_political_moderization: "Political Moderization"
 sia_political_moderization: "Incomplete Constitutional Revolution"
 sia_political_moderization_desc: "24 June 1932 marked a day of profound significance for Thailand. On that day, the 150-year Rattanakosin era and 800 years of absolute monarchy came to an end. This revolution was initiated by a relatively small contingent of military personnel and civilians, subsequently leading to the establishment of Thailand's first mass-based political party, the Thai People's Party. Although Thailand thus entered an era of constitutional monarchy, democracy did not permeate the entirety of Siam. The vast majority of rural areas remained largely unaffected by national legislation and party politics."
 sia_economic_moderization: "Rapid Modernisation"
 sia_economic_moderization_desc: "Thailand witnessed several diligent monarchs in its modern era who recognised that the nation's feudal agrarian society remained ill-suited to global connectivity and industrialisation. Through proactive reforms and diplomacy, they shielded Thailand from direct Western colonial rule. Nevertheless, Western imperialism continued to pose a significant threat to Thai independence, while feudal land tenure persisted in rural areas. By 1936, the Constitutional Revolution had been in effect for over four years. Although Thailand's first constitutional prime minister was overthrown by the military within a year, leaving the nation under de facto military rule, the march towards modernisation continued uninterrupted. Instability caused by dispossessed peasants was ruthlessly suppressed by strong-willed leaders, allowing emerging capital to flourish rapidly and unhindered."
 sia_constitution_defense: "Constitution Defense"
 sia_rural_backward_5: "Rural fragmentation"
 sia_rural_backward_5_desc: "By the 1930s, Bangkok, the nation's capital, had evolved into a substantial modern city, equipped with contemporary electricity and water supply systems, with the vast majority of its citizens engaged in commerce and industry. Yet in remote rural areas, the farming communities' way of life and production methods remained unchanged from the previous century, indeed from antiquity. They reaped no benefits from modernisation, yet bore an increasingly heavy burden: illiterate, unfamiliar with advanced farming techniques, and lacking any sense of national identity."
