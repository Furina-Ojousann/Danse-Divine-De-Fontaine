 FRA_Furina_de_Fontaine: "Furina de Fontaine"
 FRA_Furina_de_Fontaine_desc: "In the vast majority of the world's religious cultures, the image of deities is invariably one of solemnity, benevolence, and omniscience. Consequently, it is difficult for people to associate the frivolous, popular stars of the theatre with divine beings. Yet Furina de Fontaine achieved precisely this synthesis. Let us compare Furina with the traditional divine archetype point by point. Is Furina solemn? Not in most instances; she is often perceived as impassioned and whimsically spirited. Compassionate? That is certainly true. We might say innocence is the purest form of goodness, for it has never been corrupted by worldly concerns. Furina's preservation of this childlike quality far surpasses that of her peers (in apparent age), for who could believe a girl who plays with small animals could be cruel or wicked? Finally, consider omniscience and omnipotence. Well... perhaps. In these capacities, Furina remains profoundly enigmatic, her abilities scarcely known to the world. \n\nCould such an entity—a fusion of mighty deity, popular entertainer, and endearing young woman—transform Fontaine into an era of great governance? Note this: the goal isn't for her to achieve alone. Its foundation rests upon the united people of Fontaine. After all, who wouldn't adore Furina?"
