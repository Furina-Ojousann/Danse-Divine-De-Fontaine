 furina_empire_desc: "The perfect sovereign requires not only Machiavelli's teachings on governance, but also flawless virtue. Thus, Fenina can no longer be Fenina, but must become Fucalos—sacrificing her entire selfhood to devote everything to the empire. For every action ripples through all of Fontaine; dignity and grace are imperative, and it would be best to become a saintly maiden. Furina... Focalors, you can do this, you can...’ ‘I just don't know why... it feels so unbearable.’"
