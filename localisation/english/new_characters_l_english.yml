 Clorinde_PM_desc_general: "The Prime Minister of §YRepublic of Fontaine§!\n-------------\n\n\n\n\n\n\n£portrait_fra_Solenn_Clorinde_pm\n\n\n\n\n\n\n\n§L'She's Loyal', Said Furina de Fontaine§!"
 Clorinde_PM_desc: "Second Term§Y Fontaine Empire§!Prime Minister\n--------------\n\n\n\n\n\n\n£portrait_fra_Solenn_Clorinde_pm\n\n\n\n\n\n\n\n§L‘Unwavering devotion’—a phrase often used to describe a love affair. Yet when detached from romance and applied to character, it carries far greater weight. Unwavering devotion sounds like an idealistic pledge, yet it aptly describes Clorinde. She remained loyal to the Fontaine Constitution, loyal to Furina, forever. Throughout her political career, Fontaine knew scarcely a day of tranquillity: mass strikes, civil strife, repeated cabinet reshuffles, culminating in the imperial restoration. Her hands were not entirely unstained—as a cabinet minister, she signed decrees for the execution of rebels, heard soldiers' footsteps at dawn as they forced open doors. For her, law was creed, conscience the measure. She understood how Cicero's ancient dictum—‘an unjust law is no law’—still rang jarringly within Fontaine's political context. When the new constitution was promulgated, she fell into silence. It granted unprecedented power to a certain class while elevating clauses she deemed devoid of humanity to supreme sovereignty. This contradiction prevented her from fully embracing the revised constitution, yet she refrained from posturing as a dissenter. Instead, she chose marginalisation, retreating into the shadows of the political theatre, silent like the majority. Fortunately, history granted the silent voice a chance to speak once more. She was astonished when the Empress ultimately chose her to become the first Prime Minister of the post-Arlecchino era, entrusting her with the authority to revise the Imperial Constitution anew—guided by her own conscience. No, she did not believe she truly possessed the authority to judge the conduct of all Fondamanians. With the Empress's backing, she would preside over a new Constituent Assembly—a shadow of the Great Revolution era—when the National Constituent Assembly had proclaimed sovereignty belonged to the people. Now, she too would guide this agenda, transferring imperial power back to the citizens.§!"
