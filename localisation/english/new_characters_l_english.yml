 FRA_Solenn_Clorinde: "Clorinde Delacroix"
 FRA_Solenn_Clorinde_desc: "§gIn everyday life, anyone who constantly harps on about law and justice, endlessly pointing out what is wrong and what is unlawful, would invariably be universally detested. Yet Clorinde is an exception. \n\nTo say this is not entirely accurate, for one might wait a lifetime without witnessing Clorinde speak at length. Yet within her concise, precise utterances, law and justice are indeed recurring themes. She is not disliked because she genuinely embodies the enforcer of law and justice. \n\nA Dueling Proxy, as the name implies, is responsible for engaging in duels. Dueling is a rather official term; colloquially speaking, it is the appeal following a verdict. When appeals are exhausted to the point of wearing down patience, resorting to arms becomes an option – that is, initiating a duel. In these duels, Clorinde won every single one. Ultimately, her formidable reputation transformed into others' reverence for her. Her unblemished record made her something of a local celebrity in Fontaine, though she found fame distasteful, resenting journalists for disrupting her daily life. After being summoned to government service, she vanished from public view altogether. Her rare appearances were almost exclusively alongside her attendant, Furina, a testament to her elevated status. Whenever such moments were captured, they triggered seismic waves throughout the press.§!"
 FRA_Navia_Caspar: "Navia Caspar"
 FRA_Lyney_Snezhevich: "Lyney Snezhevich"
 FRA_Chiori: "Chiori"
 FRA_Chiori_desc: "§gWould someone from Fontaine call her Chiori? Clearly, this must either be a nickname or indicate that Chiori herself has intricate ties to Japan. But this is plainly incorrect! Chiori is not a nickname, nor does she have any connection to Japan whatsoever. \n\nConfusion is only natural. Senji herself was mired in it for a long time. Scattered fragments gleaned from various texts were enough to make her feel Japan bore an uncanny resemblance to her homeland, Inazuma. Yet its most significant symbol, the Grand Lord, must surely be entirely different from that baffling ‘Emperor’. As for society... Indeed, it felt like a replay of yesterday when Chiori was still in Inazuma. The oppressive atmosphere was an immersive experience. \n\nYet oppression was precisely what Chiori found most unbearable. Inazuma was a land devoid of dreams, meaning the gravitational pull of reality was unbearably heavy. Being drawn into it for too long left a pent-up feeling in one's chest – that was oppression. Such oppression was the direct reason she left Inazuma for Fontaine – perhaps to realise her dreams, perhaps to pursue freedom – and she was utterly unwilling to return to that past she had fought so hard to escape. Yet adrift in this world utterly unlike Teyvat, her spirit craved a sanctuary. Though she harboured no affection for the Grand Lord, nor did the Water God represent her faith, that distant land bearing such resemblance to her homeland now haunted her thoughts.§!"
