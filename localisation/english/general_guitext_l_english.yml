l_english: 
 PEACE_POPUP_TITLE: "Diplomatic Advisory"
 PEACE_POPUP_DESCRIPTION: "§Y[winning_country.GetNameDef]§![GetWinnerAllies]has defeated§Y[losing_country.GetNameDef]§!in the war"
 PEACE_POPUP_FLAG1_TT: "§GWinner:§! [winning_country.GetFlag] §Y[winning_country.GetName]§!"
 PEACE_POPUP_FLAG2_TT: "§RLoser:§! [losing_country.GetFlag] §Y[losing_country.GetName]§!" 
 PEACE_POPUP_COUNTRY_PLURAL: "and allies"
 PEACE_POPUP_COUNTRY_SINGULAR: ""
 PEACE_POPUP_WAR_CONCLUSION: "[GetWarConsequence]"
 PEACE_POPUP_CLOSE: "Close"
 PEACE_POPUP_FLAVOR: "PEACE_POPUP_WAR_CONCLUSION"
 PEACE_POPUP_FLAVOR_GENERAL: "Humanity willingly dies for hollow symbols."
 PEACE_POPUP_FLAVOR_FRA: "The republic born of injustice shall ultimately perish in disgrace."
 PEACE_POPUP_FLAVOR_FONTAINE: "The waves surge and roar, the sea swells to the heavens, Still waters are nowhere to be found."
 PEACE_POPUP_FLAVOR_ENG: "Farewell, Britannia"
 PEACE_POPUP_FLAVOR_GER_FAS: "The dream of a Tausendjähriges Reich must now be laid to rest."
 PEACE_POPUP_FLAVOR_GER_NEU: "It has been proven that the empire of Kaiser is but a footnote in history."
 PEACE_POPUP_FLAVOR_GER: "Only the will to do good is the true touchstone of morality."
 PEACE_POPUP_FLAVOR_JAP: "As the sun sinks below the horizon, day yields to night—an immutable law of nature."
 PEACE_POPUP_FLAVOR_CHI: "When the final hour comes, we shall fight to the bitter end and resist to the very last."
 PEACE_POPUP_FLAVOR_PRC: "And the sleeping lion shall continue to slumber."
 PEACE_POPUP_FLAVOR_SOV: "The greatest endeavour has finally drawn to a close."
 PEACE_POPUP_FLAVOR_USA: "God bless America"
 PEACE_POPUP_FLAVOR_POL: "Poland has perished, once again."
 PEACE_POPUP_FLAVOR_ITA: "A temporary counterattack cannot shake the prevailing trend."
 PEACE_POPUP_FLAVOR_SPD: "Many years later, as he faced the firing squad, Colonel Aureliano Buendía was to remember that distant afternoon when his father had taken him to see ice for the first time."
 PEACE_POPUP_FLAVOR_SPA: "Cordero has been overthrown, and all Corderos shall be overthrown."
 PEACE_POPUP_FLAVOR_FIN: "The people forged by ice and snow failed to survive the global winter."
 PEACE_POPUP_FLAVOR_SWE: "The originator of using funeral figurines shall have no offspring"
 PEACE_POPUP_FLAVOR_MAN: "Along the Songhua River, where forests and coal mines stand, And fields of soybeans and sorghum stretch far and wide, That is my homeland."

